body:
  text: 遵生八箋卷十五明髙濂撰燕閒清賞箋中論畫髙子曰畫家六法三病六要六長之說此為初學入門訣也以之論畫而畫斯下矣余所論畫以天趣人趣物趣取之天趣者神是也人趣者生是也物趣者形似是也夫神在形似之外而形在神氣之中形不生動其失則板生外形似其失則疏故求神氣於形似之外取生意於形似之中生神取自逺望為天趣也形似得於近觀為人趣也故圗畫張挂以逺望之山川徒具峻削而無烟巒之潤林樹徒作層疊而無搖動之風人物徒肖尸居壁立而無語言顧盼步履轉折之容花鳥徒具羽毛文彩顔色錦簇而無若飛若鳴若香若濕之想皆謂之無神四者無可指摘玩之儼然形具此謂得物趣也能以人趣中求其神氣生意運動則天趣始得具足如唐人之畫余所見吳道子水月觀音大幅描法粧束設色精采寶珠纓絡搖動梵容半體上籠白紗袍衫隱隱若輕綃遮蔽復加白粉細錦緣邊無論后世即五代宋室去唐未逺余所見諸天菩薩之像何能一筆可倣其滿幅一月月光若黃若白中坐大士上下俱水鵠首以望恍若萬水滂湃人月動搖所為神生畫外者此也又若閻立本六國圗其模寫形容肖諸醜類狀其醉醒歌舞之容異服野處之態種種神生得自化外又見閻大幅四王圗其君臣俯仰威儀侍從朝拱端肅珍竒羅列種種生輝山樹槎丫層層烟潤色求形似而望若堆疊以指摩之則薄平絹素又如李思訓驪山阿房宫圗山崖萬疊臺閣千重車騎樓船人物雲集悉以分寸為工宛若蟻聚逶迤逺近逰覽儀形無不纎備要知畫者神具心胸而生自指腕一㸃一抹天指具足故能省百里於方寸圗萬態於毫端松杉厯亂峯石嶙峋且皴染巖壑數層勾勒樹葉種種曹明仲何見以為山水古不及今客云此乃文內翰家物又如周昉美人圗美在意外丰度隱然含嬌韻媚姿態端莊非彼容冶輕盈使人視之艷想目亂又如周之白描過海羅漢龍王請齊卷子細若遊絲回還無跡其像之睛若㸃漆作狀疑生老儼龍鍾少似飛動海濤洶湧展卷神驚水族騎擎過目心駭豈直徒具形骸㸃染紙墨云哉又見邊鸞花草昆蟲花若搖風裊娜作態蟲疑吸露飛舞翩然草之偃亞風動逼似天成雖對雪展圗此身若坐春和園囿又如戴嵩雨中歸牧一圗上有線栁數株絲絲烟起以墨灑細㸃狀如針頭恍若一天暮靄靈雨霏霏監子跨牛奔歸意態是皆神生狀外生具形中天趣飛動者也故唐人之畫為萬世法然唐人之畫莊重律嚴不求工巧而自多妙處思所不及後人之畫刻意工巧而物趣悉到殊乏唐人天趣混成若彼丘文播揚寧韋道豐僧貫休閻立德弟立本周昉吳道𤣥韓求李祝朱瑶輩此為人物神手模擬逼真生神妙足設色白描各臻至極其山水如李思訓子昭道盧鴻王摩詰荆浩胡翼張僧繇關同輩筆力遒徑立意髙逺山環水蟠樹煙巒靄墨汁淋漓神氣生旺花鳥如鍾隱郭權輝施璘邊鸞杜霄李逖黃筌子居寀皆設色類生展布有法花之容冶露滴鳥之掀翥風生此皆權奪化工春歸掌握者也又如韓幹之馬戴嵩張符之牛僧傳古之龍韓太尉之虎袁義之魚皆極一時獨技生意奔逸氣運騫騰神適蠢動之外雖臨摹未能倣佛若宋之孫知微僧月蓬周文矩李遵梁楷馬和之僧梵隆蘇漢臣顔次平徐以榮盛師顔李早李伯時顧閎中皆工於人物而得其丰神精爽者也如郭忠恕許道寧米友仁趙千里郭熙李唐髙克明孫可元劉松年李嵩馬逺馬逵夏圭樓觀胡瓘朱懷瑾范寬董源王晉卿陳珏朱鋭王廷筠李成張舜民此皆工於山水得其泉石髙風者也如楊補之丁野堂李迪李安忠吳炳毛松毛益李永年崔白馬永忠單邦顯陳可久僧希白劉興祖徐世昌徐榮趙昌趙大年王凝馬麟此皆工於花鳥得其天機活潑者也若宋髙宗之山水竹石文湖州蘇長公毛信卿吳心玉之竹石枯木閻士安之野景樹石張浮休之烟村此皆天籟動於筆鋒渭川波入硯沼揮灑萬竿雲蒸霧變置之髙齊緑隂滿堂清風四坐豈彼俗工可容措手又如陳所翁之龍錢光甫之魚朱紹宗劉宗古之猫犬皆得一物骨氣運動狀其形似名擅一時此余因目所及聊述數輩若叙其全當自畫譜繪鑑求之非余所謂清賞要略余自唐人畫中賞其神具畫前故畫成神足而宋則工於求似故畫足神微宋人物趣逈邁於唐而唐之天趣則逺過於宋也今之評畫者以宋人為院畫不以為重獨尚元畫以宋巧太過而神不足也然而宋人之畫亦非後人可造堂室而元人之畫敢為並駕馳驅且元之黃大癡豈非夏李源流而王叔明亦用董范家法錢舜舉黃筌之變色盛子昭乃劉松年之遺𣲖趙松雪則天分髙朗心胸不凡摘取馬和之李公麟之描法而得劉松年李營丘之結搆其設色則祖趙伯駒李嵩之濃淡得宜而生意則法夏圭馬逺之髙曠宏逺及其成功而全不類此數輩自出一種溫潤清雅之態見之如見美人無不動色此故逈絶一代為士林名畫然皆法古絶無邪筆元畫如王黃二趙子昻仲穆倪瓉之士氣陳仲仁曹知白王若水髙克恭顧正之柯九思錢逸吳仲圭李息齊僧雪窗王元章蕭月潭髙士安張叔厚丁野夫之雅致而畫之精工如王振朋陳仲美顔秋月沈秋澗劉耀卿孫君澤胡廷輝臧祥卿邊魯生張可觀而閒逸如張子政蘇大年顧定之姚雪心輩皆元之名家足以擅名當代則可謂之能過於宋則不可也其松雪大癡叔明宋人見之亦能甘心服其天趣今之論畫必曰士氣所謂士氣者乃士林中能作𨽻家畫品全用神氣生動為法不求物趣以得天趣為髙觀其曰寫而不曰描者欲脫畫工院氣故耳此等謂之寄興取玩一世則可若云善畫何以比方前代而為後世寶藏若趙松雪王叔明黃子久錢舜舉輩此真士氣畫也而四君可能淺近效否是果無宋人家法而泛然為一代之雄哉例此可以知畫矣畫家鑒賞真僞雜說髙子曰米元章云好事家與賞鑒家自是兩等家多資蓄貪名好勝遇物收置不過聽聲此謂好事若賞鑒家天資髙明多閲傳録或自能畫或深知畫意每得一圗終日寶玩如對古人聲色之奉不能奪也名曰真賞然看畫之法須著眼圎活勿偏己見必細玩古人命筆立意委曲妙處不令潦草涉略論山有起伏轉換水有隱顯源流林木求其深邃蓊鬱而深淺分明人物觀其覩面凝眸而顧盻相屬四時之景要分朝暮隂晴烟雲動蕩花鳥之態須觀欹風含露宿食飛鳴次及牛馬昆蟲魚龍水族無一不取神氣生動天趣渙然筆墨之外斯不失為真賞若專以形似取之則市街貼壁賣畫儘有克肖人物花草猫狗之圗何取于古且古人之畫豈特不可以形似物跡求也當無筆跡留滯方見天趣如書之藏鋒始妙松雪詩云石如飛白木如籕寫竹應須八法通正謂是也且好畫不宜多裱裱多失神亦不可洗更不可剪去破碎邊條當細細補足令人寶惜古畫豈特寶若金玉即如宋人去此不逺畫之在世流傳便少無論唐時五代藏畫之家當自檢㸃不恤勤煩乃收藏至要畫之失傳其病有五古畫年逺紙絹已脆不時舒卷略少局促即便折損破碎無救此失傳之一童僕不識收捲有法即以兩手甲抓畫捲起不顧邊齊以軸幹著力緊收內中絹素碎裂此失傳之二或遭屋漏水濕鼠嚙猫溺梅雨黴白不善揩抹即以粗布擦摩逐片破落此失傳之三或出示俗人不知看法即便手托畫背起就眼觀絹素隨折或挂畫忽慢以致損傷崩裂再莫可補雖貼襯何益此失傳之四或遭投火水溺嵗苦流移此失傳之五有等敗落子孫無識婦女不知寶藏堆積朽腐或兒女癡頑用筆塗寫或燈下看玩以致油汚透骨或偶墮燭燒損或挂當風狂起吹斷刮裂甚矣古畫難存類此種種古人名畫更少對軸若髙尚士夫之畫適興偶作天趣生動人即寶傳何能有對若髙齊精舍豈容四軸張挂即對軸亦少雅致世以無名人畫即填某人欵字深可笑也畫院進呈卷軸皆有名大家俱不落欵何必見牛指戴見馬指韓又豈如格古論云無名人畫多有佳者若云無名決無好畫無名欵者皆御府畫也古有善畫花草者多不落墨以色㸃染自有一種精神生意又若粉本即舊人畫稿草草不經意處乃其天機偶發生意勃然落筆趣成多有神妙當寶藏之唐人紙則硬黃短簾絹則絲粗而厚有搗熟者有四尺濶者宋絹則光細若紙揩摩如玉夾則如常更有濶五六尺者名曰獨梭紙用鵠白澄心堂居多宋畫迄今其絲性消滅更受糊多無復堅韌以指微跑則絹絲如灰堆起表裏一色若今時絹素以藥水染舊無論指跑絲絲露白即刀刮亦不成灰此古今絹素之辨似不容僞又如元絹有獨梭者與宋相似有宓家機絹皆妙古畫落墨著色深入絹素礬染既多精采逈異其花草紅若初𤾉緑如碧瑱粉則膩滑如玉黑則㸃墨如漆僞者雖極力模擬而諸色間有相似惟紅不可及且求其入絹深厚則不能矣文采索然又如古人之畫愈玩愈佳筆法圎熟用意精到以人趣倣模物趣落筆不凡而天趣發越今人之畫人趣先無而物趣牽合落筆粗庸入眼不堪玩賞何用僞為宋人臨摹唐朝五代畫片神采如出一手祕府多寶藏之今人臨畫惟求影響多用己意隨手茍簡雖極精工先乏天趣妙者亦板近如吳中莫樂泉臨畫亦稱當代一絶我朝名家不讓宋元者亦不乏人髙品如文衡山沈石田陳白陽唐伯虎文汶水王仲山錢叔寶文伯仁顧亭林孫雪居沈青門風神俊逸落筆脫塵或隸或行各有天趣元之二趙王黃可與並美如戴文進工山水人物神像雅得宋人三昧其臨摹倣效宋人名畫種種逼真其生紙著色開染草草效黃子久王叔明等畫較勝二家如商喜李在周東村仇十洲山水人物之妙上軼宋人劉范諸輩又如邊景昭吕廷振林以善張秋江沈士容王牧之陳憲章俞江村周少谷輩花鳥竹石亦得宋之徐黃家法他如謝廷循上官伯達金文鼎金汝清姚公綬王孟端夏仲昭王舜耕陳大章許尚文吳偉蘇致中葉原靜謝時臣朱子朗朱鹿門夏葵夏芷石鋭倪端諸輩皆我明一代妙品士夫畫家各得其趣若鄭顛仙張復陽鍾欽禮蔣三松張平山汪海雲皆畫家邪學徒逞狂態者也俱無足取賞鑒收藏畫幅髙子曰收蓄畫片須看絹素紙地完整不破清白如新照無貼襯此為上品面看完整貼襯條多畫神不失此為中品若破碎零落片片凑成雜綴新絹以色旋補雖為名畫亦不入格此下品也完整中價之低昂又以山水為上人物小者次之花鳥竹石又次之走獸蟲魚又其下也冊葉卷子同一論法又如神佛圗像其品不同如宋元并我朝人畫佛像名家多就山水樹石中或坐或行或倚石憑樹畫法不板烟雲流潤神氣儼臨為上品也其他三尊並列鬼從狰獰或登寶座諸神衛護者止可為侍奉香火非流傳品也又如假造佛像畫片以絹搗熟以香烟瀝并竈烟屋梁挂塵煎汁染絹其色雖舊或黃或淡黑可愚𨽻家孰知古絹一種傳玩舊色嗅之異香可掬豈人僞可到古絹碎裂儼狀魚口橫聯數絲再無直裂今之僞者不橫即直乃以刀刮指甲劃開絲縷堅韌不斷觸目即辨藏畫之法以杉板作匣匣內切勿油漆糊紙反惹黴濕又當嘗近人氣或置透風壁閣去地丈餘便好一遇五月八月之先將畫幅幅展玩微見風日收起入匣用紙封口勿令通氣過此二候方開可免黴白又若以名畫張挂多則三五日一換收起挂久恐為風濕侵損質地若絹素畫尤不可以久挂如前起居箋內溫閣藏畫之法甚佳古畫不可捲緊恐傷絹地單條短軸作橫面開關門扇匣子畫直放入軸頂貼籖細開某畫甚便取看又如宋人繡畫山水人物樓臺花鳥針線細密不露邊縫其用絨止一二絲用針如髮細者為之故多精妙設色開染較畫更佳以其絨色光彩奪目丰神生意望之宛然三趣悉備女紅之巧十指春風逈不可及元人之繡便不及宋以其用絨粗肥落針不密且人物禽鳥用墨描畫眉目不若宋人以絨繡眉目瞻眺生動此宋元之别以其眉目辨也故宋繡山水亦不多得元人花鳥尚可一二見耳宋人刻絲山水人物花鳥每痕剜斷所以生意混成不為機經掣制今人刻絲是織絲也與宋元之作逈異故宋刻花鳥山水亦如宋繡有極工巧者余意刻絲雖逺不及繡若大幅舞裀自有富貴氣象元刻逈不如宋矣大率一代之物不及一代凡事皆然何止此也人能以畫自工明窗淨几描寫景物或覩佳山水處胸中便生景象布置筆端自有天趣如名花折枝觀其生趣花態綽約葉梗轉折向日舒笑迎風欹斜含烟弄雨初開殘落種種態度寫入采素不覺學成便得出人頭地若不以天生活潑者為法徒竊紙上形似三趣無一得也終為俗品古之髙尚士夫如李公麟范寬李成蘇長公米家父子輩靡不畫臻神妙是以大雅君子於畫收藏賞鑒不可不學一二名筆論研髙子曰研為文房最要之具古人以端硯為首端溪有新舊坑之分舊坑石色青黑溫潤如玉上生石眼有青緑五六暈而中心微黃黃中有黑㸃形似鴝鵒之眼故以鴝鵒名研眼分三種暈多晶瑩者謂之活眼有眼朦朧暈光昏滯者謂之淚眼雖具眼形內外焦黃無暈者謂之死眼故有淚不如活死不如淚之評又以眼在池上者名曰髙眼為佳生下者為低眼次之惟北巖之石有眼餘坑有無相間或有七眼三五眼如星斗排聨者或十數錯落上下四旁生者或有白㸃如粟貯水方見隱隱扣之無聲磨墨亦無聲為下巖之石今則絶無有則希世之珍也上巖中巖之石皆灰色而紫如猪肝總有一眼暈少形大如雄雞眼扣之摩之俱有聲質亦粗礪即今之端石是也歐陽公以端之子石為佳以子石生大石中為石之精其發墨光潤貯水不耗為可貴耳古有端石貢硯無眼其細膩發墨色青光潤此必下巖石也想貢硯在宋官司取多不暇剪裁取眼故耳貴在發墨何取於眼無眼者但不入於俗眼鑒家何礙歙石出龍尾溪者其石堅徑發墨故前人多用之以金星為貴石理微粗以手磨之索索有鋒鋩者尤佳歙溪羅紋如羅之紋細潤如玉刷絲如髮之密金銀間刷絲亦細密眉子即蛾眉也如甲痕為舊坑四種石也色俱青黑其新坑者羅絞如蘿蔔紋刷絲每條相去一二分眉子或長一二寸金星新舊坑石色雖淡青質並粗燥銀星新舊坑同故歙石有龍尾金星蛾眉角浪松文等名有種湖廣沅州出石深黑亦有小眼廣人取歸作硯名曰黑端沅人取作犀牛魚龜荷葉八角等式􅤰溪石淡青色內深紫而帶紅極細潤用久光甚有黃脉相間俗號紫袍金帶有僞造者以藥鑿嵌成之自有痕跡洮河緑石色緑微藍其潤如玉發墨不減端溪下巖出陕西河深甚難得也今名洮者俱􅤰石之皮乃長沙山谷中石光不發墨廣東萬州懸崖金星石色黑如漆光潤如玉以水潤之則金星自見乾則無跡極能發墨用久不退在歙之上端之下巖石可並也浙之衢石黑者亦佳多不發墨他如黑角研紅絲硯黃玉硯褐色硯紫金硯鵲金墨玉石硯皆出山東水晶硯發墨如歙蔡州白石硯浮蓋山仙石硯丹石硯唐州唐石硯宿州宿石硯吉州紫石硯淄州黃金硯金雀石硯青州石末硯熟鐵硯紫金石硯用不發墨青石硯藴玉石硯戎石絳石硯淮石硯寧石研宣石研吉石研䕫石研如漆發墨明石研萬州磁洞石硯相州銅雀瓦硯未央宫瓦頭硯栁州栁石硯出龍壁下成州成石硯出栗亭瀘硯濰研南劍州魯水研宿州樂石硯虢州澄泥研登州駝基島石硯歸州大陀石研江西寧府陶研形肖銅雀髙麗研上鑿花巧梁公硯銀研銅研磚硯漆研蚌研磁硯硯之出處不可勝紀衆研中龍尾發墨池水積久不乾端溪美惡俱能發墨中有受水燥濕之别羅紋過于龍尾銅雀硯沈水千年原質亦細故易發墨而不甚燥然不壞筆他則無足議也唐之澄泥研品為第一惜乎傳少而今人罕見古之名硯如陳省躬仙翁研陶榖有兩池圎研名曰璧友和魯公有雪方池硯周彬公友人有金稜玉海研徐闡之有小金成硯宣城有四環鼓研李后主有生水硯內有黃石子子在則水無子則涸孫之翰有呵水研一呵水流丁晉公有水硯一泓墨水盛暑不乾劉義叟造瓦硯丁寶臣緑石硯即緑豆端也謂之玉堂新製送王介甫故介甫詩有玉堂新製世爭傳况是蠻溪緑石鐫之句蘇長公研銘曰千夫挽綆百夫運斤篝火下鎚以致斯珍此言下巖端石在宋亦難採取如此况後數百年矣何能易得若余所見硯有百方皆名硯也不能一一悉記舉其可寶者言之如端溪天生七星硯緑端石硯玉兔朝元硯子石硯山字子石研天成白玉風字研漢碧玉圭研唐澄泥八角大硯未央宫磚頭研德夀殿犀紋石硯天潢硯龍尾石筒瓦小硯洮河緑石硯銀絲石硯古瓦鶯研靈壁山石硯龍尾石段硯興和磚硯石渠瓦硯豆斑石硯此皆硯之極少而致精妙者圗其形體共海內鑒家賞之噫有硯存笥如范喬之遺子者能幾人哉人能賤金玉而寶硯石者又幾人哉况佳硯之不得其主又不知其幾矣他如沈於深淵掩於厚土毁於兵燹敗於顛覆災於記算之傍困於學究之側其幾又何勝以千百計也惜哉滌藏硯法佳硯池水不可令乾每日易以清水以養石潤不可一日不滌若用二三日不滌墨色差減滌者不可磨去墨鏽此為古硯之徴滌以皂角清水為妙滚水不可滌硯以半夏切平擦研極去宿墨以絲瓜穰滌洗總不如蓮房殼收起以水浸軟滌研去垢起滯又不傷硯不可以氈片故紙揩抹恐氈毛紙屑以混墨色大忌滚水磨墨茶亦不可新墨初用膠性并稜角未伏不可重磨恐傷硯質冬月當預藏佳硯以粗研用之可以敵凍寒時以火炙氷當用四腳挣爐架火硯上微暖逼之或用研爐亦可得青州熟鐵研用之甚宜春夏二時黴溽蒸濕使墨積久則膠泛滯筆又能損硯精采須頻滌之以文綾為囊韜避塵垢藏之笥匣不可以研壓研以致傷損研之佳者最為難得今所尚者未必佳品人俱貴耳賤目以愚𨽻家彼所為寶豈真寶哉又不可以不察後硯圗皆余十年間南北所見或在世家或在文客或落市肆重索髙資鑒家未見按圗未必盡許為竒即內中一二易得之石亦異常品故余賞其諸硯質之堅膩琢之圎滑色之光采聲之清泠體之厚重藏之完整傳之久逺豈世俗所謂硯哉海內必有見者見則必以余為藻鑑的確余雖未博目中見此為佳第恐沈沒圗志不忘愧余筆拙未盡形容若為浮借余素不善髙似孫硯箋諸式鳳池硯玉堂硯玉臺硯蓬萊硯圭硯辟雍硯房相硯郎官硯風字研鼎研人面研曲水硯八稜硯四直研院硯蓮葉研馬蹄硯鳳池硯圎池硯天研玉環硯舍人硯水池硯大師研蟾研東坡硯都堂硯內相研葫蘆硯𨫼硯隻履硯雙履硯月池研方池研笏硯斧形硯瓢硯壁研續硯式琴硯鷹揚硯鶯研山字硯太極硯箕硯漢壺硯鳳嗉硯松段硯山石硯論墨髙子曰古之尚墨若徐鉉墨名月團價值三萬唐𤣥宗墨名龍香劑致墨精幻形李廷圭龍紋墨雙脊墨千古稱絶漢時月給尚書令隃糜大墨范丞相一墨表曰五劍堂造裏曰天關第一煤金章宗蘇合油烟墨後欲得之者以黃金倍易無可覔處景煥墨名香璧副墨子五代時有朱君得柴氏小墨韓熙載化松堂墨名𤣥中子麝香月龍煤張遇造易水貢墨懷民遺東坡墨名青烟煤又如供堂墨淵雲墨兖州陳朗墨淵有潘雲谷墨松九墨狻猊墨松烟墨九子墨魚吐墨天雨墨陽山石墨化塹墨浮提國金壺墨雷公墨又若仲將之墨一㸃如漆等類皆古名墨也若今世所尚以羅小華為最羅之墨固善矣余所見國初查文通龍忠迪墨碧天龍氣墨水晶宫墨遂安方正牛舌墨石青填字赤金為衣者蘇眉陽幼年所製祖李遺法卧蠶小墨世宗時邵格之墨如方于魯寥天一九𤣥三極國寶非烟等墨亦皆精品前如汪中山翰史初時製墨質之佳美不亞羅墨其精品以豆瓣楠為匣內用朱漆籖以中欵表曰太極兩猊三猿四象五雀六馬七鷴八仙九鷥十鹿皆以鳥獸取義又有𤣥香太守小長墨四種一曰彘文二曰卧蠶三曰亞字四曰玉階有客卿四種小元墨曰太極曰八卦曰圎璧曰瓊樓有松滋侯四種小方墨一亞字二羅文三九雲四螭環有墨挺墨柱余先得其數種試之質輕烟紫可為九𤣥三極矣似在羅上真神品也今人所見皆其次品式樣雖精而墨質不佳又如二十八宿元墨更其下矣故名即湮沒不傳至今墨印尚存而墨質愈下特具陳𤣥貌耳余為典客時髙麗使者餽墨上有梅花印文其墨色甚黑而濃厚以余論之墨之妙用質取其輕烟取其青嗅之無香磨之無聲新研新水磨若不勝言不可用力磨也忌急則熱熱則沫生用則旋研研無久停塵埃汚墨膠力泥墨用過則濯墨積勿盈藏久膠宿墨用乃精用墨之法無出余數語也若治墨之精模式之巧方于魯所刻墨譜似盡善也竒哉方之墨哉客曰墨惟適用足矣何以竒為噫匪好竒也墨品精者不特于今為佳存于後世更佳不特詞翰藉美于今更藉傳美于後若晉唐之書宋元之畫傳數百年墨色如漆書畫神氣賴墨以全若墨之下品用濃見水則沁散湮汚用淡重禙則神氣索然未及數年墨跡已脫繇此觀之則墨之為用果好竒也知此則可與言墨矣故李廷圭詩云贈爾烏玉玦清泉硯須潔避暑懸葛囊臨風度梅月其寶惜可知又云墨藏石灰中過梅不黴是亦一法附硃墨法法用好辰砂一兩三紅硃二兩用秦皮水煮膠清浸七日夜傾去膠之清水於日色漸漸晒至乾濕得所以墨印印之硯中研用甚佳一法以花朱同螣黃磨㸃成嘉年內硃砂墨妙甚論紙髙子曰上古無紙用汗青者以火灸竹令汗出取青易于作書至漢蔡倫始製紙誠萬世利也初搗漁網為紙曰網紙以布作者曰麻紙以楮皮作者曰榖紙蜀有凝光紙雲藍箋花葉紙十色薛濤箋名曰蜀箋有側理紙松花紙流沙紙彩霞金粉龍鳳紙綾紋紙短簾白紙硬黃紙布紙縹紅紙青赤緑桃花箋藤角紙縹紅麻紙桑根紙六合箋魚子箋苔紙建中年有女兒青紙卯紙宋有澄心堂紙蠟黃藏經箋白經箋碧雲春樹箋有龍鳳印邊三色內紙有印金團花并各色金花箋紙有藤白紙研光小本紙李僞主造㑹府紙長二丈濶一丈厚如繒帛數重陶榖家藏有鄱陽白數幅長如匹練西山觀音簾紙鵠白紙蠶繭紙竹紙大箋紙元有黃麻紙鉛山紙常山紙英山紙臨川小箋紙上虞紙又若豫邑之紙姸妙輝光皆世稱也今之楚中粉箋松江粉箋為紙至下品也一黴即脫陶榖所謂化化箋此爾止可用供溷材一化也貨之店中包麵藥果之類二化也甚言紙之不堪用者類此若今之大內細細密灑金五色粉箋五色大簾紙灑金紙有等白箋堅厚如板兩面砑光如玉潔白有印金花五色箋紙又若磁青紙如段素堅韌可寶多用寫泥金字經有等藍色者薄而不佳髙昌國金花箋亦有五色有描金山水圗者髙麗有綿繭紙色白如綾堅韌如帛用以書寫發墨可愛有等皮紙用以為簾為雨帽為書夾堅厚若油為之中國所無亦竒品也近日可用作書者吳中無紋灑金箋紙為佳松江近日談箋不用粉造以荆川簾紙褙厚砑光用䗶打各色花鳥堅滑可類宋紙又新安新造倣宋藏經箋紙亦佳吳中近亦為之但不如宋箋抄成堅韌如段帛有性數百載流傳尚有揭開受用若今倣效者紙性終脆久黴糊懈必鬆時尚花邊格子白鹿箋用以作柬寫詩甚便其式余家有數十種但白鹿紙以緑子水併槐黃水微煎印者雅甚以青以紅俱不佳也又如蠟砑五色箋亦以白色松花色月下白色羅紋箋為佳餘色不入清賞兩人砑者精美乂不壞板若用水濕一紙以潤十紙砑者不佳然以白蠟砑者受墨蜜蠟者遇墨成珠描寫不上深可恨也并録以共鑒賞造葵箋法五六月戎葵葉和露摘下搗爛取汁用孩兒白鹿堅厚者裁段葵汁內稍投雲母細粉明礬些少和勻盛大盆中用紙拖染挂乾或用以砑花或就素用其緑色可人且抱野人傾葵微意染宋箋色法黃柏一斤捶碎用水四升浸一伏時煎熬至二升止聽用橡斗子一升如上法煎水聽用胭脂五錢深者方妙用湯四碗浸榨出紅三味各成濃汁用大盆盛汁每用觀音簾堅厚紙先用黃柏汁拖過一次後以橡斗汁拖一次再以胭脂汁拖一次更看深淺加減逐張晾乾可用染紙作畫不用膠法紙用膠礬作畫殊無士氣否則不可著色開染法以皂角搗碎浸清水中一日用砂罐重湯煮一炷香濾淨調勻刷紙一次挂乾復以明礬泡湯加刷一次挂乾用以作畫儼若生紙若安藏三二月用更妙拆舊裱畫卷綿紙作畫甚佳有則宜寶藏可也造槌白紙法法取黃葵花根搗汁每水一大碗入汁一二匙攪勻用此令紙不粘而滑也如根汁用多則反粘不妙用紙十幅將上一幅刷濕又加乾紙十幅纍至百幅無礙紙厚以七八張相隔薄則多用不妨用厚板石壓紙過一宿揭起俱潤透矣濕則晾乾否則平鋪石上用打紙鎚敲千餘下揭開晾十分乾再疊壓一宿又槌千餘槌令發光與蠟箋相似方妙余常製之甚佳但跋涉耳造金銀印花箋法用雲母粉同蒼术生薑燈草煮一日用布包揉沈文用絹包揉洗愈揉愈細以絶細為佳收時以綿紙數層置灰矼上傾粉汁在上晾乾用五色箋將各色花板平放次用白芨調粉刷上花板覆紙印花紙上不可重搨欲其花起故耳印成花如銷銀若用薑黃煎汁同白芨水調粉刷板印之花如銷金二法亦多雅趣造松花箋法槐花半升炒焦赤冷水三碗煎汁用銀母粉一兩礬五錢研細先入盆內將黃汁煎起用絹濾過方入盆中攪勻拖紙以淡為佳文房用箋外此數色皆不足備論筆髙子曰蒙恬創筆以枯木為管以鹿毛為柱以羊毛為被所謂毫者非今之竹兔也故製筆之法桀者居前毳者居後强者為刃耎者為輔參之以􅐨束之以管固以漆液澤以海藻濡墨而試直中繩勾中鈎方圎中規矩終日握而不敗故曰筆妙栁帖云近蒙寄筆出鋒太短傷于徑硬所要優柔出鋒須長擇毫須細管不在大副切須齊齊則波切有慿管小則運動有力毛細則㸃畫無失鋒長則洪潤自由筆之𤣥樞當盡於是故筆偈曰圎如錐捺如鑿只得入不得却言縛筆須緊不令一毛吐出即不堪用乂曰心柱硬覆毛薄尖似錐齊似鑿故伯英之筆窮神盡意子雲稱之漢末一筆之匣雕以黃金飾以和玉綴以隋珠文以弱翠非文犀之楨必象之管豐狐之柱秋兔之毫則古人重筆之意殷矣南朝有姥善作筆用胎髮為心開元中筆匠名鐵頭能瑩管如玉今俱失傳右軍筆經曰諸郡毫惟中山兔肥而毫長可先用人髮杪數十莖雜青羊毛并兔毳裁令齊以麻紙裹枝根令治次取上毫薄布柱上令柱不見此皆古人格論若今之為筆所貴在毫東郡以青羊毛為之雉尾為蓋五色可觀有用豐狐毛虎毛鼠鬚羊毛麝毛羊鬚胎髮造者皆不如兔毫為佳香狸毫次之兔以崇山絶壑中者毫足秋毫取健冬毫取堅春夏之毫貯不久矣筆以尖齊圎健為絶毫堅則尖毫多則色紫而齊用􅐨貼襯得法則毫束而圎用以純毫附以香狸角水得法則用久而健此外無法今人毫少而狸􅐨倍之筆不耐寫豈筆之咎哉為不用料耳余取杭人舊製筍尖筆粧最佳後因湖州扎縛筆頭為細腰葫蘆樣製杭亦效之最為可恨初寫似細宜作小書用後腰散便成水筆即為棄物杭筆不如湖筆得法湖筆又以張天錫為最惜乎近無傳其妙者然畫筆向以杭之張文貴首稱而張亦不妄傳人今則分而為三美惡無准世業不修似亦可惜揚州之中管鼠心畫筆用以落墨白描佳絶水筆亦妙古之王者以金管銀管斑管為筆紀功其重筆如此向有牙管玳瑁管玻瓈管鏤金管緑沈漆管及棕竹花梨紫檀等管此何意也以其為可貴耳如持用何惟取竹之薄標者為管筆之妙用盡矣又何尚焉冬月以紙帛衣管以避寒者似亦難用悉不取也收筆以十月正二月收者為佳妙筆書后即入筆洗中滌去滯墨則毫堅不脆可奈久用然須洗完即加筆帽免挫筆鋒收筆以黃連調輕粉蘸筆頭候乾收之則筆不蛀而毫純又法川椒黃柏煎湯磨松烟染筆藏之亦可逺蛀古人重筆用敗則葬故趙光逢濯足襄漢溪上見一方磚上題髠友退鋒郎功成鬢鬚霜冢頭封馬鬛不敢負恩光後顯獨孤貞節立磚上積有苔痕此蓋好事者葬筆所在論文房器具髙子曰文房器具非玩物等也古人云筆硯精良人生一樂余以所見評之如左文具匣匣製三格有四格者用提架總藏器具非為觀美不必鑲嵌雕刻求竒花梨木為之足矣亦不用竹絲蟠口鑲口費工無益反致壞速如蔣製倭式用鉛鈐口者佳甚研匣用古研一方以豆瓣楠紫檀為匣或用花梨亦可硯不在大適中為美可入藏匣再備朱硯一匣故研譜有雙履製者為便二色用也研以端歙為佳或用白端石為朱硯者不耐久用沾染不落亦得舊石一方為幅始佳筆格有玉為山形者為卧仙者有珊瑚者有瑪瑙者有水精者有刻犀者匪直新製舊做亦多有宣銅鏒金雙螭挽格精甚余見哥窰五山三山者製古色潤又見白定卧花哇哇瑩白精巧舊玉子母六猫長七寸以母橫卧為坐以子猫起伏為格真竒物也目中罕見有古銅十二鋒頭為格者有銅螭起伏為格者余見友人有一老樹根枝蟠曲萬狀長止七寸宛若行龍鱗甲爪牙悉備摩弄如玉此誠天生筆格余齊一石蟠曲狀龍不假斧鑿亦竒物也可架筆三矢筆牀筆牀之製行世甚少余得一古鏐金筆牀長六寸髙寸二分濶二寸餘如一架然上可卧筆四矢以此為式用紫檀烏木為之亦佳筆屏宋人製有方玉圎玉花板內中做法肖生山樹禽鳥人物種種精絶此皆古人帶板燈板存無可用以之鑲屏插筆覺甚相宜大者長可四寸髙三寸者余齊一屏如之製此似無棄物有大理舊石儼狀山髙月小者東山月上者萬山春靄者皆余目見初非扭揑俱方不盈尺天生竒物寶為此具作毛中書屏翰似亦得所水注有玉為圎壺方壺者其花紋甚工又見吳中陸子岡製白玉辟邪中空貯水上嵌青緑石片法古舊形滑熟可愛有玉蟾蜍注擬寶晉齊舊式者古銅有青緑天雞壺有金銀片嵌天祿妙甚有半身鸕鷀杓有鏒金鴈壺其類生無二以兩足立地口中出水有江鑄眠牛以牧童騎跨作注管磁有官哥方圎水壺有立瓜卧瓜壺有雙桃注有雙蓮房注有筆格內貯水兩用者有牧童卧牛者有方者定窑之注竒甚有枝葉纒擾瓜壺有蒂葉茄壺有駝壺又可格筆有蟾注有青東磁天雞壺底有一竅者宣窑五采桃注石榴注雙爪注采色類生有雙鴛注有鵝注工緻精極俱可入格筆洗銅有古鏒金小洗有青緑小盂有古小釜有小巵匜其五物原非此製今用作洗玉有鉢盂洗長方洗玉環洗或素或花工巧擬古磁有官哥圎洗葵花洗磬口圓肚洗有四捲荷葉洗有捲口蔗段洗有縧環洗有長方洗類多但以粉青紋片朗者為貴古龍泉有雙魚洗有菊瓣洗有鉢盂洗百折洗定窰有三篐圓桶洗梅花洗有中盞作洗邊盤作筆覘者有縧環洗有方池洗有栁斗圓洗有圓口瓜稜洗菊瓣洗惟定洗多甚宣窰有魚藻洗有葵瓣洗有磬口洗有鼓樣青剔白螭洗近人多以洗為杯孰知厚捲口而匾淺者洗也豈杯有此製外此新作商銀流金銅洗諸窰假均州紫緑二色洗與水中丞多甚製亦可觀俱不入格水中丞銅有古小尊罍其製有敞口圓腹細足髙三寸許墓中葬物今用作水中丞者余有古玉中丞半受血侵圓口瓮腹下有三足大如一拳精美特甚古人不知何用近有陸琢玉水中丞其碾獸面錦地與古尊罍同亦佳器也磁有官哥瓮肚圓者有鉢盂小口式者有瓜稜肚者青東磁有菊瓣瓮肚圓足者定有印花長樣如瓶但口敞可以貯水者有圓肚束口三足者有古龍泉窑瓮肚周身細花紋者有宣銅雨雪沙金製法古銅瓿者樣式美甚近有新燒均窑俱法此式奈不堪用研山研山始自米南宫以南唐寶石為之圗載輟耕録後即效之不知此石存否大率研山之石以靈壁應石為佳他石紋片粗大絶無小樣曲折屼峍森聳峰巒狀者余見宋人靈壁研山峯頭片段如黃子久皴法中有水池錢大深半寸許其下山腳生水一帶色白而起磊砢若波浪然初非人力僞為此真可寶又見一將樂石研山長八寸許髙二寸四面米粞包裹而巒頭起伏作狀此更難得他如應石近有佳者天生四面不加斧鑿透漏花皺俱好但少層疊巒頭水池深邃望之一拳石也又若燕中西山黑石狀儼應石而崒屼巉巗紋片皺裂過之可作研山者頗多但石性鬆脆不受激觸多以此亂應石有僞為者將舊磚雕鏤如寶晉齊式用錐鑿成天生紋片用芡實浸水煮如墨色持以愚人每得重價然以刀刮石底磚質即露有等好事者以新應石肇慶石黑石加以斧鑿修琢巖竇摩弄瑩滑名曰硯山觀亦可愛靈壁石研山圗將樂石研山圗附左印色池印色池以磁為佳而玉亦未能勝也故今官哥窑者貴甚余見二窑印池方者尚有十數四八角并委角者僅見一二色亦不佳余齊有三代玉方池內外土鏽血侵四裹不知何用今以為古玉文具中印池似甚合宜又見定窰方池佳甚外有印花紋此亦少者有陸子岡倣周身連蓋滚螭白玉印池工緻侔古今多效製近日新燒有蓋白定長方印池并青花白地純白磁者此古未有當多蓄之且有長六七寸者甚佳印色方麻油二斤牙皂角三箇萆麻仁半斤去壳取仁搗爛花椒四十粒取色不變螣黃一錢取不落色明礬五分取其發亮黃柏五分助色黃䗶五分白䗶五分胡椒三十五粒辰砂二兩二紅二兩花硃四兩右件先將麻油同麻子熬數滚再下皂角花椒熬至滴水成珠方下䗶礬等物取起去渣用蘄艾為骨加三朱拌紅為度雅尚齊印色方京師萆麻油較菜油價賤取回罈裝埋土內三二年用色白如氷每用斤數大日內翻晒至熟次下黃蠟一錢白礬末一錢白芨末二錢金箔沙細五十片入瓶聽用將舊坑豆瓣硃砂研至極細用水飛過三五次去黃標與末後砂腳只用中間水飛細者入粗碗中用燒酒傾入微火煮一炷香隨其色變晒乾取起將硃又研如麵方和前油拌艾入匣愈久愈紅不變黑色油取晒熟至久不乾其胚用真正蘄艾搓揉百次仍煮數遍務去黑星一㸃不存如綿絮然方用此至妙祕法刻同鑒家共之糊斗用銅者為佳以便出洗有古銅小提卣如一拳大者上有提梁索股有蓋盛糊可免鼠竊又有古銅圓瓮肚如酒杯式下乘方座且體厚重不知古人何用今以為糊斗似宜有建窰外黑內白長罐定窑圓肚并蒜蒲長罐俱可作糊斗又見哥窰方斗如斛中置一梁亦可充此又見古銅三哥長桶下有三足髙二寸許甚宜盛糊法糊方白麵一斤浸三五日候發臭作過入白芨麵五錢黃䗶三錢白藝香三錢石灰末一錢官粉一錢明礬二錢用花椒一二兩煎湯去椒先投蠟礬藝香石灰官粉熬化入麵作糊粘背不脫又法飛麵一斤入白芨末四兩楮樹汁調亦妙鎮紙有古銅青緑蝦蟆虛置銅坐重有斤餘又有虎蹲銅坐一塑鑄者乃上古物也且見必成對壓紙妙甚有古銅坐卧哇哇亦佳有古銅蹲螭眠龍有鏐金辟邪卧馬有大銅虎遍身青緑重三二斤者用以壓書玉有古彘古人用以挣肋殉葬者每見二條有白玉獵狗有卧螭有大樣坐卧哇哇有玉兔玉牛玉馬玉鹿玊羊蟾蜍日月瑪瑙石鼓柏枝瑪瑙蹲虎水晶石鼓酒黃水晶抵牛捧瓶波斯其做法精妙如畫皆宋物也有哥窑蟠螭有青東磁獅鼓白定哇哇狻猊余自燕中得玉蟾二枚其背斑㸃如灑墨色同玳瑁無黃暈儼若蝦蟆背狀肚下純白其製古雅如生用為鎮紙摩弄可愛又見紅緑瑪瑙二大蟹可為絶竒有白玉瑪瑙辟邪長三四寸者皆鎮紙佳品璧尺有玉作尺余見長二尺厚六分濶一寸五分者人云尺璧為寶然玉有徑二三尺者一時同見有二尺長玉如意三尺六寸長玉劔皆竒貨也有玊碾雙螭尺有以紫檀烏木為之上用古做蹲螭玉帶抱月玉兔獸為鈕者又見倭人鏒金銀壓尺古所未有尺狀如常上以金鏒雙桃銀葉為鈕面以金銀鏒花皆縧環細嵌工緻動色更有一竅透開內藏抽斗中有刀錐鑷刀指銼刮齒消息穵耳剪子收則一條挣開成剪此製何起豈人心思可到謂之八面埋伏盡於斗中收藏非倭其孰能之余以此式令潘銅倣造亦妙潘能得其真傳故耳論尺無過此者有金銀石嵌臂閣界尺圗匣文具等物終是不雅有竹嵌尺傍四轉內以黃楊烏木紫檀象牙挽嵌如意形製雖工久則必敗圗書匣有宋剔紅三撞者二撞者有罩蓋者新剔紅黑二種亦有二撞者但方匣居多有填漆者有紫檀雕鏤鑲嵌玉石者有古人玉帶板燈板鑲匣面者有倭匣四子六子九子每子匣內藏以漢人玉章一方或藏銀章替下藏以寶石琥珀官窑青東磁舊人圗書為傳玩佳品若常用以豆瓣楠為佳新安製有堆漆描花蜔嵌圗畫精者可愛近日市者惡甚又如黑漆描花方匣何文如之亦堪日用臂閣臂閣有以長樣古玉璏為之者甚多而雕花紫檀者亦常有之近有以玉為臂閣上碾螭文卧蠶梅花等樣長六七寸者有以竹雕花巧人物為之者亦佳而倭人黑漆臂閣如圭圓首方下濶二寸餘肚稍虛起恐惹字墨長七寸上描金泥花樣其質輕如紙此為臂閣上品貝光多以貝螺為之形狀亦雅但手把稍大不便用使余得一古玉物中如大錢圓泡髙起半寸許傍有三耳可貫不知何物余用為貝光雅甚又見紅瑪瑙製為一桃稍匾下光砑紙上有桃葉枝梗此亦為砑而設水晶玉石當倣為之裁刀桃刀之外無可入格余有古刀筆一把青緑裹身上尖下環長僅盈尺古人用以殺青為書今入文具似極雅稱近有崇明裁刀亦佳書燈用古銅駝燈羊燈龜燈諸葛軍中行燈鳳龜燈有圓燈盤定窰有三臺燈檠宣窑有兩臺燈檠俱堪書室取用又見青緑銅荷一片檠駕花朵坐上想取古人金荷之意用亦不俗古有燭奴即今鑄波斯作燭臺者是也似不堪供筆覘有以玉碾片葉為之者古有水晶淺碟亦可為此惟定窑最多匾坦小碟宜作此用更有竒者墨匣以紫檀烏木豆瓣楠為匣多用古人玊帶花板鑲之亦有舊做長玉螭虎人物嵌者為最有雕紅黑漆匣亦佳蠟斗古人用以灸蠟緘啓銅製頗有佳者皆宋元物也今雖用糊當收以備數筆船有紫檀烏木細鑲竹篾者精甚有以牙玉為之者亦佳此與直方並用不可缺者琴劍琴為書室中雅樂不可一日不對清音居士談古若無古琴新琴亦須壁懸一牀無論能操縱不善操亦當有琴淵明云但得琴中趣何勞絃上音吾輩業琴不在記博惟知琴趣更得其真若亞聖操懷古吟志懷賢也古交行雪窗夜話思尚友也漪蘭陽春鼓之宣暢布和風入松御風行操致凉颸解愠瀟湘水雲鴈過衡陽起我興薄秋穹梅花三弄白雪操逸我神逰𤣥圃樵歌漁歌鳴山水之閒心谷口引扣角歌抱烟霞之雅趣詞賦若歸去來赤壁賦亦可以咏懷寄興清夜月明操弄一二養性修身之道不外是矣豈以絲桐為悅耳計哉自古各物之製莫不有法傳流獨鑄劔之術不載典籍故今無劔客而世少名劔以劔術無傳且刀便于劔所以人知佩刀而不知佩劔也吾輩設此總不能用以禦暴敵强亦可壯懷志勇不得古劔即今之賓劔如雲南製者懸之髙齊俾豐城隱氣化作紫電白虹上燭三台斗垣令熒熒夜光爍彼欃槍彗孛不敢橫熖逞色豈果迂哉香几書室中香几之製有二髙者二尺八寸几面或大理石岐陽瑪瑙等石或以豆瓣楠鑲心或四八角或方或梅花或葵花或慈菰或圎為式或漆或水磨諸木成造者用以閣蒲石或單玩美石或置香櫞盤或置花尊以插多花或單置一爐焚香此髙几也若書案頭所置小几惟倭製佳絶其式一板為面長二尺濶一尺二寸髙三寸餘上嵌金銀片子花鳥四簇樹石几面兩橫設小檔二條用金泥塗之下用四牙四足牙口鏒金銅滚陽線鑲鈐持之甚輕齊中用以陳香爐匙瓶香合或放一二卷冊或置清雅玩具妙甚今吳中製有朱色小几去倭差小式如香案更有紫檀花嵌有假模倭式有以石鑲或大如倭或小盈尺更有五六寸者用以坐烏思藏鏒金佛像佛龕之類或陳精妙古銅官哥絶小爐瓶焚香插花或置三二寸髙天生秀巧山石小盆以供清玩甚快心目書齊清供花草六種入格春時用白定哥窑古龍泉均州鼓盆以泥沙和水種蘭中置竒石一塊夏則以四窰方圎大盆種夜合二株花可四五朵者架以朱几黃萱三二株亦可看玩秋取黃蜜二色菊花以均州大盆或饒州白花圓盆種之或以小古窑盆種三五寸髙菊花一株傍立小石上几冬以四窑方圎盆種短葉水仙單瓣者佳又如美人蕉立以小石佐以靈芝一顆須用長方舊盆始稱六種花草清標雅質疏朗不繁玉立亭亭儼若隱人君子置之几案素艷逼人相對啜天池茗吟本色古詩大快人間障眼外此無多可入清供論香髙子曰古之名香種種稱異若蟬蠶香交趾所貢唐禁中呼為瑞龍腦茵犀香西域獻漢武帝用之煮湯辟癘石葉香魏時題腹國貢狀雲母辟疫百濯香孫亮四姬四氣衣香百濯不落鳳髓香穆宗藏真島焚之崇禮紫述香述異記云又名麝香草都夷香洞冥記云香如棗核食之不飢荼蕪香香出波弋國中侵地則土石皆香辟邪香瑞麟香金鳳香皆異國所貢公主乘出挂玉香囊中則芬馥滿路月支香月支國進如卵燒之辟疫百里焚香九月不散振靈香十洲記云聚窟洲有樹如楓葉香聞數百里返魂香五名香馬精香返生香却死香尸埋地下者聞之即活千畝香述異記云以林名香􅀈齊香出波斯國香氣入藥治百病龜甲香述異云即桂香之善者兜末香本草拾遺曰武帝西王母降燒是香沈光香洞冥記云塗魂國貢燒之有光沈榆香黃帝封禪焚之蘅蕪香李夫人受漢武帝百藴香逺條館祈子焚以降神月麟香元宗愛妾號裒裏春辟寒香焚之可以辟寒龍文香武帝時外國進者千步香南郡所貢薰肌香薰人䏎骨百病不生九和香三洞珠囊曰玉女擎玉爐焚之九真香清水香沈水香皆昭儀所用飛燕香也罽賓國香楊牧席間焚香上如樓臺之狀拘物頭花香拘物頭國進香聞數里升霄靈香唐賜紫尼焚之升遐祗精香出塗魂國焚之鬼魅畏避飛氣香三洞曰真人所燒金磾香金日磾造香薰衣以辟胡氣五枝香燒之十日上徹九重之天千和香峨嵋山孫真人焚之兜樓婆香楞嚴經云浴處焚之其炭猛烈多伽羅香多摩羅跋香釋氏會安曰即根香藿香大象藏香因龍涎而生若燒一丸興大光明味如甘露牛頭旃檀香華嚴經曰從離垢出以塗身羯布羅香西域記云樹如松色如氷雪須曼那華香闍提華香青赤蓮香華樹香果樹香拘鞞陀羅樹香曼陀羅香殊沙華香出法華經明庭香明天發日香出胥池寒國迷迭香出西域焚之去邪必栗香內典云焚去一切惡氣木蜜香焚之辟惡藒車香本草云焚之去蛀辟臭病刀圭第一香昭宗賜崔𦙍一粒焚終日旖旎乾􅨋香江西山中所出曲水香香盤印文似曲水像鷹嘴香番牙與舶主贈香焚之辟疫乳頭香曹務光理趙州用盆焚云財易得佛難求助情香明皇寵妃含香一粒助情發興筋力不倦夜酣香迷樓所焚水盤香出舶上上刻山水佛像都梁香荆州記云都梁山上有水水中生之雀頭香荆襄人謂之莎草根龍鱗香馢香之薄者其香尤勝白眼香和香為之平等香僧人貨香于市無貴賤貧富皆一價也故云山水香王旭奉道士于山中月給焚香謂之山水香三勻香三物煎成焚之有富貴氣香亦清妙伴月香徐鉉月夜露坐焚之故名此皆載之史冊而或出外夷或製自宫掖其方其料俱不可得見矣余以今之所尚香品評之妙髙香生香檀香降真香京線香香之幽閒者也蘭香速香沈香香之恬雅者也越鄰香甜香萬春香黑龍挂香香之溫潤者也黃香餅芙蓉香龍涎餅內香餅香之佳麗者也玉華香龍樓香撒􅀈蘭香香之藴藉者也伽楠香唵叭香波律香香之髙尚者也幽閒者物外髙隱坐語道德焚之可以清心悅神恬雅者四更殘月興味蕭騷焚之可以暢懷舒嘯溫潤者晴窗搨帖揮麈閒吟篝燈夜讀焚以逺辟睡魔謂古伴月可也佳麗者紅袖在側密語談私執手擁爐焚以薰心熱意謂古助情可也藴藉者坐雨閉關午睡初足就案學書啜茗味淡一爐初爇香靄馥馥撩人更宜醉筵醒客髙尚者皓月清宵氷絃戞指長嘯空樓蒼山極目未殘爐爇香霧隱隱繞簾又可袪邪辟穢黃暖閣黑暖閣官香紗帽香俱宜爇之佛爐聚仙香百花香蒼术香河南黑藝香俱可焚於卧榻客曰諸香同一焚也何事多岐余曰幽趣各有分别薰燎豈容槩施香僻甄藻豈君所知悟入香妙嗅辨妍媸曰余同心當自得之一笑而解焚香七要香爐官哥定窑豈可用之平日爐以宣銅潘銅彞爐乳爐如茶杯式大者終日可用香合用剔紅蔗段錫胎者以盛黃黑香餅法製香磁盒用定窑或饒窑者以盛芙蓉萬春甜香倭香合三子五子者用以盛沈速蘭香棋楠等香外此香撞亦可若遊行惟倭撞帶之甚佳爐灰以紙錢灰一斗加石灰二升水和成團入大竈中燒紅取出又研絶細入爐用之則火不滅忌以雜火惡炭入灰炭雜則灰死不靈入火一蓋即滅有好竒者用茄蒂燒灰等說太過香炭墼以雞骨炭碾為末入葵葉或葵花少加糯米粥湯和之以大小鐵塑槌擊成餅以堅為貴燒之可久或以紅花渣代葵花葉或爛棗入石灰和炭造者亦妙隔火砂片燒香取味不在取烟香烟若烈則香味漫然頃刻而滅取味則味幽香馥可久不散須用隔火有以銀錢明瓦片為之者俱俗不佳且熱甚不能隔火雖用玉片為美亦不及京師燒破砂鍋底用以磨片厚半分隔火焚香妙絶燒透炭墼入爐以爐灰撥開僅埋其半不可便以灰擁炭火先以生香焚之謂之發香欲其炭墼因香爇不滅故耳香焚成火方以箸埋炭墼四面攢擁上蓋以灰厚五分以火之大小消息灰上加片片上加香則香味隱隱而發然須以筯四圍直搠數十眼以通火氣周轉炭方不滅香味烈則火大矣又須取起砂片加灰再焚其香盡餘塊用瓦合收起可投入火盆中薰焙衣被靈灰爐灰終日焚之則靈若十日不用則灰潤如遇梅月則灰濕而滅火先須以别炭入爐暖灰一二次方入香炭墼則火在灰中不滅可久匙筯匙筯惟南都白銅製者適用製佳瓶用吳中近製短頸細孔者插筯下重不仆似得用耳余齊中有古銅雙耳小壺用之為瓶甚有受用磁者如官哥定窑雖多而日用不宜香方髙子曰余録香方惟取適用近日都中所尚鑒家稱為竒品者録之製合之法貴得料精則香馥而味有餘韻識臭味者知所擇焉可也玉華香方沉香四兩速香黑色者四兩檀香四兩乳香二兩木香一兩丁香一兩唵叭香三兩郎胎六錢麝香三錢氷片三錢大黃五錢廣排草三兩趾者妙出交蘇合油五錢官桂五錢黃烟即金顔香二兩廣陵香用葉一兩右以香料為末和入合油揉勻加煉好蜜再和如濕泥入磁瓶錫蓋蠟封口固燒用二分一次聚仙香黃檀香一斤排草十二兩沈速香各六兩丁香四兩乳香四兩另研郎胎三兩黃烟六兩另研合油八兩麝香二兩欖油一斤白芨麵十二兩蜜一斤已上作末為骨先和上竹心子作第一層趂濕又滚檀香二斤排草八兩沈香各半斤為末作滚第二層成香紗篩晾乾都中自製每香萬枝工銀二錢竹棍萬枝銀一錢二分香袋紫龍刀紙每百足數五錢沈速香方