急失宜起伏無節知聲而不知音運指而不運意奚取彈為有等務尚花巧急驟誇竒逞髙不求法度準繩之中有敷暢悠揚之妙操多散聲以類箜篌巧取按聲以同筝阮大失雅音重可笑耳孰知散按間出清以泛聲謂得中道今之俗彈轉易不常變朴為澆求異于人不知法古是為抱琵琶而同伶人豈古聖賢所謂修身養性理其天真意哉臞仙琴壇十友氷絃玉軫軫函玉足絨刷琴薦錦囊琴牀琴匣替指以鶴翎造火烙為之五音十二律應絃合調立成絃一二三四五六七黃鐘律黃太姑林南黃大清清音宫商角徴羽少少宫商右調絃按徽以五音調法慢三即慢角調也黃清云者黃鍾之輕清音也如少宫少商之意後例此絃一二三四五六七大吕律太夾仲夷無大夾清清音宫商角徴羽少宫少商右調按絃徽同黃鍾絃一二三四五六七太簇律太姑蕤南應太姑清清音宫商角徴羽少少宫商右調按絃徽同黃鍾絃一二三四五六七夾鍾律黃夾仲林無黃夾清清音宫商角徴羽少少宫商右絃以十徽應四緊七應散二緊五以十徽應七緊三以十徽應五即今之清商調也絃一二三四五六七姑洗律太姑蕤夷應太姑清清音羽宫商角徴少少羽宫右調按同夾鍾絃一二三四五六七仲吕律黃太仲林南黃太清清音徴羽宫商角少少徴角右按調即今五音調法絃一二三四五六七蕤賓律太夾蕤夷無太夾清清音徴羽宫商角少少徴羽右按調同仲吕絃一二三四五六七林鍾律太姑林南應太姑清清音徴羽宫商角少少徴羽右調按同仲吕絃一二三四五六七夷則律黃夾仲夷無黃夾清清音角徴羽宫商少少角徴右以夾鍾絃緊四以十應二即今慢宫調也絃一二三四五六七南吕律太姑蕤南應太姑清清音角徴羽宫商少少角徴右調按徽同夷則絃一二三四五六七無射律黃太仲林無黃太清清音商角徴羽宫少少商角右以仲吕絃加緊五以十一徽應七即今蕤賔調也蕤賔自有正律以無射為蕤賔俗名也絃一二三四五六七應鍾律太夾蕤夷應太夾清清音商角徴羽宫少少商角右調按同無射律有八十四調琴該正調六十變音二十四是以按絃取聲不可立調古琴新琴之辨髙子曰琴惟仲尼列子二式為古製餘皆後世式樣凡觀古琴先觀漆水漆光退盡儼若烏玉按之堅瑩如氷上發斷紋肖梅花紋者為最牛毛紋者次之蛇腹紋者為下品也且易僞為僞法以火逼熱以雪罨上隨􅀈成裂儼如蛇腹寸許相去一條或以雞子清入灰作琴用甑蒸之懸於風日燥處亦能斷紋少細又僞作牛毛斷者以數針劃絲復以髮磨然僞者以手摩之裂紋有痕真者有紋可見而拂之則無次觀合縫無隙不散斷紋過肩此漆灰琴也若上下有紋兩傍光漆者此開而復合重漆補者此料灰琴也似非全玩次觀琴材以桐面梓底者為上純桐者次之桐面杉底者又次之琴取桐為陽木梓為隂木木用隂陽取其相配以召和也然古人純用桐木之意亦取桐之陽面為面隂面為底以分隂陽恐梓性紐烈不用為底故以桐木向日者沈之水中其陽面向上背隂者向下陽浮隂沈反復不易取上為陽為面用下為隂為底是亦法隂陽也故琴有陽材者旦濁而暮清晴濁而雨清隂材者旦清而暮濁晴清而雨濁也次取九德一曰竒輕鬆脆滑是也輕謂材輕鬆謂聲透脆謂聲之清美老桐木也滑謂聲之澤潤近水材也二曰古淳淡中有金石韻也三曰透年雖久逺膠漆不敗清亮而不咽塞四曰靜謂無㪇颯以亂正聲五曰潤謂發聲不燥韻長不絶六曰圎謂聲韻渾然而不破散七曰清謂聲如風中鐸也八曰勻謂七絃無三實四虛之病九曰芳謂愈彈愈發久無乏聲此九德也外此又須左不按浮右不抗指音清不空音實不洪面無撲㪇身無重􅀈伏手可彈落指音發此美琴也雖售髙資亦不可捨近有銅琴石琴以紫檀烏木為琴者皆失琴㫖雖美何取毛詩云椅桐梓漆爰伐琴瑟其意何居又如百衲琴者亦近製也偶得美材短不堪用因而裁成片用膠漆綴長非好竒也今倣製者以龜紋錦片錯以玳瑁象牙香料雜木嵌骨為紋鋪滿琴體名曰寶琴與廣中滇南蜔嵌琵琶何異更可笑也求古不得如我明髙騰朱致逺惠桐岡祝公望諸家造琴中有精美可操纎毫無病者奈何百十之中始得一二若祝海鶴之琴取材斫法用漆審音無一不善更是漆色黑瑩逺不可及其取蕉葉為琴之式製自祝始余得其一寶惜不置終日操弄聲之清亮伏手得音莫可逾美何異古琴且價今重矣真者近亦難得琴譜取正琴師之善者傳琴傳譜而書譜之法在琴師亦有訛者一畫之失指法即左以訛傳訛久不可正琴調遂失真矣故琴非譜不傳譜非真反失其傳也近世以寧藩神竒祕譜為最然須得初刻大本臞仙命工挍訂㸃畫不訛是為善譜可寶若翻刻本不足觀矣又立風宣琴譜亦可外此何止數十家刻譜無不訛者余自燕中得故家琴譜抄録精細調法俱善欲刻未得若欲求譜勾剔字法全備并手勢形像飛動在臞仙所刻太古遺音一書最為精到奈坊中僅存翻本使人恨不多見臞仙留心音律無不窮竒索隱若詞曲之太和正音譜按律正腔知音孰能過之宜乎琴譜之精莫之與並也琴窗雜說彈琴取古郭公磚上有象眼花紋方勝花紋出自河南鄭州者佳用鑲琴臺長過琴一尺髙一尺八寸濶容三琴以堅漆塗之彈琴於上其聲冷冷可愛或以瑪瑙石南陽石永石鑲者亦佳古琴無聲者以布囊炒熱砂罨之冷即又換或以甑蒸之令汗出透懸當風處吹乾其聲如舊琴無新舊宜置卧牀內以近人氣為佳琴絃久而不鳴者綳定以桑葉捋之鳴亮如初蓄琴不論寒暑不可挂風露并日色中可於屋內不近墻壁暖處懸之則聲不澀滯琴無變病唐有雷張越三家製琴擅名其龍池鳳沼有舷餘處悉窪令關聲不散宋有琴局製有定式謂之官琴餘悉野斫後以京中樊氏路氏琴為第一余在都中見一琴臺以錫為池於臺中置水蓄魚上以水晶板為面其魚戲水藻儼若出聽誠為世所稀有其價亦髙余一見後不知何去令人念之耿耿天下竒貨信不易得挂琴不可近墻并泥壁之處恐惹濕潤則琴不發聲惟宜近紙格板壁當風透氣處挂之加以囊盛以逺塵垢入匣則不用囊梅月須先將琴入匣中鎖閉以紙糊口不令濕黴著琴琴匣之製亦貴窄小止可容琴不使有空搖動為佳抱琴當語僮僕勿令橫抱恐觸物傷損護軫焦尾直抱頭上尾下無失露下彈琴不可久坐不惟潤絃抑且傷人且陽材鼓之有聲隂材則無聲矣彈琴須先盥手手潔則絃不受汚夏月惟宜早午後則不可非惟汗溽恐太燥脆絃焚香鼓琴惟宜香清烟細如水沈生香之類則馥馥韻雅若他合和艷香不入琴供對月鼓琴須在二更人靜萬籟無聲始佳對花宜共巖桂江梅茉莉薝蔔建蘭夜合玉蘭等花香清色素者為雅臨水彈琴須對軒窗池沼荷香撲人或竹邊林下清漪芳沚俾微風灑然遊魚出聽自多塵外風致琴用金徽玉軫不為之華然玉軫有花則易轉素不受汚若用紫檀犀角者可避損失然金徽每為琴災不若瑩白螺甸者燈前月下取音了然觀亦不俗若橫之膝上對月則光彩射目似更宜人膝上鼓琴惟純熟小操則可否亦不能養鶴要略髙子曰鶴仙禽也於物為多夀感於陽故鳴於子雄則聲聞數里雌則聲下而不揚華亭下沙之鶴蓋自海東飛集於下沙非華産也相鶴但取標格竒古唳聲清越頸欲細而長足欲瘦而節身欲人立背欲聳削聲雄則類鸛鶩頸肥則類鵝雁矣觀其隆鼻短口則少眠髙腳疏節則多力頂若朱紅則善鳴眼露赤色則視逺回翎亞膺則體輕龜背鱉腹則善産鳳翼雀尾則善飛輕前重後則善舞洪髀纎指則善步蓄之者可以共清髙助清興當居以茅庵鄰以池沼飼以魚榖鰍鱔勿以熟食飽其腸胃使乏精采而塵倦仙骨欲教以舞俟其饑餒置食於空野使童子拊掌歡顛搖手起足以誘之彼則奮翼而唳逸足而舞矣習之既熟一聞拊掌即便起舞謂之食化空林别墅何可一日無此忘饑清友聞鶴糞可以化石成灰鶴有長水石自隨故能蓄魚於溝瀆不涸且能千年一變蒼色再變黃𤣥百年之后則脫硬羽而生柔毛色白鮮潔真異類也而青松白石之下更宜此君遵生八箋卷十五
