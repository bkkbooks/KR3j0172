  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0172_WYG_004-1a, image: WYG0871/WYG0871-0416a.png}
body:
  text: 遵生八箋卷四明髙濂撰四時調攝箋下夏四月調攝總類禮記曰南方曰夏夏之為言假也養之長之假之仁也太𤣥經曰夏者物之修長也董仲舒曰陽長居大夏以生育萬物淮南子曰夏為衡衡以平物使之均也漢律志曰南者任也陽氣于時任養萬物故君子當因時節宣調攝以衛其生養旺立秋君休立夏火相夏至火旺立秋火休秋分火廢立冬火囚冬至火死立春火歿春分火胎言火孕於木之中矣􅋯仙月占主病四月立夏日忌北風主歿五月夏至忌東風主病行秋令主多疫六月行秋令主多女灾心臟夏旺論心屬南方火為赤帝神形如朱雀象如倒懸蓮蕊心者纎也所納纎微無不貫注變水為血也重十二兩居肺下肝上對尾鳩下一寸注曰胸中心日掩下尾鳩也色如縞映絳中有七孔三毛上智之人心孔通明中智之人五孔心穴通氣下智無孔氣明不通無智狡詐心為肝子為脾母舌為之宫闕竅通耳左耳為丙右耳為丁液為汗腎邪入心則汗溢其味苦小腸為心之腑與心合黃庭經曰心部之宅蓮含花下有童子丹元家主適寒熱榮衛和丹錦緋囊披玉羅其聲徵其嗅燋故人有不暢事心即燋燥心氣通則知五味心病則舌燋捲而短不知五味也其性禮其情樂人年六十心氣衰弱言多錯忘心脈出於中衝生之本神之處也主明運用心合于脈其色榮也血脈虛少不能於臟腑者心先死也心合辰之己午外應南嶽上通熒惑之精故心風者舌縮不能言也血壅者心驚也舌無味者心虛也善忘者心神離也重語者心亂也多悲者心傷也好食苦者心不足也面青黑者心氣冷也容色鮮好紅活有光心無病也肺邪入心則多言心通微心有疾當用呵呵者出心之邪氣也故夏三月欲安其神者則含忠履孝輔義安仁定息火熾澄和心神外絶聲色內薄滋味可以居髙朗逺眺望早卧早起無厭於日順於正陽以消暑氣逆之則腎心相爭火水相尅火病繇此而作矣相心臟病法心熱者色赤而脈溢口中生瘡腐爛作臭胸膈肩背兩脅兩臂皆痛心虛則心腹相引而痛或夢刀杖火焰赤衣紅色之物爐冶之事以恍怖人心病欲濡急食鹹以濡之用苦以補之甘以瀉之禁濕衣熱食心惡熱及水心病當臍上有動脈按之牢若痛更苦煩煎手足心熱口乾舌強咽喉痛咽不下忘前失後宜服五參丸秦芄七錢人參七錢丹參七錢𤣥參一兩乾薑三錢沙參四錢酸棗仁七錢右為末蜜丸空心人參湯服三四十丸日再服修養心臟法當以四月五月弦朔清旦面南端坐叩齒九通潄玉泉三次靜思注想吸離宫赤氣入口三吞之閉氣三十息以補呵氣之損六氣治心法治心臟用呵以鼻漸長引氣以口呵之皆調氣如上勿令自耳聞之若心有病大呵三遍呵時以手交乂乘起頂上為之去心家勞熱一切煩悶疾愈即止過度即損亦須以呼字吸旺氣以補之黃帝製夏季所服竒方黃帝曰夏三月服何藥岐伯曰以補腎茯苓丸能治男子內虛不能飲食健忘悲憂不樂喜怒無常四肢浮腫小便赤黃精濁淋漓絞痛膀胱冷痛隂囊濕癢口渴飲水腹脹皆犯五勞七傷宜服此方茯苓五錢食不消加一錢杜仲五錢腰痛加一錢山茱萸四錢濕癢加五分附子二錢有風加五分牡丹皮四錢腹中逰風加一錢澤瀉三錢水氣加五分桂三錢顔色不榮加五分山藥五錢頭風加一錢地黃四錢秋冬加一錢細辛二錢目昏加一錢石斛四錢隂濕加一錢蓯蓉三錢痿黃加五分生薑二錢右一十三味共為末煉蜜為丸如桐子大每服七丸日再服忌房事生冷猪魚等食心臟導引法可正坐兩手作拳用力左右互築各五六度又以一手向上拓空如擎石米之重左右更手行之又以兩手交乂以腳踏手中各五六度閉氣為之去心胸風邪諸疾行之良久閉目三咽津叩齒三通而止夏季攝生消息論夏三月屬火主於長養心氣火旺味屬苦火能尅金金屬肺肺主辛當夏飲食之味宜減苦增辛以養肺心氣當呵以疏之噓以順之三伏內腹中常冷特忌下利恐泄隂氣故不宜針炙惟宜發汗夏至後主土一隂生宜服熱物兼服補腎湯藥夏季心旺腎衰雖大熱不宜喫冷陶氷雪蜜水凉粉冷粥飽腹受寒必起霍亂莫食瓜茄生菜原腹中方受隂氣食此凝滯之物多為積塊若患冷氣痰火之人切宜忌之老人尤當慎護平居簷下過廊弄堂破忩皆不可納凉此等所在雖凉賊風中人最暴惟宜虛堂净室水亭木隂潔淨空厰之處自然清凉更宜調息净心常如氷雪在心炎熱亦於吾心少减不可以熱為熱更生熱矣每日宜進溫補平順丸散飲食溫暖不令大飽常常進之宜桂湯豆蔲熟水其於肥膩當戒不得在星月下露坐兼便睡著使人扇風取凉一時雖快風入皮毛其患最深貪凉兼汗身當風而卧多風疾手足不仁語言蹇澀四肢癱瘓雖不人人如此亦有當時中者亦有不便中者其說何也逢年嵗方壯遇月之滿得時之和即幸而免至後還發若或年力衰邁值月之虧失時之和無不中者頭為諸陽之總尤不可風卧處宜密防小隙微孔以傷其腦户夏三日每日梳頭一二百下不得梳著頭皮當在無風處梳之自然除風明目矣養生論曰夏謂蕃秀天地氣交萬物華實夜卧蚤起無厭於日使志無怒使華成實使氣得泄此夏氣之應長養之道也逆之則傷心秋發痎瘧奉收者少冬至病重又曰夏氣熱宜食菽以寒之不可一于熱也禁飲溫湯禁食過飽禁濕地卧并穿濕衣夏三月闕己戊申巳闕丑未辰日宜煉丹藥夏三月頭卧宜向南方吉夏三月六氣一十闕皆正長養之令勿起土伐大樹千金方曰夏七十二日省苦增辛以養肺氣內經曰夏季不可枕冷石并鐵物取凉大損人目陶隱居曰氷水止可浸物使驅日曬暑氣不可作水服入腹內冷熱相摶成疾若多著飴糖拌食以解酷暑亦可書曰夏至後秋分前忌食肥膩餅臛油酥之屬此等物與酒漿瓜果極為相妨夏月多疾以此又曰夏勿露卧令人皮膚成癬或作面瘋又曰夏傷暑熱秋必痎瘧忽遇大寒當急防避人多率受時病由此而生參贊書曰日色曬熱石上凳上不可便坐搐熱生豚瘡冷生疝氣人自大日色中熱處曬回不可冷水洗面損目伏熱在身勿得飲冷水及以冷物激身能殺人書云五六月深山澗中停水多有魚鱉精涎在內飲之成瘕養生論曰夏日不宜大醉清晨喫炒葱頭酒一二杯令人血氣通暢又曰風毒腳氣因腎虛而得人生命門屬腎夏月精化為水腎方衰絶故不宜房色過度以傷元氣金匱要略曰夏三月不可食猪心恐死氣犯我靈臺耳宜食苦蕒以益心千金異方曰夏三月丙丁日忌夫婦容止養生論曰夏月宜用五枝湯洗浴浴訖以香粉傅身能驅瘴毒疏風氣滋血脉且免汗濕隂處使皮膚燥癢五枝湯方桑枝槐枝桃枝栁枝各一握麻葉半斤煎湯一桶去滓溫洗一日一次傅身香粉方用粟米作粉一斤無粟米以葛粉代之加青木香麻黃根香附子炒甘松藿香零陵香已上各二兩搗羅為末和粉拌勻作稀絹袋盛之浴後撲身夏三月合用藥方豆蔲散治夏月多冷氣發動胸膈氣滯噎塞脾胃不和不思飲食服草豆蔲四兩同生薑四兩炒香黃為度去薑用大麥芽十兩炒黃神麯四兩炒黃甘草四兩炙乾薑炮兩右為末每服一錢如㸃茶喫不計時服蓯蓉丸平補下元明目妙甚蓯蓉四兩酒洗去心內白汁巴㦸二兩菊花二兩枸杞二兩右煉蜜為丸桐子大每服二十丸鹽湯下訶子散脾胃忽生冷氣腹脹滿疼悶泄瀉不止訶子皮五箇大腹五箇去外皮甘草五錢炙白术五錢炒草豆蔲十四箇麯包炒黃去麯用人參五錢右為末每服二錢水一盞入棗二箇生薑一一小片同煎至六分溫服稜术散夏日因食冷物氣積膈滯或心腹疼痛等症宜常服之用京三稜三兩濕紙裹煨熱透另搗莪术三兩同上製烏藥三兩去皮甘草三兩炙陳皮二兩用厚朴亦可右為末每服一錢鹽湯調下不拘時服四順丸老人百疾神麯四兩入生薑二兩去皮一處杵作餅子焙乾甘草一兩炙黃草豆蔲一兩五錢先炮熟去皮細銼用大麥芽二兩炒黃右為末鹽湯服一錢橘紅散夏月消食和氣廣陳皮用一斤湯浸洗五七次布包壓乾又用生薑半斤取自然汁將皮拌勻一宿焙乾一斤肉豆蔲一兩甘草二兩右將甘草同白鹽三四兩同炒候鹽紅色草赤色為度共橘皮為末用茶㸃服一錢一次太上用後玉經八方巽卦東南龜臺王母四童散方辰砂四兩本方原用伏火丹砂六兩一時難得且未當輕用胡麻四兩淨九蒸九曝炒微黃天門冬四兩去心茯苓六兩白术四兩黃精六兩桃仁四兩去皮右七味合為末煉蜜為丸搗萬餘下夏月丸服餘月散服如桐子大每二十丸能服八年顔如嬰童肌如凝脂不可漫傳以獲天譴離卦正南彭君麋角粉方每用麋角注曰麋鹿之大者角丫乂不齊白如象牙出水澤中非山獸也大者二十斤一副生海邊取用一兩具解為寸假去心中黑血色惡物用米泔浸之夏三日冬十日一換泔浸約一月已上似欲軟即取出入甑中蒸之覆以桑白皮候爛如蒸芋晒乾粉之入伏火硫黃一兩以酒調三錢一服此方彭祖服之得夀成仙有人於鵠鳴山石洞中得石刻方與此同也夏四月事宜孝經緯曰榖雨後十五日斗指巽為立夏物至此時皆假大也後十五日斗指已為小滿小滿者言物長於此小得盈滿也律名中吕白虎通曰中吕何言陽氣極捋彼故復中難之也晉志曰吕者助也隂助成陽之功也四月建己巳者起也物至於此畢盡而起也西京雜記曰陽德用事和氣皆陽為正陽之月又曰陽雖用事而陽不獨存純陽凝於無隂亦謂之曰隂月文選稱為除月又曰首夏維夏是月也盛德在火天道西行作事出行宜向西吉是月每清晨喫葱頭酒一二杯令血氣通暢四月丁巳宜祀竈十六日天倉開宜入山修道收書於未梅雨時開閣厨晾燥隨即閉門內放七里香花或樟腦不生蠧魚收畫未梅雨前逐幅抹去蒸痕日中晒晾令燥緊捲入匣以厚紙糊匣口四圍梅後方開匣須杉木桫木為之內不用紙糊并油漆以辟黴氣辟蚊方用鮫魚晒乾於室中燒之可少解其橫是月伐木不蛀月令纂曰是月於魚池中納一神守則魚不走養鯉善飛尤為緊要神守即今之團魚也馮氏口談曰戎衣同花椒捲收或芫花末摻之則不蛀一用出缸藍布包之亦妙風領暖耳包藏瓮中密封瓮口毛决不脫月録曰洗葛衣用梅葉揉碎洗之經夏不脆忌用木盆則黑以磁器洗之內景經曰是月食蓴菜鯽魚作羮開胃靈寶經曰是月八日宜修啓夀齊是月初二十六十八十九日拔白生黑雲笈七籖曰木瓜善治轉筋病者不必服此但口呼木瓜二字其病即瘥月令纂曰是月初四日七日八日九日取枸杞煎湯沐浴令人不老肌膚光澤雲笈七籖曰是月望後宜食桑椹酒治風熱之疾亦可是月採桑椹取汁三斗白蜜四兩酥油二兩生薑汁二兩以罐先盛椹汁重湯煮汁到三升方入蜜酥薑汁再加鹽三錢又煮如膏磁器收貯每服一小杯酒服大治百種風疾千金月令曰四月節內宜服暖宜食羊腎粥其洗去以絲子一兩研煮取汁一兩濾淨和麵切煮將羊腎一具切條葱炒作臛食之補腎療眼暗赤腫此月宜晚卧早起感受天地之精氣令人長夀月令曰四月十五日取浮萍一兩麻黃去根桂心附子炮去臍皮各五錢搗為末每用一兩藥末入生薑二片葱頭二箇煎至八分熱服蓋暖取汗治時行熱病四月事忌攝生月令曰四月為乾生氣在卯死氣在酉不宜用已日時犯月建百事不吉又曰初九二十五忌裁製交易白雲雜忌曰是月勿食雉令人氣逆勿食鱔能害人金方曰勿令韭菜同雞肉食暴死者尤不可食作內疽生胸臆中勿食諸物之心勿大醉勿食葫傷人神損膽氣令人喘悸脅肋氣急勿食生蒜傷人更禁男女同房忌純隂用事葫即葫荽也雲笈七籖曰是月八日不宜逺行宜清心齊沐必得福慶又曰是月忌暴怒傷心秋必為瘧自夏至至九月忌食隔宿肉菜之物忌用宿水洗面潄口孫真人曰是月初五日忌見一切生血勿食生菜初八日十六日忌嗜欲犯之夭夀楊公忌曰是月初七日不宜問疾四月修養法孟夏之月天地始交萬物並秀宜夜卧早起以受清明之氣勿大怒大泄夏者火也位南方其聲呼其液汗故怒與泄為傷元氣也卦值乾乾者健也陽之性天之象也君子以自強不息生氣在卯坐卧行功宜向正東方孫真人曰是月肝藏已病心臟漸壯宜增酸减苦以補腎助肝調養胃氣勿受西北二方暴風勿接隂以壯腎水當靜養以息心火勿與淫接以寧其神以自強不息天地化生之機靈劍子曰補心臟坐功之法有二一勢正坐斜身用力偏敵如排山勢極力為之能去腰脊風冷宜通五臟六腑散腳氣補心益氣左右以此一勢行之二勢以一手按䏶一手向上極力如托石閉氣行之左右同行去兩脅間風毒治心臟通和血脈月令曰君子齊戒處必掩身毋躁止聲色毋進御薄滋味毋違和節嗜欲定心氣內丹祕要曰姤月為一隂始生之月也隂氣方生喻身中陰符起縮之地靈丹養成入口中當馴致其道遂歸丹田不可荒忙急速保生心鑑曰五月屬火午火大旺則金氣受傷古人于是時獨宿淡味兢兢業業保養生臟正嫌火之旺耳五月事宜孝經緯曰小滿後十五日斗指丙為芒種後十五日斗指午為夏至曰芒種者言有芒之榖可播種也夏至者言萬物于此假大而極至也白虎通曰律㽔賔㽔者下也賔者敬也言一隂始生萎蘼陽不資以為用如賔在外而不為內至也樂志曰辰為午午者長也大也言物皆長大也吳子夜四時歌曰是月為鬱蒸為仲暑東坡詩曰雲飛龍御月𤣥樞經曰是月天道西北行作事出行俱宜向西北吉荆楚記曰五日以艾縳一人形懸于門户上以辟邪氣以五綵絲繫於臂上辟兵厭鬼且能令人不染瘟疾口內常稱游光厲鬼四字知其名則鬼逺辟雲笈七籖曰五月并十二月晦日正月中常宜焚燒殺鬼丹方鬼箭蜈蚣牛黃野葛雄黃雌黃硃砂䔧蘆鬼比目桃仁烏頭附子半夏硫黃巴豆犀角鬼臼麝香白术蒼术各等分共二十味為末用菵草汁為丸否用糊汁亦可如雞子大每焚一丸百邪皆滅道藏靈寶辟瘟丹方蒼术一斤降香四兩雄黃二兩硃砂二兩硫黃一兩硝石一兩柏葉八兩菖蒲根四兩丹參三兩桂皮二兩藿香二兩白芷四兩桃頭四兩五月五日午時收雄狐糞二兩蘄艾四兩商陸根二兩大黃二兩羌活二兩獨活二兩雌黃一兩赤小豆二兩仙茅二兩唵叭香無亦可免已上二十四味按二十四氣為末米糊為丸如彈子大火上焚燒一丸太倉公辟瘟丹方太倉公乃齊之神醫淳于意也凡官舍旅館久無人到積濕積邪容易侵人製此爇之可以逺此宜于五六月終日焚之可以辟瘟逺邪蒼术一斤台芎八兩黃連八兩白术八兩羌活半斤川芎四兩草烏四兩細辛四兩柴胡四兩防風四兩獨活四兩甘草四兩藁本四兩白芷四兩香附子四兩當歸四兩荆芥四兩天麻四兩官桂四兩甘松四兩乾薑四兩三奈四兩麻黃四牙兩皂四兩芍藥四兩麝香三分右為末煮紅棗肉為丸如彈子大每用一丸焚燒千金月令曰是月取浮萍隂乾和雄黃些少燒烟去蚊火燒棗子安床下辟狗蚤纂要曰五月五日採艾治百病瑣碎録曰五日硃砂寫荼字倒貼辟蛇蝎寫白字倒貼柱上辟蚊蟲寫儀方二字倒貼亦妙又曰午時將燈草浸油內望太陽咒曰天上金雞喫蚊子腦髓液念七遍吸太陽氣吹於燈草上夜㸃燈草照蚊俱去吕公曰五日午時韭菜地上面東不語取蚯蚓泥藏之即蚯蚓糞也圓如碎珠粒粒成塊即此物也遇魚骨鯁喉用此少許擦咽喉外皮即消廣惠方曰五日取晚蠶蛾􅑽一節竹筒內開眼處封貯待其乾死遇竹木刺傷者以些少塗之即出更有别用如此方可收得雜記曰以青蒿草搗汁和石灰作餅子隂乾收起遇刀斧傷者塗之立效愈後無痕又一方採百草頭搗汁和石灰作塊子鑿大桑樹上一孔納灰餅在內待百日後取出曝乾為末傅金瘡神效五月五日宜合紫金錠保生錠子治小兒疾方在醫書録內府此日用雄黃研末少加硃砂收真蟾酥作杵隂乾凡遇惡毒初起以唾磨搽微痛立消瑣碎録曰五日取鱉爪著衣領中令人不忘千金方曰五日日未出時取東向桃枝刻作小人形著衣領中令人不忘養生雜忌曰病目者以紅絹盛榴花拭目棄之謂代其病凡紅物俱可又云五日取蒿苣菜原窠或葉置厨匱內不生蛀蟲置毛褐衣內亦妙千金方云五日取葵子微炒為末患淋者食前溫酒服一錢立愈又云取鯉魚枕骨燒灰治久痢如神雲笈七籖曰五月一日取枸杞煎湯沐浴令人不老不病五日以蘭湯沐浴亦可初四初七初八日沐浴吉𤣥樞經曰初九日沐浴令人長命髙子曰五月五日午時修合藥餌者以天罡此時正塞鬼户斗柄訣以月月嘗加戌五月每日戌時天罡指午亥時指未自未輪轉五日午時正指艮宫為鬼户也故用此時合藥甚效又為天中之節養生論曰五月五日宜合截瘧鬼哭丹用上好白砒五錢研細入鐵銚內以寒水石一兩為末圍定然後以磁碗蓋定用白紙作條封碗合縫炭火炙銚烟出燻紙條黃色即上取放紙上置泥地出火氣一時取研為細末入氷片一分麝香一分共研蒸餅為丸桐子大硃砂為衣每服一丸臨蒸日神前香爐上燻過朝北井花水吞下忌食魚麵生冷十日永不再發合時不令婦女孝服人見婦人有病令丈夫捻入口中吞下立效又不泄瀉真妙劑也簡易方曰用獨蒲蒜同真飛丹搗和為丸圓眼大治瘧臨發用一丸井花水面東吞服即愈保生月録曰是月十一日天倉開宜入山修道簡易方曰疫氣時行用管仲置水缸內食水不染十二月除夕同此本草云五日取露草百種隂乾燒為灰以井水煉成膏再用嚴醋和為餅子腋下挾之乾即換去五遍能治腋下臭氣又能抽出一身中瘡積毒氣挾完即以小便洗腋下乾淨最效牧民方曰中風牙緊不能下藥用氷片天南星五日午時合起遇病以指蘸藥擦大牙左右二十三擦口自能開方下别藥治之長生要録曰五月五日有雨急破竹一二株內有神水瀝和獺肝為丸治心腹積聚又曰是日取葛根為末療金瘡斷血除瘧取猪牙燒灰治小兒驚癎并塗蛇傷又云取蝙蝠倒挂晒乾和官桂薰陸香燒之辟蚊家孰事親曰己丑卯辰日祀灶以猪首吉五月朔日不宜出錢財萬氏家抄曰五日取蝦蟆晒乾收起紙包紅絹袋盛瘧發早男左女右臂上挂幫勿令知之立愈禮儀志曰夏至浚井能改水朱索縳栁杞桃結印為門户飾可止惡氣十三日竹醉日可移竹易活夏至淘并可去瘟疫五月五日取塜上泥并磚石一塊回家以小瓶盛埋門外階下合家不患時症抱朴子曰五日硃書赤靈符著心前辟兵袪瘟去百病此即治百病符也正月元日佩即此符本草云五日採莧菜加馬齒莧為末等分産婦服之易産雲笈七籖曰五日不可見血物傳濟方曰五日午時或臘月三十日收猪心血同黃丹乳香相和為丸雞豆大以紅絹盛掛門上如有産婦子死腹中者令酒磨一丸即下五月取桃仁一百箇去皮尖研細入黃丹二錢丸如桐子大治瘧發日面北用溫酒或井花水吞下三丸即絶合忌婦女雞犬見之瑣碎録五日清晨取白礬一塊自早晒至晚收之百蟲咬傷以些少塗之即止又能消毒取獨蒜不分瓣蒜也搗爛塗面皮手腳一年不生惡瘡及冬月不作凍瘡神驗不可多擦衛生方云五日取百草頭晒乾為細末用紙包收起臨用取一撮白紙封好用紅布絹拴定令患瘧人以眼案臂面北男左女右繫臂上股勿令病人知為何物極有應驗又曰五日採蜀葵花赤白二色收起陰乾赤者治婦人赤帶白治白帶又曰取雞腸草隂乾燒灰治積年惡瘡極效採無花果隂乾治咽喉諸疾雲笈七籖曰五日午時取天落水磨硃寫一龍字明年若又雨取水磨墨寫一龍字如錢大二字合作一小丸婦人難産乳香湯吞之生出男左女右手中握字丸即下如次年無雨前字無用矣每年須寫百字以濟人本草圖經曰五月收杏去核自朝蒸之至午而止以微火烘之收貯少加糖霜可食駐顔故有杏金丹之說不宜多食五日午時飲菖蒲雄黃酒辟除百疾而禁百蟲瑣碎録曰五日并夏至日有患嗓臭者於日未出時汲井花水一盞作三嗽吐門閫裏如此三十日口臭永除矣吕公歲時記曰夏至一陰生宜服餌製過硫黃以折隂氣千金方曰五月二十七日宜服五味子湯取五味一合搗置小瓶中以百滚湯入蜜少許即封口置火邊良久乃服生津止渴二十日採小蒜曝乾治心煩痛解諸毒又治小兒丹疹夏至後宜浚井改水以去瘟病是月十六日二十日宜拔白洛陽記午日造术羮艾酒以花絲樓閣插鬢贈遺造辟瘟扇文昌雜録曰端午日走馬謂之躤栁保生餘録曰五月取螢火二七枚撚白髮能黑千金方曰多採蒼耳隂乾置大甕中能辟惡氣若有時疫生發即取為末舉家服之不染若病脹滿心悶發熱即服此又能殺三尸九蟲救民易方曰五月五日六月六日九月九日採稀蘞草即白花菜是也去根花并子淨用莖葉入甑九蒸九曝層層灑酒與蜜水蒸完極香為末蜜丸皂角子大每服五七丸米湯下服至百日去周身癱瘓風疾口眼歪斜涎痰壅塞久卧不起又能明目白髮變黑筋力強健效不可言萬氏家抄曰五日午時採雞腸草晒乾為末齒痛熱腫者擦之立愈千金月令曰五日取瓦上青苔或百草霜入鹽嗽口效或水煮羊蹄根或醋煮川椒俱能治齒百疾靈寶經曰是月五日可修續命齊太上淨明禦瘟經略曰天地無私陶鑄萬物本無善惡世人自私故生災禍飲食不忌服鍊不時善既無聞過則可述司罰之神得而窺測布此毒氣一及成疾不悟愆尤不能保護反怨道咎師其疾愈甚大凡四時調養務在得中服藥吐納以生正氣我有神符使其佩服合免斯難兼有祕咒每月持齊而誦之神將日夜護衛瘟毒百神皆知某為太上弟子畏而敬之誦至百遍百鬼頭傷腦裂而散咒曰唵旑烏可切暮秖音只混嚩音馬􅀈音吕􅀈音㰴九天髙明大使神功妙濟真君驅瘟遣疫消災真符書符以朱書黃素左手五雷訣右手舉筆咒曰洞天赤文丹靈耀虛驅瘟攝毒奉命天書金籙玉簡嵬鬼悉驅太上有勑元君安居急急如太虛紫清律令勑北極黑煞天丁五方殺瘟神符書符須澄心靜慮存自已精氣神三者上與北斗三台星合一元真氣入筆默誦兕曰魁􅂒􅂒䰢魓􅂒魒尊帝星君律令勑七遍每符一道誦咒七遍闕至誠貼之法用天罡日製白楊木板五塊長一尺五寸濶三寸六分小尺朱書後符五道於上凡人家瘟疫傳染不絶以此安鎮宅中五方或釘壁上病隂乃燒五符出道藏北極驅瘟真經天罡日立成正月巳日二月子日三月未日四月寅日五月酉日六月辰日七月亥日八月午日九月丑日十月申日十一月卯日十二月戌日五月事忌五月用事不宜用午犯月建百事不吉十五二十五日忌裁衣交易經曰五月初五初六初七日十五十六十七日二十五二十六二十七日為之九毒戒夫婦容止勿居濕地以招邪氣勿露卧星月之下問禮俗云五月俗稱惡月按月令仲夏隂陽交生死之分君子節嗜欲勿任聲色金匱要略云勿食韭菜令人乏力損目勿食生菜酉陽雜記曰五月蛻精神不可上屋令人魂魄不安太平御覽異苑曰五月勿晒床薦席月令圖經勿食濃肥勿食煮餅可食溫暖之物普濟方云勿食獐鹿馬各獸肉傷人神氣本草云勿食山澤中水勿食未成核果令人發癰毒及寒熱勿食生菜勿食雞肉勿食蛇鱔勿食羊蹄保生心鑑曰是月勿下枯井及深穽中多毒氣先以雞毛探之若毛下旋舞者即是有毒不可下也濟世方曰五月不可多食茄子損人動氣茄屬土耳歲時記曰勿食菘菜發皮膚瘋癢保生月録曰茉莉花勿置床頭引蜈蚣當忌李子不可與蜜雀肉同食損五臟千金方曰小兒不可弄槿花惹病痁槿為瘧子花五月勿食鯉多發風勿食其腦鯉鮓不可同小豆藿官桂猪肝同食損人類摘良忌云江魚即黃魚也不可同蕎麥食令人失音枇杷不可同炙肉熱麵同食令人患熱發黃桃子不可與鱉同食便民圖纂曰甜瓜沉水者殺人多食作隂下癢生瘡患腳氣食之永不愈雙蒂者殺人且此物不可與油餅同食楊公忌曰初五日不宜問疾名地臘日夏五月修養法仲夏之月萬物以成天地化生勿以極熱勿大汗勿曝露星宿皆成惡疾忌冒西北之風邪氣犯人勿殺生命是月肝臟已病神氣不行火氣漸壯水力衰弱宜補腎助肺調理胃氣以順其時卦值姤姤者遇也以隂遇陽以柔遇剛之象也生氣在辰宜坐卧向東南方孫真人曰是月肝臟氣休心正旺宜減酸增苦益肝補腎固密精氣卧早起早慎發泄五日尤宜齊戒靜養以順天時保生心鑑曰午火旺則金衰于時當獨宿淡滋味保養生臟靈劍子坐功法常以兩手合掌向前築去臂腕如此七次淘心臟風勞散關節滯氣養生纂曰此時靜養毋躁止聲色毋違天和毋幸遇節嗜欲定心氣可居髙明可逺眺望可入山林以避炎暑可坐臺榭空厰之處六月事宜孝經緯曰夏至後十五日斗指午為小暑後十五日斗指未為大暑小大者就極熱之中分為大小初後為小望後為大也律林鍾林者衆也萬物成熟種類衆多樂志曰月辰為未未者吐也萬物向成咸有味也要纂曰六月為徂暑𤣥樞曰是月天道東行作事出行俱宜東向吉其月遇土王戊日祭中霤之神是月宜飲烏梅醬木瓜醬梅醬豆蔲湯以袪渴方俱見前三伏日宜服腎瀝湯治男子虛羸五勞七傷風濕臟虛耳聾目暗方乾地黃六分黃茋六分茯苓六分五味子四分羚羊角四分桑螵蛸三兩炙地骨皮一兩桂心一兩門冬五分去心磁石一錢二分打碎水洗令黑汁出盡為止羊腎二箇猪腎亦可去脂膜切如柳葉以水四升先煮去水升半即掠去水上肥沫及腎滓取汁煎諸藥澄清去滓分為三服三伏日各服一料隨人加减亦可忌食大蒜生葱冷陳滑物空心平旦服之養生雜纂曰老人氣弱當夏之時納隂在內以隂弱之腹當肥冷之物則多成泄瀉一傷真氣卒難補復不宜燥熱補藥惟用平補溫和之劑如八味丸之類以助元氣雲笈七籖曰六月六日沐浴齊戒絶其營俗關西舊俗志曰六月六日取水收起净甕盛之一年不臭用以作醋醬醃物一年不壞真誥曰十九日草四日拔白永不生又云初三初四初八草八日拔白亦可四時纂要曰是月初一日初七初八二十一日沐浴去疾禳災七籖曰是月二十七日取枸杞煎湯沐浴至老不病荆楚記曰六月伏日宜作湯餅食之名為辟惡舊俗曰造醬用三伏黃道日浸豆黃道日拌黃用草烏五七箇切作四片撒上其蛆盡死農桑􅀈要曰是月剩飯用莧菜蓋之過夜不餿山居四要曰養魚池中是月宜納二神守以護魚治水瀉百病用烏藺子六月六日同麵炒黃等分為末米飲調服二錢瑣碎録曰宜食苦蕒可益心氣家孰事親曰西瓜性溫熟者可食解暑名白虎湯千金月令云是月可食烏梅醬止渴方用烏梅搗爛加蜜適中調湯微煮飲之水瀉渴者以梅加砂糖薑米飲之不渴便民圖纂曰六月六日用井花水以白鹽淘於水中作滷新鍋仍煎作白鹽以此鹽擦牙畢以水吐手心內洗眼雖老猶能燈下讀書抱朴子養生書云三伏內用甘草一錢好明白滑石六錢為末和水飲之名六一散令人免中暑泄瀉三伏內服十味香薷飲方香薷數年陳者一兩人參陳皮白术炒白匾豆炒茯苓黃茋木瓜厚朴薑汁浸甘草各五錢共為飲片水煎停冷服之或為細末水調一二錢服三伏時用門冬五味子人參泡湯代茶謂之參麥散消渴生津濟世仁術曰六月極熱可用扇急扇手心則五體俱凉抱朴子曰三伏中用黃茋茯苓煎膏入甘草末二分以井凉水調服治譫狂大消暑熱毒氣又方木瓜醬用木瓜十兩去皮細切以湯淋浸加薑片一兩甘草二兩紫蘇十兩鹽一兩每用些少泡湯沈之井中候極冷飲之又方梅醬喫水方用黃熟梅十斤蒸爛去核將肉稱有幾斤每斤加鹽三錢加紫蘇乾者一兩乾薑絲二錢甘草三錢攪勻日中大晒待紅黑色收起用時加白豆仁檀香些少飴糖調勻和水服最解暑渴又桂醬沈香熟水俱載飲食箋內靈寶經曰六月六日宜修清暑齊六月事忌月令曰六月選用日時不宜用未犯月建百事不利初一日忌經營初十二十日忌交易裁衣仙志戒曰六月六日忌取土開掘四時纂要曰三伏日不可嫁娶傷夫婦不吉雲笈七籖曰六月二十四日忌逺行水陸俱不可往四時纂曰是月勿飲山澗澤水令人患瘕千金方曰勿食韭令人目昏勿食羊肉傷人神氣勿食野鴨鶩鳥勿食雁勿食茱萸勿食脾乃是季月土旺在脾故也俱宜戒之雲笈七籖曰六月勿食羊血傷人神魂少志健忘勿食生葵必成水瘕且為犬嚙終身不瘥瑣碎録曰暑月不可露卧勿沐浴當風慎賊邪之氣侵人又曰其月無氷不可以凉水隂冷作氷飲水熱生涎者勿飲能殺人𤣥樞經曰是月勿斬伐草木勿動土勿舉大事以搖養氣養生仁術曰勿専用氷水浸手足防引起狂邪之風犯之令人瘋病體重氣短四肢無力食治通說夏月不宜飲冷何能全斷但勿宜過食冷水與生硬果油膩甜食恐不消化亦不宜多飲湯水人能自慎省食煎炒鹽臘炙􅏼之物自然津液常滿何必多飲便民纂曰途中一時中暑身死者勿可用冷水灌沃急就道上取熱土填於死者臍上成堆片刻發開作一孔令人撒尿澆入臍孔次用生薑大蒜搗爛熱湯送下即活瑣碎録曰暑月甕罈大日晒熱不可即取盛􅑽飲食恐收暑氣楊公忌曰初三日不宜問疾六月修養法季夏月月發生重濁主養四時萬物生榮增鹹减甘以資腎臟是月腎臟氣微脾臟獨旺宜减肥濃之物益固筋骨卦值遁遁者避也二隂浸長陽當避也君子莊矜自守生氣在巳坐卧宜向南方孫真人曰是月肝氣微弱脾旺宜節約飲食逺聲色此時隂氣內伏暑毒外蒸縱意當風任性食冷故人多暴泄之患切須飲食溫軟不令太飽時飲粟米溫湯豆蔲熟水最好內丹祕訣曰建未之月二隂之卦是隂氣漸長喻身中隂符離去午位收斂而下降也靈劍于坐功法端身正坐舒手指直上反拘三舉前屈前後同行至六月半後用之去腰脊腳膝痺風散膀胱邪氣脾臟四季旺綸脾臟屬中央土旺於四季為黃帝神肖鳳形坤之氣土之精也脾者裨也裨助胃氣居心下三寸重一斤二兩濶三寸長五寸脾為心子為肺母外通眉闕能制謀意辨皆脾也口為之宫其神多嫉脾無定形主土隂也妬亦無准婦人多妬乃受陰氣也食熟軟熱物全身之道也故脾為五臟之樞開竅于口在形為頰脾脈出于隱白脾乃肉之本意處也榖氣入于脾于液為涎腎邪入脾則多涎六腑胃為脾之腑合為五榖之腑也口為脾之官氣通則口知五味脾病則口不知味脾合于肉其榮脣也肌肉消瘦者脾先死也為中央為季夏日為戊巳辰為丑辰未戊為土其聲宫其色黃其味甘其嗅香心邪入脾則惡香也脾之外應中嶽上通鎮星之精季夏并四季各十八日存鎮星黃氣入脾中連于胃上以安脾神脾為消榖之腑如轉磨然化其生而入于熟也脾不轉則食不消也則為食患所以脾神好樂樂能使脾動蕩也故諸臟不調則傷脾脾臟不調則傷質質神傷傷則人之病速也人當慎養硬物老人尤甚不欲食者脾中有不化食也貪食者脾實也無宿食而不喜食者脾虛也多惑者脾不安也色憔悴者脾受傷也好食甜者脾不足也肌肉鮮白滑膩者是脾無病徵也肺邪入脾則多歌故脾有疾當用呼呼以抽其脾之疾也中熱亦宜呼以出之當四季月後十八日少思屏慮屈己濟人不為利爭不為隂賊不與物競不以自強恬和清虛順坤之德而後全其生也逆之則脾腎受邪土木相尅則病矣修養脾臟法當以夏季之月朔旦并三季後十八日正坐中宫禁氣五息鳴天鼓二十四通注曰鳴天鼓者以兩手抱腦後用中食二指起復互換各二十四下吸坤宫黃氣入口十二吞之以補呼之損也相脾臟病法脾熱者鼻赤黃而肉臑脾虛則腹脹鳴成溏痢食不消化脾風則多汗惡風體上逰風㿇㿇四肢無力舉動懈怠不思飲食足不能行腳下脹痛脾惡濕食苦以燥之又云脾病欲緩實甜以補之苦以瀉之脾病當臍下有動氣按之牢若痛若逆氣小腸急痛下泄足重脛寒兩脅脹滿時作嘔吐氣滿充心四肢浮腫宜服訶梨勒丸乾地黃一錢牡丹皮一錢薯蕷八分澤㵼八分茯苓八分川芎八分山茱茰九分乾薑三分訶梨勒皮蓽撥三分右為末煉蜜為丸如桐子大空心地黃湯下二十丸六氣治脾法治脾臟吐納用呼法以鼻漸引長氣以呼之病脾大呼三十遍細呼十遍呼時須撮口出之不可開口能去冷氣壯熱霍亂宿食不化偏瘋痳痺腹內結塊數數呼之相次勿絶疾退即止過度則損損有吸以補之法具前脾臟四季食忌六月勿食吳茱茰令人患赤白痢四季勿食脾肝羊血脾病宜食米棗葵禁酸味導引法六月行之可大伸一腳以兩手向前反掣三五度又跪坐以兩手據地回視用力作虎視各三五度能去脾家積聚風邪毒氣又能消食夏時逸事洗筆池三吳長洲葑溪孔里有洗筆池是宣聖南逰遺跡池中水尚黑內種白荷每年其中間黑荷一朵是聖跡之竒也至今在瀟灑張郎舊居園中入水避暑葛仙翁每大醉夏炎熱入深水底八日乃出以能伏氣故耳河朔夏飲袁紹在河朔至夏大飲以避一時之暑號為河朔飲髙卧北忩陶潛于夏日髙卧北忩之下清風颯至自謂羲皇上人避暑凉棚長安人每至六月以錦結為凉棚設坐具為避暑㑹造百索粽唐歲時節物五月有百索粽捕蠅虎蟾蜍佩五月五日捕蠅虎杵拌豆豆自踴躍可以繫蠅取萬歲蟾蜍頭有角目亦頷下有丹書八字者五月五日收之隂乾佩帶可以避五兵九子粽粽名極多有九子粽王沂公詩云爭傳九子粽章簡公詩云九子黏蒲王粽香是也射粉團唐時都中端午日造粉團角黍入盤中以小弓架矢射之中者取飲菖蒲酒端午日以菖蒲生山澗中一寸九節者或屑或切以浸酒章詩云菖蒲泛酒堯樽緑五彩線五月以五色線繫臂名曰續命縷又曰長命縷可以辟除不祥五兵五鬼蒲人艾虎端午日以菖蒲根刻作小人或葫蘆形佩以辟邪王詩旋刻菖蒲要辟邪五日以艾為小虎或剪綵為小虎貼以艾葉內人爭相戴之故章詩云玉燕叉頭艾虎輕鬭草浴蘭五日踏百草又作鬭百草之戲章詩云今朝鬭草得宜男五日蓄蘭以為浴楚騷曰浴蘭湯兮沐芳華章詩云蘭芽翠釡湯鳬車南方兢渡使舟輕利謂之飛鳬又曰水車章詩瑶津亭下兢鳬車古詩云蘭湯備浴傳荆俗水馬浮江弔屈魂伏閉不出漢官儀曰伏日萬鬼行故盡日閉户不涉他事暑飲碧筒袁紹與劉松三伏時盡日飲酒以避一時之暑魏鄭公暑飲取大荷葉以指甲去葉心令與大柄通屈莖輪菌如象鼻傳席間吸之名碧筒酒琢氷山長安子弟每以三伏琢氷為山置於宴席左右酒酣各有寒色分龍節池俗以五月二十九日三十日為分龍節雨則多水閩人以夏至後為分龍雨各有方杭俗以五月二十日為分龍櫻笋厨歲時記以四月十五日後通謂之櫻笋厨陳詩云春事無多櫻笋來臨水宴李少師與客飲燕暑月臨水以荷為杯滿酌不盡則重飲無日不大歡霹靂酒醉鄉云暑月大雷霆時收雨水淘米釀酒名霹靂酒寒莚氷酉陽編云盛夏取大水晶如拳塊置釡中新汲水煮千沸以小口大肚瓶盛湯以油綿密封其口勿令泄氣復以重湯煮瓶千沸急沈井底平旦出之破瓶氷已結矣壬癸席河東備録云取猪毛刷净命工織以為席滑而且凉號曰壬癸席澄水帛同昌公主一日大㑹暑熱特甚命取澄水帛以水蘸之掛于堂中滿坐皆思挾纊長八九尺細明可鑒中有龍涎故能消暑氷絲裀唐有老人遇老嫗持舊裀以半千售之有波斯國人見之曰此是氷蠶所織暑月置之座傍滿坐皆凉酬以千萬招凉辟暑拾遺記曰黑蚌千年生珠盛暑握之生凉名招凉珠可以避暑唐延學士講易賜辟暑犀章詩云已持犀辟暑更有草迎凉酉陽編曰迎凉草碧色而簳似苦竹葉細如杉雖若乾枯未嘗雕落盛暑掛之門户其凉風自至白龍皮劇談李德裕夏日邀同列飲延入小室開樽如坐髙秋出則火雲烈日詢其私信云此日以金盆水漬白龍皮置坐右皮自新羅僧得于海中者溜激凉風唐書拂麻之國盛暑乃引水潛流上通屋宇機制巧密惟聞屋上泉鳴俄見四簷飛溜懸波如瀑布激氣生凉七井生凉霍仙别墅一室之中開七井皆以鏤雕之盤覆之夏月坐其上七井生凉不知暑氣按轡木隂姚崇暑月袗絺乘小駟按轡木隂頓忘煩溽讀隨樹隂魏伯起夏日坐板床隨逐樹隂諷讀纍年床為之鋭浮瓜沈李魏文帝與吳質書云浮甘瓜于清泉沈朱李于寒氷杜詩云翠瓜碧李沈玉甕踏草競渡歲時記五日士人踏百草作鬭草之戲以拯屈三閭之溺厭兵續命五月五日集五綵繒謂之辟兵合五色絲繫之臂謂之續命勞酒薦瓜漢書田家伏臘烹羊炮酒以自勞月令初伏薦麥瓜于祖禰環爐交扇新論王仲都夏日環爐火不言熱而身不汗謝公暑月雖伏當風交扇猶沾汗流離嘯風嗽霧王燦大暑賦曰仰庭熠而嘯風王度扇銘服絺嗽雲霧避暑感凉魏許使劉松輩三伏之時晝夜酣飲極醉以為避暑飲傅咸作感凉賦曰夏日困于炎暑旬日不過自凉以時之凉作感凉㑹寺院浴佛四月八日為佛誕辰諸寺院各有浴佛㑹僧尼競以小盆貯銅像浸以糖果之水覆以花棚鐃鼓交迎遍往邸第富室以小杓澆灌佛身以求施利是日西湖作放生㑹舟楫之盛略如春時小舟競賣龜魚螺蚌售以放生開煮迎新宋時㸃撿所以四月開煮每庫各用匹帛書庫名髙品以長竿懸之謂之布牌以木床鐵擎為仙佛鬼神之類駕空飛動謂之臺閣雜劇百戲之外又令漁父習間竹馬出獵八仙故事及命妓家女使花巾裹頭為酒家保更有花果五熟盤架放生籠養等庫爭為新好庫妓之琤琤者皆珠翠盛粧銷金紅背繡鞋寶勒乘以駿騎各有皂衣黃號私身數對開導前行後執羅扇衣笈浮浪閒客隨步于後少年狎客簇盤飣持杯爭勸馬首金錢彩假沾及輿從都人習以為常不以為怪所經之地髙樓逺閣繡幕如雲纍足駢肩真所謂萬人海也髙子論夏時幽賞一十二條蘇堤看新三月中旬堤上楊栁新葉黯黯成隂淺翠嬌青籠烟惹濕一望上下碧雲蔽空寂寂撩人緑侵衣袂落花在地步蹀殘紅恍入香霞堆裏不知身外更有人世知己清歡持觴覔句逢橋席賞移時而前如詩不成罰以金谷酒數東郊玩蠶山初成蠶箔白繭團團玉砌銀鋪髙下叢簇絲聨蓓虆儼對雪嶠生寒氷山耀日時見田翁稱慶鄰婦相邀村村撾鼓賽神繅車煮繭倉庚促織栁外鳴梭布榖催耕桑間喚雨清和風日春服初成歌咏郊逰一飽菜羮麥飯因思王建詩云已聞鄰里催織作去與誰人身上著之句羅綺遍身可不念此辛苦三生石談月中竺後山鼎分三石居然可坐傳為澤公三生遺跡山僻景幽雲深境寂松隂樹色蔽日張空人罕逰賞炎天月夜煮茗烹泉與禪僧詩友分席相對覔句賡歌談禪說偈滿空孤月露浥清輝四野輕風樹分凉影豈儼人在氷壺直欲談空玉宇寥寥巖壑境是仙都最勝處矣忽聽山頭鶴唳溪上雲生便欲駕我仙去俗抱塵心蕭然氷釋恐朝來去此是即再生五濁欲界飛來洞避暑靈鷲山下巖洞玲瓏周回虛厰指為西域飛來一小巖也氣凉石冷入徑凛然洞中陡處髙空若堂窄處方斗若室俱可人行無礙頂處三伏燻人燎肌燔骨坐此披襟散髮把酒放歌俾川鳴谷應清冷灑然不知人世今為何月顧我絺綌不勝秋盡矣初入體凉再入心凉深入毛骨隱隱襲人霞標雲彩弄雨欹風芳華與四圍山色交映携舟捲席相與枕藉乎舟中月香度酒露影濕衣歡對忘言儼共净友抵足中宵清夢身入匡廬白社中矣較與紅翠相偎衾枕相狎者何如哉更願後期與君常住淨土湖心亭採蓴舊聞蓴生越之湘湖初夏思蓴每每往彼採食今西湖三塔基傍蓴生既多且美菱之小者俗謂之野菱亦生基畔夏日剖食鮮甘異常人少知其味者余每採蓴剝菱作野人芹薦此誠金波玉液清津碧荻之味豈與世之羔烹兔炙較椒馨哉供以水蔌啜以松醪咏思蓴之詩歌採菱之曲更得嗚嗚牧笛數聲漁舟欵乃相答使我狂態陡作兩腋風生若彼飽膏腴者應笑我輩寒淡湖晴觀水面流虹湖山過雨殘日烘雲巒靄浮浮林鋪翠濕浴晴鷗鷺爭飛拂袂荷風薦爽忽焉長虹亘天五色熾焰影落湖波光彩浮濯乍駭蛟騰在淵滉蕩上下水天交映爍電絶流射日蒸霞似奪頽丸晚色睥睨靜觀景趣髙逺不覺胸中習氣欲共水天吞吐此豈豐城伏劔時為幽人一剖璞中藴色山晚聽輕雷斷雨山樓一枕晚凉卧醉初足倚欄長嘯爽豁吟眸時聽南山之陽殷雷隱隱樹頭屋角鳩快新晴喚婦聲呼部部矣雲含剩雨猶著數㸃飄搖西壁月痕影落湖波溶漾四山靜寂兀坐人閒忽送晚鐘一清俗耳漁燈萬盞鱗次比來更換睫間幽覽使我眼觸成迷意觸冥契頓超色境勝地乘庵剖蓮雪藕蓮實之鮮美在清晨水氣夜浮斯時正足若日出露晞鮮美已去過半當夜宿嶽王祠側湖蓮最多曉剖百房飽啖足味藕以出水為佳色緑為美旋抱西子一彎起我中山久渴快賞㫖哉口之於味何甘哉况蓮得中通外直藕潔穢不可汚此正幽人素心能不日茹佳味空亭坐月鳴琴夏日山亭對月暑氣西沈南薰習習生凉極目遙山盤鬱氷鏡兩湖隱約何來鐘磬抱琴彈月響遏流雲髙曠撫秋鴻出塞清幽鼓石上流泉風雷引可辟炎蒸廣寒逰偏宜清冷樂矣山居之吟悲哉楚些之曲泠然指上梅花寒徹人間煩憤矣噫何能即元亮無絃之聲得塵世鍾期之聽哉宜正音為之絶響觀湖上風雨欲來山閣五六月間風過生寒溪雲欲起山色忽隂忽晴湖光乍開乍合濃雲影日自過處段段生隂雲走若飛故開合甚疾此景靜玩可以忘饑頃焉風號萬壑雨橫兩間駭水騰波湖烟潑墨觀處心飛神動誠一異觀哉有時龍見余曽目覩龍體僅露數尺背抹螺青腹閃珠白矯矯盤盤滃雲捲雨湖水奔跳奮若人立浪花噴瀑自下而升望驚汩急漂疾滂湃洶湧移時乃平對此水天渾合恍坐洪濛空中樓閣飛動不知身在何所因思上古太素簡朴無華是即雨中世界要知一切生滅本空何爾執持念根不向無所有中解脫步山徑野花幽鳥山深幽境真趣頗多當殘春初夏之時步入林巒松竹交映遐觀逺眺曲徑通幽野花隱隱生香而嗅味恬淡非檀麝之香濃山禽關關弄舌而清韻閒雅非笙簧之聲巧此皆造化機局娛目恱心靜賞無厭時抱焦桐向松隂石上撫一二雅調蕭然景㑹幻身是即畫中人物逺聽山村茅屋傍午鳴雞伐木丁丁樵歌相答經丘尋壑更出世外幾層此景無競無爭足力所到何地非我傳舍又何必與塵俗惡界區區較尺寸哉遵生八箋卷
