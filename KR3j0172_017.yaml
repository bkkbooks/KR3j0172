body:
  text: 遵生八箋卷十七眀髙濓撰靈祕丹藥箋上髙子曰食藥者可以長年仙經論之矣故羲皇嚅藥制醫治人百疾自華扁諸家復遺方書以利天下後世好生之德何無量哉今人天真散失幻體空虛不思補髓填精斡旋造化長年將無日矣悲歟余幼病羸復苦瞶眼僻喜談醫自家居客遊路逢方士靡不稽首傾囊以索竒方祕藥計今篇篇焉盈卷秩矣即余自治羸疾頓壯矇疾頓眀用以治人應手奏效神哉藥之方歟余寶有年計所徵驗不可枚舉兹不自祕并刻以助遵生一力他若條分疾病次備方藥當質之專科無問是編所冀智者原病合方心運妙用寶以護命兼以活人則方寸即為夀域豈不勝彼寶金玉而甘心泉壤者哉録成箋曰靈祕丹藥丹藥祕傳龍虎石煉小還丹余生平酷嗜方藥屢獲竒效故信愈篤而好益專兹丹始焉得之終南王師燕中復遇至人參同祕訣今不自私録以濟人見者幸勿視以肉眼龍虎石丹序夫龍虎石者乃人元造化之至寶也自軒轅皇帝所傳製煉之丹方後鍾呂二仙再修接命之祕法蓋求延年之術惟童真未破不假他力而徑自還丹已破河車必得至藥而復全性命龍虎即男女之法象男女乃隂陽之妙化也隂陽未漓其體渾然故能感召天地氤氲之氣盜奪日月磅礴之精其氣充塞五臟遍歷諸經溢之於內為氣為血滲之於外為水為膏聖人以法術而採取用以施水火既濟之功運周天還返之妙鍊成黃芽白雪玉液金英火煉味醎水飛味淡其體不一其色不定餌陽煉則補益真隂餌隂煉則强壯元陽返本還元歸根復命單服散片而順絡調經扶衰救老合服羣丹而祛除百病起死回生致真氣而日益日盛使諸隂而時剝時消自然身輕體健返老還童百日成功千期輕舉實大丹之根基乃人元之上藥也但無德之人終身難遇若夙有仙風道骨者得遇此道屏除六欲絶棄貪嗔濟貧拔苦廣積隂行凡人不問老少男女五勞七傷諸虛百損遺精白濁喘嗽風癱婦人崩漏子宮久冷不成胎孕小兒諸疾並皆服之無有不治然須緩緩服久自效欽蒙御賜詩曰採取須龍虎烹煉合隂陽服之二三載肌膚自榮光欽此謹録成帙珍藏世寶云取龍虎水法龍屬木虎屬金即童男童女取之時謹擇有五種不男五種者生逮變半瀆也生者外腎不舉逮者聲雄皮粗變者􅧍羶狐臭半者黃瘦多病瀆者疥癩瘡疽五種不女羅紋股交脉也羅者隂戶上有橫骨紋者狐臭體氣股者實女也交者聲雄髮粗皮膚粗糙無顏色脉者瘡疾病患殘疾二鼎器務擇眉清目秀滿月之相三停相等唇紅齒白髮黑聲清肌膚細潤年方十二三嵗至十五六未破者用黍稷稻粱紅豆紅棗犽猪鯽魚等味與彼食之忌葱蒜韭薤五葷三厭穢汚二水戒喧譁戲謔手舞足蹈恐耗散精華取之時先調百日十月起三月止置磁缸或磁罈於靜處收貯以蓋蓋之積至二三石聽候煉用隂煉法將前積取二水置磁缸三四口或五六口於靜通溝去處每缸止放五分龍虎水加井水五分下眀礬二兩白术二兩松柏葉各二兩取楊桞棍三四莖一扎順攪千餘下蓋之勿動勤看待水澄清去蓋慢慢湢去清水又加井水滿缸以絹羅濾去渣滓又攪三二百轉蓋之澄清又盡湢去清水仍加井水又濾又攪又湢如此十餘次直待水香為止候水盡用米篩二三箇內鋪薄綿紙將渾龍虎石取入篩紙上待水乾移在日色處以竹刀畫成骨牌路晒乾如粉之白即是隂煉龍虎石用磁盒收貯合藥用此石能補心生精飬血之至藥也又一方將積下的龍虎水照前安半缸加井水半缸令九分滿另用皂角一斤煎水一桶加白礬四兩在內聽用取南桑北榆東槐西桞中松各一枝共扎成一握攪前缸龍虎水千餘轉㸃皂角白礬水二三碗勿動待他澄清湢去清水再加井水令滿仍入皂角白礬水二三碗再攪四五百轉待澄清湢去清水再加井水令滿渾攪用空缸一口以瓢連忙淘入空缸內剩泥腳二三碗不用復攪百十轉澄清水仍加清水攪渾乘渾連忙又淘入空缸內又剩泥腳不用又澄又湢去清水又加井水又攪渾又淘過又剩腳如此十餘次方湢水盡用净灰半缸按實上鋪絹一方絹上鋪紙將渾秋石傾在紙上䕃乾亦將刀竹畫成骨牌路晒乾即是隂煉收用河煉法將前積收二水照前隂煉置器一樣煉法只是置淨器積二水不過夜一日一煉不用井水取南流東流河水依前法多加河水飛煉晒乾比隂煉上等潔白此河煉石丹方用乳膏丸服能消痰止嗽專治勞嗽大有功效陽煉法擇露天空地砌灶二眼坐東朝西安三尺二二尺四鍋二口鍋近處安缸四口先積下龍虎水二缸或三缸方洗淨鍋鏽先於大鍋內入五瓢灶內慢火粗熬至起沫以笊籬撇去油沫直待熬至不起沫方起過小鍋內細熬大鍋內仍添二三瓢又熬去沫又起過小鍋來如此少少漸添漸起直待前積二水熬盡大鍋住火只在小鍋內慢慢火熬用鏟刀不住手鏟待水乾成膏上用一小鍋小缸合住鍋口周圍用泥封固完密止留一孔出水氣盡孔內飛出金星青氣仍以泥封孔眼缸底用濕布一方不可水大但嘗以水潤之小火燒至鍋底紫色退火冷定過夜第二日先去口泥淨揭開升缸上的已永靈藥紅黑白各色者另收聽用另打黃芽將鍋內黑膏子鏟起另入一口小鍋內用磚架起大火燒待黑烟盡連鍋通紅退火眼冷酌量下井水或露泉等水尤妙燒滚先將淨缸一口於室內止安竹篩篩內鋪紙濾滴清水入缸篩內黑渣不用將濾下清水看如水清碧就磁盤煎出淨石來如略有些黃色還用前小鍋煎乾再煅一火眼冷如下水煎滚照前淋入缸內直看淋下的水如井水一般清碧方以磁盤用磚支住徐徐添炭火煎前淋的水滚以竹鏟不住手鏟直待前煎鏟焙乾略帶潮取出傾在紙上晒乾似雪之白此是陽煉之法又一方鍋煎法同前火用桑柴直煎至水盡鏟焙成黑粉末先用陽城罐十數外用紙斤泥固了隂乾將末裝入固濟罐內上用鐵燈盞坐口以鐵絲纒紐周圍用鹽泥封固嚴密炭火炙乾於地下用釘三箇釘地離四指髙坐藥罐於釘上周圍用磚砌成百眼爐先下底火徐徐添至平口盞內徐徐添水勿令乾了到火三炷香盡退火冷定去鐵線開看升盞上的另收打黃芽罐內的秋石取出碾為末加露水煎待末化照前用篩子置於磁盆上篩內先鋪生絹一方次鋪紙二層將煎滚的水傾入篩紙內濾清入盆內去黑渣不用將淋下清水用銀鍋煎乾成白秋石再添露水煎直待石化了仍換紙於篩內再淋再煎如此九次丹訣云九熬九打似氷霜去滷除羶為上藥將石收貯銀器內或磁罐內用黃蠟封口墜入井中去火毒三日取出每日空心白滚水服三五分此石是人身五行化生以法煉成三陽之氣服之能補腎中真水最壯丹田之元氣實人元之丹也乳煉秋石竒方童便二桶用皂角十二兩水九碗煎至三碗傾入便內用桃桞枝攪打便水二千餘下淀清傾去濁腳次將杏仁十兩打碎煎汁三碗倒在便內又如前攪打二千餘下去清留濁又將猪脂油十二兩熬成汁去滓傾入便內又攪千餘下浮膜傾去又淀清將人乳汁用滚湯泡成塊傾入便內再攪如前又淀一日傾去清水下底濁粉漿水用木杓乘起傾桑皮紙上先將毛灰一矼作一沉窩將桑皮紙放灰上以滲便水紙上乾白膩粉即成秋石矣不可動搖晒一二日磁瓶收起每秋石一兩入柿霜三錢同和每用白滚湯調服一二分起至七八分止空心時服此粉益夀延年返元還本髮白變黑百疾不生不必配藥謂之乳煉法也取秋石氷片法將煎熬黑粉內打淋出的清碧秋石水或十碗或五七碗裝入大白磁罐內於冬至後數九天埋露天地下蓋口嚴密勿令撒土在內凍七日後取出掃土淨揭去蓋將秋石水傾出另器內其淡秋石如氷俱結在罐底鏟取出放白磁盤內晒乾其味甜淡用銀器收貯早晚空心服之能清痰降火補氣生津之妙藥煉伏火黃芽法用前積下的龍虎石三四斤將露水再煮烹再淋再打火九次直煉得如白玉相似方用陽城罐量盛半斤大的外用猪毛泥固謹晒乾收抹淨罐內約裝秋石半斤在內坐入眀爐內風匣大火化開成清汁方用前缸上收的巳汞㸃上以白㸃白以紅㸃紅以黑㸃黑即成伏火黃芽待汁清取出冷定成一白玉陀其色難定或如玉或金色或白中𢃄紅或黑色丹書云其白容易得一黑最難求所以分有五色以應五行內滋五臟實乃飬生之至藥也鄭思逺訣曰淮南煉秋石黃蒂發金花秋石原非石金花不是花花從秋裏得石向春中葩子母同一處如住仙人家秋石是真鉛金花號黃芽黃芽非别物內象取精華取秋石汞花法將磁盤煎取龍虎石時看煎至六分乾時滚起圓泡急將銀茶匙挑起放白綿紙上晒乾銀器收貯此汞花最是輕清先天之藥服之令人肌膚瑩光身體壯健其功無比煉黃芽法將前初煉秋石鍋熬成黑膏時缸合升取的巳汞靈藥先㨂置小白罐口如錢大者用猪毛泥固濟隂乾將靈汞五錢口大或一兩裝入罐內口用白破碟底相成圓錢坐口上以鐵線扎緊鹽泥封固縝密用火炙乾口地下錠釘三箇離地二指髙將藥罐坐上用磚砌百眼爐先用底火慢慢燒四寸香漸漸加至小半肚火一炷香口上用新筆塗水濕蓋香盡去火冷定開出其黃芽升在罐蓋上起下如金色一餅此乃是龍虎初弦至美之氣名曰金花又曰黃芽服之令人五臟化生先天精氣元神祛除百病消化痰涎自保長生也鍊白雪法亦將巳汞靈藥照取黃芽法一樣封固打火蓋黃芽初陽之氣易走易飛宜火小火小色變輕黃即黃芽白雪乃二陽之氣比黃芽火候略加大些其藥自然變白此黃白造化乃天地隂陽人元自然變化非人功力所為也火足冷定將下一餅如白玉之象亦是龍虎至英之氣名曰白英又號白雪服之令人自然三田生氣五臟添華百病不生諸痰永息精神壯而病自安矣取冬氷法將煉龍虎石時取清碧之水用茶鍾十箇各盛半碗在內於數九天擺在露下次日早水面俱結氷以小刀貼碗周圍輕輕畫離碗邉挑取出輕放大氷盤內晒乾即如春餅樣的圓氷花令人清晨將些須入口噙化生津化痰其功甚效至妙晒煉乾秋石法此石乃人之精氣結成豈容見火燒煉以傷生氣惟此法乃得人元至妙大理最上一乘擇僻靜去處築一臺髙三尺三寸上置缸五口積龍虎水五滿缸於三伏天晒露遇風雨蓋之晒至半缸并成三缸仍晒仍露至止得二三斗之數方取不見水的新磚十二箇浸入水內一夜第二日取出晒乾至晚又浸如此直待水通乾了為止尋一幽隂靜室打掃潔淨地下噴水濕以竹劈成篾片稀鋪濕地上將浸的磚側擺篾上上用筐蓋周圍泥封口縫䕃七日開看其磚上生出秋石如白玉苖一二寸長輕掃下來收在銀器內將前磚照前仍取五七次直待不生為止此煉法不經水火不泄元靈惟仗日精月華煆煉亦得助氣添靈如服此石比水火煆者加功效過半矣混元毬製取甜秋石法於僻靜露天去處置缸三五口積滿龍虎水於三伏天日晒夜露遇風雨蓋之天晴去蓋直晒至水耗只存至大半缸將混元毬十數箇浸入內蓋之勿動直過冬待至第二年三伏天方取出毬來於日中晒伏盡剖破其毬內生白雪玉英其味甘美極能補心血化老痰浸毬的缸底亦結生如氷相似亦取出晒乾另合藥用功亦同前煉真土法煉真土時須於秋分後取山東東三府地方的人中黃㨂擇成顆粒方圓者為妙成稀片者不用採取四五擔就於本地方尋淨地方下做木郎頭一箇翻打碎晒極乾用火煨過成灰略存性方入蒲包裝載回來取河水煎滚先將煆過的人中黃入缸內將滚水冲泡攪打均待冷用篩子內鋪粗布將水淋過渣不用將淋的人中黃水用鍋於露天砌灶煎乾連鍋煆紫色待烟盡退火冷定仍入秋露水再煎滚水仍以篩子內鋪綿紙一層將水乘熱淋滴過方換淨鍋再煎乾鏟出真土始裝入固濟陽城罐內燈盞固口鹽泥封緊入地爐內大火打三炷香香盡退火冷定取開將真土仍用露水再煎滚再用紙隔過再煎乾再入陽城罐打三炷香冷定取出復碾復煎復淋復打火如此九次取出真土如氷如雪香甘味美收貯存後配合龍虎石養成丹丸服之令人脾胃壯健精神倍加百病不生諸痰永息所謂真土製真鉛真鉛擒真汞真汞歸真土身心寂不動即此義也取紅鉛法須擇十三四的美鼎謹防五種破敗不用務選眉清目秀齒白唇紅肌膚細膩三停相等好鼎算他生年月日起約至五千四十八日之前後先看兩腮如花額上有光身熱無喘腰膝酸疼困倦即時癸將降矣先備絹帛或用羊胞做成槖籥或用金銀打的偃月器式候他花開即與繫合隂處令他于椅凳上平坐不可欹側如覺有經取下再換一付多餘處用絹帛夾展更換收入磁盆內待經盡同製古法五千四十八日近有十三而來有十六七而至何也皆因受父母氣血厚薄難以期定如得年月日應法乃是真正至寶為接命上品之藥如前後不等只作得首鉛初次金鉛二次紅鉛三次以後皆屬後天紅鉛只宜配合藥不宜單服食既眀採取聽候製伏三腥五濁必須仔細修煉方成至寶製紅鉛法將烏梅一斤煎水一桶去梅候冷取得紅鉛或器或帛俱入梅水內洗下用梅水時看紅鉛如有一箇止用梅水三碗或多或少隨意加減不可太過不可不及梅水洗下來的鉛再加井水或河水用大磁盆令裝滿以棍攪數十轉用蓋蓋之勿動待水清輕湢去水將墜下的鉛仍加水又打又澄如此七次或九次數足湢去水止剩得渾漿水一碗或半碗取淨灰用盆盛貯中剮一孔量容多少以輕絹鋪著灰上絹上鋪紙把鉛漿傾入紙上䕃水盡方取于日色處晒乾即此是製􅧍羶垢之法方可入藥配合服之專主助血其功甚大製首經至寶法將取的五千四十八日真正初經或器或帛以一碗新解童便洗下對清水十碗進礬一錢攪百十轉澄定湢去清水再換清水十碗仍打澄清湢去清水淨加頭生男嬌乳一鍾同入金器內紙糊三四遭放在日色中晒三日或用泥封口入灰缸內小頂火飬三日取出為末再用乳􅘮膏子為丸一箇鼎的分作九丸或十五丸用辰砂為衣擇甲子庚申日清淨身心於子時更衣焚香服三丸以無灰酒或乳送下服後靜坐片時存神定意如覺身熱時取頭生乳一鍾服下靜攝即解製靈鉛法將前取紅鉛或器或帛量多少用燒酒一大碗洗下旋轉百遭置於靜處待酒澄清慢慢湢去酒存住紅鉛加酒一碗仍打轉澄清湢去酒始加清水逐去酒味待水清湢水盡將鉛傾入大磁盤內晒乾其鉛胎色不變如牛黃樣不泄元靈之氣將此鉛配金乳粉合成丸丹每日五更用酒吞服五分自覺身輕體健效不可述丹書云先補氣後補血補得丹田溫溫熱上至頂門泥丸宮下至腳板湧泉穴一身四大俱補通致使精神無露泄誠哉是言也蓋未服紅鉛之初先行服氣之法既服其氣須補其血不可偏廢工夫血為榮氣為衛榮衛調和自然長生也製金乳粉法製乳粉時先擇美鼎先看嬰童肥白有精神者此是氣血盛而乳可用亦須頭生年方二八三七才可取下一碗或半碗對露水均平攪百遭過夜其乳自分逼去水將乳入磁盤晒乾碾細成粉積得半斤聽用製乳酥法取乳之法同前看乳有一碗下舶上硫半分攪勻放在飯上蒸熟取出晾冷乳面上結一層如豆腐皮挑起晒乾即乳酥配紅鉛淡秋石作丸服煉乳膏法取乳不拘多少用銀鍋以磚支住用灰火慢慢煎熬用銀茶匙不住手攪將周圍邉上俱用茶匙刮下來不然焦了不中用只宜慢火若火大其膏盡黑熬至七分乾時以磚墊起離火尺餘髙將藥烘乾只用九分乾為止色黃白為上粉紅次之焦黑不用取梅子法梅子者乃先天混沌純一至真元英之氣所結包一身之精粹最難得之者也如取之時先尋黃婆調擇美鼎之法具于前篇惟得黃婆調理鼎器不許喧譁歌舞恐傷真氣不妄食五葷煎炒以致動火有耗精血皆難成也如雞之抱卵龍之養珠勿搖勿動朝夕謹慎此鼎與取首鉛虎水不同務要身形端正氣血均平於十三嵗以上調理起算他生年數至五千四十日看他天應星紅光滿面地應潮發火燒身急以紙入隂戶探看如得黃水癸將動矣此真是候也與彼槖籥繫上癸水一至急取槖籥內看癸中如有一㸃粉紅色之結硬者即是梅子忙將珠砂末穿衣置于金銀器盒內貯勿令泄氣不然化作黃水矣如癸水中尋覔不見令彼黃婆看彼花叢內有血絲纒裹以中指挑斷擇取出來同前穿衣至第二日清晨用乳香煎湯服之便覺精神昏悶五體不收渾身氣喘體汗急命黃婆取蟠桃酒服之以解其燥過此一畨百病蠲除延夀一紀又取法照前看鼎癸若動時急將寶珠丹與鼎服之良久命其騎坐空穴將槖籥與托住虎穴額上輕拍數下其藥即降矣如降時仍同前用硃砂穿衣銀盒收貯如不降再服寶珠丹方麝香當門子一粒朝腦五分紫梢花一錢去梗大力子一錢丁香一錢紅花一錢急性子五分斑毛一對去翅足紅娘子一對去翅足右九味碾為細末每服半分無灰酒送下又一法亦要看鼎器將近五千四十八數或前或後但身中覺熱面赤癸將至矣命黃婆使彼俯伏兩腳尖著地腳眼抵住肛門黃婆以中指撥開花叢見一紅星如櫻桃者即是紅梅急以星劍摘取下來配合淡龍虎石滚圓外用硃砂或金箔穿衣用銀器收貯聽用此乃是生擒活取之法也其功甚妙其氣甚全只好仔細不可造次也取後天日月一枝花法此丹須是後天亦禀父母元氣精血所結人得服之亦能却病既無病擾豈不延生採擇之法亦擇無敗美鼎又要經調不調者不用看他前月經從某日時到次月其日預備器物令彼騎坐置一空穴將器抵住虎穴待經一來取出經中有一成粒者如枸杞樣急以雄黃硃砂末溫養銀器收貯服用酒送下如不服存後配合混元丹服此丹比梅子難得但十八九二十上下不拘已破未破俱各有之每月服二三粒使元氣不散精神不耗服久令人生子如要交合百戰百勝其效甚速詩曰月月一枝花隂山是我家有人認得我還丹即是他詩乃人人通知其法不易輕傳得知者慎勿蹉過殷􅮆採取而服之自保長生也取黍米金丹法擇童男童女各年方二八像皆不干於五種破敗俱要清秀合於美鼎男要精通女要經行令彼交合如得成孕當以黍稷稻粱犽猪鯽魚與彼食之不可妄食五葷煎炒之物務要調理得中待到八箇月上下看他兩乳脹大有紅脉聚于乳頭藥將熟矣先將銀打成二小罐急與彼合住兩乳繫在主腰內緊合不時取看恐有走失如取下一粒黍粒之大或一滴似金汁色黃異香急用硃砂末合成一丸或分三丸銀盒收貯擇黃道吉日煎乳香湯服之即得解形換骨永得長生取此丹時全要仔細如落地即入地不見如見太陽即化成氣而去矣戒之慎之製何首烏法取天壇王屋山的何首烏不拘多少如有十斤用黑豆一斗先以鹽水浸藥與豆半日撈起入蒸籠內蒸三炷香取出晒乾如此三次去水加酒浸透照前蒸三次後加蜜水拌之蒸三次共九次每一次三炷香數足晒乾去豆將何首烏研成細末收貯聽候後配藥用蓋何首烏得天地五行正氣包含五色所以滋飬五臟外皮黑滋腎水內紅絲補心血中心黃健脾胃皮內青益肝氣內含白消肺痰與常不同草木中之聖藥也製茯苓法擇雲南來的外黃內白結實好茯苓不拘多少用刀削去外面粗皮㕮咀成豆水浸一夜第二日上磨磨細以羅篩濾去皮膜多加水漂打轉澄清水仍攪打三五次湢去水盡用洗净白包袱一箇弔起四角將茯苓粉起在包袱內滴水乾方取入盤內加人乳拌勻晒乾再加乳又晒如此一月或半月方搗為極細末用磁器收貯聼候配藥用茯苓性溫平味苦氣清淡能安魂魄除驚悸補肝氣益心血利水道通神眀大有竒功為中焦之聖藥也製蓮粉法取蓮粉不拘多少先以水浸脹洗去紅皮擇去心連水磨成漿以絹袋紐去渣將粉加水漂去澀水待清湢水盡亦起在包袱內滴水盡方晒乾再搗成末以磁器貯收聼用蓋蓮粉性溫味甜氣薄能補中益氣壯心神消水榖除驚悸實肌膚為補中之聖藥也製芡􅧙法取硬壳雞頭打去壳搗成粉方著水漂待清湢去水將粉入盤中晒乾再搗為末收貯芡實性平味薄氣微清補中氣調胃氣益心血壯元陽乃助中之聖藥也製熟地黃法將淮慶熟地黃不拘多少先用酒洗净入籠蒸一炷香取出晒乾再用酒拌潤仍入籠蒸一炷香如此拌九次取出乘潤搗千餘下分小餅晒乾再搗再晒為末收貯聼用熟地黃性溫味甜氣厚得酒製而補諸經之虛益肝經之血能潤肺經之水注心經之液為補中血虛之聖藥也製人參法擇好孩兒黃揀參結實者用蜜水潤軟絹袋盛貯入酒米飯內蒸三次晒乾為極細末聽用人參性微熱味苦氣微厚能潤肺生津補諸虛不足生氣生脉乃藥中之聖藥也製川椒法擇鮮紅開口者用閉口者不用將粗紙襯鍋底微火炒脆碾為細末用紙鋪地下去火毒一夜方收聽用椒乃通氣之物去寒氣通滯氣清心眀目大有竒功也製小茴香法將茴香擇去梗末淨不拘多少微火同鹽炒令香熟篩去鹽為末亦用紙鋪地下去火毒一夜收起聽用茴香乃下部之藥極能益腎水和中氣助正蠲邪其功甚大河煉龍虎丸河煉龍虎石一斤首經至寶三錢金乳粉一兩右將三味共為細末放大氷盤內用乳膏對紅棗肉和勻入木臼內搗千餘下如膠相似取出丸如桐子大先用硃砂滚身次用金箔穿衣晒乾用磁器收貯於每日五更時或乳或蓮肉湯吞服一錢五分臨晚酒服一錢此河煉乃隂陽純粹之精因感物而滲泄于外以法而採煉成丹服之令人心血調而肺氣伸故痰火見之而消化喘嗽見之而平伏永無勞咳之患隂煉龍虎五精丸治勞瘵虛弱用龍虎石五兩金乳粉五兩紅鉛二兩白茯苓二兩五錢蓮粉一兩六錢芡實粉一兩地骨皮一兩右七味共合一處用乳膏為丸如梧桐子大金箔為衣晒乾用磁瓶收貯每日早取頭生男乳吞服一錢日進三服加至一錢五分服之七日痰消火息喘咳即止服之半月病覺蘇醒服之一月大病即安如常陽事虛舉以花頭小雞隂乾為末服之陽即不舉服藥時忌牛羊茶醋房勞等事服此五精丸先除去夙疾以致脾壯五臟安和氣血充溢百病不侵後久服小還丹始得延年益夀住世長生也陽煉龍虎五精丸用陽煉龍虎石五兩金之精茯苓二兩木之精蓮肉粉一兩水之精椒末一兩火之精小茴香二兩土之精右將五味各拌勻入大磁盤內外加乳粉二兩人乳五錢飛羅麵打糊為丸如梧桐子大每日起更時分無灰好酒吞服三十六粒此藥專補腎經生精氣益真水蓋腎居北屬水天一生水水為萬物之先故為人一身之依本醫經曰萬物有根則生無根則息先服河煉清淡火次服隂煉滋心血再服陽煉壯元陽陽壯生隂精精旺産真氣氣盛育元神精氣神全病從何生老子云神不外遊精不泄氣不散兮别無訣若還四象入中央不怕靈丹不自結此謂至言也既得復全之方再服至藥長生不老在我矣二煉龍虎五精丸用陽煉龍虎石二兩三錢隂煉龍虎石二兩七錢茯苓一兩五錢何首烏末七兩蓮粉五錢芡實粉一兩紅鉛一兩金乳粉二兩右將八味各等末入大磁盤內每日加頭生男乳一茶鍾拌濕晒二七日又加梨汁晒七日足加紅棗肉同入木石臼內搗千餘下令和軟方取出丸如梧桐子大先用硃砂末滚身次將金箔為衣晒乾入磁罐收貯勿令泄氣亦嘗取出亮照乾不可黴了每日早五更乳酒頓熱服一錢臨睡時半饑半飽用蓮肉煎湯服五分此藥服之半月身內如有風寒暑濕之氣自然消除服至一月故病除根服之百日五臟生精至一年返老還童先服五精丸將身中故病舊患並皆掃蕩使五臟六腑調和精神壯茂而長夀可期矣龍虎小靈丹用隂煉龍虎石八兩為末入大磁盤內于夏至日晒起每日調人乳日晒夜露遇天隂收藏每月入紅鉛一個同晒直至中秋受過天地金旺之氣于二十後方晒為末約稱一斤之重為止如分兩多少則是配合不均致氣血有不平矣用乳膏和勻略加些須棗肉搗軟丸如菉豆大于每日五更時分用乳酒均對頓熱服三十六丸靜坐片時使心血下降腎氣上升氣血交通隂陽暢運諸邪逃遁道氣常存矣復有歌訣于後歌訣曰神仙發祕機濟世功無比只此小靈丹妙奪隂陽理先天龍虎石道合乾坤髓半斤隂陽精配入首男乳日夜曝中天却從夏至始月月入紅鉛直至中秋止色如桃花鮮噴鼻甘香美日服一分半送下華池水傳自生天經初服人如醉服之至七日體熱何足畏時進蟠桃酒藉以滋靈氣漸至一年餘頓覺超凡類肌體潤且溫延年歷人世此丹尚未服大丹安敢餌四體俱屬隂服丹陽填髓先言積隂功功成幸相遇非人莫亂傳妄泄天機罪拱持三光前運自華池水寅初服一粒仰叩神天地此歌即是祕妙口訣非人勿示慎之戒之小還丹用隂煉龍石一斤首經至寶二兩右將二味各為細末共和一處以大磁盤盛貯從夏至日起手每日加人乳一碗調拌均勻放置髙閣去處日晒夜露第二日早研碎又拌乳日日如此一月進鮮紅鉛一個製入于內同晒同露直晒至八月十五日天地金旺之時受過了月華神水復入梨汁三五次方晒乾為末用乳膏紅棗肉搗和令軟丸如桐子大外用金箔穿衣隂乾磁罐收貯不問老少每日半夜子時分乳酒對半頓熱吞服一錢念長生得道天尊九聲靜坐一時方睡初服覺熱天眀取人乳一鍾服之其熱自退服久不覺此小還丹即前小靈丹是也一日一錢半年該三十六兩所謂一斤淡石每日晒積乳共重二斤外將紅鉛四兩共重二斤四兩只可一人服不可缺了每年晒一次此藥服之一年百病不生隂陽和暢服之二年行步輕健肌膚榮光服之三年髮白返黑齒落更生服之一紀住世永年永作地仙也今將口授訣歌並注於後歌曰夏至一隂生晝夜當天立日餐金烏精夜食玉兔液夏至乃五月節中也一隂生于五陽之下是為木火通明之時此時乘天地咸暢之機攬隂陽宣理之氣于是晝承日之精夜吸月之液是以日為真火月為真水水之滋養形中生氣矣餐食者精光交休之義其法以前掃起霜于夏至一隂生之後以磁盤盛貯晝則照于日以餐烏精夜則鞠眀于月以食兔髓此不論曉夜當天露立自然日月精華貫徹藥也歌曰半斤四兩乳相配成戊巳更有月月紅照月加于裏乳者血氣之聚也嬰兒服之可以滋養飢體榮腴經脉况配靈質灌溉日月精華有不充飫人之榮衛乎故兩情相孚則隂陽之精華感合隂血作乳則彼此之神氣共處是乳成戊巳二土猶言媒娉傳道使天之日月精液人之男女靈質皆有係屬不遊散也月月紅者實女首經紅鉛也逐月加增則精液交馳而一氣感應于虛靈也其法以前霜每劑半斤加入淨乳漸和同晒乾再加約共乾一十二兩是半斤霜四兩乳乃為足也待至一月則進紅鉛一次進之三月三次為三進紅鉛矣歌曰莫辭勞苦心煉至中秋日色如桃花鮮入口甘且美修至靈質不加勤勞莫能聚精餐精服液不以辛勤莫能㑹神故聚精會神皆禀人之苦心則是人心意內外兩通專志不違天人協化也但煉至中秋可以息功其故何也火滅生土天之令也土旺金盛候之全也其取義曰秋石蓋擬諸此也色如桃花者靈藥可服之驗也入口甘美者其味滋益之微也其法愈精而金土愈旺故有斯功焉其法前餐食烏兔之霜並和乳經之藥自五月中氣心專志决如法煉至八月中秋晝夜勞心不可辭苦直候色如桃花甘美充腴乃為藥靈之成矣服之夀命長彭祖兹可比名曰小還丹祕之莫妄語藥靈質美久服自可益夀五行精爽餌之寧不延年故彭祖永命可以同塗甚言藥物益命之極此乃人元配合以類交飬則其以精益精以氣益氣以神益神之妙名曰小還丹焉不比他方金石草木之類故戒莫妄語以泄中和之祕其法以前通靈之藥用磁罐收藏封固以備不時啓服每日服三分醇酒送下先天服食隂煉龍虎金丹用龍虎二石八兩先天元氣蟠桃仙酒後天真鉛首經至寶二兩先天真鉛乳香一兩黃婆通引氷片一錢眀目通竅硃砂纒身安鎮心身金箔穿衣安魂鎮魄日晒月露取真火真水右將各味俱製成粉放磁盤內擇雞犬不到靜處置一木架于黃道吉日起手每日加乳拌潮日晒夜露七七四十九日以乳為黃婆合和鉛汞三家相見晝夜受日精月華之靈此真隂真陽即真火候也古云自有天然真火候不須柴炭及吹噓每遇天隂收藏此藥受了日月精華以成真丹砂加乳膏搗和為丸如菉豆大先用硃砂纒身次與金箔穿衣晒乾收貯專治男女五勞七傷諸虛百損身體瘦弱咳嗽吐痰不思飲食夜夢鬼交遺精婦人小兒一切雜症並皆服之每日清晨五分熱酒送下詩曰東方青龍西白虎南是朱雀北𤣥武黃婆㑹合入中央烏兔煆煉名真火四十九日變通靈金衣為丸潤丹府空心熱酒服五分益夀延年似彭祖羅浮真人三家相見秋石方先取向陽黃土八斗背隂黑土八斗拌勻用缸八口每缸二斗盛貯每日用童男女便漸漸添滲入土內四十九日日晒夜露日足方止將土造成一器外方內虗圓合在一處鐡線扎緊封口徑要三寸六分厚用三釘釘于地下一尺六寸高周圍磚砌定用炭火四圍均勻先文後武打三炷官香冷定取開內生白雪如瓊玉之狀取入銀神室內埋土出火毒九日乳為丸每日服一分加至二三次白湯送下久服筋强力壯百病皆無勝補藥百倍也仙傳秋石配合十精五子丸用陽煉龍虎石十兩隂煉龍虎石六兩煉法具前人參當歸身酒洗葫蘆芭微炒芡實蓮花蕊微焙鹿茸酒浸酥炙黃仙靈皮葉蒼术米泔水浸炒枸杞子酒浸晒乾已上十味十精藥兔絲子酒浸蒸七次巨勝子焙車前子酒浸炒柏子仁取肉已上五味五子之藥各二兩沉香一兩粉草一兩辰砂五錢水飛極細三味升降之藥加白鉛一兩即人乳也右將衆藥均對分兩用紅棗肉加蜜搗合為丸如梧桐子大每服一百丸白湯送下日進三服服至百日百病消除身輕體健效難口述也龍虎合配五氣丹法蓋秋石延命之術乃上古神仙留傳祕法也其妙不外乎隂陽真一交媾而成非心志之專而遇眀師授受之真又烏能奪造化之機而延夀命于無彊也哉噫今之學仙者徒以金石草木修製成丹而望延夀殊不知皆異類之物豈得與人相契乎蓋人禀天地真一之氣憑隂陽純粹之精感合而成非隂陽不能變化非真一不能還元經云竹破須將竹補宜又云取將坎位中心實㸃化離宮腹內隂豈得他物而同類乎豫因成化癸邜南遊遇仙師尹真人傳授內丹祕訣兼示以三峯真人人元配合五氣接命還丹方法先製服五氣築補完全次㑹合三元結成還丹方得超凡入聖紅鉛真陽鉛也秋石真隂汞也乳酥即真土也鉛汞得土而丹成精氣得神而㑹合故餌之者夀可延而仙可期也今將五氣丹藥具後隂煉秋石八兩紅鉛四兩人乳粉四兩牛乳粉四兩酥油四兩已上五味俱製成粉和勻用布裹定綿纒縛緊聼用將糯米三斗浸一夜次日上甑蒸將前藥埋在米中照嘗蒸熟冷定取出藥來將飯用小麯拍成浮米酒用瓶一二個裝滿前藥丸成三百六十丸擇吉日服每日用酒一鍾吞服一粒酒藥俱按三百六十火候周天之數也此藥符合天機造化其妙難還不可輕泄益容仙丹淡秋石五兩味淡補先天之元氣白硼砂二兩五錢止嗽化痰生津元氣片腦一錢一分蕩諸邪眀目通竅薄荷五兩清潤頭目消化老痰柏子肉五錢清和咽膈牛黃五分除邪去熱眀目清心哈芙蓉二分溫暖丹田除痰止嗽腽肭臍五分酥炙補胃暖腰回陽助精甘松五錢開胃蘇脾通氣和血硃砂一兩五錢水飛細末穿衣安魂除煩粉草一斤去皮調和藥性熬膏合藥為丸和諸藥性善解百毒將前九味各為細末粉草膏子為丸如菉豆大硃砂穿衣每日不拘早晚將一丸入口噙化以致津液滿口咽下丹田澆灌諸經各絡氣到處自然輔正除邪能使肌膚光潤久服則百病不生萬邪歸正詩曰神仙留下濟人丹安魂定魄駐容顔寬胸順氣神凝靜化痰止嗽暖丹田生津消渴甘露降透竅眀目返本源每用一丸常噙化益夀延年世上仙先天真一丹此丹乃大茅君授與二茅君三茅君地仙長生仙藥訣曰上品神仙藥先天真一丹每朝吞百粒却老返童顏能轉周身氣神功內返還華池灌神水滴滴注𤣥關隂符調火候默默自抽添至誠修煉服管汝夀齊天用白虎首經粉九鼎隂煉秋石四兩乳粉四兩乾山藥四兩石澗菖蒲九節四兩五月五日採取茅山蒼术四兩米泔水浸去粗皮甘州枸杞三兩珍珠一兩旱蓮子草二兩菊花蕊一兩甘草一兩右各味製成細末煉蜜為丸如菉豆大每服六七十丸加至百丸空心白滚水下道藏班龍黑白二神丹鹿茸二兩酥炙陳皮二兩當歸四兩酒洗淨地黃八兩取汁為膏茯苓二兩人乳製鍾乳粉一兩水飛用人參四兩柏子仁二兩枸杞子二兩麥門冬一兩生地黃汁一碗白术二兩沉香五錢右為末煉蜜為丸如桐子大每服五六十丸秋石湯下治虗損怯症五勞七傷氣血俱虗顔色憔悴無不治之服之美顔色和五臟壯精神美鬚髮補羸瘦功莫能述長生班龍飛步丹用上全方加上白膠二兩紫河車一具首生男子為佳腽肭臍一兩緑毛小龜肉一箇同河車煮以桑柴文武火成糜連汁用搗細和前藥末再入人乳汁一碗同膏和丸如桐子大每服五六十丸治虛損痿症經驗蒼术丸又名鉛汞丸用蒼术一斤半取膏入藥四兩其性燥而辛烈去內外之濕引藥行于表裏而煎為膏者所以變其質似猶伊尹放太甲於桐為善以成濟世之功也用糯米泔浸日半撈起刮去粗皮見白晒乾又將童便浸日半撈起清水洗淨晒乾又煮酒浸日半晒乾仍用糯米泔澄清煮术以爛為度然後於陳米飯上蒸一層飯一層术要取榖氣為佳飯上用荷葉蓋定不泄榖氣尤妙晒乾研細末入藥黃柏刮去粗皮八兩製炒為末入藥六兩其性雖寒非芩連之可比黃柏能通腎以瀉膀胱之火動則水不寧所以用之者瀉火而寧腎水也銼碎用酒浸三日要翻覆浸取出晒乾將蜜拌黃柏用荷葉鋪劄稜起水面上攤黃柏荷葉上蒸一次仍將蜜拌再蒸再晒如此三次用紙鋪鍋底黃柏攤紙上焙茶褐色為度研末入藥知母去皮六兩其性潤而老年并虛弱之人火易動津液受尅而嘗涸所以用此專補腎水蓋能制烈火之故也銼碎用酒浸三日去酒晒乾隔紙炒焙研細末入藥枳實四兩老年并虛弱之人火最易動津液受尅而化為痰或平日膏梁之積而成痰蓋枳實非他輩之可比且半夏化痰其性燥烈而服之反渴渴增則貪飲矣愈飲愈濕受外邪而痰愈結也貝母去四種痰能表而不能裏南星雖曰去痰能上而不能下因風可用今枳實之功不可勝計銼碎與麩皮同炒茶褐色去麩皮研末入藥白术四兩大能補脾老年虛弱之人胃火必盛而食善消愈消愈食則脾豈有不損則食不能尅化而用庸消之劑則反傷脾脾胃受傷是無本矣豈能安乎然必用此以禆脾似猶修武僃而禦寇也銼碎用紙鋪鍋底將麩皮拌白术攤紙上不住手撥焙聞其藥味無麵氣為度研末入藥當歸五兩其性溫四等治血流者能止凝者能行虛者能補氣者能和老年并虛弱之人火旺水衰血必受傷或流或止或凝或行可不用此以和之用酒浸洗銼碎晒乾研末入藥熟地黃四兩老年并虗弱之人諸血最虛皆由心之耗而肝之枯也是以四肢血怠足不能履手不能持耳不能聼目不能視腸不能通而多結也所以用此劑以補一身血衰也用酒洗銼碎研末入藥乾山藥四兩其性溫平主腸中補虛除隂熱邪氣益氣力長肌肉治頭風止腰痛補心肺不足潤皮毛主治泄精健忘銼碎晒乾研末入藥白茯苓刮去粗皮淨三兩其性去濕利小便調胃氣伐腎邪㵼火久服安魂飬神延年益夀而無消渴之患銼碎晒乾將紙鋪鍋底用麩皮拌藥攤紙上不住手撥焙至藥無味為度研末入藥防風去蘆五兩老年并虛弱之人血皆損少則腠理不密賊風易入必用其驅出之蓋防風之性威而不猛銼碎晒乾隔紙焙乾燥研末入藥真鉛四兩隂分之上藥即人乳多以此代鉛其鉛乃取室女天真未喪欲心未動而自然來者得純隂之正移隂補陽自然而然者其功不可勝言倘人不待時急取隂分之上藥代之用亦不減於真鉛也用少年婦人乳二碗其乳者血之化也隂分之上則為乳隂分之下則為血所以用此者以血補血老年并虛弱之人身血必衰此藥之正所謂布衣破而補以布也將麵入乳中調勻打糊丸藥用真汞四兩即秋石也其性鹹能入腎而用童便煎者蓋因元氣之未泄而純陽之未喪煅煉而成所以補元氣老弱之人精氣必損須用此藥滋補研末入藥右將各藥細末拌勻用乳二碗入麵打糊拌藥杵勻丸如桐子大晒乾收貯日漸服之每服五六十丸淡鹽湯空心下此藥服之專治諸虛百損身體倦怠氣虛中滿不進飲食遍身風濕麻痺眼目昏花腰痛頭暈手足缺順行履艱辛虛怯痰火遺精白濁小便不利胎前産後赤白𢃄下有惡疾者服此𤣥妙無疾者服此强筋骨悅肌膚駐顔色健脾胃進飲食添精補髓益夀延年其功不可盡述寶之度世丹如有人抱一切危疾及癱瘓痛楚久在床枕且暮清心服之戒其嗜欲能安神志定魂魄順五臟和六腑添智慧烏髭鬚通脉絡除勞損續絶補敗蓋此藥禀天地中和之氣不燥不熱可以長服如有惡疾肢體不安行步艱辛飲食少進或寤寐不安或痛連筋骨或十生九死服之是疾皆除駐悅顏色滋潤肌膚聰眀耳目四肢强健延年益智功效不可具述枸杞子仙經云此藥是熒之精益血海足筋骨補氣安神甘菊花是木之精服之聰眀耳目去寒濕手軟利九竅通三焦去萼用逺志治胃膈痞悶去憂邪潤肌膚壯筋骨用頭捶破取去心車前子是鎮星之精益胃安魂魄駐顏去夜驚妄想生地黃用乾者去蘆經云是太隂之精開心神去邪養脾胃榮衛之神巴㦸仙經云是黃金之精去心痰補血海身輕延年覆盆子是神水之精助陽輕身安五臟之神白术是太陽之精能正氣吐逆消食化痰濕飬榮衛肉蓯蓉擇有肉者其藥一百年一生入小腸補下元酒浸七日石菖蒲細小九節者能升智慧添神明暖下元補虛減小便兔絲子酒浸七晝夜晒乾炒令黃色為度牛膝治濕腳氣腰膝疼痛去蘆用酒浸七日細辛療百病順氣益血海去苗用續斷治五勞七傷何首烏性濕無毒地骨皮去土右各用本土所生逐件擇洗各等分搗為細末煉蜜和丸桐子大每服三十丸空心溫酒送下服一月百病不生服一年至二年返老還童顔貌若蓮花是病皆除元是仙人之術信之信之神仙不老丸養榮衛潤三焦滑肌膚去邪氣惡蠱等疾選竒方云豫幼年勤瘁衰不待時方三十而白髮生自是時時摘去四十九則不勝芟矣乃聽其自然未幾遭喪天之慘羅哭子之憂心志凋耗白者益多餘者益黃久之忽遇金華山張先生謂豫曰豫今半百容貌衰甚可以為門戶計進補治氣血以强色身之藥乎慨然傳一方會初得之異人拜而受之遂合服逾百日覺前時之白者黃者皆返黑矣見以為異豫遂名之曰神仙不老丸以其藥品槩括為詩曰不老神仙功效殊駐顏全不費工夫人參牛膝川巴㦸蜀地當歸杜仲扶一味地黃生熟用兔絲柏子石菖蒲更添枸杞皮兼子細末蜜丸桐子如早午臨眠三次服鹽湯溫酒任君餔忌餐三白并諸血能使髭烏髮亦烏用人參團結重實上黨者佳去蘆焙乾稱二兩枸杞子色紅潤者去蒂酒浸一宿焙乾二兩兔絲子以水漂去浮取沉者酒蒸焙乾二兩石菖蒲去毛節米泔浸一宿節密者稱一兩柏子仁色紅新者去壳取仁一兩細研臨時入和藥內川牛膝長而潤者去蘆酒浸一宿焙乾一兩半杜仲刮去粗皮搗碎生薑汁拌炒斷絲一兩半地骨皮色黃者刮皮浮淨稱一兩地黃渣以水浸重者用以浮者搗取汁浸沉者蒸透焙乾如是三次色黑者味甘熟稱一兩又用生沉者一兩酒浸各用竹刀切忌鐵器川當歸揀大者去蘆頭二兩川巴㦸用黑色紫沉大穿心者不用色黃細者捶去心酒浸焙一兩右件揀選精製如法勿晒用慢火焙乾若大燥則失藥味待乾即於風前略吹令冷熱相激燥淨稱研為細末煉蜜擇火日搜和於大臼內搗千餘槌丸如桐子大每日空心午時臨卧每服七十丸溫酒鹽湯任下忌食葱白韭白蘆服真粉及藕諸般血蓋諸血能破血又解藥力若三白誤食亦無他說止令人髭髮不變黑耳大能安養榮衛補益五臟調和六腑滋充百脉潤澤三焦活血助氣添精實髓是最要節色欲使藥力效之速也松黃頤夀丹松香一斤嫩白瑩淨者碾為末篩過去渣用新汲水十餘碗砂鍋內桑柴火煮一炷香不住手攪冷定傾出苦水仍換新水更煮更攪如此十四五次直待水煮不苦為度再用白酒四五碗亦煮一炷香冷定取出晒乾碾為細末熟地黃半斤懷慶肥大者揀去不黃不用浸蒸爛搗成膏烏梅肉六兩安吉者佳焙乾碾為末右三味和成一處搗和勻如乾散難丸加酒打麵糊少許和之易丸為度如桐子大每服三五十丸茶酒白湯任下食前服服藥時忌豆腐製藥不可犯鐵器大補隂膏安心神健脾胃滋肺金補元氣茯神二兩去皮心最能安神定志逺志二兩去梗炒乾用人參五錢去蘆能開心眀目養精通神治脾胃陽氣充足白术四兩切片水洗去油晒乾能除胃中濕熱健脾胃茯苓二兩去皮補定悸橘紅一兩五錢去白主下氣寬中消痰止嗽貝母一兩五錢薑湯煮過能止嗽療煩渴安五臟散胸中鬱結甘草三錢炙去皮主補三焦元氣和消藥毒飬血補胃紫苑一兩洗去土補虛止渴安五臟阿膠一兩蛤粉炒成珠能養血除嗽五味子五錢能眀目補胃益肺金當歸身三兩酒洗能和補血生地黃一兩五錢酒洗能凉血補血滋腎水白芍藥二兩炒益津液熟地黃一兩五錢酒洗蒸九次晒九次大補血壯腎善補鬚髮天門冬一兩五錢去心能保肺氣麥門冬一兩五錢去心能保肺氣令人肥健兔絲子二兩水洗去土晒乾能添精補髓枸杞子三兩蒸焙乾能眀目延年黃蘖二兩去皮鹽水炒乾能補滋腎水山茱茰二兩湯浸知母一兩鹽水炒乾能補腎水凉心火原方內有欵冬花一兩桑皮一兩柴胡一兩五錢山藥二兩後進呈許堂改除右切片用井華水二十四碗入鮮薑四兩二錢核桃肉圓眼肉棗肉蓮肉各二十四個烏梅肉十二個春浸半月夏不浸秋浸一日冬浸一日夜於靜室內用炭火煎至藥計五碗去藥渣用好蜂蜜二十四兩煎一滚用紙滲去面上沫入前藥同煎至滴水不散為度用磁罐盛白紙封口放水盤中露罐口七日去火毒取出每日空服白滚湯調下三茶匙忌食羊肉益元七寶丹用何首烏赤白各一斤用米泔水浸一日竹刀刮去皮打塊如棋子大另有製法具前牛膝八兩同前何首烏用黑豆五升木甑沙鍋蒸三次晒三次為末加鹽一二錢同浸枸杞子八兩酒浸洗淨晒乾為末茯苓赤白各一斤赤者用牛乳浸白用人乳浸俱一宿晒乾為末兔絲子八兩酒浸三日晒乾為末破故紙八兩炒乾為末當歸八兩酒浸一宿晒乾為末右七味各不犯鐡器煉蜜為丸如彈子大日進三丸早辰空心酒下午後薑湯下臨卧鹽湯下初服三日小便雜色是去五臟中雜病至二七日唇紅口生津液再不夜起三七日體健身輕兩乳紅潤至一月鼻頭酸是諸風百病皆去四十九日目視光眀兩手火熱精氣通實髮白返黑齒落更生陽事强健丹田如火行走如飛氣力加倍非人不可輕泄乃神仙祕方補胃瑶臺雪方蓮肉二十兩去心為粉土白术十兩麩炒去麩用陳皮二兩白茯苓二兩苡仁八兩芡實十兩山藥八兩砂仁一兩川椒一兩五錢炒去汗為末已上同和入白糖二斤和勻每早白滚湯調服三二錢開胃進飲食脾家聖藥也寶之寶之紫霞丹治痰湧咳嗽傷酒解醒或口有穢氣津苦舌乾凉膈平胃解愠安神又為清喉要藥硃砂四兩一半為衣官硼砂五錢沉香一錢桂花一錢青木香一錢細芽茶二錢訶子一錢白豆仁一錢金錢薄荷四錢氷片三分百藥煎一錢𤣥眀粉二錢右為細末煉大甘草四兩煎汁為丸如小豆大硃砂為衣入口一粒一次噙化延齡聚寶酒用何首烏四兩去皮赤白兼用生地黃四兩鮮嫩肥者勿犯鐵器天門冬二兩去心槐角子四兩炒黃色十一月十一日采石菖蒲二兩乾菊花四兩只用花枝葉不用五加皮二兩用真正的蒼术二兩米泔浸一宿竹刀去皮毛茅山的好枸杞二兩去蒂研碎甘州生者黃精二兩用鮮的細辛二兩洗淨白术二兩極白者油黃者不用防風二兩去蘆人參二兩去蘆茯苓四兩鮮嫩者熟地四兩忌鐵器麥門冬二兩去心蓮蕊四兩桑椹子四兩黑紫者蒼耳子二兩炒揚去刺肉蓯蓉二兩黃酒浸去鱗沙苑白蒺藜二兩炒去刺天麻二兩如牛角者甘草二兩用大者炙去皮牛膝二兩去鬚杜仲二兩薑汁浸一宿炒去絲當歸一兩鮮嫩者右各味照方擇淨稱定分兩足務要真正藥材切為咀片裝入生絹袋內用無灰高黃酒一大罈盛九斗十斗大罈方可將藥裝入罈春浸十日夏浸七日秋浸七日冬浸十四日將藥酒每五更空心服三小鍾還卧片時午間再服三鍾尤妙用酒忌生冷生葱生韭腥無益之事少幹無益之物少吃白蘿蔔常忌致誠服者自有功效若服一日歇二三日不依前法取效鮮矣夜間還服二三次豫年三十九歲服起于六十四歲鬚髮如漆齒落更生精神百倍耳目聰眀比前大不同矣此方不輕係身命養生至寶仍將藥渣晒乾研末煉蜜為丸如桐子大每服五十丸空心無灰酒下延夀酒藥仙方一名養夀丹専治男婦逺年近日諸虛百損五勞七傷左癱右瘓偏正頭風口眼歪斜半身不遂語言蹇澀筋脉拘攣手足頑麻渾身瘡疥腸風痔漏紫白癜風寒濕腳氣膀胱疝氣十膈五噎身體羸瘦腰腿疼痛四肢無力皮膚生瘡耳聾眼昏下部虛冷諸般淋瀝婦人經脉不調臍腹疼痛脅背膨脹黃瘦面肌口苦舌乾嘔逆惡心飲食無味四肢倦怠神鬼驚悸夜多盜汗時發潮熱月事或多或少或前或後心中悶塞不通結成瘕塊時作刺痛或子宮積冷氣毒虛敗赤白𢃄下漸成虛瘵並皆治之此藥方互相製服其和暖香甘能追百病常服補脾養丹田和氣血壯筋骨益精髓身體輕健眀眼目安五臟定魂魄潤肌膚返老還童延年益夀其功不可盡述當歸去蘆人參去蘆白茯苓去皮草烏去皮烏藥杏仁去皮尖何首烏去皮川椒去目川烏去皮尖五加皮肉蓯蓉去皮尖枸杞子砂仁已上各五錢淨木香牛膝去蘆枳壳去皮尖乾薑火炮虎骨酥炙黃色川芎香附子炒去毛香白芷厚朴薑汁浸陳皮去白白术炒獨活羌活麻黃去節官桂去皮白芍藥半夏姜汁浸生地熟地天麥門冬去心五味子防風細辛揀淨醋酒洗去蘆沉香蒼术米泔浸去皮小茴香鹽炒黃已上各三錢破故紙酒浸微炒核桃仁湯浸去皮甘草火炙三味各一兩淨紅棗肉酥油二味各半斤白沙糖一斤右將前藥用細絹袋盛之用燒酒一大罈浸藥三日放在大鍋內用湯浸罈煮兩個時辰取起掘一坑埋三日出火毒取出每日用酒一小鍾病在上食後服病在下空心服飲酒畢後將藥查晒乾碾為細末用好花燒酒打糊為丸如梧桐子大每服三十五丸空心好酒下羅真人延夀丹治男子五勞七傷諸虛不足隂痿氣弱無力心腎不交精神缺爽小便頻數腰膝疼痛婦人赤白帶下起居倦腳冷麻痺不能久立腎氣不和臍腹疼痛經水愆期無孕嘗服此藥隂陽升降無偏充實肌膚填精補髓精神倍長强壯筋骨悅顔色固真氣和百脉正三焦烏鬚髮堅齒牙耳目聰眀老能輕健斯藥之效何可盡述服至五日體自輕健至十日精神倍爽半月之後氣力壯勇二十四日後眼目清朗語音響亮一月之餘飲食大進顔色紅潤步履輕健冬月手足嘗暖此藥不熱不燥老幼並皆可服乃仙方也慎勿輕傳乾山藥一兩去皮人參一兩去蘆白茯苓一兩去皮川牛膝一兩酒浸杜仲一兩薑製去絲龍骨一兩川續斷一兩去蘆鹿茸一兩當歸一兩酒浸洗山藥苖一兩北五味一兩熟地黃一兩酒浸石菖蒲一兩楮實子一兩去穰破故紙一兩炒麥門冬一兩去心遼枸杞五錢如下元虛冷加鹿茸五錢附子五錢右為極細末擇天氣晴和揀選好日以酒糊為丸如梧桐子大每服五十丸或六七十丸淡淡鹽湯送下修合之日須忌婦人雞犬之類日進二服亦可大有功效也草還丹補益夫草還丹者不用金石不加燥熱不傷五臟只係草藥為用全在製度之妙將水火無窮之術奪丹砂燒煉之功大壯脾胃進美飲食蓋脾屬中央之土乃五臟之主當先調養五臟俱虛百病由此而生此藥益精髓固元陽輕腰膝安五臟通九竅令人耳目聰眀有一老人年七十之上服此藥悅顏色烏鬚髮固齒牙夜能書細字延年益夀乃仙家之良劑平補大有神效蒼术四兩用酒醋米泔水鹽各浸一兩茴香一兩新者破故紙一兩酒浸一宿川練子一兩木香牛膝葫蘆芭地龍山藥枸杞茯苓川山甲各一兩右件晒乾為細末好酒糊為丸如桐子大每服三十五丸溫酒送下鹽湯亦可空心服以乾物壓之使力行百步日進二服草靈丹此藥延年益夀添精補髓烏鬚髮固齒牙强筋骨壯氣血返老還童冬月服之手心與腮面如噀血行步輕飛七十老人誠心服餌健若少年别有竒功不能盡述服之一月乃見其效如要試驗拌飯與白犬食之一月變成黑犬此其驗也老人服至十日便不夜起服藥者不可賴此頻行房事忌黑羊肉鵓鴿桃李果子恐減藥力保而慎之不熱不燥亦無飛走金石藥味過一月耳目聰眀髮白再黑不可輕忽真川椒四兩去目炒出汗白茯苓二兩去皮炒川烏一兩去皮臍茴香二兩􅐭炒蒼术四兩酒浸焙乾甘草二兩粉去皮炙熟地三兩酒浸山藥二兩右為細末煉蜜為丸如桐子大每服三十丸至四五十丸空心溫酒下以乾物壓之固真丹同上方加首經一次鹿跑草一兩回陽無價至寶丹用川練子取肉二兩川牛膝一兩熟地蛇床子川山甲肉蓯蓉茯神巴㦸五味子各一兩乳香三錢鹿茸沉檀香仙靈皮甘草各五錢人參一兩破故紙五錢大茴香一兩澤㵼一兩烏藥二兩兔絲子五錢鳯眼草二錢檳榔一兩葫蘆巴蓮心各五錢右為細末煉蜜為丸如梧桐子大每服三十丸空心好酒下治五勞七傷四肢無力下元虛冷夜夢遺精陽痿等症神仙紫霞杯昔宋英宗皇帝朝暮思想懇禱祝告上蒼願祈降子忽一日有一道者身穿草衣頭挽雙髻腰懸藥葫蘆擕一水火籃手執龍虎首拄杖偶至玉階羣臣云這道人不知從何入朝衝入金門奏道吾乃蓬萊到此因陛下祈子􅈤切貧道聞知奏奉蟠桃延年益夀九轉紫霞杯乞陛下允納帝曰此酒此杯是何仙術從何而至道云此是純陽真人曾慶蟠桃㑹賀王母仙酒杯陛下飲服帝曰有何益于朕道曰但令宮妃有子帝聞甚喜著光祿寺筵宴奉賞道曰道人不用筵賞傳下酒杯法化一道青光灼然而去帝稽首叩謝故得子之多偈曰蓬萊仙賜紫霞杯九轉靈丹藥更竒萬病盡消身體健還童返老似嬰兒用硫黃八兩雄黃五錢乳香三錢沒藥三錢辰砂五錢血結二錢沉香二錢麝香三錢檀香三錢降香一兩牙香二兩茅香一兩人參兩附子五錢川烏二兩川芎四兩當歸五兩肉桂四錢破故紙二錢肉蓯蓉三兩黃精八兩白芷三錢枸杞一兩芍藥五錢右㕮咀入油煎先用油一斤浸諸藥三二日熬煎藥焦黑色濾去查再復油鍋化溶硫黃再傾出上面清油却將鍋底硫黃傾入水盆內洗去泥土砂石仍將原油化硫黃周而復始三次又傾出上面油存黃另傾出稱每硫黃一兩用銅杓化開入前麝香末三分攪勻先以小酒杯一個用紙封口緊中開一孔將化開硫黃藥傾入酒杯內一蕩做酒杯一個如此傾做數個冷定酌酒做法如澆嚮糖相似沉香內補丸能除百病補諸虛健脾胃進飲食添精補髓延年益夀服之年餘身輕體健婦人服之尤妙沉香五錢廣木香五錢乳香沒藥各三錢人參五錢母丁香三錢海馬一對酥炙石燕一對燒紅醋浸鹿茸五錢酥炙仙靈皮五錢酥炙韭子五錢八角茴香五錢木通一兩炒穿山甲五錢灰炒小茴香一兩炒黃甘菊花五錢盬炒川練子酒浸一宿去皮核一兩蛇床子一兩白茯苓一兩大附子一個炮去皮川椒一兩去目枸杞一兩麝香少許丁香五錢葫蘆巴入羊腸內酒煮一兩右為細末酒糊丸如梧桐子大每服三十丸空心溫酒下仍以乾物壓之忌生冷腐粉魚腥諸血四十九日又洗藥用紫梢花松節皮硝三味煎水每日溫洗之遵生八箋卷十七
