痛止若再痛再服痛定乃止骨折者兩次即愈如齒痛者一貼牙根立止守仙五子丸方治服金石藥毒作垂死服之可生十之八九如服金石之藥而未發者亦當服之餘甘子覆盆子兔絲子五味子車前子各五兩右搗如麵二三月取枸杞莖葉搗汁二大碗拌前藥令乾拌盡七八月再取蓮子草搗汁一大升拌藥令乾後用杏仁一大升用好酒研汁五大升銀砂器內煎無苦味加生地黃汁半升真酥五兩鹿角膠五兩共杏仁汁煎溶下前五子末急用柳條攪勻衆手丸如梧桐子大每日酒服三四十丸忌豬肉韭芥蘿蔔服之百日金石毒除金丹之氣流通五內潤澤血肉萬毒悉消鬚鬢返黑老者還童皆因制其隂陽二性彼此相備也華蓋丹此黑鬚髮妙藥用出山黑鉛三斤打作片子用鐵鎚眼鉛片如方條以繩穿之用淨瓶盛米醋一斗將鉛片懸挂醋內以紙密封瓶口泥頭七日後開看取鉛片上起有白霜用竹片鵝翎刮下又封又刮三四次後鉛片須換又浸醋兩次一換取霜一兩入氷片半分研如粉天露水為丸梧桐子大每夜口含一丸不語自化能變白返黑一生不白白者二十日後復黑光潤又能延年益夀除熱毒風氣筋骨疼痛一生忌大蒜再不可喫辟寒丹辟寒氣省綿衣用雄黃赤石脂粘舌者佳丹砂光明者乾薑各等分為末蜜同白松香木為丸如桐子大酒下四丸服十日止不著綿衣赤身可行水內辟暑丹用雌黃研水飛白石脂水飛丹砂研細黃泥裹燒如粉磁石搗水飛去赤各等分人乳同白松香化為丸小豆空心湯下四丸服三兩後夏月可衣裘褐炎氣不侵二方仙傳頗有神驗治牙日用妙方用川椒一兩北細辛一兩百部一兩雄黃五錢青鹽一兩白鹽一兩裝入荔枝殼內大火化為一箇白塊取起研碎同前五味為末早暮擦齒永絶疼痛大解不通方用松仁八逹杏仁棐子米泔水浸一日核桃柏子仁各等分白糖霜和為餅子即通治老人小解祕澀老人有此即是病也用人參白术牛膝茯苓陳皮山查當歸白芍藥各一錢甘草五分加生薑三片煎服春加川芎夏秋加黃芩門冬冬加乾薑如乾薑如更短倍加當歸三子養親湯用蘇子蘿蔔子白芥子右炒香泡湯隨意服開胃炒麵方用白麵五斤茴香二兩薑末三兩杏仁八兩枸杞八兩核桃八兩芝麻八兩右研為末白湯點服食柏葉百草救荒方嘗柏葉百草飽肚不飢避難絶食當以此自保杜仲一斤去皮醋浸一宿焙乾為末荆芥穗一斤為末薄荷八兩白茯苓一斤去皮為末甘草一斤去皮右蜜丸小指大將柏葉或百草缺淨和藥入口內細嚼為妙遺精白濁奇方白濁一月係缺此後皆痰汁也故當以治之用山梔子三錢炒黑燋色用水二鍾煎至一大鍾取起先將蚯矧新瓦上炒燥為末每稱二錢調梔子水服久病不過三服即愈消綿花腫塊破爛仙方用五爪蔥一名胡蔥每取四兩加鹽缺搗爛攤勻三四分厚餅貼在瘡上以絹條縛定即愈缺解中蠱并中百物毒方醫書中惟此方最少揭以備用解中百毒砂仁末生韭菜搗汁靛青石菖蒲末白礬末二味等分新汲水調服淡豆䜴麥門冬三味搗服雄黃明者酒調服一錢生麻油喫一二盞吐出惡水效解中一時感冒天地毒氣入腹腫脹作痛犀角為末一錢升麻一錢麝香三分共為末水調服解中山巒瘴氣毒犀角一錢羚羊角鏟為末一錢雄黃一錢麝香三分水調服解中飛絲毒紫蘇葉嚼之立效解中百藥毒橫紋甘草作片細嚼久喫有效蠶子紙出過蠶的故紙燒灰研服一錢冷水下中毒靣青腹脹吐血者服之立活荸薺取根調靛青汁同服效白扁豆大豆小豆單用一味水調服一吐即好白礬末一兩水調灌耳內鼻中灌後口內出黑血不要驚怕其毒即解解服藥餌過多生出毒病頭腫如斗唇裂流血或心中煩悶或撮臍痛者是也黑豆菉豆各半升煎濃湯呷之豆仍嚼喫完或用葛粉鉛粉靛青地泥漿水豉汁乾薑飴糖黃連看病寒熱服過何藥多了以前藥之冷熱只一味以解之解服瘋癱病藥過多心多悶亂不省人事者米醋半盞灌入口中效甘草煎汁和生薑自然汁二味調服螺青細研山泉水調服解生漆侵人作瘡毒花椒葉生用煎湯洗雞子黃調塗效白菘菜搗汁渣解解中酒毒大黑豆一二升煎汁服生螺搗汁服蓽澄茄搗末葛花三種俱能解酒毒解飲食百毒覺得心中異常煩悶作脹作疼者苦參搗汁蝕之吐出食物即解解中禽鳥魚鱉等毒五倍子白礬各等分水調服後五種俱可解馬鞭搗汁服大黃一錢煎湯服生蘆根搗汁服朴硝一錢水調服橘皮煎湯服解中螃蟹毒生藕搗汁服乾蒜蒲搗汁服紫蘇濃煎湯服又方食冬瓜甚妙解中食斑鳩過多毒生扁豆為末溫湯調服葛粉水調服生田螺肉搗汁服解中鳥獸中箭藥死者毒用大豆煮汁入鹽少許服之效解中狗肉毒杏仁三兩連皮研溫湯調服吐出為妙解中牛肉毒豬牙燒灰水調服有服之生疔瘡者用菊花根水煎服以菖蒲研爛酒調服取汗效解中驢馬肉毒生蘆根搗汁服再用根煎湯洗浴效解中雞子毒米醋飲三四口即解解中食鴨毒糯米淘泔水溫熱服一二盞效解中六畜毒壁泥水調服白扁豆燒灰黃柏末共用水調服解中食花椒毒即時氣悶欲絶以冷水一碗即解解中果菜毒甘草莧母鉛粉等分水調服童便一二服盞亦解解中野芋毒上漿水解瓜毒瓜皮煎湯鹽少許服柑子毒柑皮煎湯下鹽少許服解中諸物毒用白礬一錢細茶一錢并水調服以吐出為妙四方珍異藥品治病人多不見即見亦不知治法揭開於左以便取用錦地蘿形如橄欖更大周身皺紋治中食毒嚼一二錢吞下癰疽發背未成毒者水調塗上即散病者先嚼一二錢酒吞下方塗藥上勾金皮治無名惡毒醋磨塗毒腫即消牙痛以皮塞牙縫中即定又治咽喉乳窩每用三五釐細嚼咽下乜金藤性溫無毒之物治男女中瘋痰迷心竅半身不遂左癱右煥不省人事痰涎上壅攻心作咽用一錢白湯磨下神效小兒急慢驚風大者五分小一二分白湯磨下效木腰子如豬腰無二出廣中用醋磨厚塗百毒腫瘡即消三七根止血聖藥也近日有活種閩廣帶回者家中亦有此種葉如野蒿花黃而小極易生鮮者採葉搗爛跌打破碎者按上立止血疼過三二日即愈又不潰爛真神草也收葉乾作末亦治吐血衄血上衝者皆宜佐以治藥服之其功效備開於後治刀斧箭傷血出不止者嚼少許罨上即止治婦人血崩看年逺近研一二錢白酒調服喫後四物湯加三七五分煎服治吐血用一錢或五分自嚼米湯下或用人參五分煎服治腸風下血用四物湯加三五分煎服或空心用五分調酒服治杖瘡瘀血用一二錢嚼爛罨在破上再服一二錢免血攻心治産後血湧用一二錢研細水調服即止治跌打青腫不消者用一錢嚼細冷患處即愈治害眼十分重者用少許水磨調點眼眶內即消治赤白痢疾用一二錢為末米泔水調服治虎狼蛇咬用一二錢為末酒調服嚼少許塗患處妙治受下蠱毒先喫少許毒即返出治一切瘡毒癰疽疼不止者用一二錢為末水調塗之立效翠蛇兒形如曲鱔長可五六寸蟠旋作圈用以治癤毒癰疽良香鼠形如鼠僅長寸許出雲南用治疝甚驗緬茄兒用以抹眼眶去火毒又能解百毒形如大栗上有罩帽如畫皮樣水磨塗治牙疼效鹿跑草形似僵蠶粗細不一兩頭一委一尖長一二寸皮色淡紫中白甚不易得凡雄鹿一淫百雌倦弊即倒如死狀雌者跑此與食食畢躍起如故會有得而服者其補益功神異常真聖藥也奈何不可得也透骨草亦逺方之物形如牛膝以之治療熱毒良馬金囊狀如木瓜內包數十子儼似松子治療難産及橫生倒養者嚼一二粒冷水下即順神效人魚狀如獸人聲四足食之治疫癘時症良貘皮身黃黑人寢其皮辟瘟邪阿羅魚一首十身如犬吠食之療癰疽亦可禦之珠鱉狀如肺六目六足腹內有珠食之治時病鯥魚狀如牛陸居蛇尾即死夏生食之治腫蟒膽出雲南孟養巨蟒有足膽解諸毒耳鼠狀如鼠兔首麋耳如犬嚼食之治不寐可禦百毒白鵺雞文首白翼黃足食之治嗌痛獂肉狀如貍五尾食之治瘴氣不死草出柳州高一二尺狀如茅食之延年可辟蠅蚊夏月置盤餐中食物不腐鱗蛇膽出安南較蚺蛇膽少大磨治牙痛效春冬在水夏秋在山足下有鱗黃色者佳石油出緬甸石縫中流出臭惡不可聞色黑可塗癤毒無名惡瘡效神黃豆出雲南近西治痘疹未發將發時連殼焙燥用豆細研水服再無不救少者無多者減又治瘡毒如前服之亦愈拳黃雞子一名水蘿蔔治霍亂吐瀉治瘧亦效每用一錢嚼碎水飲下效青魚膽出廣中真者水磨點眼痛如神山豆根出廣中者佳治咽喉痛難食口中噙化即愈瓦矢實出咱斡汗地如蒿其實食之治氣疾香可辟蠧瑣瑣蔔萄形如胡椒味極甘美痘疹隱下不發者食之即起性熱之物也又考勾金皮治冷心氣疼并瘧疾俱用酒磨半分服效乜金藤治牙疼用半分咬痛處良中毒藥用半分煎湯服即解元龜鳥首虺尾音如水瀉聲佩之可以治聾蚺蛇膽廷杖者先用酒磨一錢服之不傷人即打後食之亦妙袪身上生虱法口吸北方氣一口吹於筆尖寫三五寸長黃紙上斂深淵默漆五字置之牀席衣領間可辟虱蟲似有理也人身大虱以一置之臺上將虱頭朝北決不北行惟走三方雖百次亦不北向也此法甚合虱性治五臟蟲法五臟生蟲四臟皆從人身中上行易治雜用蟲下行之難料理考之醫祕當用水獺爪燒灰為末再加治活蟲之藥於每月初四十六二日肺蟲上行以此日治之方效遵生八箋卷十八
