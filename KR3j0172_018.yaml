body:
  text: 遵生八箋卷十八明高濓撰靈祕丹藥箋下治痰症方祕傳紫府青津丸治虛實痰火神方用女真實四兩用芩連水浸一夜次日蒸晒如法三遍白石膏煅四兩煅過研細用嫩桑葉四五斤煎汁取淨汁一碗煮乾再用紫蘇四兩荆芥一兩煎清汁再待乾聽用知母四兩淨咀片分四處人乳童便青鹽拌潤過一宿生用一分俱微火炒黃柏四兩淨照前四製如法白芍藥一兩用桑皮煎水煮乾聽用貝母二兩薑礬水煮乾聽用杏仁二兩去皮尖青鹽水煮乾聽用天門冬二兩去心切細微火炒乾麥門冬二兩去心微火焙乾人參一兩切大片用好酒拌潤一宿取白酒麯末炒熱下人參微炒乾聽用去麯茯神二兩去皮心人乳拌潤一夜次日火焙乾聽用黃蓍一兩切片蜜水拌潤一宿炒乾糖毬肉五錢去參蓍之滯膩當歸一兩酒洗晒乾切片酒拌潤一宿炒用陳皮一兩去白炒用百合二兩薑湯泡過焙乾聽用右共十六味各製精微分兩和一處再焙大燥為極細末取梨汁半斤煉蜜一斤為丸如桐子大每服三錢早晚白滚湯送下制伏相火滋養真隂津潤肺腑上降心火下生腎水清熱化痰火降水升令人無病矣論痰治法經曰百病皆生於痰痰之本水也原於腎痰之動濕也主於脾脾主濕每惡濕濕生痰寒又生濕故古人用二陳湯為治痰通藥其中半夏味辛燥濕以齊地者良若不製以為麯恐其太燥若製麯無法亦鮮奏功凡治痰病必須製麯具治於後齊半夏即山東所産大箇麻點半夏也半夏麯法每用齊半夏選極大者一斤水浸二三日以透心去灰為度用生薑自然汁一茶盞同煆白礬四兩煎化將半夏為粗末拌勻晒乾聽用治風痰用豬牙皂角半斤四碗煎二碗治脾胃濕痰及火痰用竹瀝或荆瀝拌治老痰膠痰諸藥不效者用霞天膏一碗先拌半夏晒乾後入竹瀝為麯霞天膏方具后幅右俱用楮葉紙封如造酒麯法置簷風處清氣滌痰丸健脾胃化痰涎寬胸膈進飲食半夏麯照前法隨症用一斤牛膽南星十兩橘紅查肉瓜婁仁去油枳實蘿蔔子炒茯苓白术黃連各八兩香附用青鹽二兩水浸炒枯黃苓微炒甘草真紫蘇子各六兩好沉香二兩白芥子三兩右為細末竹瀝為丸如梧桐子大每服一錢五分食遠或臨睡服治老痰加天門冬肉四兩青礞石二兩硝煆若隂虛火盛當滋隂降火為主兼服前藥霞天膏方此倒倉法遺意也用此製半夏麯或入丸藥中能令老痰自大便出且不損元氣不傷脾胃凡治膠結老痰非此不效黃牯牛肉用純黃無病肥澤一二嵗者淨腿肉十二斤切指頂大用長流水以大銅鍋煮之旋加沸湯嘗令水淹肉五六寸掠去浮沫煮肉爛如泥去渣將肉汁以細布灑入小銅鍋內用桑柴文武火候不住手攪如稀糖滴水不散色如琥珀為度每肉十二斤可取膏一斤磁罐盛之冬月製用白玉丹専治久痰嗽天花粉一斤用清水浸洗刮去粗皮切片晒乾磨細末篩過取細末將絹袋盛用清水中洗出漿出渣澄清換水如此五七遍去苦晒乾取十二兩用河南真菉豆粉水漂三五次晒乾取四兩二味共一斤用蘇州薄荷葉一斤入瓶內層層間隔封瓶口入鍋內隔水煮三炷香為度取起冷定開瓶篩去葉留粉聽配白檀香白石英白硼砂各五錢白豆蔲玄明粉各一兩白石膏二兩煅柿霜三兩白糖霜八兩共為細末和前粉一處入瓶每次取二匙噙化消止痰咳開胃滋隂降火醒酒清心明目解渴大有神效法製清金丹治痰火咳嗽生津止渴消食順氣調中用廣陳皮揀紅者淨米泔水洗略去白銼大片晒乾一斤先用枳殼四兩去穰淨用水六碗浸一宿煎濃汁二碗拌橘皮浸透一夜次日蒸透晒乾二次用甘草三兩去皮照前煎湯浸蒸晒乾三次用欵冬花去蘆梗淨四兩用水照前煎浸蒸晒四次用桔梗去蘆淨四兩用水照上浸一夜濃煎汁二碗去渣加白硼砂玄明粉青鹽各四錢入汁化開照前拌灑浸一夜蒸透晒乾五次用竹瀝浸拌照前蒸晒六次用梨汁浸拌照前蒸晒七次用薑汁蘿蔔汁浸拌照前蒸晒加沉香三錢檀香三錢山查米一兩百藥煎一兩細茶一兩烏梅肉一兩白硼砂五錢五味五錢人參一兩天花粉一兩薄荷葉一兩半夏一兩薑汁炒共為細末加白糖霜十兩煉熟蜜十兩和勻入臼搗千杵印成餅臨卧或有痰火涎嗽時含咽大能降火清氣化痰止嗽消食寬中造百藥煎法五倍子不拘多少敲如豆瓣大揀淨用白酒糟拌勻置暖處候發過不澀味酸為度晒乾研末聽用神化丹馬兜苓水芹菜旋復花醬瓣菜各半斤俱生活用薄荷八兩五倍子五兩右將六味搗末成餅安七日白毛出了又採生的四樣搗爛絞汁拌前餅子又搗千餘下如此四十九次方用半分入舌上閉口噙化神效太極霜用黑鉛打作二三分厚片成圓毬盒子兩半箇銲作一毬用童男童女尿浸一百日久浸不妨用時將毬切開鉛毬內白霜刮下每服二三分其痰立下如試以霜加吐出痰上痰化成水為驗治痰快氣消膈食神方用山東半夏一斤洗南星一斤去皮生薑一斤皂角一斤切碎白礬一斤五味用水煮至南星心內無白點為度去皂角不用將薑切碎同南星半夏晒乾或用火焙每味淨一斤配後藥青皮去穰陳皮去白蘿蔔子炒另研蘇子炒神麯炒香附子薑汁煮去毛麥牙炒乾葛杏仁去皮尖另研山查已上各半斤右與前藥三味三斤一處研為細末以生薑自然汁浸蒸餅為丸如桐子大每服五六十丸臨睡茶酒服頑痰不化方用石青一兩石碌半兩俱研絶細末水飛二物以餅糊為丸每服十丸溫湯下吐痰一二碗不妨九煉玄明粉法將玄明粉揀出再加梨汁煮一次童男童女便煮一次甘草煮一次海粉煮一次藕汁煮一次生半夏搗汁煮一次連前一次共九煉也消痰神藥神水方用出山鉛打片十斤作二十片如法懸矼上下鍋用好酒好醋各十斤燻蒸取氣水服一二匙治痰神妙取水法用上下一缸合封上缸弔鉛片下缸貯酒醋用柴火煨十二炷香中用一磁盤架托鉛片收鉛上滴水用之是法痰中欲絶吹鼻散用大茶子一顆糯米七粒共為細末以些少吹入鼻中吐出稠痰數碗病者即醒眼目症方女真膏用點逺近爛眩風翳瘴眼絶妙黃連黃芩黃柏黃茋連翹薄荷山梔山豆根各三兩用冬青葉一籃清水洗淨菊花千里光花密蒙花用常流水同煎藥一處煎濃汁去渣再熬下白蜜少許成膏聽配蘆甘石三黃煆過為細末以水飛五七次淨末一兩大硃砂熊膽血結各五釐乳香沒藥各分珍珠琥珀牛黃氷片麝各一分硼砂三分石蟹一錢蜜煅胡黃連一錢五分白丁香一分共為細末投入膏內攪勻入罐塞口每用銀簮腳挑藥些少點眼兩眥一日三次神效千金祕授保睛丸治逺年近日風眼羞明白花生翳疼痛黑花蟹睛珠破胬肉扳睛赤腫倒睫拳毛眩爛癢澀打傷小兒痘疹入眼迎風冷熱淚下瘀血血貫七十二症無不治之能補腎治肝去風散血順氣除昏升降水火祛內外瘴羚羊角二兩五錢烏犀二兩白珠二兩鹿茸二兩酒浸焙海蛤二兩煅人參二兩天竺黃二兩五錢陳皮三兩菖蒲三兩茯苓四兩去筋當歸三兩琥珀三兩雲母石一兩六錢石膏二兩秦皮二兩芍藥四兩浸酒一宿沉香一兩扁豆四兩蒼术三兩酒浸麯炒細茶四兩菊花三兩天門冬二兩五錢去心生地八兩川芎一兩麥門冬五兩去心地膚子二兩石斛三兩巴戟三兩去心炒熟地八兩井泉石二兩柴胡二兩五錢車前子二兩兔絲子二兩肉蓯蓉三兩酒浸洗龍膽草二兩木香一兩半細辛二兩五錢草決明二兩薏苡五錢掩閭子二兩五錢五味子三兩黃連三兩逺志二兩五錢去心蒼耳子三兩防風一兩黃茋二兩五錢澤㵼二兩玄參二兩白蒺䔧二兩去刺炒牛旁子二兩砂仁二兩木通二兩五錢炒香附子三兩連喬一兩仙靈皮一兩五錢谷精草三兩旋復花二兩知母二兩五錢葳靈仙三兩桔梗三兩黃芩三兩酒炒山茱萸六兩枳實二兩麻黃一兩五錢酸棗仁五錢牡荆三兩欵冬花二兩五錢炒秦椒二兩訶子二兩木賊二兩酒浸炒蒲黃一兩五錢山藥八兩側柏葉二兩五錢焙枸杞六兩酒焙密蒙花六兩夏枯草二兩五錢炒蔓荆子二兩炒葶藶子二兩炒石決明四兩煆蕤仁二兩去油青箱子一兩五錢黃柏八兩鹽酒炒牛膝二兩酒浸甘草二兩五錢炒百部二兩五錢去蒂炒山冬青子二兩豆蔲二兩五錢右為末煉蜜為丸每丸一錢五分外用辰砂為衣藥計共八十八味去瘴翳米泔水溫服晴暗青盲當歸湯下氣瘴赤腫木香湯下血虛昏暗已下七十二症俱薄荷湯下小兒痘子入眼谷精草湯下明目補養四神丸用井州枸杞四斤分為四分好酒洗淨一斤用川椒四兩同炒去椒不用一斤生芝麻四兩同炒芝麻不用一斤小茴香四兩同炒茴香不用一斤好薄荷四兩同炒薄荷不用炒過放地上出火氣加生地黃熟地黃白茯苓白术菊花各四兩煉蜜為丸如桐子大每服五六十丸無灰酒或鹽湯俱可下祕傳煎藥加減妙方用當歸川芎柴胡枳殼羌活獨活前胡桔梗黃連甘草甘菊薄荷水二碗煎服加燈心三十根外有加減法附有淚多加獨活薄荷內癢加防風荆芥血貫加青箱子草決明有翳加木賊蟬蛻石決明火煆白蒺䔧春間發加龍膽草生地黃眼痛頭疼加黃芩酒炒蔓荆子胃火加石膏神妙膏用甘草羌活細辛黃連貝母菊花當歸枳殼大黃白芷生地防風荆芥木賊黃芩川芎蒼术豬苓澤㵼白术薄荷桔梗石斛赤芍藥蔓荆子草決明牛蒡子青箱子兔絲子車前子夏枯草地骨皮將羊肝蘆甘石四兩用一袋盛了用前三十二味藥入水煮三晝夜次取起去藥將石入乳汁浸之又用磁器上蓋一碗打火半炷香恐亦不必止用石細研如麵用點火眼煉就蘆甘石一兩入熊膽三分氷片二分硃砂三分點之點雲翳眼煉就蘆甘石一兩入硼砂一錢膽礬五分海螵硝一分檳榔一分鷹糞二分同研點之點板睛胬肉煉就蘆甘石一兩加硼砂二錢膽礬五分海螵硝二分真珠二分琥珀二分麻雀糞二分氷片一分辰砂二分檳榔二分點之洗眼方一以桑灰調熱湯澄清洗之一方立冬日採桑葉一百二十片每遇後開日期用桑煎湯不嘗洗之如閏月之年先年多採十片照前月日期洗之洗眼之日須忌葷酒齋戒神妙正月初五日二月初一日三月初五日四月初八日五月初五日六月初七日七月初八日八月初八日九月三十日十月初十日十一月初十日十二月初一日魏斗蓬點眼方掃霞散用蘆甘石一兩銷銀罐打火以童便淬七次燒七次以罐盛埋入土出火毒九日石燕子三錢以醋淬七次同上埋法磠砂一錢乳汁製硼砂三錢飛丹五錢黃連三錢乳香三錢沒藥三錢熊膽二錢氷片六分麝香六分石蟹二錢珍珠三錢珊瑚三錢血結二錢歸鬚三錢五分輕粉三錢五分白丁香二錢共十八味如要去翳加磁砂五分海螵蛸五分吹鼻六聖散川芎雄黃石膏乳香沒藥各一錢盆硝五錢共為細末更治赤眼冷淚頭瘋耳中疼癢鼻塞聲重牙疼口先含水用管吹藥一二分入鼻吐水半晌即愈瘋症方青金錠治男女中風痰厥牙關緊急不得口開難以進藥并雙鵝喉閉不能言者小兒驚風痰迷不省將此藥一錠取井花涼水磨化用綿紙醮藥汁滴入鼻孔進喉內痰響取出風痰一刻得生見效如神百發百中玄胡索三錢麝香一分青黛六釐牙皂十四枚火煨共研極細末青水調做錠重五分隂乾聽用金彈子治諸瘋左癱右瘓手足頑麻半身不遂口眼歪斜寒濕筋骨疼痛偏墜疝氣等症天麻升麻草烏防風荆芥石斛細辛半夏白芷羌活甘草秦芄川芎蒼术殭蠶蟬退全蝎蜂房烏藥當歸風藤乳香沒藥硃砂雄黃金銀花兩頭尖何首烏石菖蒲各五錢木香三錢麝香一錢共為細末聽用麻黃去節二斤紫背浮萍八兩共用水煎濃去渣再熬膏和勻