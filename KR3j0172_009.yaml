body:
  text: 遵生八箋卷九明髙濂撰延年却病箋上髙子曰生身以養夀為先養身以卻病為急經曰我命在我不在於天昧用者天善用者延故人之所生神依於形形依於氣氣存則榮氣敗則滅形氣相依全在攝養設使形無所依神無所主致殂謝為命盡豈知命者哉夫胎息為大道根源導引乃宣暢要術人能養氣以保神氣清則神爽運體以却病體活則病離規三元養夀之方絶三尸九蟲之害內究中黃妙旨外契大道玄言則陰陽運用皆在人之掌握豈特遐齡可保即玄元上乘罔不由兹始矣噫顧人之精進何如余録出自祕經初非道聽迂説讀者當具天眼目之毋云泛泛然也編成箋曰延年却病金匱妙録曰凡欲求長生却病大法有三一保精二行氣三服餌凡此三事亦各有法不得真傳卒難得遇也故保精之術列敘百數服餌之方略有千種皆以勤勞不強為務夫行氣可治百病可祛瘟疫可禁邪魅可止瘡血可居水中可避飢渴可延年命其大要旨胎息而已胎息者不以口鼻為之如在胞胎之中則以成道又曰道以精為寶施與人則生人留於己則生身生身求度世名在於仙位生人即功遂功遂而身退身退陷俗已為劇何竟妄施而廢棄棄損不覺多久廢老而墜天地有陰陽陰陽人所貴所貴合於道但當慎無費玄禾曰志者氣之神也氣者體之充也善者遂其生惡者喪其形故行氣之法少食自節心定自安志堅自通意專自達久則神矣若人服氣者日午后至子時前為死氣不可服惟酉時日近明淨不為死亦可服也冬三月子時寒夏三月午時熱二時俱不可服氣若腹中寒午氣可服腹熱子氣亦可服也真人曰天道盈缺人事多屯居處屯危不能自慎而鮮有成故養性之士不知自慎之方未可與論養生服氣之道故向道者以自慎為第一事太清中黃胎藏論略內養形神除嗜欲心不動搖六府如燭常修此道形神自足專修靜定身如玉內絶所思外絶所欲一者上蟲居腦宫洞神玄訣曰上蟲居上丹田腦心也其色白而青名彭居使人好嗜欲凝滯學道之人宜禁制之萬端齊起搖子心常思飲膳味無窮想起心生若病容學道者不得內行扶身却為三蟲所惑亂也二者中蟲住明堂洞神玄訣曰中蟲名彭質其色白而黃居中丹田使人貪財好喜怒濁亂真氣遣子魂夢神飛揚或香或美無定方或進或退難守常精神恍惚似猖狂令子坐臥敗榖糧子若知之道自昌怡然不易其道自成也三者下尸居腹胃下尸其色白而黑居下丹田名彭矯使人愛衣服耽酒好色令子淡泊嘗無味若常守淡泊三尸既亡永無思慮矣靜則心孤多感思撓則心煩怒多起服氣未通被三尸蟲較力或多怒或多悲思或多嗜滋味使人邪亂失情理子能守之三蟲棄得見五牙九真氣五牙為五行氣生子五藏中五牙咸惡辛酸味若五味不絶五藏靈氣不生終不斷思欲想為有三蟲鎮隨子尸鬼坐待汝身死何得安然不驚畏三尸之鬼常欲人早終在於人身中求人罪狀每至庚申日白於司命若不驚不懼不早修煉形神使年敗氣衰形神枯悴縱使志若松筠亦復無成矣勸子將心捨煩事靜持心神止捨煩務超然自得煙霞志超然洞悟煙霞之暢在乎目前鹹美辛酸五藏病津味入牙昏心境但是五味入牙皆通於兩眼之穴散霑於百脈之內致令六腑神氣衰百骸九竅不靈聖九仙真氣常自靈三蟲已死復安寧由子運動呼吸生神氣若足呼吸運動興起雲霧自然得成隱化無滯居在丹田內熒熒服氣成者居在丹田中凝結若雞子炳煥肌膚堅白筋骸清徑地府除籍天録名坐察陰司役神明內合胎仙道自成入胎息至五百息當入異境地籍除名三天録仙至千息魂遊上境胎息真仙食氣得却閉真氣成胎息服氣二百日五藏虛踈方可學入胎息準九天五神經云先須密室無風厚軟氊席枕髙四指才與身平求一志人同心為道侣然後捐捨心識握固仰臥情捨識心怡然然初初固閉仰息臥經情十無所得物無所牽靈氣漸開心識怡然初閉息經十息至五十息至百息只覺身從一處如在一房中只要心不動移凡一日一夜十二時都一萬三千五百息故太微升玄經云氣絶曰死氣閉曰仙魄留守身魂遊上天至百息後魂神當見其魄緣是陰神常不欲人生耳羽服彩霞何所得皆自五臟生雲翼蟬為飲氣乘露故生羽翼人服元氣而天衣不礙於體五臟真氣芝苗英太華受經曰元氣含化布成六根吉凶受用應行相從內氣為識胎氣為神子能胎息復還童嬰反魂五臟之始先布於水內有六府外應六根肝主東方其色青五緯經曰肝主於木生於水尅之於土來自東方其色蒼當存想青氣出之於左脅但六時思之不輟當見此氣如青雲用此氣可治一切人熱疾時行臃腫疥癬急嗽但觀前人疾狀量其淺深想此氣攻之無不愈者如觀前人肝色枯悴不可治也子但閉固千息經青氣周流色自成胎息經千息為內養此氣青色當自凝結心主南方其色赤服之千息赤色出五緯經曰心主於火生之於木尅之於金來自南方其色赤每日午時想赤氣在心大如雞子漸漸自頂而出自散咒曰南方丙丁赤龍居停陰神避位陽官下迎思之必至用之必靈如此三咒之能常行此氣存想五十日不闕當為赤氣如火光自見用此氣可治人一切冷病當用氣攻之若病人面色帶青即不治肺主西方其色白服之千息白色極五緯經曰肺生於金生之於土尅之於木來自西方嘗服每至丑時存想肺間有氣狀如白珠其光漸漸上注於眉間後乃咒曰西方庚辛太微玄真內應六府化為肺神見於無上遊於丹田固護我命用之成仙急急如律令存念一遍如此四十九日肺中有氣如白雲自見此氣照地下一切寶物及察人善惡如寒用心氣緣是火氣如熱用腎氣緣是水氣不辨用氣即無效也脾主中央其色黃服之千息黃色昌五緯經曰脾主於土生之於火尅之於水閉氣千息不敢伏藏存想黃氣但一念一想不限時節亦無咒其脾藏存之四十九日自見此氣已後能用可能自蔽形影腎主北方其色黑服之千息黑色得五緯經曰腎主於水生之於金尅之於火此五牙神氣但至五更初各存想氣色都出於頂上訖即止亦不假一一别存想兼不用咒亦得只是較遲滿百日方有效驗也驅役萬靈自有則服氣心志正兼行內行內外相扶一年後應是人間鬼怪精魅及土地神祗並不敢藏隱所到去處地界神祗隨衛道者陰司六籍善惡具知乘服彩霞歸太極胎息伏陰經曰內息無名唯行想成若不行戒行入胎息未得合神太微靈隱書曰凡人入胎息遊人間行尸解術隨物所化故有託衣衾所化者嘗以庚辛日取庚時於一淨室內焚名香一爐於所臥床頭又須設几案上著香爐下著所拄者龍杖及履鞋等物盡安置於頭邉身衣不解以衾蓋之首西而臥自念身作死人當陰念此咒七遍咒曰太一玄𡨕受生白雲七思七召三魂隨迎代余之身掩余之形形隨物化應化而成此存念一食間但依尋常睡如常存念之起一食久輒不得與人語若與人語其法不成如此常行四十九日漸漸成法後要作不問行住坐臥陰念此咒七遍隨手捉物身便别處去衆人只見所把之物身以死矣後却見物還歸本形此法即可以下界助身不可以便行非法之事大須護慎其法大須隱默若臥在床上但以被覆身隱念一遍便却出入只見所臥衾被是身不見被形若於財色留心當為神理銷折矣九行空門至貞路大道不與人爭怒動息能持勿暫停隂神返照神常助持心不息其道易成諸行無心是實心因心運得歸天去無心之心因心運心雖無有心還因心有除苟無心是謂真衆事曰茍無事曰除除心上念萬事歸余自隨胎息入天門胎息以善行為要機無念為至路玄元正理內藏身無曲潛形體合貞洞玄經曰心無曲萬神足三部清虛元氣固六府翻成百萬神三元靜六府調真氣歸於真形二理相合五藏六府諸神共有百萬自然相和應也大腸之府主肺堂肺為首三焦之主中有元神內隱藏太明經曰大腸主肺也鼻柱中央為候色也元氣自足其神當見腎府當明內宮女外應耳宅為門户內神經曰精主腎腎為後宫內宮列女主耳腎之官承氣於耳左腎為壬右腎為癸循環兩耳門內有元神守自都管兼主志凡人好嗔怒即傷腎腎傷即失志俱喪元神故道者忌嗔怒膀胱兩府合津門氣海循環為要路膀胱是兩府氣腎合膀胱乃受津之府上應於舌根也津液往來嘗潤肥澤舌岸以應兩膀胱氣若少不潤服氣人未成當欲少語以養津也語多即口乾難用氣也中有神其神常抱無貪之行故道者不貪志合神理子當得見內神章終身不泄神常助幻真先生服內元氣訣進取訣第一凡欲服氣先須髙燥淨空之處室不在寬務在絶風隙常令左右燒香牀須厚軟腳令稍髙衾被適寒溫令冬稍暖尤佳枕髙三寸餘令與背平每至半夜後生氣時或五更睡醒之初先吹出腹中濁惡之氣一九口止若要細而言之則亦不在五更但天氣調和腹中空則為之先閉目扣齒三十六下以警身神畢以手指揑目大小眥兼按鼻左右旋耳及摩面目為真人起居之法更隨時加之導引以宣暢關節乃以舌拄上腭撩口中內外津液候滿口則咽之令下入胃存胃神承之如此三止是謂漱咽靈液灌溉五藏面乃生光此後去就大體略同便兀然放神使心如枯木空身若委衣內視反聽萬慮都遣然後淘之每事皆閉目握固唯臨散氣之時則展指也夫握固所以閉關防而却精邪凡初服氣之人氣道未通則不可握固待至百日或半年覺氣通暢掌中汗出則可握固黃庭經曰閉塞三關握固停口咽金醴吞玉英遂至不食三蟲亡久服自然得興昌轉氣訣第二訣曰凡人五臟亦各有正氣夜臥閉息覺後欲服氣先須轉令宿食消故氣得出然後始得調服其法閉目握固仰臥倚兩拳於乳間𥪡膝舉背及尻閉氣則鼓氣海中氣使自內向外輪而轉之呵而出之一九或二九止是曰轉氣畢則調之調氣訣第三訣曰鼻為天門口為地尸則鼻宜納之口宜吐之不得有誤誤則氣逆氣逆乃生疾也吐納之際尤宜慎之亦不使自耳聞調之或五或七至九令平和也是曰調氣畢則咽之夜睡則閉之不可口吐之也咽氣訣第四訣曰服內氣之妙在乎咽氣世人咽外氣以為內氣不能分别何其謬哉吐納之士宜審而為之無或錯誤耳夫人皆稟天地之元氣而生身身中自分元氣而理每因咽及吐納則內氣與外氣相應自然氣海中氣隨吐而上直至喉中但候吐極之際則輒閉口連鼓而咽之令郁然有聲汩汩然後男左女右而下納二十四節如水瀝瀝分明聞之也如此則內氣與外氣相顧皎然而别也以意送之以手摩之令速入氣海氣海臍下三寸是也亦謂之下丹田初服氣人上焦未通以手摩之則令速下若流通不摩亦得一閉口三連咽止乾咽號曰雲行一潄口咽取口中津咽謂之雨施初服氣之人氣未流行每一咽則旋行之不可遽至三連咽也候氣通暢然後漸漸加之直至於小成也一年後始可流通三年功成乃可恣服新服氣之人既未通咽或未下須一咽以為候但自郁然有聲汩汩而下直入氣海行氣訣第五訣曰下丹田近後二穴通脊脈上達泥丸泥丸腦宮精名也每三連咽則速存下丹田所得內元氣以意送之令入二穴因想見兩條白氣夾脊雙引直入泥丸熏蒸諸宫森然遍下毛髮面部頭項兩臂及手指一時而下入胸至中丹田中丹田心宮神也灌五臟却歷入下丹田至三里遍經䏶膝脛腂下達湧泉湧泉足心是也所謂分一氣而理鼓之以雷霆潤之以風雨是也只如地有泉源非雷霆騰鼓無以潤萬物人若不回蕩濁惡之氣則令人不安既有津液非堪潄咽雖堪溉灌五臟發於光彩終不能還精補腦非交合則不能泝而上之咽服內氣非吐納則不能引而用之是知回蕩之道運用之理所以法天則地想身中濁惡結滯邪氣瘀血被正氣蕩滌皆從手足指端出去謂之散氣則展手指不須握固如此一度則是一通通則無疾則復調之以如使手使手復難鼓咽如前閉氣鼓咽至三十六息謂之小成若未絶粒但至此嘗須少食務令腹中曠然虛靜無問坐臥但腹空則咽之一日通夕至十度自然三百六十咽矣若久服氣息頓三百六十咽亦謂之小成一千二百咽謂之大成謂之大胎息但閉氣數至一千二百息亦是大成然本色無精光又有鍊氣閉氣委氣布氣並諸訣要具列於文同志詳焉鍊氣訣第六訣曰服氣鍊形稍暇入室脫衣散髮仰臥展手勿握固梳頭令通垂席上布之則調氣咽之咽訖便閉氣候極乃𡨕心絶想任氣所之通理悶即吐之喘息即調之候氣平又鍊之如此十遍即止新服氣之人未通有暇漸加一至十候通漸加至二十至五十即令遍身汗出如有此狀是其效也安志和氣且臥勿起衝風乃却老延年之良術耳但要清爽時為之氣惛亂欲睡慎勿為也嘗能勤行四支煩悶不暢亦為之不必每日但要清爽時為也十日五日亦不拘也黃庭經曰千災已消百病痊不憚虎狼之凶殘亦以却老年永延委氣訣第七訣曰夫委氣之法體氣和平身神調暢無問行住坐臥皆可為之但依門户調氣或身臥於床或兀然而坐無神無識寂寂沉沉使心同太空因而調閉或十氣二十氣皆通須任氣不得與意相爭良久氣當從百毛孔中出不復吐也從有十分無二也復調復為能至數十息已上彌佳行住坐臥皆可為之如此勤行百關開通顏色光澤神爽氣清長如新沐浴之人但有不和則為之亦當清泰也黃庭經云髙拱無為魂魄安清淨神見與我言閉氣訣第八訣曰忽有修養乖宜偶生疾患宜速於密室依服氣法布手足訖則調氣咽之念所苦之處閉氣想注以意攻之氣極則吐之訖復咽相繼依前攻之氣急則止氣調復攻之或二十至五十攻覺所苦處汗出通潤即止如未損即每日夜半或五更晝日頻作以意攻及若病在頭面手足但有疾之處則攻之無不愈者是知心之使氣甚於使手有如神助功力難知也布氣訣第九訣曰凡欲布氣與人療病先須依前人五臟所患之處取方面之氣布入前人身中令病者面其本方息心淨慮始與布氣布氣訖便令咽氣鬼賊自逃邪氣永絶六氣訣第十訣曰六氣者噓呵呬吹呼嘻是也五氣各屬一臟餘一氣屬三焦也呬屬肺肺主鼻鼻有寒熱不和及勞極依呬吐納兼理皮膚瘡疥有此疾則依狀理之立愈也呵屬心心主舌口乾舌澀氣不通及諸邪氣呵以去之大熱大開口呵小熱小開口呵仍須作意是宜理之呼屬脾脾主中宫如微熱不和腹胃脹滿氣悶不泄以呼氣理之吹屬腎腎主耳腰肚冷陽道衰以吹氣理之噓屬肝肝連目論云肝盛則目赤有疾作以噓氣理之嘻屬三焦三焦不和嘻以理之氣雖各有所理但五藏三焦冷熱勞極風邪不調都屬於心心主呵呵所理諸疾皆愈不必六氣也調氣液訣第十一訣曰人食五味五味各歸一臟每臟各有濁氣同出於口又六氣三焦之氣皆湊此門衆穢併投合成濁氣每睡覺熏熏氣從口而出自不堪聞審而察之以知其候凡口中焦乾口苦舌澀咽頻無津或咽唾喉中痛不能食是熱極狀也即須大張口呵之每咽必須閉户出之十呵二十呵即鳴天鼓或七或九以舌攪華池而咽津復呵復咽令熱氣退止但候口中清水甘泉生即是熱退五藏涼也若口中津液冷淡無味或呵過多心頭汪汪然飲食無味不受水則是冷狀也即當吹以溫之如溫熱法伺候口美心調溫即止黃庭經云玉池清水灌靈根審能修之可長存又云潄咽靈液災不干食飲調護訣第十二訣曰服氣之後所食須有次第可食之物有益不可食之物必有損損宜永斷益乃恆服每日平旦食少許淡水粥或胡麻粥甚益人理脾氣令人足津液日中淡麵餺飥及餅並佳乍可餒慎勿飽飽則傷心氣尤難行凡熱麵蘿蔔椒薑羮切忌鹹酸辛物宜漸漸節之每食畢即須呵出口中食毒濁氣永無患矣服氣之人腸胃虛淨生冷酸滑黏膩陳硬腐敗難消之物不可食若偶然食此等之物一口所在處必即微痛慎之不可衝生産死亡并六畜一切穢惡不潔之氣並不可及門况近之耶甚不宜正氣如不意卒逢以前諸穢惡速閉氣上風閉目速過便求一兩杯酒蕩滌之覺氣入腹不安即須調氣逼出濁氣即咽納新氣以意送之當以手摩之則便吞椒及飲一兩盞酒令散矣服氣一年通氣二年通血實三年功成元氣凝實縱有觸犯無能為患日服千咽不足為多返老還童漸從此矣氣化為津津化為血血化為精精化為髓髓化為筋一年易氣二年易血三年易脈四年易肉五年易髓六年易筋七年易骨八年易髮九年易形即三萬六千真神皆在身中化為仙童號曰真人矣勤修不怠則關節相連五藏牢固黃庭經云千千百百自相連一一十十似重山是內氣不出外氣不入寒暑不侵刀兵不害升騰變化壽同三光也幻真注解胎息經胎從伏氣中結臍下三寸為氣海亦為下丹田亦為玄牝世人多以口鼻為玄牝非也口鼻即玄牝出入之門蓋玄者水也牝者母也世人以陰陽氣相感結於水母三月胎結十月形體具而能生人修道者嘗伏其氣於臍下守其神於身內神氣相合而生玄胎玄胎既結乃自生身即為內丹不死之道也氣從有胎中息神為氣子氣為神母神氣相逐如形與影胎母既結即神子自息即元氣之不散氣入身來謂之生神去離形謂之死西升經云身者神之舍神者身之主也主人安靜神即居之主人躁動神即去之神去氣散安可得生是以人耳目手足皆不能自運必假神以禦之學道養生之人常拘其神以為神主主既不去宅豈崩壞也知神氣可以長生固守虛無以養神氣道經云我命在我不在天地天地所患人不能知至道能知而不能行知者但能虛心絶慮保氣養精不為外境愛欲所牽恬淡以養神氣即長生之道畢矣神行即氣行神住即氣住所謂意是氣馬行止相隨欲使元氣不離玄牝即先拘守至神神不離身氣亦不散自然內實不飢不渴也若欲長生神氣相注相注者即是神氣不相離玄綱云錙銖陽氣不滅不為鬼纎毫隂氣不盡不為仙元氣即陽氣也食氣即陰氣也常減食節欲使元氣內運元氣若壯即隂氣自消陽壯隂衰則百病不作神安體悅可覬長生矣心不動念無來無去不出不入自然常住神之與氣在母腹中本是一體之物及生下為外境愛欲所牽未嘗一息暫歸於本人知此道常泯絶情念勿使神之出入去來能不忘久而習之神自住矣勤而行之是真道路修真之道備盡於斯然聖人之言不可妄泄凡胎息用功後關節開通毛髮踈暢即但鼻中微微引氣相從四肢百毛孔中出往而不返也後氣續到但引之而不吐也切切於徐徐雖云引而不吐所引亦不入於喉中微微而散如此內氣亦下流散矣胎息銘解三十六咽一咽為先吐唯細細納唯綿綿坐臥亦爾行立坦然戒於喧雜忌以腥羶假名胎息實曰內丹非只治病決定延年久久行之名列上仙高子曰右胎息訣與後李真人一十六字訣相同但此條每於半夜子後或丑寅時候冬月恐子時嚴寒夏月恐午時太熱故冬以寅時夏以酉時亦不為敗時初起如此習久坐下即是子午何必因時初起握固以腳後跟曲轉頂住玉莖柯根使精氣固定手跌足盤以行其氣務依此銘一咽一吐皆從鼻竅中出入出聲宜細不令有聲聞之於耳三十六咽數畢舒伸四肢鼻引清氣亦勿咽入喉中只昻頭引向遍體四肢以手足徐徐伸縮而導引之凡腹中氣轉噦上亦勿使之直放口中出往亦用昻頭徐徐舒伸手足導而引之使氣遍轉四肢凡行持間勿遏此氣轉動上達皆如此以導引之餘則日得空間即以唐李真人十六字行之自然不飢不渴如常飲食一般不可厭倦間斷久久行之功不盡述胎息詩讚氣本延年藥心為使氣神能知行氣訣便可作真人李真人長生一十六字妙訣一吸便提氣氣歸臍一提便咽水火相見右十六字仙家名曰十六錠金乃至簡至易之妙訣也無分於在官不妨政事在俗不妨家務在士商不妨本業只於二六時中略得空間及行住坐臥意一到處便可行之口中先須嗽及三五次舌攪上下腭仍以舌抵上腭滿口津生連津咽下汩然有聲隨於鼻中吸清氣一口以意會及心目寂地直送至腹臍下一寸二分丹田元海之中略存一存謂之一吸隨用下部輕輕如忍便狀以意力提起使歸臍連及夾脊雙關腎門一路提上直至後頂玉枕關透入泥丸頂內其升而上之亦不覺氣之上出謂之一呼一呼一吸謂之一息氣既上升隨又似前汩然有聲咽下鼻吸清氣送至丹田稍存一存又自下部如前輕輕提上與臍相接而上所謂氣氣歸臍夀與天齊矣凡咽下口中有液愈妙無液亦要汩然有聲咽之如是一咽一提或三五口或七九或十二或二十四口要行即行要止即止只要不忘作為正事不使間斷方為精進如有瘋疾見效猶速久久行之却病延年形體變百疾不作自然不飢不渴安健勝常行之一年永絶感冒痞積逆滯不和癰疽瘡毒等疾耳聰目明心力強記宿疾俱瘳長生可望如親房事欲泄未泄之時亦能以此提呼咽吸運而使之歸於元海把牢春汛不放龍飛甚有益處所謂造化吾手宇宙吾心妙莫能述修真至要曰精根根而運轉氣默默而徘徊神混混而往來心澄澄而不動又曰身外有身未為竒特虛空粉碎方是全真可為至言胎息祕要歌訣閉氣歌訣忽然身染疾非理有損傷斂意歸間室脫身臥本床仰眠兼握固扣齒與焚香三十六咽足丹田氣越常隨心連引到損處最為良汗出以為度省求廣利方布氣與他人攻疾歌訣修道久專精身中胎息成他人凡有疾臟腑審知名患兒向王氣澄心意勿輕傳真氣令咽使納數連并作念令其損頓能遣患情鬼神自逃遁病得解纒縈六氣歌訣病瘥即止不可過過即敗氣一曰呬呬法最靈應須祕外屬鼻根內關肺寒熱勞悶又膚瘡以斯吐納無不濟二曰呵呵屬心王主其舌口中乾澀身煩熱量疾深淺以呵之焦腑疾病自消滅三曰呼呼屬脾神主其土煩熱氣脹腹如鼓四肢壅悶氣難通呼而理之復如故四曰噓噓屬肝神主其目赤翳昏昏淚如哭都緣肝熱氣上衝噓而理病更神速五曰吹吹屬腎藏主其耳腰膝冷多陽道萎微微縱氣以吹之不用外邉求藥餌六曰嘻嘻屬三焦有疾起三焦所有不和氣不和之氣損三焦但使嘻嘻而自理調理津液歌訣人因食五味壅滯閉三焦熱極苦澀盛冷多淡水饒便將元氣療休更問壺瓢熱隨呵自退冷宜吹始銷口中頻漱咽津液自然調若得如斯妙冷熱可無交服氣飲食所宜歌訣修道欲得見真的庖饌之中堪者喫淡粥朝餐渴自銷油麻潤喉足津液就中粳米飯偏宜淡麵餺飥也相益好酒飲時勃氣銷生椒服之百病息食前宜咽六七咽以食為主是準則飯了須呵三五呵免教毒氣煩胸臆服氣飲食雜忌歌訣密室避風隙高床免鬼吹藏精身有益保氣命無虧喜怒情須戢利名心可灰真神兼本屬禽獸及蟲魚此等血肉食皆能致食危葷茹既敗氣飢飽也如斯生硬冷須慎酸鹹辛不宜雨雲風罷作雷電晚休為蘿蔔羮須忌白湯麵勿欺更兼避熱食瓜果勿委隨陳臭物有損死生穢無禆須防咽入腹服氣勿多疑休糧歌訣千日功夫如不輟心中漸得尸蟲滅更教充實三丹田轉得堅牢百骨節只欲思惟斷食因懶將甜味加餐啜腹虛即咽下臍輪元氣便將為休絶飽即寧心勤守中飢來閉咽忘言説如斯勵力久成功方信養生在祕訣豈並凡常服藥人終朝修鍊無休歇營營藥力盡成空矻矻忍飢守不徹爭似常服太和精便能清淨生光悅如貪外美亂正元百疾臨身自尫劣慎守歌訣精氣切須堅慎守益身保命得長久人多嗜欲喪形軀誰肯消除全永夀未病憂病病難成已災去災災遣否臨終始解惜危身不及噬臍身已朽胎息縱然勵力修欲情不斷也殃咎隂陽體得道方全如此之人還少有九載功變歌訣氣并血脈共肉髓筋骨髮形依次起欲遣衰老却童華一年一變九載矣先端坐澄定閉目息氣然後鳴天鼓四八通以舌掠上唇外九遍次掠下唇外九遍又掠上唇裏九遍又掠下唇裏九遍即上唇外為南方下唇外為北方上唇裏為東方下唇裏為西方即以舌柱為中方待津滿口即數努兩腮內氣二十一遍微從鼻涕出些子便咽咽時須喉中鳴即汩汩也想津氣入下丹田如此三遍五遍又咽時須俟氣出便咽也治萬病坐功訣凡治諸病病在喉中胸中者枕髙七寸病在心下者枕髙四寸病在臍下者去枕以口出氣鼻納氣者名曰㵼閉口溫氣咽之者名曰補欲引頭病者仰頭欲引腰腳病者仰足十指欲引胸中病者挽足十指欲引去腹中寒熱諸所不快者皆閉氣脹腹欲息者須以鼻息已復為至愈乃止矣一平坐申腰腳兩臂展手據地口徐吐氣以鼻納之除胸中肺中之痛咽氣令溫閉目行也一端坐申腰以鼻內氣閉之自前後搖頭各三十次除頭虛空花天耗地轉之疾閉目搖之一將左脅側臥以口吐氣以鼻納之除積聚心下不快之證一端坐申腰徐以鼻納氣以右手持鼻搖目昏若淚出者去鼻中息亦治耳聾亦除傷寒頭痛之疾皆當以汗出為度一正偃臥以口徐出氣以鼻納之除裏急飽食後小咽若咽氣數至十令溫為度若氣寒者使人乾嘔腹痛可用鼻納氣咽之七至十至百則大填腹內除邪氣補正氣也一右脅側臥以鼻納氣以口小吐氣數至十兩手相摩熱以摩腹令其氣下出之除兩脅皮膚痛悶之疾愈者止一端坐申腹直上展兩臂仰兩手掌以鼻納氣閉之自極七息名曰蜀王臺除脅下積聚之疾一覆臥去枕竪立兩足以鼻納氣四復以鼻出之四若氣出之極令後氣再入鼻中勿令鼻知除身中熱及背痛之疾一端坐申腰舉左手仰其掌却右手同除兩臂及背痛之疾氣結積聚之病一端坐以兩手相扠抱膝閉氣鼓腹二七或三七氣滿則吐後氣通暢者為度行之十年老有少容一端坐申腰左右傾側閉目以鼻納氣除頭風自極七息止一端坐申腰鼻納氣數十為度除腹中飲食滿飽若快則止未便者復為之若腹中有寒氣亦為之一端坐使兩手如張弓勢滿射數四可治四肢煩悶背急每日或時為之佳一端坐申腰舉左手仰掌以右手承右脅以鼻納氣自極七息除瘀血納氣等並皆治之一端坐申腰舉右手仰掌以左手承左脅以鼻納氣自極七息除胃寒食不變則愈一兩手却據仰頭自以鼻納息因而咽之數十除熱身中傷死肌肉等治之而愈一正偃臥端展足臂以鼻納氣自極七息搖見三十而止除胸足中寒周身痺厥逆嗽一偃臥屈膝令兩膝頭內向相對手翻兩足申腰以鼻納氣自極七息除痺膝熱痛兩䏶不遂一平坐兩手抱頭宛轉上下名為開脅除身體昏沉不通暢者並皆治之愈一踞坐申右腳兩手抱左膝頭申腰以鼻納氣自極七息除難屈伸及拜起䏶中痛瘀痺等病並皆治之一踞坐申左足兩手抱右膝申腰以鼻納氣自極七息展左足著外除難屈伸及拜起䏶中疼一本云除風并目晦耳聾一正偃臥直兩手捻胞所在令如油囊裹丹陰下濕小便難傾小腹重不快若腹中熱但口出氣鼻納之數十止亦不須小咽之若腹中不熱者行七息以溫氣咽之十止一覆臥傍視兩踵伸腰以鼻納氣自極七息除腳中弦痛轉筋及腳酸痛一踞坐兩手抱兩膝頭以鼻納氣自極七息除腰痺背痛一偃臥展兩䏶兩手令兩踵相向亦鼻納氣自極七息除死肌及足䏶寒􅂒之疾一偃臥兩手兩䏶左膀兩足踵以鼻納氣自極七息除胃中有食不消苦嘔之疾一踞坐申腰以兩手引兩踵以鼻納氣自極七息向兩膝頭者除身痺嘔逆之疾一偃臥展兩手兩腳仰足指以鼻納氣自極七息除腹中弦急切痛一偃臥左足踵拘右足拇指以鼻納氣自極七息除厥疾若人腳錯踵不拘拇指依法行之一偃臥以右足踵拘左足拇指以鼻納氣自極七息除周身痺一病若在左端坐申腰右視目以鼻納氣極而吐之數十止閉目而作一若病在心下積聚者端坐申腰向日仰頭徐以鼻納氣因而咽之三十而止開目而作一若病在右端坐申腰左視目以鼻徐納氣而咽之數十止元陽經云常以鼻納氣含而漱之舌撩唇齒咽之一日夜得千咽者大佳當少飲食多即氣逆逆則百脈閉百脈閉則氣不行氣不行則疾病生太上三尸中經曰人之生也皆寄形於父母胞胎飽味於五榖精氣是以人之腹中各有三尸九蟲為人大害嘗以庚申之日上告天帝以記人之造罪分毫録奏欲絶人生籍減人祿命令人速死死後魂升於天魄入於地唯三尸遊走名之曰鬼四時八節企其祭祀祭祀不精即為禍患萬病競作伐人性命上尸名彭居在人頭中伐人上分令人眼暗髮落口臭面皺齒落中尸名彭質在人腹中伐人五臟少氣多忘令人好作惡事噉食物命或作夢寐倒亂下尸名彭矯在人足中令人下關搔擾五情勇動淫邪不能自禁此尸形狀似小兒或似馬形皆有毛長二寸在人身中人既死矣遂出作鬼如人生時形象衣服長短無異此三尸九蟲種類羣多蛔蟲長四寸五寸或八寸此蟲貫心人死白蟲長一寸相生甚多長者五寸躁人五臟多即殺人兼令人貪食煩滿肺蟲令人多咳嗽胃蟲令人吐嘔不喜膈蟲令人多涕唾赤蟲令人腸鳴虛脹蜣蟲令人動止勞劇則生惡瘡顛癡癰癤疽瘻癬疥癎癩種種動作人身中不盡有之亦有少者其中有十等就中婦人最多也其蟲凶惡好汚人新衣極患學道欲調去之即可矣凡至庚申日兼夜不臥守之若曉體疲少伏牀數覺莫令睡熟此尸即不得上告天帝又太上律科云庚申日北帝開諸罪門通諸鬼神訴訟羣魔併集以司天下兆人及諸異類善惡之業隨其功過多少賞勞謫過毫分不遺經曰三守庚申即三尸震恐七守庚申三尸長絶乃精神安定體室長存五神恬靜不復搔擾不迷不惑不亂不淫瞋怒平息真靈衛佐與天地相畢每夜臨臥之時叩齒三七以左手撫心上呼三尸名使不敢為害耳符絶三尸祕法符並朱書太上曰三尸九蟲能為萬病病人夜夢戰鬬皆此蟲也可用桃板為符書三道埋於門闑下即止矣每以庚申日書帶之庚子日吞之三尸自去矣嘗以六庚日書姓名安元命籙中三尸不敢為患也符式如左書符之法須閉神存氣想金光自空中圎熖若火取此符消九蟲當以六庚日服符以白紙竹紙硃書服每庚皆如之惟庚申書之不限多少從庚申日早朝服止次庚午日又服一道值六庚勿失蟲皆不貫五臟人身無病也敕符咒曰日出東方赫赫堂堂某服神符符衛四方神符入腹換胃蕩腸百病除愈骨體康強千鬼萬邪無有敢當知符為神知道為真吾服此符九蟲離身攝録萬毒上升真人三寶歸身要訣蘂珠洞微曰息之出也天地盜我元陽之氣息之入也我盜天地之氣若能真人潛淵心息相依以歸根則息息盜天地之氣矣魏伯陽曰耳目口三寶閉塞勿發通這三件如何喚作三寶如此鄭重蓋耳乃精竅目乃神竅口乃氣竅若耳逐於聲精從聲耗而不固目蕩於色神從色散而不凝口發言語氣從言走而不聚安得打成一片以為丹田如此緊要豈得不謂之三寶修生之人不於此三寶關鍵收拾向裏無有是處今人精從下流氣從上散水火各背不得凝結皆是此心使然心茍愛念不生此精必不下流忿念不生此氣必不上炎一念不生萬慮澄寂則水火自然交媾矣本來面目雖無念慮常常靈湛者也若一向靜虛去了則此靈渙散所謂頑空亦謂之癡癡者不靈之謂也所以佛有貪嗔癡三戒也貪即欲也嗔即忿也欲與忿水火不媾之源也無貪嗔斯定不癡斯慧矣慧以培定定以資慧定慧相忘道斯成矣服五牙法凡服氣皆先行五牙以通五臟然後依常法乃佳東方青色入通於肝開竅於目在形為脈南方赤色入通於心開竅於舌在形為血中央黃色入通於脾開竅於口在形為肉西方白色入通於肺開竅於鼻在形為皮北方黑色入通於腎開竅於耳在形為骨肺為五臟之華蓋第一肺居心上對胸有六葉色如縞映紅肺脈出於少高左手大指之端內側去爪甲二分許舀者之中心居肺下肝上對鳩尾下一寸色如縞映絳心脈出於中衝左手中指之端去爪甲之二分許臽者之中肝在心下少近後右四葉左三葉色如縞映紺肝脈出於大敦左足大指端乃三毛之中脾正掩臍上近前橫覆於胃色如縞映黃脾脈出於隱白左足大指端側去爪甲角如韭葉左腎右腎前對臍摶著腰脊色如縞映紫左為正腎以配五臟右為命門男以藏精女以繫胞腎脈出為湧泉左足心臽之中凡服五牙之氣者皆宜思入其臟使其液宣通各依所主既可以周流形體亦可以攻療疾病令服青牙者思氣入肝中見青氣氲氲青液融融分明良久乃見足大敦之氣循服而至會於脈中流散諸脈上通於自然次服諸方仍宜以丑後澡漱冠服入别室焚香坐向其方靜慮澄心注想而為之四方同此服法養五臟五行氣法春以六丙之日時加已食氣百二十助於心令心勝肺無令肺傷肝此養肝之義也夏以六戊之日時加未食氣百二十以助脾勝腎不傷於心也季月以六庚之日時加申食氣百二十以助肺令肺勝肝不傷於脾也秋以六壬之日時加亥食氣百二十以助腎令腎勝心不傷於肺也冬以六甲之日時加寅食氣百二十以助肝令肝勝脾不傷於腎也右此法是五行食氣之要明時各有九凡一千八十食氣各以養臟周而復始不相尅精心為之服氣有三膈説凡人腹中有三膈處一心有膈初學服氣者覺心下胃中氣滿是一膈也但少食惟以咽氣存想充關而下自能通也二生臟下有膈亦須以上法減食或口咬甘草并桂些少以通之三下丹田有膈須固志如上法以通之或服蜀椒一二百粒自然氣周通行身中矣咽氣須乾咽不得和唾亦須用出息咽之若用入息恐生風不當用心也凡咽氣喉中深咽不得淺淺即發嗽凡初服氣氣未固腹中作泄勿令有此以意運令散或以藥食治之凡服氣得臍丹田常滿呌喚讀書終日對人語言氣力不少出入行步無倦怠也凡服氣人不可過勞勞即損氣仍須時常行步使氣下行凡服氣者小便黃赤不礙行之日久自然如常凡人飲酒食肉一時雖勇健百病易生瘴癘蠱毒逢即被傷若服元氣久而行之諸毒不能傷一切疫病不能染如能堅持自知其妙服日氣法平旦伺日初出乃對日坐立任意叩齒九通心呼日魂珠景照韜緑映回霞赤童玄炎飈象仍𡨕日握固存日中五色流霞皆來接身下至兩足上至頭頂又令光霞中有紫氣如目童纍數十重與五色俱來入口吞之四十五咽氣又咽液九過叩齒九通微祝曰赤爐丹氣圓天育精剛以受柔炎水陰英日辰元景號曰大明九陽齊化二煙俱生凝魂和魄五氣之精中生五帝乘光御形探飛以虛掇根得盈首巾龍蓋披朱帶青轡鳥流玄霞映上清賜書玉簡金閣刻名服食朝華與真合靈飛仙太微上升紫庭再拜而止服月精法伺月初出對月坐立任意叩齒十通心呼月魄曖蕭芬艷翳寥婉虛靈蘭鬱華結翹淳金清瑩炅容臺標仍冥目握固存月中五色流精皆來接身下至兩足上至頭頂又令光精中有黃氣如目童纍數十重與五色俱來入口吞之五十咽氣又咽液十過叩齒十通微祝曰黃青玄暉元陰上氣散蔚寒飈條靈斂胃靈波蘭穎挺濯渟器月精夜景玄宫上貴五君夫人各保母位赤子飛入嬰兒續至回陰三含光玄萬方和魂制魄五胎流通乘霞飛精逸虛於東首結靈雲景華招風左帶龍符右腰虎章鳳羽朱帔玉珮金璫騫樹結阿號曰木王神蟇控根有虧有充明精內映玄水吐梁賜書玉札刻名靈房服食月華與真合同飛仙紫微上朝太皇再拜若天陰可於寢室存之山林中旦夕恆行拘二魂法其日夕臥去枕向上伸足交手心上𡨕目閉氣三息叩齒三通存心有赤氣如雞子從內仰上從目中出外轉大覆身變成火燒身周匝內外洞徹如一覺體中小熱叩齒三通呼爽靈胎光幽精三神急住因微祝曰太微玄宫中黃始青內鍊三魂胎光安寧神寶玉室與我俱生不得妄動監者太靈若欲飛行唯得詣太極上清若欲飢渴唯得飲徊水玉精制七魄法其日夕臥向上伸足兩手掌掩兩耳當使指端接交頸中𡨕目閉氣七過叩齒七通上下叩數遍為一通存鼻中端有白氣如小豆須臾漸大冠身九重忽又各變成天獸兩青龍在兩目中兩白虎在兩鼻孔中頭皆向外朱雀在心上向人口蒼龜在左足下靈蛇在右足下頭亦向上玉女著玄錦衣兩手各把火光當耳門如此良久咽液七過叩齒七通呼尸狗伏矢雀陰吞賊非毒除穢臭肺又微祝曰尸狗已下七神名也素氣九回制魄却姦天獸守門嬌女執關鍊魄和柔與我相安不得妄動看察形源若汝飢渴聽飲月黃日丹齋見不祥之物凡進齋入室見不祥之物者嘗念北帝咒南向叩齒三下咒曰二象回傾玄一之精七靈護命上詣三清雙皇驅除赫奕羅兵三十萬人侍衛神營巨獸百萬威攝千精揮劍逐邪馘落魔靈神伯所咒千秋滅形畢又叩齒三十六通治急病法凡受三五法在存職三天貞名三司貞名有急災困病三大喚天名密呼三師名即災病皆消上清微天貞名防中中禹餘天貞名元下大赤天貞名德丘右三天貞名也左無上貞名即天字也右玄老貞名衆即人字也中央太上貞名即地字也右三師名反舌塞喉法凡守一者身神常安若體中不寧當反舌塞喉嗽泪醴泉滿口咽之訖又如前咽液無數覺寧乃止止而未寧重復為之須臾之間不寧之病即應廓散自然除也當時有效制三尸日凡甲寅庚申之日是三尸鬼競亂精神之日也不可與夫妻同室寢食可慎之甲寅日可割指甲甲午日可割腳甲此是三尸遊處故以割除以制尸魄也寢室臥時祝法凡人臥床嘗令髙則地氣不及鬼吹不干鬼氣侵人常因地氣而逆上耳人臥室宇當令潔盛盛則受靈氣不潔則受故氣故氣之亂人室宇者所為不成所依不立一身亦爾當數沐浴洗淨黃素四十四方經云夜寢欲合眼時以手撫心三過閉目微咒曰太靈九宫太乙守房百神參位魂魄和同長生不死塞滅邪凶咒畢而寢此名九宫隱祝寢魂之法常能行之使人魂魄安寧永獲貞吉耳鳴咒耳神嬌女云耳鳴外使入也如鐘聲以聞九宫鳴者常掩耳而咒曰赤子在宫九真在房清聽神命亦察不祥太乙流火以滅萬凶合氣治病真符訣法斗印方喔吸吽病斗諱自魑􅂒􅂒􅂒􅂒􅂒吸南氣入筆在外中出病在內自外入病人氣閣筆放吹去吸身中三寶精氣神子能煉之可長生九竅固兮神歸腹元神一舉升崑崙要識歸根復命處下手之初須定意以我之氣合彼氣我病去兮彼病去服日月光芒法凡存心中有日象大如錢在心中赤色有光芒從心中上出喉至齒間即不出却回還胃中如此良久臨目存見心中胃中分明乃吐氣訖咽液三十九過止一日三為之日出時食時日中時行之一年除疾五年身有光彩十八年得道日中行無影辟百邪千災之氣常存日在心月在泥丸中晝服日夜服月服月法存月光芒白色從腦中下入喉芒亦至齒而咽入胃一云常存月一日至十五日已前服十五日已後不服月減光芒損天氣故即止也惡夢吉夢祝太素真人教始學者辟惡夢法若數遇惡夢者一曰魄妖二曰心試三曰尸賊此乃厭消之方也若夢覺以左手捻人中二七過叩齒二七通微祝曰太洞真玄長練三魂第一魂速守七魄第二魂速守泥丸第三魂受心節度速啓太素三元君向遇不祥之夢是七魄遊尸來協邪原急召桃康護命上告帝君五老九真各守體門黃闕神師紫户將軍把鉞搖鈴消滅惡精返凶成吉生死無緣畢若又臥必獲吉應而造為惡夢之氣則受閉於三關之下也明耳目訣真誥曰求道要先令目明耳聰為事主也且耳目是尋真之梯級綜靈之門户得失繫之而立存亡之辨也今抄經相示可施運用之道日常以手按兩睂後小穴中三九過又以手心及指摩兩目顴上以手旋耳行三十過唯令數無時節也畢輒以手逆乘額三九過從睂中始以入髮際中仍須咽液多少無數如此常行耳目清明二年可夜書睂後小穴為上元六合之府化塵眼暉和瑩精光長映徹瞳保鍊目神是真人坐起之上道也存日月訣青牛道士口訣暮臥存日在額上月在臍下上辟千鬼萬邪致玉童玉女來降萬禍伏走甚祕驗也服食靈藥忌女仙程偉妻曰服食靈藥勿食血物使三尸不得去乾肉可耳鳳綱訣曰道士有疾內視心使生火以燒身及疾處存之要精如倣佛疾即愈凡痛處加其火必驗也以意火攻之思三台厭惡法上台虛精中台六淳又作六停下台四生右三台內諱知者衆惡悉除諸善備至凡於靜房端坐思三台覆頭次思兩腎氣從胸中出與三台相連久久思畢二七啄齒二鼻微微納氣閉口滿便咽之咽畢乃咒曰節榮節榮願乞長生太玄三台常覆我形出入行來萬神懏營步之五年仙骨自成步之七年令藥皆精步之十年上升天庭步台日正月三日二月二日五月五日九月九日十月二十六日厭惡夢咒若人夢寤不真魄協百氣以校其心欲伺我神之間伏也每遇夢惡但北向啓太上大道君具言其狀不過四五則自消絶也青童君口訣曰夜遇惡夢非好覺當即返枕而咒曰太靈玉女侍真衛魂六宫金童來守生門化惡返善上書三元使我長生乘景駕雲畢咽液七過叩齒七通而更臥如此四五亦自都絶也此咒亦返惡夢而更吉祥也行路畏恐法凡行來畏恐常鳴天鐘於左齒三十六通先閉氣左噓之叱叱五通常行之辟精邪惡物不祥之氣嘗夜寢臨欲眠時以手撫心叩齒三通閉目微咒曰太靈九宫太乙守房百神參位魂魄和同長生不死塞滅邪凶咒畢而寢此名為九宫隱咒寢魂之法常能行之使人魂魄安寧常保吉祥守庚申捷法存頭中有太上老君泥丸真人著逺遊冠子服玄袍坐於𡨕光帳中下視口目耳鼻清滌氣謂之上一拘上部之魂心中有太上帝綘宫真人著九陽冠服丹南逸景之袍坐於朱陵帳中下視四體情狀肝脾膽腎皆令清潔如五色玉謂之中一拘四肢之邪精存臍內有太黃老君黃真人二人戴十靈之冠服黃羅之袍坐於黃綿帳中下視脾腸之孔竅皆令分明如素謂之下一拘腸胃制骸魄於是三尸無從得動也太上真人除三尸七魄要訣以春乙邜日夏丙午日秋庚申日冬壬子日冥目臥時先搗朱砂雄黃雌黃三分等細羅之綿裹如棗大以塞鼻中此謂消三尸鍊七魄之要祕法勿令有知者明日日中時以東流水浴畢更整飾牀席三尸服新衣洗除鼻中綿裹及掃灑寢席牀下通令所止一室潔淨便安枕臥閉氣握固良久微祝曰天道有常改故易新上帝吉日沐浴為真三氣消尸朱黃合魂寶鍊七魄元與我親咒畢此道是消鍊尸穢之上法改真新形之要訣四時唯各取一日為吉趙先生曰欲除三尸九蟲之法常以月建之日夜半子時密出庭中正東向平體正氣叩齒三十通訖舉頭小仰即復下頭小俯因咽液二七過又雙前却兩手二七過前後却授手為之竊咒曰南昌君五人官將百二十人為某除三尸伏尸將某周遊天下過度災厄語訖徐徐左回還臥行之三尸消滅若月中有重建者為修之法欲得齋戒獨住不欲人雜錯務令寂靜勿使人知之及六畜鳥獸並無聲為妙此法易行無恍惚之患老君去尸蟲方貫衆五分殺伏蟲白雀蘆十二分殺尤蟲蜀漆三分殺白蟲蕪荑五分殺肉蟲雷丸五分殺赤蟲僵蠶四分殺鬲蟲厚朴五分殺肺蟲狼牙子四分殺胃蟲石蠶五分殺蜣蟲右九件炒微香為末蜜丸桐子大輕粉一分調漿服五丸日三服已後淡白湯加至十丸三十日見效百日病愈衆蟲俱盡滅須至誠服之無不效也甲子日為之左洞真經按摩導引訣髙子曰人身流暢皆一氣之所周通氣流則形和氣塞則形病故元道經曰元氣難積而易散關節易閉而難開人身欲得搖動則榖氣易消血脈疏利仙家按摩導引之術所以行血氣利關節辟邪外干使惡氣不得入吾身中耳傳曰户樞不蠧流水不腐人之形體亦由是也故延年却病以按摩導引為先夜半子候少陽之氣生於陰分修生之士於子時修鍊古人一日行持始於子一歲功用起於復一陽之月是也即今之十一月轉脅舒足混元經曰戌亥子三時陰氣生而人寐寐則氣滯於百節養生家睡不厭縮覺不厭伸故陽始生則舒伸轉掣務令榮衛周流也道引按蹻踴身令起平身正坐兩手義項後仰視舉首左右招搖使項與手爭次以手扳腳稍閉氣取太衝之氣太衝穴在大指本節後二寸骨罅間陷者左挽如引弓狀右挽亦如之左令人精和血通風氣不入久能行之無病延年揑目四眥太上三關經云常以手按目近鼻之兩眥閉氣為之氣通即止終而復始常行之眼能洞見又云導引畢以手按目四眥三九遍揑令見光明是檢眼神之道久為之得見靈通也摩手尉目揑目四眥畢即用兩手側立摩掌如火開目尉睛數遍對修常居內景經云常以兩手按睂後小穴中二九一年可夜作細書亦可於人中密行之勿語其狀睂後小穴為上元六合之府主化生眼暈和瑩精光長珠徹瞳保鍊月精是真人坐起之道紫微夫人曰仰和天真俯按山源天真是兩睂之角山源是鼻下人中也兩睂之角是徹視之津梁鼻下人中是引靈之上房俯按山源紫微夫人云俯按山源是鼻下人中之本側在鼻下小谷中也楚莊公時市長宋來子灑掃一市常歌曰手為天馬鼻為山源每經危險之路廟貌之間心中有疑忌之意者乃先反舌內向咽津一二遍畢以左手第二第三指揑兩鼻孔下人中之本鼻中隔孔之內際也鼻中隔孔之際一名山源一名鬼井一名神池一名魂臺揑畢因叩齒七遍又以手掩鼻手按山源則鬼井閉門手薄神池則邪根分散手臨魂臺則玉真守關鼻下山源是一身之武津真邪之通府守真者所以遏萬邪在我運攝云耳營治城郭消魂經云耳欲得數按抑左右令無數使人聽徹所謂營治城郭名書皇籍擊探天鼓天鼓者耳中聲也舉兩手心緊掩耳門以指擊其腦户常欲其聲壯盛相續不散一日三探有益下丹田或聲散不續無壯盛者即元氣不集也宜整之拭摩神庭真誥云面者神之庭髮者腦之華心悲則面焦腦減則髮素太素丹經云一面之上常欲得兩手摩拭之使熱髙下隨形皆使極匝令人面色有光澤皺斑不生行之五年色如少女所謂山澤通氣勤而行之手不離面乃佳也穎陽書云髮宜多櫛齒宜數叩液宜常咽氣宜常鍊手宜在面此五者所謂子欲不死修崑崙也上朝三元真誥云順手摩髮如理櫛之狀使髮不白以手乘額上謂之手朝三元固腦堅髮之道也頭四面以手乘順就結唯令多也於是頭血流散風濕不凝下摩生門黃庭經云兩部水王對生門生門者臍也閉內氣鼓小腹令滿以手摩一周天三十六度櫛髮去風谷神訣凡梳頭勿向北梳欲得多多則去風多過一千少不下數百仍令人數之太極經云理髮欲向王地櫛之取多而不使痛亦可令侍者櫛也於是血液不滯髮根常堅運動水土真誥云食勿過多多則生病飽慎便臥臥則心蕩學道者當審之登真祕訣云食飽不可睡睡則諸疾生但食畢須勉強行步以手摩兩脅上下良久又轉手摩腎堂令熱此養生家謂之運動水土水土即脾腎也自然飲食消化百脈流通五臟安和養生論云已飢方食才飽即止申未之間時飲酒一杯止飢代食酒能淘蕩陰滓得道之人熟榖之液皆所不廢酒能鍊人真氣靈劔子服氣經云酒後行氣易通然不可多及吐反有所損太上混元按摩法兩手捺䏶左右捩肩二七遍左右紐身二七遍兩手抱頭左右紐腰二七遍左右搖頭二七遍一手抱頭一手托膝三折左右同兩手托頭三舉之一手托頭一手托膝從下向上三遍左右同兩手攀頭下向三頓足兩手相捉頭上過左右三遍兩手相義托心前推却挽來二遍著心三遍曲腕築肋挽肘左右亦三遍左右挽前後拔各三遍舒手挽項左右三遍反手著膝手挽肘覆手著膝上左右亦三遍手摸睂從上至下使遍左右同兩手空拳築三遍外振手三遍內振三遍覆手振亦三遍兩手相義反覆攪各七遍摩紐指三遍兩手反搖三遍兩手反叉上下紐肘無數單用十呼兩手上聳三遍下頓三遍兩手相義頭上過左右伸肋十遍兩手拳反背上掘脊上下亦三遍掘指之也兩手反捉上下直脊三遍覆掌搦腕內外振三遍覆掌前聳三遍覆掌兩手相義交橫三遍覆手橫直即聳三遍若有手患冷從上打至下得熱便休舒左腳右手承之左手捺腳聳上至下直腳三遍右手捺腳亦爾前後捩足三遍左捩足右捩足各三遍前後却捩足三遍直腳三遍紐䏶三遍內外振腳三遍若有腳患冷者打熱便休紐䏶以意多少頓腳三遍却直三遍處據左右紐肩三遍推天托地左右三遍左右排山負山拔木各三遍舒手直前頓伸手三遍舒兩手兩膝亦各三遍舒腳直反頓伸手三遍捩內脊各三遍天竺按摩法兩手相捉紐捩如洗手法兩手淺相義翻覆向胸兩手相捉共按䏶左右同兩手相重按䏶徐徐捩身左右同以手如挽五石力弓左右同作拳向前築左右同如托石法左右同作拳却頓此是開胸左右同大坐斜身偏欲如排山左右同兩手抱頭宛轉䏶上此是抽脅兩手據地縮身曲脊向上三舉以手反椎背上左右同大坐伸兩腳即以一腳向前虛掣左右同兩手據地回顧此是虎視法左右同立地反拗身三舉兩手急相義以腳踏手中左右同起立以腳前後虛踏左右同大坐伸兩腳用相當手勾所伸腳著膝中以手按之左右同右十八勢但逐日能依此三遍者一月後百病除行及奔馬補益延年能食眼明輕健不復疲乏婆羅門導引十二法第一龍引以兩手上拓兼似挽弓勢左右同又乂手相捉頭上過第二龜引峻坐兩足如八字以手拓膝行搖動又左顧右顧各三遍第三麟盤側臥屈手承頭將近床腳屈向且傍脾展上腳向前拗左右同第四虎視兩手據牀拔身向背後視左右同第五鶴舉起立徐徐返拗引頸左右挽各五遍第六鸞趨起立以腳徐徐前踏又握固以手前後䇿各三遍第七鴛翔以手向背上相捉低身徐徐宛轉各五遍第八熊迅以兩手相乂翻覆向胸臆抱膝頭上宛轉各三遍第九寒松控雪大坐手據膝漸低頭左右搖動徐徐回轉各三遍第十冬柏凌風兩手據牀或低或舉左右引細拔回旋各三遍第十一仙人排天大坐斜身偏筒兩手據牀如排天左右同第十二鳳凰鼓翅兩手交捶膊并連臂返捶背上連腰腳各三數度為之細拔回旋但取使快為上不得過度更至疲頓擦湧泉穴説其穴在足心之上濕氣皆從此入日夕之間常以兩足赤肉更次用一手握指一手磨擦數目多時覺足心熱即將腳指略略動轉倦則少歇或令人擦之亦得終不若自擦為佳擦腎腧穴説張成之為司農丞蓋支同坐時冬嚴寒余一二刻間兩起便溺問曰何頻數若此答曰天寒自應如是張云某不問冬夏只早晚兩次余諗之曰有導引之術乎曰然余曰旦夕當北面因暇專往叩請荷其口授曰某先為家壻妻弟少年遇人有所得遂教小訣臨臥時坐於牀垂足解衣閉氣舌柱上腭目視頂仍提縮榖道以手摩擦兩腎腧穴各一百二十次以多為妙畢即臥如是三十年極得力歸稟老人老人行之旬日云真是竒妙亦與親舊中篤信者數人言之皆得效驗針灸百病人神所忌考百忌厯載人神所在四時十干十二支十二時各有住處不止黃厯後間一月三十日也針灸治疾者當慎擇用之毋為庸醫所誤春在左脅夏在臍秋在右脅冬在腰間十干日人神所忌甲日不治頭乙日不治喉丙日不治肩丁日不治心戊日不治腹巳日不治脾庚日不治腰辛日不治膝壬日不治脛癸日不治足十二支日人神所在子日在目丑日在腰寅日在腎邜日在脾胃辰日在足巳日在手午日在心未日在頭手申日在頭背酉日在肩戌日在面亥日在頭項十二時人神所在子時在足丑時在頭寅時在目卯時在面上辰時在項巳時在手午時在胸未時在肚腹申時在心酉時在背戌時在腰亥時在兩腳男子針灸忌除日婦女針灸忌破日遵生八箋卷九
