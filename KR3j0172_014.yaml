刻手過目翻閱雖宋搨之妍醜即别矧贋搨可愚人哉雖然近有呉中高手贋為舊帖以䜿簾厚如竹紙皆特抄也作夾紗搨法以草烟末香烟傅之火氣逼脆本質用香和糊若古帖嗅味全無一毫新狀入手多不能破其智巧精采反能奪目鑒賞當具神通觀法蘭亭邊傍考異永字無畫發筆處㣲轉折和下口字下横筆稍出嵗字有㸃在山下戈口之右年字懸筆上凑頂流字内乙字處就回筆不作㸃在字左人反剔是字下疋凢三轉不斷闕字脚斜拂不挑欣字欠右一筆作章艸發筆狀不是捺抱字已開口亦大矣亦字是四㸃興感字戈邊是直作一筆不是一㸃未嘗字反挑脚處有一闕殊字挑脚帶横趣字波畧少捲向上右舉此以觀蘭亭恐亦不大失眼五字損本者乃湍流帶右天五字損傷也宋景定咸淳間賈似道命客參較諸本異同擇其字之尤精者輯成一帖用良工王用和刻之經年始成此本後有悅生堂印甚可寶也論古玉器高子曰玉以甘黄為上羊脂次之以黄為中色且不易得以白為偏色時亦有之故耳今人賤黄而貴白以見少也然甘黄如蒸栗色佳焦黄為下甘青色如新柳近亦無之余見甘黄玉馬長四寸神氣如生甘青羊頭鈎螭玦素璏等物色嬌可愛余得一舊物殘缺者製為五岳巾圏蟾紐二物甚佳碧玉色如菠菜深緑為佳有細墨酒㸃有淡白間雜者次之墨玉如漆者佳西蜀有石類之紅玉色如雞冠者可貴三玉世不多見都中亦寶重之緑玉類碧色少深翠中有飵糝者佳外此七種皆不足取矣上古用玉珍重似不敢䙝故製圭以封諸侯製璧以祀天帝製黄琮以祀地祇製璋如半圭用赤以禮南方製琥如虎以禮西方製璜如半璧用𤣥以禮北方若璁珩雙璜衡牙珮之餙也琫珌鹿盧劔之餙也若指南人蚩托軸輅餙諸具弁星蚩牛環螳蜋鈎轆轤環螭璏蟠璃環商頭鈎雙螭鈎玉套管璩環帶鈎拱璧皆王侯輿服之餙也珫珥雜珮步揺笄珈玉瑱玉琀瓊華璪玉皆后宫夫人之餙也又如以玉作六瑞寶璽岡卯明璫玉魚玉椀巵匜帶圍弁􅎖玉辟邪圖書等物何重如之後此失古用玉意矣自唐宋以下所製不一如管笛鳯釵乳絡龜魚帳墜哇哇樹石爐頂㡌頂提㩦袋挂壓口方圓細花帶板燈板人物神像爐瓶鈎鈕文具器皿杖頭杯盂扇墜梳背玉冠簮珥縧環刀把猿馬牛羊犬猫花朶種種玩物碾法如刻細入絲髮無隙敗矩工緻極矣盡矣宋工製玉發古之巧形後之拙無奈宋人焉不特製巧其取用材料亦多心思不及若余見一尺高張仙其玉綹處布為衣摺如畫又一六寸高𤣥帝像取黑處一片為髮且自額起面與身衣純白無一㸃雜染又一子母猫長九寸白玉為母身負六子有黄黑為玳瑁者有純黑者有黑白雜者有黄者因玉玷汚取為形體扳附眠抱諸態妙用種種佳絶又一墨玉大玦全身地子靈芝俱黑而雙螭騰雲捲方皆白玉身尾初非勉强鈕揑又若瑪瑙蜩蟬黑首黄胷雙翅渾白明亮又一彌勒以紅黄纒絲取為袈裟以黑處為袋面肚手足純白種種巧用余見大小數百件皆然近世工匠何能比方然漢人琢磨妙在雙鈎碾法宛轉流動細入秋毫更無踈宻不匀交接斷續儼若遊絲白描曾無殢跡若余見漢人巾圏細碾星斗頂撞圓活又見螭虎雲霞層壘穿挽圏子皆實碾雙鈎若堆起飛動但玉色土蝕迨盡綴線二孔以銹其一此豈後人可擬要知巾圏非唐人始也又若岡卯有方者六稜者其鈎字之細其大小圖書碾法之工宋人亦自甘心其製人物螭玦鈎環并殉葬等物古雅不煩無意肖形而物趣自具尚存三代遺風若宋人則克意模擬求物像形徒勝漢人之簡不工漢人之難所以雙鈎細碾書法卧蠶則逈别矣漢宋之物入眼可識至若古玉存遺傳世者少出土者多土銹尸侵似難偽造古之玉物上有血侵色紅如血有黑銹如漆做法典雅摩弄圓滑謂之尸古如玉物上蔽黄土籠罩浮翳堅不可破謂之土古余見一玉玦半褁青緑此必墓中與銅器相雜沾染銅色乃耳亦竒物也余有定窑二瓶周身亦青緑似同此故近日呉中工巧模擬漢宋螭玦鈎環用蒼黄雜色邊皮䓤玉或帶淡墨色玉如式琢成偽亂古製毎得高值孰知今人所不能者雙鈎之法形似稍可偽真鈎碾何法擬古識者過目自别奚以偽為今時玉材較古似多西域近出大瑰劈爿玉料謂之山材從山石中槌擊取用原非于闐崑岡西流砂水中天生玉子色白質乾内多綹裂俗名江魚綹也恐此類不若水材為寶有種水石美者白能勝玉内有飰糝㸃子可以亂真又如寶定石茅山石階州石巴璞嘉璞宣化璞忠州石萊州石阿不公石梳妝樓肖子石俱能混玉但少温潤水色當細别之又如古之異玉器具如寒玉魚温玉棋子紫玉笛紫玉九雛釵五色玉環玉膏滅㿀玉火玉玉甕紫玉函此皆天地間秘寶今入何處多在内帑否歸仙府令後世徒知有此名耳奇哉論剔紅倭漆雕刻鑲嵌器皿高子曰宋人雕紅漆器如宫中用盒多以金銀為胎以朱漆厚堆至數十層始刻人物樓臺花草等像刀法之工雕鏤之巧儼若畫圖有錫胎者有䗶地者紅花黄地二色炫觀有用五色漆胎刻法深淺隨粧露色如紅花緑葉黄心黑石之類奪目可觀傳世甚少又等以朱為地刻錦以黑為面刻花錦地壓花紅黑可愛然多合製而盤匣次之合有蒸餅式河西式蔗叚式三撞式兩撞式梅花式鵞子式大則盈尺小則寸許兩面俱花盤有圓者有方者腰様者有四入角者有縧環様者有四角牡丹瓣者匣有長方四方二撞三撞四式元時有張成楊茂二家技擅一時但用朱不厚漆多敲裂若我朝永樂年菓園厰製漆朱三十六遍為足時用錫胎木胎雕以細錦者多然底用黑漆針刻大明永樂年製欵文似過宋元宣德時製同永樂而紅則鮮妍過之器底亦光黑漆刀刻大明宣德年製六字以金屑填之其盤盒大小製同宋元然多丫髻瓶茶槖勸杯茶闕穿心合拄杖扇柄研匣等物民間亦有造者用黑居多工緻精美但几架盤盒春撞各物有之若四五寸香盒以至寸許者絶少雲南以此為業奈用刀不善藏鋒又不磨熟稜角雕法雖細用漆不堅舊者尚有可取今則不足觀矣有偽造者礬朱堆起雕鏤以朱漆盖覆二次用愚𨽻家不可不辨穆宗時新安黄平沙造剔紅竒巧精雅花果人物之妙刀法圓滑清朗奈何庸匠網利效法頗多悉皆低下不堪入眼較之往日一合三千丈價今亦無矣何能得佳金陵之製亦然國初有楊塤描漆汪家彩漆技亦稱善余家藏有一二物件真勝他器漆描用粉數年必黑而楊畫和靖觀梅圖屏以斷紋而梅花㸃㸃如雪其用色之妙可知宣德有填漆器皿以五彩稠漆堆成花色磨平如畫似更難製至敗如新今亦甚少有漂霞砂金甸嵌堆漆等製亦以新安方信川製為佳如效砂金倭盒胎輕漆滑與倭無二今多偽矣漆器惟倭為最而胎胚式製亦佳如圓盒以三子小合嵌内至有五子盒七子九子盒而外圓寸半許五子盒肖蓮子殻盖口描金毫忽不茍小盒等重三分此何法製方匣有四子匣六子九子匣箱有衣箱文具替箱花簪匣有金邊紅漆三替撞盒有洒金文臺書匣塗金粧彩屏風描金粉匣筆匣貼金扇匣洒金木銚角盥桶子罩盒有罩盖箱罩盖大小方匣有書厨之製妙絶人間上一平板兩傍稍起用以閣卷下此空格盛書傍板鏤作縧環洞門兩面鏒金銅滚陽線中格左作四面板圍小厨用門啟閉鏒金銅鉸極其工巧右傍置倭龕神像下格右方又作小厨同上䂓製較短其半左方餘空再下四面虎牙如意勾脚其圓轉處悉以鏒金銅鑲陽線鈐制兩面圓混如一曾無安接頭緒此亦僅有金銀片嵌光頂圓盒蔗叚盒結盒腰子盒腰子研匣有秘閣有一枝瓶有酒注鏒金銅鑲口嘴有折酒盂上如大盞漏空坐嵌一槖以槖盖大碗碗外泥金花彩用之折酒可免濺潰有大小碟椀紅如渥丹有描采嵌金銀片子酒盤有都丞盤内有倭石研水注刀錐拂塵等件有鉛鑲口盖匾小方匣有筆筒有茶槖有漆龕觀音准提馬哈喇等佛有小圓香撞三層四層者有挂弔腰子香撞五格三格者有八角茶盤有茶杯有尖底勸杯有銅罩被燻有鏡匣有金銀甸嵌山水禽鳥倭几長可二尺濶尺二寸餘高三寸者有高二尺香几面以金銀蜔嵌昭君圖精甚種種器具據所見者言之不能悉數而倭人之製漆器工巧至精極矣又如雕刻寶嵌紫檀等器其費心思工本亦為一代之絶但可取玩一時恐久則膠漆力脱或匣有潤􅀈伸縮似不可傳寜取雕刻傳摩可久况今之鑲嵌在在皆是也與周初製何天淵隔也價亦低下然雕刻之神若宋人王劉九者鐫刻青田石楚石等類夀星洞賓觀音彌勒神像豈特肖生相對色笑儼欲談吐豈後人可能彷彿又如甸殻鐫刻觀音普陀坐像山水樹石視若遊絲白描目不能以逐髮數以即觀音身披法服有六種錦片無論螺殻深窪即平地物件亦難措手又若刻劃諸天羅漢經面牙板并翻經牙籖種種精細工奪天巧後有効者罕能得其妙處又若明朝宣德年間夏白眼所刻諸物若鳥欖核上雕有十六哇哇狀米半粒眉目喜怒悉具又如荷花九鸞飛走作態成於方寸小核可稱一代奇絶傳之久遠人皆寶藏堪為往世一物去鑲嵌何如嗣後有鮑天成朱小松王百户朱滸崖袁友竹朱龍川方古林輩皆能雕琢犀象香料紫檀圖匣香盒扇墜簮鈕之類種種竒巧逈邁前人若方之取材工巧别有精思如方所製癭瓢竹拂如意几杖其就物製作妙用入神亦稱明朝妙技近之倣傚倭器若呉中蔣回回者製度造法極善模擬用鉛鈐口金銀花片蜔嵌樹石泥金描彩種種克肖人亦稱佳但造胎用布少厚入手不輕比倭似逺閩中牙刻人物工緻纎巧奈無置放處不入清賞遵生八牋卷十四
