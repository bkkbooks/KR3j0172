body:
  text: 遵生八牋卷十四明高濓撰燕閒清賞牋上高子曰心無馳獵之勞身無牽臂之役避俗逃名順時安處世稱曰閒而閒者匪徒尸居肉食無所事事之謂俾閒而博奕樗蒱又豈君子之所貴哉孰知賢可以養性可以悅心可以怡生安夀斯得其閒矣余嗜閒雅好古稽古之學唐虞之訓好古敏求宣尼之教也好之稽之敏以求之若曲阜之舄岐陽之鼓藏劍淪鼎兌戈和弓制度法象先王之精義存焉者也豈直剔異捜奇為耳目玩好寄哉故余自閒日遍考鐘鼎卣彛書畫法帖窑玉古玩文房器具纎悉䆒心更校古今鑒藻是非辨正悉為取裁若耳目所及真知確見毎事參訂補遺似得慧眼觀法他如焚香鼓琴栽花種竹靡不受正方家考成老圃備註條列用助清歡時乎坐陳鐘鼎几列琴書搨字松牕之下展圖蘭室之中簾櫳香靄欄檻花妍雖咽水餐雲亦足以忘飢永日氷玉吾齋一洗人間氛垢矣清心樂志孰過於此編成牋曰燕閒清賞叙古鑒賞洞天清録云人生世間如白駒之過隙而風雨憂愁輒三之二其間得閒者才十之一耳况知之而能享者又百之一二於百一之中又多以聲色為樂不知吾輩自有樂地悅目初不在色盈耳初不在聲明窻浄几焚香其中佳客玉立相映取古人妙迹圖畫以觀鳥篆蝸書竒峯遠水摩挲鐘鼎親見商周端研湧岩泉焦桐鳴珮玉不知身居塵世所謂受用清福孰有踰此者乎長慶集云堂中設木榻四素屏二琴一張儒道佛書各數卷樂天既來為主仰觀山俯聽泉旁睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適内和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然澄懷集云江南李建勲當蓄一玉磬尺餘以沉香節按柄扣之聲極清越客有談及偎俗之語者則起擊玉磬數聲曰聊代清耳一竹軒榜曰四友以琴爲嶧陽友磬爲泗濵友南華經爲心友湘竹爲夣友周公瑾邀趙子固各携所藏書畵放舟湖上相與評賞飲酣子固脫帽以酒睎髮箕踞歌離騷傍若無人薄暮入西泠掠孤山艤舟茂𣗳間指林麓最幽處瞪目絶呌曰此洪谷子董北苑得意筆也隣舟驚嘆以爲真謫仙人其鑒賞如此太宗酷好書法有大王真跡三千六百紙率以一丈二尺爲一軸寳惜者獨蘭亭爲最置于坐右朝夕觀覽偶一日附耳語髙宗曰吾千秋萬嵗後與吾蘭亭將去也及奉諱用玉匣貯之蔵於昭陵陶貞白隐貝都山嘗寳蓄二刀一曰善勝一曰寳勝往往飛去人望之如二條青蛇唐李徳裕時有一老叟引五六軰舁巨桑請謁出見叟曰此木某寳之三世矣某年耄感公之徳聞公好竒異是以獻耳木生有竒寶須得洛匠斷之後解為二琵琶槽内生白鴿二羽翼嘴足巨細畢備解失厚薄不中一面鴿失一翼全者已進其一今在民間李衛公寶一方竹杖來自大宛國堅實而正方節眼鬚牙四面對出因贈甘露寺僧重其道行一日再過浙右問僧曰竹杖無恙否僧曰已規圓而漆之矣公嗟惋彌日偽蜀詞人文谷詣劉光祚劉方約二道士看桃核杯二士至取杯出視之濶尺餘紋采燦然真蟠桃核也劉曰予少年遊華岳逢一道士贈者寶之有年矣座上二道士一出白石圓子上有文采如二童子引仙人眉髮悉備云為麻姑洞中得之一出石濶一寸長二寸五分上隱蟠龍鱗角𤓰鬛俱全云為巫峽中得之文谷喜曰何幸一日盡覩二竒物隋僕射蘇威有鏡精好日月蝕幾分鏡亦如之威以左右所汚不以為意他日月蝕其半其鏡亦半昏始寶藏之後櫃中有聲如雷尋之乃鏡聲也隋末廣川好事僧有三寶一曰右軍蘭亭二曰神龜以銅為之腹受一升以水貯之四足能行隨在去之三曰如意以鐵為文光明洞徹色如水晶歐陽率更出見古碑索靖所書駐馬觀之良久而去數步後下馬佇立疲則布毬坐觀因宿其傍三日而後去閻立本至荆州視張僧繇舊跡曰定虚得名耳明日又往曰猶是近代佳手明日又往曰名下定無虚士坐卧觀之留宿其下十日不能去曹公作欹牀卧以視書六朝人作隱囊柔軟可倚備此為賞識之具滄浪集云耳目清曠不設機關以待人心安閒而體舒放三啇而眠高舂而起静院明牕之下羅列圖史琴尊自娛家有園林珍花奇石曲池高臺魚鳥留連不覺日暮趙子固宋諸王孫家藏圖書鍾鼎寶玩甚富亦善繪事後得五字不損本蘭亭於霅川喜甚乗夜回嘉興棹至昇山大風覆舟子固立淺處手持蘭亭示人曰帖已在此餘不足以介意因題卷尾曰性命可輕至寶是寶米元章少負英聲以恩補校書郎遷太學博士東坡云清雅拔俗之文超邁入神之學何時見之以洗瘴毒兒子得寶月賦琅然一誦老夫卧聽未畢蹶然而起恨二十年相從知元章不盡此賦當過古人不論今世也後愛京口溪山之勝遂定居焉作菴城東自號海岳喜蓄書畫古玩尤為黄太史所重平生好石見有瓌竒秀溜者則取袍笏拜之呼為石丈云叙古諸品寶玩十洲記周穆王時西域獻昆吾割玉刀及夜光嘗滿杯刀切玉如泥杯是白玉之精光明夜炤㝠夕出杯於中庭向天比明而水汁已滿杯中矣汁甘而香美斯實靈人之器周靈王起昆陽臺渠胥國來獻玉駱駝高五尺琥珀鳯凰高六尺火齊鏡高三尺暗中視物如晝向鏡則見影應聲西域折股國能為飛車從風遠行記里有鼓車上木人執槌行一里擊鼔一槌戰國時有人盜王子喬墓惟二劔存欲取劔作龍吟俄飛上天呉王得越三劔一曰魚腸二曰盤郢三曰湛盧方丈山有龍場龍鬬于此膏血如流水色黑著地堅凝如漆有紫光用作寶器越王得昆吾之金鑄八劔一名掩日指日日昏金隂物也隂盛陽滅故耳二名斷水畫水開而不合三名轉魄指月則蟾兎為之側轉四名懸翦飛鳥遊䖝觸刃如截五名驚鯉以之泛海鯨鯤遠遁六名滅魂挾之夜遊魑魅潜跡七名却邪用止妖祟八名真剛以之切玉如削土木以應八方之氣漢時西域獻吉光裘入水數日不濡入火不焦漢武時西毒國獻連環羈以白玉製之瑪瑙石為勒白琉璃為鞍置暗室中其光如晝漢武桂宫有四寶七寶牀雜寶案雜寶屏雜寶帳謂之四寶宫西渠王獻玉箱瑶杖各一件后殉武帝元稹秋夕登黄鶴樓遥見江湄有光若星因得漁人釣鯉剖之得二小鏡大如錢二面相合背有雙龍隱起鱗甲悉具元薨鏡亦亡去令狐綯有鐵筒徑不及寸長四寸内取出一小卷日中視之乃九經並足其紙即蠟蒲團其文精妙莫述又傾其中有輕綃一疋長四丈稱之纔及半兩似非人世所造貞陽觀有天降爐自天而下高三尺下一盤盤内出蓮花一枝十二葉毎葉隱出十二屬盖上有一仙人帶遠遊冠披紫霞衣儀容端美左手搘頥右手垂膝坐一小石石上有花竹流水松檜之狀雕刻竒古非人所能且多神異南平王取去復歸名曰瑞爐處士皇甫𤣥有一避塵針以巾挿針可令一身無塵針金色試之者帶巾針躍馬塵中人馬無染一㸃刺史沈攸之廐中羣馬驚嘶令人伺之見一白駒以緑繩繋腹直從外入復去直入内閣檢内人惟愛妾馮月華臂上一玉馬以緑絲穿之置枕邊夜去曉還試看之足有泥汚邴浪於九曲山見赤雞鳴如笙竽射之入石縫中鑿石得一赤玉鳥唐𤣥宗有玉龍子開元中旱帝密投之龍池俄而雲霧暴起風雨驟作天寶初安思順進五色玉帶李輔國有迎凉草榦似苦竹夏堂設之風凉自至有鳯首木高一尺而刻如鸞鳯雖嚴冬之時高堂大厦中和煦如春十洲記云二物皆火林國産也德宗幸興慶宫於複壁間得軟玉鞭屈之則首尾相就舒之則徑直如繩陸大鈞從子妻夜寢聞有啁啾鬬聲既覺枕下得二玉猪大數寸刻像妙甚實之枕中財貨日増貞觀初林邑獻火珠狀如水晶睿宗賜大安國寺水珠如石一片赤色夜有㣲光掘地一尺埋之水溢可給千人漢宫積草池中有珊瑚高一丈二尺一本三柯上有四百六十三條呉孫權掘地得白玉如意所執處刻龍虎形長二尺七寸賀真如五寶八寶五之一曰𤣥黄天符形如笏長八寸濶三寸上圓下方有孔黄玉也辟人間兵疫邪厲二曰玉雞羽毛悉備王者以孝治天下則現三曰榖璧白玉為之徑五寸其文粟粒王者得之五榖豐稔四曰王母玉環二枚亦白玉也徑六寸好倍於常五寶空中照光皆射日不知所極八寶之一曰如意寶珠大如雞卵明如滿月二曰紅靺鞨大如巨粟爛若朱櫻視之則碎觸之則堅三曰琅玕其形如環四分缺一四曰玉印大如半手其文如鹿䧟印中著物形現五曰採桑鈎二枚長五六寸其細如筯若金銀銅製六曰雷公石二枚斧形長四寸如青玉八寶置之日中白氣燭天暗室光明如月魏河間王有赤玉巵水精鉢瑪瑙碗新羅國獻萬佛山雕沉檀珠玉以為之其大者盈寸小者幾分其佛首有如米如菽者眉目口耳螺髻毫相悉具辮金玉水精為旛蓋流蘇菴植薝蔔羅等樹以百寶為樓閣殿臺其状雖㣲形勢飛動前有行道僧數千下有紫金鍾三寸蒲牢啣之擊鍾則行道僧禮拜至地其中隱隱有聲盖鐘響處是闗捩也雖以萬佛名山其數不可勝計海外貢重明枕長一尺二寸高六寸潔白類水晶中有樓臺形有十道士持香執簡循環無已劉曜夜居忽有二童子入跪曰管涔使小臣謁趙皇帝獻劔二口置拜而去以燭炤之劔長二尺光澤異常背有銘曰神劔服御除衆毒曜服之隨變五色范稚奴牧牛澗中獲二鯉化成鐵用以為刀對大石嶂祝曰鯉魚變化冶成雙刀石嶂破者為有神靈砍之石裂秦嘉有盤龍鏡韓夀香名為辟惡生香劉表有酒器三曰伯雅容七升仲雅容六升季雅容五升雅酒器也李適之有酒器九品蓬萊琖海川螺舞仙杯匏子巵幔捲荷金蕉葉玉蟾兒醉劉伶東溟漾蓬萊盞上有三山注酒以山沒為限舞仙盞有闗捩酒滿則仙人起舞瑞香毬子浮出琖外仙家有三寶有碧瑶杯紅𬎼枕紫玉函劉守璋贈洪厓先生揚雄鐵硯四皓鹿角枕卞敬家有無患枕舜作五明扇石虎作莫難扇又有象牙桃枝扇子建九華扇張融有道士贈以白羽麈尾扇夏昶作雪香扇漢有翆羽扇雲母扇孔雀扇九華扇五明扇廻風扇陶貞白有雀尾爐唐内庫有七寶研爐至冬寒研凍放上即化不用火炭咸通同昌公主下嫁有金菱銀栗内藏珍物連珠帳却寒簾犀絲簟牙席蠲忿犀如意白玉九鸞釵辟邪香韋侍御贈杜甫内人夜飛蟬武帝賜于闐青錢硯遼西麟角筆南越側理紙唐賜牢相張文蔚龍鱗月硯寶相枝筆也開元初剡賓國貢上清珠光炤一室内有仙人玉女播動水旱兵革之災䖍視無不克驗亷郊池上彈琴荷池中躍跳方鐵一片有知音擊之名𬎼賓鐵也安禄山獻明皇有玉魚鳬鴈楊貴妃製緑玉磬佛樓國有青玉鉢盂受三斗許厚可二分咸陽宫有青玉燈檠高七尺孫文臺有青玉鞍魏王得一石胡人識為寶母真臘國獻萬年蛤夜光如月積雪不化偶得金牛祥符中鑄金龜賜近臣穆王至崑崙有銀燭嵇昌蓄採星盆夏月漬果倍冷蒲澤國獻蔽日簾可以却暑寶玩中有硫􅲚瓶珊瑚玦女珊瑚青螺巵五色文玉環金博山爐琥珀枕瑪瑙彄雲母屏九龍臺燈百枝燈藍田磬炤夜璣𤨏子帳紫玉笛皆漢唐奇貨司空圖隱中條以松枝為筆曰幽人筆房次律弟子金圖十二嵗時手持水玉數珠光潔炤人唐彦猷作紅絲硯自號為天下第一郭從義掘地得緑玉四方小杵臼四角有小人坐頂傍有篆文仙臺秘府小中臼元自誠有抵鵲盆色類珉夏月浸果果水皆寒冬月不凍郭江洲有占景盤以銅為之上出細管挿花可留十餘日不敗孫總監千金市緑玉一塊嵯峨如山命工治之作博山爐頂上暗出香烟名不二山白樂天詩云銀花不落從君勸不落酒器有水晶不落漢隱帝有小摩尼數珠馮夫人有葡萄鏡杜光庭有驕龍杖紅如猩血重若玉石似非竹木傳為仙人所遺葛溪鐵工製剪鑿字曰二儀刀交股屈環遇物如風又有地中掘得金鹿銀麕乃曹奴入獻天子於洋水之物又有銀㹠金狗之類皆古賂夷人之物若小銅猪狗牛羊等十二肖形亦墓中物也西湖志云高宗幸張俊其所進御物有獅蠻樂仙帶池靣玉帶玉鶻兎帶玉璧環花素玉高脚鍾子玉枝梗𤓰玉𤓰杯玉東西杯玉香鼎玉盆玉古劔璏二十七件玉犀牛合白玻璃元盤玻璃花瓶玻璃枕瑪瑙物二十件龍文鼎商彛高足彛商文彛周盤周敦周舉罍獸耳周罍汝窑酒瓶二對有御寶畫曹霸五花驄馮瑾霽烟長景易元吉寫生花黄居寶竹雀呉道子天王張萱叢竹邊鸞萱草山鷓黄筌鷓鴣萱草宗婦曹氏蓼岸杜庭珪明皇斫膾圖有趙器躑躅鵪鶉杜竹思躑躅母鷄杜霄撲蝶巨然嵐鎻翠峰徐熈牡丹易元吉寫生􅫩杷董源夏山早行李煜林泉渡水人物荆浩山水呉元俞紫氣星皆珍品也歐陽通善餙文房其命藏硯室曰紫方館貝光曰發光地菩薩研滴曰金小相鎮紙曰小連城千鈞史界尺曰由準氏筆曰畦宗郎君槽曰半身龍裁刀曰治書奴寶晉齋有天成硯山玉蟾蜍皆希世奇珍古有神物如禹鼎知興廢瑞應圖寶鼎不㸑自沸不炊自熱不汲自滿不舉自藏呉明國貢嘗燃鼎虢州鐵鑊大數圍丁諼作九層博山爐上鑄禽獸自動渤海貢瑪瑙櫃長三尺南昌國貢火玳瑁盆容十斛又貢紫磁盆可容五斗舉之輕若鴻毛中朝有銅澡盆夜有人扣與長樂鍾聲相應漢武帝賜櫻桃以赤瑛盤與桃一色周益公有鶴飛琖注酒則鶴飛乾則就滅唐青玉枕冬煖夏凉醉者睡之即醒夢者遊仙孫太醫玉羅漢屏種種飛動漢宣帝有玉八角升西夷之貢水澆無暑火逼無寒唐有十二時盤用之隨時轉換物象子䑕換丑牛之類天帝流光爵置之日中則光氣燭天南海有蝦頭杯陳思王有鵲尾杓欲勸者呼之即指其人王肅造銅䑕丸晝夜自轉南中有風貍杖用指禽獸自斃取食隨指如意含滙縣東岸有聖鼓杖舟中有之波浪不敢冲激徐鳯縮節杖如筆管二十年毎年生一節後毎年減一節郭休有夜明杖朱色夜杖有光栁真齡寳一鐡拄杖宛轉天成行則㣲響明皇有虹蜺屏賜貴妃上刻美人夜能下屏歌舞馬弋山有紫芟席冬温夏凉秦始皇驅山鐸擊之聲如霹靂内庫有青酒杯紋亂如絲其薄如紙以酒注温然有煖氣少如沸湯名自煖杯龜兹國進一枕如瑪瑙枕之則十洲三島四海五湖盡入夢中名遊仙枕虢國夫人有夜明枕光炤一室無事燈燭田父得炤室玉王莽有滅瘢玉取玉槌碎塗瘢即滅唐順宗時西域進龍虎玉一方為虎置之山岩百獸攝伏一圓為龍置之水中浪捲虹蜺扶餘國有火玉色赤可以燃鼎堯時於河洛中得方尺玉板上圖天地之形得金璧之瑞文字記造化之始禹遊龍門神授玉簡遊東海得碧色玉圭楚州獻玉印伯顔至于闐國鑿井得玉佛高四尺炤之筋骨脉絡俱見魏武后有玉鉢相盛轉而不脱為西域鬼作唐肅宗賜李輔國香玉辟邪形高一尺五寸竒巧無比香聞數里入衣經年不滅唐代宗朝有十二玉棋子以按十二時字置水中逐時浮出不爽蘇威有應日鏡日蝕㡬分則鏡靣昏處如之唐有瑞英簾人在簾内影之則遍身有光艶異奪目韓王元嘉有銅鶴樽酒滿其腹則正立酒淺則傾覆長安殿角上有銅雀能鳴沈傅師得玉馬能嘶楊光欣有玉龍腹中貯水口瀉有笙簧聲楚漁得禹支祁鎻唐翰林院有索鈴河北用兵鈴動索鈴自鳴周世宗應氣瓦二十四片應氣敲之竇儀辨之不訛長陵有銅駝生毛毛上生花郫縣有銅馬能嘶長州倅㕔有銅龜背上應時現文李子長造木囚置葦上理囚獄不差則木囚伏否則木囚奮起周穆王有火齊鏡靈王時有月鏡其白如月漢高祖有表裏鏡可見五内舞溪石窟有方鏡始皇號為炤骨鏡荀諷有鐵鏡隋王度有炤疾鏡疫病炤之即愈張敞得一鏡炤之終身無病名無疾鏡黄巢三方鏡能見三方唐秦淮鏡炤人五藏天寶時有水心鏡七嵗大旱鏡中龍口吐烟即雨唐有夷則鏡得之井中燧銅鏡向日則火生以艾就則燃任中宣有飛精鏡後為神人持去王宗夀有鐵鏡不明一日發光因見市一青衣小兒欣然來回曰鐵鏡神物當還竟持去王㓜臨造方丈鏡炤見人馬有百里鏡可炤百里即獻吕䝉正鏡也秦寧縣耕夫得鏡炤之病熱者心骨生寒故名生寒鏡世有透光鏡以鏡承日光則鏡銘二十字壁上了了分明知來鏡炤之則見前途吉凶又有一鏡以手循之中心錚錚有聲名曰響鏡史良姊有寶鏡能見妖魅有道士持魘魅鏡狐狸草木為祟炤之即見本形如劔若顓頊騰空劒指兵則勝匣中嘗鳴楚王太阿劔一揮則三軍流血漢高祖赤霄劔後主鎮山劔宋青春有青龍劔唐徳宗有火精劔夜有光明朱善存家有芝烟劔太平則芝生胡識破山劔錢塘聞人紹有靈寶劔已上種種皆宇宙間神奇秘寶終為造化収拾安得流落塵世雖曰兵火變遷恐亦於此無恙古云玩物喪志此非喪志物也用録以廣聞見圖畫神異若漢劉褒北風圖見者皆寒雲漢圖見者多熱王善畫六馬滚塵圖後竟失去唐有龍水圖將練為服釜中二龍飛去周益公畫岳州圖譙樓時時換牌趙顔得畫女障能下障與顔為妻生子韋叔文畫馬朱色岳神索之改名而第趙澮畫兒啼圖僧夜聞兒哭詰澮以筆作乳㸃入兒口遂止馮紹正畫龍未終見白氣就廡簷出入池中雷雨大作亷廣畫二鬼兵圖一夕風雨鬼兵交戰張僧繇畫佛夜間發光信州畫羅漢能飛動王元俊畫扇壁上客至㩦去曹不興畫屏汚墨㸃即添作蠅孫權視為真蠅用手拂去鎮江興國寺苦鴿宿糞汚佛張僧繇於兩壁畫鷹鷂鴿再勿入雲光寺有七鴿圖於西壁未完其一云為飛去長興成山寺壁畫猿鶴長能飛走顧光寶畫獅絶瘧獅口有血淋漓何尊師畫猫則䑕潛避石恪畫飛䑕張之則鼠不入室楊子華畫馬夜有蹄齧嘶聲韓幹畫馬神人來索唐呉道子惡僧畫驢壁間一夜僧房家具踏破無留呉畫五龍圖天欲大雨即生烟霧張藻一手雙筆畫二木枝一枯一榮賈秋壑遇一道人畫蓮風來則蓮葉揺動此皆神妙莫測不可曉也要皆古人元氣所鍾以侔造化清賞諸論論古銅色高子曰曹明仲格古論云銅器入土千年者色純青如翠入水千年者則色緑如𤓰皮皆瑩潤如玉未及千年雖有青緑而不瑩潤此舉大槩未盡然也若三代之物迄今何止千年豈盡瑩潤而青緑各純者也若云入土則青入水則緑其水銀并褐色黑漆古者此又埋於何地者也凡三代之器入土年遠近山岡者多青山氣濕蒸鬰而成青近河源者多緑水氣滷浸潤而成緑余見一物乃三代欵識半身水浸年遠水痕涸溢數層此為入水無疑而色乃純青其著水潭底方寸少黄緑色則水土之說豈盡然哉余思鑄時銅質清瑩不雜者多發青質之渾雜者多發緑譬之白金成色足者作器純白乆乃發黒不足色者久則發紅發緑此論質不論製理可推矣他如古墓中近尸者作水銀色然水銀色亦分二種有銀色有鉛色惟鏡居多古者尸以水銀為殮彼世死者以鏡相遺殮者即以鏡殉取炤幽㝠之義故銅質清瑩者先得水銀沾染年久入骨滿背成銀千古亮白謂之銀背其有先受血水穢汚始受水銀侵入其銅質原雜則色如鉛年遠色滯謂之鉛背其有半水銀半青緑硃砂堆者先受血肉穢腐其半日久釀成青緑其半浄者迺染水銀故一鏡之背二色間雜也今之鏡以銀背為上鉛背次之青緑又次之又若鉛背埋土年遠遂變純黑為之黒漆背此價又高而此色甚易為假至有古銅鼎鼐尊彛亦有水銀色者何也此在墓中得水銀散漫之氣治染而成故惟一角一耳一傍有之或地近生水銀處亦成此色所以鼎彛無全身水銀色者而鍾磬則萬無一二也上古銅器以質厚為佳年既久遠土銹侵骨質已鬆脆厚者尚有受用薄者若少擊搏不破即裂又如無青緑而純紫褐色者曹明仲以為人間流傳之色非也三代之物因入土沉埋後人方得集以傳世若云三代流傳到今方有此色何能在世數千年不為兵燹銷爍破損沉淪者耶此等器皿出自高阜古塜磚宫石室燥地秘藏又無水土侵剥又無尸氣染惹列之石案間惟地氣蒸潤且原製精美光瑩變為褐色純一不雜故鼎彛居多而小物并秦漢物褐色絶少近見褐色上有青緑㸃子乃出土之後人以醎酸之味侵染乃爾非透骨緑色故褐色上有雲頭片芝蔴㸃朱砂斑并緑翠雨雪㸃者此為傳世物也非傳世上三五千年始成褐色故古銅以褐色為上水銀黑漆鼎彛為次青緑者又次之也若得淳青緑一色不雜瑩若水磨光彩射日者又在褐色之上昔宣廟喜倣褐色故宣銅此色為多凡銅器出自三代不惟青緑瑩潤其質其製其花紋欵識非後人可能彷彿自不容偽若明仲云必三代之物方有硃砂斑此大誤矣宋元之物亦有大片硃斑若魚子者更多盖受人血氣侵染便成硃斑亦有二三層堆疊者刀刮摩擦不可泯也豈盡三代物哉不可不攷新舊銅器辨正三代之器鍾鼎居多且大容升斗雖有商質周文之說然質者未嘗不文文者未嘗不質其質者製度尚象欵識䂓模鑄法工巧何文如之其文者雕篆雖細文理不繁瑱嵌雖工而矩度混厚質亦在也夏嵌用金銀細嵌雲雷紋片用玉與碧瑱剜嵌美甚曹云商無嵌法非也商亦有之惟多金銀片而少雲雷絲嵌細法今之巧匠偽造夏商瑱嵌者以金銀之色古今所同可以即為而玉與碧瑱碾法土銹似不容假近乃捜索古塜遺棄環珮充珥瑱珈琫珌等物裁為方圓規製以嵌彛鼎令人眼生雖識者必曰此古琢玉石豈非三代物哉毎得高值孰知古嵌一物周身無一處完整非剥落即為青緑銹結遮掩或隱或露之妙古雅出自天然若今嵌必鑿完全片段或嵌或遺狀土剥落方以法蠟遮餙何待目力入手可辯唐天寳時有局鑄花紋細宻可愛全尚華藻於三代之製或改為錦地或改䕫龍為螭或改雷紋為方勝或易篆欵為𨽻書真書於上古淳朴之意大左更恨質薄取便一時無意千古近有青緑硃砂堆積瓶壺器皿内有水銹爛孔或鋤擊蔑裂後人収拾以藥補綴持誘市值此皆唐時局鑄物也原非偽造古鑄工匠精細撥䗶清楚紋内地子光滑即轉角方圎深竅有如刀鎚雕刻花地爽朗周身如一並無砂眼欠缺分地不匀之病夫欵為製度規式識為紀功銘篆故三代鐘鼎隂識字有百十之多即薛尚功刻鐘鼎篆二十卷其篆文可攷若漢唐以下即陽識矣而銘亦不古間有隂識亦非鍾鼎古文篆法盖陽識刻印印蠟為之甚昜隂識以蠟剔起字畫翻砂成隂為之甚難少有不到字畫冺滅其精神摩弄後逈不及故秦漢之物不及三代唐宋之物不及秦漢也然秦漢不及三代唐宋不及秦漢者非人力不到而質料不精但秦漢之匠拙而不善模三代之精工唐宋之匠巧而欲變三代之程式所謂世代不及傷拙傷巧故也孰知愈巧愈拙愈工愈失敦朴古雅三代之不可及也反謂已能勝之改式改紋務尚形似所謂醜婦效顰愈逞醜態耳近有真正民間之器無功可紀原無識文今以刀刻鍾鼎相似篆文磨熟刀痕加以藥􅎖反失真趣賞鑑家入手即洞識矣可弄愚者我朝宣廟銅器甚有精者製度亦雅摩弄極工然多小物如百摺彛爐乳爐雨雪㸃金片貼鑄㦸耳彛爐石榴足者更佳赤金霞片小元鼎爐象頭鬲爐五供養細腰槖盤鏒金雙螭筯架香合匙瓶蟠螭鎮紙種種精甚大如鼎爐角端獸爐方耳壺商從尊精美可愛模式古雅惜不多見其底識文用匾方印子陽鑄大明宣德年製真書字畫完整印地光滑䗶色可愛他如判官耳雞腿脚匾爐翻環六稜靣鑄鏒金畨字花瓶四方直脚爐翻環元瓶若鑿錢文漏空桶爐皆下品也宣鑄多用䗶茶鏒金二色䗶茶以水銀浸擦入肉薰洗為之鏒金以金鑠為泥數四塗抹火炙成赤所費不貲豈民間可能彷彿但宣銅花紋者甚少余在京師僅見一二商鼎式者腰花佳甚後此景泰成化年間亦有此色彛爐用兩獅頭為耳復用赤金厚片作雲鳥形貼鑄其底識無印文惟用藥燒景㤗年製等字隱隱在内初玩不辯較之宣廟逈不及矣新鑄偽造近日山東陜西河南江蘇等處偽造鼎彛壺觚尊瓶之類式皆法古分寸不遺而花紋欵識悉從古器上翻砂亦不甚差但以古器相形則逈然别矣雖云摩弄取滑而入手自麄雖粧㸃美觀而氣質自惡其偽製法鑄出剔摩光净或刀刻紋理缺處方用井花水調泥礬浸一伏取起烘熱再浸再烘三度為止名作脚色候乾以磠砂胆礬寒水石硼砂金絲礬各為末以青鹽水化净筆蘸刷三兩度後一二日洗去乾又洗之全在調停顔色水洗功夫須三五度方定次掘一地坑以炭火燒紅令遍將釅醋潑下坑中放銅器入内仍以醋糟罨之加土覆實窖藏三日取看即生各色古斑用䗶擦之要色深者用竹葉燒烟薰之其㸃綴顔色有寒熅二法均用明乳香令人口嚼濇味去盡力配白蠟鎔和其色青以石青投入蠟内緑用四支緑紅用硃砂熅用䗶多寒則乳䗶相半以此調成作㸃綴凸起顔色其堆壘用滷銹針砂其水銀色以水銀砂錫塗抹鼎彛邊角上以法䗶顔色罩盖隱露㱔少以愚𨽻家用手揩摩則香腥觸鼻洗不可脫或做成入滷鹹地内埋藏一二年者似有古意又若三代秦漢時物或落一足或墮一耳或傷器體一孔一缺者此非偽造近能作冷冲熱冲冷銲軟銅冲法古色不變惟熱冲者色較他處少黒若用鉛補并令銲者悉以法䗶填餙器内以黄泥調稠遮掩作出土狀態此實古器惟少周全較之偽物遠甚又等屑凑舊器破敗者件件皆古惟做手乃新謂之改鍬余在京師見有二物一子父鼎小而可用花紋製度人莫不愛其偽法以古壺盖作肚屑凑古墓銅器飛龍脚銲上以舊鼎耳作耳造成一爐謂舊物也一方亞虎父鼎内外水銀無一㾗斧鑿初議價值百金製在五寸適用可玩人爭購之余玩再三識其因古水銀方鏡破碎截為四塊四靣冷銲屑凑古爐耳脚製成工巧可為精雅余一識破衆以為然後竟不知何去若此做手技妙入神元時杭城姜娘子平江王吉二家鑄法名擅當時其撥蠟亦精其煉銅亦浄細巧錦地花紋亦可人目或作鏒金或就本色傳之迄今色如蠟茶亦為黑色人多喜之因其製務法古式様可觀但花紋細小方勝龜紋居多平江王家鑄法亦可煉銅瑩浄撥蠟精細但製度不佳遠不如姜近日淮安鑄法古瑬金器皿有小鼎爐香鴨等物做舊頗通人不易識入手膩滑摩弄之功亦非時日計也外此有大香猊香鶴銅人燭臺香毬酒爐投壺百斤獸盖香爐花瓶火盆等物此可補古所無亦為我朝鑄造名地論宣銅倭銅爐瓶器皿古無銅小香爐即博古圖為帝王収藏僅有一二遺式後有小鼎爐獸爐博山爐高二寸許者不知漢唐人何用想亦墓中物也亦有中様鼎爐獸靣脚桶爐止可清供不堪焚香手玩近有潘銅打爐名假倭爐此匠㓜為浙人被虜入倭性最巧滑習倭之技在彼十年其鑿嵌金銀倭花様式的傳倭製後以倭敗還省在余家數年打造如倭尺内藏十件文具摺疊剪刀古人未有其銅合子途利筒彞爐花瓶無一不妙此真倭物也故其初出價高煉銅鏒金鑿嵌金銀花巧精妙與倭無二若近日呉歙之製較潘似勝但製度花巧與古人彛鼎之義殊無取法又如以黄銅去腥假名鈎金打造方圓鼎爐彛爐花紋以博古圖為式外抹金葉此等置之何地惟可作神佛供也初年潘銅似不可得有則寶之後世必有好尚之者外如倭人鑿銅細眼罩盖薰爐亦美更有鏒金香盤口面四傍坐以四獸上用鑿花透空罩盖用燒印香雅有幽致又若酒銚水礶吸水小銅中丞抹金銅提盔鎧腰刀鎗劔五供養蓮花架紫銅湯壺小鈸小塔礶罩合檳榔合石灰礶刮銹銅刡海螺鼻銅鏡銅鼓供獻盤槖碟子鑿花金錢鏾花銀錢鑿銀細花捲段鑿金大小戒指上嵌竒石種種精妙不能悉數無地不有機巧信哉近日呉中偽造細腰小觚敞口大觚方圓大尊花素短觶雨雪金㸃㦸耳彛爐細嵌金銀碧瑱鼎爐香奩犧尊團螭鎮紙細嵌天鹿辟邪象礶水銀青緑古鏡二寸高小漢壺方瓶鏒金觀音彌勒種種色様䂓式可觀自多雅致若出自徐守素者精緻無讓價與古值相半其質料之精摩弄之宻功夫所到繼以嵗月亦非常品忽忽成者置之高齋可足清賞不得於古具此亦可以想見上古風神孰云不足取也此與惡品非同日語者鑒家當共賞之論古銅器具取用上古銅物存於今日聊以適用數者論之鼎者古之食器也故有五鼎三鼎之説今用為焚香具者以今不用鼎供耳然鼎之大小有兩用大者陳於㕔堂小者寘之齋室方者以飛龍脚文王鼎為上賞獸吞真脚亞虎父鼎商召父鼎周花足鼎光素者如南宫鼎為次賞若周象簠鼎腹壯而膀脚肖雞腿又如百乳鼎者皆下品也方之小者有周王伯鼎單從鼎周豐鼎又若方四五寸許青緑或鏒金小方鼎式法文王王伯鼎製者可宜書室薰燎皆唐之局鑄元姜娘子鑄也紋片精美製度可觀其圓鼎三獸靣者如商父乙鼎父已鼎父癸鼎若癸鼎圓腹者若商子鼎秉仲鼎象形饕餮鼎立戈季㜏鼎光素者如商魚鼎周益素腹口下㣲束者若商乙毛鼎蟬紋鼎父甲鼎公非鼎僘口者如飛龍脚子父鼎皆可入上賞圓之小者如周大叔鼎垂花鼎周䜌鼎唐三螭鼎俱堪入清供但式少大雅耳他如𤓰腹雞腿方耳環耳僘口鼎爐俱不堪玩為下品也彛爐式如周甗彛父辛彛商虎首彛百折彛方者如己酉彛竒者如百乳彛皆堪為堂上焚具他如彛敦鬲爐等件雖古不堪清供如得商母乙鬲周蔑敖鬲饕餮鬲周師望敦兕敦翼敦亦可充堂中几筵之供已上式載博古圖中可用按圖索視巵者古酒器也義取上窮而危知節則無危矣寓戒之之意其製如盂雙耳外乗又如腰腹翼耳俗云人靣杯者是也杯亦古酒器也以牛首為製加以籠絡亦戒貪逸之意詩云酌彼兕觥以牛角為之製以此耳今之杯製不一而獨無此式匜者矯口坦腹一􅧥揑手或三足或圓足如鴨形者是也古人以為盥洗注水之具今俗以巵為匜以匜為巵名金銀酒器者誤矣盤㴱而洗淺盤用以承棄水内有銘篆者有招耳上冲者有盤内種種海獸者或用三蹲螭為足或雷紋圓足者又名彛盤俗指為㰱血盤非也今可用作香櫞盤其洗用以盥手故紋用雙魚用菱花有三乳足者有圓足者傍有獸面翻環者今用以注水為几筵主賓酧酢滌器似得古人遺意又有似洗而雙􅀈作掇手者名杵亦可作洗用觚尊觶皆酒器也三器俱可挿花觚尊口敞挿花散漫不佳須打錫套管入内収口作一小孔以管束花枝不令斜倒又可注滚水挿牡丹芙蓉等花非此花不可久古之壺瓶用以注酒觀詩曰清酒百壺又曰瓶之罄矣若古素温壺口如蒜榔式者俗云蒜蒲瓶乃古壺也極便滚水挿牡丹芍藥之類塞口最𦂳惟質厚者為佳他如栗紋四環壺方壺匾壺弓耳壺俱宜書室挿花以花之多寡合宜此五品分置若周之蟠螭瓶螭首瓶俗云觀音瓶者今之酒壺全用此式更變漢之麟瓶形若瓠子稍彎背有提􅧥此瓶也俗例為瓠子壺類誤矣另有瓠壺取詩云酌之以匏之義今以此瓶注水灌溉花草雅稱書室育蒲養蘭之具周有蟠虬瓿魚瓶罌瓶與上蟠螭首二瓶俱可為多花之用又若今之杖頭用鳩老人多咽鳩能治咽之義故三代有鳩鳥杖頭周身金銀瑱嵌又見有飛鳩杖頭周身鏒金用以作棕竹杖餙妙甚若漢之蟠龍蟠螭杖頭形若𤓰槌此便不如三代之雅若漢之編鍾小而有韻者頗宜書齋清響但得宫商二音為最古之布錢有金嵌字者可作界畫軸用小様提卣可作糊斗如伯盞頮盤季姜盂兩耳杯製小可作研傍筆洗鏡為人所必用若秦陀光背質厚無紋極有受用㳄如銀背海獸蒲桃荔枝五岳圖形十二生肖寶花雲龍十二符四靈三瑞三神八衛六花浮水七乳四乳十六花蟠螭龍鳯雉馬等背俱妙須用清瑩如水分毫不雜俗謂面無打攪輪轉周圓形影不改為貴又有如錢小鏡光背花背面無瘢痕更有滿背嵌金嵌銀片子鏾花小鏡極可人意價亦高貴似不易得㩦具用之山逰寺宿亦不可少鑒賞以大徑尺外圓鏡并三寸以上至如錢小鏡為上格其他五七寸者次之菱花八角方鏡悉不取也軒轅毬鏡可作卧榻前懸挂未必遠邪聊取意耳古銅腰束縧鉤甚多有盈尺長者其製不一有金銀碧瑱嵌者有片金商者有等用獸面魚肚者皆三代物也他如羊腸鈎螳蜋捕蟬鈎鏒金者皆秦漢物也無可用處静室中以之懸壁挂畫挂劔挂塵拂等用甚雅若鴈足燈鳯龜燈有柄行燈用以秉燭駝燈羊燈犀燈用以燃油此皆文具一器又如盈尺淺盤有三足者製極精雅乃古之承盞盤也盞如圓盂有耳環掇手此漢物也古彛皆有舟舟即今之承盞盤也往往有此且紋色甚佳今用為香櫞槖具别無取用毎有蝦䗫蹲螭其製甚精古人何用今以鎮紙又有大銅伏虎長可七八寸重有三二斤者亦漢物也此皆殉葬之器今以壓書余得一研爐長可一尺二寸濶七寸左稍低鑄方孔透火炙硯中一寸許稍下用以煖墨閣筆右方置一茶壺可茶可酒以供長夜客談其銘曰藴離火於坤德兮回春陽於堅氷釋陶泓凍淩兮沐清泚於管城是以三冬之業不可一日無此於燈檠間也凡此數者豈皆吾人所不當急而為玩物例哉書齋清賞藉此悅心當與同調鑒家品藻論漢唐銅章古之銅章後先出土者何止千萬即顧氏印藪猶云未備余先三入燕市収有千方十年之值高下逈異向無官私之别今則分王侯伯長為官印而價倍於往時以姓氏為私印價則較常亦倍矣官私之内又多珍尚有玉有金有銀有瑪瑙琥珀寶石有磁燒官哥青東三窑為多凡此印章面用斗鈕間有以鹿為鈕以瓦為鈕者其銅章之鈕以龜以螭以辟邪以駝以鳬以虎以壇以兎以瓦以魚以錢以覆斗以環以四連環以亭以鼻以異獸以鹿以羊以馬以狻猊以豸鈕用鏒金塗金細錯金銀商金而製度之妙有如一方六面皆文子母一套母則鈕鑄母獸子則子獸套成如母抱子内中或三方有文余得一印子母二套三印俱文此又官私之中值之最上者也亦不多得其鐫玉之法用力精到篆文筆意不爽絲髮此必昆吾刀刻也即漢人雙鈎碾玉之法亦非後人可擬故玉章寶章更為鑒家珍重古人印文姓氏之外字及小字即乳諱也别無閒散道號家世名位引用成語惟臣某印漢之君臣闗防奏啟扣以小印又如封之一字古亦無之後人創始古之白記即封字意也曾見一印文曰某氏私記宜身致前廹事無閒願君自發封完印信此唐宋印也漢人無此等語即單字象形禽鳥龍虎雙螭芝草圓印有之子孫永寳宜爾子孫子孫世昌等印為閒文矣漢之官印似有印箱佩𢃄余得一銅箱髙下八分方寸五分製若今之官印匣同前後鑄有合扇鎻鈕事件傍有鼻耳可貫繩索㩦佩箱外青緑瑩然内藏子母印章一套此亦小銅器中一竒物也近日闗中洛下利徒翻鑄假印夥入真正以愚收藏若軍司馬王任日利不一而足且不易辨今之刻擬漢章者以漢篆刀筆自負至有好竒刻損邊傍殘缺字畫謂有古意可發大噱即印藪六帙内無十數傷損印文即有傷痕乃入土久逺水銹剥蝕或貫泥沙剔洗損傷非古文有此欲求古意何不法古篆法刀法而乃法其後人損傷形似此又近日所當辨正若諸名家自無此等又如青田石中有燈光石瑩潔如玉炤之真若燈輝近更難得價亦踊貴内有㸃汚者不佳外此有白石有紅黄青黑等石又有黑白間色紅黄間色溫潤堅細可作圖書舊人喜刻此石為鈕若鬼功毬鈕余曾見有自外及内大小以漸滚動總十二層至中小毬如菉豆止不知何法刻成真鬼功也吾杭舊有刻銀稱最者惟岑東雲沈葑湖二人極工雕模岑更善於連環三五層疊併奇異錦紋套挽等鈕其刻文亦高於沈而沈之刻文不足取也後有効者甚乏古雅意趣此亦印章中一善技也故并録之若閩中牙刻人馬為鈕者是為印章疽毒雖工何為刻玉章法王心魯云刻玉之法别無藥物烘炙詭異并引用陶隠居蟾酥昆吾刀説余之所受惟用真正花鋼煆而為刀濶五分厚三分刀口平磨取其平尖鋒頭為用將新舊玉章篆文以木製架鈐定用刀隨文鐫之一刀勿入再鍥一刀多則三鍥玉屑起矣但勿可以力勝勝則滑而難刻運刀以腕更置礪石於傍時時磨刀使鋒鋩堅利無不勝也余見心魯刻玉精妙儼若漢章且此君倣季直表細書并篆文亦佳故具載之論官哥窰器高子曰論窰器必曰柴汝官哥然柴則余未之見且論製不一有云青如天明如鏡薄如紙聲如磬是薄磁也而曹明仲則曰柴窰足多黄土何相懸也汝窰余嘗見之其色卵白汁水瑩厚如堆脂然汁中棕眼隱若蟹爪底有芝蔴花細小挣釘余藏一蒲蘆大壺圓底光若僧首圓處宻排細小挣釘數十上如吹塤収起嘴若筆㡌僅二寸直槊向天壺口徑四寸許上加罩盖腹大徑尺製亦竒矣又見碟子大小數枚圓淺瓮腹磬口泑足底有細釘以官窰較之質製滋潤官窰品格大率與哥窰相同色取粉青為上淡白次之油灰色色之下也紋取氷裂鱔血為上梅花片墨紋次之細碎紋紋之下也論製如商庚鼎純素鼎葱管空足冲耳乳爐商貫耳弓壺大獸面花紋周貫耳壺漢耳環壺文已尊祖丁尊皆法古圖式進呈物也俗人凡見兩耳壺式不論式之美惡咸指曰茄袋瓶也孰知有等短矮肥腹無矩度者似亦俗惡若上五製與欱姬壺様深得古人銅鑄體式當為官窰第一妙品豈可槩以茄袋言之又如葱管脚鼎爐環耳汝爐小竹節雲板脚爐冲耳牛奶足小爐㦸耳彛爐盤口束腰桶肚大瓶子一觚立戈觚周之小圜觚素觚紙槌瓶膽瓶雙耳匙筯瓶筆筒筆格元葵筆洗桶様大洗瓮肚盂鉢二種水中丞二色雙桃水注立𤓰卧𤓰卧茄水注匾淺磬口槖盤方印色池四入角委角印色池有文圖書㦸耳彛爐小方蓍草瓶小製漢壺竹節叚壁瓶凡此皆官哥之上乗品也桶爐六稜瓶盤口紙槌瓶大蓍艸瓶鼓爐菱花壁瓶多嘴花礶肥腹漢壺大椀中椀茶盞茶托茶洗提包茶壺六稜酒壺𤓰壺蓮子壺方圓八角酒􅜔酒杯各製勸杯大小圓碟河西碟荷葉盤淺碟桶子篐碟縧環水池中大酒海方圓花盆菖蒲盆底龜背縧環六角長盆觀音彌勒洞賓神像鷄頭礶㭼斗圓硯筯搠二色文篆𨽻書象棋子齊筯小碟螭虎鎮紙凡此皆二窰之中乗品也又若大雙耳高瓶徑尺大盤夾底骰盆大撞梅花瓣春勝合棋子礶大匾獸耳彛敦鳥食礶編籠小花瓶大小平口藥鐔眼藥各製小礶肥皁礶中菓盒子蟋蟀盆内中事件佛前供水碗束腰六脚小架各色酒案盤碟凡此皆二窰之下乗品也要知古人用意無所不到此余槩論如是其二窰燒造種種未易悉舉例此可見所謂官者燒於宋修内司中為官家造也窰在杭之鳯凰山下其土紫故足色若鐵時云紫口鐵足紫口乃器口上仰泑水流下比周身較淺故口㣲露紫痕此何足貴惟尚鐵足以他處之土咸不及此哥窰燒於私家取土俱在此地官窰質之隱紋如蟹爪哥窰質之隱紋如魚子但汁料不如官料佳耳二窰燒出器皿時有窰變狀類蝴蝶禽魚麟豹等象布於本色泑外變色或黄黑或紅紫形肖可愛是皆火之文明幻化否則理不可曉似更難得後有董窑烏泥窰俱法官窰質粗不潤而泑水燥暴溷入哥窰今亦傳世後若元末新燒宛不及此近年諸窰美者亦有可取惟紫骨與粉青色不相似耳若今新燒去諸窰遠甚亦有粉青色者乾燥而無華即光潤者變為緑色且索大價愚人更有一種復燒取舊官哥磁器如爐欠足耳瓶損口稜者以舊補舊加以泑藥裹以泥合入窰一火燒成如舊製無異但補處色渾而本質乾燥不甚精采得此更勝新燒奈何二窰如葱脚鼎爐在海内僅存一二乳爐花觚存計十數彛爐或以百計四品為鑒家至寶無恠價之忘值日就增重後此又不知凋謝如何故余毎得一覩心目爽朗神魂為之飛動頓令腹飽豈果躭玩痼僻使然更傷後人聞有是名而不得見是物也慨夫論定窰高子曰定窰者乃宋北定州造也其色白間有紫有黑然俱白骨加以泑水有如淚痕者為最故蘇長公詩云定州花磁琢如玉其紋有畫花有繡花有印花紋三種多用牡丹萱草飛鳯時製其所造器皿式多工巧至佳者如獸面彛爐子父鼎爐獸頭雲板脚桶爐膽瓶花尊花觚皆畧似古製多用已意此為定之上品餘如盒子有四子口者有内替盤者自三四寸以至寸許大亦多甚枕有長三尺者製甚可頭余得一枕用哇哇手持荷葉覆身葉形前偃後仰枕首適可巧莫與並瓶式之巧百出而碟製萬狀余有數碟長様兩角如錠􅀈起傍作四摺又如方式四角聳若蓮瓣而傍若蓮捲或中作水池傍作濶邊可作筆覘此皆上古所無亦燒人物仙人哇子居多而兜頭觀音羅漢彌勒像貎形體眉目衣摺之美克肖生動其小物如水中丞各色瓶礶自五寸以至三二寸高者余見何止百十而製無雷同更有燈檠大小椀􅜔酒壺茶注式有多種巧者俱心思不及其水注用蟾蜍用𤓰茄用鳥獸種種入神若巨觥承盤巵匜盂斝柳斗柳升柳巴其編條穿線模塑毫絲不斷又如菖蒲盆底大小水底儘有可觀更有坐墩式雅花囊元腹口坦如槖盤中孔徑二寸許用挿多花酒囊圓腹僘口如一小碟光淺中穿一孔用以勸酒式類數多莫可名狀諸窰無與比勝雖然但製出一時工巧殊無古人遺意以巧惑今則可以製勝古則未也如宣和政和年者時為官造色白質薄土色如玉物價甚高其紫黑者亦少余見僅一二種色黄質厚者下品也又若骨色青溷如油皮者彼地俗名後土窰又其下也他如高麗窰亦能綉花盞甌式有可觀伹質薄而脆色如月白甚不佳也近如新燒文王鼎爐獸面㦸耳彛爐不減定人製法可用亂真若周丹泉初燒為佳亦須磨去滿面火色可玩若玉蘭花杯雖巧似入惡道且輪廻甚速又若繼周而燒者合爐桶爐以鎻子甲毬門錦龜紋穿挽為花地者製作極工不入清賞且質較丹泉之造遠甚元時彭君寶燒於霍州者名曰霍窰又曰彭窰效古定折腰製者甚工土骨細白凡口皆滑惟欠潤澤且質極脆不堪真賞往往為牙行指作定器得索高資可發一哂論諸品窰器龍泉窰吉州窰章窰建窰古磁窰均州窰大食窰玻璃窰定窰之下而龍泉次之古宋龍泉窰器土細質薄色甚葱翠妙者與官窑争艶但少紋片紫骨鐵足耳其製若瓶若觚若蓍草方瓶若鬲爐桶爐有耳束腰小爐菖蒲盆底有圓者八角者葵花菱花者各様酒􅜔骰盆其氷盤之式有百稜者有大圓徑二尺者外此與菖蒲盆式相同有深腹單邊盥盆有大乳鉢有葫蘆瓶有酒海有大小藥瓶上有凸起花紋甚精有坐鼓高墩有大獸盖香爐燭臺花瓶并立地挿梅大瓶諸窰所無但製不甚雅僅可適用種種器具製不法古而工匠亦拙然而器質厚實極耐磨弄不易茅蔑行語以開路曰蔑損失些少曰茅但在昔色以不同有粉青有深青有淡青之别今則上品僅有葱色餘盡油青色矣製亦愈下有等用白圡造器外塗泑水翠淺影露白痕此較龍泉製度更覺細巧精緻謂之章窑因姓得名者也有吉州窰色紫與定相似質粗不佳建窰器多窰口碗盞色黑而滋潤有黄兎毫斑滴珠大者為真但體極厚薄者少見有大食窰銅身用藥料燒成五色有香爐花瓶盒子之類窰之至下者也又若玻璃窰出自島夷惟粤中有之其製不一奈無雅品惟瓶之小者有佳趣他如酒鐘高礶盤盂高脚勸杯等物無一可取色有白纒絲鴨緑天青黄鎖口三種俱可觀但不耐用耳非鑒賞佳器若均州窰有硃砂紅葱翠青俗謂鶯哥緑茄皮紫紅若臙脂青若葱翠紫若墨黑三者色純無少變露者為上品底有一二數目字號為記猪肝色火裏紅青緑錯襍若垂涎色皆上三色之燒不足者非别有此色様俗即取作鼻涕涎猪乾等名是可笑耳此窰惟種蒲盆底佳甚其他如坐墩爐盒方瓶礶子俱以黄沙泥為坯故器質粗厚不佳雜物人多不尚近年新燒此窰皆以宜興沙土為骨泑水㣲似製有佳者但不耐用俱無足取論饒器新窰古窰古之饒器進御用者體薄而潤色白花青較定少次元燒小足印花内有樞府字號者價重且不易得若我明永樂年造壓手杯坦口折腰沙足滑底中心畫有雙獅滚毬毬内篆書永樂年製四字細若粒米為上品鴛鴦心者次之花心者又其次也杯外青花深翠式様精妙傳用可久價亦甚高若近時倣效䂓製蠢厚火底火足畧得形似殊無可觀宣德年造紅魚􅧥杯以西紅寳石為末圖畫魚形自骨肉燒出凸起寶光鮮紅奪目若紫黑色者火候失手似稍次矣青花如龍松梅茶􅧥杯人物海獸酒􅧥杯硃砂小壺大椀色紅如日用白鎻口又如竹節􅧥罩盖瀂壺小壺此等發古未有他如妙用種種惟小巧之物最佳描畫不茍而爐瓶盤碟最多製如嘗品若罩盖匾礶僘口花尊蜜漬桶礶甚美多五彩燒色他如心有壇字白甌所謂壇琖是也質細料厚式美足用真文房佳器又等細白茶盞較壇盞少低而瓮肚釜底線足光瑩如玉内有絶細龍鳯暗花底有大明宣德年製暗欵隱隱橘皮紋起雖定磁何能比方直一代絶品惜乎外不多見又若坐墩之美如漏空花紋填以五色華若雲錦有以五彩實填花絢艶恍目二種皆深青地子有藍地填畫五彩如石青剔花有青花白地有氷裂紋者種種様式似非前代曾有成窰上品無過五彩蒲萄􅜔口匾肚􅧥杯式較宣杯妙甚次若草䖝可口子母雞勸杯人物蓮子酒盞五供養淺盞草䖝小琖青花紙薄酒琖五彩齊筋小碟香盒各製小礶皆精妙可人余意青花成窰不及宣窰五彩宣廟不如憲廟宣窰之青乃蘇浡泥青也後俱用盡至成窰時皆平等青矣宣窰五彩深厚堆垜故不甚佳而成窰五彩用色淺淡頗有畫意此余評似確然允哉世宗青花五彩二窰製器悉備奈何饒土入地漸惡較之二窰往時代不相侔有小白甌内燒茶字酒字棗湯薑湯字者乃世宗經籙醮壇用器亦曰壇盞製度質料逈不及茂陵矣嘉窰如磬口饅心圓足外燒三色魚匾盞紅鉛小花盒子其大如錢二品亦為世珍小盒子花青畫美向後恐官窰不能有此物矣得者珍之論藏書高子曰藏書以資博洽為丈夫子生平第一要事其中有二説焉家素者無資以蓄書家豐者性不喜見書故古人因貧日就書肆隣家讀者有之求其富而好學者則未多見也即有富而好書不樂讀誦務得繕本綾綺裝􅎖置之華齋以其觀美塵積盈寸經年不識主人一靣書何益哉噫能如是猶勝不喜見者矣藏書者無問册帙美惡惟欲捜竒索隐得見古人一言一論之秘以廣心胸未識未聞致於夢寐嗜好遠近訪求自經書子史百家九流詩文傳記稗野雜著二氏經典靡不兼収故常景躭書毎見新異之典不論價之貴賤以必得為期其好亦專矣故積書充棟類聚分門時乎開函攤几俾長日深更沉潛玩索恍對聖賢面談千古悅心快目何樂可勝古云開卷有益豈欺我哉不學無術深可恥也又如宋元刻書雕鏤不茍較閱不訛書冩肥細有則印刷清朗况多竒書未經后人重刻惜不多見佛氏醫家二類更富然醫方一字差誤其害匪輕故以宋刻為善海内名家評書次第為價之重輕若墳典六經騷國史記漢書文選為最以詩集百家次之文集道釋二書又其次也宋人之書紙堅刻軟字畫如冩格用單邊間多諱字用墨稀薄雖著水濕燥無烟跡開卷一種書香自生異味元刻倣宋單邊字畫不分麄細較宋邊條濶多一線紙鬆刻硬用墨穢濁中無諱字開卷了無嗅味有種官劵殘紙背印更惡宋板書刻以活襯竹紙為佳而蚕繭紙鵠白紙籐紙固美而存遺不廣若糊禙宋書則不佳矣余見宋刻大板漢書不惟内紙堅白毎本用澄心堂紙數幅為副今歸呉中真不可得又若宋板遺在元印或元補欠缺時人執為宋刻元板遺至國初或國初補欠人亦執為元刻然而以元補宋其去猶未易辯以國初補元内有單邊雙邊之異且字刻逈然别矣何必辯論若國初慎獨齋刻書似亦精美近日作假宋板書者神妙莫測將新刻模宋板書特抄㣲黄厚實竹紙或用川中繭紙或用糊禙方簾綿紙或用孩兒白鹿紙筒捲用槌細細敲過名之曰刮以墨浸去嗅味印成或將新刻板中殘缺一二要處或濕黴三五張破碎重補或改刻開卷一二序文年號或貼過今人註刻名氏留空另刻小印將宋人姓氏扣填兩頭角處或粧茅損用砂石磨去一角或作一二缺痕以燎火燎去紙毛仍用草烟薰黄儼狀古人傷殘舊跡或置蛀米櫃中令䖝蝕作透漏蛀孔或以鐵線燒紅鎚書本子委曲成眼一二轉折種種與新不同用紙裝襯綾錦套殻入手重實光膩可觀初非今書彷彿以惑售者或札夥囤令人先聲指為故家某姓所遺百計瞽人莫可窺測多混名家収藏者當具真眼辨証論歴代碑帖高子曰論古書法有三十六種又唐𤣥度論有十體韋績纂書列為五十六種僧夢英又作十八體書何紛紛多也此好竒者引證傳聞捜剔怪誕兼以臆說附㑹立為名目且内多重複今人學書於大小篆書八分𨽻書草楷行書工此數者而精之足矣何必多求但諸體書法傳之世間亦少雖欲求工無式可擬擬而無法出自杜撰反為大方恥也凡帖莫不祖自淳化閣帖而閣帖亦本秦漢晉唐碑刻故有祖石刻本用便觀覽即如閣帖之外有絳帖宋潘思旦以淳化帖增入别帖摹於山西絳州計二十卷北紙北墨極有精神帖比淳化高二字潭帖慶厯間僧希白重摹刻於潭州風韻和雅血肉停勻形勢俱圓頗乏峭健之氣秘閣續帖元祐中哲宗除淳化帖外增刻他帖於秘閣為之續帖淳化祖石刻后主命徐鉉以所藏法帖勒石名昇元帖在淳化前故名祖刻太清樓帖大觀年中徽宗以淳化帖考選數帖重刻於太清樓下模自蔡京恣意草率筆偏手縱無復古意頼刻手精工猶勝他帖淳熈秘閣續帖孝宗刻於石禁兩續帖相去不遠工夫精緻肥而多骨乃失之麄遂少風韻戲魚堂帖元祐間劉次莊以淳化帖除去篆題年月增入釋文摹於臨江官署在翻刻中頗有骨格淡墨搨尤佳星鳯樓帖趙彦約刻於南康曹士晃重摹於南宋趙刻精善不茍曹刻清而不穠亞於太清樓帖寶晉齋帖紹興年間曹之格刻於無為州學在諸帖中為最下米元章又云羲之七帖有雲烟捲舒翔動之氣百一帖宋王曼慶刻筆意清遒雅有勝趣刻手不精利州帖宋慶元中劉次莊重刻於益昌其釋文字畫稍大黔江帖宋秦子明刻於長沙載入黔江即僧寶月古帖十卷東庫帖世傳潘氏以石本帖二十卷分為二絳州公庫得其上十卷絳守重刻下十卷以足之靖康兵火俱失金又重刻天淵矣武陵帖較諸帖中所增最多中有黄庭經他本所無博而不精殊無可取賜書堂帖宋宣綬刻于山陽有古鍾鼎識文絶妙但二王帖俱不精石已不存一百十七種蘭亭帖宋理宗内府所藏裝褫作十册希世之寳也甲秀帖宋盧江李氏刻前有王顔書多諸帖未見後有宋人書亦多今呉中有重模本亦有可觀二王帖宋許提舉刻于臨江模勒極精羣玉堂帖宋韓侂胄刻所載前代遺跡最多後有宋人書蔡州帖蔡州重摹綘帖上十卷出于臨江潭帖之上彭州帖重刻歴代法帖不甚精采紙類北紙鼎帖石硬而刻手不精故雖博而無古意鍾鼎帖宋薛尚功編次鍾鼎卣彛古銅器銘二十卷刻于九江府庫臨摹極工甚有古意今多聊便抄録作十卷以市于人四聲𨽻韻書法極工畧似嫵媚傳云石刻于琉球其榻法紙色絶佳玉麟堂帖宋呉琚模刻穠而不精多雜米家筆法已上諸帖存者十無一二矣閣帖翻本以泉州為佳宋搨泉帖亦不可得全州今刻何啻天淵哉又如周國所刻東書堂模刻閣帖而増入蘭亭叙文并宋人書尚有雅趣近復翻刻其去周國又遠甚矣他如濯錦堂帖十卷搨法刻手不佳寶賢堂十二卷模刻亦工不快衆議近如呉中潘氏顧氏所刻閣帖較時本為佳呉人又重模刻亂真矣又見南都新刻閣帖書林稱善近復有翻本紛襍始甚先年曾見書客舒伯明輩翻刻閣帖一種極其精善但少自然欲求逼真故耳惜乎止搨數册而毁其刻板將故紙蟬翅搨法假宋閣帖毎册得售百金雖大賞鑒家亦墮術内毁板之意欲人不得指以為新而無跡可比方耳又見一帖不知何刻其編次之法似甚得理以帝王之帖作一帙以宣尼古篆作歷代名臣法書之首以五卷内王坦之王凝之智永諸王列於獻之帖後乃諸帖所未見者古今碑刻傳布海内何啻千萬而格古要論中以兩都十三省碑刻欵列為愽似亦窄矣余向遊燕中時與王麟洲梁浮山諸老夥搨西山并内近碑刻計余所得大小約有二三百種尚云未盡即法華七卷俱有碑刻以此計之天下可勝數哉吾人學書當自上古諸體名家所存碑文兼収並蓄以備展閱求其字體形勢轉側結搆若鳥獸飛走風雲轉移若四時代謝二儀起伏利若刀戈强若弓矢㸃摘如山頽雨驟而纎輕如烟霧遊絲使胷中宏博縱横有象庶學不窘於小成而書可名於當代矣余以書譜所評歴代神品妙品名家碑刻録以備考草書要領五卷集晉草書為初學法草韻三種各五卷宋元刻呉中重摹周秦漢碑帖周石鼓文史籕篆泰泰山碑李斯篆嶧山碑朐山碑章帝草書帖秦誓詛楚文蔡邕夏承碑郭有道碑九疑山碑石經𨽻書邊韶墓碑師宜官八分書仙人唐君碑張公廟碑韓明府修孔子廟器碑劉耀井隂碑堯母祠碑北岳碑郭香察𨽻華山碑張平