斤淨揀去梗核及閉口者淨稱解鹽六兩潔其色青白龜背者良細研糝鹽慢火煮煮透滚菊末糝鹽在椒上用滚湯泡過椒五寸許經宿以銀石器慢火煮止留汁汁半盞掃乾地鋪淨紙傾椒在紙上覆以新盆封以黃土經宿取置盆內將乾菊花末六兩拌滚令均更灑所餘椒汁然後攤於篩子內㫰乾菊須花小色黃葉厚莖紫氣香味甘名曰甘菊蕊可作羮者為真隂乾為末初服十五圎早晚不可輟每月漸漸增纍之至二百初服之月早十五日晚如之次月早晚各二十粒第三日增十粒至二百粒止鹽酒或鹽湯任君意所啜服及半年間胸膈微覺塞每日退十圎還至十五粒俟其無礙時數復如前日服半年後覺胸膈間橫塞如有物礙即每日退十粒退十五粒止俟其無礙所服仍如前常令氣裏蒸否則前功失須終始服之令椒氣早晚裏蒸如一日不服則前功俱廢矣飲食蔬果等並無所忌節一年效即見容顔頓悅澤目明而耳聰烏鬚而黑髮補腎輕腰身固氣益精血椒溫鹽亦溫菊性去煩熱四旬方可服服之幸母忽逮至數十年功與造化埒耐老更延年不知幾歲月四十歲方可服若四十歲服至老只如四十歲人顔容此其驗也嗜欲若能忘其效尤卓絶我欲世人安作歌故怛切服狶蘞法狶蘞俗呼火忺草春生苗葉秋初有花秋末結實近世多有單服者云甚益元氣蜀人服之法五月五日六月六日九月九日採其葉去根莖花實淨洗曝乾入甑層層灑酒與蜜蒸之如此九過則已氣味極香美熬搗篩蜜丸服之云治肝腎風氣四肢麻痺骨間疼腰膝無力亦能行大腸氣張乖崖進呈表云誰知至賤之中乃有殊常之效臣吃至百服眼目清明至千服髭鬢烏黑筋力較健效驗多端陳書林經驗方叙述甚詳療諸疾患各有湯使今人採服一就秋花成實後和枝取用灑酒蒸曝杵臼中舂為細末煉蜜為丸以服之服桑椹法桑椹利五臟關節通血氣久服不飢多收晒乾搗末蜜和為丸每日服十六丸變白不老取黑椹一升和蝌蚪一升瓶盛封閉懸屋東頭盡化為泥染白如漆又取二七枚和胡桃二枚研如泥拔去白髮填孔中即生黑髮出本草拾遺雞子丹法養雞雌雄純白者不令他雞同處生卯扣一小孔傾去黃白即以上好舊坑辰砂為末硃砂有毒選豆辨舊砂豆腐同煮一日為末和塊入卵中蠟封其口還令白雞抱之待雛出藥成和以蜜服如豆大每服三丸日三進久服長年延算蒼龍養珠萬壽紫靈丹丹法入深山中選合抱大松樹用天月德金木并交日上腰鑿一方孔方圎三四寸者入深居松之中止孔內下邊鑿一深凹次選上等舊坑辰砂一斤明透雄黃八兩共為末和作一處綿紙包好外用紅絹囊裹縫封固納松樹中空處以茯苓末子填塞完滿外截帶皮如孔大楔子敲上又用黑狗皮一片釘遮松孔恐有靈神取砂令山中人看守取松脂升降靈氣將砂雄養成靈丹入樹一年後夜間松上有螢火光二年漸大三年光照滿山取出二末再研如塵棗肉為丸如梧子大先以一盤獻祝天地神祗後用井花水清晨服一二十丸一月後眼能夜讀細書半年行若奔馬一年之後三尸消滅九蟲遁形玉女來衛六甲行厨再行隂功積德地仙可位松乃蒼龍之精砂乃赤龍之原得天地自然升降水火之氣而成丹非人間作用其靈如何九轉長生神鼎玉液膏白术氣性柔順而補每用三斤秋冬采之去粗皮赤术即蒼术也性剛中而發每用十六兩同土製二藥用木石臼搗碎入缸中用千里水浸一日夜山泉亦好次入砂鍋煎汁一次收起再煎一次絹濾渣淨去渣將汁用桑柴火緩緩煉之熬成膏磁罐盛貯封好入土埋一二日出火氣用天德日服三錢一次白湯調下或含化俱可久服輕身延年悅澤顔色忌食桃李雀蛤海味等食更有加法名曰九轉二轉加人參三兩煎濃十二次熬膏入煎膏內名曰長生神芝膏三轉加黃精一斤煎汁熬膏加入煎膏內名曰三台益算膏四轉加茯苓逺志志心各八兩熬膏加入前膏名曰四仙求志膏五轉加當歸八兩酒洗熬膏和前膏內名曰五老朝元膏六轉加鹿茸麋茸各三兩研為末熬膏和前膏內名曰六龍御天膏七轉加琥珀紅色如血者佳飯上蒸一炊為細末一兩和前膏內名曰七元歸真膏八轉加酸棗仁去核淨肉八兩熬膏和前膏內名曰八神衛護膏九轉加柏子仁浮仁四兩研如沉入前膏內名曰九龍扶壽丹丹用九法加入因人之病而加損故耳又恐一并煉膏有火候不到藥味有即出者有不易出者故古聖立方必有妙道𤣥元護命紫芝杯此杯能治五勞七傷諸虛百損左瘓右癱各色瘋疾諸邪百病昔有道人王進服之臨死見二鬼排闥視立久之而去後夢一人語之曰道者當死昨有無常二鬼來拘因公服丹砂之靈四面紅光鬼不能近而去過此公壽無量此道後活三百餘歲仙去用明淨硃砂一斤半先取四兩入水火陽城罐打大火一日二夜取出研細又加四兩如此加添打火六次足共為細末將打火鐵燈盞改打一鐵大酒杯樣摩光作塑懸入陽城罐內鐵杯渾身貼以金箔五層厚罐內裝砂口上加此杯盞打大火三日夜鐵盞上回時加水擦內結成杯在於塑上取下每用好明雄三釐研入硃杯內充熱酒服二杯一次收杯再用妙不盡述太清經說神仙靈草菖蒲服食法法用三月三日四月四日五月五日六月六日七月七日八月八日九月九日十月十日采之須在清淨石上水中生者仍須南流水邊者佳北流者不佳采來洗淨細去根上毛鬚令盡復以袋盛之浸淨水中去濁汁硬頭薄切就好日色曝乾杵羅為細末擇天德黃道吉日合之和法用陳糯米水浸一宿淘去米泔砂石盆中研細末火上煮成粥飲將前蒲末和溲須多手為丸免得乾燥難丸丸如梧桐子大晒乾用合收貯初服十丸一次嚼飯一口和丸咽下後用酒下便吃㸃心更佳百無所忌惟身體覺暖用秦芁一二錢煎湯待冷飲之即定蓋以芁為使也服至一月和脾消食二月冷疾盡除百日後百疾消滅其功鎮心益氣强志壯神填髓補精黑髮生齒服至十年皮膚細滑面如桃花萬靈侍衛精邪不干永保長生度世也神仙上乘黃龍丹方赤石脂十兩牛黃三兩肉汁三大升明乳香一斤白蜜一斤甘草末三兩白粳米三斗五升分作五分炊藥以熟為度右六味將赤石脂為末以生絹夾袋子盛貯於泔水盆內浸半日以手揉搓藥袋擺在水中澄底石末刮下紙上控乾取淨細末五兩入銀盒內盛之無銀用青白磁圎盆亦可第一次須初七八日淘米七升上甑以藥盒安米中炊之以飰熟為度收去盒蓋星辰下露一宿苐二次以月望前後如上炊飰七升蒸盒夜露月明中一宿苐三次以二十四日前後早辰依前法炊米七升將盒安內蒸之去蓋晒於日中取足日月星三光之氣苐四次先將牛乳汁三升入砂鍋炭火逼令如魚眼沸下乳香末候化入前二次蒸過赤石脂傾入牛汁內用柳條攪勻傾在乳鉢內細研復入原蒸盒內又用七升米炊之將盒安置米中米熟取起苐五次以蜜二斤入砂鍋內慢火逼之如魚眼滚起將蒸過盒內藥物傾入蜜內用柳木不住手攪勻入甘草末三兩同熬帶濕便住再用米七升入甑安盒入米中蒸之飯熟取起以盒入水盆內浸盒底半日不令水入盒內取起以淨器收貯初服選天月德黃道吉日清晨空心焚香面東七拜好酒調下一匙此乃稀世延年仙丹無金石之毒亦無誤生之理服食之後乃得四氣調和百骸舒暢功妙無窮但許度人不得索利則效乃神速此丹服之旬餘自覺藏府通快精神清爽凡風勞冷氣一切難病悉皆除去若服兩料則壽延百歲凡人須養脾脾養則肝榮肝榮則心壯心壯則肺盛肺盛則元藏實元藏實則根本固是為深根固蒂長生久視妙道在此藥中得矣豈尋嘗之藥物也哉合藥器用如左大小銀盒鍋二具小容五六兩藥盒子有蓋者大容五斗磁鍋有銀絶妙新瓦盆三箇盛一斗豆者木甑一箇容斗飰者蓋甑盆一隻匙新鍋灶一副乳鉢一箇竹木大小二箇柳木鍬三五把小笊籬一把柴用一百斤枸杞茶於深秋摘紅熟枸杞子同乾麵拌和成劑捍作餅樣晒乾研為細末每江茶一兩枸杞子二兩同和勻入煉化酥油三兩或香油亦可旋添湯攪成膏子用鹽少許入鍋煎熟飲之甚有益及明目益氣牛乳方黃牛乳最宜老人性平補血脉益心氣長肌肉令人身體康强潤澤面目光悅志不衰故人常須供之以為常食或為乳餅或為乳飲等恆使恣意充足為度此物勝肉逺矣鐵甕先生瓊玉膏此膏填精補髓腸化為筯萬神俱足五臟盈溢髮白變黑返老還童行如奔馬日進數服終日不食亦不饑開通强志日誦萬言神識髙邁夜無夢想服之十劑終其欲修隂功成地仙矣一料分五處可救五人癰疾分十處可救十人癆疾修合之時沐浴洗心勿輕示人新羅參二十四兩去蘆生地黃一十六斤取汁白茯苓四十九兩去皮白沙蜜十斤煉净右件人參茯苓為細末用蜜生絹瀘過地黃取自然汁搗時不用銅鐵器取汁盡去滓用藥一處拌和勻入銀石器或好磁器內封用淨紙二三十重封開入湯內以桑柴火煮三晝夜取出用蠟紙數重包瓶口入井中去火毒一伏時取出再入舊湯內煮一日出水氣取出開封取三匙作三盞祭天地百神焚香設拜至誠端心每日空心酒調一匙頭服原方如此但癆嗽氣盛血虛肺熱者不可用人參地仙煎治腰膝疼痛一切腹內冷病令人顔色悅澤骨髓堅固行及奔馬山藥一斤杏仁一斤湯泡去皮尖生牛乳二斤右件將杏仁研細入牛乳和山藥拌絞取汁用新磁瓶密封湯煮一日每日空心酒調服一匙頭金水煎延年益壽填精補髓久服髮白變黑返老還童枸杞子不以多少採紅熟者右用無灰酒浸之冬六日夏三日於砂盆內研令極細然後以布袋絞取汁與前浸酒一同慢火熬成膏于淨磁器內封貯重湯煮之每服一匙入酥油少許溫酒調下天門冬膏去積聚風痰癲疾三蟲伏尸除瘟疫輕身益氣令人不饑延年不長天門冬不以多少皮去心去根髮洗淨右件搗碎布絞取汁澄清濾過用磁器沙鍋或錫器慢火熬膏每服一匙空心溫酒調下不畏寒方取天門冬茯苓為末或酒或水調服之每日頻服大寒時汗出單衣忘冷服五加皮說舜嘗登蒼梧曰厥金玉香草即五加皮也服之延年故曰寧得一把五加不用金玉滿車寧得一斤地榆不用明月寶珠昔魯定公母單服五加皮酒以致延生如張子聲楊始建王叔才于世彥等皆古人服五加皮酒房室不絶皆壽考多子世世有服五加皮酒而獲年壽者甚衆山東華真人煮石經服松子法不以多少研為膏空心溫酒調下一匙日三服則不饑渴久服日行五百里身輕體健服槐實法於牛膽中漬浸百日隂乾每日吞一枚百日身輕千日白髮自黑久服通明服蓮花法七月七日採蓮花七分八月八日採蓮根八分九月九日採蓮子九分隂乾服之令人不老服食松根法取東行松根剝取白皮細銼曝燥搗篩飽食之可絶穀渴則飲水服食茯苓法茯苓削去黑皮搗末以醇酒於瓦器中漬令淹足又瓦器覆上密封泥塗十五日發當如餌食造餅日三亦可屑服方寸七不饑渴除病延年服食术法於潜术一石淨洗搗之水二石漬一宿煮減半加清酒五升重煮取一石絞去滓更微火煎熬納大豆末二升天門冬末一升攪和丸如彈子旦服三丸日一或山居逺行代食耐風寒延壽無病此崔野子所服法天門冬去心皮也服食黃精法黃精細切一石以水二石五升一云六石微火煮旦至夕熟出使冷手擂碎布囊榨汁煎之滓曝燥搗末合向釡中煎熬可為丸如雞子服一丸日三服絶穀除百病身輕體健不老少服而令有常不須多而中絶渴則飲水云此方最佳出五符中又法取黃精搗捩取汁三升若不出以水澆榨取之生地黃汁三升天門冬汁三升合微火煎減半納白蜜五斤復煎令可丸服如彈丸日三服不饑美色亦可止榨取汁三升湯上煎可丸日食如雞子大一枚再服三十日不饑行如奔馬天門冬去心皮服食萎㽔法常以二月九日採葉切乾治服方寸七日三亦依黃精作餌法服之導氣脉强筋骨治中風跌筋結肉去面皺好顔色久服延年神仙服食天門冬法乾天門冬十斤杏仁一升搗末蜜溲服方寸匕日三夜一甘始所服名曰仙人糧服食巨勝法胡麻肥黑者取無多少簸治蒸之令熱氣周遍一炊頃便出曝明旦又蒸曝凡九過止烈日亦可一日三蒸曝三日凡九過燥訖以湯水微沾於臼中搗使白復曝燥簸去皮熬使香急手搗下粗篩隨意服日二三升亦可以蜜丸如雞子大日服五枚亦可飴和之亦可以酒和服稍稍自減百日無復病一年後身面滑澤水洗不著肉五年水火不害行及奔馬神仙餌蒺藜方蒺藜一石常以七八月熟收之採來曝乾先入臼㫪去刺然後為細末每服二匙新水調下日進三服勿令斷絶服之長生服一年後冬不寒夏不熱服之二年老返少頭白再黑齒落更生服至三年身輕延壽神仙服槐子延年不老方常以十月上已日取在新磁器內盛之以盆合其上密泥勿令走氣三七日開取去皮從月初日服一粒以水下日加一粒直至月半却減一粒為度終而復始令人可能夜看細書久服此氣力百倍辟穀住食方秫米一斗麻油六兩炒冷鹽末川薑小椒各等分十兩蔓菁子三升乾大棗五升右六味為細末每服一大匙新水調下日進三服如饑渴漸有力如喫諸般果木茶湯任意不可食肉大忌也食品大忌有八走死的馬飲殺的驢脹死的牛紅眼的羊自死的猪有彈的鱉懷胎的兔無鱗的魚古書云皆不可食之若食之者生百疾也辟榖方永寧二年二月十七日黃門侍郎劉景先表言臣遇太白山隱士得此方臣聞京師米糧大貴宜以此濟之令人不饑耳目聰明顔色光澤如有誑妄臣一家甘受刑戮四季用黑豆五升淨洗後蒸三遍晒乾去皮又用大火麻子三升湯浸一宿漉出晒乾膠水拌晒去皮淘淨蒸三遍碓搗次下豆黃共為細末用糯米粥合和成圎如拳大入甑蒸從夜至子住火至寅取出於磁器內盛蓋不令風乾每服三塊但飽為度不得食一切物第一頓七日不饑第二頓七七日不饑第三頓三百日不饑容顔佳勝更不憔悴渴即研火麻子漿飲更滋潤臟腑若要重喫物用葵子三合杵碎煎湯飲開導胄腕以待沖和無損此方勒石漢陽軍大别山太平興國寺紫霞杯方此至妙祕方此杯之藥配合造化調理隂陽奪天地沖和之氣得水火既濟之方不冷不熱不緩不急有延年却老之功脫胎換骨之妙大能清上補下升降隂陽通九竅殺九蟲除夢泄悅容顔解頭風身體輕健臟腑和同開胸膈化痰涎明目潤肌膚添精蠲疝墜又治婦人血海虛冷赤白帶下惟孕婦不可服其餘男婦老少清晨熱酒服二三杯百病皆除諸藥無出此方用久杯薄以糠皮一捥坐杯於中瀉酒取飲若碎破每取杯藥一分研入酒中充服以杯料盡再用另服真珠一錢琥珀一錢乳香一錢金箔二十張雄黃一錢陽起石一錢香白芷一錢硃砂一錢血結一錢片腦一錢樟腦一錢傾杯放入麝香七分半甘松一錢三奈一錢紫粉一錢赤石脂一錢木香一錢安息一錢沉香一錢沒藥一錢製硫法用紫背浮萍於罐內將硫黃以絹袋盛懸繫於罐中煮滚數十沸取出候乾研末十兩同前香藥入銅杓中慢火溶化取出候火氣少息用好樣銀酒鍾一箇周圍以布紙包裹中間一孔傾硫黃於內手執酒鍾旋轉以勻為度仍投冷水盆中取出有火症者勿服升𤣥明粉法好淨皮硝五斤皂角半片白蘿蔔十數斤切片用水大半罈煮滚十數次漉出蘿蔔勿用仍切蘿蔔再煮如此三四次以蘿蔔無鹹味為度再用稀絹攄去渣以鍋盛之露一宿次日鍋中皆牙硝取出以綿紙袋盛褁懸於當風去處自化成粉夏月每粉一兩用甘草末一錢和之每服一錢沸湯調下大能解暑熱化頑結心痰從後瀉出痰火聖藥河上公服芡實散方乾雞頭實去忍冬莖葉揀無蟲汚新肥者即金銀花也乾藕各一斤右三味為片段於甑內炊熟曝乾搗羅為末每日食後冬湯浸水服一錢匕久服益壽延年身輕不老悅顔色壯肌膚健脾胃去留滯功妙難盡久則自知服天門冬法取天門冬二斤熟地黃一斤搗羅為末煉蜜為丸如彈子大每服三丸以溫酒調下日三服久服强骨髓駐容顔去三尸斷榖輕身延年不老百病不生若以茯苓等分為末同服天寒單衣汗出忌食鯉魚并腥羶之物服藕食莖法味甘平寒無毒主補養神益氣力除百疾久服輕身耐老不饑延年一名水芝按藥性論云藕汁亦單用味甘能消淤血不散節搗汁吐血及鼻血不止並皆治之又云蓮子性寒主治血不足傷中氣絶利益十二經脉血氣生食有寒氣蒸食之良又熟去心為末蠟蜜和丸日服數丸令人不饑此方仙家用爾陳藏器云荷葉味苦平無毒主安胎去惡血留好血血痢煮即止荷葉并蒂及蓮房主血脹腹痛産後淤血不下酒煮服又食野菌毒用水煮服藕粉深處曽製取粗者洗淨搗爛布絞取汁以疏布再濾過澄去上清水如汁稠難澄添水攪勻定為粉服之輕身延年硃砂雄黃杯法碾好辰砂為細末白蠟溶開入砂傾入酒杯內如前法取起成杯有寧心安神延年益算又有用雄黃者亦如此法有解毒辟百蟲之力然此杯皆不如紫霞杯之妙也神仙巨勝丸方輕身壯陽却老還童去三尸下九蟲除萬病巨勝酒浸一宿九蒸九暴牛膝酒浸切焙巴㦸天酒洗天門冬去心焙熟乾地黃焙柳桂去皮酸棗仁覆盆子莵絲子酒浸别搗焙乾逺志去心菊花人參白茯苓去黑各一右一十四味揀擇淨搗羅為末煉蜜為丸如梧桐子大每服空心溫酒下二十丸服一月服柏實方右於八月合取柏房曝之令坼其子自脫用冷水淘取沉者控乾輕椎取仁搗羅為細末每服二錢匕酒調下冬月溫酒下早晨日午近晚各一服稍增至四五錢加菊花末等分蜜丸如梧桐子大每服十丸二十丸日三服酒下服食大茯苓丸方白茯苓去黑皮茯神抱木者去木大棗桂去皮者佳人參白木逺志去心炒黃細辛去苗葉石菖蒲一寸九節者米泔浸三日日換泔水碎切曝乾上八味各十二兩甘草八兩水蘸擘破炙乾薑五兩炮裂右十一味搗羅為末煉蜜黃色掠去沫停冷拌和為丸如彈子大每服一丸久服不饑不渴若曽食生菜果子食冷水不消者服之立愈五藏積聚氣逆心腹切痛結氣腹脹吐逆不下食生薑湯下羸腹飲食無味酒下欲求仙未得諸大丹者皆須服之若不絶房室不能斷穀者但服之去萬病令人長生不老合時須辰日辰時於空室中衣服潔淨不得令雞犬婦人孝子見之李八伯杏金丹方取肥實杏仁五㪷以布袋盛用井花水浸三日次入甑中以帛覆之上鋪黃泥五寸炊一日去泥取出又於粟中炊一日又於小麥中炊一日壓取油五升澄清用銀瓶一隻打如水瓶樣如無銀者用好砂罐為之入油在內不得滿又以銀圎葉可瓶口大小蓋定銷銀汁灌固口縫入於大釡中煮七復時常撥動看油結打開取藥入器中火消成汁傾出放冷其色如金後入臼中搗之堪丸即丸如黃米大空心旦暮酒下二十丸或用津液下二十丸久服保氣延年髮白變黑能除萬病杏金丹符合藥時朱書此符三道衣領中帶之輕身延年仙术丸方蒼术米泔浸夏秋三日春七日去皮洗淨蒸半日作片焙乾石柏搗為末煉蜜為丸如梧桐子大每日早晨日午酒下五十丸枸杞煎方採枸杞子不拘多少去蒂清水淨洗淘出控乾用夾布袋一枚入枸杞子在內於淨砧上榷壓取自然汁澄一宿去清石器內慢火熬成煎取出瓷器內收貯服半匙頭溫酒調下明目駐顔壯元氣潤肌藏久服大有益如合時天色稍暖其壓下汁更不用經宿其煎熬下三兩年並不損壞如久逺服多煎下亦無妨也保鎮丹田二精丸方用黃精去皮枸杞子各二斤右二味各八九月間採取先用清水洗黃精一味令淨控乾細銼與枸杞子相和杵碎拌令勻隂乾再搗羅為細末煉蜜為丸如梧桐子大每服三五十丸空心食前溫酒下常服助氣固精補鎮丹田活血駐顔長生不老萬病黃精丸方用黃精十斤淨洗蒸令爛熟白蜜三斤天門冬三斤去心蒸令爛熟右三味拌和令勻置於石臼內搗一萬杵再分為四劑每一劑再搗一萬杵過爛取出丸如梧桐子大每三十丸溫酒下日三不拘時服延年益氣治療萬病久服可希出世却老七精散方用茯苓天之精三兩地黃花地之精桑寄生木之精各二兩菊花月之精一兩三分竹實日之精地膚子星之精車前子雷之精各一兩二分右七種上應日月星辰欲合藥者以四時旺相日光齊戒九日别於靜室內焚香修合搗羅為細散每服三方寸匕以井花水調下面向陽服之須陽日一服隂日二服滿四十九日即能固精延年却除百病聰明耳目甚驗地黃花須四月採竹實似小麥去三尸滅百蟲美顔色明耳目雄黃丸用雄黃透明如雞冠不雜石搗羅一兩松香採明淨純白者水中煮一法二炊將浮起者取用如前右二物和勻杵為丸彈子大每早酒下一丸服十日三尸百蟲自下出人面紫黑氣色皆除服及一月百病自瘥常須清淨勿損藥力
