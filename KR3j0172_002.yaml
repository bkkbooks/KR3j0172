body:
  text: 遵生八箋卷二明髙濓撰清修妙論箋大藏經曰救災解難不如防之為易療疾治病不如避之為吉今人見左不務防之而務救之不務避之而務藥之譬之有君者不思勵治以求安有身者不能保養以全夀是以聖人求福於未兆絶禍於未萌蓋災生於稍稍病起於微微人以小善為無益而不為以小惡為無損而不改孰知小善不積大德不成小惡不止大禍立至故太上特指心病要目百行以為病者之鑒人能靜坐持照察病有無心病心醫治以心藥奚伺盧扁以瘳厥疾無使病積於中傾潰莫遏蕭牆禍起恐非金石草木可攻所為長年因無病故智者勉焉喜怒偏執是一病亡義取利是一病好色壞德是一病専心係愛是一病憎欲無理是一病縱貪蔽過是一病毁人自譽是一病擅變自可是一病輕口喜言是一病快意逐非是一病以智輕人是一病乘權縱橫是一病非人自是是一病侮易孤寡是一病以力勝人是一病威勢自愶是一病語欲勝人是一病貨不念償是一病曲人自直是一病以直傷人是一病與惡人交是一病喜怒自伐是一病愚人自賢是一病以功自矜是一病誹議名賢是一病以勞自怨是一病以虛為實是一病喜說人過是一病以富驕人是一病以賤訕貴是一病讒人求媚是一病以德自顯是一病以貴輕人是一病以貧妬富是一病敗人成功是一病以私亂公是一病好自掩飾是一病危人自安是一病隂陽嫉妬是一病激厲旁悖是一病多憎少愛是一病堅執爭鬭是一病推負著人是一病文拒鈎剔是一病持人長短是一病假人自信是一病施人望報是一病無施責人是一病與人追悔是一病好自怨憎是一病好殺蟲畜是一病蠱道厭人是一病毁訾髙才是一病憎人勝己是一病毒藥鴆飲是一病心不平等是一病以賢嗊嗃是一病追念舊惡是一病不受諫諭是一病內疏外親是一病投書敗人是一病笑愚癡人是一病煩苛輕躁是一病擲捶無禮是一病好自作正是一病多疑少信是一病笑顛狂人是一病蹲踞無禮是一病醜言惡語是一病輕慢老少是一病惡態醜對是一病了戾自用是一病好喜嗜笑是一病當權自信是一病詭譎諛諂是一病嗜德懷詐是一病兩舌無信是一病乘酒凶橫是一病罵詈風雨是一病惡言好殺是一病教人墮胎是一病干預人事是一病鑽穴窺人是一病不借懷怨是一病負債逃走是一病背向異詞是一病喜抵捍戾是一病調戲必固是一病故迷誤人是一病探巢破卵是一病驚胎損形是一病水火敗傷是一病笑盲聾啞是一病亂人嫁娶是一病教人捶擲是一病教人作惡是一病含禍離愛是一病唱禍道非是一病見貨欲得是一病強奪人物是一病此為百病也人能一念除此百病日逐㸃檢使一病不作决無災害痛苦煩惱凶危不惟自己保命延年子孫百世永受其福矣大藏經曰古之聖人其為善也無小而不崇其于惡也無微而不改改惡崇善是藥餌也録所謂百藥以治之思無邪僻是一藥行寬心和是一藥動靜有禮是一藥起居有度是一藥近德逺色是一藥清心寡欲是一藥推分引義是一藥不取非分是一藥雖憎猶愛是一藥心無嫉妬是一藥教化愚頑是一藥諫正邪亂是一藥戒勑惡僕是一藥開導迷誤是一藥扶接老幼是一藥心無狡詐是一藥拔禍濟難是一藥常行方便是一藥憐孤恤寡是一藥矜貧救厄是一藥位髙下士是一藥語言謙遜是一藥不負宿債是一藥愍慰篤信是一藥敬愛卑微是一藥語言端慤是一藥推直引曲是一藥不爭是非是一藥逢侵不鄙是一藥受辱能忍是一藥揚善隱惡是一藥推好取醜是一藥與多取少是一藥稱嘆賢良是一藥見賢內省是一藥不自誇彰是一藥推功引善是一藥不自伐善是一藥不掩人功是一藥勞苦不恨是一藥懷誠抱信是一藥覆蔽隂惡是一藥崇尚勝己是一藥安貧自樂是一藥不自尊大是一藥好成人功是一藥不好隂謀是一藥得失不形是一藥積德樹恩是一藥生不罵詈是一藥不評論人是一藥甜言美語是一藥災病自咎是一藥惡不歸人是一藥施不望報是一藥不殺生命是一藥心平氣和是一藥不忌人美是一藥心靜意定是一藥不念舊惡是一藥匡邪弼惡是一藥聽教伏善是一藥忿怒能制是一藥不干求人是一藥無思無慮是一藥尊奉高年是一藥對人恭肅是一藥內修孝悌是一藥恬靜守分是一藥和悅妻孥是一藥以食飲人是一藥助修善事是一藥樂天知命是一藥逺嫌避疑是一藥寬舒大度是一藥敬信經典是一藥息心抱道是一藥為善不倦是一藥濟度貧窮是一藥捨藥救疾是一藥信禮神佛是一藥知機知足是一藥清閒無欲是一藥仁慈謙讓是一藥好生惡殺是一藥不寶厚藏是一藥不犯禁忌是一藥節儉守中是一藥謙己下人是一藥隨事不慢是一藥喜談人德是一藥不造妄語是一藥貴能援人是一藥富能救人是一藥不尚爭鬬是一藥不淫妓眚是一藥不生奸盜是一藥不懷咒厭是一藥不樂詞訟是一藥扶老挈幼是一藥此為百藥也人有疾病皆因過惡隂掩不見故應以疾病因緣飲食風寒惡氣而起由人犯違聖教以致魂迷魄喪不在形中肌體空虛精氣不守故風寒惡氣得以中之是以有德者雖處幽暗不敢為非雖居榮祿不敢為惡量體而衣隨分而食雖富且貴不敢恣欲雖貧且賤不敢為非是以外無殘暴內無疾病也吾人可不以百病自究以百藥自治養吾天和一吾心志作耆年頤壽之地也哉百藥一段與道藏少異一二余以家藏宋刻小本考詳似近人情語故以刻之初謂道藏國刋似無訛誤余閲一藏以遍魚豕之錯不可枚舉黃帝曰一隂一陽之謂道偏隂偏陽之謂疾兩者不和若四時中有春無夏有秋無冬矣因而和之是謂聖度聖人不絶和合之道但貴于閉密以守天真也太上曰情欲出於五內魂定魄靜者生也情欲出於胸臆精散神惑者死也書云聲色動蕩于中情愛牽纒心有念動有著晝想夜夢馳逐於無涯之欲百靈疲役而消散宅舍無主而傾頽矣書云欲多則損精人可保者命可惜者身最重者精肝精不固目眩無光肺精不交肌肉消瘦腎精不固神氣減少脾精不堅齒髮浮落若耗散真精不已疾病隨生死亡隨至神仙可惜歌曰可惜許可惜許可惜元陽宫無主一㸃既隨穠色枯百神泣送精光去三尸喜七魄怒血敗氣衰將何補尺宅寸田屬别人玉爐丹竈阿誰處勸世人休戀色戀色貪淫有何益一神去後百神隨百神去盡人不知幾待說時說不得臨時出口泄天機孫真人銘曰怒甚偏傷氣思多太損神神疲心易役氣弱病相縈勿使悲歡極當令飲食均再三防夜醉第一戒晨嗔亥寢鳴雲鼓注曰扣齒三十六下晨興潄玉津注曰早時開眼即以舌攪上下腭待津生滿口汩汩咽下直至丹田妖神難犯己精氣自全身若要無諸病常當節五辛注曰不使鹹酸苦辣甜五味偏傷一臟致使生疾安神宜恱樂注曰常令心上生歡喜惜氣保和純注曰常使心氣和平絶躁妄焦爍生怒夀夭休論命修行本在人若能遵此理平地可朝真象山要語曰精神不運則愚血脈不運則病又曰志固為氣之帥然至於氣之専一則亦能動志故不但持其志又戒之以無暴其氣也居處飲食適節宣之宜視聽言動嚴邪正之辨皆無暴其氣之功內無所纍外無所纍自然自在才有一些他意便沈重了徹骨徹髓見得超然於一身自然輕清自然靈大陸文達公有二歌曰聽聽聽勞我以生天理定若還懶惰受饑寒莫到窮來方怨命虛空自有神明聽又曰聽聽聽衣食生身天付定酒食貪多折人夀經營太甚違天命定定定腎水也水生氣氣即火矣心火也火生液液即水矣水可以滋流百脈火可以薰蒸四大經曰心牽於事火動於中有動於中必搖其精天之助人為善也至快至周而略無毫髮之或慳天之報人之惡也亦至信至密而略無毫髮之或漏細考逺計自當見爾虛齊云食服常溫四體皆春心氣常順百病自遁至哉斯言又曰樂莫樂於日休憂莫憂於多求古之人雖疾雷破山而不震雖貨以萬乘而不酬惟胸中一㸃堂堂者以為張主張氏曰一念之善則天地神祇祥風和氣皆在乎此一念之惡則夭星厲鬼凶荒禍害皆在乎此可不慎歟勸君莫存半㸃私若存半㸃私終無人不知勸君莫用半㸃術若用半㸃術終無人不識禍莫大於縱己之欲惡莫大於言人之非人非賢莫交物非義莫取念非善莫行事非善莫說以責人之心責己則寡過以恕己之心恕人則全交凡人傷巧則可悔之事多全拙則可悔之事少知止自能除妄想安貧須要禁奢心故云良田千頃日食二升大厦千間夜眠八尺治生莫若節用養生莫若寡欲戒酒後語忌食時嗔忍難忍事順不明人口腹不節致病之由念慮不正殺身之本又曰世人之夀悉可百歲而以喜怒哀樂汩沒心源愛惡嗜欲戕伐性根而又揚人之短掩人之長顛倒方寸頃刻萬變神倦思勞難全天和如彼淡泉汩以五味欲其不害其可得乎造物勞我以生逸我以老少年不勤是不知勞老年奔馳是不知逸天命我逸而我自勞可乎舊緣漸斷新緣莫結醴交勢合自致日疏無事安閒方可修道又曰口中言少心頭事少肚中食少自然睡少依此四少神仙可了心牽於事火動于中心火既動真精必搖故當死心以養氣息機以死心又曰戒滿意之食省爽口之味冬食不得太暖夏食不得太凉氣清則神暢氣濁則神昏氣亂則神勞氣衰則神去故油盡燈滅髓竭人亡添油燈焰補髓人強溺愛冶容而作色荒禪家謂之外感之欲夜深枕上思得豔麗或成宵寐之感禪家謂之內感之欲二者之欲綢繆染著皆消耗元精若能離之則腎水自然滋生可以上交于心又若思索文字忘其寢食禪家謂之理障經綸職業不告劬勩禪家謂之事障二者之障雖非人欲亦損性靈若能遣之則心火不至上炎可以下交于腎故曰塵不相緣根無所傷返流全一六用不行洞神真經曰養生以不損為延年之術不損以有補為養生之經居安慮危防未萌也雖少年致疾氣弱體枯若晚年得悟防患補益血氣有氣而神亦自足可以延生嵇叔夜云服藥求汗或有勿獲愧情一集渙然流離是皆情發于中而形于外也因知喜怒哀樂寧不傷人故心不撓者神不疲神不疲則氣不亂氣不亂則身泰夀延矣寵辱不驚肝木自寧動靜以敬心火自定飲食有節脾土不泄調息寡言肺金自全恬然無欲腎水自足此皆吾生藥石人當請事斯語人若知得覺字便知我大物小物有盡我無盡也四大形骸皆外物也榮辱生死物固有之安能使我戚戚哉有蔽則昏無蔽則明耳之蔽聲目之蔽色口鼻蔽于嗅味四肢蔽于淫樂一掬之力不勝則羣蔽交雜去禽獸不逺人要優游自足心無外想嗒然坐忘在身忘身在事忘事在家忘家其受用無量無視無聽抱神以靜形將自正必靜必清無勞汝形無搖汝精可以長生目無所見耳無所聞心無所知汝神守形形乃長存慎內閉外多知為敗靖節之乞食而咏康節之微醺而歌非有所得若是乎哉病從口入禍從口出可不慎歟人不自重斯召侮矣人不自強斯召辱矣自重自強侮辱斯逺人能改過則善日長而惡日消矣人能安貧則用長足而體長舒矣禍福無不自求之者後世有星數之說行而反求諸天有堪輿之說行而求之地矣於人事獨委焉萬起萬滅之私亂吾之心久矣今當掃去以全吾湛然之心人能愈收斂則愈充拓愈細密則愈廣大愈深厚則愈光明萬事不責于人則無寒氷烈火之擾吾心多言多敗多事多纍虛中無我惟善是從守約者心自空知止者心自足七部要語曰神靜而心和心和而形全神躁則心蕩心蕩則形傷欲全其形先在理神故恬和養神以安于內清虛棲心不誘于外也七竅者精神之户牖也志氣者五臟之使役也耳目誘于聲色鼻口恱于芳味肌體之于安適其情一也則精神馳騖而不守志氣縻于趣捨五臟淹蕩而不安嗜欲連綿于外心氣壅塞于內蔓衍于荒淫之波留連於是非之境鮮有不敗德傷生者矣人之禀受性情具焉性之所感者情也情之所安者欲也情出于性而情違性欲由于情而欲害情情之傷性性之妨情猶烟氷之於水火也烟生于火而鬱火氷生于水而遏水故烟沒而火盛氷泮而水通性貞則情銷情滅則性謐夫明者刳情以遣纍約欲以守貞食足以充饑養氣衣足以蓋形禦寒美麗之華不為滑性哀樂之感不以亂神處於止足之泉立于無害之岸此全性之道也海蚌未剖則明珠不顯崑竹未斷則鳯音不揚情性未鍊則神明不發譬諸金木金性包水木性藏火故鍊金則水出鑽木則火生人能務學以鑽鍊其性則才慧發矣身嘗居善則內無憂慮外無畏懼獨立不慙影獨寢不愧衾上可以接神明下可以對蠻夷德逈幽明禎祥畢集靈氣謂之神休氣謂之鬼煩氣謂之蟲魚雜氣謂之禽獸姦氣謂之妖邪氣之濁者愚癡凶虐氣之剛者髙嚴壯健氣之柔者仁慈敦篤所以君子行正氣小人行邪氣形者氣之聚也氣虛則形羸神者精之成也精虛則神粹形者人也為萬物之最靈神者生也是天地之大德最靈者為萬物之首大德者為天地之宗萬物以停育為先天地以清淨是務故當養其形以愛其神敬其身以重其生理好憎之情則愛勿近也和喜怒之情則怨不犯也故喜怒亂氣嗜欲傷性性相近也習之以逺如水性欲清泥沙汚之人性欲平嗜欲害之與性相害不可兩立一起一廢不可俱興夫生死之道𢎞之在人生死常也確乎在天但觀以自然則生死之道無可而無不可也或未生而已死或已死而重生或不可以生而生或不可以死而死或可以死而不死或可以生而不生或有生而不如無生或惜死而所以致死是以致死之地則生致生之地則死或為知而不可以死或為時而不可以生或云勞我以生生者好事也不可惡其生又云休我以死死者惡事也不可好其死凡人心非不好其生不能全其生非不惡其死不能逺其死哀哉口舌者禍福之宫危亡之府語言者大命之屬刑禍之部也言出患入言失身亡故聖人當言發而憂懼常如臨淵履氷以大若小以富若貧處盛高之谷逰卑賤之淵微為之本寂為之根懼為之宅憂為之門可不戒歟福者禍之先利者害之源治者亂之本存者亡之根故上德質而不文不視不聽如無生焉無心無意若未生焉執守虛無而生生焉識道德之意揆天地之情禍莫大於死福莫大于生是以有名之名喪我之槖無名之名養我之宅有貨之貨喪我之賊無貧之貧養我之福施觀吾曰存我之道切在去機機去身存機住身死無機胸中純白自處景行録曰以忠孝遺子孫者昌以智術遺子孫者亡以謙接物者強以善自衛者良又曰知足常足終身不辱知止常止終身不恥荀子曰自知者不怨人知命者不怨天怨人者窮怨天者凶又曰榮辱之大分安危利害之常體也先義而後利者榮先利而後義者辱榮者常通辱者常窮通者常制人窮者常制于人古人云㑹做快活人凡事莫生事㑹做快活人省事莫惹事㑹做快活人大事化小事㑹做快活人小事化無事又云忍是心之寶不忍身之殃舌柔常在口齒折只因剛思量一忍字真是快活方片時不能忍煩惱日月長又曰木有所養則根本固而枝葉茂梁棟之材成水有所養則泉源壯而流𣲖長灌溉之利溥人有所養則心神安而識見達修道之事成真誥曰鏡以照面智以照心鏡明則塵垢不染智明則邪惡不生虛皇經曰財為患之本聚財為聚業財為愛欲根能招一切罪若以財非財始可入道境又曰汝知見世因緣則知宿世因緣汝修見世因緣則知來世因緣一氣無偏倚所種還自生植此荆棘根如何望喬林又云慈悲之力最為廣大能化一切能服一切惡者無與爭暴者無與抗所向無與敵是為廣大無邊又曰口無是非言心無人我相身不受染著方契無為道衆生俱幻化墮彼色相因須知樂是苦一念了無為仙經云専精養神不為物雜謂之清反神復氣安而不動謂之靜制念以定志靜身以安神保氣以存精思慮兼忘冥想內視則身神並一身神並一則近真矣延命録曰五榖充肌體而不能益夀百藥療病延年而不能甘口充肌甘口者俗人之所珍苦口延年者道士之所寶禁忌篇曰善攝生者卧起有四時之早晚興居有至和之常制筋骨有偃仰之力間邪有吞吐之術流行營衛有補瀉之法節宣勞逸有與奪之要忍怒以養隂氣抑喜以養陽氣然後先將草木以救虧缺服金丹以定不窮養性之道盡于此矣列子曰少不勤行壯不競時長而安貧老而寡欲閒心勞形養生之方也太平御覽曰道者氣也寶氣則道長存祕者精也寶精則神長生精者血脈之川流守骨之靈神精去則骨枯骨枯則死矣是以為道者務寶其精莊子曰聖人休休焉則平易矣平易則恬淡矣平易恬淡則憂思不能入邪氣不能襲故其德全而神不虧又曰養志者忘形養形者忘利致道者忘心真誥曰衰年體羸多為風寒所乘當深頥養晏此無事上味𤣥元棲守絳津體寂至道心存內觀屏波萬纍蕩濯他念乃始近其門户耳若憂纍多端人事未省雖復憩靈空洞存心淡泊纒綿亦弗能達也𤣥關祕論曰無心于事則無事于心故心靜生慧心動生昏仙經曰子欲長生當由所生之門游處得中進退得所動靜以法去留以度可以延命而愈疾矣本草總篇曰攝生之道莫若守中守中則無過與不及之害經曰春秋冬夏四時隂陽生病起于過用蓋不適其性而強云為逐強處即病生五臟受氣蓋有常分用之過耗是以病生善養生者既無過耗之弊又能保守真元何患乎外邪所中也故善服藥不若善保養不善保養不若善服藥世有不善保養又不善服藥倉卒病生而歸咎于神天噫是亦未嘗思也可不謹歟又曰未聞道者放逸其心逆於生樂以精神徇知巧以憂畏徇得失以勞苦徇禮節以身命徇利財四徇不置心為之病矣極力勞形躁暴氣逆當風縱酒食嗜辛鹹肝為之病矣飲食生冷溫凉失度久坐久卧大飽大饑脾為之病矣呼呌過常辨爭陪答冒犯寒暄恣食鹹苦肺為之病矣久坐濕地強力入水縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也衛生之士須謹此五者可致終身無苦經曰不治已病治未病正為此矣吕氏春秋曰凡生之長也順之也使生不順者欲也故聖人必先適欲適節也室大則多隂臺髙則多陽多隂則蹶多陽則痿蹶者逆寒疾也痿躄不能行此隂陽不適之患也是故先王不處大室不為髙臺味不衆珍春不輝熱熱則理塞脈則閉結理塞則氣不達味衆珍則胃充胃充則中大鞔中大鞔則氣不達以此求長生其可得乎三因極一方曰夫人禀天地隂陽而生者蓋天有六氣人有三隂三陽而上奉之地有五行人有五臟五腑而下應之於是資生皮肉筋骨精髓血脈四肢九竅毛髮齒牙唇舌總而成體外則氣血循環流注經絡喜傷六淫內則精神魂魄志意思喜傷七情六淫者寒暑燥濕風熱是也七情者喜怒憂思悲恐驚是也若持護得宜怡然安泰役冒非理百疴生焉崔公入藥鏡曰物之最靈惟其人也身者乃萬化之本精於人也若水浮航氣於人也如風揚塵神於人也似野馬聚空水涸則航止風息則塵靜野馬散而大空長有精能固物氣能盛物精氣神三者心可不動其變化也外忘其形內養其神是謂登真之路嗜欲縱乎心孰能久去哀樂傷乎志孰能久忘思慮役乎神孰能久無利祿勞乎身孰能久捨五味敗乎精孰能久節酒醴亂乎情孰能久絶食佳殽飲㫖酒視以姝麗聽以淫聲雖精氣強而反禍于身耳目快而致亂于神有百端之敗道以一介而希真安有養身之驗耳夫學道者外則意不逐物而移內則意不隨心而亂湛然保于虛寂造乎清淨之域矣上元夫人謂漢武帝曰汝好道乎勤而不獲實有由也汝胎性暴胎性淫胎性奢胎性酷胎性賊暴則使氣奔而攻神是故神擾而竭淫則使精漏而魂疲是故精竭而魂疲奢則使真雜而魄穢是故命逝而靈臭酷則使喪仁而攻目是故失仁而眼亂賊則使心鬭而口乾是故內戰而外絶此五事皆是截身之刀鋸刳命之斧斤矣雖復志好長生不能遣兹五難亦何為損性而自勞乎文中子曰靜漠恬淡所以養生也和愈虛無所以據德也外不亂內即性得其宜靜不動和即德安其位養生以經世抱德以終年可謂能體道矣又曰能尊生雖富貴不以養傷身雖貧賤不以利纍形三茅君訣曰神養于氣氣㑹于神神氣不散是謂修真元始經曰喜怒損性哀樂傷神性損則害生故養性以全氣保神以安身氣全體平心安神逸此全生之訣也達磨胎息經曰元壯既立猶瓜有蒂暗注母氣母呼即呼母吸即吸綿綿十月氣足形圓心是氣之主氣是形之根形是氣之宅神是形之真神用氣養氣因神住神行則氣行神住則氣住此經要妙之義也羣仙諸玉曰煉精者煉元精非淫佚所感之精煉氣者煉元氣非口鼻呼吸之氣煉神者煉元神非心意念慮之神故此神氣精者與天地同其根與萬物同其體得之則生失之則死以陽火煉之則化成陽氣以隂符養之則化成隂精故曰見之不可用用之不可見養生論曰大凡養生先調元氣身有四氣人多不明四氣之中各主生死一曰乾元之氣化為精精反為氣精者連於神精益則神明精固則神暢神暢則生健若精散則人疲精竭則神去神去則死二曰坤元之氣化為血血復為氣氣血者通于內血壯則體豐血固則顔盛顔盛則生空若血衰則髮變血敗則胸空胸空則死三曰庶氣庶氣者一元交氣氣化為津津復為氣氣連于生生託于氣隂陽動息滋潤形骸氣通則生氣乏則死四曰衆氣衆氣者榖氣也榖濟于生終誤于命食榖氣雖生藴榖氣還死精能附血氣能附生當使循環即身永固乾元之陽陽居隂位臍下氣海是也坤元之隂隂居陽位胸中血海是也生者屬陽陽貫五臟喘息之氣是也死者屬隂隂納五味穢惡之氣是也氣海之氣以壯精神以填骨髓血海之氣以補肌膚以流血脈喘息之氣以通六腑以扶四肢穢惡之氣以亂身神以腐五臟存神論曰物理所不可逃者四曰生曰心曰性曰情有生必有心有心必有性有性必有情性則定靜情則感通感通之際二氣必交交于外則龍虎飛走鉛汞漏失交于中則龍虎相隨鉛汞內結氣所生也故來入身謂之生所以通生謂之道至人以道制情氤氲之際能住𤣥胎恍惚之中能擒物象所以有道合一神形俱妙之功也又云從色來者由隂陽之中從化來者出隂陽之外由隂陽中來者有留形住世之理故無用之中有用必奪造化於隂陽出隂陽外者有飛靈走性之道故有為之中無為方獨超升於象外進退之序能鍊色身而化形能脫化身而化神果無序而頓超理所未聞元道真經曰生可冀也死可畏也草木根生去土則死魚鱉沈生去水則死人以形生去氣則死故聖人知氣之所在以為身寶莊子養生篇曰吾生也有涯向秀曰生之所稟各有涯也而智也無涯嵇康曰夫不慮而欲性之動也識而發感智之用也性動者遇物而常足則無餘智從感而來倦而不已故世之所患常在於智用不在性動也以有涯隨無涯殆已郭象曰以有限之性尋無窮之智安得而不困哉已而為智者殆而已矣向秀曰已困於智矣又為智攻之者又殆矣莊子又曰達生之情者不務生之所無以為向秀曰生之所無以為者性表之事也張湛曰生理自全為分外所為此是以有涯隨無涯也達命之情者不務智之所無奈何向秀曰命盡而死者是張湛曰乘生順之理窮所稟分豈智所知西山記曰人之真氣大運隨天元氣小運隨子腎午心卯肝酉肺故坐子午取水火交也又曰一體之盈虛消息皆通於天地應於萬類張湛曰人與隂陽通氣和之於始和之於終靜神滅想生之道也始終和則神志不散妙真經曰人常失道非道失人人常去生非生去人故養生者慎勿失道為道者慎勿失生使道與生相守生與道相保黃老經𤣥禾曰天道施化與萬物無窮人道施化形神消亡轉神施精精竭形衰形本生精精生於神不以精施故能與天合德不與神化故能與道同式又曰以形化者尸解之類神與形離二者不俱遂象飛鳥入海為蛤而隨季秋隂陽之氣以氣化者生可冀也以形化者甚可畏也指歸曰逰心於虛靜結志於微妙委慮於無欲歸指於無為故能達生延命與道為久或疑者云始同起於無外終受氣於隂陽載形魄於乾坤資生長於食息而有愚有智有強有弱有夀有夭天耶人耶解者曰夫形生愚智天也強弱夀夭人也河圖帝視萌曰侮天時者凶順天時者吉春夏樂山髙處秋冬居卑深藏吉利多福夀考無窮雒書寶豫命曰古人治病之方和以醴泉潤以元氣藥不辛不苦甘甜多味常能服之津流五臟繫之在肺終身無患傳曰雜食者百病妖邪所鍾所食愈少心愈開年愈益所食愈多心愈塞年愈損焉真人大計曰奢懶者夀慳靳者夭放散劬勞之異也田夫夀膏粱夭嗜欲多少之驗也處士少疾逰子多患事務繁簡之殊也故俗人競利道士罕營彭祖曰道不在煩但能不思衣不思食不思聲色不思勝負不思得失不思榮辱心不勞形不極常道引納息但爾可得千歲欲長生無限者當服上藥仲長統曰蕩六情者有心而不以之思有口而不以之言有體而不以之安安之而能遷樂之而不愛以之圖之不知日之益也不知物之易也飲食不時傷人憂恚悲哀傷人喜樂過差傷人忿􅓰不解傷人汲汲所願傷人戚戚所患傷人寒暖失節傷人隂陽不交傷人凡交須依導引諸術若能避衆傷人事而復曉隂陽之術則是不死之道大樂氣飛揚大愁氣不通用精令人氣力乏多睡令人目盲多唾令人心煩貪美食令人泄痢俗人但知貪於五味不知有元氣可飲聖人知五味之毒焉故不貪知元氣可服故閉口不言精氣息應也唾不咽則氣海不潤氣海不潤則津液乏是以服元氣飲醴泉乃延年之本也明醫論云疾之所起自生五勞五勞既用二臟先損心腎受邪腑臟俱病五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰疲勞五勞則生六極一曰氣極二曰血極三曰筋極四曰骨極五曰精極六曰髓極六極即為七傷七傷變為七痛七痛為病令人邪氣多正氣少忽忽喜怒悲傷不樂飲食不生肌膚顔色無澤髮白枯稿甚者令人得大風偏枯筋縮四時拘急攣縮百關隔塞羸瘦短氣腰腳疼痛此由早娶用精過差血氣不足極勞之所致也憂畏者生死之門禮教之主存亡之由禍福之本吉凶之元也養性者失其憂畏則心亂而不治形躁而不寧神散而氣越志蕩而意昏應生者死應死者亡應成者敗應吉者凶其憂畏者其猶水火不可暫忘也太上畏道其次畏物其次畏人其次畏身故憂於身者不拘於人畏於己者不制於彼慎於小者不懼於大戒於近者不悔於逺九仙君論曰形神相托神形相成口受外味以亡識身受內役以喪精神離形以散敗形離神以去生殊不知皮肉相應筋骨乃成肝合筋其外爪心合脈其外色脾合肉其外脣肺合皮其外毛腎合骨其外髮故外無五傷以敗五體胎臟論曰先除欲以養精後禁食以存命是知食胎氣飲靈元為不死之道返童還年古云衆方囂然我獨淵默中心融融自有真樂是蓋出乎塵垢之外而與造物者逰也軒冕不足為吾髙而塵埃在我或有所不得避昔人謂居軒冕之中當有山林之氣然則處塵埃之內不可有市井之習瓦盆盛酒與傾金注玉同一醉也蹇驢布韉與金鞍駿馬同一逰也松牀莞簟與繡衾玉枕同一寢也布袍蒲絮與貂裘狐貉同一暖也蔬食菜羮與烹龍炮鳳同一飽也知此則貧賤富貴可以一視矣康仲俊年八十六極康寧自言少時讀千字文有所悟謂心動神疲四字也平生遇事未嘗動心故老而不衰達磨曰心不緣境住在本源意不散流守於內息神不外役免於勞傷人知心即氣之主氣即形之根形者氣之宅神形之具令人相因而立若一事有失即不合於至理何能久立焉又曰心靜即神恱神恱即福生真仙直指曰清靜二字清謂清其心源靜謂靜其氣海心源清則外物不能撓性定而神明氣海靜則邪欲不能作精全而腹實海天秋月道人曰守清靜恬淡所以養道處汚辱卑下所以養德去嗔怒滅無明所以養性節飲食薄滋味所以養氣然後性定則情忘形虛則神運心死則神活陽盛則隂衰莊注云衆竅為風所鳴萬形為化所役風不能鳴則衆竅虛化不能役則萬形息𤣥英疏曰藏舟船於海壑正合其宜隱山嶽於澤中謂之得所然造化之力擔負而趨變故日新驟如逝水昨我今我新吾故吾義亦然也林君復集曰飽藜藿者鄙膏粱樂貧賤者鄙富貴安義命者輕生死逺是非者忘臧否飽肥甘衣輕暖不知節者損福廣積聚驕富貴不知止者殺身小人詐而巧似是而非故人恱之者衆君子誠而拙似迂而直故人知之者寡誠無悔恕無怨和無讐忍無辱何恬庵録曰張飽帆於大江驟駿馬於平陸天下之至快反思則憂處不爭之地乘獨後之馬人或我嗤樂莫大焉口腹不節致疾之因念慮不正殺身之本驕富貴者戚戚安貧賤者休休故景公千駟不如顔子一瓢武林蓮池宏公戒殺生文曰世人食肉咸謂理所應然乃恣意殺生廣積寃結相習成俗不自知覺昔人有言可為痛哭流涕長太息者是也計其迷執略有七條開列如左餘可例推云其一曰生日不宜殺生哀哀父母生我劬勞己身始誕之辰父母垂亡之日也是日正宜戒殺廣行善事以資冥福使先亡者早獲超升見存者增延福夀何得頓忘母難殺害生靈世習不覺其非可為痛哭流涕長太息者此也其二曰生子不宜殺生凡人無子則悲有子則喜子母俱安則幸不思一切禽獸亦各有子胡為慶我子生令他子死母亡於心安乎嬰孩始生不為造福而反造業愚亦甚矣可為痛哭流涕長太息者此也其三曰祭先不宜殺生亡者忌辰及春秋二祭俱當戒殺以資冥福雖羅列八珍於前安能起九泉之遺骨而饗之也無益而有傷生命智者不為也舉世習行不以為非可為痛哭流涕長太息者此也其四曰祈禳不宜殺生世人有疾殺牲祀神以祈福祐不知已之祀神以求生反殺他命而活我命逆天悖理神其有靈决不來饗種種淫祀亦復類此舉世習行而不覺其非可為痛哭流涕長太息者此也其五曰婚禮不宜殺生世間婚禮自問名納采以至成婚殺生不知其幾夫婚者生人之始也生之始而行殺理既逆矣又婚姻吉禮也吉日而用凶事不亦慘乎此舉世習行而不覺其非可為痛哭流涕長太息者此也其六曰燕客不宜殺生良辰美景賢主嘉賔蔬食菜羮不妨清致何須廣殺生命窮極肥甘笙歌燕飲於杯盤宰割寃號於砧几嗟乎有人心者能不悲哉世習不以為非可為痛哭流涕長太息者此也其七曰營生不宜殺生世人為衣食故或畋獵或漁捕或殺生靈以資生計我觀不作此業者亦衣亦食未必其凍餒而死也殺生營生神理所怒以殺昌裕百無一人種地獄之禍因受來生之惡報莫此為甚何不别求生計乃執為此七者皆為痛哭流涕長太息者此也放生文曰蓋聞世間至重者生命天下最慘者殺傷是故逢擒則奔蟣虱猶知避死將雨則徙螻蟻尚且貪生何乃網於山罟於淵多方掩取曲而鈎直而矢百計搜羅使其膽落魂飛母離子散或囚籠檻則如處囹圄或被刀砧則同臨剮戮憐兒之鹿砥瘡痍而寸斷柔腸畏死之猿望彎弓而雙垂悲淚恃我強而凌彼弱理恐非宜食他肉而補己身心將安忍由是昊天垂憫古聖行仁解網著於成湯畜魚興於子産聖哉流水潤枯稿以囊泉慈矣釋迦代危亡而割肉天台聖者鑿放生之池大樹仙人護栖林之鳥續魚蝦闕禪師之遺愛猶存救龍子而傳方孫真人之慈風未泯一活螻蟻也沙彌易短命為長年書生易卑名為上第一放龜也毛寶以臨危而脫難孔愈以微職而封侯屈師縱鯉於元村夀增一紀隋侯濟蛇於齊野珠報千金拯已溺之蠅酒匠之死刑免矣捨將烹之鱉厨婢之篤疾瘳焉貿死命於屠家張提刑魂超三界易餘生於釣艇李景文毒解丹砂孫良嗣解矰􅗤之危卜葬而羽蟲交助潘縣令設江湖之禁去任而水族悲號信老免愚民之牲祥符甘雨曹溪守獵人之網道播神州雀解銜環報恩狐能臨井受術乃致殘軀得命垂白璧以聞經難地求生現黃衣而入夢施皆有報事豈無聞載在簡編昭乎耳目普願隨所見物發慈悲心捐不慳財行方便事或恩周多命大積隂功若惠及一蟲何非善事茍日增而月纍自行廣而福增慈滿人寰名通天府蕩空寃障多祉萃於今生培積善根餘慶及於後世倘更助稱佛號加諷經文為其回向西方令彼永離惡道則存心愈大植德彌深道業資之速成蓮臺生其勝品矣處事不以聰明為先而以盡心為急不以集事為急而以方便為上人當自信自守雖稱譽之承奉之亦不為之加喜雖毁謗之侮慢之亦不為之加怒不可乘喜而多言不可乘快而易事膽欲大見義勇為心欲小文理密察智欲圓應物無滯行欲方截然有執靜能制動沈能制浮寬能制褊緩能制急偶讀醫書有曰洗心曰齊防患曰戒深有可取枚乘曰欲人無聞莫若勿言欲人無知莫若勿為輕言戲謔最害事蓋言不妄發則言出而人信之茍常輕言戲謔遇有正事誠實之言人亦不信無夢子時教化村落中手持木牌牌上書二詩云身為車兮心為軾車動軾隨無計息交梨火棗是誰無自是不除荆與棘身為客兮心為主主人平和客安處若還主客不康寧精神管定辭君去是為知道妙者髙尚先生曰形者生之舍也氣者生之元也神者生之制也形以氣充氣耗形病神依氣位氣合神存修真之士法於隂陽和於術數持滿御神専氣抱一以神為車以氣為馬神氣相合可以長生又曰全生之術形氣貴乎安安則有倫而不亂精神貴乎保保則有要而不耗故保養之道初不離于形氣精神又曰心為君主之官得所養則血脈之氣王而不衰生之本無得而搖也神之變無得而測也腎為作強之官得所養則骨髓之氣榮而不枯臟之本無得而傾也精之聚無得而奪也梓童寶章曰饒一著添子孫之福闕駒隙之易過忍一言免駟馬之難追息一忍養身心之精和言行擬之古人則德進功名付之天命則心閒報應念及子孫則事平受享慮及疾病則用儉好辨以招尤不若訒默以怡性廣交以延譽不若索居以自全厚費以多營不若省事以守儉逞能以誨妬不若韜精以示拙華嚴經云人從第一歡喜地入第二離垢地始能行此十善道一曰性自逺離一切殺生不蓄刀杖不懷怨恨有慙有愧仁恕具足於一切衆心有命之者常生利益之心是菩薩尚不惡心惱諸衆生何况于他起衆生想故以重意而行殺害二曰性不偷盜於自資財常知止足於他慈恕不欲侵損若物屬他起他物想終不於此而生盜心乃至一草一葉不與不取何况其餘資生之具三曰性不邪淫於自妻知足不求他妻於他妻妾他所護女親族媒定及為法所護尚不生於貪染之心何况從事况於非道四曰性不妄語常作實語真語時語乃至夢中亦不忍作覆藏之語無心欲作何况故犯五曰性不兩舌於衆生無離間心無惱害心不將此語為破彼故而向彼說不將彼語為破此故而向此說未破者不令破已破者不增長不喜離間不樂離間不作離間不說離間語若實若不實語六曰性不惡口所謂毒害語粗忿語苦他語令他嗔恨語現前語不現前語強惡語庸賤語不可樂聞語聞者不恱語嗔忿語如火燒心語怨結語熱惱語不可愛語不可樂語能壞自身他身語如是等語皆悉捨離常作潤澤語柔軟語恱意語可樂聞語聞者喜恱語善入人心語風雅典則語多人受樂語大小恱樂語身心踊恱語七曰性不綺語常作思審語時語法語順道理語巧調伏語隨時籌量决定語乃至戲笑語恆思審何况故出散亂之言八曰性不貪欲於他財物他所資用不生貪心不願不求九曰性離瞋恚於一切衆生恆起慈心利益心哀愍心歡喜心和潤心攝受心永捨嗔恨怨害熱惱常思順行仁慈祐益十曰性離邪見住於正道不行占卜不取惡戒心見正直無誑無諂於佛法僧起决定信清靜經曰人神好清而心擾之心好靜而欲牽之常能遣其欲而心自靜澄其心而神自清又曰衆生所以不得真道者為有妄心既有妄心即驚其神既驚其神即著萬物既著萬物即生貪求既生貪求即是煩惱煩惱妄想憂苦身心便遭濁汚流浪生死玉樞經曰道者以誠而入以默而守以柔而用用誠似愚用默似訥用柔是拙夫如是則可與忘形可以忘我可以忘忘入道者知止守道者知謹用道者知微能知微則慧光生能知謹則聖智全聖智全則慧光生慧光生則與道為一是名真忘惟其忘而不忘忘無可忘無可忘者即是至道金笥籙曰心不留事一靜可期此便是覔靜底路又曰目不亂視神返于心神返于心乃靜之本正法眼藏曰汝之本性猶如虛空返觀自性了無一物可見是名正見了無一物可知是名真知無有青黃長短但見本源清淨覺體圓明即名見性成佛亦名如來知見陳茂卿夙興夜寐針為吾人一日修行短度當熟讀之針曰雞鳴而寤思慮漸馳盍於其間淡以整之或省舊愆或紬新得次第條理瞭然默識本既立矣昧爽乃興盥櫛衣冠端坐斂形提掇此心皎如日出嚴肅整齊虛明靜一乃啓方策對越聖賢夫子在坐顔曽後先聖師所言親切敬聽弟子問辨反復參訂事至斯應則驗于為明命赫然常目在之事去既已我則如故方寸湛然凝神息慮動靜循環惟心是監靜存動察勿二勿叄讀書之餘間以逰詠發舒精神休養情性日暮人倦昏氣易乘齊莊恭敬振拔精明夜久斯寢齊手斂足不作思惟心神歸宿養以夜氣貞則復元念兹在兹日夕乾乾崔子玉座右銘曰毋道人之短毋說己之長施人慎勿念受施慎勿忘世譽不足慕惟仁為紀綱隱心而後動謗議庸何傷毋使名過實守愚聖所臧在涅貴不淄曖曖內含光柔弱生之徒老氏戒剛強行行鄙夫志悠悠故難量慎言節飲食知足勝不祥行之茍有恆久久自芬芳范堯夫布衾銘曰黎藿之甘綈布之溫名教之樂德義之尊求之孔易享之常安錦繡之奢膏粱之珍權寵之盛利欲之繁苦難其得危辱旋臻舍難取易去危就安至愚且知士寧不然顔樂簞瓢百世師模紂居瓊臺死為獨夫君子以儉為德小人以奢喪軀然則斯衾之陋其可忽諸東坡云釋如白璧道如黃金儒如五榖則近之矣蓋聖不徒生生則必有所為釋迦孔老易地則皆然也龍舒居士云佛以殺生偷盜邪淫為身三業而孔子言勝殘去殺詩人言文王德及鳥獸昆蟲是豈不戒殺哉盜固不在所言矣孔子言吾未見好德如好色者詩人多貪淫亂是豈不戒邪淫哉佛以妄言綺語兩舌惡口為口業孔子謂人而無信不知其可豈不戒妄言也謂巧言令色鮮矣仁豈不戒綺語也書稱爾無面從退有後言豈不戒兩舌也荀子謂傷人之言深於矛㦸是未嘗不戒惡口也佛以貪嗔癡為意三業孔子言見得思義則戒貪矣言不念舊惡則戒嗔矣言困而不學民斯為下則戒癡矣由此言之儒釋未嘗不同也其不同者惟儒止於世間法釋氏又有出世間法此其不同耳客有問曰有生即有死若能無生即能無死然則主於治生與長生者得無死乎答曰明德者心之神明虛靈不昧能明此而止於至善與鍊神還虛者同一圓覺之性皆不囿於形矣夫有形則有生死不囿於形何生死之有問曰然則三教聖人皆不得死乎答曰儒云生寄也死歸也道曰勞我以生逸我以死釋曰生如著衫死如脫袴皆離形而超脫耳非真死也問曰三教學人亦能超脫乎答曰止至善與鍊神禪定功夫極難下手惟上智利根可由頓漸而入若下愚鈍根則未易至也龍舒居士曰人生時父母妻子屋宅田園牛羊車馬以至微細等物不問大小或祖傳於己或自己營為或子孫或他人為己積纍而得色色無非己物且如窗紙雖微被人扯破猶有怒心一針雖小被人將去猶有吝意倉箱既盈心猶不足舉眼動步無非著愛一宿在外已念其家一僕未歸已憂其失種種事物無不掛懷一日大限到來盡皆拋去雖我此身亦棄物也况身外者乎靜言思之恍如一夢莊子云有大覺者然後知此其大夢也了明長老曰身為死物其內活潑潑地者為活物莫於死物上作活計宜於活物上作活計豫深愛此語梵網戒云常須自知我是未成之佛諸佛是已成之佛汝心佛者未成佛也彌陀佛者已成佛也未成佛者久沈欲海具足煩惱杳無出期已成佛者久證菩提具足威神能為物護故諸佛勸令衆生念佛是以我未成之佛求他已成之佛為救護耳是故衆生若不念佛聖凡永離父子乖離長處輪回去佛逺矣朱陶父曰欲脫輪回立德為本凡修淨業濟物為先忠君孝親固臣子之大節恭兄友弟實長幼之當然夫婦别朋友信人倫乃正道德親善良近學行斯全勿為善小而不為莫以欲微而不窒骨肉貧賤雖有過而不疏他人富顯縱無嫌而莫厚婚喪凍餒知不給而量力隂周病老艱危見有難而推誠急助施恩於不報之地防患於未然之前毒害勿興於心讒言莫出諸口瞞心者自壞其心昧己者自殘乎己當愛物不可害物寧譽人無寧毁人謙受益滿則必損惠迪吉從逆必凶經乘妙理依宿德以參求觀念淨因訪髙人而精進往生一念莫更貪生持念一心休萌雜念直下打併勿令纒綿奴僕卑幼切戒欺凌鵝鴨猪羊慎毋畜養埋暴露之枯骨祭無主之孤魂橋梁井道隨心修補錢財飲食量力惠施憐饑寒之乞子憫殘廢之蒼生常存利濟曲盡慈悲或禽獸之罹於檻穽繫足倒懸或魚鳥之掛於網羅穿腮反翼雖知萬死尚冀一生彼顧盼而哀鳴以求救我施財而贖命以放生既隨物而廣施利益更逢人而普勸淨因謹三歸持五戒悉莊嚴乎淨土掃六塵修十善皆回向於阿彌凡若此不止於下生信如斯必生于上品塵生便掃莫論是否百年偶聚何苦煩惱太虛之內無物不有萬事從寬其福自厚右除忿怒染性觸物黏於飴膠淫愛賊人毒於戈矛片時意適永劫靈消一絲未斷塵網難超右斷嗜欲不扣自鳴鐘鼓為妖寧口之羞斯氣之浮恂恂呐呐立誠寡尤如瓶是守括囊無咎右戒多言夜結於夢晝馳於想起滅萬端盡屬虛妄要拔前根須除後障一劍當空羣魔消喪右澄妄想弇州山人養心歌得歲月延歲月得歡恱且歡恱萬事乘除總在天何必愁腸千萬結放心寬莫膽窄古今興廢言可徹金谷繁華眼裏塵淮隂事業鋒頭血陶潛籬畔菊花黃范蠡湖邊蘆花白臨潼㑹上膽氣雄丹陽縣裏簫聲絶時來頑鐵有光輝運去良金無艷色逍遙且學聖賢心到此方知滋味别粗衣淡飯足家常養得一生一世拙閩陳山人逍遙說夫性有定分理有至極力不能與命鬭才不能與天爭而貪羡之流躁進之士乃謂富貴可以力掇功名可以智取神仙可以學致長生可以術得抱憾老死而終不悟悲夫使天下之富必盡陶朱倚頓邪則原憲黔婁不復為賢人矣使天下夀必盡如王喬彭祖耶則顔氏之子閔氏之孫不復為善人矣使天下之仕必盡如稷契伊管耶則乘田委吏不復為孔子矣使天下之色必盡如毛嬙西施邪則嫫母孟光不復嫁於人矣蓋富者自富貧者自貧夀者自夀夭者自夭達者自達窮者自窮妍者自妍醜者自醜天地不能盈縮其分寸鬼神不能損益其錙銖是以達觀君子立性樂分含真抱朴心無城府行無町畦天下有道則皎皎與世相清天下無道則混混與世相濁壓之泰山不以為重付之秋毫不以為輕升之青雲不以為榮墜之深淵不以為辱震之雷霆不以為恐劫之白刃不以為懼視死生為旦暮以盈虛為消息仰觀宇宙之廓落俯視身世之卑憾如一浮萍之泛大海一稊米之寄太倉又何足議輕重於其間哉故所至皆樂所處皆適出于天為民入于道為鄰若是則何往而不逍遙哉嗚呼治亂運也賢否道也夀夭數也遇不遇時也世有才智不相上下而所遇頓殊覽此足以自慰洗心說福生於清儉德生於卑退道生於安靜命主於和暢患生於多欲禍生於多貪過生於輕慢罪生於不仁戒眼莫視他非戒口莫談他短戒念莫入貪淫戒身莫隨惡伴無益之言莫妄說不干己事莫妄為默默默無限神仙從此得饒饒饒千災萬禍一齊消忍忍忍債主寃家從此隱休休休蓋世功名不自由尊君王孝父母禮賢能奉有德别賢愚恕無識物順來而勿拒物既去而不追身未遇而勿望事已過而勿思聰明多暗昧算計失便宜損人終有失倚勢禍相隨戒之在心守之在志為不節而亡家因不亷而失位勸君自警於生平可嘆可警而可畏上臨之以天神下察之以地祇明有王法相繼暗有鬼神相隨惟正可守心不可欺戒殺牛文我勸世人勿食牛肉服耕效勞返遭殺戮爾食何來忍為烹鬻吁嗟此牛莫云是畜六道輪回互相報復焉知前世非爾眷屬豈為無知臨死觳觫口不能言垂泪若哭皮解體分猶張兩目目匪徒張看爾反覆能保他年不變為犢念我同胞貪讒縱欲只愛口爽不思中毒牛生惡瘡瘟黃臌腹殺而食之頃刻命促獄字犬言牢字牛足不食牛犬可免牢獄有飯充饑得蔬是福何必食牛以快爾欲食之三日神嗔鬼逐戒之三日名書金籙鑒戒分明再三是囑遵生八箋卷二
