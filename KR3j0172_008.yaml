  - {type: page-break, offset: 0, content: '', id: KR3j0172_WYG_008-1a, image: WYG0871/WYG0871-0516a.png}
body:
  text: 遵生八箋卷八明高濂撰起居安樂箋下晨昏怡養條序古名論書室修行法心閒手懶則觀法帖以其可作可止也手心俱閒則寫字作詩文以其可以兼濟也心手俱懶則坐睡以其不强役于神也心不甚定宜看詩及雜短故事以其易于見意不滯於久也心閒無事宜看長篇文字或經注或史傳或古人文集此甚宜於風雨之際及寒夜也又曰手冗心閒則思心冗手閒則臥心手俱閒則著作書字心手俱冗則思早畢其事以寧吾神胡昭曰目不欲視不正之色耳不欲聽汚穢之聲鼻不欲向羶腥之氣口不欲嘗毒辣之味心不欲謀欺詐之事反此辱身損壽青牛道士曰勿過樂樂人不壽但莫强為力所不能舉物從朝至暮嘗有所為使外體不息覺勞即止止復為之此與導引無異耳枕中方曰怡養之道勿久行久坐久臥久言不强飲食亦忘憂苦愁哀饑即食渴乃飲食止行百步夜勿食多凡食後行走約過三里之數乃寢崔實針曰動不肆勤靜不宴逸有疾歸天醫無能恤太上防疾其次萌芽腠理不蠲骨髓奈何搜神記曰天清地寧人物營營名利奔迫喜怒交爭思永厥壽彌喪其生何不寡欲端守爾精家語曰人有三死而非其命也乃自取也夫寢處不時飲食不節勞逸過度三者疾共殺之通天論曰氣味辛甘發散為陽酸苦涌泄為陰是以一身之中陰陽運用五行相生莫不由於飲食也若少年之人真元氣壯失於饑飽傷於生冷以根本强盛未易為患其高年之人真氣耗竭五臟衰弱全在飲食以生氣血若生冷無節饑飽失宜調停無度動成疾患但人之疾病未有不因八邪而感八邪者風寒暑濕饑飽勞逸也居常之食大抵宜在溫熱熟軟忌是粘硬生冷每朝宜進平補下元藥一服女人平補血海藥無燥熱者方可以猪羊腎作米粥一杯以壓之諸品粥皆可食後行走一二百步令運動消散飲食不可頓飽頻頻而食使脾胃易化穀氣長存恐頓飽傷脾不能消納遂成病疾無疾不宜服藥只宜調停飲食自然無患矣養老新書曰人為萬物中一物也不能逃天地之數若天癸數窮則精血耗竭神氣浮溺返同小兒全藉將護以助衰晚若遇水火兵寇非橫驚怖之事必先扶持老人於安處避之不可喧忙驚動高年之人一遭大驚便致冒昧因生餘疾凡喪葬凶禍不可令弔疾病危困不可令問悲哀憂愁之事不可令人報知穢汚臭敗不可令食粘硬毒物不可令餐弊漏卑濕不可令居卒風暴雨不可令冒煩暑燠熱不可令中動作行步不可令勞暮夜之食不可令飽陰霧晦暝不可令饑假借鞍馬不可令乘偏僻藥餌不可令服廢宅欹宇不可令入墳園冢墓不可令遊危險之地不可令行澗淵之水不可令渡暗昧之室不可令居凶禍遠報不可令知輕盈女婢不可令親家緣冗事不可令營若此事類頗多不克備舉但人子悉意深慮過為之防稍不便於老人者皆宜忌之以保長年常宜遊息精藍崇尚佛教使神識趣向一歸善道此養老之奇術也癸辛志曰飽食緩行初睡覺一甌新茗侍兒煎脫巾斜倚藤牀坐風送水聲來耳邊裴晉公詩也細書妨老讀清簞愜昏眠取快且一息拋書還少年王半山詩也相對蒲團睡味長主人與客兩相忘須臾客去主人睡一枕西窗半夕陽陸放翁詩也讀書已覺眉稜重就枕方歡骨節和睡去不知天早晚西窗殘日已無多僧有規詩也老讀文書興易闌須知塵冗不如閒竹牀瓦枕虛堂上臥看江南雨後山呂滎陽詩也紙屏石枕竹方牀手倦拋書午夢長睡起莞然成獨笑數聲漁笛在滄浪蔡持正詩也余習懶成僻每遇暑晝必須偃息客有嘲孝先者即哦此以自解但苦枕熱展轉數四後見前輩言荆公嗜睡夏月當用方枕睡久氣蒸枕熱則轉一方冷處此非真知睡味未易語此也孝先曰花竹幽窗午夢長此中與世暫相忘華山處士如容見不覓仙方覓睡方睡亦有方希夷意謂息魂離神不動也遺教經云乃有煩惱毒蛇睡在汝心毒蛇既出乃可安眠之謂近世西山蔡季通有睡訣云睡側而屈睡覺而伸早晚以時先睡心後睡眼晦翁以為此古今未發之妙高子怡養立成高子曰恬養一日之法雞鳴後醒睡即以兩手呵氣一二口以出夜間積毒合掌承之搓熱擦摩兩鼻傍及拂尉兩目五七遍更將兩耳揉揑扯拽捲向前後五七遍以兩手抱腦後用中食二指彈擊腦後各二十四左右聳身舒臂作開弓勢遞互五七遍後以兩股伸縮五七遍叩齒漱津滿口作三咽少息因四時氣候寒溫酌量衣服起服白滾湯三五口名太和湯次服平和補脾健胃藥數十丸少頃進薄粥一二甌以蔬菜壓之勿過食辛辣及生硬之物起步房中以手鼓腹行五六十步或往理佛焚香誦經念佛作西方功德或課兒童學業或理家政就事歡然勿以小過動氣不得嗔呌用力杖入園林令園丁種植蔬菜開墾溝畦芟草灌花結縛延蔓斫伐橫枝毋滋冗雜時即採花插瓶以供書齊清玩歸室寧息閉目兀坐定神頃就午餐量腹而入毋以食爽過多毋求厚味香燥之物以爍五內食畢飲清茶一二杯即以茶漱齒凡三吐之去牙縫積食作氣起復鼓腹行百餘步而止或就書室作書室中修行事或接客談𤣥說閒散話毋論是非毋談權勢毋涉公門毋貪貨利或共客享粉糕麵食一二物啜清茗一杯忌食水團粽子油煠堅滯膩滑等食起送客行或共步三二百步歸或晝眠起或行吟古詩以宣暢胸次幽情能琴者撫琴一二操時自酌量身服寒暖即為加減毋得忍寒不就增服於焉杖履門庭林薄使血脈流通時乎晚餐量腹饑飽或飲酒十數杯勿令大醉以和百脈篝燈冬月看詩或說家一二鼓始就寢主人晏臥可理家庭火盜生發睡時當服消痰導滯利膈和中藥一劑心頭勿想過去未來人我惡事惟以一善為念令人不生惡夢時或心神不寧嘗多夢魘當以硃砂三錢作紅絹袋盛之置髮頂內或以麝臍毛殼置枕內魘之或臨臥時口誦婆刪婆演帝二十一遍絶夢魘更驗想此為主夜之神諱也房中暗燈上置茶湯令暖以供不時之需榻前時焚蒼术諸香勿令穢汚以辟不祥夏月不可用水展席冬月不可以火焙衣二事甚快一時後日疾作不淺老人衰邁冬月畏寒可以錫造湯婆注熱水用布囊包以避濕先時擁被團簇臨睡甚暖又可溫足且遠火氣此吾人一日安樂之法無事之法無事外無難為人能行之其為受福實無盡藏也是非養壽延年之近者歟毋以近而忽之道不在遠此之謂耳怡養動用事具二宜牀式如嘗製凉牀少濶一尺長五寸方柱四立覆頂當做成一扇濶板不令有縫三面矮屏高一尺二寸作欄以布漆畫梅或蔥粉灑金亦可下用密穿棕簟夏月內張無漏帳四通凉風使屏少護汗體且蚊蚋蟲蟻無隙可入冬月三面并前兩頭作木格七扇糊以布骨紙面先分格數鑿孔俟裝紙格以禦寒氣更以冬帳閉之帳中懸一鑽空葫蘆口上用木車頂蓋鑽眼插香入葫蘆中俾香氣四出牀內後柱上釘銅鉤二用掛壁瓶四時插花人作花伴清芬滿牀臥之神爽意快冬夏兩可名曰二宜較彼雕鑾蜔嵌金碧輝映者覺此可久無漏帳帳製幔天罩牀此通式也孰知夏月蚊蚋緣下而上雖閉如無余所製帳有底罩帳之下如綴頂式以粗布為之紉其三面前餘半幅下垂張於牀內上下四方無隙可漏何物得侵夏月以青紵為之吳中疏紗甚妙冬月以自厚布或厚絹為之上寫蝴蝶飛舞種種意態儼存蝶夢餘趣或用紙帳作梅花似更清雅竹榻以斑竹為之三面有屏無柱置之高齊可足午睡倦息榻上宜置靠几或布作扶手協坐靠墩夏月上鋪竹簟冬用蒲席榻前置一竹踏以便上牀安履或以花梨花楠柏木大理石鑲種種俱雅在主人所好用之石枕枕製不一即石枕雖宋磁白定居多有尸枕亦舊窑者長可一尺古墓中得之甚不可用有特燒為枕者長可二尺五寸濶六七寸者有青東磁錦上花者有劃花定者有孩兒捧荷偃臥用花捲葉為枕者此製精絶皆余所目擊南方一時不可得也有用磁石為枕如無大塊以碎者琢成枕面下以木鑲成枕最能明目益睛至夜可讀細書有菊枕以甘菊作囊盛之置皮枕凉枕之上覆以枕席睡者妙甚女廉藥枕神方藥枕用五月五日七月七日取山林柏木鋸板作枕長一尺三寸高四寸以柏心赤者為之蓋厚四五分工製精密勿令走氣又可啓閉蓋上鑽如粟米大孔三行行四十孔凡一百二十孔內實藥物二十四品以按二十四氣計用飛廉薏苡仁欵冬花肉蓯蓉川芎當歸白芷辛夷白术藁本木蘭蜀椒官桂杜蘅柏實秦椒乾薑防風人參桔梗白薇荆實䕷蕪白蘅各五錢外加毒者八味以應八風烏頭附子藜蘆皂角菵草礬石半夏細辛右總三十二物各五錢㕮咀為末和入枕匣裝實外用布囊縫好枕過百日面有光澤一年體中風疾一切皆愈而且身香四年髮白變黑齒落更生耳目聰明神方祕驗此方乃女廉以傳玉青玉青傳於廣成子聖聖相傳不可輕忽常以密袱包蓋勿令出氣蒲花褥九月採蒲略蒸不然生蟲晒燥取花如栁絮者為臥褥或坐褥皆用粗布作囊乘之裝滿以杖鞭擊令勻厚五六寸許外以褥面套囊虛軟溫燠他物無比春時後去褥面出囊炕燥收起嵗嵗可用隱囊榻上置二墩以布青白鬬花為之高一尺許內以綿花裝實縫完傍繫二帶以作提手榻上睡起以兩肘倚墩小坐似覺安逸古之製也靠背以雜木為框中穿細藤如鏡架然高可二尺濶一尺八寸下作機局以凖高低置之榻上坐起靠背偃仰適情甚可人意靠几以水磨為之高六寸長二尺濶一尺有多置之榻上側坐靠肘或置薰爐香合書卷最便三物吳中之式雅甚又且適中蘆花被深秋採蘆花裝入布被中以玉色或蘭花布為之仍以蝴蝶畫被覆蓋當與莊生同夢且八九月初寒覆之不甚傷暖北方無用不過取其清耳紙帳用藤皮繭紙纒於木上以索纒緊勒作皺紋不用糊以線折縫縫之頂不用紙以稀布為頂取其透氣或畫以梅花或畫以蝴蝶自是分外清致欹牀高尺二寸長六尺五寸用藤竹編之勿用板輕則童子易擡上置倚圈靠背如鏡架後有撑放活動以適高低如醉臥偃仰觀書并花下臥賞俱妙短榻高九寸方圓四尺六寸三面靠背後背少高如傍置之佛堂書齊閒處可以坐禪習靜共僧道談𤣥甚便斜倚又曰彌勒榻墩藤蒲墩止宜於冬月三時當置藤墩如畫上者甚有雅趣否則近日吳興所製版面竹凳堅實可坐又如八角水磨小凳三角凳俱入清齊吳中漆嵌花蜔圓凳當置之金屋為阿嬌持觴介主之用書枕臞仙製用紙三大卷狀如碗品字相疊束縛成枕頭枕上卷每卷綴以朱籖牙牌下垂一曰太清天籙一曰南極夀書一曰蓬萊仙籍用以枕於書窗之下便作一夢清雅袖爐焚香攜爐當製有蓋透香如倭人所製漏空罩蓋漆鼓薰爐似便清齊焚香炙手薰衣作烹茶對客清談之具今有新鑄紫銅有罩蓋方圓爐式甚佳以之為袖爐雅稱清賞蒲石盆書齊蒲石之供夜則可收燈烟曉取垂露潤眼此為至清具也須擇美石上種蒲草得有舊石種蒲年遠青蔥鬱然者妙絶盛以官哥均州定窑方圓盆中養以河水天落水時令出見天日夜受風露則草石長青若置之書齊塵積蒲葉山石則憔悴甚矣須嘗念之仙椅臞仙云默坐凝神運用須要坐椅寬舒可以盤足後靠椅製後高扣坐身作荷葉狀者為靠腦前作伏手上作托頦亦狀蓮葉坐久思倦前向則以手伏伏手之上頦托托頦之中向後則以腦枕靠腦使筋骨舒暢血氣流行隱几以怪樹天生屈曲若環帶之半者為之有橫生三了作足為奇否則裝足作几置之榻上倚手頓顙可臥書云隱几而臥者此也余見友人吳破瓢一几樹形皺皮花細屈曲奇怪三足天然摩弄瑩滑宛若黃玉此老攜以遨遊珍惜若寶此誠希有物也今以美木取曲為之水磨光瑩亦可據隱此式知者甚少廟中三清聖像環身有若圍帶即此几也似得古製近日塑像去其半矣梅花紙帳即榻牀外立四柱各柱掛以銅瓶插梅數枝後設木版約二尺自地及頂欲靠以清坐左右設橫木可以掛衣角安斑竹書貯一藏畫三四掛白塵拂一上作一頂用白楮作帳罩之前安踏牀左設小香几置香鼎燃紫藤香榻用布衾菊枕蒲褥乃相稱道人還了鴛鴦債紙帳梅花醉夢間之意古云千朝服藥不如一夜獨宿倘未能了雨雲業能不愧此鐡石心當亟移去寒枝毋令冷眼偷笑滾凳湧泉二穴人之精氣所生之地養生家時常欲令人摩擦今置木凳長二尺濶六寸高如常四桯鑲成中分一檔內二空中車圓木二根兩頭留軸轉動凳中鑿竅活裝以腳踹軸滾動往來腳底令湧泉穴受擦無煩童子終日為之便甚蒲墩以蒲草為之高一尺二寸四面編束細密且甚堅實內用木車坐版以柱托頂久坐不壞蒲團大經三尺者席地快甚吳中置者精妙可用如意古人以鐵為之防不測也時或用以指畫向往後有雕竹為之近得天生樹枝摩作如意精巧入神復得竹鞭樹枝屈結如意肖生而柄亦天成不事琢磨無一毫斧鑿痕執之光瑩如玊其堅比鐵惜不多得竹鉢鉢盂持以飲食道家方物舊有癭木為瓢內則灰漆近製取深山巨竹車旋為鉢光潔照人上刻銘字填以大青真物外高品禪椅禪椅較之長椅高大過半惟水摩者為佳斑竹亦可其製惟背上枕首橫木濶厚始有受用禪衣瑣哈喇絨為之外紅裏黃其形似胡羊毛片縷縷下垂用布織為體其用耐久來自西域價亦甚高惟都中有之似不易得今以紅褐為外黃綢為裏中絮繭綿坐以圍身亦甚溫暖不俗佛堂內供釋伽三身或一佛二菩薩像或供觀音烏思藏鏒金之佛價雖高大其金鏒甚厚且慈容端整結束得真印結趺跏妙相具足宛如現身人能供理亦增善念案頭以舊磁淨瓶獻花淨碗酌水列此清供晝爇印香夜燃石燈稽首焚修當得無量莊嚴功德禪燈高麗石者為佳角者絶不可用有日月二石惟月燈在在有之日燈百無一二月燈灼以油火其光白瑩真如初月出海其日燈得火內照一室皆紅曉日東升不是過也有小者尤更可愛價亦倍高鐘磬得古銅漢鐘聲清韻遠舊靈壁石磬色黑性堅者各一懸之佛堂焚香敲擊以清俗耳故詩有云數聲鐘磬是非外一箇閒人天地間是真有得於閒者老人身閒當以此聲為快心悅耳念珠以菩提子為上近有檢勻細子琢磨加工持念輕便甚可人意有玊製者有龍充造者云是龍鼻骨磨成色黑嗅之微有腥香有以檀香車入菩提子中孔著眼引繩謂之灌香子世廟初惟京師一人能之價定一分一子為格余曾得之果絶技也又見宋人以玉碾骷髏鑽通六竅貫線作記有紅色瑪瑙者亦如此製又見西方細膩紅者內作銅管外作佛字管外用硃砂調塑為珠繩引銅心往來若珊瑚然又西番硝子燒珠質青每粒四面白菊黃心花朵其精巧獨擅取天然者有大金剛子小金剛子小者貴甚草子用久如漆瑪瑙琥珀金珀水晶人頂骨以傍宗眼血實色紅者為佳枯黑為下珊瑚惡甚車磲椰子珠作匾樣紫檀烏木棕竹車者亦雅珠上記念有宋做玉降魔杵五供養天生小葫蘆一寸長者為奇鵝眼錢海巴五臺靈光石白定窑燒豆大葫蘆玉製界刀斧子鰲魚轉輪子皆掛弔珠上作記念千萬數也宣德成化時有番僧入貢進獻小輪子如棐狀外塑花巧色具紅黃中藏小經一卷製成用作念珠記總此最相宜先年極多今不可得矣又見番僧攜至佩經或皮袋或漆匣上有番篆花樣文字四方三寸厚寸許匣外兩傍為耳繫繩佩服余曾開匣視之經文朱書其細密精巧中華不及此真梵王物也當佩服持珠作人間有髮僧坐臥西風黃葉中捧念西方大聖較之奔逐利名哀哀寒暑者自覺我輩閒靜聖蠟燭方槐角子二斤八月收白膠香一兩硫黃四兩先將角子搗爛將膠香化開入器中一同熬爛次下硫黃用槐條攪用小指大竹筒長七八寸將三物灌入陰乾去其竹筒每條可㸃一二十日聖燈方浮萍六月收瓦松六月收逺志黃丹蛤粉各一兩為細末每油一兩入藥一錢㸃燈可照一月印香供佛方并圖齊室中燒香不可一日無者其法另具若印香供佛其為印模有焚一日者有焚六時者其香料隨造但料重則香余所製方如左亦內府舊方少損益耳夢覺菴妙高香方共二十四味按二十四氣用以供佛沈速四兩黃檀四兩降香四兩木香四兩丁香六兩乳香四兩檢藝香六兩官桂八兩甘松八兩三奈八兩薑黃六兩𤣥參六兩丹皮六兩丁皮六兩辛夷花六兩大黃八兩藁本八兩獨活八兩藿香八兩茅香八兩白芷六兩荔枝殼八兩馬蹄香八兩鐡面馬牙香一斤淮産末香一斤入炒硝一錢有此二物引火且焚無斷滅之患大小香印四具圖附如左四印如式印旁鑄有邉䦨提耳隨爐大小取用先將爐灰築實平正光整將印置於灰上以香末鍬入印面隨以香鍬築實空處多餘香末細細鍬起無少零落用手提起香印香字已落爐中若少缺缺以香末補之焚燒可以永日小者亦一二時方滅伴經史供佛坐不可少也焚供天地三神香方昔有真人燕濟居三公山石窑中苦毒蛇猛獸邪魔干犯遂下山改居華陰縣庵栖息三年忽有三道者投庵借宿至夜談三公山石窑之勝內一人云吾有奇香能救世人苦難焚之道得自然𤣥妙可升天界真人得香復入山中坐燒此香毒蛇猛獸悉皆遁避忽一日道者散髮背琴虛空而來將此香方鑿於石壁乘風而去題名三神香能開天門地户通靈達聖入山可驅猛獸可免刀兵可免溫疫久旱可降甘雨渡江可免風波有火焚燒無火口嚼從空噴于起處龍神護助靜心修合無不靈驗沈香乳香丁香白檀香附藿香各二錢甘松二錢遠志一錢藁本三錢白芷三錢𤣥參二錢零陵香大黃降真木香茅香白芨柏香川芎三奈各二錢五分用甲子日攢和丙子搗末戊子和合庚子印餅壬子入合收起煉蜜為丸或刻印作餅寒水石為衣出入𢃄入葫蘆為妙臞仙異香沈香檀香各一兩冰片麝香各一錢棋楠香羅合欖子滴乳香各五錢丸味為末煉蔗漿合和為餅焚之以助清氣難消炭竈中燒柴下火取出罈閉成炭不拘多少搗為末用塊子石灰化開取濃灰和炭末加水調成以毛竹一筒劈作兩半合脫成錠晒乾燒用終日不消獸炭細骨炭十斤鐵屎塊十斤用生芙蓉葉三斤合搗為末糯米粥和成劑塑作麒麟獅子之形晒乾每燃一枚三日不滅如不用以灰掩之留宿火法好胡桃一枚燒半紅埋熱灰中三五日不滅香櫞盤槖香櫞出時山齊最要一事得官哥二窑大盤或青東磁龍泉盤古銅青緑舊盤宣德暗花白盤蘇麻尼青盤朱砂紅盤青花盤白盤數種以大為妙每盆置櫞二十四頭或十二三者方足香味滿室清芬其佛前小几上置香櫞一頭之槖舊有青東磁架龍泉磁架最多以之架玩可堪清供否則以舊人珠雕茶槖亦可惟小樣者為佳插瓶花法插梅瓶中置硫黃一錢以熱湯插之芙蓉牡丹芍藥蜀葵萱草俱用大滾湯插之緊塞瓶口則不焦能開插蓮以泥塞摘斷孔內先入瓶底後方加水養之插梔子將剪斷處敲碎加鹽些少於瓶加水養之則開兹録草草後有備細條目溪山逸遊條序古名遊陶𢎞景曰山川之美自古共談高峰入雲清流見底兩岸石壁五色交輝青林翠竹四時備美曉霧將歇猿鳥亂鳴夕日欲頽沉鯉競躍實為欲界之仙都自康樂以來未有語其奇者羊祜樂山水每風景佳日必登峴山嘯詠終日嘗語從事曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮沒無聞使人悲傷如百嵗後有知魂魄猶應登此劉歊隱居求志尤愛山水登危履險必盡幽遐人莫能及人皆歎其有濟勝之具李白登華山落鴈峰曰此山最高呼吸之氣想通帝座恨不攜謝朓驚人詩來搔首問青天耳象耳山有李白留題曰夜來月下卧醒花影零亂滿人襟袖疑如濯魄于冰壺中也栁子厚曰上高山入深林窮回溪幽泉怪石無遠不到到則披草而坐傾壺而醉醉則更相枕以卧意有所極夢亦同趣張衡賦曰仲春令月時和氣清原隰鬱茂百草滋榮王睢鼓翼倉庚哀鳴交頸頡頏關關嚶嚶於焉逍遙聊以娛情于時曜靈俄景繼以望舒極盤遊之至樂雖日夕以亡劬簡文入華林園曰㑹心處不必在遠翳然林泉便自有濠濮間想也不覺鳥獸禽魚自來親人東坡曰江山風月本無常主閒者便是主人王摩詰夜登華子岡輞水漣漪與月上下他山遠火明滅林外深巷寒犬吠聲如豹村虛夜春復與疏鐘相間此時獨坐童僕靜默每思曩昔攜手賦詩當待春仲卉木蔓發輕倏出水白鷗矯翼露濕青臯麥雉朝雊倘能從我遊乎韓持國為守每春到常日設十客之具於西湖事委僚吏即造湖上有士大夫過即邀之座滿九客而止即與樂飲終日曾存之問曰無乃有不得已者乎公曰汝少年安知吾老矣未知復有幾春若待可與飲者而後從之吾之為樂無幾而春亦不吾待矣臞仙曰江上一蓑釣為樂事釣用輪竿竿用紫竹輪不欲大竿不宜長但絲長則可釣耳豫章有叢竹其節長又直為竿最佳竿長七八尺敲針作鈎所謂一鈎掣動滄浪月釣出千秋萬古心是樂志也意不在魚或於紅蓼灘頭或在青林古岸或值西風撲面或教飛雪打頭於是披蓑頂笠執竿烟水儼在米芾寒江獨釣圖中比之嚴陵渭水不亦高哉又曰河內置一小舟繫於栁根陰處時乎閒暇執竿把釣放乎中流可謂樂志於水或於雪霽月明桃紅栁媚之時放舟當溜吹簫笛以動天籟使孤鶴乘風唳空或扣舷而歌飽餐風月回舟返棹歸臥松窗逍遙一世之情何其樂也許掾好遊山水體便登陟人云許非徒有勝情實有濟勝之具王子敬云從山陰道上行山川自相映發使人應接不暇若秋冬之際尤難為懷澄懷録云每遇勝日有好懷抱袖手吟古人詩足矣青山秀水眼到即可舒嘯何必居籬落下後為己物又曰每登高岡步邃谷延留燕坐見懸崖瀑流古木垂蘿閟閒岑寂之處終日忘返鋤經堂志曰登高山下觀城市如蟻垤不知其間幾許人往來奔走如蜂釀蜜如蠅爭血從高望之真可一笑山之高於城市能幾何已自如此况真仙在太虛中下視塵土又何翅蟻垤乎哉謝臯羽曰天地間雲嵐木石崇丘絶壑足以發竒潛老多人跡所不到故人之靜者得與世相忘而自樂其樂恆專已而不讓至鶉衣蒙垢土面蓬首獨甘心焉越人王冕當天大雪赤腳上潛嶽峰四顧大呼曰遍天地皆白玉合成使人心膽澄徹便當仙去高子遊說高子曰時值春陽柔風和景芳樹鳴禽邀朋郊外踏青載酒湖頭泛棹問栁尋花聽鳥鳴於茂林看山弄水修褉事於曲水香堤艷賞紫陌醉眠杖錢沽酒陶然浴沂舞風裀草坐花酣矣行歌踏月喜鸂鶒之睡沙羡鷗鳬之浴浪夕陽在山飲興未足春風滿座不醉無歸此皆春朝樂事將謂閒學少年時乎夏月則披襟散髮白眼長歌坐快松楸緑陰舟泛芰荷清馥賓主兩忘形骸無我碧筒致爽雪藕生凉喧畢避俗水亭一枕來薰疏懶宜人山閣千峰送雨白眼徜徉幽歡絶俗蕭騷流暢此樂何多秋則憑高舒嘯臨水賦詩酒泛黃花饌供紫蟹停車楓樹林中醉臥白雲堆裏登樓咏月飄然元亮高閒落帽吟風不減孟嘉曠達觀濤江渚興奔雪浪雲濤聽雁汀沙思入蘆花夜月蕭騷野趣爽朗襟期較之他時似更閒雅冬月則杖藜曝背觀禾刈於東疇䇿蹇沖寒探梅開於南陌雪則服驚飛玉取醉村醪霽則足躡層氷騰吟僧閣泛舟載月興到剡溪醉榻眠雲夢寒𤣥圃何如湖上一蓑可了人間萬事四時遊冶一嵗韶華毋令過眼成空當自偷閒尋樂已矣乎吾生幾何胡為哉每懷不足達者悟言于斯有感山人遊具聊備如左遊具竹冠制維偃月高士二式為佳他無取焉間以紫檀黃楊為之亦可近取癭木為冠以其形肖微似以此束髮終少風神若帶唐巾漢巾可以簪花漢巾之製去唐式不遠前摺較後兩傍少窄三四分頂角少方二製之外皆非山人家所取但五嶽真形圖人當佩帶入山可拒虎狼尋壑可遠魑魅今以唐巾玉圈取作方式篆圖琢成帶之甚雅且圈非徒設五嶽圖有二三篆法惟道藏經所載似真圖具後幅披雲巾踏雪當置臞仙雲巾或綿或氊為之匾巾方頂後用披肩半幅內絮以綿或托以氊可避風寒不必風領暖帽作富貴態也道服不必立異以布為佳色白為上如中衣四邊緣以緇色布亦可次用茶褐布為袍緣以皂布或絹亦可如禪衣非兜羅綿以紅褐為之月衣之製鋪地儼如月形穿起則如披風道服二者用以坐禪䇿蹇披雪避寒俱不可少文履用白布作履如世俗之鞋用皂絲縧一條約長一尺三四寸折中交屈之以其屈處綴履頭近底處取起出履頭一二分而為二復綴其餘縧於履面上雙交如舊畫圖分其兩稍綴履口兩邊緣處是為絢於牙底相接處用一細絲縧周圍綴於縫中是為繶又以履口納足處周圍緣以皂絹廣一寸是為純又於履後綴二皂帶以繫之如世俗鞋帶是為綦如黑履則用皂布為之而以白或藍為絢繶純綦是也道扇其扇有二有紙糊者有竹編者近日新安置扇其竹篾如紙編織細密製度精佳但不宜漆輕便可攜何扇勝此紙糊如此式樣亦佳但得竹根紫檀妙柄為美舊有鵝毛扇即羽扇也但無能者製度精緻今製似不堪執拂塵古有紅拂塵尾紅拂乃富貴家用物毋論塵尾似不易得近有以天生竹邊如靈芝如意形者斫為拂柄甚雅其拂惟以長棕為之不必求奇以白尾為妙余有萬嵗藤一小枝􅌑瓏透漏儼肖龍形製為拂柄可怏披拂雲舄以蓑草及棕為之雲頭如芒鞋或以白布為鞋青布作高挽雲頭鞋面以青布作條左右分置每邊橫過六條以象十二月意後用青雲口以青緑似非塵土中著腳行用當為山人濟勝之具竹杖惟合竹為佳有以之字竹方竹老竹鞭為之者亦雅近日以荆木如杖形者原其上有雙枝厚根處雕為雙芝摩滑如玉亦可人意得有三代商嵌金銀碧瑱古銅鳩鳥杖頭須用棕竹為杖余見有全身鏒金銀者形亦古甚下有銅管亦三代物也製甚可愛得此全副老人受用無量外此用萬嵗藤藜藿為杖形雖奇怪此為老衲行具恐非山人家扶老也姑置不取癭杯取木之癭肖杯者磨琢成杯式惟三種為最桃杯蓮杯芝杯余所藏三杯克肖真形其外種類甚夥且奇要之適用無如三者癭瓢有形如芝者有如瓠者山人家攜帶用以飲泉大不過五六寸而小者半之惟以水磨其中布擦其外光彩如漆明亮燭人雖水濕不變塵汚不受庶入精妙鑒賞斗笠其製有二一名雲笠以細藤作笠方廣二尺四寸以皂絹䝉之綴簷以遮風日一名葉笠以竹絲為之上以檞葉細密鋪蓋甚有道氣二物貴在輕便葫蘆有天生一寸小葫蘆最可人意用以綴為衣紐又可懸于念珠價高不甚多見惟京師有之若用杖頭掛帶乘藥者二三寸葫蘆亦妙其長腰鷺鷀葫蘆可懸藥籃左畔似不可少藥籃即水火籃也製有佳者惟遠紅漆為佳內實應驗方藥膏藥以便隨處濟人山童攜之亦多物外風致近有藤絲編者不佳以大毛竹車旋者太重棋籃圍棋罐子近日永嘉以藤編為罐製巧用堅雖墮地觸石曾無損裂外以藤編為籃攜此一罐其輕便可愛誠遊具中一妙品也書室中不宜有此詩筒葵箋白樂天與微之嘗以竹筒貯詩往來賡唱故和靖詩云帶斑猶恐俗和節不妨山之句既有詩可無吟箋許判司遠以葵箋見惠緑色而澤入墨覺有精采詢其法乃采帶露蜀葵葉研汁用布揩沫竹紙上伺少乾用石壓之許嘗有詩云不采傾陽色那知戀主心不獨便于山家且知葵藿傾陽之意韻牌余刻詩韻上下二平聲為紙牌式名曰韻牌每韻一葉總三十葉山遊水泛人取一葉吟以用韻似甚便覽近有四韻刻已備矣恐山遊水泛無暇作長篇百韻此余始作意也葉箋余作葉箋三種以蠟板砑肖葉紋用翦裁成紅色者肖紅葉緑色者肖焦葉黃色者肖貝葉皆取閩中羅紋長箋為之此亦山人寄興岑寂所為若山遊偶得絶句書葉投空隨風飛揚泛舟付之中流逐水浮沈自有許多幽趣坐氊花時席地每用鹿皮為之人各一張奈何毛脫不久以蒲團棕團坐之甚佳余意挾青氊一條臨水傍花處展地共坐更便卷舒㩦帶耳衣匣以皮護杉木為之高五六寸蓋底不用板幔惟布裏皮面軟而可舉長濶如氊包式少長一二寸攜於春時內裝綿夾便服以備風寒驟變夏月裝以夾衣秋與春同冬則綿服暖帽圍項等件匣巾更帶搔背竹耙并鐵如意以便取用便轎入山用之如今市中俗云兜轎式也但坐身涼簟兩傍用銅或鐵打成橋梁雙鉤下鑻涼簟兩頭鉤上作眼待簫扛上用銅製二鑻下垂作竅以受銅鉤對眼用簫釘往如懸掛然入坐其上背靠扛上圈圍不惟安適且上山下山如履平地以其機關常平故耳何有前撲後仰之患扛子得有閩産紫荆木為之輕細而堅愈重愈力他木俱不勝也輕舟用以泛湖棹溪形如划船長可二丈有餘頭濶四尺內容賓主六人僮僕四人中倉四柱結頂幔以篷簟更用布幕走簷罩之兩傍硃欄欄內以布絹作帳用蔽東西日色無日則懸鉤高捲中置桌凳後倉以藍布作一長幔兩邊走簷前縛中倉柱頭後縛船尾釘兩圈處以蔽僮僕風日更著茶爐烟起忽若圖畫中一孤航也舟惟底平用二畫漿更佳疊桌二張一張高一尺六寸長三尺二寸濶二尺四寸作兩面折腳活法展則成桌疊則成匣以便攜帶席地用此擡合以供酬酢其小几一張同上疊式高一尺四寸長一尺二寸濶八寸以水磨楠木為之置之坐外列爐焚香置瓶插花以供清賞提盒余所製也高總一尺八寸長一尺二寸入深一尺式如小厨為外體也下留空方四寸二分以板閘住作一小倉內裝酒杯六酒壺一筯子六勸杯二上空作六格如方合底每格高一寸九分以四格每格裝碟六枚置果殽供酒觴又二格每格裝四大碟置鮭菜供饌筯外總一門裝卸即可關鎖遠逰提甚輕便足以供六賓之需提爐式如提盒亦余製也高一尺八寸濶一尺長一尺二寸作三撞下層一格如方匣內同銅造水火爐身如匣方坐嵌匣內中分二孔左孔炷火置茶壺以供茶右孔注湯置一桶子小鑊有蓋頓湯中煮酒長日午餘此鑊可煮粥供客傍鑿一小孔出灰進風其壺鑊迥出爐格上太露不雅外作如下格方匣一格但不用底以罩之便壺鑊不外見也一虛一實共二格上加一格置底蓋以裝炭總三格成一架上可簫關與提盒作一副也備具匣余製以輕木為之外加皮包厚漆如拜匣高七寸濶八寸長一尺四寸中作一替上淺下深置小梳匣一茶盞四骰盆一香爐一香盒一茶盒一匙筯瓶一上替內小硯一墨一筆二小水注子水洗一圖書小匣一骨牌匣一骰子枚馬盒一香炭餅盒一途利文具匣一內藏裁刀錐子挖耳挑牙消息肉又修指甲刀銼髮刡等件酒牌一詩韻牌一詩筒一內藏紅葉各箋以録詩下藏梳具匣者以便山宿外用關鎖以啓閉攜之山遊似亦甚備酒尊注酒遠遊古名窑器甚佳銅提次之近以錫造者惡甚余意磁者負重銅者有腥不若蒲蘆作具內用堅漆挾之遠遊似甚輕便山遊當與已上三物束以二架共作一肩彼此助我逸興提盒式提爐式匏樽式五嶽圖四式具後右五嶽圖二式一出道藏一出唐鏡模下不特製為唐中玉圈用之當以此用黃素朱書裱作小卷長可三四寸飾以軸帶掛之杖頭與葫蘆作伴山人持以逸逰謂非負圖先生輩歟其所當佩說如藏經云藏經曰五嶽之神分掌世間人物各有攸屬如太山乃天帝之孫羣靈之府為五嶽祖主掌人間生死貴賤修短衡嶽主掌星象分野水族魚龍嵩嶽主掌土地山川牛羊食啖華嶽主宰金銀銅鐵飛走蠢動恆嶽主掌江河淮濟四足負荷等事抱朴子曰修道之士棲隱山谷須得五嶽真形圖以佩之則山中魑魅虎蟲一切妖毒皆莫能近漢武帝元封三年七月七日受之西王母流布人間後太初年中李充自稱馮翊人三百嵗荷草器負圖遨遊武帝見之封負圖先生故世人能佩此圖渡江海入山谷夜行郊野偶宿凶房一切邪魔魑魅魍魎水怪山精悉皆隱遁不敢加害家居供奉橫惡不起禎祥永集云故此圖不獨用為佩軸家居裱成畫圖安奉亦可三才避忌條天時諸忌聖人曰勿怨天又曰君子敬天之威則省其過咎而改之故吾人起居不知三才避忌必犯災害何以能安樂哉故人當勿指天為證勿怒視日月星辰行住坐臥莫祼體以䙝三光勿對三光濡溺勿月下歡淫勿唾流星勿久視雲漢大風大雨大雷大雪大露不可出行當靜坐敬畏勿嗔怨風雨勿指虹霓重霧三日必大雨未雨不可出行雷鳴勿仰臥遠出觸寒而歸勿面向火勿就吃熱食衣濕汗即脫勿開口喝泠大寒大暑勿可出入伏熱者勿驟飲水衝寒者勿驟飲湯勿瀆寒而寢日出則出日入則入朝出莫飢暮息莫飽朔不可泣晦不可歌此天時避忌之要略也地道諸忌坤主厚載萬物生成人賴以生敢不寅畏以䙝地靈勿以刀杖怒擲地勿輕掘地深三尺即有土氣傷人勿裸臥地上入深山當持明鏡以行使精魅不敢近入山念儀方二字以却蛇念儀康二字以却虎念林兵二字以却百邪入山至山腳先退數十步方上山山精無犯入山將後衣裾摺三指挾於腰蛇蟲不敢近渡江河朱書禹字佩之吉寫土字於手心下船無恐怖深山流出冷水不可飲水有沙蟲處不可浴有水弩蟲處不可渡蟲射人影即死先以物擊水蟲散方可渡行熱勿以河水洗面陂湖水有小影是魚秧勿食井水沸起者勿食屋漏勿誤食冢井中有毒勿食凡濁水要急飲入杏仁泥少攪十數次即可飲夏月冰勿多食雖貪一時之快久則成疾此地忌之大略也人事諸忌人為萬物之靈有生之所當重者也豈可不以生我者為急乃以賊我者為務也遵生者當知所重五臟喜香潔惡腥羶食必擇可勿搔首披髮覆面肝惡風心惡熱肺惡寒脾惡濕腎惡滲髮不可誤入鮓食甲寅日割指甲甲午日割腳指甲此為三尸遊處故以斬除之不可向北唾犯魁罡唾遠損氣唾多損神汗出毛孔勿令扇風恐為風中凡汗之所出本於五臟飲食飽熱汗出於胃飽甚胃滿故汗出於胃也驚悸奪精汗出於心驚奪心精神氣浮越陽內薄之故汗出於心也持重遠行汗出於腎骨勞氣越腎復過疲故持重遠行汗出於腎也疾走恐懼汗出於肝暴役於筋肝氣疲極故疾走恐懼汗出於肝也搖動勞苦汗出於脾動作用力穀精四布脾化水穀故汗出於脾也故勞傷汗出成病勿令汗入飲食食後以紙撚入鼻引嚏數次令人氣通明目化痰勿强忍大小便勿弩力大小便夜間宜開眼出溺行走勿語行遠乘馬勿回顧傷神凡行遠常存魁罡在頭上夜行宜數叩齒鬼神畏齒聲也夜行及冥臥心中懼者當存日月光入我明堂中百邪自散勿久行傷肝勿久立傷骨勿久坐傷肉勿跂牀懸腳勿豎膝坐大樹下不可坐防陰氣傷人坐臥莫當風冷石不可坐成疝日曬熱石不可坐生瘡雞鳴時叩齒三十六遍舌䑛上齶待神水滿口漱而咽之口誦四海神名三遍止鬼辟邪令人無疾東海神阿明南海祝良西海巨乘北海禺强早起食生薑以辟穢氣下牀先左腳吉漱齒勿用棕刷敗齒夜半勿哭泣勿對北詈罵勿卒驚呼勿恚怒令神魂不安勿大樂使氣飛揚勿多笑傷臟多喜令人亡錯昏亂食勿語寢勿言勿多念內志恍惚勿多思則神怠勿思慮傷心勿久臥傷氣勿頭向北春夏向東秋冬向西夜臥防牀頭有隙進風夜眠勿以腳懸高處勿臥開口以泄真氣勿以手壓心口令人夢魘勿尸臥勿以筆畫人面為戲使魂不認尸多致死者勿露臥睡醒覺熱勿飲水又睡凡夢勿語人勿燃燭照寢令人神魂不安人臥忽不醒勿急以燈照之殺人就黑暗處以指甲掐其人中或曰咬大拇指甲處而唾其面勿當風沐浴勿沐髮未乾即寢勿泠水洗沐飢勿沐飽忌沐洗頭不可用泠水成頭風勿沐浴同日沐者洗頭浴者澡身也有眼疾不可浴午後勿洗頭汗出勿洗沐浴無嘗不吉當考之月令沐浴日吉旦起勿開眼洗面盛熱勿以水洗面勿以大熱湯漱口凡有腳汗勿入水洗凡夏至後丙丁日冬至後庚辛日不宜交合大月十七日小月十六日此名毁敗日不宜交合大喜大怒男女熱病未好陰陽等疾未愈并新産月經未淨俱不可交合勿醉飽入房勿每月二十八日交合人神在陰帳幕內忌然燭行房凡本命甲子庚申不可入房雷電風雨不可交合此為人事之忌大略耳人能謹而戒之必獲安樂無諸疾苦再加調和飲食餐服藥餌百年之壽人皆可至幸毋忽之賓朋交接條序古名論白虎通曰朋友之道有四近則正之遠則稱之樂則思之患則死之揚子法言曰朋而不心面朋也友而不心面友也家語曰夫內行不修身之罪也行修而名不彰友之罪也故君子入則篤行出則友賢禮記曰君子之交淡如水小人之交甘如醴君子淡以成小人甘以壞漢書曰李德公所交皆捨短取長好成人之美時荀爽賈彪雖俱知名而不相能德公並交二子情無適莫世稱其正胡質曰古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也禰衡字正平少與孔文舉作爾汝之交時衡未二十而文舉已五十餘矣荀巨伯遠看友人疾值胡賊攻郡友人語伯曰吾旦死矣子可去伯曰遠來視子今有難而捨之去豈伯意耶賊既至謂伯曰大軍至此一郡俱空汝何人獨止耶伯曰有友人疾不忍委之寧以己身代友人之命賊聞斯言異之乃相謂曰我輩無義之人而入有義之國乃偃而退一郡獲全山濤與嵇阮一面契若金蘭山妻韓氏覺濤與二人異常交問之濤曰當年可以為友者惟此二人妻曰負羈之妻亦親觀趙狐意欲窺之可乎濤曰可他日二人來勸濤止之宿具酒食妻穿牆視之達旦忘返濤入曰二人何如曰君丰致不如正當以識度耳濤曰伊輩亦以我識度為勝晉王越鎮海昌以王安期為記識參軍雅相知重敕世子毗曰學之所益者淺體之所安者深間習禮度不如式瞻儀型諷味遺言不如親承旨音王參軍人倫之表汝其師之齊太原孫伯翳家貧嘗映雪讀書放情物外棲志丘壑與王令君亮范將軍為莫逆之交王范既相二朝欲以吏職相處伯翳曰人生百年有如風燭宜怡神養性琴酒寄情安能棲棲役曳若此嵇康所不堪豫亦未能也梁王繹博覽羣書才辨冠世不好聲色愛重名賢與裴子野蕭子雲布衣交白居易與元相國􅍬友善以詩道著名號元白集內有哭元相詩云相看掩淚俱無語别有傷心事豈知想得咸陽原上樹已抽三丈白楊枝許棠久困名場咸通末馬戴佐大同軍幕棠往謁之一見如舊識留連數月但詩酒而已未嘗問所欲忽一旦大㑹賓友命使者以棠家書授之棠驚愕莫知其來棠啓緘密視久之乃是言馬戴已潛遣一價恤其家矣其用情周渥人所不及如此風土記曰越俗性率朴初與人交有禮封土壇祭以犬雞祝曰卿乘車我帶笠他日相逢下車揖我步行卿乘馬後日相逢卿當下自昔士之閒居野處者必有同道同志之士相與往來故有以自樂淵明詩曰昔欲居南村非為卜其宅聞多素心人樂與數晨夕又云鄰曲時來往抗言談往昔奇文共欣賞疑義相與析則南村之鄰豈庸庸之士哉杜少陵與朱山人詩曰相近竹參差相過人不知幽花欹滿徑野水細通池歸客村非遠殘尊席更移看君多道氣從此數追隨李太白與范居士詩曰忽憶范野人閒園養幽姿又云還傾三五酌自咏猛虎詞近作十日歡遠為千載期風流自簸蕩謔浪偏相宜觀此則朱山人范居士者可為非常流矣周益公嘗訪楊誠齊于南溪之上留詩云楊監全勝賀監家賜湖豈比賜書華回環自闢三三徑頃刻能開七七花門外有田供伏臘望中無處不烟霞却慙下客非摩詰無畫無詩只謾誇誠齊續賀相歡好事者繪以為圖誠齊題曰平叔曾過魏秀才何如老子致元台蒼松白石青苔徑也不傳呼宰相來誠齊長嗣東山先生以集英殿修撰致仕家居年八十曾雲巢年尤高嘗攜茶袖詩訪伯子其詩云褰衣不待履霜回到得如今也樂哉泓穎有時供戲劇軒裳無用任塵埃眉頭猶自懷千恨興到何如酒一杯知道華山方睡覺打門聊伴茗奴來伯子和詩亦佳其風味不減前二老也二老相訪高誼如此古延方士湖州東林沈東老能釀十八仙白酒一日有客自號回道人長揖於門曰知公白酒新熟遠來相訪願求一醉公見其風骨秀偉跫然起迎徐觀其碧眼有光與之語其聲清圓於古今治亂老莊浮圖氏之理無所不通知其非塵埃人也因出酒器十數於席間曰聞道人善飲欲以鼎先為夀如何公曰飲器中鍾鼎為大屈巵螺杯次之䔧花蕉葉最小請戒侍人次第速斟當為公自小至大以飲之笑曰有如顧愷之食蔗漸入佳境也又約周而復始常易器滿斟於前笑曰所謂杯中酒不空也回公興至即舉杯命東老鼓琴回公浩歌以和之又欲以圍棋相娛止奕數子輒拂去曰秖恐棋終爛斧柯回公自日中至暮已飲數斗無酒色東老欲有所叩回公曰聞公自有黃白之術未嘗妄用且篤於孝義又多陰功此余今日來尋而將以發之也東老因叩長生輕舉之術回公曰四大假合之身未可離形而頓去東老攝衣起謝有以喻之回公曰此古今所謂第一最上極則處也飲將達旦甕中所釀止留糟粕而無餘瀝回公曰久不遊浙中今日為公而來當留詩以贈然吾不學世人用筆乃就劈席上石榴畫字題於庵壁其色微黃而漸加黑其詩曰西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黃金散盡為收書已而告别東老啓關送至舍西天漸明矣握手並行至舍西石橋回公即先度乘風而去莫知所終古延名衲成都一僧誦法華經甚專雖經兵亂卒不能害忽一仙僕至云先生請師誦經引行過溪嶺數重烟嵐中一山居僕曰先生老病起晚請誦至寶塔品見報欲一聽之至此果出野服杖藜兩耳垂肩焚香聽經罷入不復出以藤盤竹筯秫飯一盂枸菊數甌無鹽酪美若甘露得襯錢一鐶僕送出路口問曰先生何姓名僕于僧掌中書孫思邈三字僧大駭僕遽失之三日山中尋求竟迷舊路歸視襯資乃金錢一百文也由兹一飯身輕無疾天禧中僧一百五十嵗後隱不見李東谷曰君子以文㑹友以友輔仁友之者友其德也當親密之時握手論心必使君臣父子兄弟夫婦之倫粹然一出於正此交友第一義也夫何世變日薄友道掃地惟酒饌追隨有無周濟穢言相謔術數相勝於規圓便利諂諛取容此妾婦耳非友也啖以濡沫使效奔走此奴隸耳非友也恐少有攖拂而取疏遠故隨事茍徇而顗親密乘人父子之睚眦即導之以不慈不孝乘人兄弟之䦧牆即導之以不悌不恭乘人夫婦之反目即導之以不琴不瑟謬引古今眩亂是非指鹿為馬以鳥為鸞皆此輩也取友又當以此自鑑毋為人欺毋過責于此輩遠而敬之以為友道戒又曰故舊不遺則民不偷世俗薄故舊衰友人平日同筆硯同出處同貧賤同患難相與相愛不啻骨肉一旦得志視若路人因而多以忘舊為憾此特不能理遣耳宜如何若故人死亡而終身不相接足矣故友道難乎其振哉林可山山林交盟曰山林交與市朝異禮貴簡言貴直所尚貴清善必相薦過必相規疾病必相救藥書啓必直言事初見用刺不拘服色主人肅入序至稱呼以兄及表不以官講問必實言所知所聞事有父母必備刺拜報謁同自後傳入一揖坐詩文隨所言毋及外事時政異端飲饌隨所具㑹次坐序齒不以貴賤僧道易飲隨量詩隨意坐起自如不許逃席乏使令則供執役請必如期無速客例有幹實告及歸不必謝凡涉忠孝友愛事當盡心毋慢嫉前輩須接引後學以追古風貴介公子有志於古道必不驕人以自滿茍非其人不在兹約凡我同盟願如金石高子交友論高子曰毛詩序云自天子以至庶人未有不須友道以成者也但今之世友道日偷交情日薄見則握手相親背則反舌相詆何人心之不古乃爾此輩自薄非薄我也不知詆我以悅他人他人有心亦防爾詆自巳展轉猜忌智巧百出視友道為路塵宜管鮑陳雷之絶世也吾意初與人交深情厚貌不易洞曉何術以知其心地之善惡情性之邪正也但以吾心之美惡邪正以交其人彼雖奸險欲伺我隙我無隙可伺彼將奈何彼雖貪婪欲窺我敗我無敗可窺彼將奈何與之談必先以仁義彼之愚我邪我之言勿聽也與之飲必敬以酒食彼之誘我亂我之事勿行也我無私彼將何以行其私我無好彼將何以投吾好自防謹密則郛郭堅完外操矛盾何以禍我但今之人自作惡業醜行始欲人協已謀取必與乃厚人若骨肉雖父母妻子不若也茍所謀幸成則人必挾我求不遂即變交好為寇仇非金帛相酬則禍矣果人禍我抑果自禍而然耶人心孰不樂為善但以正感正以邪感邪邪正分於應感豈果人人皆小人而世無君子耶道誼之在天下亦未全滅也但千百中一二耳奈何移君子之道誼而求之於市人在在有之也此又何說哉近輩有與勝已者談不問其言之是非嘖嘖是贊聽彼大言不慙與不若己者談不論其言之可否嘐嘐是詆愧彼緘言似訥遂使過無從知善無從進直諒之道三益之友淹沒無聞矣夫貴者能以直友為可重則事功日進而望譽日隆富者能以直友為可寶則家業日昌而聲名日著奈何對貴者而言直不惟交疏且目為妄人語富者而言直不惟友薄且名為惡客求其德賢者而親之恥佞人而遠之者幾人哉非富貴之高品不能自别也但以直自居以道自重者是果為妄人又果為惡客乃曲譽取憐求為富貴交耶借得貴者一顧盼所榮幾多富者一饜飫所飽幾日靡靡焉以直道自委甘心效奴隸之恭妾媵之媚以悅人哉古者貴擇交且交以心匪交以面也交不能擇友不以心是誠面交矣何能久且敬哉故君子寧寡交以自全抱德以自重乃鄙泛交以求榮趣附以自賤也又若一輩與富者交惟欲利其利與貴者交惟欲利其勢使世人不以勢利橫胸中不以智巧媒徑路則人人聖賢矣又何慕富之德貴之賢乃委身於白日相從於朱門哉即其慷慨能分潤於一朝我獨何心甘受人憐耶人當以此心諒人之心勿以世道求古之道則交全而誼厚矣他如同門同業一貴一貧在貴者當念其窮勿以路人視故人分所有以周急厚道也在窮者亦當安其窮勿羡人以怨人希所有以自足亦厚道也奈何貴者不古而窮者不明昧此二者何得於友耶舉世皆爾爾果何人為丈夫哉交情乃見矣彼山人詞客邁德𢎞道賁於丘園抱河嶽之靈而飄然浪遊欲出與寰宇為友者此正吾人所欲交與遊願聞其藝而甘心焉者惜乎今之時同調者罕其人而朱門無容轍遂使諸君冥心物外介然絶俗高枕岩阿而無意海宇使中原意氣化作秋雲尚友之心不得圓滿如意是一恨也彼堪輿諸家欲兆我先知富貴禍福之機者皆高賢也奈老人無意於榮枯何能從人起朽骨而辟山靈轉災年而為福日汲汲乎逐高賢之足輿力騎哉敢謝所聞而且從吾之僻也余寡交自少及老無幾人皆余社友也况性不能附人就事成茍合追復古道雖拳拳奈何世之涼德往往耳吾於友道重有感於今日安得大執金剛如達摩西來化度友道使復古敦素頓脫一切業心惡劫共歡無我無人法界證上菩提此余第一大願遵生八箋卷八
