body:
  text: 遵生八箋雜家類四雜品之屬提要臣等謹案遵生八箋十九卷明髙濂撰濂字深父錢塘人其書分為八目卷一卷二曰清修妙論箋皆養身格言其宗㫖多出於二氏卷三至卷六曰四時調攝箋皆按時修養之訣卷七卷八曰起居安樂箋皆室宇器用可資頤養者卷九卷十曰延年却病箋皆服氣導引諸術卷十一至卷十三曰飲饌服食箋皆食品名目附以服餌諸物卷十四至卷十六曰燕閒清賞箋皆論賞鑑清玩之事附以種花卉法卷十七十八曰靈祕丹藥箋皆經驗方藥卷十九曰塵外遐舉箋則厯代隱逸一百人事蹟也書中所載專以供閒適消遣之用標目編類亦多涉纎仄不出明季小品積習遂為陳繼儒李漁等濫觴又如張即之宋書家而以為元人范式官廬江太守而以為隱逸其訛誤亦復不少特抄撮既富時有助於檢核其詳論古器彚集單方亦間有可採以視勦襲清言强作雅態者尚差勝焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:70e5c0c3eae9a40aea0c2da91cea775e90271234e13285c1d8250e686a700a6f
