body:
  text: 遵生八牋卷十三明髙濓撰飲􅄿服食牋下甜食類五十八種起糖滷法凡做甜食先起糖滷此内府秘方也白糖十斤或多少任意今以十斤爲率用行竈安大鍋先用涼水二杓半若杓小糖多斟酌加水在鍋内用木爬攪碎㣲火一滚用牛乳另調水二杓㸃之如無牛乳雞子清調水亦可但滚起即㸃却抽柴息火盖鍋悶一頓飯時掲開鍋將竈内一邊燒火待一邊滚但滚即㸃数滚如此㸃之糖内泥泡沫滚在一邊將漏杓撈出泥泡鍋邊滚的沫子又恐焦了將刷兒蘸前調的水頻刷第二次再滚的泥泡聚在一邊將漏杓撈出第三次用緊火將白水㸃滚處沫子牛乳滚在一邊聚一頓飯時沫子撈得乾淨黒沫去盡白花見方好用淨綿布濾過入瓶凡家伙俱要潔淨怕油膩不潔凡做甜食若用黒沙糖先須不拘多少入鍋熬大滚用細夏布濾過方好作用白糖霜預先晒乾方可炒麫方白麫要重羅三次將入大鍋内以木爬炒得大熟上卓古轤槌碾細再羅一次方好做甜食凡用酥油須要新鮮如陳了不堪用矣松子餅方松子餅計一料酥油六兩白糖滷六兩白麫一觔先將酥化開温入瓦合内傾入糖滷擦勻次將白麫和之揉擦勻淨置卓上捍平用銅圏印成餅子上栽松仁入拖盤熯燥用麫和油法不拘觔兩用小鍋糖滷用二杓隨意多少酥油下小鍋煎過細布濾淨用生麫隨手下不稀不稠用小爬兒炒至麫熟方好先將糖滷熬得有絲棍醮起視之可斟酌傾入油麫鍋内打勻掇起鍋乘熱撥在案捍開切象眼塊松子海囉􅀈方核桃仁𤓰仁同用糖滷入小鍋熬一頓飯時攪冷隨手下炒麫後下剸碎松子仁攪勻案上抺酥油撥在案上捍開切象眼塊子凡切塊要乘温切若冷硬難切恐碎白閏方糖滷少加酥油同熬炒麫隨手下攪勻上案捍開切象眼塊子若用銅圏印之即為甘露餅雪花酥方油下小鍋化開濾過將炒麫隨手下攪勻不稀不稠掇鍋離火洒白糖末下在炒麫内攪勻和成一處上案捍開切象眼塊芟什麻方糖滷下小鍋熬至有絲先將芝蔴去皮晒乾或㣲炒乾碾成末隨手下在糖内攪勻和成一處不稀不稠案上先洒芝蔴末使不沾乘熱撥在案面上仍著芝蔴末使不沾古轤槌捍開切象眼塊黄閏方家常亦同黒沙糖濾過同糖滷一處熬蜂蜜少許熬成晾冷隨手下炒麫案上仍着酥油捍開切象眼塊薄荷切方薄荷晒乾碾為細末將糖滷下小鍋熬至有絲先下炒麫少許後下薄荷末和成一處案上先洒薄荷末乘熱上案面上仍用薄荷末捍開切象眼塊窩絲方用細石板上一片抹熟香油又用炒麫羅淨預備糖滷下鍋熬成老絲傾在石板上用切刀二把轉遭掠起待冷將稠用手揉拔扯長雙摺一處越拔越白若冷硬於火上烘之拔至數十次轉成雙圏上案却用炒麫放上二人對扯順轉炒麫隨手傾上扯拔數十次成細絲却用刀切斷分開綰成小􅌪其拔糖上案時轉折成圏扯開又轉摺成圏如此數十遭即成細絲酥兒印方用生麫攙荳粉同和用手捍成條如筯頭大切二分長逐箇用小梳掠印齒花收起用酥油鍋内煠熟漏杓撈起來熱洒白沙糖細末拌之蕎麥花方先將蕎麥炒成花量多少將糖滷加蜂蜜少許一同下鍋不要動熬至有絲畧大㱔却將蕎麥花隨手下在鍋内攪勻不要稀了案上鋪蕎麥花使不沾將鍋内糖花撥在案上捍開切象眼塊羊髓方用羊乳子或牛乳子半瓶攙水半鍾入白麫三撮濾過下鍋㣲㣲火熬之待滚隨手下白沙糖或糖霜亦可然後用緊火將木爬打一㑹看得熟了再濾過入壺傾在碗内入供黒閏方黒沙糖熬過濾淨與糖滷對半相攙下鍋熬一頓飯時將酥油半甌在内共熬一回用炒麫隨手加花椒末少許和成一塊上案捍開切象眼塊酒孛你方用熬麽古料熬成不用核桃舀上案攤開用江米末圍定銅圏印之即是酒􅀈你切象眼者即名白糖塊椒鹽餅方白麫二觔香油半觔鹽半兩好椒皮一兩茴香半兩三分為率以一分純用油椒鹽茴香和麫為穰更入芝蔴粗屑尤好每一餅夾穰一塊捏薄入爐又法用湯與油對半内用糖與芝蔴屑并油為穰酥餅方油酥四兩蜜一兩白麫一觔捜成劑入印作餅上爐或用猪油亦可蜜用二兩尤好風消餅方用糯米二升搗極細為粉作四分一分作􅀈一分和水作餅煑熟和見在二分粉一小􅊦蜜半􅊦正發酒醅兩塊白􅄳同頓溶開與粉餅捍作春餅様薄皮破不妨熬盤上煿過勿令焦掛當風處遇用量多少入猪油中煠之煠時用筯撥動另用白糖炒麫拌和得所生麻布擦細糝餅上又一方只用細熟粉少許同煑捍扯攤於篩上晒至十分乾凡粉一斗用芋末十二兩此法簡妙肉油餅方白麫一觔熟油一兩羊猪脂各一兩切如小豆大酒二盞與麫搜和分作十劑捍開褁精肉入爐肉煿熟素油餅方白麵一觔真麻油一兩搜和成劑隨意加沙糖饀印脱花樣爐内炕熟雪花餅方用十分頭羅雪白麵蒸熟十分白色凡用麵一觔猪油六兩香油半觔將猪脂切作骰子塊和少水鍋内熬烊莫待油盡見黄焦色逐漸笊出未盡再􅆈再笊如此則油白和麵為餅底熬盤上畧放草柴灰面鋪紙一層放餅在上熯芋餅方生芋妳搗碎和糯米粉為餅油煎或夾糖豆沙在内亦可或用椒鹽糖拌核桃橙絲俱可韭餅方帶臕猪肉作燥子油炒半熟韭生用切細羊脂刴碎花椒砂仁醬拌勻捍薄餅兩箇夾饀子熯之薺菜同法白酥燒餅方麵一箇油二兩好酒醅作酵侯十分發起即用揉令十分似芝蔴糖者如前法每麵一箇糖二兩可做十六箇熯黄精餅方用黄精蒸熟者去衣鬚和炒熟黄豆去壳搗為末加白糖滷揉為團作餅食甚清捲煎餅方餅與薄餅同饀用猪肉二觔猪脂一觔或雞肉亦可大槩如饅頭饀須多用葱白或笋乾之類裝在餅内捲作一條兩頭以麵糊粘住浮油煎令紅焦色或只熯熟五辣醋供素饀同法糖榧方白麵八酵待發滚湯成劑切作榧子樣下十分滚油煠過取出糖麵内纒之其纒糖與麵對和成劑肉餅方每麵一觔用油六兩饀子與捲煎餅同拖盤熯用餳糖煎色刷面油􅥪兒方麵搜劑包饀作􅥪兒油煎熟饀同肉餅法麻膩餅子方肥鵝一隻煑熟去骨精肥各切作條子用焯熟韭菜生薑絲茭白絲焯過木耳絲笋乾絲各排碗肉蒸熟麻膩并鵞汁熱滚澆餅似春餅稍厚而小每捲前味食之五香糕方上白糯米和粳米二六分芡實乾一分人參白术茯苓砂仁總一分磨極細篩過用白沙糖滚湯拌勻上甑粉一半加芡實四兩白术二兩茯苓二兩人參一兩砂仁一兩共為細末和之白糖一升拌入鬆糕方陳粳米一斗砂糖三觔米淘極淨烘乾和糖洒水入臼舂碎於内留二分米拌粉其粗令盡或和蜜或純粉則擇去黒色米凡蒸糕須侯湯沸漸漸上粉要使湯氣直上不可外泄不可中阻其布宜疎或稻草攤甑中裹蒸方糯米蒸軟熟和糖拌勻用箬葉裹作小角兒再蒸凡用香頭法沙糖一斤大蒜三囊大者切三分帶根葱白七莖生薑七片麝香如豆大一粒置各件瓶底次置糖在上先以花箬扎之次以油單紙封重湯内煑週時經年不壊臨用旋取少許便香煑砂團方沙糖入赤豆或菉豆煑成一團外以生糯米粉褁作大團蒸或滚湯内煑亦可粽子法用糯米淘淨夾棗栗柿乾銀杏赤豆以茭葉或箬葉褁之一法以艾葉浸米褁謂之艾香粽子凡煑粽子必用稻柴灰淋汁煑亦有用㱔許石灰煑者欲其茭葉青而香也玉灌肺方真粉油餅芝蔴松子胡桃茴香六味拌和成捲入甑蒸熟切作塊子供食美甚不用油入各物粉或麵同拌蒸亦妙燥子肉麵法猪肉嫰者去筋皮骨腈肥相半切作骰子塊約量水與酒煑半熟用胰脂研成膏和醬傾入次下香椒砂仁調和其味得所煑水與酒不可多其肉先下肥又次下葱白不可帶青葉臨鍋調菉豆粉作糨餛飩方白麵一斤鹽三錢和如落索麵更頻入水捜和為餅劑少頃操百遍摘為小塊捍開菉荳粉為􅀈四邊要薄入饀其皮堅塵脂不可搭在腈肉用䓤白先以油炒熟則不葷氣花椒薑末杏仁砂仁醬調和得所更宜笋菜煠過萊菔之類或蝦肉蟹肉藤花諸魚肉尤妙下鍋煑時先用湯攪動置竹條在湯内沸頻頻洒水令湯常如魚津樣滚則不破其皮堅而滑水滑麵法用十分白麵揉捜成劑一斤作十數塊放在水内候其麵性發得十分滿足逐塊抽拽下湯煑熟抽拽得濶薄乃好麻膩杏仁膩醎笋乾醬瓜糟茄薑醃韭黄瓜絲作虀頭或加煎肉尤妙到口酥方用酥油十兩白糖七兩白麵一斤將酥化開傾盆内入白糖和匀用手揉擦半箇時辰入麵和作一處令匀捍為長條分為小燒餅拖爐㣲㣲火焊熟食之柿霜清膈餅方用柿霜二斤四兩橘皮半斤桔梗四兩薄荷六兩乾葛二兩防風四兩片腦一錢共為末甘草膏和作印餅食一方加川百藥煎一兩鷄酥餅方白栂肉十兩麥門冬六兩白糖一斤紫蘇六兩百藥煎四兩人參二兩烏梅二兩薄荷葉四兩共為末甘草膏和匀為餅或丸上加白糖為衣梅蘇丸方烏梅肉二兩乾葛六錢檀香一錢紫蘇葉三錢炒鹽一錢白糖一斤右為末將烏梅肉研如泥和料作小丸子用水明角兒法白麵一斤用滚湯内逐漸撒下不住手攪成稠糊分作一二十塊冷水浸至雪白放桌上擁出水入豆粉對配捜作薄皮内加糖菓為饀籠蒸食之妙甚造粟腐法罌粟和水研細先布後絹濾去殻入湯中如豆腐漿下鍋令滚入菉豆粉攪成腐凢粟二分豆粉一分芝蔴同法麩鮓麩切作細條一斤紅麯末染過雜料物一升笋乾紅蘿蔔䓤白皆用絲熟芝蔴花椒二錢砂仁蒔蘿茴香各半錢鹽少許香油熟者三兩拌匀供之用各物拌之下油鍋炒為虀亦可煎麩上籠麩坏不用石壓蒸熟切作大片料物酒醬煑透晾乾油鍋内浮􅋩用之神仙富貴餅用白水一斤菖蒲一斤米泔水浸刮去黒皮切作片子加石灰一小塊同煑去苦水曝乾加山藥四斤其為末和麵對配作餅蒸食或加白糖同和捍作薄餅蒸焊皆可自有物外清香富貴造酥油法用牛乳下鍋滚一二沸傾在盆内侯冷定面上結成酪皮將酪皮鍋内煎油出去粗傾碗内即是酥油光燒餅方燒餅每麵一斤入油兩半炒鹽一錢冷水和捜骨魯槌研開􅌯上􅘤待硬緩火内燒熟用極脆美復爐燒餅法核桃肉退去皮者一斤刴碎入蜜一斤以爐燒酥油餅一斤為末拌匀揑作小團仍用酥油餅劑包之作餅入爐内燒熟糖薄脆法白糖一斤四兩清油一斤四兩水二碗白麵五斤加酥油椒鹽水少許捜和成劑捍薄如酒鍾口大上用去皮芝蔴撒匀入爐燒熟食之香脆酥黄獨方熟芉切片用杏仁榧子為末和麵拌醬拖芋片入油鍋内煠食香美可人髙麗栗糕方栗子不拘多少隂乾去殻擣為粉三分之一加糯米粉拌勻蜜水拌潤蒸熟食之以白糖和入妙甚荆芥糖方用荆芥細枝扎如花朶蘸糖滷一層蘸芝蔴一層焙乾用花紅餅方用大花紅批去皮晒二日用手壓匾又晒蒸熟收藏硬大者方好須用刀花作𤓰稜豆膏餅方大黄豆炒去皮為末入白糖芝蔴香頭和匀為印餅食之法製藥品類二十四種法製半夏開胃徤脾止嘔吐去胷中痰滿兼下肺氣半夏八兩圓白者切二片晉州絳􅈨四兩丁皮三兩草荳蔲二兩生薑五兩切成片右件洗半夏去滑焙乾三藥麄剉以大口瓶盛生薑片前藥一處用好酒三升浸春夏三七日秋冬一月却取出半夏水洗焙乾餘藥不用不拘時候細嚼一二枚服至半月咽喉自然香甘法製橘皮日華子云皮煖消痰止𠻳破癥瘕痃癖橘皮半斤去穰白檀一兩青鹽一兩茴香一兩右件四味用長流水二大椀同煎水乾為度揀出橘皮放於磁器内以物覆之勿令透氣每日空心取三五片細嚼白湯下法製杏仁療肺氣咳𠻳止氣喘促腹脾不通心腹煩悶板杏一斤滚灰水焯過晒乾麩炒熟煉蜜拌杏仁勻用下藥末拌茴香炒人參􅒦砂仁各三錢粉草三錢