body:
  text: 遵生八牋卷十七眀髙濓撰靈秘丹藥牋上髙子曰食藥者可以長年仙經論之矣故羲皇嚅藥制醫治人百疾自華扁諸家復遺方書以利天下後世好生之徳何無量哉今人天真散失幻體空虚不思補髓填精斡旋造化長年將無日矣悲歟余㓜病羸復苦瞶眼僻喜談醫自家居客遊路逢方士靡不稽首傾嚢以索竒方秘藥計今篇篇焉盈卷秩矣即余自治羸疾頓壯矇疾頓眀用以治人應手奏效神哉藥之方歟余寳有年計所徵騐不可枚舉兹不自秘并刻以助遵生一力他若條分疾病次備方藥當質之專科無問是編所冀智者原病合方心運妙用寳以䕶命兼以活人則方寸即為夀域豈不勝彼寳金玉而甘心泉壌者哉錄成牋曰靈秘丹藥丹藥秘傳龍虎石煉小還丹余生平酷嗜方藥屢獲竒效故信愈篤而好益專兹丹始焉得之終南王師燕中復遇至人叅同秘訣今不自私錄以濟人見者幸勿視以肉眼龍虎石丹序夫龍虎石者乃人元造化之至寳也自軒轅皇帝所傳製煉之丹方後鍾呂二仙再修接命之秘法葢求延年之術惟童真未破不假他力而徑自還丹已破河車必得至藥而復全性命龍虎即男女之法象男女乃隂陽之妙化也隂陽未漓其體渾然故能感召天地氤氲之氣盗奪日月磅礴之精其氣充塞五臓遍歴諸經溢之於内為氣為血滲之於外為水為膏聖人以法術而採取用以施水火既濟之功運週天還返之妙鍊成黄芽白雪玉液金英火煉味醎水飛味淡其體不一其色不定餌陽煉則補益真隂餌隂煉則强壯元陽返本還元歸根復命單服散片而順絡調經扶衰救老合服羣丹而祛除百病起死回生致真氣而日益日盛使諸隂而時剝時消自然身輕體健返老還童百日成功千期輕舉實大丹之根基乃人元之上藥也但無徳之人終身難遇若夙有仙風道骨者得遇此道屏除六慾絶棄貪嗔濟貧㧞苦廣積隂行凡人不問老少男女五勞七傷諸虚百損遺精白濁喘𠻳風癱婦人崩漏子宮乆冷不成胎孕小児諸疾並皆服之無有不治然須緩緩服乆自効欽蒙御賜詩曰採取須龍虎烹煉合隂陽服之二三載肌膚自榮光欽此謹録成帙珍藏世寳云取龍虎水法龍屬木虎屬金即童男童女取之時謹擇有五種不男五種者生逮變半凟也生者外腎不舉逮者聲雄皮粗變者􅧍羶狐臭半者黄痩多病凟者疥癩瘡疽五種不女羅紋股交脉也羅者隂戸上有横骨紋者狐臭體氣股者實女也交者聲雄髪粗皮膚粗糙無顏色脉者瘡疾病患殘疾二鼎器務擇眉清目秀滿月之相三停相等唇紅齒白髪黒聲清肌膚細潤年方十二三嵗至十五六未破者用黍稷稲粱紅豆紅棗犽猪鯽魚等味與彼食之忌葱蒜韮薤五葷三厭穢汚二水戒喧譁戲謔手舞足蹈恐耗散精華取之時先調百日十月起三月止置磁缸或磁罈於静處收貯以盖盖之積至二三石聴候煉用隂煉法將前積取二水置磁缸三四口或五六口於静通溝去䖏毎缸止放五分龍虎水加井水五分下眀礬二兩白术二兩松栢葉各二兩取楊桞棍三四莖一扎順攪千餘下盖之勿動勤看待水澄清去葢慢慢湢去清水又加井水滿缸以絹羅濾去渣滓又攪三二百轉葢之澄清又盡湢去清水仍加井水又濾又攪又湢如此十餘次直待水香為止候水盡用米篩二三箇内鋪薄綿紙將渾龍虎石取入篩紙上待水乾移在日色處以竹刀畫成骨牌路晒亁如粉之白即是隂煉龍虎石用磁盒收貯合藥用此石能補心生精飬血之至藥也又一方將積下的龍虎水炤前安半缸加井水半缸令九分滿另用皁角一斤煎水一桶加白礬四兩在内聽用取南桑北榆東槐西桞中松各一枝共紥成一握攪前缸龍虎水千餘轉㸃皂角白礬水二三碗勿動待他澄清湢去清水再加井水令滿仍入皂角白礬水二三碗再攪四五百轉待澄清湢去清水再加井水令滿渾攪用空缸一口以瓢連忙淘入空缸内剰泥脚二三碗不用復攪百十轉澄清水仍加清水攪渾乗渾連忙又淘入空缸内又剰泥脚不用又澄又湢去清水又加井水又攪渾又淘過又剰脚如此十餘次方湢水盡用净灰半缸按實上鋪絹一方絹上鋪紙將渾秋石傾在紙上䕃亁亦將刀竹畫成骨牌路晒亁即是隂煉收用河煉法將前積收二水炤前隂煉置器一様煉法只是置浄器積二水不過夜一日一煉不用井水取南流東流河水依前法多加河水飛煉晒亁比隂煉上等潔白此河煉石丹方用乳膏丸服能消痰止𠻳專治勞𠻳大有功效陽煉法擇露天空地砌灶二眼坐東朝西安三尺二二尺四鍋二口鍋近處安缸四口先積下龍虎水二缸或三缸方洗浄鍋銹先於大鍋内入五瓢灶内慢火粗􅆈至起沫以笊籬撇去油沫直待􅆈至不起沫方起過小鍋内細􅆈大鍋内仍添二三瓢又􅆈去沫又起過小鍋来如此少少漸添漸起直待前積二水􅆈盡大鍋住火只在小鍋内慢慢火􅆈用鏟刀不住手鏟待水乾成膏上用一小鍋小缸合住鍋口週圍用泥封固完宻止留一孔出水氣盡孔内飛出金星青氣仍以泥封孔眼缸底用濕布一方不可水大但嘗以水潤之小火燒至鍋底紫色退火冷定過夜第二日先去口泥浄揭開昇缸上的已永靈藥紅黒白各色者另收聴用另打黄芽將鍋内黒膏子鏟起另入一口小鍋内用磚架起大火燒待黒烟盡連鍋通紅退火眼冷酌量下井水或露泉等水尤妙燒滚先將浄缸一口於室内止安竹篩篩内鋪紙濾滴清水入缸篩内黒渣不用將濾下清水看如水清碧就磁盤煎出浄石来如畧有些黄色還用前小鍋煎乾再煅一火眼冷如下水煎滚炤前淋入缸内直看淋下的水如井水一般清碧方以磁盤用磚支住徐徐添炭火煎前淋的水滚以竹鏟不住手鏟直待前煎鏟焙乾畧帯潮取出傾在紙上晒乾似雪之白此是陽煉之法又一方鍋煎法同前火用桑柴直煎至水盡鏟焙成黒粉末先用陽城罐十數外用紙觔泥固了隂亁將末装入固濟罐内上用鐵燈盞坐口以鐵絲纒紐周圍用鹽泥封固嚴宻炭火炙乾於地下用釘三箇釘地離四指髙坐藥罐於釘上周圍用磚砌成百眼爐先下底火徐徐添至平口盞内徐徐添水勿令乾了到火三炷香盡退火冷定去鐵線開看升盞上的另收打黄芽罐内的秋石取出碾為末加露水煎待末化炤前用篩子置於磁盆上篩内先鋪生絹一方次鋪紙二層將煎滚的水傾入篩紙内濾清入盆内去黒渣不用將淋下清水用銀鍋煎乾成白秋石再添露水煎直待石化了仍換紙於篩内再淋再煎如此九次丹訣云九􅆈九打似氷霜去滷除羶為上藥將石收貯銀器内或磁罐内用黄蠟封口墜入井中去火毒三日取出毎日空心白滚水服三五分此石是人身五行化生以法煉成三陽之炁服之能補腎中真水最壮丹田之元炁實人元之丹也乳煉秋石竒方童便二桶用皂角十二兩水九碗煎至三碗傾入便内用桃桞枝攪打便水二千餘下淀清傾去濁脚次将杏仁十兩打碎煎汁三碗倒在便内又如前攪打二千餘下去清留濁又将猪脂油十二兩熬成汁去滓傾入便内又攪千餘下浮膜傾去又淀清將人乳汁用滚湯泡成塊傾入便内再攪如前又淀一日傾去清水下底濁粉漿水用木杓乗起傾桑皮紙上先将毛灰一矼作一沉窝将桑皮紙放灰上以滲便水紙上乾白膩粉即成秋石矣不可動揺晒一二日磁瓶收起毎秋石一兩入柿霜三錢同和毎用白滚湯調服一二分起至七八分止空心時服此粉益夀延年返元還本髪白變黒百疾不生不必配藥謂之乳煉法也取秋石氷片法将煎熬黒粉内打淋出的清碧秋石水或十碗或五七碗装入大白磁礶内於冬至後數九天埋露天地下葢口嚴宻勿令撒土在内凍七日後取出掃土浄揭去葢将秋石水傾出另器内其淡秋石如氷俱結在礶底鏟取出放白磁盤内晒乾其味甜淡用銀器收貯早晩空心服之能清痰降火補氣生津之妙藥煉伏火黄芽法用前積下的龍虎石三四斤將露水再煑烹再淋再打火九次直煉得如白玉相似方用陽城礶量盛半斤大的外用猪毛泥固謹晒乾收抹浄礶内約装秋石半斤在内坐入眀爐内風匣大火化開成清汁方用前缸上收的巳汞㸃上以白㸃白以紅㸃紅以黒㸃黒即成伏火黄芽待汁清取出冷定成一白玉陀其色難定或如玉或金色或白中𢃄紅或黒色丹書云其白容易得一黒最難求所以分有五色以應五行内滋五臓實乃飬生之至藥也鄭思逺訣曰淮南煉秋石黄蒂發金花秋石原非石金花不是花花從秋裏得石向春中葩子母同一䖏如住仙人家秋石是真鉛金花號黄芽黄芽非别物内象取精華取秋石汞花法将磁盤煎取龍虎石時看煎至六分乾時滚起圓泡急将銀茶匙挑起放白綿紙上晒乾銀器收貯此汞花最是輕清先天之藥服之令人肌膚瑩光身體壮徤其功無比煉黄芽法將前初煉秋石鍋􅆈成黒膏時缸合昇取的巳汞靈藥先㨂置小白礶口如錢大者用猪毛泥固濟隂乾將靈汞五錢口大或一兩装入礶内口用白破碟底相成圓錢坐口上以鐵線扎𦂳鹽泥封固縝宻用火炙乾口地下錠釘三箇離地二指髙將藥礶坐上用磚砌百眼爐先用底火慢慢燒四寸香漸漸加至小半肚火一炷香口上用新筆塗水濕葢香盡去火冷定開出其黄芽昇在礶葢上起下如金色一餅此乃是龍虎初弦至美之炁名曰金花又曰黄芽服之令人五臓化生先天精氣元神祛除百病消化痰涎自保長生也鍊白雪法亦將巳汞靈藥炤取黄芽法一様封固打火葢黄芽初陽之氣易走易飛宜火小火小色變輕黄即黄芽白雪乃二陽之氣比黄芽火候畧加大些其藥自然變白此黄白造化乃天地隂陽人元自然變化非人功力所為也火足冷定將下一餅如白玉之象亦是龍虎至英之氣名曰白英又號白雪服之令人自然三田生氣五臓添華百病不生諸痰永息精神壮而病自安矣取冬氷法将煉龍虎石時取清碧之水用茶鍾十箇各盛半碗在内於數九天擺在露下次日早水面俱結氷以小刀貼碗週圍輕輕畫離碗邉挑取出輕放大氷盤内晒乾即如春餅様的圓氷花令人清晨将些須入口噙化生津化痰其功甚效至妙晒煉乾秋石法此石乃人之精氣結成豈容見火燒煉以傷生氣惟此法乃得人元至妙大理最上一乗擇僻静去䖏築一臺髙三尺三寸上置缸五口積龍虎水五滿缸於三伏天晒露遇風雨葢之晒至半缸并成三缸仍晒仍露至止得二三斗之數方取不見水的新磚十二箇浸入水内一夜第二日取出晒乾至晩又浸如此直待水通乾了為止尋一幽隂静室打掃潔浄地下噴水濕以竹劈成篾片稀鋪濕地上将浸的磚側擺篾上上用筐葢周圍泥封口縫䕃七日開看其磚上生出秋石如白玉苖一二寸長輕掃下来收在銀器内將前磚炤前仍取五七次直待不生為止此煉法不經水火不泄元靈惟仗日精月華煆煉亦得助氣添靈如服此石比水火煆者加功效過半矣混元毬製取甜秋石法於僻静露天去䖏置缸三五口積滿龍虎水於三伏天日晒夜露遇風雨葢之天晴去葢直晒至水耗只存至大半缸將混元毬十數箇浸入内葢之勿動直過冬待至第二年三伏天方取出毬来於日中晒伏盡剖破其毬内生白雪玉英其味甘美極能補心血化老痰浸毬的缸底亦結生如氷相似亦取出晒乾另合藥用功亦同前煉真土法煉真土時須於秋分後取山東東三府地方的人中黄㨂擇成顆粒方圓者為妙成稀片者不用採取四五担就於本地方尋浄地方下做木郎頭一箇翻打碎晒極乾用火煨過成灰畧存性方入蒲包装載回来取河水煎滚先將煆過的人中黄入缸内將滚水冲泡攪打均待冷用篩子内鋪粗布將水淋過渣不用將淋的人中黄水用鍋於露天砌灶煎乾連