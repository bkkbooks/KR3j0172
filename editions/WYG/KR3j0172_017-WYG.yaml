某日時到次月其日預備器物令彼騎坐置一空穴将器抵住虎穴待經一来取出經中有一成粒者如枸杞様急以雄黄硃砂末温養銀器收貯服用酒送下如不服存後配合混元丹服此丹比梅子難得但十八九二十上下不拘已破未破俱各有之毎月服二三粒使元氣不散精神不耗服乆令人生子如要交合百戰百勝其效甚速詩曰月月一枝花隂山是我家有人認得我還丹即是他詩乃人人通知其法不易輕傳得知者慎勿蹉過慇􅮆採取而服之自保長生也取黍米金丹法擇童男童女各年方二八像皆不干於五種破敗俱要清秀合於美鼎男要精通女要經行令彼交合如得成孕當以黍稷稲粱犽猪鯽魚與彼食之不可妄食五葷煎炒之物務要調理得中待到八箇月上下㸔他兩乳脹大有紅脉聚扵乳頭藥将熟矣先将銀打成二小礶急與彼合住兩乳繫在主腰内𦂳合不時取㸔恐有走失如取下一粒黍粒之大或一滴似金汁色黄異香急用硃砂末合成一丸或分三丸銀盒収貯擇黄道吉日煎乳香湯服之即得解形換骨永得長生取此丹時全要仔細如落地即入地不見如見太陽即化成炁而去矣戒之慎之製何首烏法取天壇王屋山的何首烏不拘多少如有十斤用黒豆一斗先以鹽水浸藥與豆半日撈起入蒸籠内蒸三炷香取出晒乾如此三次去水加酒浸透炤前蒸三次後加蜜水拌之蒸三次共九次毎一次三炷香数足晒乾去豆將何首烏研成細末収貯聴候後配藥用葢何首烏得天地五行正氣包含五色所以滋飬五臓外皮黒滋腎水内紅絲補心血中心黄徤脾胃皮内青益肝氣内含白消肺痰與常不同草木中之聖藥也製茯苓法擇雲南来的外黄内白結實好茯苓不拘多少用刀削去外面粗皮㕮咀成豆水浸一夜第二日上磨磨細以羅篩濾去皮膜多加水漂打轉澄清水仍攪打三五次湢去水盡用洗净白包袱一箇弔起四角將茯苓粉起在包袱内滴水亁方取入盤内加人乳拌匀晒亁再加乳又晒如此一月或半月方搗為極細末用磁器收貯聼候配藥用茯苓性温平味苦氣清淡能安魂魄除驚悸補肝氣益心血利水道通神眀大有竒功為中焦之聖藥也製蓮粉法取蓮粉不拘多少先以水浸脹洗去紅皮擇去心連水磨成漿以絹袋紐去渣將粉加水漂去澁水待清湢水盡亦起在包袱内滴水盡方晒亁再搗成末以磁器貯收聼用葢蓮粉性温味甜氣薄能補中益氣壯心神消水榖除驚悸實肌膚為補中之聖藥也製芡􅧙法取硬壳鷄頭打去壳搗成粉方着水漂待清湢去水將粉入盤中晒亁再搗為末収貯芡實性平味薄氣㣲清補中氣調胃氣益心血壯元陽乃助中之聖藥也製熟地黄法將淮慶熟地黄不拘多少先用酒洗净入籠蒸一炷香取出晒亁再用酒拌潤仍入籠蒸一炷香如此拌九次取出乗潤搗千餘下分小餅晒亁再搗再晒為末収貯聼用熟地黄性温味甜氣厚得酒製而補諸經之虚益肝經之血能潤肺經之水注心經之液為補中血虚之聖藥也製人參法擇好孩児黄揀參結實者用蜜水潤軟絹袋盛貯入酒米飯内蒸三次晒乾為極細末聴用人參性㣲熱味苦氣㣲厚能潤肺生津補諸虚不足生氣生脉乃藥中之聖藥也製川椒法擇鮮紅開口者用閉口者不用将粗紙襯鍋底㣲火炒脆碾為細末用紙鋪地下去火毒一夜方收聴用椒乃通氣之物去寒氣通滯氣清心眀目大有竒功也製小茴香法将茴香擇去梗末浄不拘多少㣲火同鹽炒令香熟篩去鹽為末亦用紙鋪地下去火毒一夜收起聴用茴香乃下部之藥極能益腎水和中氣助正蠲邪其功甚大河煉龍虎丸河煉龍虎石一斤首經至寳三錢金乳粉一兩右将三味共為細末放大氷盤内用乳膏對紅棗肉和匀入木臼内搗千餘下如膠相似取出丸如桐子大先用硃砂滚身次用金箔穿衣晒乾用磁器収貯於毎日五更時或乳或蓮肉湯吞服一錢五分臨晩酒服一錢此河煉乃隂陽純粹之精因感物而滲泄扵外以法而採煉成丹服之令人心血調而肺氣伸故痰火見之而消化喘𠻳見之而平伏永無勞咳之患隂煉龍虎五精丸治勞瘵虚弱用龍虎石五兩金乳粉五兩紅鉛二兩白茯苓二兩五錢蓮粉一兩六錢芡實粉一兩地骨皮一兩右七味共合一處用乳膏為丸如梧桐子大金箔為衣晒乾用磁瓶収貯毎日早取頭生男乳吞服一錢日進三服加至一錢五分服之七日痰消火息喘咳即止服之半月病覺甦醒服之一月大病即安如常陽事虚舉以花頭小雞隂乾為末服之陽即不舉服藥時忌牛羊茶醋房勞等事服此五精丸先除去夙疾以致脾壮五臓安和氣血充溢百病不侵後乆服小還丹始得延年益夀住世長生也陽煉龍虎五精丸用陽煉龍虎石五兩金之精茯苓二兩木之精蓮肉粉一兩水之精椒末一兩火之精小茴香二兩土之精右將五味各拌勻入大磁盤内外加乳粉二兩人乳五錢飛羅麵打糊為丸如梧桐子大每日起更時分無灰好酒吞服三十六粒此藥專補腎經生精氣益真水葢腎居北屬水天一生水水為萬物之先故為人一身之依本醫經曰萬物有根則生無根則息先服河煉清淡火次服隂煉滋心血再服陽煉壮元陽陽壮生隂精精旺産真氣氣盛育元神精氣神全病從何生老子云神不外遊精不泄氣不散兮别無訣若還四象入中央不怕靈丹不自結此謂至言也既得復全之方再服至藥長生不老在我矣二煉龍虎五精丸用陽煉龍虎石二兩三錢隂煉龍虎石二兩七錢茯苓一兩五錢何首烏末七兩蓮粉五錢芡實粉一兩紅鉛一兩金乳粉二兩右将八味各等末入大磁盤内每日加頭生男乳一茶鍾拌濕晒二七日又加梨汁晒七日足加紅棗肉同入木石臼内搗千餘下令和軟方取出丸如梧桐子大先用硃砂末滚身次將金箔為衣晒乾入磁礶收貯勿令泄氣亦嘗取出亮炤乾不可黴了毎日早五更乳酒頓熱服一錢臨睡時半饑半飽用蓮肉煎湯服五分此藥服之半月身内如有風寒暑濕之氣自然消除服至一月故病除根服之百日五臓生精至一年返老還童先服五精丸将身中故病舊患並皆掃蕩使五臓六腑調和精神壮茂而長夀可期矣龍虎小靈丹用隂煉龍虎石八兩為末入大磁盤内扵夏至日晒起毎日調人乳日晒夜露遇天隂收藏每月入紅鉛一個同晒直至中秋受過天地金旺之氣扵二十後方晒為末約稱一斤之重為止如分兩多少則是配合不均致氣血有不平矣用乳膏和匀略加些須棗肉搗軟丸如菉豆大扵毎日五更時分用乳酒均對頓熱服三十六丸静坐片時使心血下䧏腎氣上昇氣血交通隂陽暢運諸邪逃遁道氣常存矣復有歌訣扵後歌訣曰神仙發秘機濟世功無比只此小靈丹妙奪隂陽理先天龍虎石道合乾坤髓半斤隂陽精配入首男乳日夜曝中天却從夏至始月月入紅鉛直至中秋止色如桃花鮮噴鼻甘香美日服一分半送下華池水傳自生天經初服人如醉服之至七日體熱何足畏時進蟠桃酒藉以滋靈氣漸至一年餘頓覺超凡類肌體潤且温延年歴人世此丹尚未服大丹安敢餌四體俱屬隂服丹陽填髓先言積隂功功成幸相遇非人莫亂傳妄泄天機罪拱持三光前運自華池水寅初服一粒仰叩神天地此歌即是秘妙口訣非人勿示慎之戒之小還丹用隂煉龍石一斤首經至寳二兩右将二味各為細末共和一䖏以大磁盤盛貯從夏至日起手毎日加人乳一碗調拌均匀放置髙閣去䖏日晒夜露第二日早研碎又拌乳日日如此一月進鮮紅鉛一個製入扵内同晒同露直晒至八月十五日天地金旺之時受過了月華神水復入梨汁三五次方晒乾為末用乳膏紅􅀥肉搗和令軟丸如桐子大外用金箔穿衣隂乾磁礶收貯不問老少毎日半夜子時分乳酒對半頓熱吞服一錢念長生得道天尊九聲静坐一時方睡初服覺􅉯天眀取人乳一鍾服之其熱自退服乆不覺此小還丹即前小靈丹是也一日一錢半年該三十六兩所謂一斤淡石毎日晒積乳共重二斤外将紅鉛四兩共重二斤四兩只可一人服不可缺了毎年晒一次此藥服之一年百病不生隂陽和暢服之二年行歩輕健肌膚榮光服之三年髪白返黒齒落更生服之一紀住世永年永作地仙也今将口授訣歌幷註於後歌曰夏至一隂生晝夜當天立日餐金烏精夜食玉兎液夏至乃五月節中也一隂生扵五陽之下是為木火通明之時此時乗天地咸暢之機攬隂陽宣理之氣于是晝承日之精夜吸月之液是以日為真火月為真水水之滋養形中生氣矣餐食者精光交休之義其法以前掃起霜扵夏至一隂生之後以磁盤盛貯晝則炤扵日以餐烏精夜則鞠眀于月以食兎髓此不論曉夜當天露立自然日月精華貫徹藥也歌曰半斤四兩乳相配成戊巳更有月月紅炤月加于裏乳者血氣之聚也嬰兒服之可以滋養飢體榮腴經脉况配靈質灌溉日月精華有不充飫人之榮衛乎故両情相孚則隂陽之精華感合隂血作乳則彼此之神氣共䖏是乳成戊巳二土猶言媒娉傳道使天之日月精液人之男女靈質皆有係屬不遊散也月月紅者實女首經紅鉛也逐月加増則精液交馳而一氣感應扵虚靈也其法以前霜毎劑半斤加入浄乳漸和同晒乾再加約共乾一十二兩是半斤霜四兩乳乃為足也待至一月則進紅鉛一次進之三月三次為三進紅鉛矣歌曰莫辭勞苦心煉至中秋日色如桃花鮮入口甘且美修至靈質不加勤勞莫能聚精餐精服液不以辛勤莫能㑹神故聚精會神皆禀人之苦心則是人心意内外兩通專志不違天人恊化也但煉至中秋可以息功其故何也火滅生土天之令也土旺金盛候之全也其取義曰秋石葢擬諸此也色如桃花者靈藥可服之騐也入口甘美者其味滋益之㣲也其法愈精而金土愈旺故有斯功焉其法前餐食烏兎之霜並和乳經之藥自五月中氣心專志决如法煉至八月中秋晝夜勞心不可辭苦直候色如桃花甘美充腴乃為藥靈之成矣服之夀命長彭祖兹可比名曰小還丹秘之莫妄語藥靈質美乆服自可益夀五行精爽餌之寜不延年故彭祖永命可以同塗甚言藥物益命之極此乃人元配合以類交飬則其以精益精以氣益氣以神益神之妙名曰小還丹焉不比他方金石草木之類故戒莫妄語以泄中和之秘其法以前通靈之藥用磁礶収藏封固以備不時啓服毎日服三分醇酒送下先天服食隂煉龍虎金丹用龍虎二石八兩先天元氣蟠桃仙酒後天真鉛首經至寳二兩先天真鉛乳香一兩黄婆通引氷片一錢眀目通竅硃砂纒身安鎮心身金箔穿衣安魂鎮魄日晒月露取真火真水右將各味俱製成粉放磁盤内擇鷄犬不到静處置一木架扵黄道吉日起手毎日加乳拌潮日晒夜露七七四十九日以乳為黄婆合和鉛汞三家相見晝夜受日精月華之靈此真隂真陽即真火候也古云自有天然真火候不湏柴炭及吹嘘每遇天隂収藏此藥受了日月精華以成真丹砂加乳膏搗和為丸如菉豆大先用硃砂纒身次與金箔穿衣晒乾收貯專治男女五勞七傷諸虚百損身體痩弱咳𠻳吐痰不思飲食夜夢鬼交遺精婦人小児一切雜症並皆服之每日清晨五分熱酒送下詩曰東方青龍西白虎南是朱雀北𤣥武黄婆㑹合入中央烏兎煆煉名真火四十九日變通靈金衣為丸潤丹府空心熱酒服五分益夀延年似彭祖羅浮真人三家相見秋石方先取向陽黄土八斗背隂黒土八斗拌匀用缸八口每缸二斗盛貯每日用童男女便漸漸添滲入土内四十九日日晒夜露日足方止将土造成一器外方内虗圓合在一處鐡線扎緊封口徑要三寸六分厚用三釘釘扵地下一尺六寸高周圍磚砌定用炭火四圍均匀先文後武打三炷官香冷定取開内生白雪如瓊玉之状取入銀神室内埋土出火毒九日乳為丸每日服一分加至二三次白湯送下乆服筋强力壮百病皆無勝補藥百倍也仙傳秋石配合十精五子丸用陽煉龍虎石十兩隂煉龍虎石六兩煉法具前人參當歸身酒洗葫蘆芭㣲炒芡實蓮花蕋㣲焙鹿茸酒浸酥炙黄仙靈皮葉蒼术米泔水浸炒枸杞子酒浸晒乾已上十味十精藥兎絲子酒浸蒸七次巨勝子焙車前子酒浸炒栢子仁取肉已上五味五子之藥各二兩沉香一兩粉草一兩辰砂五錢水飛極細三味升降之藥加白鉛一兩即人乳也右将衆藥均對分兩用紅棗肉加蜜搗合為丸如梧桐子大毎服一百丸白湯送下日進三服服至百日百病消除身輕體徤效難口述也龍虎合配五氣丹法葢秋石延命之術乃上古神仙留傳秘法也其妙不外乎隂陽真一交媾而成非心志之專而遇眀師授受之真又烏能奪造化之機而延夀命于無彊也哉噫今之學仙者徒以金石草木脩製成丹而望延夀殊不知皆異類之物豈得與人相契乎葢人禀天地真一之氣憑隂陽純粹之精感合而成非隂陽不能變化非真一不能還元經云竹破須将竹補宜又云取将坎位中心實㸃化離宮腹内隂豈得他物而同類乎予因成化癸邜南遊遇仙師尹真人傳授内丹秘訣兼示以三峯真人人元配合五氣接命還丹方法先製服五氣築補完全次㑹合三元結成還丹方得超凡入聖紅鉛真陽鉛也秋石真隂汞也乳酥即真土也鉛汞得土而丹成精氣得神而㑹合故餌之者夀可延而仙可期也今将五氣丹藥具後隂煉秋石八兩紅鉛四兩人乳粉四兩牛乳粉四兩酥油四兩已上五味俱製成粉和勻用布裹定綿纒縛𦂳聼用将糯米三斗浸一夜次日上甑蒸将前藥埋在米中炤嘗蒸熟冷定取出藥来将飯用小麯拍成浮米酒用瓶一二個装滿前藥丸成三百六十丸擇吉日服毎日用酒一鍾吞服一粒酒藥俱按三百六十火候周天之數也此藥符合天機造化其妙難还不可輕泄益容仙丹淡秋石五兩味淡補先天之元氣白硼砂二兩五錢止嗽化痰生津元氣片腦一錢一分蕩諸邪眀目通竅薄荷五兩清潤頭目消化老痰栢子肉五錢清和咽膈牛黄五分除邪去熱眀目清心哈芙蓉二分温煖丹田除痰止𠻳腽肭臍五分酥炙補胃煖腰回陽助精甘松五錢開胃甦脾通氣和血硃砂一兩五錢水飛細末穿衣安魂除煩粉草一斤去皮調和藥性熬膏合藥為丸和諸藥性善解百毒将前九味各為細末粉草膏子為丸如菉豆大硃砂穿衣毎日不拘早晩将一丸入口噙化以致津液滿口嚥下丹田澆灌諸經各絡氣到處自然輔正除邪能使肌膚光潤乆服則百病不生萬邪歸正詩曰神仙留下濟人丹安魂定魄駐容顔寛胸順氣神凝静化痰止𠻳暖丹田生津消渴甘露降透竅眀目返本源毎用一丸常噙化益夀延年世上仙先天真一丹此丹乃大茅君授與二茅君三茅君地仙長生仙藥訣曰上品神仙藥先天真一丹毎朝吞百粒却老返童顏能轉周身氣神功内返還華池灌神水滴滴注𤣥闗隂符調火候黙黙自抽添至誠修煉服管汝夀齊天用白虎首經粉九鼎隂煉秋石四兩乳粉四兩乾山藥四兩石澗菖蒲九節四兩五月五日採取茅山蒼术四兩米泔水浸去粗皮甘州枸杞三兩珍珠一兩旱蓮子草二兩菊花蕋一兩甘草一兩右各味製成細末煉蜜為丸如菉豆大毎服六七十丸加至百丸空心白滚水下道藏班龍黑白二神丹鹿茸二兩酥炙陳皮二兩當歸四兩酒洗淨地黄八兩取汁為膏茯苓二兩人乳製鍾乳粉一兩水飛用人參四兩栢子仁二兩枸杞子二兩麥門冬一兩生地黄汁一碗白术二兩沉香五錢右為末煉蜜為丸如桐子大毎服五六十丸秋石湯下治虗損怯症五勞七傷氣血俱虗顔色憔悴無不治之服之美顔色和五臓壮精神美鬚髪補羸痩功莫能述長生班龍飛歩丹用上全方加上白膠二兩紫河車一具首生男子為佳腽肭臍一兩綠毛小龜肉一箇同河車煮以桑柴文武火成糜連汁用搗細和前藥末再入人乳汁一碗同膏和丸如桐子大每服五六十丸治虚損痿症經騐蒼术丸又名鉛汞丸用蒼术一斤半取膏入藥四兩其性燥而辛烈去内外之濕引藥行扵表裏而煎為膏者所以變其質似猶伊尹放太甲於桐為善以成濟世之功也用糯米泔浸日半撈起刮去粗皮見白晒乾又将童便浸日半撈起清水洗浄晒乾又煮酒浸日半晒乾仍用糯米泔澄清煑术以爛為度然後於陳米飯上蒸一層飯一層术要取榖氣為佳飯上用荷葉葢定不泄榖氣尤妙晒乾研細末入藥黄栢刮去粗皮八兩製炒為末入藥六兩其性雖寒非芩連之可比黄栢能通腎以瀉膀胱之火動則水不寕所以用之者瀉火而寜腎水也剉碎用酒浸三日要翻覆浸取出晒乾将蜜拌黄栢用荷葉鋪劄稜起水面上攤黄栢荷葉上蒸一次仍将蜜拌再蒸再晒如此三次用紙鋪鍋底黄栢攤紙上焙茶褐色為度研末入藥知母去皮六兩其性潤而老年并虚弱之人火易動津液受尅而嘗涸所以用此專補腎水葢能制烈火之故也剉碎用酒浸三日去酒晒乾隔紙炒焙研細末入藥枳實四兩老年并虚弱之人火最易動津液受尅而化為痰或平日膏梁之積而成痰葢枳實非他輩之可比且半夏化痰其性燥烈而服之反渴渴増則貪飲矣愈飲愈濕受外邪而痰愈結也貝母去四種痰能表而不能裏南星雖曰去痰能上而不能下因風可用今枳實之功不可勝計剉碎與麩皮同炒茶褐色去麩皮研末入藥白术四兩大能補脾老年虚弱之人胃火必盛而食善消愈消愈食則脾豈有不損則食不能尅化而用庸消之劑則反傷脾脾胃受傷是無本矣豈能安乎然必用此以禆脾似猶修武僃而禦㓂也剉碎用紙鋪鍋底将麩皮拌白术攤紙上不住手撥焙聞其藥味無麫氣為度研末入藥當歸五兩其性温四等治血流者能止凝者能行虚者能補氣者能和老年并虚弱之人火旺水衰血必受傷或流或止或凝或行可不用此以和之用酒浸洗剉碎晒乾研末入藥熟地黄四兩老年并虗弱之人諸血最虚皆由心之耗而肝之枯也是以四肢血怠足不能履手不能持耳不能聼目不能視膓不能通而多結也所以用此劑以補一身血衰也用酒洗剉碎研末入藥乾山藥四兩其性温平主腸中補虚除隂熱邪氣益氣力長肌肉治頭風止腰痛補心肺不足潤皮毛主治泄精健忘剉碎晒乾研末入藥白茯苓刮去粗皮浄三兩其性去濕利小便調胃氣伐腎邪㵼火乆服安魂飬神延年益夀而無消渴之患剉碎晒乾将紙鋪鍋底用麩皮拌藥攤紙上不住手撥焙至藥無味為度研末入藥防風去蘆五兩老年并虚弱之人血皆損少則腠理不宻賊風易入必用其驅出之盖防風之性威而不猛剉碎晒乾隔紙焙乾燥研末入藥真鉛四兩隂分之上藥即人乳多以此代鉛其鉛乃取室女天真未䘮欲心未動而自然来者得純隂之正移隂補陽自然而然者其功不可勝言倘人不待時急取隂分之上藥代之用亦不減於真鉛也用少年婦人乳二碗其乳者血之化也隂分之上則為乳隂分之下則為血所以用此者以血補血老年并虚弱之人身血必衰此藥之正所謂布衣破而補以布也将麫入乳中調匀打糊丸藥用真汞四兩即秋石也其性鹹能入腎而用童便煎者葢因元氣之未泄而純陽之未䘮煅煉而成所以補元氣老弱之人精氣必損湏用此藥滋補研末入藥右将各藥細末拌勻用乳二碗入麫打糊拌藥杵勻丸如桐子大晒乾收貯日漸服之毎服五六十丸淡鹽湯空心下此藥服之專治諸虛百損身體倦怠氣虚中滿不進飲食遍身風濕麻痺眼目昏花腰痛頭暈手足欠順行履艱辛虚怯痰火遺精白濁小便不利胎前產後赤白𢃄下有惡疾者服此𤣥妙無疾者服此强筋骨悅肌膚駐顔色徤脾胃進飲食添精補髓益夀延年其功不可盡述寳之度世丹如有人抱一切危疾及癱瘓痛楚乆在床枕且暮清心服之戒其嗜慾能安神志定魂魄順五臓和六腑添智慧烏髭鬚通脉絡除勞損續絶補敗葢此藥禀天地中和之氣不燥不熱可以長服如有惡疾肢體不安行歩艱辛飲食少進或寤寐不安或痛連筋骨或十生九死服之是疾皆除駐悅顏色滋潤肌膚聰眀耳目四肢强徤延年益智功效不可具述枸杞子仙經云此藥是熒之精益血海足筋骨補氣安神甘菊花是木之精服之聰眀耳目去寒濕手軟利九竅通三焦去萼用逺志治胃膈痞悶去憂邪潤肌膚壮筋骨用頭搥破取去心車前子是鎮星之精益胃安魂魄駐顏去夜驚妄想生地黄用乾者去蘆經云是太隂之精開心神去邪養脾胃榮衛之神巴㦸仙經云是黄金之精去心痰補血海身輕延年覆盆子是神水之精助陽輕身安五臓之神白术是太陽之精能正氣吐逆消食化痰濕飬榮衛肉蓯蓉擇有肉者其藥一百年一生入小膓補下元酒浸七日石菖蒲細小九節者能昇智慧添神明煖下元補虚減小便兎絲子酒浸七晝夜晒乾炒令黄色為度牛膝治濕脚氣腰膝疼痛去蘆用酒浸七日細辛療百病順氣益血海去苗用續斷治五勞七傷何首烏性濕無毒地骨皮去土右各用本土所生逐件擇洗各等分搗為細末煉蜜和丸桐子大每服三十丸空心温酒送下服一月百病不生服一年至二年返老還童顔貌若蓮花是病皆除元是仙人之術信之信之神仙不老丸養榮衛潤三焦滑肌膚去邪氣惡蠱等疾選竒方云予㓜年勤瘁衰不待時方三十而白髪生自是時時摘去四十九則不勝芟矣乃聴其自然未幾遭䘮天之慘羅哭子之憂心志凋耗白者益多餘者益黄乆之忽遇金華山張先生謂予曰予今半百容貌衰甚可以為門戸計進補治氣血以强色身之藥乎慨然傳一方會初得之異人拜而受之遂合服逾百日覺前時之白者黄者皆返黒矣見以為異予遂名之曰神仙不老丸以其藥品槩括為詩曰不老神仙功效殊駐顏全不費工夫人參牛膝川巴㦸蜀地當歸杜仲扶一味地黄生熟用兎絲栢子石菖蒲更添枸杞皮兼子細末蜜丸桐子如早午臨眠三次服鹽湯温酒任君餔忌飡三白并諸血能使髭烏髪亦烏用人參團結重實上黨者佳去蘆焙乾秤二兩枸杞子色紅潤者去蒂酒浸一宿焙乾二兩兎絲子以水漂去浮取沉者酒蒸焙乾二兩石菖蒲去毛節米泔浸一宿節宻者秤一兩栢子仁色紅新者去壳取仁一兩細研臨時入和藥内川牛膝長而潤者去蘆酒浸一宿焙乾一兩半杜仲刮去粗皮搗碎生薑汁拌炒斷絲一兩半地骨皮色黄者刮皮浮浄秤一兩地黄渣以水浸重者用以浮者搗取汁浸沉者蒸透焙乾如是三次色黒者味甘熟秤一兩又用生沉者一兩酒浸各用竹刀切忌鉄器川當歸揀大者去蘆頭二兩川巴㦸用黒色紫沉大穿心者不用色黄細者搥去心酒浸焙一兩右件揀選精製如法勿晒用慢火焙乾若大燥則失藥味待乾即於風前略吹令冷熱相激燥淨秤研為細末煉蜜擇火日捜和於大臼内搗千餘槌丸如桐子大每日空心午時臨卧毎服七十丸温酒鹽湯任下忌食葱白韮白蘆服真粉及藕諸般血葢諸血能破血又解藥力若三白誤食亦無他說止令人髭髪不變黒耳大能安養榮衛補益五臓調和六腑滋充百脉潤澤三焦活血助氣添精實髓是最要節色慾使藥力效之速也松黄頤夀丹松香一斤嫩白瑩浄者碾為末篩過去渣用新汲水十餘碗砂鍋内桑柴火煮一炷香不住手攪冷定傾出苦水仍換新水更煮更攪如此十四五次直待水煮不苦為度再用白酒四五碗亦煮一炷香冷定取出晒乾碾為細末熟地黄半斤懐慶肥大者揀去不黄不用浸蒸爛搗成膏烏梅肉六兩安吉者佳焙乾碾為末右三味和成一處搗和匀如乾散難丸加酒打麫糊少許和之易丸為度如桐子大毎服三五十丸茶酒白湯任下食前服服藥時忌豆腐製藥不可犯鉄器大補隂膏安心神健脾胃滋肺金補元氣茯神二兩去皮心最能安神定志逺志二兩去梗炒亁用人參五錢去蘆能開心眀目養精通神治脾胃陽氣充足白术四兩切片水洗去油晒乾能除胃中濕熱健脾胃茯苓二兩去皮補定悸橘紅一兩五錢去白主下氣寛中消痰止𠻳貝母一兩五錢薑湯煮過能止𠻳療煩渴安五臓散胸中鬱結甘草三錢炙去皮主補三焦元氣和消藥毒飬血補胃紫苑一兩洗去土補虚止渴安五臓阿膠一兩蛤粉炒成珠能養血除𠻳五味子五錢能眀目補胃益肺金當歸身三兩酒洗能和補血生地黄一兩五錢酒洗能凉血補血滋腎水白芍藥二兩炒益津液熟地黄一兩五錢酒洗蒸九次晒九次大補血壮腎善補鬚髪天門冬一兩五錢去心能保肺氣麥門冬一兩五錢去心能保肺氣令人肥健兎絲子二兩水洗去土晒亁能添精補髓枸杞子三兩蒸焙亁能眀目延年黄蘖二兩去皮鹽水炒乾能補滋腎水山茱茰二兩湯浸知母一兩鹽水炒乾能補腎水凉心火原方内有欵冬花一兩桑皮一兩柴胡一兩五錢山藥二兩後進呈許堂改除右切片用井華水二十四碗入鮮薑四兩二錢核桃肉圓眼肉棗肉蓮肉各二十四個烏梅肉十二個春浸半月夏不浸秋浸一日冬浸一日夜於静室内用炭火煎至藥計五碗去藥渣用好蜂蜜二十四兩煎一滚用紙滲去面上沫入前藥同煎至滴水不散為度用磁罐盛白紙封口放水盤中露罐口七日去火毒取出每日空服白滚湯調下三茶匙忌食羊肉益元七寳丹用何首烏赤白各一斤用米泔水浸一日竹刀刮去皮打塊如棋子大另有製法具前牛膝八兩同前何首烏用黑荳五升木甑沙鍋蒸三次晒三次為末加鹽一二錢同浸枸杞子八兩酒浸洗淨晒乾為末茯苓赤白各一斤赤者用牛乳浸白用人乳浸俱一宿晒乾為末兎絲子八兩酒浸三日晒乾為末破故紙八兩炒乾為末當歸八兩酒浸一宿晒乾為末右七味各不犯鐡器煉蜜為丸如彈子大日進三丸早辰空心酒下午後薑湯下臨卧鹽湯下初服三日小便雜色是去五臓中雜病至二七日唇紅口生津液再不夜起三七日體健身輕兩乳紅潤至一月鼻頭酸是諸風百病皆去四十九日目視光眀兩手火熱精氣通實髪白返黒齒落更生陽事强徤丹田如火行走如飛氣力加倍非人不可輕泄乃神仙秘方補胃瑶臺雪方蓮肉二十兩去心為粉土白术十兩麩炒去麩用陳皮二兩白茯苓二兩苡仁八兩芡實十兩山藥八兩砂仁一兩川椒一兩五錢炒去汗為末已上同和入白糖二觔和匀每早白滚湯調服三二錢開胃進飲食脾家聖藥也寳之寳之紫霞丹治痰湧咳𠻳傷酒解醒或口有穢氣津苦舌乾凉膈平胃解愠安神又為清喉要藥硃砂四兩一半為衣官硼砂五錢沉香一錢桂花一錢青木香一錢細芽茶二錢訶子一錢白豆仁一錢金錢薄荷四錢氷片三分百藥煎一錢𤣥眀粉二錢右為細末煉大甘草四兩煎汁為丸如小豆大硃砂為衣入口一粒一次噙化延齡聚寳酒用何首烏四兩去皮赤白兼用生地黄四兩鮮嫩肥者勿犯鐵器天門冬二兩去心槐角子四兩炒黄色十一月十一日采石菖蒲二兩亁菊花四兩只用花枝葉不用五加皮二兩用真正的蒼术二兩米泔浸一宿竹刀去皮毛茅山的好枸杞二兩去蒂研碎甘州生者黄精二兩用鮮的細辛二兩洗淨白术二兩極白者油黄者不用防風二兩去蘆人參二兩去蘆茯苓四兩鮮嫩者熟地四兩忌鉄器麥門冬二兩去心蓮蕋四兩桑椹子四兩黒紫者蒼耳子二兩炒揚去刺肉蓯蓉二兩黄酒浸去鱗沙苑白蒺藜二兩炒去刺天麻二兩如牛角者甘草二兩用大者炙去皮牛膝二兩去鬚杜仲二兩薑汁浸一宿炒去絲當歸一兩鮮嫩者右各味炤方擇浄稱定分兩足務要真正藥材切為咀片装入生絹袋内用無灰高黄酒一大罈盛九斗十斗大罈方可將藥装入罈春浸十日夏浸七日秋浸七日冬浸十四日將藥酒每五更空心服三小鍾還卧片時午間再服三鍾尤妙用酒忌生冷生葱生韭腥無益之事少幹無益之物少吃白蘿蔔常忌致誠服者自有功效若服一日歇二三日不依前法取效鮮矣夜間還服二三次予年三十九歳服起扵六十四歳鬚髪如漆齒落更生精神百倍耳目聰眀比前大不同矣此方不輕係身命養生至寳仍將藥渣晒亁研末煉蜜為丸如桐子大每服五十丸空心無灰酒下延夀酒藥仙方一名養夀丹専治男婦逺年近日諸虚百損五勞七傷左癱右瘓偏正頭風口眼歪斜半身不遂語言蹇澁筋脉拘攣手足頑麻渾身瘡疥腸風痔漏紫白癜風寒濕脚氣膀胱疝氣十膈五噎身體羸痩腰腿疼痛四肢無力皮膚生瘡耳聾眼昏下部虚冷諸般淋瀝婦人經脉不調臍腹疼痛脇背膨脹黄痩面肌口苦舌乾嘔逆􅁖心飲食無味四肢倦怠神鬼驚悸夜多盗汗時發潮熱月事或多或少或前或後心中悶塞不通結成瘕塊時作刺痛或子宮積冷氣毒虚敗赤白𢃄下漸成虚瘵並皆治之此藥方互相製服其和暖香甘能追百病常服補脾養丹田和氣血壯筋骨益精髓身體輕健眀眼目安五臓定魂魄潤肌膚返老還童延年益夀其功不可盡述當歸去蘆人參去蘆白茯苓去皮草烏去皮烏藥杏仁去皮尖何首烏去皮川椒去目川烏去皮尖五加皮肉蓯蓉去皮尖枸杞子砂仁已上各五錢浄木香牛膝去蘆枳壳去皮尖亁薑火炮虎骨酥炙黄色川芎香附子炒去毛香白芷厚朴薑汁浸陳皮去白白术炒獨活羗活麻黄去節官桂去皮白芍藥半夏姜汁浸生地熟地天麥門冬去心五味子防風細辛揀淨醋酒洗去蘆沉香蒼术米泔浸去皮小茴香鹽炒黄已上各三錢破故紙酒浸㣲炒核桃仁湯浸去皮甘草火炙三味各一兩浄紅棗肉酥油二味各半斤白沙糖一斤右將前藥用細絹袋盛之用燒酒一大罈浸藥三日放在大鍋内用湯浸罈煮兩個時辰取起掘一坑埋三日出火毒取出每日用酒一小鍾病在上食後服病在下空心服飲酒畢後將藥查晒亁碾為細末用好花燒酒打糊為丸如梧桐子大每服三十五丸空心好酒下羅真人延夀丹治男子五勞七傷諸虚不足隂痿氣弱無力心腎不交精神欠爽小便頻數腰膝疼痛婦人赤白帯下起居倦脚冷麻痺不能乆立腎氣不和臍腹疼痛經水愆期無孕嘗服此藥隂陽升降無偏充實肌膚填精補髓精神倍長强壯筋骨悅顔色固真氣和百脉正三焦烏鬚髮堅齒牙耳目聰眀老能輕健斯藥之效何可盡述服至五日體自輕徤至十日精神倍爽半月之後氣力壮勇二十四日後眼目清朗語音響亮一月之餘飲食大進顔色紅潤歩履輕徤冬月手足嘗煖此藥不熱不燥老㓜並皆可服乃仙方也慎勿輕傳乾山藥一兩去皮人參一兩去蘆白茯苓一兩去皮川牛膝一兩酒浸杜仲一兩薑製去絲龍骨一兩川續斷一兩去蘆鹿茸一兩當歸一兩酒浸洗山藥苖一兩北五味一兩熟地黄一兩酒浸石菖蒲一兩楮實子一兩去穰破故紙一兩炒麥門冬一兩去心遼枸杞五錢如下元虚冷加鹿茸五錢附子五錢右為極細末擇天氣晴和揀選好日以酒糊為丸如梧桐子大毎服五十丸或六七十丸淡淡鹽湯送下修合之日須忌婦人雞犬之類日進二服亦可大有功效也草還丹補益夫草還丹者不用金石不加燥熱不傷五臓只係草藥為用全在製度之妙將水火無窮之術奪丹砂燒煉之功大壯脾胃進美飲食盖脾屬中央之土乃五臓之主當先調養五臓俱虚百病由此而生此藥益精髓固元陽輕腰膝安五臓通九竅令人耳目聪眀有一老人年七十之上服此藥悅顏色烏鬚髮固齒牙夜能書細字延年益夀乃仙家之良劑平補大有神效蒼术四兩用酒醋米泔水鹽各浸一兩茴香一兩新者破故紙一兩酒浸一宿川練子一兩木香牛膝葫蘆芭地龍山藥枸杞茯苓川山甲各一兩右件晒乾為細末好酒糊為丸如桐子大每服三十五丸温酒送下鹽湯亦可空心服以乾物壓之使力行百歩日進二服草靈丹此藥延年益夀添精補髓烏鬚髮固齒牙强筋骨壯氣血返老還童冬月服之手心與腮面如噀血行歩輕飛七十老人誠心服餌徤若少年别有竒功不能盡述服之一月乃見其效如要試騐拌飯與白犬食之一月變成黑犬此其騐也老人服至十日便不夜起服藥者不可賴此頻行房事忌黑羊肉鵓鴿桃李果子恐減藥力保而慎之不熱不燥亦無飛走金石藥味過一月耳目聰眀髪白再黒不可輕忽真川椒四兩去目炒出汗白茯苓二兩去皮炒川烏一兩去皮臍茴香二兩􅐭炒蒼术四兩酒浸焙乾甘草二兩粉去皮炙熟地三兩酒浸山藥二兩右為細末煉蜜為丸如桐子大毎服三十丸至四五十丸空心温酒下以乾物壓之固真丹同上方加首經一次鹿跑草一兩囘陽無價至寳丹用川練子取肉二兩川牛膝一兩熟地蛇床子川山甲肉蓯蓉茯神巴㦸五味子各一兩乳香三錢鹿茸沉檀香仙靈皮甘草各五錢人參一兩破故紙五錢大茴香一兩澤㵼一兩烏藥二兩兎絲子五錢鳯眼草二錢檳榔一兩葫蘆巴蓮心各五錢右為細末煉蜜為丸如梧桐子大毎服三十丸空心好酒下治五勞七傷四肢無力下元虚冷夜夢遺精陽痿等症神仙紫霞盃昔宋英宗皇帝朝暮思想懇禱祝告上蒼願祈降子忽一日有一道者身穿草衣頭挽雙髻腰懸藥葫蘆擕一水火籃手執龍虎首拄杖偶至玉階羣臣云這道人不知從何入朝衝入金門奏道吾乃蓬莱到此因陛下祈子􅈤切貧道聞知奏奉蟠桃延年益夀九轉紫霞盃乞陛下允納帝曰此酒此盃是何仙術從何而至道云此是純陽真人曾慶蟠桃㑹賀王母仙酒盃陛下飲服帝曰有何益于朕道曰但令宮妃有子帝聞甚喜着光禄寺筵宴奉賞道曰道人不用筵賞傳下酒杯法化一道青光灼然而去帝稽首叩謝故得子之多偈曰蓬莱仙賜紫霞杯九轉靈丹藥更竒萬病盡消身體健還童返老似嬰兒用硫黄八兩雄黄五錢乳香三錢沒藥三錢辰砂五錢血結二錢沉香二錢麝香三錢檀香三錢降香一兩牙香二兩茅香一兩人參兩附子五錢川烏二兩川芎四兩當歸五兩肉桂四錢破故紙二錢肉蓯蓉三兩黄精八兩白芷三錢枸杞一兩芍藥五錢右㕮咀入油煎先用油一斤浸諸藥三二日熬煎藥焦黒色濾去查再復油鍋化溶硫黄再傾出上面清油却將鍋底硫黄傾入水盆内洗去泥土砂石仍將原油化硫黄週而復始三次又傾出上面油存黄另傾出秤毎硫黄一兩用銅杓化開入前麝香末三分攪勻先以小酒盃一個用紙封口𦂳中開一孔將化開硫黄藥傾入酒盃内一蕩做酒盃一個如此傾做數個冷定酌酒做法如澆嚮糖相似沉香内補丸能除百病補諸虚徤脾胃進飲食添精補髓延年益夀服之年餘身輕體健婦人服之尤妙沉香五錢廣木香五錢乳香沒藥各三錢人參五錢母丁香三錢海馬一對酥炙石燕一對燒紅醋浸鹿茸五錢酥炙仙靈皮五錢酥炙韭子五錢八角茴香五錢木通一兩炒穿山甲五錢灰炒小茴香一兩炒黄甘菊花五錢盬炒川練子酒浸一宿去皮核一兩蛇床子一兩白茯苓一兩大附子一個炮去皮川椒一兩去目枸杞一兩麝香少許丁香五錢葫蘆巴入羊腸内酒煑一兩右為細末酒糊丸如梧桐子大每服三十丸空心温酒下仍以乾物壓之忌生冷腐粉魚腥諸血四十九日又洗藥用紫梢花松節皮硝三味煎水每日温洗之遵生八牋卷十七
