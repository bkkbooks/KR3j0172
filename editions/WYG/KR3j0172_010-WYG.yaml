body:
  text: 遵生八牋卷十明髙濂撰延年却病牋下髙子三知色慾當知所戒論髙子三知論曰人生孰不欲倚翠偎紅沉酣麯蘖明眸皓齒溺快衾裯何知快樂之悦吾心而禍害因之接踵矣故莊生曰人之大可畏者衽席之間不知戒者過也故養生之方首先節慾慾且當節况欲其慾而不知所以壯吾欲也寧無損哉夫腎為命門為坎水水熱火寒則靈臺之熖藉此以滅也使水先枯竭則木無以主而肝病矣木病則火無所制而心困矣火熖則上燥而脾敗矣脾敗則肺金無資五行受傷而大本以去欲求長生其可得乎嗟夫元氣有限人慾無窮慾念一起熾若炎火人能於欲念初萌即便咬釘嚼鐵强制未然思淫逸之所虎豹之墟也幽㝠之徑也身投爪牙而形甘嚅嚙無云智者勿為雖愚者亦知畏懼故人於欲起心熱之際當思冰山在前深淵將溺即便他思他涉以遏其心或行走治事以避其險庶忍能戒心則慾亦可免此為達者言也平居當熟究養生之理守静之方秉慧劔截斷塵縁舉法眼看破幻影無為死可以奪吾生清静恬淡悉屏俗好勿令生反速就其死定性存誠務歸正道俾仙不悞我而我不悞身久住長年不為妄誕然余所論人孰不曰嚼過飯也余亦知為熟談但人知為嚼過飯而不知飯所當食知此談為熟奈何熟此談而不行所以白日沉疴經年枕席芳華凋謝早嵗泉扄皆由厭常談而希平地可仙薄淺近而務談説髙逺於爾身心果何益哉徒云自哄自己畢竟終無一成吾豈欲人人知予言有本耶聊自信耳因録諸經法言覺彼色慾知戒俾得天元之壽黄帝曰一隂一陽之謂道偏隂偏陽之疾謂隂陽不和若春無秋若冬無夏因而和之是為聖度聖人不絶和合之道貴於閉宻以守天真素女曰人年六十當秘精勿泄若氣力尚壯不可强忍久而不泄致生癰疾老君曰情慾出於五内魂定魄静生也情慾出於胸臆精散神惑死也全元起曰樂色不節則精耗貪妬不止則精散聖人愛精重施則髓滿骨堅仙經曰無勞爾形無揺爾精歸心寂静可以長生又曰道以精為寶寶持宜閉宻施人則生人留已則生已結嬰尚未可何況空廢棄棄損不竟多衰老命已矣故人肝精不固目眩無光肺精不交肌肉消痩腎精不固神炁減少脾精不固齒髪衰白疾病隨生死亡隨至書曰服丹石以快慾腎水枯燥心火如焚五臓乾烈大禍立至勿大醉入房勿燃燭入房勿逺行疲乏入房勿忍小便入房勿帶瘡毒疾病未瘥入房孫真人曰大寒大熱大風大雨大霧大雷日月薄蝕之下星辰神佛之前更忌元旦三元五臘每月朔望庚申本命春秋二分二社五月九毒日毎月二十八日人神在隂四月十四純陽用事皆不可犯否則損神不惟父母受傷生子亦不仁不孝戒之戒之髙子曰寡慾者無伺時日之戒而自無慾多慾者雖律以時日而一日不能無慾若盡如太上五百戒中犯者减算除年則人壽盡殀亡矣故立教太嚴使人反不知信然而立教之意戒人節慾借時日以懼之耳余於多戒中僅取已上數條此大不可犯者為戒善養生者當知所恐懼而無犯此數者髙子曰色慾知戒者延年之效有十隂陽好合接御有度可以延年入房有術對景能忘可以延年毋溺少艾毋困𤯝童可以延年妖艶莫貪市粧莫近可以延年惜精如金惜身如寶可以延年勤服藥物補益下元可以延年外色莫貪自心莫亂可以延年勿作妄想勿致夢交可以延年少不貪歡老能知戒可以延年避色如仇對慾知禁可以延年身心當知所損論髙子曰吾人一身所藉三寶具足足則形生失則形死故修養之道保全三者可以長年夫人一日之中一家之事應接無窮而形勞百拙起居不知節宣萬感不令解脱乃恣意行為盡力動蕩不知五臓六腑之精所當珍惜以養吾形六慾七情之傷所當逺避以安吾體恃年力之壯廼任意不以為勞何知衰朽之因死亡之速由此而致令人髪槁形枯蠶眠蝟縮欲求金石以起吾生草木以活吾命有是理哉故當日用起居喜怒哀樂行住坐臥視聽笑談逐一戒謹則身無所損元氣日充精神日足彭鏗比年嵩喬同壽敢曰迂妄以自欺哉當與同志者共守此道因録諸經法言覺彼身心知損俾得地元之壽素問𤣥珠曰起居不節用力過度則脉絡傷傷陽則衂傷隂則下莊子曰人有畏影惡迹而走以避之舉足愈數而迹愈多走愈疾而影不離自以為尚遲疾走不休絶力而死不知處隂以休影處静以息迹愚亦甚矣書云凡人於外事勇於敢則殺勇於不敢則活葢敢於有為即殺身不敢有為則活其身也久行傷筋勞於肝久立傷骨損於腎故行不疾走立不至疲大霧不宜逺行宜飲酒一杯以出久坐傷肉久臥傷氣坐勿背日勿當疎風臥間閉口使真元不失邪氣不入淮南子曰太喜墜陽故喜勿極極則傷魄魄傷則狂使意不存而皮革焦忿怒則氣逆大怒破隂悲哀動中則傷魂魂傷則狂妄而隂縮拘攣庚桑曰全汝形抱汝生毋使汝思慮營營故外不勞形於事内無思想之患則形體不弊精神不散可以延年靈樞經曰内傷憂恐則氣上逆六輪不通血凝不散津液滲漏恍惚不寧四肢不耐恐懼不解則精傷骨痠瘈瘲五臓失守驚則心無所倚神無所歸故臨危冒險則魂飛戲狂禽逸獸則神怨老子曰知足不辱知止不殆心有所憎勿深憎當運心於平等心有所愛勿溺愛不令偏頗而改正不然損性傷神老子曰五色令人目盲五音令人耳聾心之神發乎目久視則傷心腎之精發乎耳久聽則傷腎書曰疑惑不已則心無所主正氣不行外邪来干失寐忘寢昏昏黙黙漸成虚勞書曰談笑以惜精氣為本笑多則腎轉腰疼行走勿語傷氣語多則住而再語故老君曰塞其兌閉其門終身不勤開其兌濟其事終身不救真人曰常習不唾地有則含以嚥之使人精氣常留面目光彩故曰逺吐不如近唾近唾不如不唾又曰津液者吾身之寶寶聚則為富翁寳散則為貧客閒覽曰目疾切忌洗浴令人目盲飽食沐髪冷水并熱泔洗頭冷水濯足皆令人頭病炊湯隔宿洗體成癬洗面無光作甑哇瘡真人曰髪宜多櫛手宜在面齒宜數叩津宜常嚥氣宜常煉五者修崑崙之法書曰大小二便勿强閉忍忍小便成淋忍大便成痔或澁或滑又勿過度皆傷氣害生為禍甚速書曰羅綺成於天蠶製造出自人力勿輕剪裁以為華美以折福壽春冰未泮當下厚上薄養陽收隂大暑宜脱汗衣勿冒風觸熱冬日之衣急脱急着綿衣不可頓加稍煖又宜暫脱北方語曰若要安樂不脱不着南方語曰若要安樂頻脱頻着髙子曰身心知損者延年之効二十四時順攝晨昏䕶持可以延年三光知敬雷雨知畏可以延年孝友無間禮義自閑可以延年謙光辭讓損己利人可以延年物来順應事過心寧可以延年人我兩忘勿競炎熱可以延年口勿妄言意勿妄想可以延年勿為無益嘗慎有損可以延年行住量力勿謂形勞可以延年坐臥順時勿令身怠可以延年悲哀喜樂勿令過情可以延年愛憎得失揆之以義可以延年寒温適體勿侈華艶可以延年動止有常言談有節可以延年呼吸精和安神閨房可以延年静習蓮宗敬禮經訓可以延年詩書悦心山林逸興可以延年兒孫孝養僮僕順承可以延年身心安逸四大閒散可以延年積有善功嘗存隂徳可以延年飲食當知所損論髙子曰飲食所以養生而貪嚼無忌則生我亦能害我况無補於生而欲貪異味以悦吾口者往往隱禍不小意謂一菜一魚一肉一飯在士人則為豐具矣然不足以充清歌舉觴金匏盈席之燕但豐五鼎而羅八珍天厨之供亦隆矣又何俟捜竒致逺為口腹快哉吾意玉瓚瓊酥與壺漿瓦缶同一醉也雞跖熊蹯與糲飯藜蒸同一飽也醉飽既同何以侈儉各别人可不知福所當惜况物理論曰糓氣勝元氣其人肥而不壽養性之術嘗使榖氣少則病不生矣榖氣且然矧五味饜飫為五内害哉吾考禽獸榖食者宜人此世之嘗品是也若逺方珍品絶壑野味恐其所食多毒一時尚珍其於人之臓腑宜忌又未可曉悦口充腸何貴於此故西方聖人使我戒殺茹素豈果異道者哉人能不殺則性慈而善念舉茹素則心清而腸胃厚無嗔無貪罔不由此即宣尼惡衣惡食之戒食無求飽之言謂非同一道耶余録諸經法言覺彼飲食知忌俾得人元之壽内經曰謹和五味骨正筋柔氣血以流腠理以宻長有天命酸多傷脾肉䐢而唇揭醎多傷心血凝而色變甘多傷腎骨病而齒敗苦多傷肺皮稿而毛落辛多傷肝筋急而𤓰枯凡食先欲得食熱食次食温暖食次冷食食熱暖食訖如無冷食者即喫冷水一兩嚥甚妙若能恒記即是養性之要法也凡食欲得先微吸取氣嚥一兩嚥乃食主無病真人言熱食傷骨冷食傷臓熱物灼唇冷物痛齒食訖踟蹰長生飽食勿大語大飲則血脈閉大醉則神散春宜食辛夏宜食酸秋宜食苦冬宜食醎此皆助五臓益血氣辟諸病食酸醎甜苦即不得過分春不食肝夏不食心秋不食肺冬不食腎四季不食脾如能不食此五臓尤順天理燕不可食入水為蛟蛇所吞亦不宜殺之飽食訖即臥病成背疼飲酒不宜多多即吐不住醉臥不可當凉風亦不可用扇皆損人白蜜勿合李子同食傷五内醉不可强食令人發癰疽生瘡醉飽交接小者令人面皯咳𠻳大則不幸傷絶蔵脉損命凡食欲得恒温暖宜入易銷勝於習冷凡食皆熟勝於生少勝於多飽食走馬成心癡飲水勿急咽之成氣病及人癖水食酪勿食酢變為血痰及尿血食熱食汗出勿洗面令人失顔色面如蟲行食熱食訖勿以醋漿潄口令人口臭及血齒馬汗息及馬尾毛入食中亦能害人雞犬肉不可合食爛茆屋上水滴浸宿脯名曰鬱脯食之損人孫真人曰久饑不得飽食飽食成癖病飽食夜臥失覆多霍亂死時病新瘥勿食生魚成痢不止食生魚勿食乳酪變成蟲食肉勿食乾薑成霍亂人食肉不用取上頭最肥者必衆人先目之食食者變成結氣及疰癘凡食皆然參賛書云凡空腹勿食生菓令上膈上熱骨蒸作癰癤銅器蓋食汗出落食中食之發瘡肉疽觸寒未解食熱食亦作刺風飲酒熱未解勿以冷水洗面令人面發瘡飽食勿沐髪沐髪令人作頭風蕎麥和猪肉食不過三頓成熱風乾脯勿置秫米甕中食之閉氣乾脯火燒不動出火始動擘之筋縷相交者食之患人或殺人羊脾中有肉如珠子者其羊戀筋食之患癎諸濕食不見形影者食之成痤腹脹暴疾後不用飲酒膈上變熱忌食云凡新病瘥不可食生棗羊肉生菜損顔色終身不復多致膈上熱蒸凡食熱死脂餅物不用飲冷醋漿水善失聲若咽生葱白合蜜食害人切忌乾脯得水自動殺人曝肉作脯不肯燥勿食羊肝勿合椒食傷人心胡苽合羊肉食之發熱延命録曰飲以養陽食以養隂食宜嘗少亦勿令虚不饑强食則脾勞不渴强飲則胃脹冬則朝勿令虚夏則夜勿令飽飽食勿仰臥成氣痞食後勿就寢生百疾凡食色惡者勿食味惡者勿食失飪不食不時不食父母并自己生肖犯者勿食露食勿食藏物不宻者勿食物色異嘗者勿食三厭勿食魚無腸膽勿食異形勿食菌有毛背無文者勿食閉口椒勿食飲饌上有細白末子并黑細末子者勿食炙煿承熱勿食蔵物作氣勿食銅器蓋物勿食旋作生鮓勿食獸禽腦子勿食六畜自死勿食果實雙仁勿食肉塊自動者勿食鷄心勿食蹄爪帶毛者勿食凡禽六指三足四距者勿食凡卵上有八字痕者勿食種種生物或月令當忌或五蔵相反或宜或忌者坐右當置食鑑本草以為日用口食考証無伺𤨏綴飲食肉名曰癡脂憂狂無恒食酒良藥五穀充悦者名曰中士猶慮疾苦食氣保精存神名曰上士與天同年髙子曰飲食知忌者延年之効有十之八蔬食菜羮歡然一飽可以延年隨食隨縁無起謀念可以延年毋好屠宰寃結生靈可以延年活烹生