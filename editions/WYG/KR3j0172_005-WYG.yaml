body:
  text: 遵生八牋巻五明高濓撰四時調攝牋秋三月調攝總類禮記西方曰秋秋者愁也愁之以時察守義也太𤣥經曰秋者物皆成象而聚也管子曰秋者陰氣始下故萬物收淮南子曰秋為矩矩者所以方萬物也漢律志曰少陰者西方也西者遷也陰氣遷落萬物􅒫子由切斂乃成熟也當審時節宣調攝以衞其生立秋金相秋分金旺立冬金休冬至金廢立春金囚春分金死立夏金殁夏至金胎言金孕于火土之中也臞仙月占主疾七月甲子日忌雷主多暴疾晦日忌風主多癰八月秋分後忌多霜主病九月忌行夏令主多鼽􅅉肺臟秋旺論肺屬西方金為白帝神形如白虎象如懸磬色如縞映紅居五臟之上對胷若覆葢然如為華葢肺者㪍也言其氣㪍鬱也重三觔三兩六葉兩耳總計八葉肺為脾子為腎母下有七魄如嬰兒名尸狗伏尸雀陰吞賊非毒除穢辟臭乃七名也夜卧及平旦時叩齒三十六通呼肺神及七魄名以安五臟鼻為之宫左為庚右為辛在氣為咳在液為涕在形為皮毛也上通氣至腦戸下通氣至脾中是以諸氣屬肺故肺為呼吸之根源為傳送之宫殿也肺之脈出于少商又為魄門久卧傷氣腎邪入肺則多涕肺生于右為喘咳大腸為肺之府大腸與肺合為傳瀉行導之府鼻為肺之宫肺氣通則鼻知香臭肺合于皮其榮毛也皮枯而毛落者肺先死也肺納金金受炁于寅生于巳旺于酉病于亥死于午墓于丑為秋日為庚辛為申酉其聲商其色白其味辛其臭腥心邪入肺則惡腥也其性義其情怒肺之外應五嶽上通太白之精于秋之王日存太白之炁入于肺以助肺神肺風者鼻即塞也容色枯者肺乾也鼻痒者肺有蟲也多恐懼者魄離于肺也身體黧黑者肺炁微也多怒氣者肺盛也不耐寒者肺勞也肺勞則多睡好食辛辣者肺不足也腸鳴者肺炁壅也肺邪自入者則好吸故人之顔色瑩白者則肺無病也肺有疾用呬以抽之無故而呬不祥也秋三月金旺主殺萬物枯損故安其魄而存其形者當含仁育物施惠斂容藏陽分形萬物收殺雀卧雞起斬伐草木以順殺氣長肺之剛則邪炁不侵逆之則五臟乖而百病作矣相肺臟病法肺病熱右頰赤肺病色白而毛稿喘咳炁逆胷背四肢煩痛或夢美人交合或見花旛衣甲日月雲鶴貴人相臨肺虚則炁短不能調息肺燥則喉乾肺風則多汗畏風欬如炁喘旦善暮甚病炁上逆急食苦以泄之又曰宜酸以收之用辛以補之苦以瀉之禁食寒肺惡寒也肺有病不聞香臭鼻生瘜肉或生瘡疥皮膚燥痒炁盛咳𠻳唾吐膿血宜服排風散排風散用治皮膚瘡癬疥癩氣滿咳嗽涕唾稠嚴人參三錢丹參五分防風三錢天雄三錢炮秦芄三錢山茱萸三錢沙參二錢虎骨酥炙五錢山藥五錢天麻六錢𦍑活三錢右為末食前米飲調服三錢為丸亦可修養肺臟法當以秋三月朔朢旭旦向西平坐鳴天鼓七飲玉泉三註云飲玉泉者以舌抵上腭待其津生滿口嗽而嚥之凡三次也然後瞑目正心思吸兑宫白炁入口七吞之閉氣七十息此為調補神氣安息靈魄之要訣也當勤行之六氣治肺法吐納用呬以鼻微長引炁以口呬之勿令耳聞皆先須調氣令和然後呬之肺病甚大呬三十遍細呬三十遍去肺家勞熱炁壅咳嗽皮膚燥痒疥癬惡瘡四肢勞煩鼻塞胸背疼痛依法呬之病去即止過度則損呬時用雙手擎天為之以導肺經肺臟導引法七八九月行之可正坐以兩手據地縮身曲脊向上三舉去肺家風邪積勞又當反拳搥背上左右各三度去胸臆閉炁風毒為之良久閉目叩齒而起黄帝製䕶命茯苓丸黄帝曰秋三月治病如何岐伯曰當服補腎茯苓丸主治腎虚冷五臟内傷頭重足浮皮膚燥痒腰脊疼痛心胃咳逆口乾舌燥痰涎流溢惡夢遺精尿血滴瀝小腹偏急陰囊濕痒喘逆上壅轉側不得心常驚悸目視茫茫飲食無味日漸羸瘦醫不能治此方竒效茯苓一兩防風六錢白术一兩細辛三錢山藥一兩澤瀉四錢附子炮便製五錢紫菀五錢獨活五錢芍藥一兩丹參五錢桂五錢乾薑三錢牛膝五錢山茱萸肉五錢黄茋一兩苦參三錢右為末蜜丸如桐子大先服每七丸日再服秋季攝生消息論秋三月主肅殺肺炁旺味屬辛金能尅木木屬肝肝主酸當秋之時飲食之味宜減辛增酸以養肝氣肺盛則用呬以泄之立秋以後稍宜和平將攝但凡春秋之際故疾發動之時切須安養量其自性將養秋間不宜吐并發汗令人消爍以致臟腑不安惟宜針灸下痢進湯散以助陽氣又若患積勞五痔消渴等病不宜吃乾飯炙煿并自死牛肉生鱠雞猪濁酒陳臭醎醋粘滑難消之物及生菜瓜菓鮓醬之類若風氣冷病痃癖之人亦不宜近若夏月好吃冷物過多至秋患赤白痢疾兼瘧疾者宜以童子小便二升并大腹㯽榔五個細剉同便煎取八合下生薑汁一合和收起臈雪水一鍾早起空心分為二服瀉出三兩行夏月所食冷物或膀胱有宿水冷膿悉為此藥袪逐不能為患此湯多承炁雖老人亦可服之不損元氣況秋痢又當其時此藥又理脚氣諸炁悉可取效丈夫瀉後兩三日以韮白煮粥加羊腎同煮空心服之殊勝補藥又當清晨睡覺閉目叩齒二十一下嚥津以兩手搓熱熨眼數多于秋三月行此極能明目又曰秋季謂之容平天炁以急地氣以明早卧早起與雞俱興使志安寧以緩秋形收斂神炁使秋炁平無外其志使肺炁清此秋炁之應養收之道也逆之則傷肺冬為飱泄奉藏者少秋炁燥宜食麻以潤其燥禁寒飲并穿寒濕内衣千金方曰三秋服黄茋等丸一二劑則百病不生金匱要畧曰三秋不可食肺四時纂要曰立秋後宜服張仲景八味地黄丸治男女虚弱百疾醫所不療者久服身輕不老熟地黄八兩薯蕷四兩茯苓二兩牡丹皮二兩澤瀉二兩附子童便製炮一兩肉桂一兩山茱萸四兩湯泡五遍右為細末蜜丸如桐子大每日空心酒下二十丸或鹽湯下稍覺過熱用涼劑一二帖以溫之雲笈七籖曰秋宜凍足凍腦卧以頭向西有所利益養生論曰秋初夏末熱氣酷甚不可脱衣裸體貪取風涼五臟俞穴皆㑹于背或令人扇風夜露手足此中風之源也若覺有疾便宜服八味地黄丸大能補理臟腑禦邪仍忌三白恐沖藥性秋三月卧時頭要向西作亊利益本草曰入秋小腹多冷者用古時磚煑汁熱服之又用熱磚熨肚三五度瘥書曰秋炁燥宜食麻以潤其燥禁寒餘食禁早服寒衣秋三月六炁十八候皆正收斂之令人當收斂身心勿為發揚馳逞書曰秋傷于濕上逆而咳發為痿厥又曰立秋日勿宜沐浴令人皮膚粗燥因生白屑又曰八月望後少寒即用微火煖足勿令下冷養生書曰秋穀初成不宜與老人食之多發宿疾秋三月合用藥方七寳丹治久患瀉痢療不瘥者服之即效老人反脾洩滑正宜服此附子童便和黄泥炮五錢當歸一兩乾姜五錢吳茱萸厚朴姜汁炒花椒各三錢舶上硫黄八錢此物最少出倭夷海船上作灰塗縫者佳人不多見俱以市硫有油者用之舶硫色如蜜黄中有金紅處如七月石榴皮色打開儼若水晶有光全非鬆脆性如石硬者真右七味為末米醋和成兩團以白麫和作外衣裹藥在内如燒餅包糖一般文武火煆麫熟去麫搗為末蜜丸桐子大諸痢瀉米湯下二十丸空心日午服宿食炁痛不消以姜鹽湯下攝脾丸秋來臟腑虚冷泄瀉不足木香訶子炮去核厚朴生姜汁炒五倍子微炒白术土炒各等分右為末炊糯米飲為丸桐子大每服十丸米飲送下葳靈仙丸治老壯腹氣壅滯涎嗽間作胃脘痰塞痞悶不快龍腦薄荷一兩皂角一斤不蛀肥者用河水浸洗去黒皮用砂器中揉擦作稠水去渣觔熬成膏多少取用葳靈仙洗去土焙用四兩三味共搗為丸桐子大每三十丸臨卧生姜湯下保救丹秋後發嗽逺年冷嗽遇秋又發并勞嗽痰壅蛤蚧一個男取雄腰上一截女用雌腰下一截地黄熟爛如飴一錢皁角不蛀的酥炙去黒皮用二定杏仁二錢童便浸一週時去皮尖入蜜炒黄半夏三錢水煮内不見白五味子二錢丁香三錢為末蜜丸桐子大食前一服五丸姜湯下二仁膏治老人膈滯肺疾痰嗽又名生姜湯杏仁四兩去皮尖桃仁五錢去皮生姜六兩去皮切之甘草一錢鹽五錢舊本三兩如何可用三兩右以二仁同薑濕紙裹包研細入甘草與鹽瓶内收貯用湯㸃服太上肘後玉經八方坤卦西南風后四扇散五靈脂三兩延年益命仙靈皮三兩强筋骨松脂二兩去風癎澤㵼二兩强腎白术二兩益氣力乾姜二兩益炁生地黄五兩補髓血石菖蒲三兩益心神桂二兩補不足雲母粉三兩長肌肥白右藥十物如法搗洗一萬杵煉蜜為丸桐子大日三四十丸兑卦正西夏姬杏金丹杏子六斗煮水滚三四沸放下杏子以手或棍搥摩令皮去大煮半晌漉起放盆中去核清汁得若干取鐵鍋放糠火上以羊脂油四斤擦入釡中擦之不已盡此四觔脂為止下杏釡中熬之糠火細細不斷三四日藥成如金光五彩色每服一二匙服之變老成少顔色美好夏姬服之上昇七月事宜孝經緯曰大暑後十五日斗指坤為立秋秋者揫也物于此而揫斂也後十五日斗指申為處暑言瀆暑將退伏而潜處也律夷則夷者傷也則法也言金氣始肅萬物於此凋傷猶被刑戮之法也晉樂志七月為申申者身也言萬物身體皆成就也時為龍火西頽纂要曰七月為蘭月又曰首秋上秋蘭秋肇秋是月也天道東北行作亊出行宜向東北吉不宜用申日犯月建作事不吉白雲雜忌曰七日取麻勃一升并人參半升合蒸炁盡令徧服一刀圭令人心地聰明雲笈七籖云七日曝皮裘可以辟蛀家塾事親曰七日取角蒿置毡褥書籍中可以辟蠧法天生意云又可辟蛇收芙蓉葉可以治腫乾為末醋調一味敷腫上可消嘗氏日録曰七月上甲日採枸杞花八月上酉日治服之又云立秋日人未起時汲井水長㓜皆少飲之却病法天生意云七日取百合根熟搗新瓦器盛之掛于屋内陰乾百日㧞白以此摻之可生黑髮又云是日取蜂窠中蜂蛹子一窠陰乾為末用蜜調塗可除面䵟又云七日取螢火十四枚撚白髪自黑嘗氏日抄云七日採蒺莉子陰乾搗末食後服治眼失明法天生意曰秋三月戊子己亥庚子辛亥宜煉丹藥宜入山修道雲笈七籖曰是月十六日剪指甲燒灰服之能滅九虫三尸又曰十一日取枸杞煎湯沐浴令人不老不病二十三日沐令髪不白二十五日沐令人夀長千金月令曰七日暑炁將伏宜食稍涼以為調攝法用竹葉一把梔子二個切碎用水熬煎澄清去渣用淘粳米磨作泔粉服神仙餌松實法七月取松卵中仁去木皮搗如膏每服雞子大一團日三服久服身輕三百日後可行五百里之逺即各山松卵内小子過七月即􅀈出無尋矣非嘗食北來大松子也竹葉粥中暑者宜用竹葉一握山梔一枚煎湯去渣下米煮粥候熟下鹽花㸃之進一二杯即愈立秋太陽未升採楸葉熬膏揸瘡瘍立愈名楸葉膏熬法以葉多方稠又曰七月七日採蓮花七分八月八日採藕根八分九月九日採蓮實九分陰乾搗細煉蜜為丸服之令人不老千葉蓮服之令人羽化又曰七日取烏雞血和三月三日收起桃花片為末塗面令人瑩白如玉又曰取赤小豆男女各吞七粒令人終歲無病家塾事親曰七日取蜘蛛一枚著領中令人不忘七日取槐角子熟搗成汁納銅鉢中晒成膏􅑃為䑕屎大納肛門内每日三次治痔及百瘡大効又曰七日取苦瓠白瓤絞汁一合以醋一升古錢七個和均以火煎之令稀稠得所㸃入眼眥中治眼黑暗又七日採麻花五月五日收麻葉搗作炷圓炙生瘰癧瘡上百壯次燒胡桃松脂研敷即愈法天生意云七日採麻花陰乾為末烏麻油浸每夜擦上眉毛脱落者立生是月二十三日二十八日拔白永不再生七月五日是三會日宜修迎秋齋修真指要曰中元十五日可修齋謝罪立秋日用水吞赤小豆十四粒一秋可免赤白痢疾七夕乞巧使蜘蛛結萬字造明星酒同心膾本草云七月七日採慎火花苗葉五兩鹽三兩同搗絞汁治熱毒并小兒痘疹不出在皮膚内者以此汁手蘸摩之日再即出丹瘡亦如此法七月亊忌七月日時不宜用申犯月建百事不利初八二十二忌裁衣交易初七日勿想惡事白雲忌曰七月勿食蓴上有蠲蟲害人勿食韭損目千金方曰勿食鹿獐動炁勿食茱萸傷神炁孫真人曰勿食鴈傷人勿多食菱肉動炁勿食生蜜令人暴下霍亂勿食猪肺勿多食新薑法天生意曰立秋後十日瓜宜少食月令云立秋勿食煮餅及水溲餅勿多食猪肉損人神氣楊公忌曰初一日二十七日不宜問疾是月初七為道德臘十五日為中元二日戒夫婦入房秋七月修養法秋七月審天地之氣以急正氣早起早卧與雞俱起纔緩其形收斂神炁使志安寧卦否否者塞也天地塞陰陽不交之時也故君子勿妄動生氣在午坐卧宜向正南孫真人養生曰肝心少氣肺臟獨旺宜安静性情增鹹減辛助氣補筋以養脾胃毋冒極熱勿恣涼冷毋發大汗保全元氣靈劔子導引法勢以兩手抱頭項宛轉囘旋俯仰去脇肋胸背間風炁肺臟諸疾宜通項脈左右同正月法又法以兩手相叉頭上過去左右伸曳之十遍去闗節中風氣治肺臟諸疾秋八月事宜孝經緯曰處暑後十五日斗指庚為白露陰炁漸重露凝而白也後十五日斗指酉為秋分陰生于午極于亥故酉其中分也仲月之節為秋分秋為陰中陰陽適中故晝夜長短亦均焉律南吕南者任也吕者助也言陽氣尚有妊生陰助陽成功也辰酉酉者綇也謂時物皆綇縮也纂要曰八月為桂月為仲商𤣥樞曰天道東北行作事出行俱宜向東北吉不宜用酉日犯月建不吉荆楚記曰是月初十日以朱砂㸃小兒額上為之天炙以厭疾纂要曰十九日拔白永不生初二初四十五二十五同雲笈七籖云是月行路間勿飲陰地流泉令人發瘴脚軟社日人家襁褓兒女俱令早起恐社翁為崇與春社同田家五行曰侵辰用磁器收百草頭上露磨濃墨頭痛者㸃太陽穴勞瘵者㸃膏肓之類為之天灸雜纂曰是月採百合曝乾蒸食之甚益氣力千金月令曰此月可食韮菜露葵齊諧記曰八月初一日作五明囊盛取百草頭露以洗眼眼明是日可修逐邪齋述僊記曰八月一日以絹囊承取柏樹下露如珠子取拭兩目明爽無疾雲笈七籖曰是月八日取枸杞煎湯沐浴令人不老不病二十二日沐浴令人無非禍纂要曰是月初三日初七日宜沐浴令人聰明二十五日宜浴却病圖經曰八月楮實子經熟甲子日採來水浸去皮穰仙方單服其實水服二錢服久乃佳又云採柏子晒乾為末服方寸匙稍增至多欲絶穀恣意取飽渴則飲水久服延年雲笈七籖曰二十五日天倉開宜入山修道八月事忌千金方曰勿食萌芽傷人神膽喘悸脇肋炁急勿多食新薑勿食生蒜勿食猪肺及飴和食令人發疽勿食雉肉勿食猪肚冬成嗽疾本草云勿食獐肉動氣勿食芹菜恐病瘕發則似顛小腹脹勿食生蜜勿多食生菓勿食雞子傷神勿食蟹霜降後方可食蟹葢中膏内有腦骨當去勿食有毒雲笈七籖曰起居勿犯賊邪之風勿多食肥腥令人霍亂千金月令曰秋分之日勿殺生勿用刑勿處房帷勿弔喪問疾勿大醉君子當齋戒静専以自檢二十九日忌逺行水陸不吉雲笈七籖曰是月初八日勿買布買鞋履附足大忌楊公忌曰二十七日不宜問疾秋八月修養法仲秋之月大利平肅安寧志性收斂神炁增酸養肝毋令極飽令人壅塞是月宜祈謝求福卦觀觀者觀也風在地上萬物興昌之時也生氣在未坐卧宜向西南方吉孫真人攝養論曰是月心臟氣微肺金用事宜減苦增辛助筋補血以養心肝脾胃勿犯邪風令人生瘡以作疫痢十八日乃天人興福之時宜齋戒存想吉事靈劍子坐功法勢以兩手拳脚脛下十餘遍閉炁用力為之此能開胸􅈩膈氣去脇中炁治肺臟諸疾行完叩齒三十六通以應之雲笈七籖曰是月十五日金精正旺宜採銅鐵鑄鼎劍内丹秘要曰觀者四陰之卦也斗杓是月戍時指酉以月建酉也時為陰佐陽功以成萬物故物皆縮小因時而成矣喻身中陰符過半降而入于丹田吾人當固養保元以築丹基九月事宜孝經緯曰秋分後十五日斗指辛為寒露謂露冷寒而將欲凝結矣後十五日斗指戍為霜降氣肅露凝結而為霜矣故云駟見而隕霜駟房星也律無射射者出也言陽氣上升萬物收藏無復出也然隨陽而終當隨陰而起無終已也辰為戍戌者滅也謂時物皆衰滅也夏小正曰九月納火大火心星也故九月授衣纂要曰九月為霜月菊月暮秋末秋暮商季商杪秋霜辰授衣是月也天道南行作事出行俱宜向南吉不宜用戌日犯月建不吉風土記曰是月九日採茱萸挿頭鬂辟惡氣而禦初寒是月二十日宜齋戒沐浴其日雞鳴時沐浴令人辟兵二十一日取枸杞煎湯沐浴令人光澤不老二十八日宜沐浴二十一日天倉開宜入山修道千金月令曰宜進地黄湯其法取地黄洗浄以竹刀切薄晒乾用時火焙為末碾細充湯服煎如茶法四時纂曰取枸杞子浸酒飲令人耐老病仙方云修長生者保命莫切于狶薟草五月五日七月七日九月九日採治方具五月條内聖惠方曰甘菊花晒乾三升入糯米一斗蒸熟菊花搜拌如常造酒法多用細麫麯候酒熟飲一小杯治頭風旋運等疾雲笈七籖曰是月採白术蒸曝九次晒乾為末日服三次不饑延年益夀食療本草曰此月後宜食野鴨多年小熱瘡不愈食多即瘥九日採甘菊與茯苓松柏脂丸服令人不老纂要曰是月宜合三勒漿過此月則不佳矣用訶梨勒批梨勒菴摩勒三味和核搗如麻豆大用三兩次用蜜一斗以新汲水二斗調均傾瓮中即下三勒熟攪蜜封三四日後開又攪之以乾浄布拭去汗候發定密封共三十日方成味甚美飲之消食下氣西京記曰九日佩茱萸餌糕飲菊花酒令人夀長本草曰採太乙餘糧久服不饑輕身耐寒暑吕公記曰九日天明時以片糕搭兒女頭額更祝曰願兒百事俱高作三聲又曰九日造迎涼脯羊肝餅佩癭木符千金方曰是月内於戍地開坎深二三尺埋炭五斤土覆戍為火之墓地以禳火灾炭多可加真誥曰十六日宜拔白永不生九月事忌千金月令曰是月勿食脾季月土旺在脾也雲笈七籖曰季秋節約生冷以防痢疾勿食新薑食之成痼疾勿食小蒜傷神損夀魂魄不安勿食蓼子勿以猪肝同飴食冬成嗽病經年不瘥勿食雉肉損人神氣勿多食雞令人魂魄不安九日勿起動牀蓆當修延筭齋月忌曰勿食犬肉傷人神氣勿食霜下瓜冬發翻胃勿食葵菜令食不消化雲笈七籖曰是月十八日忌逺行楊公忌曰二十七日不宜問疾九月修養法季秋之月草木零落衆物伏蟄氣清風暴為朗無犯朗風節約生冷以防癘病二十八日陽氣未伏陰炁既衰宜進補養之藥以生氣卦剥剥落也陰道將旺陽道衰弱當固精斂神生氣在申坐卧宜向西南孫真人曰是月陽炁已衰陰炁太盛暴風時起切忌賊邪之風以傷孔隙勿冒風邪無恣醉飽宜減苦增丼補肝益腎助脾胃養元和靈劍子坐功法勢九月十二日已後用補脾以兩手相叉于頭上與手争力左右同法行之治脾臟四肢去脇下積滯風炁使人能食秋時逸事風起鱖肥海録碎事秋風起而鱖魚肥秋當飽鱖圍棋争勝西京記曰漢宫中八月四日出北戸竹下對局勝者終年有福負者多病綵絲續命八月四日以綵絲就北辰星下祝求長命菊花稱夀唐書君臣秋登慈恩浮圖獻菊酒稱夀思蓴鱸張季鷹為齊王曹椽見秋風起思吳中蓴羮菰米鱸魚鱠嘆云人生貴適志何能羈宦數百里外以要名爵乎乃歌曰秋風起兮木葉飛吳江水清鱸魚肥命駕而歸南人作鱠名郎官鱠因張得名耳登南樓庾亮賞月登南樓據胡牀與浩等談咏竟夕老子興趣不淺懐故里王粲觀秋月懐弟妹故里而傷神曝犢鼻禈七月七日法當晒衣諸阮所晒皆綈錦咸乃挑犢鼻禈曝于庭曰未能免俗􅂓復爾耳曬腹中書七月七日郝隆曝腹云晒腹中書穿針乞巧唐天寳中綵結百丈高樓上陳花菓酒炙祀牛女穿針乞巧占蛛絲七夕婦女陳瓜菓祀牛女次早以瓜上得蛛網為得巧盂蘭盆供七月十五日目連以百味五菓盛盤中作咒願以度母廣陵觀濤枚皋七發曰八月之朢觀濤于廣陵之曲江梯雲取月唐太和中周生有道術中秋夜與客㑹月色方瑩彼云我能取月置之懐袂因即取筯數百條繩而駕之我梯此取月少頃以手舉衣懐中出月寸許光色炤映寒入肌骨登高避厄汝南桓景隨費長房遊語云九月九日汝家有災可佩茱萸囊登髙飲菊花酒以避此禍可消佩萸食餌武帝宫中九月九日佩萸食餌飲菊花酒以期永年孟嘉落帽嘉為桓溫參軍九月九日溫遊龍山有風至吹嘉帽落嘉不知顧登戲馬臺宋武帝在彭城九月九日登項羽戲馬臺齊高祖登商飈館為之九日臺摘菊盈把淵明九日無酒宅邊菊摘盈把而坐望有白衣送酒大飲而醉賜菊延壽魏文帝賜鍾繇秋菊云謹奉一束以助彭祖之術尚食闕二社重陽糝米為糕或加以栗以肉又夢華録曰重九都人各以麫為蒸糕相遺上挿剪綵小旂糝飣菓實如石榴子栗子銀杏松子之類滿城風雨溪堂集云潘邠老有滿城風雨近重陽之句今去重陽四日而雨大作遂以邠老之句續為三絶其最滿城風雨近重陽無奈黄花惱意香雪浪翻天迷赤壁令人西望憶潘郎中元大獻道經七月望日作𤣥都大獻花菓旛􅓚清膳飲食供諸聖衆欲求餓鬼滿足得還人中登山坐湖登龍山事見前顔測坐九日北湖詩云亭席斂徂蕙澄湖泛初蘭月帳風幃白紵詩云羅帳含月思心傷潘岳賦曰勁風戾而推幃霜階風隙夏侯詩曰階縞縞以受霜謝詩云秋首風遶隙服黄佩赤太清草木方曰九日採黄花與茯苓服之延年西京記曰佩赤茱萸令人夀長高子秋時幽賞十二條西泠橋畔醉紅樹西泠在湖之西橋側為唐一菴公墓中有楓柏數株秋來霜紅霧紫㸃綴成林影醉夕陽鮮艷奪目時攜小艇扶尊登橋吟賞或得一二新句出攜囊紅葉牋書之臨風擲水泛泛隨流不知飄泊何所幽情耿耿撩人更於月夜相對露濕紅新朝烟凝望明霞艷日豈直勝于二月花也西風起處一葉飛向尊前意似秋色憐人令我騰歡豪舉興薄雲霄翩翩然神爽哉何紅葉之得我耶所患一朝枯朽摧為㸑桐使西泠秋色色即是空重惜不住色相終為畢竟空也誰能為彼破却生死大刼哉他日因果我當作傷時命以弔寶石山下看塔燈保叔為省中最高塔七級燃燈周遭百盞星丸錯落煇煌燭天極目高空恍自九霄中下燈影澄湖水面又作一種色相霞鬚滉盪揺曳長虹夜静水寒熖射蛟窟更喜風清湖白光彩儼駕鵲橋得生羽翰便想飛步繩河彼岸忽聞鐘磬半空梵音聲出天上使我慾念色塵一時幻破清浄無碍滿家衖賞桂花桂花最盛處惟南山龍井為多而地名滿家衖者其林若墉若櫛一村以市花為業各省取給於此秋時策蹇入山看花從數里外便觸清馥入徑珠英瓊樹香滿空山快賞幽深恍入靈鷲金粟世界就龍井汲水煮茶更得僧厨山蔬野蔌作供對僊友大嚼令人五内芬馥歸攜數枝作齋頭伴寢心清神逸雖夢中之我尚在花境舊聞僊桂生自月中果否若向托根廣寒必憑雲梯天路可折何為常被平地竊去疑哉三塔基聽落鴈秋風鴈來惟水草空濶處擇為栖止湖上三塔基址草豐沙濶鴈多羣呼下集作解陣息所攜舟夜坐時聽争栖競啄影亂湖煙宿水眠雲聲凄夜月基畔嚦嚦嘹嘹秋聲滿耳聽之黯然不覺一夜西風使山頭樹冷浮紅湖岸露寒生白矣此聽不悦人耳惟幽賞者能共之若彼聽雞聲而起舞聽鵑聲而感變者是皆世上有心人也我則無心勝果寺月岩望月勝果寺左山有石壁削立中穿一竇圓若鏡然中秋月滿與隙相射自竇中望之光如合璧秋時當與詩朋酒友賡和清賞更聽萬壑江聲滿空海色自得一種世外玩月意味左為故宋御教塲親軍䕶衞之所大内要地今作荒涼僻境矣何如鏡隙陰晴常滿萬古不虧區區興廢盡入此石目中人世搬弄切為冷眼偷笑水樂洞雨後聽泉洞在烟霞嶺下巖石虚豁谽谺䆳窈山泉别流從洞隙滴滴聲韻金石且泉味清甘更得雨後泉多音之清泠真勝樂奏矣每到以泉沁吾脾石嗽吾齒因思蘇長公云但向空山石壁下受此有聲無用之清流又云不須寫入薰風絃縱有此聲無此耳我輩豈無耳哉更當不以耳聽以心聽資嚴山下看石筍資嚴在靈隱隱西壁下有石狀若筍形圓削卓立高可百尺㠝岏秀潤凌空挿雲更喜四顧山巒若層花吐萼皺縠疊浪巍峩曲折穿幽透深林木合抱皆自岩竇拔起不土而生舊傳此山韞玉故腴潤若此但山石間水跡波紋不知何為有之亦不知有自何時豈滄海桑田説也更愛前後石壁唐宋遊人題名甚多進此有楓林塢秋色變幻種種竒觀窈窕﨑嶇不勝騰涉矣時當把酒鯨吞倚雲長嘯使山谷駭應增我濟勝之力數倍北高峰頂觀海雲北高峰為湖山第一高處絶頂環眺目及數里左顧澄湖匣開粧鏡金餅晶熒右俯江波繩引銀河玉虬屈曲前後城郭室廬郊原村落𦕈若片紙畫圖闕㸃㸃耳雄哉目中之觀哉時間日晷將西海雲東起恍見宵霧溟䝉朝烟霏拂洩洩縈紆英英層疊横截半空溷合無際四野晚山浮浮㝠漠矣即此去地千尺離俗數里便覺足躡天風著眼處不知家隔何地矧吾生過客原無罣碍何為受彼世縁束縛不作塵外遐想策杖林園訪菊菊為花之隱者惟隱君子山人家能蓺之故不多見見亦難于豐美秋來扶杖遍訪城市林園山村籬落更挈茗奴從事投謁花主相與對花談勝或評花品或較栽培或賦詩相酬介酒相勸擎杯坐月燒燈醉花賓主稱歡不忍熱别花去朝來不厭頻過此興何樂時乎東籬之下菊可採也千古南山悠然見之何高風隱徳舉世不見元亮乘舟風雨聽蘆秋來風雨憐人獨蘆中聲最凄黯余自河橋望蘆過處一碧無際歸枕故邱每懐拍拍武林惟獨山王江涇百脚村多蘆時乎風雨連朝能獨乘舟卧聽秋聲逺近瑟瑟離離蘆葦蕭森蒼蒼蔌蔌或鴈落啞啞或鷺飛濯濯風逢逢而雨瀝瀝耳洒洒而心于于寄興幽深放懐閒逸舟中之人謂非第一出塵阿羅漢耶避囂炎而甘寥寂者當如是降伏其心保叔塔頂觀海日保叔塔遊人罕登其巔能窮七級四望神爽初秋時夜宿僧房至五鼔起登絶頂東望海日將起紫霧氤氲金霞漂蕩亘天光彩狀若長横疋練圓走車輪或肖虎豹超驤鸞鶴飛舞五色鮮艷過目改觀瞬息幻化變遷萬狀頃焉陽谷吐火千山影赤金輪浴海閃爍熒煌火鏡浮空曈曨輝映丹熖烱烱彌天流光赫赫動地斯時惟啓明在東晶丸燦爛衆星隱隱不敢為顔矣長望移時令我目亂神駭陡然狂呼聲振天表忽聽籌報鳴雞樹喧宿鳥大地雲開露華影白回顧城市囂塵萬籟滚滚生動空中新涼逼人凛乎不可留也下塔閉息斂神迷目尚為雲霞眩彩六和塔夜玩風潮浙江潮汛人多從八月晝觀鮮有知夜觀者余昔焚修寺中燃㸃塔燈夜午月色横空江波静寂悠悠逝水吞吐蟾光自是一段竒景頃焉風色陡寒海門潮起月影銀濤光揺噴雪雲移玉岸浪捲轟雷白練風揚奔飛曲折勢若山岳聲騰使人毛骨欲豎古云十萬軍聲半夜潮信哉過眼驚心因憶當年浪遊身共水天飄泊隨潮逐浪不知幾作泛泛中人此際沈吟始覺利名悞我不淺遥見浪中數㸃浮漚是皆南北去來舟楫悲夫二字搬弄人間千古曾無英雄打破盡為名利之夢沈酣風波自不容人喚醒遵生八牋巻五
