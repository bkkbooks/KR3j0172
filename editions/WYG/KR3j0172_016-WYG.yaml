花也視之愈久愈見精神使人不能捨去花中近心所色如吳紫艷麗過於衆花葉則差小於吳峭直雄徤衆莫能及其色特深仙霞乃潘氏西山於仙霞嶺得之故更以為名趙十四色紫有十五萼初萌甚紅開時若晩霞燦日色更晶明葉深紅者合於沙上則勁直肥聳超出羣品亦云趙師博葢其名也何蘭紫色中紅有十四蕚花頭倒壓亦不甚緑品外之竒金棱邊色深紫有十二蕚出於長泰陳家色如吳花片則差小榦亦如之葉亦勁徤所可貴者葉自尖處分三邊各一線許直下至葉中處色映日如金線其家寳之猶未廣也白蘭甲濟老色白有十二萼標致不凡如淡妝西子素裳縞衣不染一塵葉似施花更能髙一二寸得所養則岐而生亦號一終紅竈山有十五蕚色碧玊花枝開體膚鬆美顒顒昻昻雅特閉麗真蘭中之魁品也每生並蒂花幹最碧葉緑而痩薄開生子蔕如苦蕒菜葉相似俗呼為緑衣郎黄殿講號為碧玉榦西施花色微黄有十五萼合幷幹而生計二十五萼或迸於根美則美矣每根有萎葉朶柔不起細葉最緑肥厚花頭似開不開榦雖髙而實痩葉雖勁而實柔亦花中之上品也李通判色白十五萼峭特雅淡追風浥露如泣如訴人愛之或類鄭花則減一頭地位葉大施花劔脊最長真花中之上品惜乎不甚勁直惠知客色白有十五萼賦質清癯團簇齊整或向背嬌柔痩潤花英淡紫片尾凝黄葉雖緑茂細而觀之但亦柔弱馬大同色碧而緑有十二萼花頭微大間有向上者中多紅葉葉則髙聳蒼然肥厚花榦勁直及其葉之半亦名五暈絲上品之下鄭少舉色白有十四萼瑩然孤潔極為可愛葉則修長而瘦散亂所謂蓬頭少舉也亦有數種只是花有多少葉有軟硬之别白花中能生者無出於此其花之資質可愛為百花之翹楚者黄八兄闕有十二萼善於抽幹頗似鄭花惜乎幹闕文持葉緑而直周染花闕二萼與鄭花無異但幹短弱耳夕陽紅花八萼花片凝尖色則凝紅如夕陽返炤觀堂主花白有七萼花聚如簇葉不甚髙可供婦女時粧名弟色白有五六萼花似鄭葉最柔軟如新長葉則舊葉換人多不種弱脚只是獨頭蘭色緑花大如鷹爪一榦一花髙二三寸葉痩長二三尺入臘方花薰馥可愛而色有餘魚魫蘭十二萼花亦澄澈宛如魚魫采而沉之水中無影可指葉頗勁緑此白蘭之竒品也品蘭髙下第三余嘗謂天下凡幾山川而支派源委於人迹所不至之地其間山㘭石潭斜谷幽竇又不知其幾何多邁古之修竹矗之危木雲煙覆䕶溪澗盤施萬蘿蔽道陽暉不燭冷然泉聲磊乎萬狀隄圯之異則所産之多人賤之篾如也倐然輕采於樵牧之手而見駭然識者從而得之則必㩦持登髙岡涉長途欣然不憚其勞中心之所好者不能以集凝而置之也其地近城百里淺小去處亦有數品可取何必求諸深山窮谷每論及此往往啟識者雖有不韙之誚毋乃地邇而氣殊葉萎而花蠧或不能得培植之三昧者耶是故花有深紫有淺紫有深紅有淺紅與夫黄白緑碧魚魫金稜邊等品是必各因其地氣之所種而然意亦隨其本質而産之耶抑品皇穹儲精景星慶雲隨光遇物而流形者也噫萬物之殊亦天地造化施生之功豈予可得而輕議哉切嘗私合品第而數之以謂花有多寡葉有强弱此固其因所賦而然也茍惟人力不到則多者從而寡之弱者又從而弱之使夫人何以知蘭之髙下其不誤人者幾希嗚呼蘭不能自異而人異之耳故必執一定之見物品藻之則有淡然之性在況人均一心心均一見眼力所至非可誣也故紫花以陳夢良為甲吳潘為上品中品則趙十使何蘭大張青蒲統領陳八斜淳監糧下品則許景初石門紅小張青蕭仲和何首座林仲孔莊觀成外則金稜邊為紫花竒品之冠也白花則濟老竈山施花李通判惠知客馬大同為上品所謂鄭少舉黄八兄周染為㳄下品夕陽紅雲嶠朱花觀堂主青蒲名弟弱脚玉小娘者也趙花乂為品外之竒天下養愛第三天不言而四時行百物生者何葢嵗分四時生六氣合四時而言之則二十四氣以成其嵗功故凡穹壤者皆物也不以草木之微昆虫之細而必欲各遂其性者則在乎人因以氣候而生全之者也彼動植者非其恩乎及草木者非其人乎斧斤以時入山林數罟不入汚池又非其能全之者乎入春為青帝回馭陽氣風和日暖蟄雷一震而土脉融暢萬彚藂生其氣則有不可得而揜者是以聖人之仁則順天地以養萬物必欲使萬物得遂其本性而後已故為臺太髙則衝陽太低則隱風前宜面南後宜背北葢欲通南薰而障北吹也地不必曠曠則有日亦不可狹狹則蔽氣右宜近林左宜近野欲引東日而被西陽夏遇炎烈則䕃之冬逢沍寒則曝之下沙欲疏疏則連雨不能淫上沙欲濡濡則酷日不能燥至於挿引葉之架平護根之沙防蚯蚓之傷禁螻螘之冗去其莠草除其絲網助其新箆剪其敗葉此則愛養之法也其餘一切窠虫族類皆能蠧害並可除之所以封植灌溉之法詳載於後堅性封植第四草木之生長亦猶人焉何則人亦天地之物耳閒居暇日優游逸豫飲膳得宜以蘭而言之且一盆盈滿自非六七載莫能至此皆由夫愛養之念不替灌溉之功愈久故根與壤合然後森鬱雄徤敷暢繁麗其葉葢有得於自然而然者合焉欲分而拆之是裂其根荄易其沙土況或灌溉之失時愛養之乖宜又何異於人之饑飽則燥濕干之邪氣乘間入其榮衞則不免侵損所謂向之寒暑適宜肥痩得時者此豈一朝一夕之所能仍舊者也故必於寒露之後立冬以前而分之葢取萬物得歸根之時而其葉則蒼根則老故也或者於此時分一盆吳蘭吝其盆之端正則不忍擊碎因剔出而根已傷暨三年培植尤至困培於今深以為戒欲分其蘭而須用碎其盆務在輕手擊之亦須緩緩解拆其交互之根勿使有拔斷之失然後逐箆藂取出積年腐蘆頭只存三季者每三箆作一盆盆底先用沙填之即以三箆藂之互相枕籍使新箆在外作三方向却隨其花之好肥痩沙土從而種之盆面則以少許痩沙覆之以新汲水一勺以定其根更有收沙曬之法此乃又分蘭之至要者尚預於未分前半月取土篩去瓦礫之類曝令乾燥或為適肥則宜於淤泥沙可用使糞夾和曬之俟乾或復濕如此十度視其極燥更須篩過隨意用葢沙乃久年流聚雜居隂濕之地而蘭之驟爾分折失性假以陽物助之則來年藂箆自長爾與舊葉比肩此其效也夫苟不知收曬之宜用彼積揜之沙或憚披曝必至羸弱而黄葉者有之箆之不發者有之積有日月不知體察其失愈甚候其已覺方始滌根易沙加意調䕶冀其能復不亦後乎抑又知其果能復焉如其稍可全活有㡬何時後而獲遂本質邪故為深嘆惜之因併為之言曰與其於既損之後而欲復全生意寧若於未分之前而必欲全其生意豈不省力今逐品所宜沙土開列於後陳夢良用黄淨無泥痩沙種而忌用肥恐有腐爛之失吳蘭潘蘭用赤沙泥何蘭蒲統領大張青金稜邊各用黄色麄沙和泥更添些少赤沙泥種為妙陳八斜淳監糧蕭仲𢎞許景初何首座林仲孔莊觀成乃下品任意用沙濟老施花惠知客馬大同鄭少舉黄八兄周染宜溝壑中黑沙泥和糞壤種之李通判竈山鄭伯善魚魫用山下流聚沙泥種之夕陽紅以下諸品則任意栽種此封植之槩論也灌溉得宜第五夫蘭自沙土出者各有品類然亦因其土地之宜而生長之故地有肥痩或沙黄土赤而瘠有若山之巔山之岡或近水或附石各依而産之要在度其本性何如爾不可不謂其無肥瘦也苟性不能别曰何者當肥何者當痩强出已見混而肥之則好膏腴者因得所養之法花則轉而繁葉則雄而徤所謂好痩者不因肥而腐敗吾未之信也一陽生於子荄甲濳萌我則注而灌溉之使藴諸中者稍獲强壯迨夫萌英迸沙髙未及寸許從便灌之則戢然而卓簮暨南薫之時長養萬物又從而濆潤之則修然而髙鬱然而蒼若者精於感遇者也秋八月之交驕陽方熾根葉失水欲老而黄此時當以濯魚肉水或穢腐水澆之過時之外合用之物隨宜澆注使之暢茂亦以防秋風肅殺之患故其葉弱拳拳然抽至出冬至而極夫人分蘭之次年不發花者葢恐泄其氣則葉不長爾凡善於養花切須愛其葉葉聳則不慮其花不發也紫花陳夢良極難愛養稍肥隨即腐爛貴用清水澆灌則佳也潘蘭雖未能受肥須以茶清沃之冀得其本生地土之性吳花看來亦好肥種當灌溉以一月一度趙花何蘭大張青蒲統領金稜邊半月一用其肥則可淳監糧蕭仲和許景初何首座林仲孔莊觀成縱有太過不及之失亦無大害於用肥之時當時沙土乾燥遇晩方始灌溉候曉以清水碗許澆之使肥膩之物得以下積其根廣新來未發發箆自無勾蔓逆上散亂盤盆之患更能預以瓮罁之屬儲蓄雨水積久色緑者間或灌之而其葉則浡然挺秀濯然而争茂盈臺簇檻列翠羅青縱無花開亦見雅潔白花濟老施花惠知客馬大同鄭少舉黄八兄周染愛肥一任灌溉李通判竈山鄭伯善肥在六之中四之下又朱蘭亦如之魚魫蘭質不瑩潔不須以穢膩之物澆之夕陽紅雲嶠青蒲觀堂主名第弱脚肥痩任意亦當觀其沙土之燥晩則灌注曉則清水澆之儲蓄雨水沃之令其色緑為妙惠知客等蘭用河沙嵌去泥塵夾糞葢泥種底用麄沙和糞方妙鄭少舉用糞葢泥和便晒乾種之上面用紅泥覆之竈山用糞壤泥及河沙内用草鞋屑鋪四圍種之累試甚佳大凡用輕鬆泥皆可種蘭奥訣分種法分種蘭蕙須至九月節氣方可分栽十月時候花已胎朶不可分種若見雪霜大寒猶不可分栽否必損花栽花法花盆先以麄碗或麄碟覆之於盆底次用桴炭鋪一層了然後却用肥泥薄鋪炭上栽之糝泥擁根如法栽時不可以手􅎄實否則根不舒暢葉不長發花亦不繁茂矣乾濕依時用水澆灌安頓澆灌春二三月無霜雪安放花盆在露天四面皆得澆水日晒不妨逢十分大雨恐墜其葉則以小繩束起如連三四日須移避暑通風處四月至八月須用踈密得所篾籃摭䕶容見日氣最要通風梅天忽逢大雨須移花盆向背日處若逢大雨過又逢日晒盆内熱水則盪害葉亦損根花開時若枝上花蕋多候開次有未開一兩蕋頭便可剪去若留開盡則奪了來年花九月看花乾處用水澆灌則不可濕而又怕濕或用肥水培灌一兩畨不妨冬十月十一月十二月及正月不澆不妨最怕霜雪須用密籃摭䕶安頓朝陽有日炤處南窻簷下極美花盆畢竟兩三日一畨旋轉取其日晒均勻則開時四面皆有花若晒一面則一處有之澆水法用河水或池塘水或積留雨水最佳其次用溪澗水切不可用井水大抵井水性隂恐致涷損澆時須於四畔勻灌不可從上澆下恐壞其葉也四月若有梅雨不必澆若無雨澆五月至須是早起五更日未出時澆一畨至晩黄昏澆一畨乂須看花乾濕則不必澆十分濕恐爛根種花肥泥法栽蘭用泥不管四時收蕨菜草待枯於空地鋪放以山泥薄覆草上復再鋪草於泥上又將泥覆如此相間三四層則發火煨之却用糞入前土稍乾又以糞澆入如此又數次安放閒處聽栽時用或用拾舊草鞋積浸水糞中日久拌黄泥燒過又用大糞澆放空地儘令雨打日炤兩三月過收起聽栽亦佳去除蟣蝨法以水澆花必有蟣蝨在葉底恐壞葉則損花若生此虫即研大蒜和水以白筆蘸拂洗葉上乾浄其蟲自無雜法盆下有竅不可着泥地安頓恐蚯蚓從孔中濳入損侵花根蟻穴亦忌猶須防之盆須架起庶令風從底入以得透氣為佳又免蚯蚓蟻螻之患蘭之壯者有二三十萼弱者只有五六萼或種時無肥泥故也必須及時換泥如法栽過以獲茂盛耳欲分直須交過九月節氣始可如遲至十月中又非其節也分時須度其根之易分不可不察其交互甚者渾擗折之非惟分種不盛抑亦斷送其天年也尋常盆面併實則用竹片挑剔泥鬆又不可撥損了根葉紫紅恐因受霜打以致耳急須移向南簷背霜雪處安頓則仍復皆清葉黄惟用苦茶澆之最忌春雪一㸃着葉則一葉斃矣可將雞鵞燖毛用矼盛貯待其作臭去毛澆之或以皮屑浸水或以洗魚腥水澆之絶妙培蘭四戒春不出宜避春之風雪夏不日避炎日之銷爍秋不乾宜常澆也冬不濕宜藏之地中不當見水成冰弦雪居重訂逐月䕶蘭詩訣正月相宜置坎方好將枝葉趂陽光更須避冷藏簷内勿使春風雪打傷二月須令竹作闌風摧葉變鷓鴣班庭前移進還移出避雪迎陽䕶更難三月新條出舊叢此時却更怕西風隄防地濕多生虱根下休敎壅着濃四月盆泥日晒焦微微着水灌根苗先須皮浸河池水煎過濃茶亦好澆五月新抽葉更青樹隂竹底架髙檠須防蟻穴根窠下老葉凋殘盡莫驚六月驕陽暑正炎青青新葉怕煩煎却宜樹底幷遮箔清曉須敎水接連七月雖然暑漸消更須三日一番澆却防蚯蚓傷根本肥水還令和溺調八月西風天氣凉任他風雨又何妨便澆糞水能肥葉雞糞壅根花更香九月將殘防早霜堦前南向好安藏若生白蟻兼黄螘葉洒雞油庶不傷十月陽生煖氣回明年花蕋已胚胎玉莖不露須培土盆滿秋深急換栽子月庭中宜向陽更宜籠罩土埋矼若還在外根須濕乾髞須知葉要黄髞音燥臘月風髙冰雪寒却宜髙卧竹為龕直敎二月陽和日夢醒敎君始出闗竹譜竹譜曰竹之品類六十有一述其常品記之志林云竹有雌雄雌者多笋故種竹半擇雌者物不逃於隂陽可不信歟凡欲識雌雄當自根上第一枝觀之雙枝是雌即出笋若獨枝者是雄冬至前後各半月不可種植葢天地閉塞而成冬種之必死若遇火日及西南風則不可花木亦然凡種竹處當積土令稍髙於傍地二三尺則雨潦不侵損錢塘人謂之竹脚竹有醉日即五月十三日也齊民要術謂之竹醉日岳州風土記謂之龍生日種竹以五月十三日為上是日遇雨尤佳一云用辰日山谷所謂根須辰日斸笋看上番成又一云宜用臘日杜少陵詩東林竹影薄臘月更宜栽予觀諺云栽竹無時雨過便移多留宿土須記南枝則三説皆拘也又法三兩竿作一本移種其根自相扶持尤易活也凡竹與菊根皆長向上添泥覆之為佳竹留三去四葢三年留四年者伐去竹以五月前血忌日三伏内及臘月斫者不蛀竹之滋澤春發於枝葉夏藏於榦冬歸於根如冬伐竹經日一裂自首至尾不得全完夏伐之最佳但鞭皆爛然要好竹非盛夏伐之不可七八月尚可自此滋澤歸根而不可用矣説文竹節曰約古云渭川千畆竹其人與千戸侯等史記竹得風其體夭屈謂之竹笑竹筍陸佃云字從旬從日包之日為筍解之日為竹又日字從竹從旬旬内為筍旬外為竹也其上畨下畨言竹有上畨下畨即今言大畨小畨也畨去聲謂大年生笋多小年生笋少也杜詩會須上畨看成竹蔡夢弼注不知此義乃云上畨音上筤蜀名竹叢曰林筤誤之甚矣既不識竹又不識詩真瞎子也何以注為非萬玉主人不知此妙竹復死曰䈙觀山海經曰竹生花其年便枯竹六十年易根易根必花結實而枯死實落復生六年而成町子作蕙似小變其治法於初米時擇一竿稍大者截去近根三尺許通其節以糞實之則止乂一種法先將竹斫去本止留二三寸填土硫黄在管内覆轉根反居上用土覆之當年生笋又種竹訣曰深種淺種稀種宻種謂之四法深種者土要培厚淺者以墩置地上種之不必掘潭稀者每墩排開密者須擇竹叢三五枝一墩者移來此亦巧妙語乃善種法也蘄竹蘄竹黄州府蘄州出以色瑩者為簟節踈者為􅅇帶鬚者為杖唐韓愈詩蘄州􅅇竹天下知鄭君所寳尤瓌竒㩦來當晝不得卧一府争看黄琉璃斑竹湘妃竹斑竹甚佳即吳地稱湘妃竹者其斑如淚㾗杭産者不如亦有二種出古辣者佳出陶虚山中者次之土人裁為筯甚妙余㩦數竿回乃陶虚者故不甚佳方竹澄州産方竹杭州亦有之體如削成勁挺可堪為杖亦不讓張騫笻竹杖也其隔州亦出大竹數丈孝竹杭産孝竹冬則筍生叢外以衞母寒夏則筍生叢内以凉母熱其竹榦可作釣竿叢生可愛黄金間碧玉竹杭産竹身金黄每節直嵌翠緑一條不假人為出自天巧也碧玉間黄金杭産竹身全緑每節直嵌金黄一條亦天成也二竹絶妙雪竹廣西産者斑大而色紅如血有暈鈸竹西蜀所産下有尺許花文可愛即卭竹也㯶竹廣之東西咸産之葉如棕櫚畏寒不宜於南桃竹俗名桃絲竹也古姚有之似棕竹而花紋粗質鬆色淡於㯶竹紫竹杭産色紫黑可作笙簫笛管諸用俱可故雅尚者多畜之異竹一十一種涕竹南荒有涕竹長數百丈圍三丈六七尺厚八九寸可以為船其笋甚美可療瘡癘棘竹一名笆竹節皆有棘數十種為叢南夷種以為城堅不可攻或自崩根出大如酒甕縱横相承狀如繰車食之人髪盡落􅓁簩竹􅓁竹皮薄而空徑不餘二寸皮上有粗可為銼子銼甲利勝於鐵若鈍以漿水澆之如舊快利䈄􅀢竹䈄大如脚指腹中白幕攔隔狀如濕麫將成而筒皮未落輒有細虫齧處成赤跡似繡畫可愛慈竹夏月經雨滴汁下地生蓐似鹿角色白食之止痢筋竹南方以為茅刃笋未成竹堪為弩弦百葉竹一枝百葉有毒桃枝竹東官有蕪地西接大海有長洲多桃枝竹緣岸而生癭竹東洛近溪忽有竹生癭大如李羅浮竹羅浮有巨竹萬千竿連至岩谷圍二丈有餘有三十九節節二丈許南方以竹為甑類見之矣童子寺竹唐李衞公言北都童子寺有竹二窠纔長數尺相傳其寺綱每日報竹平安遵生八牋巻十六
