栗子粉取山栗切片晒亁磨成細粉菱角粉去皮如治藕法取粉薑粉以生薑研爛絞汁澄粉用以和羮葛粉去皮如上法取粉開胃止煩渇茯苓粉取苓切片以水浸去赤汁又換水浸一日如上法取粉拌米煑粥補益最佳松栢粉取葉在帶露時採之經隔一宿則無粉矣取嫩葉搗汁澄粉如嫩草欝蔥可愛百合粉取新者搗汁如上法取粉亁者可磨作粉山藥粉取新者如上法乾者可磨作粉蕨粉作餅食之甚妙有治成貨者蓮子粉乾者可磨作粉芋粉取白芋如前法作粉紫者不用蒺藜粉臼中搗去刺皮如上法取粉輕身去風括蔞粉去皮如上法取粉茱茰麵取粉如上法山藥撥魚白麫一斤好荳粉四兩水攪如調糊將煑熟山藥研爛同麫一并調稠用匙逐條撥入滚湯鍋内如魚片候熟以肉汁食之無汁􅋗内加白糖可吃百合麫用百合搗為粉和􅋗捜為餅為麫食亦可已上諸粉不惟取籠為造凡煑粥俱可配煑凡和麫用黒豆汁和之再無麫毒之害脯鮓類五十種千里脯牛羊猪肉皆可精者一斤醲酒二盞淡醋一􅊦白鹽四錢蔥三錢茴香花椒末一錢拌一宿文武火煑令汁亁晒之妙絶可安一月肉鮓名梅葉鮓精肉一斤去筋鹽一兩入炒米粉些少多要酸肉皮三斤滚水焯切薄絲片同精肉切細拌用箬包每餅四兩重冬天灰火焙三日用葢上留一小孔夏天一週時可吃搥脯新宰圏猪帶熱精肉一斤切作四五塊少鹽半兩搙入肉中直待筋脉不收日晒半亁量用好酒和水并花椒蒔蘿橘皮熳火煑亁碎搥火肉以圏猪方殺下只取四隻精腿乘熱用鹽每一斤肉鹽一兩從皮擦入肉内令如綿軟以石壓竹柵上置缸内二十日次第三畨五次用稻柴灰一重間一重疊起用稻草烟熏一日一夜掛有烟處初夏水中浸一日夜淨洗仍前掛之臘肉肥嫩獖猪肉十斤切作二十段鹽八兩酒二斤調勻猛力搙入肉中令如綿軟大石壓去水痕十分亁以剰下所醃酒調糟塗肉上以篾穿掛通風處又法肉十斤先以鹽二十兩煎湯澄清取汁置肉汁中二十日取出掛通風處一法夏月鹽肉炒鹽擦入勻醃一宿掛起見有水㾗便用大石壓去水亁掛風中炙魚鱭魚新出水者治淨炭上十分炙亁收藏一法以鱭魚去頭尾切作段用油炙熟每段用箬間盛瓦罐内泥封水醃魚臘中鯉魚切大塊拭亁一斤用炒鹽四兩擦過淹一宿洗淨晾亁再用鹽二兩糟一斤拌勻入瓮紙篘泥封塗蟹生用生蟹刴碎以麻油先熬熟冷并草果茴香砂仁花椒末水薑楜椒俱為末再加葱鹽醋共十味入蟹内拌勻即時可食魚鮓鯉魚青魚鱸魚鱘魚皆可造治去鱗腸舊筅箒緩刷去脂膩腥血十分令淨掛當風一二日切作小方塊每十斤用生鹽一斤夏月一斤四兩拌勻醃器内冬二十日春秋减之布裹石壓令水十分亁不滑不韌用川椒皮二兩蒔蘿茴香砂仁紅豆各半兩甘草少許皆為麤末淘淨白粳米七八合炊飯生麻油一斤半純白葱絲一斤紅麫一合半搥碎已上俱拌勻磁器或水桶按十分實荷葉葢竹片扎定更以小石壓在上候其日熟春秋最宜造冬天預醃下作坯可留臨用時旋將料物扛拌此都中造法也鱭魚同法但要亁方好肉鮓生燒猪羊腿精批作片以刀背勻搥三兩次切作塊子沸湯隨漉出用布内扭亁每一斤入好醋一盞鹽四錢椒油草果砂仁各少許供饌亦珍美大熝肉肥嫩在圏猪約重四十斤者只取前腿去其脂剔其骨去其拖肚淨取肉一塊切成四五斤塊又切作十字為四方塊白术煑七八分熟撈起停冷搭精肥切作片子厚一指淨去其浮油水用少許厚汁放鍋内先下熝料次下肉又次淘下醬水又次下元汁燒滚又次下末子細熝料在肉上又次下紅麯末以肉汁解薄傾在肉上文武火燒滚令沸直至肉料上下皆紅色方下宿汁略下鹽去醬板次下鰕汁掠去浮油以汁清為度調和得所頓熱用之其肉與汁再不下鍋豉汁鵝同法但不用紅麯加些豆豉擂在汁内捉清汁法以元去浮油用生鰕和醬搗在汁内一邊燒火使鍋中一邊滚起泛來掠去之如無鰕汁以猪肝擂碎和水傾入代之三四次下鰕汁方無一㸃浮油為度留宿汁法宿汁每日煎一滚停貯少時定清方好如不用入錫器内或瓦礶内蓋好掛井中用紅麯法每麯一酒盞許隔宿酒浸令酥研如泥以肉汁解薄下麄熝料方用官桂白芷良薑等分不切完用細熝料方甘草多用官桂白芷良薑桂花檀香霍香細辛甘松花椒宿砂紅豆杏仁等分為細末用凡肉汁要十分清不見浮油方妙肉却不要乾枯帶凍鹽醋魚鮮鯉魚切作小塊鹽醃過醤煑熟收起却下魚鱗及荆芥同煎滚去查候汁稠調和滋味得所錫器蜜盛置井中或水上用濃薑醋澆𤓰虀醬𤓰生薑葱白淡笋亁或茭白鰕米鷄胸肉各等分切作長條絲兒香油炒過供之水鷄亁治淨大水鷄湯中煑浮即撈起以石壓之令十分亁收算條巴子猪肉精肥各另切作三寸長大如算子様以砂糖花椒末宿砂末調和得所拌勻晒亁蒸熟燥子蛤蜊用猪肉肥精相半切作小骰子塊和些酒煑半熟入醤次下花椒砂仁葱白鹽醋和勻再下菉豆粉或􅋗水調下鍋内作膩一滚盛起以蛤蜊先用水煑去壳排在湯鼓子内以燥子肉洗供新韮胡葱菜心猪腰子笋茭白同法爐焙鷄用鷄一隻水煑八分熟刴作小塊鍋内放油少許燒熱放鷄在内略炒以子或椀葢定燒極熱醋酒相半入鹽少許烹之候亁再烹如此數次候十分酥熟取用蒸鰣魚鰣魚去腸不去鱗用布拭去血水放盪鑼内以花椒砂仁醤擂碎水洒葱拌勻其味和蒸去鱗供食酥骨魚大鯽魚治淨用醤水酒少許紫蘇葉大撮甘草些少煑半日候熟供食川猪頭猪頭先以水煑熟切作條子用砂糖花椒砂仁醤拌勻重湯蒸頓煑爛剔骨扎縛作一塊大石壓實作膏糟食釀肚子用猪肚一個治淨釀入石蓮肉洗擦苦皮十分淨白糯米淘淨與蓮肉對半實裹肚子肉用線扎𦂳煑熟壓實候冷切片煑熟肚子將帋鋪地放上用好醋噴肚用鉢葢上少頃取食其肚肉皆厚可食夏月醃肉法用炒過熱鹽擦肉令軟匀下缸内石壓一夜掛起見水㾗即以大石壓亁掛當風處不敗醃猪舌牛舌法每舌一斤用鹽八錢一方用五錢好酒一碗川椒蒔蘿茴香麻油少許細切葱白醃五日翻三四次索穿掛當風處陰亁紙􅋔盛藏煑用風魚法用青魚鯉魚破去腸胃每觔用鹽四五錢醃七日取起洗淨拭亁腮下切一刀將川椒茴香加炒鹽擦入腮内併腹裏外以紙包裹外用麻皮扎成一個挂於當風之處腹内入料多些方妙肉生法用精肉切細薄片子醬油洗淨入火燒紅鍋爆炒去血水㣲白即好取出切成絲再加醬𤓰糟蘿蔔大蒜砂仁草果花椒橘絲香油拌炒肉絲臨食加醋和勻食之甚美魚醬法用魚一斤切碎洗淨後炒鹽三兩花椒一錢茴香一錢亁薑一錢神麯二錢紅麯五錢加酒和勻拌魚肉入磁瓶封好十日可用吃時加葱花少許糟猪頭蹄爪法用猪頭蹄爪煑爛去骨布包攤開大石壓匾實落一宿糟用甚佳酒發魚法用大鯽魚破開去鱗眼腸胃不要見生水用布抹亁每斤用神麯一兩紅麯一兩為末拌炒鹽二兩胡椒茴香川椒亁薑各一兩拌勻􅋔入魚空肚内加料一層共􅏻入罈内包好泥封十二月内造了至正月十五後開又畨一轉入好酒浸滿泥封至四月方熟取吃可留一二年酒醃蝦法用大蝦不見水洗剪去鬚尾每斤用鹽五錢淹半日􅄋亁入瓶中蝦一層放椒三十粒以椒多為妙或用椒拌蝦装入瓶中亦妙装完每斤用鹽三兩好酒化開澆入瓶内封好泥頭春秋五七日即好吃冬月十日方好湖廣鮓法用大鯉魚十觔細切丁香塊子去骨并雜物先用老黄米炒燥碾末約有升半配以炒紅麯升半共為末聽用將魚塊稱有十斤用好酒二碗鹽一斤夏月用鹽一斤四兩拌魚醃磁器内冬醃半月春夏十日取起洗淨布包榨十分亁以川椒二兩砂仁一兩茴香五錢紅豆五錢甘草少許為末麻油一斤八兩葱白頭一斤先合米麯末一升拌和納罈中用石壓實冬月十五日可吃夏月七八日可吃吃時再加椒料米醋為佳水煠肉又名擘燒將猪肉生切作二指大長條子兩面用刀華界如磚堦様次將香油甜醤花椒茴香拌勻將切碎肉揉拌勻了少頃鍋内下猪脂熬油一碗香油一碗水一大碗酒一小碗下料拌肉以浸過為止再加蒜榔一兩蒲葢悶以肉酥起鍋食之如無脂油要油氣故耳清蒸肉用好猪肉煑一滚取淨方塊水漂過刮淨將皮用刀界碎將大小茴香花椒草菓官桂用稀布包作一包放盪鑼内上壓肉塊先將鷄鵝清過好汁調和滋味澆在肉上仍葢大葱醃菜蒜榔入湯鍋内葢住蒸之食時去葱醃菜并包料食之炒羊肚兒將羊肚洗淨細切條子一邊大滚湯鍋一邊熱熬油鍋先將肚子入湯鍋笊籬一焯就將粗布紐亁湯氣就火急落油鍋内炒將熟加葱花蒜片花椒茴香醤油酒醋調勻一烹即起香脆可食如遲慢即潤如皮條難吃炒腰子將猪腰子切開踼去白膜觔絲背面刀界花兒落滚水㣲焯漉起入油鍋一炒加小料葱花芫荽蒜片椒薑醬汁酒醋一烹即起蟶鮓蟶一斤鹽一兩醃一伏時再洗淨控亁布包石壓加熟油五錢薑橘絲五錢鹽一錢葱絲五分酒一大盞飯糝一合磨米拌勻入瓶泥封十日可供魚鮓同又風魚每魚一斤鹽四錢加以花椒砂仁葱花香油薑絲橘細絲醃壓十日挂烟薰處糖炙肉并烘肉巴猪肉去皮骨切作二寸大片將砂糖少許去氣息醬大小􅚬香花椒拌肉見日一晾即收將香油熬熟下肉葢定勿燒火以酥為度肉巴用精嫩切條片鹽少醃之後用椒料拌肉見日一晾炭火鐵床上炙之食醬􅈉糟􅈉醉􅈉三法香油入醬油内亦可久留不砂糟醋酒醤各一碗􅈉多加鹽一碟又法用酒七碗醋三碗鹽二碗醉􅈉亦妙炭一塊則􅈉膏不沙以白芷一錢入醉􅈉則膏結實恐有藥氣不佳晒蝦不變紅色蝦用鹽炒熟盛籮内用井水淋洗去鹽晒亁色紅不變煑魚法凡煑河魚先放水下燒則骨酥江海魚先調滚汁下鍋則骨堅也煑􅈉青色蛤蜊脱丁用柿蒂三五箇同􅈉煑色青用枇杷核内仁同蛤蜊煑脱丁造肉醬法精肉四斤去筋骨醬一斤八兩研細鹽四兩葱白細切一碗川椒茴香陳皮各五六錢用酒拌各料并肉如稠粥入罈封固晒烈日中十餘日開㸔亁再加酒淡再加鹽又封以泥晒之黄雀鮓每隻治淨用酒洗拭亁不犯水用麥黄紅麯鹽椒葱絲嘗味和為止却將雀入匾罈内鋪一層上料一層􅋔實以箬葢篾片竿定候滷出傾去加酒浸宻封久用治食有法條例洗猪肚用麫洗猪臟用砂糖不氣煑笋入薄荷少加鹽或以灰則不蘝糟􅈉罈上加皂角半錠可留久洗魚滴生油一二㸃則無涎煑魚下末香不腥煑鵝下櫻桃葉數片易軟煑陳臘肉將熟取燒紅炭投數塊入鍋内則不油蘝氣煑諸般肉封鍋口用楮實子一二粒同煑易爛又香夏月肉單用醋煑可留十日􅋗不宜生水過用滚湯停冷過之燒肉忌桑柴火醬􅈉糟􅈉忌燈照則沙酒酸用赤小豆一升炒焦袋盛入酒罈中則好染坊􅄋過淡灰晒亁用以包藏生黄𤓰茄子至冬月可食用松毛包藏橘子三四月不亁菉豆藏橘亦可五月以麥麫煑成粥糊入鹽少許候冷傾入甕中收新鮮紅色未熟桃納滿甕中封口至冬月如生宻煎黄梅時換蜜用細辛放頂上不生小蟲用臘水同薄荷一握明礬少許入瓮中投浸枇杷林檎楊梅于中顔色不變味凉可食遵生八牋卷十一
