body:
  text: 遵生八牋卷十二明高濓撰飲饌服食牋中家蔬類皆余手製曾經知味者牋入非漫録也或傳有不同悉聼製度配鹽𤓰菽老𤓰嫩茄合五十斤每斤用淨鹽二兩半先用半兩醃𤓰茄一宿出水次用橘皮五斤新紫蘇連根三斤生薑絲三斤去皮杏仁二斤桂花四兩甘草二兩黄豆一斗煑酒五斤同拌入瓮合滿捺實箬五層竹片捺定箬裹泥封晒日中兩月取出入大椒半斤茴香砂仁各半斤勻晾晒在日内發熱乃酥美黄豆須揀大者煑爛以麩皮罨熱去麩皮淨用糖蒸茄牛奶茄嫩而大者不去蒂直切成六稜每五十斤用鹽一兩拌勻下湯焯令變色􅄋亁用薄荷茴香末入在内砂糖二斤醋半鐘浸三宿晒亁還滷直至滷盡茄亁壓匾收藏之蒜梅青硬梅子二斤大蒜一斤或囊剝淨炒鹽三兩酌量水煎湯停冷浸之候五十日後滷水將變色傾出再煎其水停冷浸之入瓶至七月後食梅無酸味蒜無葷氣也釀𤓰青𤓰堅老而大者切作兩片去穰略用鹽出其水生薑陳皮薄荷紫蘇俱切作絲茴香炒砂仁砂糖拌勻入𤓰内用線扎定成個入醬缸内五六日取出連𤓰晒亁收貯切碎了晒蒜瓜秋間小黄瓜一斤石灰白礬湯焯過控亁鹽半兩醃一宿又鹽半兩剝大蒜瓣三兩搗為泥與瓜拌勻傾入醃下水中熬好酒醋浸着凉處頓放冬瓜茄子同法三煑瓜青瓜堅老者切作兩片每一斤用鹽半兩醤一兩紫蘇甘草少許醃伏時連滷夜煑日晒凡三次煑後晒至兩天留甑上蒸之晒亁收貯蒜苖亁蒜苖切寸段一斤鹽一兩淹出臭水略晾亁拌醤糖少許蒸熟晒亁收藏藏芥芥菜肥者不犯水晒至六七分亁去葉每斤鹽四兩淹一宿取出每莖扎成小把置小瓶中倒􅄋盡其水并煎醃出水同煎取清汁待冷入瓶封固夏月食菉豆芽將菉豆冷水浸兩宿候漲換水淘兩次烘亁預掃地潔淨以水洒濕鋪紙一層置豆於紙上以盆葢之一日兩次洒水候芽長淘去壳沸湯略焯薑醋和之肉燥尤宜芥辣三年陳芥子碾細水調捺實椀内韌紙封固沸湯三五次泡出黄水覆冷地上頃後有氣入淡醋解開布濾去查又法加細辛二三分更辣醬佛手香櫞梨子梨子帶皮入醬缸内久而不壊香櫞去穰醬皮佛手全醬新橘皮石花􅋗筋皆可醬食其味更佳糟茄子法五茄六糟鹽十七更加河水甜如蜜茄子五斤糟六斤鹽十七兩河水兩小碗拌糟其茄味自甜此藏茄法也非暴用者又方中様晩茄水浸一宿每斤用鹽四兩糟一斤亦妙糟薑方薑一斤糟一斤鹽五兩揀社日前可糟不要見水不可損了薑皮用亁布擦去泥晒半亁後糟鹽拌之入甕糖醋瓜用六月伏旋摘白生𤓰以五十斤為率破作兩片去其練切作寸許大厚三分三刀塊子然後將籮盛於水洗淨每十斤用鹽五兩缸内鹽之約一個時翻轉再過半時􅄋起攤在蘆蓆上猛日中晒令半亁先切橘皮絲薑絲花椒皮炒鹽篩淨將好醋下鍋煎沸每十斤用醋二十二兩五錢好砂糖十兩入鹽醋内傾於器中候冷將瓜亁薑椒等入醋拌勻過宿翻轉又一宿再翻後收藏只要泡洗器具亁淨斷水跡向陰處收藏素笋鮓用好麩六七個扯如小指大條子秤五斤入湯内煑三四沸捺在筲箕内帶熱榨亁先焙蒔蘿茴香共半合碾碎不可細了揀花椒片小半合赤麯米大半合以湯泡軟披葱頭須半碗杏仁一合許去皮尖擂碎用酒調湯熬油二兩於鍋内候熟住火先傾杏仁入油沸過次下麩及料物用鐵鏟頻翻三四轉嘗其鹹淡逐漸笊於器中將温赤麯旋摻入捺實以荷葉葢上用竹片拴定以石壓之三四箇時辰可用又笋鮓方春間取嫩笋剝淨去老頭切作四分大一寸長塊上籠蒸熟以布包裹榨作極亁投於器中下油用製造與麩鮓同糟蘿蔔方蘿蔔一斤鹽三兩以蘿蔔不要見水揩淨帶須半根晒亁糟與鹽拌過次入蘿蔔又拌過入甕此方非暴吃者做蒜苖方苖用些少鹽淹一宿晾亁湯焯過又晾亁以甘草湯拌過上甑蒸之晒亁入甕三和菜淡醋一分酒一分水一分鹽甘草調和其味得所煎滚下菜薑絲橘皮絲各少許白芷一二小片糝菜上重湯頓勿令開至熟食之暴虀菘菜嫩莖湯焯半熟紐亁切作碎段少加油略炒過入器内加醋些少停片時食之胡蘿蔔菜取紅細胡蘿蔔切片同切芥菜入醋略醃片時食之甚脆仍用鹽些少大小茴香薑橘皮絲同醋共拌醃食胡蘿蔔鮓俗名紅蘿蔔也切作片子滚湯略焯控亁入少許茐花大小茴香薑橘絲花椒末紅麯研爛同鹽拌勻罨一時食之又方白蘿蔔茭白生切笋煑熟三物俱同此法作鮓可供晒淡笋亁鮮笋猫兒頭不拘多少去皮切片條沸湯焯過晒亁收貯用時米泔水浸軟色白如銀鹽湯焯即醃笋乾蒜菜用嫩白冬菜切寸段每十斤用炒鹽四兩每醋一碗水二碗浸菜於瓮内做瓜用堅硬生瓜切開去穰揩亁不要犯水切三角小塊以十斤為率用鹽半斤放在大盆内浸一宿明早以麻布袋之用石壓亁蒔蘿茴香花椒橘皮紫蘇生薑各五錢俱切絲和瓜拌勻好砂糖十兩上醋一碗碾糖極爛以磁器盛之把在日中晒數翻轉以汁盡為度亁則入瓶收貯淡茄亁方用大茄洗淨鍋内煑過不要見水擘開用石壓亁趂日色晴先把瓦晒熱攤茄子於瓦上以亁為度藏至正二月内和物勻食其味如新茄之味十香鹹豉方生瓜并茄子相半每十斤為率用鹽十二兩先將内四兩醃一宿􅄋亁生薑絲半斤活紫蘇連梗切斷半斤甘草末半兩花椒揀去梗核碾碎二兩茴香一兩蒔蘿一兩砂仁二兩藿葉半兩如無亦罷先五日將大黄豆一升煑爛用炒麩皮一升拌罨做黄子待熱過篩去麩皮止用豆䜴用酒一瓶醋糟大半碗與前物共和打拌泡亁淨瓮入之捺實用箬四五重葢之竹片廿字扦定再將紙篛扎瓮口泥封晒日中至四十日取出略㫰亁入瓮收之如晒可二十日轉過瓮使日色週遍又造芥辣法用芥菜子一合入擂盆研細用醋一小盞以水和之再用細絹擠出汁置水缸凉處臨用時再加醬油醋調勻其辣無比其味極妙芝蔴醬方熟芝蔴一斗搗爛用六月六日水煎滚晾冷用罈調勻水淹一手指封口晒五七日後開罈將黑皮去後加好酒釀糟三碗好醬油三碗好酒二碗紅麯末一升炒菉荳一升炒米一升小茴香末一兩和勻過二七日後用盤醬瓜茄法黄子一斤瓜一斤鹽四兩將瓜擦原醃𤓰水拌勻醬黄每日盤二次七七四十九日入罈亁閉瓮菜菜十斤炒鹽四十兩用缸醃菜一皮菜一皮鹽醃三日取起菜入盆内揉一次將另過一缸鹽瀂收起聽用又過三日又將菜取起又揉一次將菜另過一缸留鹽汁聽用如此九遍完入瓮内一層菜上洒花椒小茴香一層又装菜如此𦂳𦂳實實装好將前留起菜瀂每罈洨三碗泥起過年可吃撤拌和菜將麻油入花椒先時熬一二滚收起臨用時將油倒一碗入醬油醋白糖些少調和得法安起凡物用油拌的即倒上些少拌吃絶妙如拌白菜荳芽水芹須將菜入滚水焯熟入清水漂着臨用時榨亁拌油方吃菜色青翠不黑又脆可口水豆豉法將黄子十斤好鹽四十兩金華甜酒十碗先日用滚湯二十碗充調鹽作瀂留冷淀清聽用將黄子下缸入酒入鹽水晒四十九日完方下大小茴香各三兩草果官桂五錢木香三錢陳皮絲一兩花椒一兩亁薑絲半斤杏仁一斤各料和入缸内又晒又打三日將罈装起隔年吃方好蘸肉吃更妙倒纛菜每菜一百斤用鹽五十兩醃了入罈装實用鹽瀂調毛灰如亁􅋗糊口上攤過封好不必草寒辣芥菜清燒用芥菜不要落水晾亁軟了用滚湯一焯就起笊籬撈在篩子内晾冷將焯菜湯晾冷將篩子内菜用鬆鹽些少撒拌入瓶後加晾冷菜瀂洨上包好安頓冷地上蒸亁菜將大窠好菜擇洗淨亁入沸湯内焯五六分熟晒亁用鹽醬蒔蘿花椒砂糖橘皮同煑極熟又晒亁并蒸片時以磁器收貯用時着香油揉㣲用醋飯上蒸食鵪鶉茄揀嫩茄切作細縷沸湯焯過控亁用鹽醬花椒蒔蘿茴香甘草陳皮杏仁紅豆研細末拌勻晒亁蒸過收之用時以滚湯泡軟蘸香油煠之食香瓜茄不拘多少切作棊子每斤用鹽八錢食香同瓜拌勻於缸内醃一二日取出控亁日晒晩復入滷水内次日又取出晒凡經三次勿令太亁装入罈内用糟瓜茄𤓰茄等物每五斤鹽十兩和糟拌勻用銅錢五十文逐層鋪上經十日取錢不用别換糟入瓶收久翠色如新茭白鮓鮮茭切作片子焯過控亁以細蔥絲蒔蘿茴香花椒紅麯研爛并鹽拌勻同醃一時食藕梢鮓同此造法糖醋茄取新嫩茄切三角塊沸湯漉過布包榨亁鹽淹一宿晒亁用薑絲紫蘇拌勻煎滚糖醋潑浸收入磁器内瓜同此法糟薑社前取嫩薑不拘多少去蘆擦淨用酒和糟鹽拌勻入磁罈中上加沙糖一塊箬葉紥口泥封七日可食醃鹽菜白菜削去根及黄老葉洗淨控亁每菜十斤用鹽十兩甘草數莖以淨瓮盛之將鹽撒入菜丫内擺於瓮中入蒔蘿少許以手按實至半瓮再入甘草數莖候滿瓮用磚石壓定醃三日後將菜倒過扭去滷水於亁淨器内另放忌生水却將滷水澆菜内候七日依前法再倒用新汲水渰浸仍用磚石壓之其菜味羙香脆若至春間食不盡者於沸湯内焯過晒亁收之夏間將菜温水浸過壓亁入香油拌勻以磁碗盛於飯上蒸過食之蒜冬瓜揀大者去皮穰切如一指闊以白礬石灰煎湯焯過漉出控亁每斤用鹽二兩蒜瓣三兩搗碎同冬瓜装入磁器添以熬過好醋浸之醃鹽韭法霜前揀肥韭無黄梢者擇淨洗控亁於磁盆中鋪韭一層糝鹽一層候鹽韭勻鋪盡為度醃一二宿翻數次装入磁器内用原滷加香油少許尤妙或就韭内醃小黄𤓰小茄兒别用鹽醃去水韭内拌勻收貯造榖菜法用春不老菜臺去葉洗淨切碎如錢眼子大晒亁水氣勿令太亁以薑絲炒黄豆瓣每菜一斤用鹽一兩入食香相停揉回滷性装入礶内候熟隨用黄芽菜將白菜割去梗葉止留菜心仍離地二寸許以糞土壅平用大缸覆之缸外以土宻壅勿令透氣半月後取食其味最佳又黄芽韭薑芽蘿蔔芽川芎芽其法亦同酒豆豉方黄子一斗五升篩去􅋗令淨茄五斤瓜十二斤薑觔十四兩橘絲隨放小茴香一升炒鹽四斤六兩青椒一斤一處拌入瓮中捺實傾金華酒或酒娘醃過各物兩寸許紙箬札縳泥封露四十九日罈上寫東西字記號輪晒日滿傾大盆内晒亁為度以黄草布罩葢紅鹽荳先將鹽霜梅一個安在鍋底下淘淨大粒青豆葢梅又將豆中作一窩下鹽在内用蘇木煎水入白礬些少沿鍋四邊澆下平豆為度用火燒亁豆熟鹽又不泛而紅五美薑嫩薑一斤切片用白梅半斤打碎去仁入炒鹽二兩拌勻晒三日次入甘松一錢甘草五錢檀香末二錢又拌晒三日收用醃芥菜每菜十斤用鹽八兩爲則十月内採鮮嫩芥菜切碎湯焯帶水撈於盆内與生萵苣熟麻油芥花芝麻鹽拌勻實於瓮内三五日吃至春不變食香蘿蔔每蘿蔔十斤用鹽八兩淹之切作骰子大鹽醃一宿日中晒亁切薑橘絲大小茴香拌勻煎滚熟醋澆上用磁瓶盆盛日中晒亁收貯糟蘿蔔茭苩笋菜瓜茄等物用石灰白礬煎湯冷定將前物浸一伏時將酒滚熱泡糟入鹽又入銅錢一二文量糟多少加入醃十日取起另換好糟入鹽酒拌入罈内收貯箬扎泥封五辣醋方醬一匙醋一錢白糖一錢花椒五七粒胡椒一二粒生薑一分或加大蒜一二蒲更妙野䔩類余所選者與王西樓逺甚皆人所知可食者方敢録存非王所擇有所為而然也黄香萱夏時採花洗淨用湯焯拌料可食入熝素品如荳腐之類極佳凡欲食此野菜品者須要采洗潔淨仍看葉背心科小蟲不令誤食先辦料頭每醋一大酒鍾入甘草末三分白糖霜一錢蔴油半盞和起作拌菜料頭或加搗薑些少又是一製凡花菜采來洗淨滚湯焯起速入水漂一時然後取起榨亁拌料供食其色青翠不變如生且又脆嫩不爛更多風味家菜亦如此法他若炙􅘤作虀不在此製甘菊苖甘菊花春夏旺苖嫩頭采來湯焯如前法食之以甘草水和山藥粉拖苖油煠其香羙佳甚枸杞頭枸杞子嫩葉及苖頭采取如上食法可用以煑粥更妙四時惟冬食子菱科夏秋采之去葉去根惟留梗上圓科如上法熟食亦佳糟食更美野菜中第一品也蓴菜四月采之滚水一焯落水漂用以薑醋食之亦可作肉羮亦可野莧菜夏采熟食拌料炒食俱可比家莧更美野白薺四時采嫩者生熟可食野蘿蔔菜似蘿蔔可采根苖熟食蔞蒿春初採心苖入茶最香葉可熟食夏秋莖可作虀黄連頭即藥中黄連采頭鹽醃晒亁入茶最佳或以熟食亦美水芹菜春月采取滚水焯過薑醋蔴油拌食香甚或湯内加鹽焯過晒亁或就入菜供亦妙茉莉葉茉莉花嫩葉采洗淨同荳腐熝食絶品鵞脚花採單瓣者可食千瓣者傷人湯焯加鹽拌料亦可熝食如入瓜虀炒食俱可春時食苖梔子花一名薝蔔採花洗淨水漂去腥用􅋗入糖鹽作糊花拖油煠食金荳兒即决明子採荳湯焯可供茶料香美甘口金雀花春初採花鹽湯焯可充茶料拌料亦可供饌紫花兒花葉皆可食香春芽採頭芽湯焯少加鹽晒亁可留年餘以芝蔴拌供新者可入茶最宜炒􅋗觔食佳熝豆腐素菜無一不可蓬蒿採嫩頭二三月中方盛取來洗淨加鹽少醃和粉作餅油煠香美可食灰莧菜採成科熟食煎炒俱可比家莧更美桑菌柳菌俱可食採以同素品熝食鵞膓草粗者是採可焯熟拌料食之鷄腸草同上食綿絮頭色白生田埂上採洗淨搗如綿同粉􅋗作餅食蕎麥葉八九月採初出嫩葉熟食西洋太紫七八月採葉熝豆腐上品蘑菇採取晒亁生食作羮美不可言素食中之佳品也竹菇此更鮮美熟食無不可者金蓮花夏採葉梗浮水靣湯焯薑醋油拌食之天茄兒鹽焯供茶薑醋拌供饌㸔麥娘隨麥生隴上春采熟食狗脚跡生霜降時葉如狗脚採以熟食斜蒿三四月生小者全料可用大者摘嫩頭湯中焯過晒亁食時再用湯泡料拌食之眼子菜六七月採生水澤中青葉紫背莖柔滑細長數尺採以湯焯熟食地􅂿葉一名地耳春夏中生兩耳雨後採用薑醋熟食日出即没而亁枝窩螺薺正二月採之熟食馬齒莧初夏採沸湯焯過晒亁冬月旋食馬蘭頭二三月叢生熟食又可作虀茵陳蒿即青蒿兒春時採之和􅋗作餅炊食雁兒腸二月生如荳芽菜熟食生亦可食野茭白菜初夏生水澤傍即茭芽兒也熟食倒灌薺採之熟食亦可作虀苦蔴薹三月採用葉搗和􅋗作餅食之黄花兒正二月採熟食野荸薺四時採生熟可食野菉荳葉莖似菉荳而小生野田多藤蔓生熟皆可食油灼灼生水邊葉光澤生熟皆可食又可醃作亁菜蒸食板蕎蕎正二月採之炊食三四月不可食矣碎米薺三月採止可作虀天藕兒根如藕而小炊熟作藕菜拌料食之葉不可食蚕荳苖二月採為茹麻油炒下鹽醬煑之少加薑茐蒼耳菜採嫩葉洗焯以薑鹽苦酒拌食去風濕子可雜米粉為糗芙蓉花採花去心蒂滚湯泡一二次同豆腐少加胡椒紅白可愛葵菜比蜀葵叢短而葉大性温採葉與作菜羮同法食丹桂花採花洒以甘草水和米舂粉作糕清香滿頰萵苣菜采梗去葉去皮寸切以滚湯泡之加薑油糖醋拌之牛蒡子十月採根洗淨煑毋太甚取起搥碎匾壓亁以鹽醬蘿薑椒熟油諸料拌浸一二日收起焙亁如肉脯味槐角葉採嫩葉細淨者搗為汁和􅋗作淘以醯醬為熟虀食椿樹根秋前採根搗篩和􅋗作小􅋗塊清水煑服百合根採根瓣晒亁和􅋗作湯餅蒸食甚益氣血括蔞根深掘大根削皮至白寸切水浸一日一換至五七日後收起搗為漿末以絹濾其細漿粉候亁為粉和稉米為粥加以乳酪食之甚補凋菰米凋菰即今胡穄也曝亁礲洗造飯香不可言錦帶花採花作羮柔脆可食菖蒲石菖蒲白术煑為末每一斤用山藥三斤煉宻水和入麫内作餅蒸食李子取大李子剜去核用白梅甘草泡滚湯焯之以白糖和松子㰖仁研末塡入甑上蒸熟食之山芋頭採芋為片用榧子煑過去苦杏仁為末少加醬水或鹽和麫將芋片拖煎食之東風薺即薺菜也採薺一二升洗淨入淘米三合水三升生薑一芽頭搥碎同入釜中和勻上澆麻油一蜆殻再不可動以火煑之動則生油氣也不着一些鹽醋若知此味海陸八珍皆可厭也玉簮花採半開蕋分作二片或四片拖麫煎食若少加鹽白糖入麫調勻拖之味甚香美梔子花又一法再録採半開花􅈨水焯過入細茐絲大小茴香花椒紅麯黄米飯研爛同鹽拌勻醃壓半日食之用􅈨焯過用蜜煎之其味亦美水菌用朽桑木樟木楠木截成一尺長段臈月掃爛葉擇肥陰地和木埋于深畦如種菜法春月用米泔水澆灌不時菌出逐日灌以三次即大如拳採同素菜炒食作脯俱美木上生者且不傷人藤花採花洗淨鹽湯洒拌勻入甑蒸熟晒亁可作食餡子美甚葷用亦佳江薺生臘月生熟皆可食花時勿食但可作虀商陸採苖莖洗淨熟蒸食加鹽料紫色者味佳牛膝採苖如剪韭法可食湖藕採生者截作寸塊湯焯鹽醃去水茐油少許薑橘絲大小茴香黄米飯研爛細拌荷葉包壓隔宿食之防風採苖可作菜食湯焯料拌極去瘋芭蕉蕉有二種根粘者為糯焦可食取根切作手大片子灰汁煑令熟去灰汁又以清水煑易以二次令灰味盡取壓亁以鹽醬大小茴香花胡椒亁薑熟油研拌蕉根入矼鉢中醃一二日取出少焙略􅒱令軟食之全似肥肉水菜状似白菜七八月間生田頭水岸叢聚色青湯焯醬煑可食蓮房取嫩去皮子並蒂入灰煑又以清水煑去灰味同蕉脯法焙亁石壓令匾作片食之苦益菜即胡麻取嫩葉作羮大甘脆清松花蕋採去赤皮取嫩白者蜜漬之畧燒令蜜熟勿太熟極香脆美白芷採嫩根蜜漬糟藏皆可食防風芽採芽如胭脂色者如嘗菜料拌食之天門冬芽川芎芽水藻芽牛膝芽菊花芽荇菜芽同上拌料熟食水苔春初採嫩者淘擇令極淨更要去沙石䖝子以石壓亁入鹽油花椒切韭芽同拌入瓶再加醋薑食之甚美又可油炒加鹽醬亦善蒲蘆芽採嫩芽切斷以湯焯布裹壓乾加料如前作鮓妙甚鳳仙花梗採梗肥大者去皮削令亁淨早入糟午間食之紅花子採子淘去浮者碓内搗碎入湯泡汁更搗更煎汁鍋内沸入醋㸃住絹挹之似肥肉入素供極精金雀花春初開形狀金雀朶朶可摘用湯焯作茶供或以糖霜油醋拌之可作菜甚清寒豆芽用寒豆淘淨將蒲包趂濕包裹春冬置炕傍近火處夏秋不必日以水噴之芽出去殻洗淨湯焯入茶供芽長作菜食黄豆芽大黄豆如上法待其出芽些少許取起淘去殻洗淨煑熟加以香藎橙絲木耳佛手柑絲拌勻多著麻油糖霜入醋拌供羙甚醖造類此皆山人家養生之酒非甜即藥與常品逈異豪飲者勿共語也桃源酒白麯二十兩剉如棗核水一斗浸之待發糯米一斗淘極淨炊作爛飯攤冷以四時消息氣候投放麯汁中攪如稠粥候發即更投二斗米飯嘗之或不似酒勿怪候發又二斗米飯其酒即成矣如天氣稍煖熟後三五日甕頭有澄清者先取飲之縱令酣酌亦無傷也此本武陵桃源中得之後被齊民要術中採掇編錄皆失其妙此獨眞本也今商議以空水浸米尤妙每造一斗水煑取一升澄清汁浸麯俟發經一日炊飯候冷即出瓮中以麯麥和還入瓮中每投皆如此其第三第五皆待酒發後經一日投之五投畢待發定訖一二日可壓即大半化為酒如味硬即每一斗蒸三升糯米取大麥蘖麯一大匙白麯末一大分熟之和葛布袋中納入酒甏候甘美即去其袋然造酒北方地寒即如人氣投之南方地煖即須至冷為佳也香雪酒用糯米一石先取九斗淘淋極清無渾脚為度以桶量米准作數米與水對充水宜多一斗以補米脚浸于缸内後用一斗米如前淘淋炊飯埋米上草葢覆缸口二十餘日候浮先􅄋飯殻次􅄋起米控亁炊飯乘熟用原浸米水澄去水脚白麯作小塊二十斤拌勻米壳蒸熟放缸底如天氣熱畧出火氣打拌勻後葢缸口一週時打頭杷打後不用葢半週時打第二杷如天氣熱須再打出熱氣三扒打絶仍葢缸口候熟如用常法大抵米要精白淘淋要清淨杷要打得熟氣透則不致敗耳碧香酒糯米一斗淘淋清淨内將九升浸瓮内一升炊飯拌白麯末四兩用篘埋所浸米内候飯浮撈起蒸九升米飯拌白麯末十六兩先將淨飯置瓮底次以浸米飯置瓮内以原淘米漿水十斤或二十斤以紙四五重蜜封瓮口春數日如天寒一月熟臘酒用糯米二石水與酵二百斤足秤白麯四十斤足秤酸飯二斗或用米二斗起酵其味醲而辣正臘中造煑時大眼籃二箇輪置酒瓶在湯内與湯齊滚取出建昌紅酒用好糯米一石淘淨傾缸内中留一窩内傾下水一石二斗另取糯米二斗煑飯攤冷作一團放窝内葢訖待二十餘日飯浮漿酸摝去浮飯􅄋亁浸米先將米五斗淘淨鋪於甑底將濕米次第上去米熟畧攤氣絶翻在缸内中葢下取浸米漿八斗花椒一兩煎沸出鍋待冷用白麯三斤搥細好酵母三碗飯多少加常酒放酵法不要厚了天道極冷放煖處用草圍一宿明日早將飯分作五處每放小缸中用紅麯一升白麯半升取酵亦作五分每分和前麯飯同拌勻􅂿在缸内將餘在熟盡放靣上葢定候二日打扒如靣厚三五日打不遍打後靣浮漲足再打一遍仍葢下十一月二十日熟十二月一月熟正月二十日熟餘月不宜造榨取澄清併入白檀少許包裹泥定頭糟用熟水隨意副入多二宿便可榨五香燒酒每料糯米五斗細麯十五斤白燒酒三大罈檀香木香乳香川芎没藥各一兩五錢丁香五錢人參四兩各為末白糖霜十五斤胡桃肉二百箇紅棗三升去核先將米蒸熟晾冷炤嘗下酒法則要落在瓮口缸内好封口待發㣲熱入糖并燒酒香料桃棗等物在内將缸口厚封不令出氣每七日開打一次仍封至七七日上榨如嘗服一二杯以醃物壓之有春風和煦之妙山芋酒用山藥一斤酥油三兩蓮肉三兩氷片半分同研如彈每酒一壺投藥一二丸熟服有益葡萄酒法用葡蔔子取汁一斗用麯四兩攪勻入瓮内封口自然成酒更有異香又一法用蜜三斤水一斗同煎入瓶内候温入麯末二兩白酵二兩濕紙封口放淨處春秋五日夏三日冬七日自然成酒且佳行功𨗳引之時飲一二杯百脉流暢氣運無滯助道所當不廢黄精酒用黄精四斤天門冬去心三斤松針六斤白术四斤枸杞五斤俱生用納釜中以水三石煑之一日去渣以清汁浸麯如家醖法酒熟取清任意食之主除百病延年變鬚髪生齒牙功妙無量白术酒白术二十五斤切片以東流水二石五斗浸缸中二十日去滓傾汁大盆中夜露天井中五夜汁變成血取以浸麯作酒取清服除病延年變髪堅齒靣有光澤久服長年地黄酒用肥大地黄切一大斗搗碎糯米五升作飯麯一大升三物于盆中揉熟相勻傾入瓮中泥封春夏二十一日秋冬須二十五日開日開㸔上有一盞緑液是其精華先取飲之餘以生布絞汁如飴收貯味極甘美功効同前菖蒲酒取九節菖蒲生搗絞汁五斗糯米五斗炊飯細麯五斤相拌令勻入磁罈蜜葢二十一日即開温服日三服之通血脉滋榮胃治風痺骨立痿黄醫不能治服一劑百日後顔色光彩足力倍嘗耳目聰明髪白變黒齒落更生夜有光明延年益壽功不盡述羊羔酒糯米一石如常法浸漿肥羊肉七斤麯十四兩杏仁一斤煑去苦水又同羊肉多湯煑爛留汁七斗拌前米飯加木香一兩同醖不得犯水十日可吃味極甘滑天門冬酒醇酒一斗用六月六日麯米一升好糯米五升作飲天門冬煎五升米須淘訖晒亁取天門冬汁浸先將酒浸麯如嘗法候熟炊飯適寒温用煎汁和飯令相入投之春夏七日勤㸔勿令熟秋冬十日熟東坡詩云天門冬熟新年喜麯米春香並舍聞是也松花酒三月取松花如䑕尾者細挫一升用絹袋盛之造白酒熟時投袋於酒中心井内浸三日取出漉酒飲之其味清香甘美菊花酒十月採甘菊花去蒂只取花二斤擇淨入醅内攪勻次早榨則味香清洌凡一切有香之花如桂花蘭花薔􅅔皆可倣此為之五加皮三骰酒法用五加根莖牛膝丹參枸杞根金銀花松節枳殻枝葉各用一大斗以水三大石於大釜中煑取六大斗去滓澄清水凖凡水數浸麯即用米五大斗炊飰取生地黄一斗搗如泥拌下二次用米五斗炊飰取牛旁子根細切二斗搗如泥拌飯下三次用米二斗炊飯大萆蔴子一斗熬搗令細拌飯下之候稍冷熱一依常法酒味好即去糟飲之酒冷不發加以麯末投之味苦薄再炊米二斗投之若飯亁不發取諸藥物煎汁熱投候熟去糟時常飲之多少常令有酒氣男女可服亦無所忌服之去風勞冷氣身中積滯宿疾令人肥徤行如奔馬功妙更多麯類造酒美惡全在曲精水潔故麯為要藥若麯失其妙酒何取焉故錄麯之妙方于後白麯白􅋗一担糯米粉一斗水拌令亁濕調勻篩子格過􅂿成餅子紙包挂當風處五十日取下日晒夜露每米一斗下麯十兩内府秘傳麯方白麵一百斤黄米四斗菉豆三斗先將荳磨去殻將殻簸出水浸放置一處聽用次將黄米磨末入􅋗并豆末和作一處將收起荳殻浸水傾入米􅋗荳末内和起如亁再加浸荳殻水以可捻成塊為凖􅂿作方麯以實為佳以粗卓晒六十日三伏内做方好造酒每石入麯七斤不可多放其酒清冽蓮花麯蓮花三斤白􅋗一百五十兩菉荳三斗糯米三斗俱磨為末川椒八兩如常造􅂿金莖露麯􅋗十五斤菉豆三斗糯米三斗為末􅂿襄陵麯􅋗一百五十斤糯米三斗磨末蜜五斤川椒八兩紅白酒藥用草菓五箇青皮官桂砂仁良薑茱茰光烏各二斤陳皮黄栢香附子蒼术亁薑甘菊花杏仁各一斤薑黄薄荷各半斤每藥料共稱一斤配糯米粉一斗辣蓼二斤或五斤水薑二斤搗汁和滑石末一斤四兩如常法盫之上料更加畢撥丁香細辛三頼益智丁皮砂仁各四兩東陽酒麯白􅋗一百斤桃仁三斤杏仁三斤草烏一斤烏頭三斤去皮可减去其半菉荳五升煑氣木香四兩官桂八兩辣蓼十斤水浸七日􅄋母藤十斤蒼耳草十斤二桑葉包同蓼草三味入鍋煎煑菉荳每石米内放麯十斤多則不妙蓼麯用糯米不拘多少以蓼搗汁浸一宿漉出以􅋗拌勻少頃篩出浮􅋗用厚紙袋盛之挂通風處夏月製之兩月后可用以之造酒極醇美可佳遵生八牋卷十二
