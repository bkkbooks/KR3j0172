body:
  text: 遵生八牋卷三明髙濓撰四時調攝牋髙子曰時之義大矣天下之事未有外時以成者也故聖人與四時合其序而月令一書尤養生家之不可少者余録四時隂陽運用之機而配以五臟寒温順逆之義因時系以方藥導引之功該日載以合宜合忌之事不務博而信怪誕不經之條若服商陸見地藏之寳掘富家土而禳貧者得富此類悉刪去而不存不尚簡而棄禦災防患之術如玉經八方祛瘟符籙坐功圖像類此竝増入而不置隨時敘以逸事幽賞之條和其性靈恱其心志人能順時調攝神藥頻飡勤以導引之功慎以宜忌之要無競無營與時消息則疾病可逺夀命可延誠日用不可去身豈曰小補云耳録成箋曰四時調攝春三月調攝總類尚書大傳曰東方為春春者出也萬物之所出也淮南子曰春為規規者所以圜萬物也規度不失萬物乃理漢律志曰少陽東也東者動也陽氣動物於時為春故君子當審時氣節宣調攝以衛其生正月立春木相春分木旺立夏木休夏至木廢立秋木死立冬木歿冬至木胎言木孕於水之中矣歲時變嘗災害之萌也余特録其變應於疾病者分列於四時使遵生者懼害預防慎攝自保毋困於時變其他水旱凶荒兵革流移余未之信也不敢録正月朔忌北風主人民多病忌大霧主多瘟災忌雨雹主多瘡疥之疾忌月内發電主人民多殃七日忌風雨主民災忌行秋令主多疫二月忌東北雷主病西北多疫春分忌晴主病三月朔忌風雨主多病忌行夏令主多疫臟腑配經絡圖一臟一腑為表裏一經一絡應隂陽肺手太隂大腸手陽明小腸手太陽心手少隂三焦手少陽包絡手厥隂脾足太隂胃足陽明腎足少隂肝足厥隂膀胱足太陽膽足少陽人身脉運於中血氣周流不已三陽三隂之中有陽明者為兩陽合明厥隂者為兩隂交盡也經絡配四時圖天時十二月人身十二經地支十二位手經絡應天足經絡應地寅手少陽三焦已手厥隂心春主生卯手陽明大腸夏主長午手少隂心辰手太陽小腸未手太隂肺申足少陽膽亥足厥隂肝秋主殺酉足陽明胃冬主歿子足少隂腎戌足太陽膀胱丑足太隂脾肝臟春旺論膽附肝下肝屬木為青帝卦屬震神形青龍象如懸匏肝者榦也狀如枝榦居在下少近心左三葉右四葉色如縞映紺肝為心母為腎子肝中有三神名曰爽靈胎光幽精也夜卧及平旦扣齒三十六通呼肝神名使神清氣爽目為之宫左目為甲右目為乙男子至六十肝氣衰肝葉薄膽漸減目即昏昏然在形為觔肝脉合於木魂之藏也於液為淚腎邪入肝故多淚六府膽為肝之府膽與肝合也故肝氣通則分五色肝實則目黃赤肝合於脉其榮爪也肝之合也觔緩脈而不自持者肝先死也目為甲乙辰為寅卯音屬角味酸其嗅臊羶心邪入肝則惡羶肝之外應東岳上通歲星之精春三月嘗存歳星青氣入於肝故肝虚者觔急也皮枯者肝熱也肌肉班㸃者肝風也人之色青者肝盛也人好食酸味者肝不足也人之髪枯者肝傷也人之手足多汗者肝方無病肺邪入肝則多笑治肝病當用呼為瀉吸為補其氣仁好行仁恵傷憫之情故聞悲則淚出也故春三月木王天地氣生欲安其神者當澤及羣蒭恩沾庶類無竭川澤毋漉陂塘毋傷萌芽好生勿殺以合太清以合天地生育之氣夜卧早起以合乎道若逆之則毛骨不榮金木相尅而諸病生矣相肝臟病法肝熱者左頰赤肝病者目奪而脇下痛引小腹令人喜怒肝虛則恐如人將捕之實則怒虚則寒寒則隂氣壯夢見山林肝氣逆則頭痛脇痛耳聾頰腫肝病欲散急食辛以散之用酸以補之當避風肝惡風也肝病臍左有動氣按之牢若痛支滿淋溲大小便難好轉筋肝有病則昏昏好睡眼生膜視物不明飛蠅上下肝肉振睛或生暈映冷淚兩角赤痒當服升麻散方見玉經八方後修養肝臟法以春三月朔旦東面平坐叩齒三通閉氣九息吸震宫青氣入口九吞之以補肝虚受損以享青龍之榮六氣治肝法秘訣曰嘘以治肝要兩目睜開為之口吐鼻取不使耳聞治肝臟用嘘法以鼻漸漸引長氣以口嘘之肝病用大嘘三十遍以目睁起以出肝邪氣去肝家邪熱亦去四肢壯熱眼昏胬肉赤紅風痒等症數嘘之綿綿相次不絶為妙疾平即止不可過多為之則損肝氣病止又恐肝虚當以嘘字作吸氣之聲以補之使肝不虚而他臟之邪不得以入也大凡六字之訣不可太重恐損真氣人能常令心志内守不為怒動而生喜恱則肝病不生故春三月木旺天地氣生萬物榮茂欲安其神者當止殺傷則合乎太清以順天地發生之氣夜卧早起以合養生之道黃帝製春季所服竒方黃帝曰春三月服何藥岐伯曰男子有患五勞七傷隂囊消縮囊下生瘡腰背疼痛不得俛仰筋脈􅂒冷或時熱癢或時浮腫難以行步因風淚出逺視茫然咳逆上充身體痿黃氣脹臍痛膀胱攣急小便出血莖管隂子疼痛或淋瀝赤黃汚衣或夢寐多驚口乾舌強皆犯七傷此藥主之茯苓五錢食不消加一錢菖蒲五錢患耳加一錢括蔞四錢熱渇加五錢牛膝五錢腰痛加一錢山茱萸五錢身痒加一錢􅊵絲子五錢隂痿加一錢巴㦸天四錢隂痿加五分細辛四錢視茫加五分續斷五錢有瘡加一錢防風五錢風邪加一錢山藥五錢隂濕痒加一錢天雄三錢風痒加五分蛇床子四錢炁促加五分栢子仁五錢氣力不足加一錢逺志五錢驚悸加一錢石斛五錢身皮痛加一錢杜仲五錢腸痛加一錢蓯蓉四錢隂萎加一錢右一十八味各依法製度搗為細末煉蜜為丸如蠶荳大毎服三丸加至五七丸三飡食前服之服至一月百病消滅體氣平復神妙無比肝臟導引法正二月三月行之治肝以兩手相重按肩上徐徐緩綟身左右各三遍又可正坐兩手相乂飜覆向胸三五遍此能去肝家積聚風邪毒氣不令病作一春早暮須念念為之不可懈惰使一曝十寒方有成效春季攝生消息論春三月此謂發陳天地俱生萬物以榮夜卧早起廣步於庭披髪緩行以使志生生而勿殺與而勿奪賞而勿罰此養氣之應養生之道也逆之則傷肝肝木味酸木能勝土土屬脾主甘當春之時食味宜减酸益甘以養脾氣春陽初升萬物發萌正二月間乍寒乍熱髙年之人多有宿疾春氣所攻則精神昏倦宿病發動又兼去冬以來擁爐薫衣啗炙炊􅏼成積至春因而發泄致體熱頭昏壅隔涎嗽四肢倦怠腰脚無力皆冬所蓄之疾嘗當體候若稍覺發時不可便行疎利之藥恐傷臟腑别生餘疾惟用消風和氣凉膈化痰之劑或選食治方中性稍凉利飲食調停以治自然通暢若無疾狀不可吃藥春日融和當眺園林亭閣虚厰之處用攄滯懐以暢生炁不可兀坐以生他鬱飲酒不可過多人家自造米麫團餅多傷脾胃最難消化老人切不可以飢腹多食以快一時之口致生不測天氣寒暄不一不可頓去綿衣老人氣弱骨疎體怯風冷易傷腠裏時備夾衣遇煖易之一重漸減一重不可暴去劉處士云春來之病多自冬至後夜半一陽生陽炁吐隂氣納心膈宿熱與陽炁相衝兩虎相逢狹道必鬭矣至於春夏之交遂使傷寒虛熱時行之患良由冬月焙火食炙心膈宿痰流入四肢之故也當服袪痰之藥以導之使不為疾不可令背寒寒即傷肺令鼻塞咳嗽身覺熱甚少去上衣稍冷莫強忍即便加服肺俞五臟之表胃俞經絡之長二處不可失寒熱之節諺云避風如避箭避色如避亂加减逐時衣少飡申後飯是也春三月六炁十八候皆正發生之令毋覆巢殺毋破卵毋伐林木千金方云春七十二日省酸増甘以養脾氣金匱要略云春不可食肝為肝旺時以死氣入肝傷魂也養生論曰春三月毎朝梳頭一二百下至夜卧時用熱湯下鹽一撮洗膝下至足方卧以洩風毒脚氣勿令壅塞雲笈七籖曰春正二月宜夜卧早起三月宜早卧早起又曰春三月卧宜頭向東方乗生氣也春氣温宜食麥以凉之不可一於温也禁吃熱物併焙衣服參贊曰春傷於風夏必飱泄千金異方曰春甲乙日忌夫婦容止又曰春夏之交隂雨卑濕或飲湯水過多令患風濕自汗體重轉側不能小便不利作他治必不救惟服五苓散效甚春三二月勿食小蒜百草心芽肝病宜食麻子荳李子禁辛辣三春合用藥方細辛散老人春時多昏倦當服明目和脾除風氣去痰涎男女通用細辛一錢去土川芎一錢甘草炙五分作一服水煎六分熱呷可嘗服菊花散老人春時熱毒風氣上攻頸項頭痛面腫及風熱眼澁宜服甘菊花前胡旋復花芍藥𤣥參防風各一兩共為末臨睡酒調二三錢送下不能酒以米湯送下惺惺散春時頭目不利昏昏如醉頭疼腰痛有似傷寒宜服惺惺散桔梗一兩細辛五錢人參五錢茯苓一兩𤓰蔞仁五錢白术土炒一兩共為末煉蜜為丸如彈子大毎服一丸温湯化下神效散老人春時多偏正頭風旋復花一兩焙白僵蠶㣲炒去絲六錢石膏五分用葱搗同藥末杵為丸桐子大毎用葱茶湯下二丸即效墜痰飲子治老人春時胸膈不利或時煩悶半夏山東出者用白湯洗淋十餘次為末生薑一大塊如指二節􅀥子用半夏末二錢入薑􅀥用水二鐘煎至七分臨卧去薑􅀥服延年散治老人春時宜服進食順氣廣陳皮四兩浸洗去裏白衣甘草二兩為末鹽二兩半炒燥右三味先用熱湯洗去苦水五六遍㣲焙次將甘草末并鹽蘸上兩面焙乾細嚼三二片以通滯炁黃茋散治老人春時諸般眼疾發動兼治口鼻生瘡黄茋一兩川芎一兩防風一兩甘草五錢白蒺藜一錢炒去刺尖一兩甘菊花五分共為末毎服二錢空心早服米湯飲下日午臨睡三時服之暴赤風毒昏澁痛痒並皆治之外障乆服方退忌房室火毒之物患眼切忌針烙出血大損眼目黍粘湯治老人春時胸膈不快痰湧炁噎咽喉諸疾黍粘子三兩炒香為末甘草半兩炙共為細末毎服一錢食後臨卧服太上肘後玉經八方雲笈七籖曰昔巢居士事東海青童君苦心屈節奉師溽暑沍寒無懈無怠僅二十年乃口授八方使八節制服以應八卦若人未能跨鶴騰霄優㳺于乾坤之内守顥然之氣容色不改夀滿百年須服此藥神仙秘妙不可輕泄能乆服必登上仙艮卦東北王君河車方紫河車一具首生併壯盛胞衣是也挑血筋洗數十遍仍以酒洗隂乾煮生地八兩補髓血牛膝四兩主腰膝五味三兩主五臟覆盆子四兩主隂不足巴㦸二兩欲多世事加一兩女人不用訶黎勒三兩主胸中炁鼓子花二兩膩筋骨苦躭二兩治諸毒藥澤㵼三兩補男女人虚甘菊花三兩去筋風菖蒲三兩益精神乾渗三兩去肌肉五臟風炒黄用栢子仁三兩添精用仁白茯苓三兩安神黃精二兩補脾胃蓯蓉二兩助下元女人不用石斛二兩壯筋骨逺志二兩益心力不忌杏仁四兩炒黄去皮尖去惡血氣苣勝子四兩延年駐形一方有雲英石三兩縮陽余曰不必加此右二十二味共搗為末和蜜如桐子大酒下或鹽湯下服三料顔如處子昔王仙君傳與蘇林子立盟㰱血不爾違太上之科震卦正東青精先生橓米飯方白粱米一石南燭汁浸九蒸九曝乾可有三斗已上毎日服一匙飯過一月後服半匙兩月後服三分之一盡一劑則風寒不能侵鬚髮如青絲顔如氷玉若人服之役使六丁天兵侍衛攝生圖方肝有病即目赤眼中生胬肉暈膜視物不明宜服升麻子散升麻黃芩各八分山梔七分黃連七分决明子車前子各一錢乾薑七分龍膽草充蔚子各五分共為末空心服二三錢白湯下一方加苦瓠五分去黄連龍膽草正月事宜周天玉衡六問曰大寒後十五日斗指艮為立春立始建也春氣始至故為之立也後又十五日斗指寅為雨水雨水中炁也言雪散為水矣律太簇簇者凑也言萬物凑地而出隨陽而生也晉樂志曰正月建寅寅者津也謂生物之津途也玉燭寳典以正月為端月曰孟陽曰獻歳歲朝一日為雞二日為犬三日為豕四日為羊五日為牛六日為馬七日為人八日為穀是日日色晴明温煖則本事蕃息安泰若值風雨隂寒氣象􅆭烈則疾病衰滅以各日驗之若人值否思預防以攝生靈寳曰是月天道南行作事出行俱向南吉是月一日修續命齋勿殺生初七日是三㑹日宜修延神齋吉元日五更以紅􅀥祭五瘟畢合家食之吉山海經曰畫桃符以厭鬼荆楚嵗時記曰元日服桃仁湯為五行之精可以伏百邪月令圖經曰元日日未出時朱書百病符懸户上符在五月中荆楚記元日掛雞於門庭百神畏之靈心秘要曰元日取鵲巢燒灰著于厠以避兵撒門裏以避闕四時纂要曰是月四日寅日宜拔白子日宜㧞白三十日服井花水令鬚髮不白肘後方曰正月上寅日取女青草末三合縫囊盛掛帳中能辟瘟疫女青即雀瓢也玉燭寳典曰元日作膏粥以祀門户瑣碎録打春牛時拾牛身土泥撒簷下不生蜒蚰荆楚記曰正月未日以蘆苣火照井中厠中百鬼皆走正月元旦迎祀竈神釘桃符上書一聻字掛鍾馗以辟一年之祟家長率長幼拜天地萬神詣本境土地五穀之神以祈一年之福或誦經咒完畢方禮拜新年寅時飲屠蘇酒馬齒莧以祛一年不正之氣屠蘇酒方大黃一錢桔梗川椒各一錢五分桂心一錢八分烏頭六分炮白术一錢八分茱萸一錢二分防風一兩以縫囊盛之懸井中至元日寅時取起以酒煎四五沸飲二三杯自幼小飲起洛陽人家正月元日造絲雞蠟燕粉茘枝十五日造火鵞兒食玉梁糕長安風俗元日以後遞以酒食相邀為之傳坐立春後庚子日宜温蔓菁汁合家並服不拘多少可除瘟疫元日五更時㸃火把照果木樹則無蟲生以斧敲打各樹身則結實居家必用曰是月將三年桃樹身上尖刀畫破樹皮直長五七寸比他樹結子更多恐皮𦂳不長是月上辰日塞䑕穴可驅䑕五行書曰元日用麻子七粒赤荳七粒撒井中辟瘟疫又云吞赤小荳七粒服椒酒一杯吉歳時雜記曰元日燒蒼术服蒼术湯吉崔寔月令曰元日進椒酒是玉衡星之精服之令人身輕家塾事親曰元日取小便洗液氣大效珠囊隱訣曰元日煎五香湯沐浴令人至老鬚黒註曰乃青木香也因其一株五根一莖五花一枝五葉一莖五節故云又以五香煎之方具于後元日四更時取葫蘆藤煎湯浴小兒終身不出痘瘡其藤須在八九月收藏又云在除夕葫蘆煎湯亦可其月宜加綿襪以煖足則無病元日天倉開日宜學道坐圜戊辰日宜煉丹藥又一方云五香湯法用蘭香荆芥頭苓苓香白檀木香等分㕮咀煮湯沐浴辟除不祥可降神靈并治頭風如無蘭香以甘松代之此又一說也雲笈七籖曰以立春日清晨煮白芷桃皮青木香三湯沐浴吉千金月令曰是月宜食粥有三方一曰地黃粥以補虚取地黃搗汁候粥半熟以下汁復用綿包花椒五十粒生薑一片同煮粥熟去綿包再下熟羊腎一具碎切成條如韮葉大少加鹽食之二曰防風粥以去四肢風取防風一大分煎湯煮粥三曰紫蘇粥取紫蘇炒微黃香煎取汁作粥雲笈七籖曰正月十日沐浴令人齒堅寅日燒白髪吉述見曰是月毎早梳頭一二百梳甚益𤣥樞經曰春水未泮衣欲上薄下厚養陽收隂長生之術也太薄則傷寒道藏經曰欲滅尸蟲春正上甲乙日視歲星所在焚香朝朝禮拜誠心祝曰臣願東方明星君扶我魂接我魄使我夀命綿長如松栢願臣身中三尸九蟲盡消滅頻頻行之吉四時纂要曰初七日為上㑹日可設齋醮大吉清異録云咸通俗元日佩紅絹囊内装人参豆大嵌木香一二釐時服日髙方止號迎年珮正月事忌正月日時不宜用寅犯月建百事不利是月初七日二十一日不可交易裁衣是月初婚忌空牀招不祥不得已者以薫籠置牀以厭之梅師方曰元日勿食梨以避離字之義勿食鯽魚頭中有蟲千金方曰是月食虎豹貍肉令人傷神損夀又曰不得食生葱蓼子令人面上起逰風勿食蟄藏不時之物本草是月勿食䑕殘傷物令人生瘻心鏡曰是月節五辛以避厲氣五辛蒜葱韮薤薑是也勿食貍豹等肉攝生論曰八日宜沐浴其日不宜逺行楊公忌曰十三日不宜問疾正月元日天臘日十五日為上元二日戒夫婦入房正月修養法孟春之月天地俱生謂之發陽天地資始萬物化生生而勿殺與而勿奪君子固宻毋泄真氣卦值泰生氣在子坐卧當向北方孫真人攝生論曰正月腎氣受病肺藏炁微宜减鹹酸増辛辣味助腎補肺安養胃炁勿冐氷凍勿太温煖早起夜卧以緩形神内丹秘要曰陽出于地喻身中三陽上升當急駕河車搬回鼎内活人心書曰肝主龍兮位號心病來自覺好酸辛眼中赤色時多淚嘘之病去效如神靈劔子導引春孟月一勢以兩手掩口取熱氣津潤摩面上下三五十遍令極熱食後為之令人華彩光澤不皺行之三年色如少艾兼明目散諸故疾從肝臟中肩背行後須引吸震方生炁以補肝臟行入下元凢行導引之法皆閉氣為之勿得開口以招外邪入于肝臟二月事宜孝經緯曰雨水後十五日斗指甲為驚蟄蟄者蟄蟲震起而出也後十五日斗指卯為春分分者半也當九十日之半故是春之分夏冬不言分者天地間二炁而已矣陽生子極於午即其中分也春為陽中律夾鍾言萬物孚甲鍾類而出也晉樂志曰二月建卯卯者茂也言陽生而滋茂也纂要曰二月為仲陽曰令月此正女夷司和少皥馭節之時也𤣥樞經曰天道西南行作事出行宜向西南吉不宜用卯日犯月建不吉是月取道中土泥門户壁官符上壬日取土泥屋四角宜蠶事吕公忌曰是月令幼小兒女早起避社神免至小兒闕黃是月採升麻治頭疼并解諸毒採獨活治賊風百節中風無乆新闕四時纂要曰二月初八日十四日闕白鬚髪千金方曰是月宜食韮能益人心纂要曰是月闕花隂乾為末戊子和井花水服方寸闕療婦人無子兼美容顔千金月令曰驚蟄日取石灰糁門限外可絶蟲蟻吕公忌曰社日令男女輟業一日否則令人不聰千金月令曰二月二日取枸杞煎湯晚沐令人光澤不病不老雲笈七籖曰社日飲酒一杯能治聾疾杜詩為寄治聾酒一杯月令曰春分後宜服神曲散其方用蒼术桔梗各二兩附子一兩茯苓一兩炮細辛一兩共篩為散紅絹囊盛之主人背帶一家無病若染時疫者取囊中之藥一錢新汲水調服取汗即愈二月已後當多服祛痰之藥風勞之疾毎起於痰人能先令痰有疎導則病可庶㡬是月上丙日宜洗頭髪愈疾效上卯沐浴去百病是月二十五天倉開日宜坐圜人山修道雲笈七籖曰二月八日沐浴令人輕健初六日亦同𤣥樞經曰是月上卯日洗髪愈疾𤣥樞經曰是月初八日乃佛生日也周建子以子月為歲首是以十一月為正月也莊王九年四月初八日釋迦生以子至卯月是今二月也二月八日為佛生辰無疑今不知者不考歲首建支遂以四月為成規何其謬歟靈寳曰是月八日宜修芳春齋五日修太上慶生齋洛陽記寒食日粧萬花輿煮楊花粥二月忌忌千金月令曰二月三日不可晝眠白雲忌曰二月九日不可食魚鼈仙家大忌雲笈七籖曰二月十四日忌水陸逺行又曰是月勿食黃花菜交陳葅發痼痰動宿氣勿食大蒜令人氣壅闗膈不通勿食雞子滯氣勿食小蒜傷人志勿食肉狐狢肉令人神魂不安死眼合者勿食傷人子勿與生薑同食成霍亂養生論曰是月行途勿飲隂地流泉令人發瘧瘴又令脚軟是月勿食生冷可衣夾衣是月雷發聲戒夫婦容止是月初四十六不宜交易裁衣𤣥樞經曰毋竭川澤毋焚山林勿任刑勿殺傷楊公忌十一日不宜問疾二月修養法仲春之月號厭於日當和其志平其心勿極寒勿太熱安静神氣效法生成卦大壯言陽壯過中也生氣在丑卧養宜向東北孫真人攝養論曰二月腎氣微肝正旺宜戒酸増辛助腎補肝宜静膈去痰水小泄皮膚微汗以散𤣥冬藴伏之氣靈劍子空功一勢正坐兩手相乂爭力為之治肝中風以乂手掩項後使面仰視使項與手争力去熱毒肩痛目視不明積風不散元和心氣棼之令出散調冲和之氣補肝下氣海添内珠爾又一勢以兩手相重按䏶拔去左右極力去腰腎風毒之氣及胸膈兼能明目内丹秘要曰仲春之月隂佐陽炁聚物而出喻身中陽火方半氣候勻停法天生意云二月初時宜灸脚三里絶骨對穴各七壯以泄毒氣夏來無脚炁冲心之病春分宜採雲母石煉之用礬石或百草上露水或五月茅屋滴下簷水俱可煉乆服延年濟世仁術云庚子辛丑日採石膽治風痰最快三月事宜孝經緯曰春分後十五日斗指乙為清明萬物至此皆潔齊而清明矣後十五日斗指辰為榖雨言雨生百榖物生清浄明潔也律姑洗姑者故也洗者鮮也言萬物去故而從新莫不鮮明之謂也樂志曰三月建辰辰者震也言時物動長也纂要曰三月為蠶月為末春𤣥樞經曰是月天道北行作事出行宜向北方吉千金月令曰三月採艾為人以掛户上備一歲之災四時纂要曰是月三日取桃花片收之至七月七日取烏雞血和塗面及身光白如玉是月二日收桃葉晒乾搗末井花水服一錢治心痛歲時記曰上巳日取黍麫和菜作羮以壓時炁月令圖經上巳日可採艾并蔓菁花以療黃病瑣碎録曰三月三日取薺菜花鋪竈上及坐卧處可辟蟲蟻又曰是日取苦楝花無花即葉於卧席下可辟蚤虱是月採桃花未開蕋隂乾與桑椹子和臘月猪油塗秃瘡神效瑣碎録曰是月羊糞燒灰存性和輕粉麻油可搽惡瘡清明日日未出時採薺菜花候乾作燈杖可辟蚊蛾清明日三更以稻草縳花樹上不生刺毛蟲是月初三日或戊辰日收薺菜花桐花芥菜藏毛羽衣服内不蛀濟世仁術曰三月三日雞鳴時以隔宿炊冷湯洗澆瓶口及鍋竈飯籮一應厨物則無百蟲逰走為害山居四要曰清明前二日收螺螄浸水至清明日以螺水灑牆壁等處可絶蜒蚰濟世仁術曰三月辰日以絹袋盛麫掛當風處中暑者以水調服法天生意曰三月三日採桃花浸酒飲之除百病益顔色又曰清明前一日採大蓼晒乾能治炁痢用米飲調服一錢效濟世仁術曰寒食日水浸糯米一二升逐日换水至小滿漉起晒乾炒黄水調塗治跌打損傷及惡瘡神效三月三日採夏枯草煎汁熬膏毎日熱酒調吃三服治逺年損傷手足瘀血遇天隂作痛七日可痊更治産婦諸血病症三月三日取羊齒燒灰治小兒羊癎寒熱萬花谷曰初三日取枸杞煎湯沐浴令人光澤不老是月二十日天倉開日宜入山修道二十七日沐浴令人神氣清爽本草曰是月上寅採甘菊苗名玉英六月上寅日採梗名容成九月上寅採花名金精十二月上寅採根名長生收四味為末用成日煉蜜丸如桐子大毎服一錢一日三服百日身輕潤澤一年髪白再黒二年齒落更生三年返老還童齊人月令曰採何首烏赤白各半米泔水浸一宿同黒豆飯鍋上蒸熟晒乾去荳爲末或加茯苓三分之一煉蜜為丸酒下一二錢百日後百病皆除長年益夀多子忌食猪肉魚鼈蘿蔔何首烏内有生如鳥獸并山石形象極大者乃珍品也服之成仙三月四月中採山谷内新長栢葉松針或花蕊長三四寸枝隂乾細搗為末煉蜜為丸如小荳大嘗用月之朔朢清晨燒香東向持藥八十一丸咒曰神仙真藥體全自然服藥入腹益夀延年鹽湯或酒下服訖忌食五辛若要長肌肉加大麻巨勝要心力壯徤加人參茯苓用七月七日露水和丸尤佳雲笈七籖曰三月六日沐浴令人無厄齊人月令曰是月上辰日採枸杞子四月上巳日服之松花酒取糯米淘極浄毎米一斗以神麯五兩和勻取松花一升細碎蒸之絹袋盛以酒一升浸五日即堪服任意服之千金方是月入大山背隂不見日月松脂採鍊而餌之百日耐寒暑補益五臟雲笈七籖曰商陸如人形者殺伏尸去面黯黒益智不忘男女五勞七傷婦人産中諸病右用麫十二斤米三斗加天門冬末釀酒浸商陸六日齋戒服之顔色充滿尸蟲俱殺耳目聰明令人不老通神三月上巳宜往水邊飲酒燕樂以辟不祥修禊事也清明一日取榆栁作薪煮食名曰换新火以取一年之利真誥曰是月十一日㧞白十三日拔白永不生出初一初十日拔白生黒是月取百合根晒乾搗為麫服能益人取山藥去黒皮焙晒作麫食大補虚弱健脾開胃靈寳經曰是月三日修盪邪齋是月初六初七廿七日沐浴令人神爽無厄荆楚記曰三月三日四民踏百草時有鬭百草之戯亦祖此耳洛陽上巳日婦人以薺花㸃油祝之灑入水中若成龍鳳花卉狀者則吉謂之油花卜酉陽雜爼曰三月心星見辰出火禁烟挿栁謂􅀈此耳寒食有内傷之虞故令人作鞦韆蹴踘之戲以動盪之養生仁術曰榖雨日採茶炒藏能治痰嗽及療百病居家必用曰三月三日取䑕耳汁蜜和為粉謂之龍舌拌以壓時氣即茅香草俗呼為䑕耳草可染褐色萬花谷云春盡採松花和白糖或蜜作餅不惟香味清甘自有所益于人三月事忌季春之月不宜用夘日卯時作事犯月建不吉雲笈七籖曰是月勿乆處濕地必招邪毒勿大汗勿裸露三光下以招不祥勿發汗以養臟炁勿食陳葅令人發瘡毒熱病勿食驢馬肉勿食獐鹿肉令人神魂不安勿食韮月令忌曰勿食血并脾季月上旺在脾恐死炁投入故耳百一歌曰勿食魚鼈令人飲食不化神魂恍惚發宿疾本草曰勿食生葵勿食羊脯三月以後有蟲如馬尾毒能殺人風土記是月十六日廿七日忌逺行水陸不吉初一十六日忌裁衣交易千金方三月辰寅日勿食魚凶雲笈七籖曰是月五日忌見一切生血宜齋戒孫真人曰是月勿殺生以順天道勿食百草心黃花菜千金方曰勿食鳥獸五臟勿食小蒜勿飲深泉雲笈七籖曰三月八日勿食芹菜恐病蛟龍漁面青黄肚脹大如姙服糖水吐出愈楊公忌初九日不宜問疾法天生意云勿食雞子終身昏亂又云勿食大蒜亦不可嘗食奪炁力損心力三月修養法季春之月萬物發陳天地俱生陽熾隂伏宜卧早起早以養臟炁時肝臟炁伏心當向旺宜益肝補腎以順其時卦值夬次者陽决隂也决而能和之意生炁在寅坐卧宜向東北方孫真人曰腎炁以息心炁漸臨木炁正旺宜減甘増辛補精益炁慎避西風宜懶散形骸便宜安泰以順天時靈劔子曰補脾坐功一勢左右作開弓勢去胸脇膈結聚風炁脾臟諸炁去來用力為之凡一十四遍閉口使心隨炁到以散之膽腑附肝總論膽者金之精水之氣其色青附肝短葉下膽者敢也言人果敢重三兩三銖為肝之腑若據膽當不在五藏之數歸於六腑因膽亦受水氣與坎同道又不可同六腑故别立膽臟人之勇敢發於膽也合於膀胱亦主毛髮黃庭經曰主諸氣力攝虎兵外應眼瞳鼻柱間腦髪相扶與俱鮮故膽部與五臟相類也且膽寄于坎宫使人慕善知邪絶奸止佞敢行直道膽主千金金主殺故多動殺之炁然而見殺則悲故人悲者金生于水是以目有淚也心主火膽主水火得水而滅故膽大者心不驚水盛火煎故膽虚者心嘗懼隂陽交争水勝于火目有淚也淚出于膽發于肝膽水主目瞳受肝木之精二合男子五十目暗腎氣衰膽水少耳可補腎長于肝欲安其神當息忿争行仁義道德以全其生也膽合于膀胱主于毛髪髮枯者膽竭也爪乾者膽虧也髮燥毛焦者有風也好食苦味者膽不足也顔色光白者兼青色者膽無病也修養膽臟法當以冬三月端居静思北吸𤣥宫之黒炁入口三吞之以補嘻之損用益膽之津相膽病法膽之有病大率口苦嘔酸涎心中驚恐若人捕之者膽實精神不守卧起無定虚則傷寒寒則畏恐頭眩虚弱爪髪皆枯目中出淚膀胱連腰小腹作痛膽與肝合道膽有藥治與肝臟同方膽腑導引法可正坐合兩脚掌昻頭以兩手挽脚腕起揺動為之三五度亦可大坐以兩手拓地舉身努力腰脊三五度能去膽家風毒邪炁治膽腑吐納用嘻法膽病以嘻出以吸補之法當側卧以鼻漸引長氣嘻之即以嘻字作㣲聲同氣出之也去膽病除隂臟一切隂乾盜汗面無顔色小腸膨脹臍下冷痛口乾舌澁數嘻之乃愈春時逸事探春鬭花天寳中長安士女春時鬭花以竒多者為勝皆以千金市花植于中庭為探春之燕移春檻開元人家春時移各花植檻中下設輪脚挽以綵絙所至牽以自隨繫煎餅江東風俗於正月二十日為天穿日以紅絲線繫煎餅置屋上為之補天漏故李詩一枚煎餅補天穿食生菜晉於立春日以蘿菔芹芽為菜盤相饋唐立春日春餅生菜號春盤故蘇詩青蒿黄韭試春盤戴春燕荆楚立春日剪綵為燕以戴之故歐陽詩共喜􅁫頭燕已來又王沂公帖云綵燕迎春入鬢飛貼宜春字立春日門庭楣上寫宜春二字貼之王詩云寳字貼宜春五辛盤立春日作五辛盤以黃柑釀酒謂之洞庭春色故蘇詞云辛盤青韭臈酒是黃柑爆竹驚鬼西方深山中有人長尺餘喜犯人則病寒熱名曰山臊以竹著火作熚爆聲山臊驚遁飲椒柏酒月令云元日進椒柏酒椒是玉衡星精柏是仙藥二物釀酒是早自幼起進長桃符畫神黃帝時有神荼鬱壘二神于朔山東鬼門桃樹下執無道之鬼縳以葦索以飼虎故肖其形于桃板上置之門户間也畫雞貼户元日畫雞貼門户上繫葦索挿于桃符兩傍百鬼畏之畫鍾馗唐有虚耗小鬼空中竊取人物終南山進士鍾馗能捉之以刳其目劈而啗之故當正月圖之以厭鬼除窮鬼文公云正月乙丑晦主人使奴結栁作車縳草為船載糗與糧一二揖窮鬼而送之造綵勝劉臻妻陳氏嘗於人日作人勝剪綵或縷金為之七種菜羮荆土人日採七種菜作羮湯以食之造麫蠒上元日造麫蠒以官位帖子置其中熟而食之以得髙下相勝為戲笑天街觀燈武林舊事自正月十三日起至十七日止滿城大小人户跨街以竹為棚懸挂彩燈煇煌映月燦爛揺星鼓吹烟火達旦不絶踏歌聲調唐觀燈士人作踏歌唱之歌調入雲歌曰長安少女踏春陽無處春陽不斷腸舞袖弓腰渾忘却蛾眉空帶九秋霜之類送社飯春社日以諸肉雜調和鋪飯上謂之社飯秋社以社糕社酒相遺婦女歸外家即外舅姨皆以新葫蘆兒贈之俗云宜良外甥孤山看梅孤山林逋故宅也有梅三百六十株有陳朝檜樹人競賞之斷橋踏雪西湖十景中有斷橋殘雪一景自斷橋一徑至孤山下殘雪滿堤恍若萬丈玉虹跨截湖面真竒觀也髙雅者策蹇行吟以賞之蘇堤觀栁花栁撩人鵞黃鴨緑一月二色長行萬枝烟靄霏霏掩映衣袂有素心者携壺獨往清明祭掃武林舊事清明前後十日城中士女艶粧穠飾金翠琛縭接踵聨肩翻翻逰賞畫船簫鼓終日不絶祓除鄭俗三月上已於溱洧水濵招魂續魄秉蘭草祓除不祥漢時季春上巳官及百姓皆禊於東流水上曲水流觴周公成洛邑因流水以泛酒故詩云羽觴流波秦昭王置酒河曲見金人奉水心之劍曰令君制有諸夏因立此為曲水踏青鞋履三月三日上􅂿青鞋履杏酪􅀥糕寒食日煮粳米及麥為酪搗杏仁煮作粥以麫裹􅀥蒸食為之􅀥糕青精飯用楊桐葉并細葉冬青葉遇寒食採其葉染飯色青而有光食之資陽氣道家謂之青精乾食飯今俗以夾麥青草搗汁和糯米作青粉團烏桕葉染烏飯作糕是此遺意駐馬飲長安俠少春時結伴各騎矮馬飾以錦韀金絡並轡而行往來有花樹傍僕從執酒隨之遇好色則駐馬而飲取紅花北齊崔林義之女春日以桃花貼於面咒曰取紅花取白雪與兒洗面作光恱取白雪取紅花與兒洗面作光華取雪白取花紅與兒洗面作儀容􅑽花獅曲江貴家逰賞剪百花􅑽成獅子形互相送遺獅上有小連環以蜀錦流蘇牽之唱曰春光且莫去留與醉人看䕶花鈴天寳間貴家園林紐紅絲為繩綴金鈴于上有烏鵲至則掣鈴以驚之括香唐宫中花開時以重頂帳蒙蔽欄檻上以閉其香謂之括香吞花卧酒春録曰握月擔風且留後日吞花卧酒不可過時紅餤雙春逰之家以油脂米粉作紅餤竿上成雙挂桃雜于馬前釀梨花杭州俗釀趂梨花時熟號曰梨花春錦帶羮花有錦帶名者初生葉柔脆可食採以作羮杜詩云滑憶雕胡飯香聞錦帶羮憐草色望杏花長慶集云誰開湖寺西南路草緑裙腰一帶斜勸農詔曰望杏敦耕瞻蒲勸穡占草驗嵗師曠曰薺光生歲甘葶藶先生歲苦藕先生歲雨蒺藜先生歲旱蓬草先生歲欲流水藻先生歲欲惡艾葉先生歲欲病皆以正月占之占雨霧正月朔雨闕人食一升二日雨人食二升以次而升五日雨大熟五日有霧傷榖傷民元日霧嵗必饑折松索葦歳首祝椒酒而飲之又折松枝男七女二亦同此義懸葦索于户上挿符其傍百鬼畏之登山眺正月人日當登山眺逺李充詩曰命駕升西山寓目眺原疇泛粥祠膏張成見一婦人立宅東南謂成曰正月十五君宜作白粥泛膏于上以祀我當令君蠶宜百倍後果然花蓋葉幄夏侯湛曰春可樂兮綴雜花以為蓋謝萬賦云冪豐葉而為幄花褥草裀花落為褥翠草成裀醉眠春日其樂不淺浴沂禊洛春服既成童子冠者浴乎沂風乎舞雩蔡伯喈禊文洋洋暮春厥月除已尊卑烟騖惟女與士自求百福在洛之涘三月社㑹武林舊事三月三日佑聖觀三月廿八日東岳行宫二聖生辰都人逰冶之盛百戲競集士女駢闐觀者如堵其社㑹名色如緋緑社雜劇齊雲社蹴毬遏雲社唱賺同文社要詞角觝社相撲清音社清樂錦標社射弩錦體社花綉英略社拳棒雄辯社小說翠錦社行院繪革社影戲净髪社剃梳律華社吟呌雲機社撮弄所陳金玉珍寳珠翠璀璨奪目天􅂹龍媒絨韀寳轡行厨果局窮極肴核之珍一盤珠翠花朶之飾至值數萬珍禽如紅鸚白雀水族則玉蠏金龜髙麗華山之竒松交廣海嶠之異卉不可縷紀無非動心駭目之觀二㑹皆然髙子曰山人僻好四時幽賞境趣頗真即在武林可舉數亊録與同調共之但幽賞真境遍寰宇間不可窮盡奈好之者不真故毎人負幽賞非真境負人我輩能以髙朗襟期曠達意興超塵脫俗逈具天眼攬景㑹心便得妙觀真趣况幽賞事事取之無禁用之不竭舉足可得終日可觀夢想神逰吾將永矢勿諼矣果何樂可能勝哉未盡種種當以類見春時幽賞孤山月下看梅花孤山舊趾逋老種梅三百六十已廢繼種者今又寥寥盡矣孫中貴公補植原數春初玉樹參差氷花錯落􅌦臺倚望恍坐𤣥圃羅浮若非黄昏月下携尊吟賞則暗香浮動疎影橫斜之趣何能真到實際八卦田看菜花宋之籍田以八卦爻畫溝塍圜布成象迄今猶然春時菜花叢開自天真髙嶺遥望黃金作埒碧玉為疇江波揺動恍自河洛圖中分布隂陽爻象海天空濶極目杳然更多象外意念虎跑泉試新茶西湖之泉以虎跑為最兩山之茶以龍井為佳榖雨前採茶旋焙時激虎跑泉烹享香清味冽凉沁詩脾毎春當髙卧山中沈酣新茗一月保叔塔看曉山翠繞湖容態百逞獨春朝最佳或霧截山腰或霞橫樹杪或淡烟隱隱揺蕩晴暉或巒炁浮浮掩映曙色峰含旭日明媚髙張風散溪雲林皋爽朗更見遥岑逈抺柔藍逺岫忽生濕翠變幻天呈頃刻萬狀奈此景時值酣夢恐市門未易知也西溪樓啖煨笋西溪竹林最多笋産極盛但笋味之美少得其真毎于春中笋抽正肥就彼竹下掃葉煨笋至熟刀截剥食竹林清味鮮美莫比人世俗腸豈容知此真味登東城望桑麥桑麥之盛惟東郊外最濶田疇萬頃一望無際春時桑林麥隴髙下競秀風揺碧浪層層雨過緑雲繞繞雉雊春陽鳩呼朝雨竹籬茅舍間以紅桃白李燕紫鶯黃寓目色相自多村家閒逸之想令人便忘艶俗三塔基看春草湖中三塔寺基去湖面淺尺春時草長平湖茸茸翠色浮動波心浴鷺狎鷗飛舞惟適望中深愜素心兀對更快青眼因思古詩草長平湖白鷺飛之句其幽賞自得不淺初陽臺望春樹西湖三面遶山東為城市春來樹色新豐登臺四眺淺深青碧色態間呈髙下參差面面逈出或苒苒浮烟或依依帶雨或叢簇山村或掩映樓閣或就日向榮或臨水漾碧幽然㑹心自多胸中生意極目撩人更馳江雲春樹之想山滿樓觀栁蘇堤跨虹橋下東數步為余小築數椽當湖南面顔曰山滿樓余毎出逰巢居于上倚䦨玩賞若與簷接堤上栁色自正月上旬柔弄鵞黃二月嬌拖鴨緑依依一望色最撩人故詩有忽見陌頭楊栁之想又若截霧橫烟隱約萬樹欹風障雨瀟灑長堤愛其分緑影紅終為牽愁惹恨風流意態盡入樓中春色蕭騷授我衣袂間矣三眠舞足雪滚花飛上下隨風若絮浮萬頃繚繞歌樓飄撲僧舍㸃㸃共酒斾悠揚陣陣追燕鸎飛舞沾泥逐水豈特可入詩料要知色身幻影是即風裏楊花故余墅額題曰浮生燕壘蘇堤看桃花六橋桃花人争艷賞其幽趣數種賞或未盡得也若桃花妙觀其趣有六其一在曉烟初破霞彩影紅微露輕勻風姿瀟灑若美人初起嬌怯新粧其二明月浮花影籠香霧色態嫣然夜容芳潤若美人歩月丰致幽閑其三夕陽在山紅影花艶酣春力倦嫵媚不勝若美人微醉風度羞澁其四細雨濕花粉溶紅膩鮮潔華滋色更烟潤若美人浴罷暖艷融酥其五髙燒庭燭把酒看花瓣影紅綃争妍弄色若美人晚粧容冶波俏其六花事將䦨殘紅零落辭條未脫半落半留兼之封家姨無情髙下􅈝作使萬㸃殘紅紛紛飄泊或撲面撩人或浮樽沾席意恍蕭騷若美人病怯鉛華消減六者惟真賞者得之又若芳草留春翠裀堆錦我當醉眠席地放歌咏懐使花片歴亂滿衣殘香隱隱撲鼻夢與花神携手巫陽思逐彩雲飛動極歡流暢此樂何休西泠橋玩落花三月桃花蘇堤落瓣因風蕩漾逐水周流飄泊孤蹤多在西泠橋畔堆壘粉銷玉碎香冷紅殘片片似對騷人泣别豪舉離尊當為髙唱渭城朝雨天然閣上看雨靈雨霏霏乍起乍歇山頭烟合忽掩青螺樹杪雲蒸頃迷翠黛絲絲飛舞遥空濯濯飄揺無際少焉霞紅照水淡日西斜峰巒吞吐于烟翠中零瀼宿雨殘雲飛鳥一望迷茫水色山光四照蕭爽長嘯倚樓騰歌浮白信知變幻不常隂晴難料世態春雨翻覆弄人哉過眼盡是鏡華當著天眼看破臨水觀魚古吳茂苑孔里園中有世居隱士號曰瀟灑張郎其園中有竹萬竿喬木蓋屋西有繞翠堂東有蘆軒軒前有一大池緑楊垂壓桃李間枝池内有朱魚數萬名為錦鱗池至春日晴明魚逰戲水五色斑斕名魚萬狀瀟灑張郎題之曰錦鱗伴碧草水面做文章遵生八牋卷三
