body:
  text: 遵生八牋卷一明髙濂撰清修妙論牋上髙子曰攝生尚𤣥非崇異也三教法門總是教人修身正心立身行己無所欠缺為聖為賢成仙成佛皆由一念做去吾人禀二五之精成四大之體富貴者昧養生之理不問衛生有方貧窮者急養身之䇿何知保身有道指神仙之術為虚誣視禪林之説為怪誕也六慾七情哀樂銷爍日就形枯髪槁疾痛病苦始索草根樹皮以活精神命脈悲哉愚亦甚矣保養之道可以長年載之簡編厯歴可指即易有頤卦書有無逸黄帝有内經論語有鄉黨君子心悟躬行則養徳養生兼得之矣豈皆外道荒唐説也余閲典籍隨筆條記成編曰清修妙論老子曰人生大期百年為限節䕶之者可至千嵗如膏之小炷與大耳衆人大言我小語衆人多煩我少記衆人悸怖我不怒不以人事累意淡然無為神氣自滿以為長生不死之藥莊子曰能遵生者雖富貴不以養傷身雖貧賤不以利累形今世之人居髙年尊爵者皆重失之福壽論曰貧者多壽富者多促貧者多壽以貧窮自困而常不足無欲以勞其形伐其性故多壽富者奢侈有餘賊心害性所以折其壽也故當損有餘以補不足然有貧而促者必徳不足是以殀耳故世人當安其分若今官爵之非分車馬之非分妻妾之非分屋宇之非分貨易之非分神能記之使之災焉病焉死焉人不知也又曰故世人倖而得之者災也分而得之者吉也人年五十能補其過悔其咎布仁惠之恩垂憫恤之念奉徳不欺聖人知之賢人䕶之天乃愛之人乃悦之鬼神敬之富貴長守夀命安康是去攻劫之患除水火之災必可保生以全上夀矣麻衣道者曰天地人等列三才人得中道可以學聖賢可以為神仙况人之數與天地萬物之數等今之人不修人道貪愛嗜慾其數消減只與物同也所以有老病殀殤之患鑒乎此必知所以自重而可以得天元之壽矣陰符經曰淫聲美色破骨之斧鋸也世之人不能秉靈燭以照迷情持慧劔以割愛慾則流浪生死之海是害先於恩也參贊書曰年髙之時陽氣既弱覺陽事輒盛必慎而抑之不可縱心竭意一度不泄一度火滅一度火滅一度添油若不制而縱情則是膏火將滅更去其油故黄庭經云急守精室勿妄泄閉而寳之可長活黄帝曰外不勞形於事内無思想之患以恬愉為務以自得為功形體不敝精神不散可夀百嵗彭祖曰凡人不可無息當漸漸除之人身虚無但有游氣氣息得理而病不生又曰道不在煩但能不思衣不思食不思聲色不思勝負不思得失不思榮辱心不勞神不極可壽千歳吕覽曰年夀得長者非短而續之也畢其數也畢數之務在乎去害何謂去害大甘大酸大苦大辛大鹹五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霖大霧七者動精則生害矣仲長統昌言曰屈者以夫伸蓄者以夫虚内者以夫外也氣宜宣而遏之體宜調而養之神宜平而抑之必有次和者矣夫善養性者得其和鄰臍二寸謂之關關者所以關藏呼吸之氣禀受四體也故氣長以關息氣短者其氣稍升其脈稍促其神稍越至於以肩息而舒其神稍專至於以關息而氣衍矣故養夀者當致氣於關是為要術崔瑊箴曰動不肆勤靜不燕逸有疾歸天醫不能恤太上防疾其次萌芽腠理不蠲骨髓奈何黄帝問岐伯曰余聞上古之世春秋皆度百嵗而動作不衰今人年至半百而動作衰敝時世異也人將失之耶對曰上古之人其知道者法於隂陽和於術數飲食有節起居有常不妄作勞故能形與神俱故盡終其天年度百嵗今人不然也以酒為漿以妄為常醉以入房以欲竭精耗散其真不知持滿不知御神務快其心逆於生樂起居無節故半百而衰亢倉子曰導筋骨則形全剪情慾則神全靖言語則福全唐書有云多記損心多語耗氣心氣内損形神外散初雖無覺久則為弊續博物志曰眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉面者神之庭髪者腦之華心悲則面焦腦減則髪素精者體之神明者身之寳勞多則精㪚營竟則明消應璩詩曰昔有行道人陌上見三叟年各百餘嵗相與鋤禾莠徃拜問三叟何以得此夀上叟前致詞室内姬麄醜二叟前致詞量腹接所受下叟前致詞暮臥不覆首要哉三叟言所以夀長久柳公度年八十九或問之曰吾不以脾胃煖冷物熟生物不以元氣佐喜怒氣海常温耳温公解禪六偈曰忿怒如烈火利欲如銛鋒終朝長戚戚是名阿鼻獄顔回甘陋巷孟軻安自然富貴如浮雲是名極樂國孝悌通神明忠信行蠻貊積善來百祥是名作因果仁人之安宅義人之正路行之誠且久是名不壞身道徳修一身功徳被萬物為賢為大聖是名佛菩薩言為百世師行為天下法久久不可掩是名光明藏茅季偉詩云欺誑得錢君莫羡得了却是輸他便來往報荅甚分明只是換頭不識面多置田庄廣修宅四隣買盡猶嫌窄雕墻峻宇無歇時幾日能為宅中客造作田庄猶未已堂上哭聲身已死哭人盡是分錢人口哭元來心裏喜衆生心兀兀常住無明窟心裏為欺謾口中佯念佛是皆真實不虚話也聞此則少者當戒况老人乎薛子曰養得胸中無一物其大浩然無涯有欲則邪得而入之無欲則邪無自而入且無欲則所行自簡又覺胷中寛平快樂靜中有無限妙理又曰常沉靜則含蓄義理深而應事有力故厚重靜定寛緩乃進徳之基亦為老人養壽之要一念之非即遏之一動之妄即改之一毫念慮非妄便當克去志固難持氣固難養主敬可以持志少慾可以養氣人若不以理制心其失無涯故一念之刻即非仁一念之貪即非義一念之慢即非禮一念之詐即非智此君子不可一念起差至大之惡由一念之不善而遂至滔天修徳行義守道養真當不言而躬行不露而潛修外此一聽於天若計較成仙作祖邀名延譽則日夕憂思况未必遂徒自勞攘是為不知天命纔舒放即當收斂纔言語便思簡黙不可乘喜而多言不可乘快而多事須有包含則有餘味發露太盡恐亦難繼故慎言語養徳之大節飲食養生之大積徳積善不知其善有時而得用棄禮背義不知其惡有時而䝉害故莊敬日強輕肆日偷聖人不怨天不尤人心地多少灑落自在常人纔與人不合即尤人纔不得於事即怨天其心忿忮勞擾無一時之寧泰是豈安命順時之道心誠色温氣和詞婉必能動人若人未已知不可急求其知人未已合不可急求其合覺人之詐不形於言有無限餘味佛言苦樂逆順道在其中夫素富貴行乎富貴素貧賤行乎貧賤素患難行乎患難素夷狄行乎夷狄隨寓而安聖賢也何有苦樂逆順之異哉苦樂逆順固外也以吾道處之則無不可世人所以不達道者正以浮幻相纒役役無了時也茍能具天眼勘破世故則虚名薄利皆為吾累古之人所以適其適而不適人之所共適者為己重也人生世間要見識髙遠見識髙遠則不為淺近眩惑日觀世事之盛衰夜觀氣運之消長由其盛衰也吾以出處應之由其消長也吾以進退隨之則禍可避而害可禳不然奔役惛懜幾何不為時勢所害世間陷穽在在有之要人醒醒耳眼一少昧足一少偏心一少惑則墮落穽中安能出哉身在穽中心悔前日之非晩矣此君子貴乎知㣲敬者徳之聚也敬則衆善畢集不敬則怠惰放僻隨至而徳敗矣持敬而無間斷則誠矣未能誠者由敬而入敬以存心其體湛然自無雜慮况莊敬亦是保養身心元氣的工夫衣垢不湔器缺不補對人猶有慚色行垢不前徳缺不補對天豈無愧心君子對青天而懼聞雷震而不驚履平地而恐涉風波而不懼破爪傷膚壞梳摘髪色為之變聚珍瘞身列艷靡骨心為之安倚富者貧倚貴者賤倚強者弱倚巧者拙倚仁義道徳者不貧不賤不弱不拙化於未萌之謂神止於未為之謂明禁於已著之謂察亂而後制之謂瞽故於事物之擾不可不先此三者為家以正倫理别内外為本以尊祖睦族為先以勉學修身為次以樹藝牧畜為常守以節儉行以慈讓足已而濟人習禮而畏法可以寡過可以靜攝而無擾擾於前矣吾人不可以不知命矧老人乎人之所志無窮而所得有限者命也命不與人謀也久矣安之故嘗有餘違之則嘗不足惟介以植内和以應外聽其自來是安命也心本可靜事觸則動動之吉為君子動之凶為小人孟子曰我四十不動心是不為外物動也泛交不若寡交多求不若慎守易損而難復者精也易躁而難靜者神也惟養元氣充滿則精神融和遇損遇躁常有主以制之矣造道者可謂之富失學者可謂之貧聽天者可謂之達無恥者可謂之窮書曰必有容徳乃大必有忍乃濟君子立心未有不成於容忍而敗於不容忍也容則能恕人忍則能耐事一毫之咈即勃然而怒一事之違即憤然而發是無涵養之力薄福之人也是故大丈夫當容人不可為人容當制欲不可為欲制東坡曰蝸涎不滿殻聊足以自濡升髙不知疲竟作粘壁枯此言深足為不知進退者戒也夫人事之役役計謀之敝敝人皆以人事可以致富貴計謀可以立功名殊不知一作一輟有造物以宰之為之而成者非其能也命之至也適與造物侔也况為之而不成者多乎造物無言也人不可以惑其聼造物無形也人不可以瀆其視世之人役役敝敝於百年之間無頃刻之自安者不亦深可哀也不足為造物撓深足為造物笑心上有刃君子以含容成徳川下有火小人以忿怒殞身惟心與天一故理之所得者獨明而能開人心之迷心與地一故水之所汲者獨靈而能滌人心之陋故以一杯之水而能療醫所不治之疾罔不瘳者豈由水之靈哉實資於道之用也不知者為妄誕人心思火則體熱思水則體寒怒則髪竪驚則汗滴懼則肉顫愧則面赤悲則淚出慌則心跳氣則麻痺言酸則垂涎言臭則吐唾言喜則笑言哀則哭笑則貌妍哭則貌媸又若日有所見夜必夢擾日有所思夜必譫語夢交則泄精氣怒則發狂此皆因心而生者也人可於靈君使令一刻不在綘宫以統百屬乎太一真人曰予有經三部共只六字儒者誦之成聖道士誦之成仙和尚誦之成佛而功徳甚大但要體認奉行一字經曰忍二字經曰方便三字經曰依本分是也三經不在大藏只在靈臺有味乎言哉又曰心靜可以通乎神明事未至而先知是不出户知天下不窺牖見天道也葢心如水也久而不撓則澄徹見底是謂靈明故心靜可以固元氣萬病不生百嵗可活若一念撓渾則神馳於外氣㪚於内榮胃昏亂百病相攻壽元自損嵇中散曰君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不栖於情憂喜不修于意泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也神農曰上藥養命中藥養性誠知性命之理因輔養以通也而世人不察惟五榖是見聲色是耽目惑𤣥黄耳務淫哇滋味煎其臟腑醴醪煮其腸胃馨香腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一途易竭之身而内外受敵身非木石何能久乎又曰善養生者清虚靜泰少思寡慾知名位之傷徳故忽而不營非欲而強禁也識厚味之害性故棄而不顧非貪而後抑也外物以累心不存神氣以守白獨著曠然無憂患寧然無思慮又守之以一養之以和和理自濟同乎大順然後蒸以靈芝潤以醴泉晞以朝陽和以五絃無為自得體妙心𤣥亡歡而後樂足遺生而後身存若此以往庶可與羨門比壽王喬爭年貞白書曰質象所結不過形神形神合則是人是物形神若離則是靈是鬼非離非合佛法所攝亦離亦合仙道所依何以能致為仙是修鑄鍊之事極感變之理通也譬之為陶當埏埴為器之時是土而異於土雖燥未燒遇濕即敗燒而未熟不久尚壞火力既足表裏堅固河山有盡此形無滅假令為仙者以藥石鍊其形以精靈瑩其神以和氣濯其質以善徳解其纒萬法皆通無礙無滯欲合則乘雲駕霧欲離則尸解質化不離不合則或存或亡各隨所業修道進學以躋仙路永保長年夫人只知養形不知養神只知愛身不知愛神殊不知形者載神之車也神去人即死車敗馬即奔也養壽之法但莫傷之而已冬温夏凉不失時序之和所以適身也若重衣厚褥體不甚苦以致風寒之疾厚味脯腊醉飽肥甘以致結聚之患美色妖冶嬪妾盈房以致虚損之禍淫聲艷曲怡心悦耳以致荒躭之惑故世人不終耆夀咸多殀殁者皆由不自愛惜忿爭盡意邀名射利聚毒攻神内傷骨髓外消筋肉血氣枯槁經絡壅閉内裏空虚招來衆疾一有所感便不可支是由正氣日衰邪氣日盛故耳太上日用經曰飲食餐完禁口端坐莫起邪念世事俱忘存神定意眼不視物耳不聽聲息心内守調息綿綿呼吸自在似有如無心火下降腎水上升口中津生靈真附體得至長生與天齊夀道林攝生論曰老人養壽之道不令飽食便臥及終日久坐久勞皆損壽也時令小勞不致疲倦不可強為不堪之事食畢少行百步以手摩腹百過消食暢氣食欲少而數恐多則難化先饑而食先渇而飲先寒而衣先熱而解勿令汗多不欲多唾唾不令遠勿令臥熟撲扇勿食生冷過多勿多奔走勿露臥空階而冐大寒大熱大風大霧勿傷五味酸多傷脾苦多傷肺辛多傷肝鹹多傷心甘多傷腎此數者老人猶當加意老人攝生臥起有四時之早晩興居有至和之常制調引筋骨有偃仰之方杜疾閑邪有吞吐之術流行榮衛有補瀉之法節宣勞逸有予奪之要忍怒以全陰氣忍喜以全陽氣然後將草木藥餌以救虧缺後鍊金丹以定無窮他若自己修為要當居貧須要安貧居富切莫矜富居貧富之中恒須守道勿以貧富改志易性識達道理似不能言作大功徳勿自矜伐年至五十以外以至百年美藥勿離於手善言勿離於口亂想勿生於心勿令心生不足好惡常令歡喜勿得求全於人勿得怨天尤命常當少思少念少慾少事少語少笑少愁少樂少喜少怒少好少惡此十二少者養性之都契也多思則神殆多念則神散多慾則智亂多事則形勞多語則氣喪多笑則臟傷多愁則心憍多樂則意溢多喜則妄錯昏亂多怒則百脈不定多好則專術不理多惡則憔悴無歡此十二多不除喪生之本也惟無多無少幾於道矣要記曰一日之忌暮無飽食一月之忌暮無大醉終身之忌暮嘗䕶氣乆視傷血久臥傷氣久立傷骨久行傷筋久坐傷肉大飽傷肺大饑傷風勿當屋梁脊下睡臥臥勿頭向北勿㸃燈燭照臥六神不安大汗勿脱衣多得偏風半身不遂臥處勿令有孔隙風入傷人最寒勿令火爐安向頭傍令人頭重目赤鼻乾冬日温足凍腦春秋腦足俱凍寅日剪指甲午日剪足甲燒白髪並吉勿食父母本生所屬禽獸之肉令人魂魄飛揚勿忍溺并怒抛以致膝冷成脾勿忍後并強努以致氣痔腰疼入廟宇必恭敬勿恣意注目見怪勿得驚恐以怪為怪數者是亦養生之大者當究心焉關尹子曰人之平日忽焉目見非嘗之物者皆精有所結而然病目忽見非嘗之物皆心有所歉而然茍於吾心能於無中示有則知吾心能於有中示無但不信之自然不神或曰彼識既昏誰能不信應曰如捕蛇人而不畏蛇彼雖夢蛇而心亦不怖道無鬼神獨徃獨來又曰困天下之智者不在智而在愚窮天下之辯者不在辯而在訥服天下之勇者不在勇而在怯少言者不為人所忌少行者不為人所短少智者不為人所勞少能者不為人所役壯者當知三在四少以遵吾生矧髙年之人於此可不更加珍重以保全天年長生之法保身之道因氣養精因精養神神不離身乃得常健養生大要一曰嗇神二曰愛氣三曰養形四曰導引五曰言語六曰飲食七曰房室八曰反俗九曰醫藥十曰禁忌又曰無勞爾形無搖爾精歸心靜黙可以長生天地以生成為徳有生所甚重者身也身以安樂為本安樂所可致者以保養為本先其本則本固本既固疾病何由而生夀豈不永故攝生有三曰養神曰惜氣曰防疾忘情去智恬澹虛無離事全真内外清淨如是則神不内耗境不外惑真一不雜神自寧矣是曰養神抱一元之本根固歸真之精氣三焦定位六賊忘形識界既空參同斯契虚實相通名曰大通則氣自定矣是曰惜氣飲食適時温凉合度出處無犯於八邪動作不可為勉強則身自安矣是曰防疾又曰善養生者養内不善養生者養外外貪快樂恣情好尚務外則虚内矣所謂養内者使五臟安和三焦守位飲食得宜世務不涉是可長夀莊子曰人之可畏者袵席飲食之間為最而不知預為之戒者過也若能常自謹畏病疾何由而起壽考焉得不長賢者造形而悟愚者臨病不知誠可畏也勞者勞於神氣傷者傷於形容飢飽過度則傷脾思慮過度則傷心色慾過度則傷腎喜怒過度則傷肝悲愁過度則傷肺又如風寒暑濕則傷於外饑飽勞役則傷於内晝感則傷於榮夜感則傷於衛經行内外勞一而二由二而十真氣外散五邪入内使人肌肉内消神氣短少飲食漸減行步無力雖欲久生恐無能矣道院集曰游心虚靜結志𤣥㣲委慮無欲歸計無為凝神滅想氣和體舒達延生命壽與天齊又云檢情攝念息業養神悟妄歸真觀空見性常習靜明不為魔動心我兩忘神氣自滿又云止念令靜觀理令明念靜理明不死可能導氣令和引體令柔氣和體柔長生可求此皆至妙要論一人之身一國之象也胷臆之設猶宫室焉支體之位猶郊境焉骨節之分猶百川焉腠理之間猶四衢焉神猶君也血猶臣也氣猶民也故至人能理其身亦猶明君能治其國愛民安國愛氣全身民敝國亡氣衰身謝故上士施醫於未病之先防守於未敗之日故攝生者先除六害一曰薄名利二曰禁聲色三曰廉貨財四曰損滋味五曰屏虛妄六曰除嫉妬六者若存真經空念不能挽其衰朽矣又曰冬則朝勿飢夏則夜勿飽早起不在鷄鳴前晩起不過日出後心内澄則真人守其位氣内定則邪穢去其身行欺詐則神悲好爭競則神沮輕侮於人則減算殺害於物必傷年行一善則神魂歡作一惡則心氣亂人能寛泰自居恬淡自守則神形安靜災病不生仙録注名鬼簿落籍壽福安寧由此兆始上古天真論曰女子之數七丈夫之數八女子過七七四十九數則任脈虚衝脈衰天癸竭地道不通以漸枯槁華色失榮丈夫過八八六十四數則五臟皆衰筋骨解弛血脈短促精氣耗散天道閉塞日就憔悴肌肉無華故上夀之人年過常數皆由衣食充足藥餌扶䕶孝子賢孫承歡愛養調其朝夕適其寒温上順天心下契人理順天之道夀命無疆岱翁曰嘗見世人治髙年之人疾患竟同少年亂投湯藥妄行針灸以攻其病務欲速愈殊不知上夀之人血氣已衰精神已散至於視聽聰明不及手足舉動肢體不隨心志沉昏頭目眩暈氣脈妄行則宿疾時發或秘或寒或冷或熱此皆老人常態不慎治之急投峻藥取效或吐或汗或解或利老弱之人不能禁架汗則陽氣泄吐則胃氣逆瀉則元氣脱立致不虞此老病大忌更不可用市中買藥并他人聞説病源不知藥味送來服餌及虎狼之藥切宜仔細若身有宿疾或時發動則隨其疾狀用温平順氣開胃補虚中和湯藥調停飲食或隨食物變饌治之最為要法養夀之道與仙佛二教最是捷徑故清淨明了四字最好内覺身心空外覺萬物空破諸妄相無可執著是曰清淨明了故説心法曰前不接續後不引起前後斷絶中間自孤當體不顧應時消滅知體已滅豁然如空古事過去空今事眼前空未來決定空一切塵勞是大虚妄不可執而為有自障吾心結成煩惱金經大乘法云身便是幻幻時所化又是幻中之幻世即是夢夢時所見又是夢中之夢展轉虚妄如聲外有響形外有影形聲影響起於一真影外影為三等妄夢中夢是兩重虚一切諸有如夢如幻一切煩惱是魔是賊人生一世中其夢無數夢中一一稱我夢中之我豈非空乎要知夢既是空身亦如夢何以迷著諦思身之未生有象乎有名乎有我乎身之既化有象乎有名乎有我乎身前身後兩不可知安得於中偏執為我愛戀憂怖終日戚戚物之生成謂之造物之變滅謂之化性之分别謂之識一切含識謂之相相續有情名隨因報流轉無窮有能遺物離人超出造化之外卓然獨存其惟大覺聖人乎萬物自萬物二儀中虛空自無礙萬念自萬念一心中虛空自無礙無數之形自古生化而不停無數之情自古差别而不平無數之事自古煩惱而不定無數之有自古成壞而不久往者無跡來者無極若悟一一皆空即當心如太虛洞然無礙有何介懐更生色相天地萬物因妄相和合而生人世萬事因妄情交結而成念起念止皆自心念起則一切煩惱起念止則一切煩惱止何不見心以息此念念起即覺如川欲泄簣土可塞襄陵勢絶如火欲燃杯水可沃燎原勢滅覺念止念宜速而切晁文元曰修行之法兩熟居先智斷之理熟則事事皆空豈容留礙力制之功熟則念念不起自然安閒智斷即觀力制即止也萬漚起而復破水性常存千燈明而復滅火性原在忘情之心不住於相如湯消冰冰湯俱盡無可分别觸境之心未能不動如谷應聲即應即止無復有餘不茹葷飲酒是祭祀齋非心齋也汝能一志無以耳聽以心聽無以心聽以氣聽疏瀹汝心除嗜欲也澡雪汝精去穢累也掊擊其志絶思慮也無思無慮則心專於道無嗜無慾則樂於道無穢無累則合於道心無二想名曰一志太上九行曰行無為行柔弱行守雌勿先於動是名上三行行無名行清淨行諸善是名中三行行忠孝行知足行推讓是名下三行不止之心妄心也不動之心真心也歸心不動方是自心此是止息之義故其文以自心為息又曰息者氣也自者從也氣從心起故心住則息住心行則息行所以禪道二宗以息心為最切要楞嚴圓覺注曰心息相依息調心靜入勝定地似尤簡徑念起即覺覺之即無入三菩㮛此最權輿神氣相合氣和神清清和久久自然長生晁公曰夢覺之初未念諸念方寸之室虚白生此清境可愛昧爽之初羣動未動方丈之室虚白生此靜境更可愛此時進道表裏相應真可樂也五鼓之後睡覺而坐自覺神清氣清耳中音清其妙無比又曰垢漸去而鑑漸明魄漸消而月漸滿攻竹木先節榦則枝葉易去迎刃而解日損妄念先去其胷中尤甚者懲忿窒欲老人最要一事了知起滅意決定生死根不復隨緣轉是名不動尊在造化中身不由己在情境中心亦如此悟妄識真妄縁入理率以為常至於没齒十魔軍最要隄防一欲二憂愁三飢渇四觸愛五睡眠六怖畏七疑悔八瞋恚九利養虚稱十自髙慢人圭峰曰隨時隨處息業養神曇倫云行住坐臥離念淨心人可以利濟通達者常力行之患難困苦者力救之皆如己身之事此外功徳也修此勿責人報勿希天祐天若有靈人若有知理合何如哉清心釋累懲忿窒慾求自然智住無礙行此内功徳也修此勿期道勝勿思瑞應經若不誣教若不虚理合何如哉齋戒沐浴此外清淨也息心𤣥妙此内清淨也所見有是有不是此世間妄眼也無是無不是方為出世真眼所知有可有不可此為世間妄心也無可無不可方為出世真心高一步者眼界常不分别心界常得安和浮世乃生老病死之洪都憂悲苦惱之窟宅此八字無人無之明悟之人知彼我同當於事過即空不留妄想三根六如論曰對眼根之塵如見夢時物如變幻化像對耳根之塵如聞空中風如聽禽獸語對意根之塵如湯釋冰雪如冶銷金鐡歆然之欲􅞕然之忿隱然之憂皆逆道心於身心有損翛然自得怡然自適恬然自息皆順道心於心為益去彼取此服之無斁心經曰色即是空非無色之空恐人執色為礙耳空即是色非有色之色恐人執空為礙耳色空雙泯心境一如無纎塵可拂方是了然曠達恣口腹者神仙目之為啄腐吞腥仗富貴者髙士比之為吮癰䑛痔造化因心偈曰賦象各由心影響無欺詐原無造化工羣生自造化貫休曰舉世遭心使吾師獨使心萬緣隨日盡一句不言深仕宦之間暗觸禍機袵席之上宻涉畏途輪環之中枉入諸趣故世間有怨府畏途禍胎鬼趣積習晏安於其中不自覺悟者可為賢乎見彼如意極快之事不當羨慕世事皆有倚伏如意處常有大不如意之變事難縷述理可盡思以此對治自然甘處顔回如愚王湛為癡士有隱徳人何由知權要之門喧煩㑹合道義之宅閴寂荒凉齊已詩云心清鑑底瀟湘月骨冷禪中太華秋陳陶詩云髙僧示我真隱心月在中峰葛洪井二詩讀之令人氣格爽拔陰澹語索襲曰先生棄衆人之所收收衆人之所棄宅不彌畝而志忽九州形居塵俗而棲心天外莊子曰得者時也失者順也安時而處順哀樂不能入也孔旻曰怒氣劇炎火焚燒徒自傷觸来勿與競事過心清凉關尹子曰無一心五識併馳心不可一無虚心五行皆具心不可虛無靜心萬化宻移心不可靜借能一則二偶之借能虛則實滿之借能靜則動搖之惟聖人能斂萬有於一息故無有一物可役吾之明徹散一息於萬有故無有一物可間吾之云為又曰運者車也所以運者是牛非車思者心也所以思者是意非心也不知所以然而然惟不知所以然而然故其來無從往無在故能與天地本原不古不今譚子化書曰爪髪者我之形何爪可割而無害髪可截而無痛榮衛所不至也則知我本無害而筋骨為之害我本無痛而血肉為之痛所以喜怒非我作哀樂非我動我為形所昧形為我所愛達此理者可以出生死之外又曰動而不知其動者超乎動者也靜而不知其靜者超乎靜者也超乎動陽不可得而推出乎靜陰不可得而移陰陽不能變而况萬物乎故不為物所誘者謂之至靜形動而心靜神凝而跡移者無為也閒居而神擾拱黙而心馳者有為也無為則理有為則亂無為至易非至明者不可致也陽之精曰魂與神陰之精曰尸與魄神勝則為善尸強則為惡制惡興善則理忘善縱惡則亂理久則尸滅而魄鍊亂久則神逝而魂消尸滅魄鍊神與形合而為仙神逝魂消則尸與魄同而為鬼自然之道也夫目以娯艷為華心以聲名為貴身好輕鮮之飾口欲珍竒之味耳快美好之音鼻悦馨香之氣此六者皆敗徳傷性伐其靈根者也有之則宜遠無之不可求忘其所趣任其自然心上一毫不留若有心求樂則有所着功名富貴固無可樂道徳性命亦無可樂莊子所謂至樂無樂可以進道孔子五十而知天命知天命是至誠之道則與數參而無待於推數矣人心本無思慮只是將已往未來之事終日念想故知事未嘗累人心人心自累於事不肯放耳老子曰持而盈之不如其已揣而鋭之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道又曰五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心狂難得之貨令人行妨是以聖人為腹不為目故去彼取此曲則全枉則直洼則盈敝則新少則得多則失是以聖人抱一為天下式不自見故明不自是故彰不自伐故有不自矜故長惟不爭故天下莫與之爭所謂曲則全豈虛言哉誠全而歸之善行無轍跡善言無瑕讁善計不容䇿籌善行無關鍵而不可開是聖人嘗善救人故無棄人嘗善救物故無棄物是謂襲明又曰知人者智自知者明勝人者力自勝者強知足者富強行者有志不失其所者久死而不亡者夀名與身孰親身與貨孰多得與亡孰病甚愛必大費多藏必厚亡知足不辱知止不殆可以長久四十二章經云斷欲去愛識自心源内無所得外無所求心不繫道亦不結業是亦為道又曰佛教十惡吾亦當戒身惡三者殺盜淫口惡四者兩舌惡口妄言綺語意惡三者嫉妬恚此十事不順聖道名曰大業有罵佛者罵止問子以禮從人其人不納禮歸子乎今子罵我我亦不納子自持禍歸子身矣猶響應聲影之追形終無免離慎勿為惡惡人害賢猶如仰天吐唾唾不至天還墮自身佛經有二十難在吾人切身似有十四難不可不勉貧窮樂捨難豪貴好善難忍色忍欲難被辱不嗔難有勢不臨難觸事無心難廣學博究難除人滅我難心行平等難不説是非難覩境不動難善解方便難不輕貧賤難見貨不貪難行道守真者善志與道合者大色慾之患甚於牢獄牢獄有解脱之時色交無合魂之體情慾所愛豈憚馳驅雖有虎口之禍心存甘伏投泥自溺故曰若人透得此門出塵羅漢又曰人欲愛生愛從憂生憂從怖生若離於愛何憂何怖仙經云覺與陽合寐與陰并覺多則魂強寐乆則魄壯魂強者生之人魄壯者死之徒也若餐元和徹滋味使神清氣爽至於晝夜常醒是得長夀又曰性本至凝物感而動習動既久胡能遽寧既習動而播遷可習靜而恬宴故善習者寂而有裕不善習者煩而無功是以將躁而制之以寧將邪而閑之以正將求而抑之以捨將濁而澄之以清於此習久則物𡨕於外神鑒於内不思靜而心自靜矣大道歌曰大道不遠在身中萬物皆空性不空性若不空和氣住氣歸元海夀無窮欲得身中神不出莫向靈臺留一物物在心中神不清耗散真精損筋骨神御氣兮氣留形不須藥物自長生術則易知訣難遇總然遇了不專行所以千人萬人學畢竟終無一箇成神若出兮便收来神返身中氣自回如此朝朝并暮暮自然赤子産靈胎重陽師曰老人於十二時中行住坐臥一切動中要把心似泰山不搖不動謹守四門眼耳鼻口不令内入外出此名養夀𦂳要又曰斷縁者斷塵俗事也棄事則形不勞無為則心自足恬簡自安塵累自遠經云塞其兌閉其門終身不勤或顯徳露能或求人扶己或遺問慶弔以事往還或假修隱逸以希譽望或酒食結朋以圗厚報此皆巧藴心機以干時利既非順道更妨養夀凡此之類悉令遠去收心論曰煩邪亂想隨覺即除毁譽善惡聞即撥去莫將心受心受則滿心滿則道無所居要令聞見是非不入於心是心不外受名曰虚心使心不逐外是名安心心安而虚道自來居真觀論曰真觀者智士之先覺能人之善察也一餐一寐俱為損益之源一行一言乃係禍福之本雖則巧持其末不如拙戒其本觀本知末又非躁競之情是故收心簡事日損有為體靜心閒方可觀妙人居塵世難免營求雖有營求之事而無得失之心即有得無得心常安泰與物同求而不同貪與物同得而不同積不貪即少憂不積則無失迹雖同人心常異俗又曰若色病重者當知染色都由是想之一字上來想若不生終無色事色想外空色心内忘妄想心空誰為色主經云色者想爾想悉是空何關於色心如眼也纎塵入眼則不安小事關心心必亂動既有動病難入定門養性靜心急除此病西昇經曰形神合同故能長久生神經曰身神竝一則為真身入道之人力有淺深深則兼被於形淺則惟及於心被形者神人也及心者但得慧覺不免凋謝何者慧是心用用多則心勞初得少慧悦而多辦神氣漏泄無靈光潤身遂致早終若大人含光藏輝以期全備凝神寳氣神與道合故山有玉草木以之不凋人懷道形骸以之永久坐忘樞要曰人心當先去邪僻之行外事都絶無以干心然後内觀正覺覺一念起即須除滅隨起隨滅務令安靜惟滅動心不滅炤心但𡨕虚心不𡨕有心不依一法而心常住此法𤣥妙利益甚深又曰得道之人心身有五時七候心有五時者一動多靜少二動靜相半三靜多動少四無事則靜事觸還動五心與道合觸而不動進至此地罪垢滅盡無復煩惱始得安樂七候者一舉動順時容色和悦二宿疾竝消身心輕爽三填補殀傷還元復命四延數千歳名曰仙人五鍊形為氣名曰真人六鍊氣成神名曰神人七鍊神合道名曰至人雖久學定心身無五時七候者促齡穢質色謝歸空坐忘銘曰常黙元氣不傷少思慧燭内光不怒百神和暢不惱心地清凉不求無諂無媚不執可圎可方不貪便是富貴不茍何懼公堂味絶靈泉自降氣定真息自長觸則形敝神逸想則夢離尸僵氣漏形歸厚土念漏神趨死鄉心死方得神活魄滅然後魂昌轉物難窮妙理應化不離真常至精潛於恍惚大象混於渺茫造化不知規凖鬼神不測行藏不飲不食不寐是謂真人坐忘文逸曹仙姑歌云我為諸君説真的命蒂從來在真息炤體長存空不空靈鑑涵天容萬物太極布妙人得一得一須教謹防失宫室虚閑神自居靈腑煎熬枯血液又曰朝喪暮損人不知氣亂精神無所據細細消磨漸漸衰用竭元和神乃去無心心即是眞心動靜兩忘為離欲神是性兮炁是命神不外馳氣自定本來二物互相親失却將何為本柄混合為一復忘一可與元化同出没又曰念中景象須除滅夢裏精神牢執持元炁不住神不安蠧木無根枝葉乾休論涕唾與精血達本窮源總一般此物何曾有定位隨時變化因心意在體感熱即為汗在眼感悲即為淚在腎感合即為精在鼻感風即為涕縱横流轉潤一身到頭總是神水潰神水難言識者稀資生一切由真炁但知恬淡無思慮齋戒寧心節言語一味醍醐甘露漿飢渇消除見真素又云不去奪名與逐利絶了人情總無事自然決烈滯何人在我更教誰制御掀天聲價又何如倚馬文章何足貴榮華衣食總無心積玉堆金成何濟又曰名與身兮果孰親半生嵗月太因循比來修鍊賴神炁神炁不全空苦辛可憐一個好基址金屋玉堂無主人譚景昇曰忘形以養氣忘氣以養神忘神以養虛只此忘之一字是無物也六祖曰本來無一物何處惹塵埃其斯之謂與白玉蟾曰薄滋味以養氣去嗔怒以養性處卑下以養徳守清淨以養道名不係簿籍心不在勢利此所以出人之彀與天為徒又曰大道以無心為體忘言為用柔弱為本清淨為基若施於身必節飲食絶思慮靜坐以調息安寢以養氣心不馳則性定形不勞則精全神不拔則丹結然後滅性於虚寧神於極可謂不出户庭而妙道得矣嵗月其有窮乎郝太古曰道不負人人自負道日月不速人算自速勇猛剛強不如低心下氣遊厯髙遠不如安靜養素圗名逐利不如窮居自適飽飫珍羞不如粗糲充腹羅綺盈箱不如布袍遮體説古談今不如緘口忘言逞伎誇能不如抱元守一趨炎附勢不如貧窮自樂懷怨記讐不如洗心悔過較長量短不如安心自怡道氣綿綿行之得仙得意忘言自超太𤣥釋興曰六般神用空不空一顆圓明色非色人為六根貪使不能自神其神人能眼不貪視美色耳不貪聽淫聲鼻不貪聞香馥舌不貪嗜珍羞身不貪戀色慾意不貪妄思慮一心不動六門嚴守物物頭頭左右䕶持不傷真性神聚氣全與天長年栖雲先生曰心隨境轉境逐心生若要心定世人愛的我不愛世人做的我不做紅塵萬縁勾引不動自然心清意靜陰陽不能陶鑄書曰喜樂無極則傷心心傷則意不存而皮革焦枯怒忿炎爍則傷肝肝傷則血不榮而筋萎破陰臨食更忌暴嗔令人神驚夢逸心之神發於目久視則傷心腎之精發於耳久聽則傷腎書云唾者溢為醴泉聚流為華池府散為津液降為甘露溉臟潤身宣通百脈化養萬神肢節毛髪華采堅固故曰遠唾不如近唾近唾不如不唾又曰息心以養氣息機以死心經曰精氣神為内三寳耳目口為外三寳常使内三寳不逐物而流外三寳不誘中而擾天隱子曰潔身虚心深居靜室收心復性遺形忘我萬法通靈是為五漸之門孫真人衛生歌曰天地之間人為貴頭象天兮足象地父母遺體能寳之洪範五福壽為最衛生切要知三戒大怒大慾并大醉三者若還有一焉須防損失真元氣欲求長生須戒性火不出兮心自定木還去火不成灰人能戒性還延命貪慾無窮忘却精用心不已失元神勞形散盡中和氣更仗何因保此身心若太費費則勞形若太勞勞則怯神若太傷傷則虚氣若太損損則絶世人欲識衛生道喜樂有常嗔怒少心誠意正思慮除順理修身去煩惱春噓明目夏呵心秋呬冬吹肺腎寧四季常呼脾化食三焦嘻出熱難停髪宜多梳氣宜鍊齒宜數叩津宜嚥子欲不死修崑崙註曰崑崙即人之頭面也當如下句修之雙手揩摩常在面註曰以雙手扯攝兩耳抱頭搖擺以兩手一呵十搓擦靣四圍以合骨摩拂雙眼以雙手抱腦後以中食二指互擊天鼓皆修崑崙法也春月少酸宜食甘冬月宜苦不宜鹹夏日增辛聊減苦秋来辛減少加酸季月大鹹甘畧戒自然五臓保平安若能全減身康健滋味能調少病難春寒莫著綿衣薄夏月汗多須換着秋冬覺冷漸加添莫待病生纔服藥惟有夏月難調理伏陰在内忌冰水𤓰桃生冷宜少餐免至秋冬成瘧痢身旺腎衰色宜避養腎固精當節制嘗令腎實不空虚日食須知忌油膩太飽傷神飢傷胃太渇傷血多傷氣飢餐渇飲莫太過免致膨脝損心肺醉後強飲飽強食去此二者不生疾人資飲食以養生去其甚者自安逸食後徐行百步多手摩臍腹食消磨夜半靈根灌清水丹田濁氣切須呵飲酒可以陶情性劇飲過多防百病肺為華葢倘受傷咳嗽勞神能損命慎無將鹽去㸃茶分明引賊入人家下焦虚冷令人瘦傷腎傷脾防病加坐臥防風吹腦後腦内受風人不夀更兼醉飽臥風中風入五内成災咎鴈有序兮犬有義黒鯉朝北知臣禮人無禮義反食之天地鬼神俱不喜養體須當節五辛五辛不節反傷身莫教引動虚陽發精竭容枯百病侵不問在家併在外若遇迅雷風雨大急宜端肅畏天威靜坐澄心須謹戒恩愛牽纒不自由利名縈絆幾時休放寛些子留餘福免致中年早白頭頂天立地非容易飽食煖衣寧不愧思量難報罔極恩朝夕焚香拜天地身安夀永事如何胷次平夷積善多惜命惜身兼惜氣請君熟玩衛生歌西昇經曰凡人見人之死亡而哀之何不哀自身哀身不如愛神愛神不如含神含神不如守身守身長久長存也神生形形成於神形不得神不能自生神不得形不能自成形神合同相生相成神常愛人人不愛形故絶去聖智歸無為也大有經曰形生愚智天也強弱夀夭人也天道自然人道自已始而胎氣充實生而乳哺有方長而滋味不偏壯而聲色有節者強而夀始而胎氣虚耗生而乳哺不足長而滋味過多壯而聲色恣放者弱而夭生長而合度加之以道養夀年未可量也胡孔明曰常人不得無慾又復不得無事但當和心約念靜身損物先去亂神犯性者此亦嗇神之一術耳黄帝中經曰靜者夀躁者夭靜而不能養減夀躁而能養延年然靜易御躁難持盡慎養之宜者靜亦可養躁亦可養也凡重貴勢者雖不中邪精神内傷亦多死亡又曰養性者要使習以成性性自為善外病不得而侵能治病於未病之先不特餌藥餐霞其於平居五常俱全百行周備雖無藥餌亦可長年徳行不足縱有金丹夀亦不永嵇中散曰養生有五難名利不去為一難喜怒不除為二難聲色不去為三難滋味不薄為四難神蕩精散為五難五者不去心雖希壽口誦至言咀嚼英華呼吸太陽不能挽其夭且病也五者能絶則信順日躋道徳日全不祈生而有神不求夀而延年矣扁鵲論曰食能排邪而安臟腑飲能爽志以資血氣攝生者氣正則味順味順則神氣清神氣清則合真之靈全靈全則五邪百病不能干也故曰水濁魚疲氣昏人病夫神者生之本本者生之真大用則神勞大勞則形疲也彭祖攝生論曰目不視不正之色耳不聽不正之聲口不嘗不正之味心不起不正之念四者忘魂喪精減折夀算者也黄帝内傳曰食氣者靈而延夀算食穀者多智而勞形神食草者愚癡而足力食肉者鄙勇而多嗔服氣者常存而得道小有經曰才所不勝而強思之傷也力所不任而強舉之傷也深憂而不解重喜而不釋皆傷也太上曰天之道利而不害聖人之道為而不爭故與時爭之者昌與人争之者凶夫不祥者人之所不爭垢辱者人之所不欲能受人所不欲則足矣得人所不爭則寧矣妙真經曰視過其目者明不居聽過其耳者精不守愛過其心者神不居牽過於利者動即懼道言吉凶禍福窈𡨕中來其災禍也非富貴者可請而避其榮盛也非貧賤者可欲而得惟修善則福應為惡則禍來又曰神者魂也降之於天鬼者魄也經之於地是以神能服氣形能食味氣清則魂爽形勞則魄濁服氣者綿綿而不死身騰於天食味者混混而殂形歸於地理自然也上僊經曰有者因無而生形者須神而立故有乃無之宫形乃神之宅也莫不全宅以安生修身以養神若氣散歸空遊神為變猶火之於燭燭靡則火不居水之於堤堤壞則水不住魂勞神散何以長年東觀經曰有事無事嘗若在心處靜處喧其志惟一制而不著放而不動處喧無惡涉事無惱者此是真定以無事為真定有事為應跡羣仙語錄曰専精養神不為物雜謂之清反神服氣安而不動謂之靜制念以定志靜身以安神保氣以存精思慮兼忘𡨕想内視則身神竝一以近於道理論要記曰性耽𤣥虛情寡嗜好不知榮華之可貴非強身以自髙不見淫僻之可欲非閑防以自正體至仁含至静超跡塵滓棲真物表想道結襟以無為為事近於仙道一也其次希髙敦古剋意尚行知榮華為浮寄忽之而勿顧知聲色能伐性捐之而勿取剪陰賊樹陰徳懲忿慾齊毁譽處山林修清真近於仙道二也其次身居禄位之塲心游道徳之鄉奉上以忠臨下以義於己薄於人厚仁慈和易博愛𢎞施外混囂塵内含澄寂潛跡宻修好生惡死近於仙道三也其次瀟灑蓽門樂貧甘賤抱經濟之才泛然若無洞古今之事曠然若虚爵之不動禄之不受確乎以方外為尚恬乎以攝生為務近於仙道四也其次稟明穎之資懷秀拔之節奮智機之旅當鋭巧之師所攻無敵一戰而勝然後靜以安身和以保神精以致真近於仙道五也其次追悔既往洗心自新雖失之於壯齒冀收之於晩年以功補過過落而功全以正易邪邪亡而正在轗軻不能易其操喧譁不能亂其性惟精惟一積以誠著近於仙道六也其次至忠至孝至貞至廉按真誥之言不待修學而自得比干剖心而不死惠風溺水而復生伯夷叔齊之髙風曽參閔子之大孝人見其没而道見其存如此善行充塞天地謂之隱景潛光死而不亡此亦卓然人品超越近於仙道七也人能得此七近謂之拔陷區出溺塗碎禍車登福輿可與涉養生之𤣥神仙之津矣陰陽論曰陰陽交泰萬物化生故陰陽自少至老化為五行少陽成木老陽成火少陰成金老陰成水叅土而和之以成夫婦故木以發之火以化之水以滋之土以和之金以勁之故得品物成焉五勝者皆以生我為利剋我為用利用相乘故有成敗動靜者終始之道聚散者化生之門也陽其動乎陰其處乎動以生之靜以息之髪宜多櫛齒宜多叩液宜常嚥氣宜清鍊手宜在靣此為修崐崙之法五者為不死之道太𤣥經曰喜怒傷性哀樂傷神傷性則害生傷神則侵命故養性以全氣保神以安心氣完則體平心安則神逸此全生至要訣也寒山子曰修生之道除嗜去慾嗇神保和所以無累也内抑其心外檢其身所以無過也先人後己知柔守謙所以安身也善推於人不善歸己所以積徳也功不在大過不在小去而不二所以積功也然後内行充而外丹至可以冀道於彷彿耳益州老父曰凡欲身之無病必須先正其心使心不亂求心不狂思不貪嗜慾不著迷惑則心先無病矣心君無病則五臓六腑雖有病不難療矣真西山先生衛生歌萬物惟人為最貴百嵗光陰如旅寄自非留意修養中未免病苦為心累何必餐霞餌大藥妄意延齡等龜鶴但於飲食嗜慾間去其甚者即安樂食後徐徐行百步兩手摩脇并腹肚須㬰轉手摩腎堂謂之運動水與土仰靣仍呵三四呵自然食毒氣消磨醉眠飽臥俱無益渇飲飢餐猶戒多食不欲粗并欲速寧可少餐相接續若教一飽頓充腸損氣損脾非是福生食粘膩筋韌物自死禽獸勿可食饅頭閉氣不相和生冷偏招脾胃疾鮓醬胎卵兼油膩陳臭醃藏皆陰類老年切莫喜食之是借寇兵無以異炙煿之物須冷喫不然損齒傷血脈晩食常宜申酉前向夜須防滯胸膈飲酒莫教飲大醉大醉傷神損心志酒渇飲水并喫茶腰脚自兹成重墜嘗聞避風如避箭坐臥須教預防患况因飲後毛孔開風纔一入成癱瘓不問四時俱煖酒大熱又須難向口五味偏多不益人恐隨肺腑成殃咎視聽行藏不必久五勞七傷從此有四肢亦欲常小勞譬如户樞終不朽臥不厭縮覺貴舒飽則入浴飢則梳梳多浴少益心目黙寢暗眠神晏如四時惟夏難將攝伏陰在内腹冷滑補腎湯藥不可無食肉稍冷休哺啜心旺腎衰何所忌特忌疏通泄精氣臥處尤宜綿宻間宴居靜慮和心意沐浴盥嗽皆煖水臥冷枕凉皆勿喜𤓰茄生菜不宜食豈獨秋来多瘧痢伏陽在内三冬月切忌汗多陽氣泄陰霧之中毋遠行暴雨震雷宜遠避道家更有頥生㫖第一令人少嗔恚秋冬日出始求衣春夏雞鳴宜早起夜後晝前睡覺來瞑目叩齒二七回吸新吐故無令緩咽嗽玉泉還養胎摩熱手心熨兩眼仍更揩擦額與靣中指時將摩鼻頻左右耳眼摩數遍更能乾浴遍身間按䏶暗須紐兩肩縱有風勞諸冷氣何憂腰背復拘攣噓呵呼吸吹及呬行炁之人分六字果能依用力其間斷然百病皆可治情欲雖云屬少年稍知節養自無愆固精莫妄傷神氣莫使苞羽火中燃有能操履長方正於名無貪利無競縱向邪魔路上行百行周身自無病涪翁食時五觀一曰計功多少量彼來處此食墾植收穫舂磨淘汰炊煮乃成用功甚多何况殺害生靈為己滋味一人之食十人作勞家居則食父母心力所營縱是己財亦承餘䕃仕宦則食民之膏血大不可言二曰忖己徳行全缺應供始於事親中於事君終於立身全此三者應受供養無愧缺則已否當愧恥不敢盡味三曰防心為過貪等為宗於上味食務遠物而求難得是之謂貪於下味食起恚怒以口腹之故鞭扑人是之謂嗔食不過充飢而求食前方丈是之謂癡君子食無求飽離此過也四曰正事良藥為療形苦五穀五蔬以養人魚肉以養老形苦者飢渇為主病四百四病為客病故須食為醫藥以自扶持是故知足者舉筯常如服藥五曰為成道業方受此食君子無終食之間違仁先結款狀然後受食既食不可怠於道業達莊論曰恬於生而靜於死恬生則不惑死靜死則神不離生故能與陰陽化而不易從天地變而不移生究其壽死終其宜心氣平治消息不虧故求得者喪爭明者失無欲者自足空虚者受實是以作智巧者害於物明是考非者危其身修飾顯潔者惑於生畏死而崇生者失其貞庾闡神論曰天地者陰陽之形魄變化者萬物之遊魂神籟與無窮並吹大冶與造運齊根生資聚氣之跡死寄𤣥牝之門視榮辱其猶塵埃邈髙尚而不顧故能外安恬逸内體平和北宫子曰衣其短褐有狐貉之温進其茙菽有稻粱之味庇其蓬室若廣厦之蔭乘其蓽輅若文軒之飾終身怡然不知其為貧也象山要語曰此道非爭競務進者能知性靜退者可入又曰君子役物小人役於物夫權皆在我若在物則為物役矣學者不可用心太𦂳深山有寳無心於寳者得之利害毁譽稱譏苦樂能動搖人釋氏為之八風遵生八牋卷一
