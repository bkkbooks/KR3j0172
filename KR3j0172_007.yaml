盆古為難若定之五色劃花白定繡花劃花方圓盆以雲板腳為美更有八角圓盆六角環盆定樣最多奈無長盆官窑哥窑圓者居多縧環者亦有方則不多見矣如青東磁均州窑圓者居多長盆亦少方盆菱花葵花製佳惟可種蒲先年蔣石匠鑿青紫石盆有匾長者有四方者有長方四入角者其鑿法精妙允為一代高手傳流亦少人多不知又若廣中白石紫石方盆其製不一雅稱養石種蒲單以應石置之殊少風致亦有可種樹者又如舊龍泉官窑盈三二尺大盆有底冲全者種蒲可愛若我朝景陵茂陵所製青花白地官窑方圓盆底質細青翠又為殿中名筆圖畫非窑匠描寫㑹見二盆上蘆鴈不下絹素但盆惟種蒲者多種樹者少也惟定有盈尺方盆青東磁間或有之均州龍泉有之皆方而高深可以種樹若求長樣可列樹石雙行者絶少曽見宣窑粉色裂紋長盆中分樹水二漕製甚可愛近日燒有白色方圓長盆甚多無俟他求矣其北路青緑泥窑俗惡不堪經眼更有燒成鬼子蟾蜍劉海荔枝党仙中間二孔種蒲此皆兒女子戲物豈容汚我仙靈見之當擊碎撞破為菖蒲脫災山齊有崑石蒲草一具載以白定劃花水底大盈一尺三四寸製川石數十子紅白交錯青緑相間日汲清泉養之自謂齊中一寶擬花榮辱評高子曰花之遭遇榮辱即一春之間同其天時而所遇逈别故余述花雅稱為榮凡二十有二其一輕隂蔽日二淡日蒸香三薄寒護蕊四細雨逞矯五淡烟籠罩六皎月篩隂七夕陽弄影八開值晴明九傍水弄妍十朱闌遮護十一名園閒靜十二高齊清供十三插以古瓶十四矯歌艷賞十五把酒傾歡十六晚霞映彩十七翠竹為鄰十八佳客品題十九主人賞愛二十奴僕衛護二十一美人助粧二十二門無剝啄此皆花之得意春風及第逞艷不惟花得主榮主亦對花無愧可謂人與花同春矣其疾憎為辱亦二十有二一狂風摧慘二淫雨無度三烈日銷爍四嚴寒閉塞五種落俗家六惡鳥翻銜七驀遭春雪八惡詩題咏九俗客狂歌十兒童扳折十一主人多事十二奴僕懶澆十三藤草纒攪十四本瘦不榮十五搓捻憔悴十六臺榭荒凉十七醉客嘔穢十八築瓦作瓶十九分枝剖根二十蟲食不治二十一蛛網聨絡二十二麝臍薰觸此皆花之空度青陽芳華憔悴不惟花之寥落主庭主亦對花增愧矣花之遭遇一春是非人之所生一世同邪家居種樹宜忌地理新書曰人家居止種樹惟栽竹四畔青翠鬱然不惟生旺自無俗氣東種桃栁西種拓榆南種梅棗北種奈杏為吉又云宅東不宜種杏宅南北不宜種李宅西不宜種栁中門種槐三世昌盛屋後種榆百鬼退藏庭前勿種桐妨礙主人翁屋內不可多種芭蕉久而招祟堂前宜種石榴多嗣大吉中庭不宜種樹取隂栽花作闌惹淫招損隂陽忌云庭心樹木多閒困長植庭心主禍殃大樹近軒多致疾門庭雙棗喜加祥門前青草多愁怨門外垂楊更有妨宅內種桑并種槿種桃終是不安康選擇黃厯臺厯二說高子曰家居選擇似不可緩然而日者成書頗煩無俟余為撮槩惟竒門演禽二書最為卜筮緊要每有異驗余深知之惜乎浩濶無容舉略今之黃歷臺歷內有二事人不多識持揭以明之黃厯每月下有某日日傳娵訾之次當用甲丙庚壬時此為四大吉時也百凡用之至吉但十二時中曽無甲時丙時其說云何娵訾者正月亥將也為之月將其十二將俱逆行自亥始正月雖過一二十日其將未交惟看厯上正月下某日日傳娵訾之次方作正月論已先之日俱作十二月將算交月之後每月用時甲取寅卯二時之中各半用之是吉時也丙取己午之中庚取申酉壬取亥子是也又如二月戌將降婁當用艮㢲坤乾四時艮取丑寅二時之中各半㢲取辰巳坤取未申乾取戌亥是也三月酉將大梁過傳當用癸乙丁辛四時癸取子丑乙取卯辰丁取午未辛取酉戌是也四月申將實沉將換而用時又以甲丙庚壬三項實輪無變法也五月未將鶉首六月午將鶉火七月巳將鶉尾八月辰將壽星九月卯將大火十月寅將析木十一月丑將星紀十二月子將𤣥枵每月惟以黃厯月建下考之須記雖過二月還用正月將選擇是最緊要又如京師臺厯每月下有義字專字伐字制字寶字其五字何也此為竒門選日訣也假如甲子日子水生甲木下生上也為義乙丑日乙木克丑土上克下也為制戊辰日上下無犯為專庚午日午火克庚金下克上也為伐丁丑日丁火生丑土上生下也為寶故用日當以五字消息用之大率寶義為上吉專為平制伐為凶也特述以備參考居處生旺吉凶宜忌保生要録曰人之家室土厚水深居之不疾故人居處隨其方所皆欲土厚水深土欲堅潤而黃水欲甘美而清常坐之處極令四面周密勿令少有細隟致風得入壁間風峻人不易知其傷人最重初時不覺久能中人夫風者天地之氣也能生成萬物亦能損人有正有邪故耳初入腠理漸至肌膚內傳經脉達於臟腑傳變既深為患不小故云避風如避箭盛暑所居兩頭通屋弄堂夾道風回凉爽其為害尤甚養生者當更慎之黃帝宅經曰陽宅即有陽氣抱隂隂宅即有隂氣抱陽隂陽之宅者即龍也陽宅龍頭在亥尾在已隂宅龍頭在已尾在亥其狀在龍者陽龍赤隂龍青各冇命坐切忌犯也凡從㢲向乾從午向子從坤向艮從酉向卯從戌向辰移轉為陽巳上移轉及上官所住不計遠近悉入陽也從乾向㢲從子向午從艮向坤從卯向酉從辰向戌移轉為隂巳上移轉悉名入隂故福德之方動依天道天德月德生氣到其位即修令清潔濶厚即一家獲安榮華富貴天之福德者宅之財命也財命既壯何愁不榮故須勤修再入隂入陽是名無氣三度重入隂陽謂之無魂四入謂之無魄魂魄既無即家破逃散子孫絶滅也連犯不止即絶門滅嗣此之謂也若一隂陽往來即合天道自然吉昌之象也又云其宅乃窮急翻故宮宜拆形禍方舍却益福德方也翻宅平牆可以銷殃宅之行年不利或口舌疾病等事即宜翻刑禍之方添益福德改移牆壁即災消禍滅致大吉昌也又云刑禍之方缺復荒福德之方連接長吉也刑禍之方牆宜薄屋宜低荒蕪無事福德方及牆屋宜連接高朗壯實也刑禍之方縮復縮猶恐災殃往相逐福德之方拓後拓子子孫孫受榮樂刑禍之方戒侵拓也不得大縮縮即氣不足不足則損財祿不吉福德之方宜戒侵拓亦不得太過太過即成福㑹至微不消厚福所臨也凡事足大過所侵拓之數過於本宅名曰太過又云宅中姓上吉利地不得破損與汚穢西比天門緊要方勿安糞土與牛厮又云宅有五虛令人貧耗五實令人富昌宅大人少一虛門面大內窄小二虛牆院不完整三虛井竈不一處四虛宅地多屋少庭院廣濶五虛宅少人多一實宅大門小二實牆院周完三實宅地相停四實宅水溝東南流五實又云勿以接木為柱又自死樹為柱皆不祥又云宅乃漸昌勿棄室堂不得因富就改造也不衰莫移是為受殃舍居就廣未必有歡計口半造必得壽考言宅不宜廣也每年逐月有生氣死氣之位修生氣者福德來集言月生氣與天道月德合其吉路也犯死氣之方者立見禍殃逐月生死二氣所主方位正月生氣在子癸死氣在午丁二月生氣在丑艮死氣在未坤三月生氣在寅甲死氣在申庚四月生氣在卯乙死氣在酉辛五月生氣在辰㢲死氣在戌乾六月生氣在己丙死氣在亥壬七月生氣在午丁死氣在子癸八月生氣在未坤死氣在丑艮九月生氣在申庚死氣在寅甲十月生氣在酉辛死氣在卯乙十一月生氣在戌乾死氣在辰㢲十二月生氣在亥壬死氣在己丙逐月土氣所冲方宅經曰凡修築垣牆建造宅舍土氣所冲之方人家即有災殃宜依法禳之吉正月土氣冲丁未方二月冲坤三月冲壬亥四月冲辛戊五月冲乾六月冲寅甲七月冲癸丑八月冲艮九月冲丙巳十月冲辰乙十一月冲㢲十二月冲甲庚已上當細看之犯必有災天道吉方此說人多不知故表出於此子午年坤艮寅申年乙辛丑未年甲庚卯酉年乾㢲辰戊年丙壬己亥年丁癸方隅土木等神其祭文曰兹者建造屋宇其木泥石繪畫之人所有魘鎮咒詛不出百日乃使自受其殃預先盟於羣靈則災禍無干於我使彼自受而我家宅寧矣造船者亦如此例梓人最忌倒用木植必取生氣根下而稍上其魘者倒用之使人家不能長進作事顛倒解法以斧頭擊其木曰倒好倒好住此宅內世世溫飽又若造前梁臨上乃移為後梁魘曰前梁調後梁必定先死娘卯眼內放竹楔者魘曰栒卯放竹不動自哭使人家屋內常有哭聲有刻人像書咒於身以釘釘於屋上釘眼令瞎釘耳令聾釘口令啞釘心令有心疾釘門使房主不得在家令出門釘之終不得安居屋內如釘床以竹釘十字釘之或畫人形紙符於內使卧床之人疾病不安此梓人魘鎮之大略解之之法其屋既成用水一盆使家人各執栁枝蘸水繞屋灑之咒曰木郎木郎逺去他方作者自受為者自當所有魘鎮與我無妨急急一如太上律令敕則無患矣如瓦匠魘有合脊中放土人船傘之類或壁中置一匙一筯曰只許住一時其家便破如甃砌門限階塞之下用荷葉包飯於下以筯十字安在上令有嘔噎之疾有砌竈用木刻人以瓦刀朝其寢或向㕔堂使其刀兵相殺石匠鑿人形置磉上又畫匠彩梁俱有魘呪說破不妨凡木匠魘人必插木䈜在首不令插之即不靈矣遵生八箋卷七
