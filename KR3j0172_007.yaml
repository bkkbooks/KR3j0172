body:
  text: 遵生八箋卷七明高濓撰起居安樂箋上高子曰吾生起居禍患安樂機之也人能安所過而遵所生不以得失役吾心不以榮辱勞吾形浮沉自如樂天知命休休焉無日而不自得也是非安樂之機哉若彼偃仰時尚奔走要塗逸夢想於燕韓馳神魂於吳楚遂使當食忘味當臥忘寢不知養生有方日用有忌毒形蠱心枕戈蹈刃禍患之機乘之矣可不知所戒哉余故曰知恬逸自足者為得安樂本審居室安處者為得安樂窩保晨昏怡養者為得安樂法閒溪山逸遊者為得安樂歡識三才避忌者為得安樂戒嚴賔朋交接者為得安樂助加之內養得術丹藥效靈耄耋期頥坐躋上壽又何難哉録古成說間附己意為編箋曰起居安樂恬逸自足條序古名論羅鶴林曰唐子西詩云山靜似太古日長如小年余家深山之中每春夏之交蒼蘚盈階落花滿徑門無剝啄松影參差禽聲上下午睡初足旋汲山泉拾松枝煮苦茗啜之隨意讀周易國風左氏傳離騷太史公書及陶杜詩韓蘇文數篇從容步山徑撫松竹與麛犢共偃息于長林豐草間坐弄流泉漱齒濯足既歸竹窗下則山妻稚子作荀蕨供麥飯欣然一飽弄筆窗間隨大小作數十字展所藏法帖筆蹟畫卷縱觀之興到則吟小詩或草玉露一兩段再烹苦茗一杯出步溪邊邂逅園翁溪友問桑麻說粳稻量晴校雨探節數時相與劇談一餉歸而倚杖柴門之下則夕陽在山紫緑萬狀變幻頃刻恍可人目牛背笛聲兩兩來歸而月印前溪矣味子西此句可謂妙絶然此句妙矣識其妙者蓋少彼牽黃臂蒼馳獵於聲利之場者但見滚滚馬頭塵匆匆駒隙影耳烏知此句之妙哉人能真知此妙則東坡所謂無事此靜坐一日是兩日若活七十年便是百四十所得不已多乎延叔堅曰吾昧爽櫛梳坐於客堂朝則誦羲文之易虞夏之書歷公旦之典禮覽仲尼之春秋夕則逍遙內階詠詩南軒百家衆氏投閒而作洋洋乎其盈耳煥爛乎其溢目紛紛欣兮其獨樂也當此之時不知天之為蓋地之為輿不知世之為人已之有軀雖漸離擊筑傍若無人高鳳讀書不知暴雨方之于吾未足况也仲長統曰凡遊帝王之門者欲以立身揚名耳而名不常存人生易滅優游偃仰可以自娛欲卜居清曠以樂其志論之曰使居有良田廣宅背山臨流溝池環匝竹木周布場圃築前果園倚後舟車足以代步涉之難使令足以息四體之役養親有羞珍之膳妻孥無苦身之勞良朋萃至則陳酒殽以娛之嘉時吉日則烹羔豚以奉之躊躇畦苑遊戲平林濯清泉追凉風釣遊鯉弋高鴻風於舞雩之下詠歸高堂之上安神閨房思老氏之𤣥虛呼吸精和求至人之倣佛與達者數子論道講書俯仰兩儀錯綜人物彈南風之雅操發清商之妙曲逍遙一世之上睥睨天地之間不受當時之責永保性命之期如是則可以凌霄漢出宇宙之外矣豈羡夫入帝王之門哉秦子敕曰昔堯優許由非不𢎞也洗其兩耳楚聘莊周非不廣也執竿不顧得曝背隴畒之中誦顔氏之簞瓢詠原憲之蓬户時翺翔兮林澤與沮溺為等儔聽𤣥猿之悲吟察鶴鳴於九臯身安為樂無憂為福處空虛之名居不靈之龜知我者希則我貴矣斯乃得志之秋何困苦之戚也邪王右軍既去官與東土人士營山水弋釣之娛又與道士許邁共修服食遍採名藥不遠千里游東土中諸郡名山泛滄海嘆曰我卒當以樂死陶元亮曰少學琴書偶愛閒靜開卷有得便欣然忘食見樹木交䕃時鳥變聲亦復歡然有喜常言五六月中北忩下卧遇凉風暫至自謂羲皇上人陶𢎞景愛山水每經澗谷必坐卧其間吟咏盤桓不能己巳謂門人曰吾見朱門廣厦雖識其華樂而無欲往之心望高巖瞰大澤雖知此難立恆欲就之且永明中求祿得輒差舛若不爾豈得為今日之事豈惟身有仙相亦緣勢使之然蕭大圜曰留侯追踪於赤松陶朱陳術於辛文良有况乎智不逸羣行不高物而欲辛苦一生何其僻也豈如知足知止蕭然無纍北山之北棄絶人間南山之南超踰世網面修原而帶流水倚郊甸而枕平臯築蝸舍于叢林搆環堵於幽薄近瞻烟霧遠睇風雲藉纎草以䕃長松結幽蘭而援芳桂仰翺禽於百仭俯泳鱗於千尋果園在後開窗以卧花卉蔬圃居前坐簷而看灌畝二頃以供饘粥十畝以給絲麻侍兒三五可充紝織家僮數四足代耕耘沽酪牧羊協潘生之志畜雞種黍應莊叟之言穫菽尋泛氏之書露葵徵尹君之録烹羔豚而介春酒迎伏臘而俟歲時披良書探至賾歌纂纂唱嗚嗚可以娛神可以散慮有朋自遠揚榷古今田畯相過劇談稼穡斯亦足矣樂不可支永保性命何畏憂責王摩詰惟喜奉佛居嘗蔬食不茹葷血得宋之問藍田别墅在輞口輞水周於舍下竹洲花塢與道友裴迪浮舟往來彈琴賦詩嘯詠終日在京師日飯數十名僧以𤣥談為樂齊中無所有唯茶鐺酒臼經案繩牀而已樂天云洛城內外六七十里間凡觀寺丘墅有泉石花竹者靡不游人家有美酒鳴琴者靡不過有圖書歌舞者靡不觀自居守洛川洎布衣家以宴遊召者亦時時往每良辰美景或雪朝月夕好事者相過必為之先拂酒罍次開篋詩酒酣乃自援琴操宫聲弄秋思一遍樂天廬山草堂記云堂中設木榻四素屏二漆琴一張儒道佛書各數卷樂天既來為王仰觀山俯聽泉傍睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適內和一宿體寧再宿心恬三宿後頺然嗒然不知其然而然矣醉吟先生宦遊三十載將退居洛下所居有池五六畝竹數千竿喬木數千株臺榭舟船具體而微與嵩山僧如滿為空門友平泉客韋楚為山水友彭城劉夢得為詩友皇甫朗之為酒友每一相遇欣然忘歸蘇子美答韓持國曰此伏臘稍足居室稍寬無應接奔走之勞耳目清曠不設機關以待人心安閒而體舒放三商而眠高春而起靜院明窗羅列圖史琴樽以自娛有興則泛小舟出盤閶二門吟嘯覽古於江山之間渚茶野釀足以消憂尊鱸稻蟹足以適口又多高僧隱君子佛廟絶勝家有林園珍花竒石曲池高臺魚鳥留連不覺日暮阮孝緒著高隱傳言行超逸名氏勿傳為上品始終不耗名姓可録為中品掛冠人世棲心塵表為下品歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追實迷途其未遠覺今是而昨非舟搖搖以輕揚風飄飄而吹衣問征夫以前路悵晨光之熹微日欲暮也乃瞻衡宇載欣載奔僮僕歡迎稚子候門三徑就荒松菊猶存携幼入室有酒盈樽引壺觴以自酌眄庭柯以怡顔倚南窗以寄傲審容膝之易安園日涉以成趣門雖設而常關䇿扶老以流憩時矯首而遐觀雲無心以出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶游世與我而相違復駕言兮焉求悅親戚之情話樂琴書以消憂農人告余以春及將有事於西疇或命巾車或棹孤舟既窈窕以尋壑亦﨑嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇內復幾時曷不委心任去留胡為乎遑遑欲何之富貴非吾願帝鄉不可期懷良辰以孤往或植杖而耘耔登東臯以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑太醫孫景初自號四休居士山谷問其說四休答曰粗茶淡飯飽即休補破遮寒暖即休三平四滿過即休不貪不妬老即休山谷曰此安樂法也少欲者不伐之家也知足者極樂之國也四休家有三畝園花木鬱鬱客來煮茗談上都貴游人間可喜事或茗寒酒冷賔主相忘其居與余相望暇則步草徑相尋作小詩遺家僮歌之以侑酒茗詩曰太醫診得人間病安樂延年萬事休又曰無求不著看人面有酒可以留人嬉欲知四休安樂法聽取山谷老人詩山谷四印云我提養生之四印居家所有更贈君百戰百勝不如一忍萬言萬當不如一默無可揀擇眼界平不藏秋毫心地直我肱三折得此醫自覺兩踵生光輝蒲團日靜鳥吟時爐燻一炷試觀之四休四印老少富貧無量無邊普同供養倪正父鋤經堂述五事靜坐第一觀書第二看山水花木第三與良朋講論第四教子弟讀書第五齊齊十樂云讀義理書學法帖字澄心靜坐益友清談小酌半醺澆花種竹聽琴玩鶴焚香煎茶登城觀山寓意奕棋十者之外雖有他樂吾不易矣邵康節吟曰年老逢春雨乍晴雨晴况復舊清明天低宫殿初長日風暖林園未囀鶯花似錦時高閣望草如茵處小車行東君見賜何多也况復人間久太平又云堯夫非是愛吟詩詩是堯夫志喜時明著衣冠為士子高談仁義作男兒敢於世上明開眼肯向人間浪皺眉六十七年無事日堯夫非是愛吟詩擊壤集一編老人怡神悅目時可吟玩公喜飲酒命之曰太和湯飲不過多不喜太醉其詩曰飲未微酡日先吟哦吟哦不足遂及浩歌所寢之室名安樂窩冬暖夏凉遇有睡思則就枕其詩曰墻高於肩室大如斗布被暖餘藜藿飽後氣吐胸中充塞宇宙聞人說人之善就而和之又從而喜之語曰樂見善人樂聞善事樂道善言樂行善意晚教二子以六經家素業儒口未嘗不道儒言身未嘗不蹈儒行其詩曰羲軒之書未嘗去手堯舜之談未嘗離口當中和天同樂易友吟自在詩飲歡喜酒百年升平不為不偶七十康强不為不壽老境從容孰有如康節者乎陶彭澤性嗜酒家貧不能常得親舊知其如此或置酒招之造飲輒醉而退曾不吝情去留環堵蕭然不蔽風雨短葛穿結簞瓢屢空晏如也陶𢎞景書曰偃蹇園巷從容郊邑守一介之志非敢蔑榮嗤俗自致雲霞蓋任性靈而直往保無用以得閒隴薪井汲樂有餘歡切松煮术此外何務謝靈運逸民賦曰有酒則舞無酒則醒不明不晦不昧不類蕭條秋首兀奡春中弄琴明月酌酒和風禦清風以遠路拂白雲而峻舉指寰中以為期望象外而延佇又曰推天地於一物橫四海於寸心超塵埃以貞觀何落落此心胸徐勉曰冬日之陽夏日之隂良辰美景負杖躡履逍遙自適臨池觀魚披林聽鳥濁酒一杯彈琴一曲求數刻之樂庶幾居常以待終謝譓不忘交接門無雜賔有時獨醉曰入吾室者但有清風對吾飲者惟有皓月耳歌者袁綯嘗從子瞻與客遊金山適中秋天宇四壁一碧無際加江流傾湧月色如晝遂共登金山妙高臺命綯歌其水調頭歌曰明月幾時有把酒問青天歌罷公自起舞伯倫肆意放蕩以宇宙為狹常乘鹿車㩦一壺酒使人荷鍤隨之云死便掘地以埋土木形骸遨遊一世謝幾卿性通脫遇樂遊宴不得醉而還因詣道邊酒壚停車褰幔與車前三騶對飲觀者如堵幾卿自若陳暄嗜酒沈湎兄子秀憂之致書諷諫暄答云昔周伯仁渡江惟三日醒吾不以為少鄭康成一飲三百杯吾不以為多吾嘗譬酒猶水也可以濟舟亦可以覆舟故江咨議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣何水曹眼不識杯鍾吾口不離瓢杓汝寧與何同日而醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉爾無多言非爾所及司空圖預為壽藏故人來者引之壙中賦詩對酌人或難之圖曰達人大觀幽顯一致非止暫遊此中公何不廣哉布衣鳩杖出則以女家人鸞臺自隨歲時村社㑹集圖必造之與野老同席曾無傲色韓熙載肆情坦率不持名檢伎樂殆以百數所得月俸盡散諸姬熙載敝衣芒履作瞽者持獨絃琴俾舒雅執板挽之隨房乞食為樂子瞻在儋耳因試筆嘗自書云吾始至南海環視天水無際凄然傷之曰何時得出此島邪已而思之天地在積水中九州在大瀛海中中國在少海中有生孰不在島者覆盆水於地芥浮于水蟻附於芥茫然不知所濟少焉水涸蟻即徑去見其類出涕曰幾不復與子相見豈知俯仰之間有方軌八達之路乎念此可為一笑瀟灑張郎搆一蘆軒銘曰吾軒之中并無長物織蘆成瓦紙帳為屏墻不禦風窗不掩月相對二子刈書是悅勤兒課摹古帖有茶則飲有香則焚衲衣素餐家風甚拙閉門謝客不知世故吾性自别有漫草詩云林畔闌􅔐處泥垣浸碧濠性岐延客寡室陋滌塵勞𤣥學揚雄辨經翻劉向騷食瓢家俸短睡起日偏高絶交書云但願守陋巷教養子孫時與親舊叙濶陳說平生濁酒一杯彈琴一曲志願畢矣又云聞道士遺言餌术黃精令人壽永意甚信之遊山澤觀魚鳥心甚樂之一行作吏此事俱廢安能捨其所樂而從其所懼哉王逸少曰夫人之相與俯仰一世或取諸懷抱晤言一室之內或因寄所托放浪形骸之外雖取舍萬殊靜躁不同當其欣於所遇暫得於已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣悲夫閒遊贊曰䕃映巖流之際偃息琴書之側寄心松竹取樂魚鳥則淡泊之願於是畢矣韓退之曰窮居而閒處升高而望遠坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適所安與其有譽於前孰若無毁於後與其有樂於身孰若無憂於心窮居荒凉草樹茂密出無驢馬因與人絶一室之內有以自娛澄懷録曰長松怪石去墟落不下一二十里鳥徑緣崖涉水於草莾間數四左右兩三家相望雞犬之聲相聞竹籬茅舍蕪處其間蘭菊藝之臨水時種梅柳霜月春風自有餘思見童婢僕皆布衣短褐以給薪水釀村酒而飲之案有雜書莊周太𤣥楚詞黃庭隂符楞嚴圓覺數十卷布袍杖黎躡屐往來窮谷大川聽流水看激湍鑒澄潭步危橋坐茂林探幽壑升高峯顧無樂而死乎雜志曰居閒勝於居官其事不一其最便者尤於暑月見之自早燒香食罷便可脫衫巾除裙靸從事藤牀竹几高枕北窗清風徐來不患太凉挾䇿就枕困來熟睡晚凉夢醒浴罷逍遙臨池觀月乘高取風採蓮剝芡削瓜斷藕白醪三杯取醉而適其為樂殆不减羲皇上人也曾南豐曰宅有桑麻田有粳稌而渚有菱芡弋於高以追鳬鴈之上下緡於深而取魴鯉之潛泳吾所以衣食其力而無愧於心也䕃有喬木之繁隂藉有豐草之幽香登髙而望逺覽天地之竒變弄泉而乘月遺世俗之塵氛此吾取其怠倦而樂於自遂也東坡云歲行盡矣風雨凄然紙窗竹屋燈火青熒時於此有少趣誠齊曰鳥啼花落欣然有㑹於心遣家僮滌酒尊傾白酒釂一梨花磁盞急取詩詞快讀數過以咽之蕭然不知在塵埃間也又曰因葺舊廬疏渠引泉周以花木中設琴尊故人過逢瀹茗奕棋杯酒淋浪殆相忘塵世也水心曰上下山水穿幽透深永日留連欣然有㑹向人鋪說無異好聲美色又曰松竹迷道庭花合圍著山人衣躡逰山屐逍遙賔送日月于林蒨中倦遊而返則危坐清吟抱膝長嘯婚嫁有無皆落莫置之如度外事聞名勝士欣然迎至靜對清談與究仙佛二氏所以離合見性命真處如有契心相視而笑莫逆於心李太白詩清風明月不用一錢買赤壁賦云惟江上之清風與山間之明月耳得之而為聲目遇之而成色取之無禁用之不竭此造物之無盡藏也東坡之意蓋自太白詩句得來夫風月不用錢買而取之無禁太白詩之所言信矣然而能知清風明月為可樂者能有幾人清風明月一歲之間亦無幾日人即能知此樂或為俗事相奪或為病苦所纒欲樂之有不能者有閒居無事遇此清風明月不用錢買又無人禁而不知此樂者是自生障礙也陶潛性真率貴賤造之者有酒輒設潛若先醉便語客曰我醉欲眠君且去劉含度性虛遠有氣調風流跌宕名高一時嘗云不須名位所須衣食不用身後之譽惟重目前所見梁忠烈世子性愛林泉特好散逸論曰吾嘗夢為魚因化為鳥方其夢也何樂如之及其覺也何憂斯類良繇吾之不及魚鳥遠矣故魚鳥飛浮任其志性吾之進退長在掌握舉首懼觸搖足恐墮使吾終得與魚鳥同遊則去世如脫屣耳裴中立不信數術每語人曰雞猪魚蒜逢著則吃生老病死時至則行高子漫談高子曰古云得一日閒方是福做千年調笑人癡又云人生無百年長懷千歲憂是為碌碌於風塵勞勞於夢寐者言耳吾生七尺豈不欲以所志干雲霄挾劔寒星斗耶命之所在造化主宰之所在也孰與造化競哉既不得於造化當安命於生成靜觀物我認取性靈放情宇宙之外自足懷抱之中狎玩魚鳥左右琴書外此何有於我若彼潛形追鹿豖浪遊樂志共烟霞沉醉潔身者乃負甑而逃抱道者以圖形為恥豈果不以華彩為榮甘以寂寞為樂哉是皆不得於造化意富貴之畏人不如貧賤之肆志故能棄衆人之所取取衆人之所棄耳味無味於虛無之淵忘無忘於𤣥冥之府身居塵俗志橫兩間居在山林而神浮八極何能使生為我酷形為我毒身為我桎梏乃踽踽凉凉為造物哂哉樂恬逸者當與把臂作謦咳語高子自足論高子曰居廟堂者當足於功名處山林者當足於道德若赤松之遊五湖之泛是以功名自足彭澤琴書孤山梅鶴是以道德自足者也知足者雖富貴不艷於當時芳聲必振於千古否則不辱於生前必災禍於沒世故足之於人足則無日而不自足不足則無時而能足也又若迫於饑寒困於利達者謂人可以勝天乃營營於飽暖聲華孰知此命也非人也命不足於人人何能足我也故子房之高蹈遐舉功蓋千古少伯之滅跡潛踪名著人間淵明嗜酒人未病其沉酣和靖栽梅世共稱其閒雅是皆取足於一身無意於持滿能以功名道德為止足故芳躅共宇宙周旋高風同天地終始耳人能受一命榮竊升斗祿便當謂足於功名弊裘短褐糲食菜羮便當謂足於衣食竹籬茅舍蓽竇蓬窗便當謂足於安居藤杖芒鞋蹇驢短棹便當謂足於騎乘有山可樵有水可漁便當謂足於莊田殘卷盈床圖書四壁便當謂足於珍寶門無剝喙心有餘閒便當謂足於榮華布衾六尺高枕三竿便當謂足於安享看花酌酒對月高歌便當謂足於歡娛詩書充腹詞賦盈編便當謂足於豐瞻是謂之知足常足無意於求足未足者也足果可以力致幸求哉我故曰能自足於窮通者是得浮雲富貴之夷猶能自足於取捨者是得江風山月之受用能自足於眼界者是得天空海濶之襟懷能自足於貧困者是得簞瓢陋巷之恬淡能自足於辭受者是得茹芝採蕨之清高能自足於燕閒者是得衡門泌水之靜逸能自足於行藏者是得歸雲倦鳥之舒徐能自足於唱酬者是得一咏一觴之曠達能自足於居處者是得五栁三徑之幽閒能自足於嬉遊者是得浴沂舞雩之瀟灑若此數者隨在皆安無日不足人我無競身世兩忘自有無窮妙處打破多少塵勞奈何捨心地有餘之足而抱意外無饜之貪果何得哉似亦愚矣觀彼進功名於百尺棄道德於方寸日汲汲於未足如金張貴逞終蹈身災石鄧財雄卒罹族滅君子可不以水月鏡花為幻好謙惡盈為戒哉又若鄙陋者原石火頃炎氷山乍結即便心思吞象目無全牛務快甲第雲連金珠山積舉世莫與之比欲猶未滿此正所謂不知足者也吾知棘林之駝黏壁之蝸是皆此輩耳其與留有餘不盡以還造化者何如哉居室安處條序古名論天隱子曰吾謂安處者非華堂邃宇重裀廣榻之謂也在乎南面而坐東首而寢隂陽適中明暗相半屋無高高則陽盛而明多屋無卑卑則隂盛而暗多故明多則傷魄暗多則傷魂人之魂陽而魄隂茍傷明暗則疾病生焉此所謂居處之室尚使之然况天地之氣有亢陽之攻肌淫隂之侵體豈可不防慎哉修養之漸倘不法此非安處之道術曰吾所居室四邊皆窗户遇風即闔風息即開吾所居座前簾後屏太明即下簾以和其內映太暗則捲簾以通其外耀內以安心外以安目心目皆安則身安矣明暗尚然况太多事慮太多情欲豈能安其內外哉高太素隱商山起六館曰春雪未融館清夏晚雲館中秋午月館冬日方出館暑簟清風館夜階急雨館各製一銘神隱曰草堂之中竹窗之下必置一榻時或困倦偃仰自如日間窗下一眠甚是清爽時夢乘白鶴遊於太空俯視塵壤有如蟻壘自為莊子夢為蝴蝶入於桃溪當與子休相類又曰草堂之中或草亭僻室製為琴室地下埋一大缸缸中懸一銅鐘上以石墁或用板鋪上置琴磚或木几彈琴其聲空朗清亮自有物外氣度東坡守汝隂作亭以帷幕為之世所未有其製若亭四圍柱架空插成之裝起則以帷幕圍之拆束則揭而他往其銘略云乃作新亭簷楹欒梁鑿枘交設合散靡常不油仰承清幄四張我所欲往十夫可將與水升降除地布牀又云豈獨臨水無適不臧春朝花郊秋夕月場無脛而趨無翼而翔敝又改為其費易償榜曰擇勝名實允當又觀子由繼作四言詩內云視身如傳茍完不求山磐水嬉習氣未瘳風有翠幄雨有赤油匪車匪舟亦可相攸則晴用布帷雨用油幕可知唐子西云有軒數間松竹迷道庭花合圍直堂屋之後人事之所不及賔遊之所不至往往獨坐於此解衣盤礴箕踞胡床之上含毫賦詩曝背閲書以釋忽忽之氣自妙山家清事云擇故山濵水地環籬植荆間栽以竹餘丈植芙蓉三百六十入芙蓉二丈環以松梅入此餘三丈重籬外芋栗羊棗桃李內植梅結屋前茅後瓦入閣名尊經藏古今書左孰訓子右道院迎賔進舍三寢一讀書一治藥一後舍二其一儲酒榖列山具農具一安僕役庖湢婢一童一園丁二前鶴屋養鶴後犬一二足驢四蹄牛四角客至具蔬食酒核暇則讀書課農圃毋苦吟以安天年潘嶽閒居賦曰太母在堂覽止足之分廣浮雲之志築室種樹逍遙自得池沼足以漁釣春稅足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之資凜秋暑退熙春寒往微雨新晴六合清朗太夫人乃御板輿升輕軒遠覽王畿近周家園席長筵列子孫栁垂隂車結軌或宴於林或禊於泛昆弟斑白兒童稚齒稱萬壽以獻觴或一愳而一喜壽觴舉慈顔和浮杯樂飲絲竹駢羅頓足起舞抗音高歌人生安樂孰知其他王子猷嘗暫寄人空宅便命種竹或曰暫住何煩爾主王嘯咏良久指竹曰何可一日無此君栁子厚曰把荷鍤決溪泉為圃以給茹其隟則浚池溝藝樹木行歌坐釣望青天白雲以此為適亦是老死亡戚戚者孫公仲益曰新宅落成市聲不入耳俗軌不至門客至共坐青山當户流水在左輒談世事便當以大白浮之懿代崇佛法迎佛骨至起不思議堂以奉之杜祁公别墅起薝蔔館室形亦六器用亦六角以象簷花之六出焉陶學士曰余銜命渡淮入廣陵界維舟野次縱步至一村圃有碧蘆方數畝中隱小室榜曰秋聲館時甚愛之不知誰家别墅意主人亦雅士也宜春城中有堆阜郡人謂之袁臺地屬李致致有文馳聲衆為築室於袁臺取登東山而小魯之義榜為小魯軒宣城何子華有古橙四株面橙建堂榜曰剖金霜降橙熟開樽潔饌與衆共之陳犀罷司農少卿省女兄於姑蘇適上元夜觀燈車馬喧騰目奪神醉歎曰涉氷霜泛烟水乍見此高明世界遂覺神朗頓還舊館武陵儒者苗彤事園池以接賔客建野春亭內中雜植山野花草五色錯雜李愚語人曰子夙夜在公不曾漫遊華胥國意欲於洛陽買水竹處作蝶菴謝事居之菴中當以莊周為開山第一祖陳摶配食若忙者難為主籍供職王震為國子博士好觀雨中浮漚疏稠出沒每雨就四階狹擁處寓目而心醉焉張麟瑞戲之曰公宜以此亭名曰醉漚居處建置熅閣南方暑雨時藥物圖書皮毛之物皆為黴溽壞盡今造閣去地一丈有多閣中循壁為厨二三層壁間以板弭之前後開窗梁上懸長笐物可懸者懸於笐中餘置格上天日晴明則大開窗户令納風日爽氣隂晦則密閉以杜雨濕中設小爐長令火氣溫鬱又法閣中設床二三床下收新出窑炭實之乃置畫片床上永不黴壞不須設火其炭至秋供燒明年復換新炭床上切不可臥臥者病瘖屢有驗也蓋火氣所爍故耳清閟閣雲林堂閣尤勝客非佳流不得入堂前植碧梧四令人揩拭其皮每梧墜葉輒令童子以針綴杖頭亟挑去之不使㸃汚如亭亭緑玉苔蘚盈庭不容人踐緑褥可愛左右列以松桂蘭竹之屬敷紆繚繞其外則高木修篁鬱然深秀周列竒石東設古玉器西設古鼎尊罍法書名畫每雨止風收杖履自隨逍遙容與詠歌以娛望之者識其為世外人也觀雪菴長九尺濶八尺高七尺以輕木為格紙布糊之以障三面上以一格覆頂面前施幃幔捲舒如帳中可四坐不妨設火食具隨處移行背風帳之對雪瞻眺比之氊帳似更清逸施之就花就山水雅勝之地無不可也謂之行窩松軒宜擇苑囿中空明塏爽之地構立不用高峻惟貴清幽八窗玲瓏左右植以青松數株須擇枝幹蒼古屈曲如畫有馬遠盛子昭郭熙狀態甚妙中立竒石得石形瘦削穿透多孔頭大腰細裊娜有態者立之松間下植吉祥蒲草鹿葱等花更置建蘭一二盆清勝雅觀外有隙地種竹數竿種梅一二以助其清共作歲寒友想臨軒外觀恍若在畫圖中矣高子書齊說高子曰書齊宜明靜不可太厰明净可爽心神宏敞則傷目力窗外四壁薜蘿滿牆中列松檜盆景或建蘭一二繞砌種以翠藝草令遍茂則青葱鬱然傍置洗硯池一更設盆池近窗處蓄金鯽五七頭以觀天機活潑齊中長卓一古硯一舊古銅水注一舊窑筆格一班竹筆筒一舊窑筆洗一糊斗一水中丞一銅石鎮紙一左置榻床一榻下滚腳凳一床頭小几一上置古銅花尊或哥窑定瓶一花時則插花盈瓶以集香氣閒時置蒲石於上收朝露以清目或置鼎爐一用燒印篆清香冬置暖硯爐一壁間掛古琴一中置几一如吳中雲林几式佳壁間懸畫一書室中畫惟二品山水為上花木次之禽鳥人物不與也或奉名畫山水雲霞中神佛像亦可名賢字幅以詩句清雅者可共事上奉烏思藏鏒金佛一或倭漆龕或花梨木龕以居之否用小石盆一或靈壁應石將樂石崑山石大不過五六寸而天然竒怪透漏瘦削無斧鑿痕者為佳次則燕石鍾乳石白石土瑪瑙石亦有可觀者盆用白定官哥青東磁均州窑為上而時窑次之凡外爐一花瓶一匙筯瓶一香盒一四者等差遠甚惟博雅者擇之然而爐製惟汝爐鼎爐㦸耳彛爐三者為佳大以腹橫三寸極矣瓶用膽瓶花觚為最次用宋磁鵝頸瓶餘不堪供壁間當可處懸壁瓶一四時插花坐列吳興筍凳六禪椅一拂塵搔背棕帚各一竹鐵如意一右列書架一上置周易古占詩經傍注離騷經左傳林注自警二編近思録古詩紀百家唐詩王李詩黃鶴補注杜詩說海三才廣記經史海篇直音古今韻釋等書釋則金剛鈔義楞嚴㑹解圓覺注疏華嚴合論法華𤣥解楞伽注疏五燈㑹元佛氏通載釋氏通鑑𢎞明集六度集蓮宗寶鑑傳燈録道則道德經新注指歸西升經句解文始經宗㫖冲虛經四解南華經義海纂微仙家四義列仙通鑑參同分章釋疑隂符集解黃庭經紫金丹正理大全修真十書悟真等編醫則黃帝素問六氣𤣥珠密語難經脉訣華陀內照巢氏病源證類本草食物本草聖濟方普濟方外臺祕要甲乙經朱氏集驗方三隂方永類鈐方玉機微義醫壘元戎醫學綱目千金方丹方祕書閒散則草堂詩餘正續花間集歷代詞府中興詞選法帖真則鍾元常季直表黃庭經蘭亭記𨽻則夏丞碑石本𨽻韻行則李北海隂符經雲麾將軍碑聖教序草則十七帖草書要領懷素絹書千文孫過庭書譜此皆山人適志備覽書室中所當置者畫卷舊人山水人物花鳥或名賢墨跡各若干軸用以充架齊中永日據席長夜篝燈無事擾心閲此自樂逍遙餘歲以終天年此真受用清福無虛高齊者得觀此妙茆亭以白茆覆之四構為亭或以棕片覆者更久其下四柱得山中帶皮老棕本四條為之不惟淳朴雅觀且亦耐久外護闌竹一二條結於蒼松翠蓋之下修竹茂林之中雅稱清賞檜柏亭植四老柏以為之製用花匠竹索結束為頂成亭惟一簷者為佳圓製亦雅若六角二簷者俗甚桂樹可結羅漢松亦可若用薔薇結為高塔花時可觀若以為亭除花開後荆棘低垂焦葉蟊蟲撩衣刺面殊厭經目無論玩賞圜室臞仙曰圜室之製人各不同豫所志者取法於天地範圍之理上圓下方經一丈有二中隔前後二間前間開日月圓竅於東西以通日月之光後間於頂上孔開窗撑放以取天門靈氣艮上塞户令不通達以閉鬼户之意此余所製也九徑江梅海棠桃李橘杏紅梅碧桃芙蓉九種花木各種一徑命曰三三徑詩曰三徑初開是蔣卿再開三徑是淵明誠齊奄有三三徑一徑花開一徑行茶寮側室一斗相傍書齊內設茶竈一茶盞六茶注二餘一以注熟水茶臼一拂刷淨布各一炭箱一火鉗一火筯一火扇一火斗一可燒香餅茶槃一茶槖二當教童子專主茶役以供長日清談寒宵兀坐煎法另具藥室用靜屋一間不聞雞犬之處中設供案一以供先聖藥王分置大板卓一光面堅厚可以和藥大鐵碾一石磨一小碾一乳鉢大小二音筒一用以搗珠末不飛摏臼一大小中稀篩各一大小密絹篩各一棕掃帚一淨布一銅鑊一火扇一火鈐一大小盤稱各一藥匱一藥廂一葫蘆瓶罐此藥家取用無算當多蓄以備用凡在藥物所需俱當置之藥室平時密鎖以杜不虞此又君子所先高子花謝詮評高子曰歐陽公示謝道人種花詩云深紅淺白宜相間先後仍須次第栽我欲四時携酒賞莫教一日不花開余意山人家得地不廣開徑怡閒若以常品花卉植居其半何足取也四時所植余為詮評牡丹譜類數多佳本遇目亦少大紅如山茶石榴色者寓形於圖畫有之托根於土壤未見他如狀元紅慶雲紅王家紅小桃紅雲容露濕飛燕新粧茄紫香紫胭脂樓潑墨紫國色烟籠玉環沉醉尺素白剪絨水晶簾捲月露生香御衣黃舞青霓一捻紅緑蝴蝶玳瑂闌開朝霞散彩數種之外無地多栽芍藥在廣陵之譜三十