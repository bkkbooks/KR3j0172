南宫極玄祕語趙古蟾曰三教之道同一心地法門有三學儒者學此而已修仙者修此而已參禪者參此而已捨此心而他求所謂旁蹊曲徑耳苦已勞形終無所成學者儻即是書反復玩味其理自明其理既明當繼之以力行力行不倦則三教聖賢之閫域可造進而無疑矣然是書也豈但為初學之士發哉原心章第一八萬四千法門同歸方寸故首題原心章夫心先天地而獨存厯事變而不朽先際無始後際無終廓徹圓通靈明虛湛所謂體也不疾而速不行而至所謂用也造物無方靈變莫測所謂神也五常百行之所由始萬物萬事之所由終所謂道也夫人未生之初體用混融萬殊一致雖不可得名狀心非無也既生之後如月當空隨水現形各各稟受無欠無餘聖智非增凡愚非損心非始有心之靜性也動情也動而不止欲也性情欲三者同出而異名也性固善情欲一萌而有惡焉情動欲萌智誘物化物化不已心存無幾溺於染緣移於習氣染習既深昧其本真矣聖智善返則為聖智凡愚忘返則為凡愚聖智凡愚之分返與不返耳返固善也不返忘也悲夫究竟章第二既知道心便當究竟故次之以究竟章道也者心也日用常行之謂也於眼曰視於耳曰聽於鼻曰嗅於口曰言於手曰舉於足曰履飢則思食渴則思飲冬則思裘夏則思葛行住坐臥苦樂逆順無往而非道之所寓特昧性而不知耳凡是數端日用常行之大者當究竟體認果何為哉茍知其所以然則與道思過半矣實證章第三究竟此理以悟為期故次之以實證章學貴實證道貴實悟學非實證口耳文字之謂也道非實悟情識意解之謂也夫欲實證實悟當堅其信心確其素志既堅且確無難焉蓋大道虛無不可名狀無聲色接於耳目可以見聞無法度授與學者可以造進貴在自證自悟耳非堅其信心確其素志而能坐進是道者未之有也所謂實證實悟者非枯坐灰心以待其悟當於日用常行之間常常體認常常提撕力到功深自有所得自得之妙如獲拱璧如歸大家如大夢之初醒如積冰之以泮其樂不可云喻矣儒家所謂尋仲尼顔子樂處者樂此者也禪宗所謂禪悅法喜者悅此者也道教所謂當此之時喜極難言者喜此者也學道參禪不得其真而自謂實證實悟者是自誣也自誣可乎既得實證實悟見得親切認得的當通身手眼全體金剛一切處所皆知下落才到此地位便得實證實悟的道理盡情貶向無生國裏切不可執為竒特如此方有門分相應所以古人道認著依前還不足若也認著執著依前只在妄想情識中未免又被識神搬弄引入走隂界中去展轉輪回無所休息學者切宜慎之破幻章第四既得實證實悟當識破萬幻庶不為萬事所纍故次之以破幻章一切世間皆同幻化以有形故不能長久草木禽獸之脆蜎飛蠕動之微固其宜也至大者天地至堅者金石成住壞空皆不能免况於人乎若不明此身是幻以五尺有限之軀於天地間無涯事物相酬應加以功名利祿富貴為聲色互相煎迫精神氣血隂消陽耗而不知覺毋怪乎渥然如丹也為枯稿黟然如黑者星星矣一旦忘形棄質同於臭腐雖親於妻子亦掩鼻而不敢近睥睨而不敢視禽獸不若也當此之時試審平生所好所尚果能與生死敵乎夫惟不敢敵隨業流轉輪於諸趣生已復死死已復生生死相繼備受諸苦如循環然無有休息是以至人知一切物為幻一切物如夢一切物如空花陽焰一切有為如鏡中像如水中月以是故塵視珠玉銖視軒冕以聲色如糞壤等生死如浮漚其應物也如鑑空衡平妍蚩輕重來則應之不來勿求過則化之既化勿留能轉於物不為物所轉能應於事不為事所應以其生也由太虛而來故同太虛無滯礙及其死也復歸太虛噫彼聖人者果何為而然哉識破萬幻不染諸緣君子以是知其然也安分章第五能識萬幻當知一切皆有數定則不生希求之心故次之以安分章富貴貧賤壽夭分也死生禍福榮辱數也一飲一啄之微莫不皆然從生至死一定而不可易也安其分則不為富貴貧賤壽夭之所纍知其數則不為生死禍福榮辱之所怵然虛無所纍靜無所怵故靜極而虛可以入道也歟人之榮生也以有幻體故不得不為也茍達不為亦達不達多為亦奚以為然則奈何曰無為無不為斯可矣神氣章第六論性不論氣不偹論氣不論性不明故次之以神氣章神者性也首章言之詳矣然性之説有二有天地之性有氣質之性父母未生以前即天地之性萬殊一本者也父母既生之後即氣質之性一本萬殊者也天地之性善氣質之性惡善惡混同以其稟二五之氣有剛柔緩急之不同所以然也非性之咎善反之則天地之性焉為氣之説亦有二有天地之氣有父母之氣天地之氣真氣也父母之氣凡氣也蓋人生母腹中受父精母血而成其朕兆所謂凡氣也混合空洞帝真九氣而全其體段所謂真氣也自一氣胞二氣生胎第三稟長靈明仙之氣而生魂性始來寄以體段未具而能靈逮夫四氣生魄五氣生五臟第六稟髙真沖和之氣而生靈體段始具具則能動動則初生初生性靈至九月氣足十月始圓然後降生上丹田為性根下丹田為命蒂白玉蟾真人曰人生在母腹中其臍蒂與母臍蒂相連母呼亦呼母吸亦吸及乎降誕剪去臍蒂然後各自呼吸而受父母一點凡氣則棲於下丹田中而寄體於腎下丹田者又名玄關前對臍後對腎居臍腎中間其連如環廣一寸三分周圍有八竅前後二竅以應乾坤上通泥丸下徹湧泉旁六竅以應坎離震巽兌艮六卦以通六腑一身之氣皆萃於此如水之朝東輻之輳轂也故下丹田為命之基其性即泥丸而寄體于心泥丸者在人之首明堂之間六合之內是謂頂門故世稱頂門為囟門也囟即性也囟開皆知夙世姻􅀈等事合則忘之矣故泥丸謂之性根能知性根命蒂始可言修煉也天地之氣亦有二人未生之前謂之先天又謂之母氣其為氣也至大至剛充塞天地周流六虛晝夜不息人才受胎便稟此氣謂之後天又謂之子氣謂之日月發生之氣即前所謂混合空洞帝真九氣是也其實一氣耳其氣充塞人之腔子裡每日遇子時斗柄指地先天之氣隨斗柄從九地之下發生周流六虛造化萬物子時非人間之子時也二六時中嘗嘗收視返聽頓覺身中暖氣沖然即其候也丹經云精生有時時至神知百刻之中切忌昏迷天地之氣既生則人身之子氣以類感類亦由湧泉上升丹田點化凡氣以成人身之造化故曰形者神氣之舍神者形氣之主形氣非神塊然一物嗚呼神非形氣茫然無歸嗚呼寄神性也寄性命也二者不可偏廢修性而不修命紫陽所謂精神屬隂宅舍難固未免嘗用遷徙之法修命而不修性釋氏所謂煉氣精粹壽可千歲若不明正覺三昧報盡還來復入諸趣所以先儒曰論性不論氣不備論氣不論性不明要知性為主氣次之是書也豫故以原心章首之混合神氣仙家謂之煉金丹形喻之鼎器氣喻之藥物神喻之火候忘機絶念收視返聽使精神魂魄意五者不漏固鼎氣也晝牝夜玄攝心一處終日默默如愚如癡採藥物也惺惺不昧了了常知神不外馳其氣自定調火功也是以聖人忘形養氣忘氣養神忘神養虛形神俱妙與道合真彼所謂忘者非若稿木死灰墻壁瓦礫懵然無知之謂也若必口訣動而復靜靜而復動必有事焉而勿正心勿忘不遊于外老氏之忘也胸次間常靈豁豁地不忘懷不管帶釋氏之忘也夫是謂之真忘若夫虛化神神化氣氣化形死矣是謂衆人修幻章第七神氣真也形氣幻也假幻以修真真乃堅固故次之以修幻章世之學佛者率以形同幻化而不顧且鄙學仙者為有為自甘一向沉滯空寂流為頑空世緣既盡坐脫立亡遂指為竒特耳殊不知此理乃先聖之所哂從上祖師之所不取如九峯虔侍者語一第座曰汝若會先師意吾一一依先師禮待之問答凡數反皆不契座曰汝粧香來爐煙起處若不脫去是不知先師意侍者撫其背曰坐忘立忘即不無若論先師意未夢見在昔有一僧依一長者安禪坐定衣服飲食臥具醫藥悉以資給如是數年密遣一婢往試之挑戲之餘凝然不動顧謂婢曰枯木倚寒巖三冬無暖氣婢持此語歸告長者長者乃呵其僧曰養汝數年猶作這般見解斥而去之正坐沉空滯寂之病也達摩隻履西歸普化搖鈴升天此豈沉空滯寂者所能為也又如大通智勝佛十劫坐道場佛法不現前不得成佛道於是跏趺坐身心寂不動遍歷十小劫方得成佛道所以釋迦稱贊諸佛世尊一大事因緣甚深難解不可妄傳與人惟佛與佛乃能證知舍利佛等諸大弟子聞佛所説深自尅責自謂空法得證已得寂滅之樂不復妄志求阿耨多羅三藐三菩提今日那知寂滅非真寂滅也説使不聞佛法最上一乘祕密之藏終止於空法而已故圭堂曰世尊末年説法華所以再發重關之祕五千退席者乃重關前事八法華者乃重關後事也如如居士曰饒伊大通大徹擔板只見一邊直須大法明了方曉教外别傳圭堂如如此理豈無深意焉蓋佛法季運世皆以存神運氣揠苗助長之説指為教外别傳簧鼓後學疑團不破遂以修仙法為有為而不為甘心於沉空滯寂之域不知儂家自有修仙顯訣特為尋常而不究竟者耳從上祖禪師立坐禪一法以授徒衆至今叢林行焉可謂暗合妙道不然何以使之厚鋪坐褥寬解衣帶端身直脊唇齒相著舌柱上腭微開其目常視鼻端蓋厚鋪坐褥者使形體不倦也寬解衣帶者使氣常在也端身直脊者使理通達氣不窒塞也唇齒相著舌拄上腭者使重樓無浩浩而去之患也微開其目者使不坐在黑土之下也又以去昏病也祖師為人可為指出修仙之法不過如是蓋佛家之説隱而不露使學者默而會之忽然契合一撥便轉所以續佛慧者常多道家之説雖顯易曉未免以文字傳之反涉支離適以啓學者疑所以了性命者常不多見也佛則謂之慧命仙則謂之性命其實一也特所從言之異耳安得圓機之士與語仙佛之道耶靜通章第八工夫次第於此章靜則動動則通通則久久則變化無窮焉故次之以靜通章天地之外曰太虛又曰太無總謂之虛無又謂之虛空以其無心故也故虛則能容無則變化是以物各付物事各付事形各付形氣各付氣使天地自相覆載日月自相運行隂陽自升降寒暑自往來四時自推遷五氣自順布飛潛動植自形自包虛空一何容心焉此虛空所以長且久也天地大虛空人身小虛空人身不能與天地同其長久者以有心故不能虛無若能虛無其心神自來歸氣自來復始可言修持之法當先謹言語其次節飲食再次省睡眠此三者修仙修佛之關鍵也何為而然哉老子曰玄牝之門為天地根綿綿若存用之不勤玄牝者神氣之根蒂也口鼻者神氣之門户也出息入息長收緩放使之綿綿歸根復命以養神氣故先之以謹言語紫陽曰道自虛無生一氣便從一氣産隂陽人日用發生之氣每憑虛而生人才虛腹便思飲食所以養其氣也其氣既生不能歸源則隨色聲香味喜怒哀樂耗散之矣故次以節飲食簡菴德禪師曰學道之士如雞抱卵使暖氣相續才有間斷賺他性命人若貪睡則神離于氣氣無所主奔潰四逸欲望凝結其可得乎故次之以省睡眠然後固鼎採藥之方坐禪修幻之法次第而行之則外之先天母氣下降而內之後天子氣上升俱會於中田點化凡氣日久月深凡氣煉盡真氣充實其氣油然而生莫之能禦自雙關深入泥丸與神交姤所謂追二氣於黃道會三姓於玄宫交姤之後仍化為甘露自玄膺而下復入中宫一升一降成其造化也但要此一動一靜然後相應不然則藥物耗散火候差失所謂毫髮差殊不作丹也此皆出於自然不可以存神運氣揠苗助長之説同日而語以要言之動極生靜靜極生動一動一靜互為其用而已如天地之妙其動也闢其靜也翕不闢則不翕不翕則不闢闢兮翕焉造化之無窮焉若靜定工夫既極則元陽之氣自生道德經曰致虛極守靜篤萬物並作吾以觀其復法華經云身心寂不動為求無上道古德云直須大死一回絶後再生斯言盡之矣氣之生也乾坤震動山嶽撼搖龍虎爭馳火風相擊往來三宫自升自降蓋氣之始升則為冬至一陽生於六隂之下其卦為復陽氣漸長隂氣漸消故為丑其卦為臨於寅其卦為泰於卯其卦為大壯節屬春分木旺在卯真氣薰蒸是沐浴於辰其卦為夬於已其卦為純乾六陽既極一隂生於六陽之下其卦為姤隂氣漸長陽氣漸消故為未其卦為遁於申其卦為否於酉其卦為觀節屬秋分金旺在酉真氣薰蒸是為沐浴於戍其卦為剝於亥其卦為坤六隂既極復變為一隂一升一降無暫休息二分二至晦朔弦望五行四時二十四氣三百六十五度攢簇於一刻之中一刻之工夫故有一年之節候一年三萬六千刻刻刻要調和卯酉外可以奪三萬年之數此與天地造化默相符命亦非執圖泥象之比當此之時氣脈調和精神爽快儼如浴之方起睡之正酣夫婦之歡會子母之留戀神抱其氣氣抱其神日積月纍打成一片隂盡陽純遂成真人逮夫脫胎神化身外有身聚則成形散則成風去來無礙隱顯莫測造化不能留隂陽不能拘鬼神莫能測蓍龜莫能知逍遙無何有之鄉而與太虛同體矣已上三章專論性命戒行章第九形乃宅舍心乃主人若戒行缺則藩籬破矣故次之以戒行章欲了向上事須先持戒次修功行持戒者目無妄視耳無妄聽口無妄言身無妄動以卑自居以謙自持彼以惡來我以善受貪嗔癡愛人我是非一切放下此其大略修功行者見人飢寒思拯濟之見人疾病思救療之見人忿爭思解釋之凡可以為人方便者皆隨力而為之力有不及常勸人為此其大略茍持戒而不修功行是厚於待己薄於待人則有外魔修功行而不持戒是優於利人劣於利己則有內魔內魔外魔皆道之障所以古者學道之士初發道心便持戒行日用二六時中未嘗枉用其心朝煉夕磨不記歲月成與不成亦無取必及其功圓行滿神氣亦壯自然感召巨眼宗匠以點化之一言半句便躋壽域非一朝一夕之故也今之學者不思體質凡陋根器淺劣且無寸功片行以及於人又無涵養工夫貪嗔癡愛人我是非勃不可遏見古人之成如是之易我成如是之難遂萌妄想僥幸點化欲以積年耗散之氣纍歲昏亂之神成就於片餉之間以求出世之道愚亦甚矣正謂點石成金蒸砂作飯之理也及其無成反生謗黷噫可悲也夫紫陽曰若非積行修隂德動有羣魔作障緣斯言盡矣天隱子曰神仙人也在乎修我靈氣勿為世俗沉淪遂我自然勿為邪見凝滯則功成矣旨哉言乎至道至微七論要訣丹鼎第一丘真人曰大包天地小不容針乃先天之物性命之根蒂也在臍腎之間一曰前大腸之左有一玄谷性命始於此呼吸出焉受胎之所鉛汞第二精氣中含靈謂之鉛元神一念感通有情謂之汞應物之神真鉛真汞第三至此鉛汞一矣氣無升降息定謂之真鉛念無生滅神凝謂之真汞息有一毫之未定形非我有散而歸隂非真鉛也念有一毫之散亂神不純陽散入鬼趣非真汞也非夙有靈骨豈能至此作用成丹第四鉛汞相投合而成丹鉛汞二物同生於一金生水鉛生銀也水生木銀生砂也木生火砂生汞也火不自生則歸之於木木不自生則歸之於水水不自生則歸之於金運汞投鉛之祕旨在於忘情情忘則性復性復則歸虛呼吸皆在於此呼之根吸之蒂是謂元牝之門人能虛心定息任其自然守固此處久而純熟十月數足而成丹即所謂嬰兒也即是我一靈真性純陽而不離非是果有一嬰兒只是一靈無雜念如嬰兒之無外想是太乙含真氣也數足之後靈驗異常火候第五人心之動晝則心竅皆開陽也闢一户而謂之乾人心之定夜則心竅皆合隂也闢一户而謂之坤陽動隂靜隂靜陽生陽動則精神舒暢隂靜則昏睡僵伏此人間嘗情也古人以交媾神氣為進火十二時中只一時言一日之間行住坐臥自然而然凝神入氣穴便是進火便是子時一坐定陽氣生即身中子時所謂冬至不在子夏至不在午言下手時便是冬至一陽生即火候也只如子時定息不出不入神凝不生不滅打成一片非動非靜非隂非陽以此工夫治鍊空氣全胎集天地之造化亦如冬至之時萬物皆凋外若可傷然生意歸根而胚胎萬物無窮之生意藴於此矣造化第六忘五官之用息內外之機忘中不忘自然而然不動中間默默守聚杳冥之際恍惚之中打成一片只在臍腎之間十二時中用工不斷十月工夫奪天地之大數古仙妙用在乎抽添念動而散出乎卯門法當抽回使念靜息定或昏而睡入乎酉門法當添起調息奮迅太極真人有曰散時行坤道土虛晦其光收聚光昏時起巽風調息任自然試問如何見得純陽而成丹曰念念更無念對境自相忘不睡安有夢神靈覺異常神凝者想夢自消坎離之旨第七二靈只是一靈魂出則魄入魂入則魄出也人之道首者乾之體也腹者坤之體也晝行乾道內之一靈升而為乾宫之用一隂入乎二陽之中離也夜行坤道外之一靈降而為坤宫之用一陽入乎二隂之中坎也故聖人以神氣歸空合而為一使坎離既濟於中宫為之交媾曰坎離與乾坤四象分體用坎離既交媾乾坤體不動體全隂陽純太極氣氤氲戊巳本屬土土位據中尊至中守正位虛無道所寄性情復歸虛丹成仙詔至坤以一為乾宫生三女離居中隂數六乾以一為坤宫生三男坎居中陽數九坎宫之陽升而流戊陽土五離宫之隂降而就已隂土十右坎離交媾之圖鶴林子受內丹三要論玄牝悟真篇云要得谷神常不死須憑玄牝立根基真精既返黃金室一顆明珠永不離夫身中一竅名曰玄牝受氣以生實為府神三元所聚更無分别精神魂魄會於此穴乃金丹還返之根神仙凝結聖胎之地也古人謂之太極之蒂先天之柄虛無之系造化之源混沌之根太虛之谷歸根竅復命關戊巳門庚辛室甲乙户西南鄉真一處中黃宫丹元府寺一壇偃月爐朱砂鼎龍虎穴黃婆舍鉛罏土釡神水華池帝乙神室靈臺絳宫皆一處也然在身中而求之非心非腎非口非鼻非肝非肺非脾非胃非臍輪非尾閭非膀胱非榖道非兩腎中間一穴非臍下一寸三分非明堂泥丸非關元氣海然則果何處也曰我得妙訣名曰規中一意不散結成胎仙參同契云真人潛深淵浮遊守規中此其所也老子曰多言數窮不如守中正存乾之下坤之上震之西兌之東坎離水火交媾之鄉人之一身天地之正中八􅂒九竅絲絡聨接虛間一穴空懸黍米不依形而立惟體道而生似有似無若亡若存無內無外中有乾坤易曰黃中通理正位居體書曰惟精惟一允執厥中度人經曰中理五氣混合百神崔公入藥鏡曰貫尾閭通泥丸純陽曰窮取生身受氣初平叔曰勸君窮取生身處元氣之所由生真息之所由起白玉蟾又謂之念頭動處修丹之士真息一作氣不住則神化無基矣且此一竅先天而生後天相接先後二氣總為混沌沓沓冥冥其中有精非常精也恍恍惚惚其中有物非常物也天得之以清地得之以寧人得之以靈談真人曰開一作闢灝氣之門所以收其根知元神之囊所以韜其光若蚌內守若石內藏所以為珠玉之房皆直指也然此一竅亦無邊傍更無內外若以形體色相求之則又大成錯謬故曰不可執於無為不可形於有作不可泥於存想不可著於持守聖人法象見諸丹經或謂之圓髙中起狀如蓬壺關閉緻密神運其中或謂之狀如雞子黑白相扶縱廣一寸以為始初彌厯十月脫出其胞或謂之其白如綿其連如環中廣一寸包一身之精粹此固明示玄關之要顯露造化之機學者茍不探其玄不順其奧用功之時便守之以為蓬壺存之以為雞子想之以為連環模樣若此形狀執著一作有為有一作無存無入妄豈不大可笑邪要之玄關一竅玄牝之門乃神仙聊指造化之機耳玉溪子曰似是而非除却自身安頓著落何處去然其中體用權衡本自不殊如以乾坤法天地坎離配日月是也參同契曰混沌相交接權輿樹根基經營養鄞鄂凝神以成軀則神氣有所收藏魂魄不致散亂回光返照便歸來造次不離常在此其詩曰經營鄞鄂體虛無便握元神裏面居息往息來無間斷聖胎成就合元初玄牝之旨備於斯矣抑又論之杏林曰一空玄關竅三關要路頭忽然輕運動神水自周流又云心下腎上處肝西肺左中非腸非胃府一氣自流通今曰玄關一竅玄牝之門在人一身天地之中正造化固吻合乎此然愚常審思其説大略初明猶未得為直指天不祕道流傳人間太上慈悲必不肯靳愚敢漏泄天機指出玄關一竅的的大意冒禁相付使骨相合仙之士一見豁然心領神會密而行之句句相應是書在處神物護持若孽重福薄於是無緣自不邂逅斯訣雖及見之忽而不敬亦不過瞽之文章聾之鐘鼓耳玄之又玄彼安知其然密語曰徑寸之質以混三才在臍之上約以三指倣佛其內謂之玄關不可以有心守不可以無心求以有心守之終莫之有以無心求之愈見其無若何可也蓋用志不分乃可凝神但澄心絶慮調息令勻寂然常照勿使昏散候氣安和凝神入定於此定中觀照內景才若意到其兆即萌便覺一息從規中起混混續續兀兀騰騰存之以誠聽之以心六根安定胎息凝凝不閉不數任其自然靜極而噓如春沼魚動極而反如百蟲蟄氤氲開闔其妙無窮如此少時便須忘氣合神一歸混沌致虛之極守靜之篤心不動念無去無來不出不入湛然常住是謂真人之息以踵踵者其息深深之義神氣交感此其候也前所謂元氣之所由生真息之所由起此意到處便見造化此息起處便見玄關非髙非下非左非右不前不後不偏不倚人一身天地之中正此處也採取在此交媾在此烹煉在此沐浴在此溫養在此結胎在此脫體在此今若不分明説破學者必妄意猜度非太過則不及矣紫陽曰饒君聰慧過顔閔不遇真師莫強猜縱有丹經無口訣教君何處結靈胎然此竅陽舒隂慘本無正形意到即開開闔有時百日立基養成氣母虛室生白自然見之黃帝三月內視蓋此道也自臍下腸胃之間則謂之酆都地獄九幽都司隂境積結真陽不居故靈寶煉度諸法存想此為幽關豈修煉之所哉學者試思之藥物古歌曰借問因何有我身不離精氣與元神我今説破生身理一粒玄珠是嫡親夫神與氣精三品上藥煉精成氣煉氣化神煉神合道此七返九還之要道也紅鉛墨汞木液金精朱硃水銀白金黑錫金公姹女離女坎男蒼龜赤蛇火龍水虎白雪黃芽交梨火棗金烏玉乾馬坤牛日精月華天魂地魄水鄉鉛金鼎汞水中金火中木隂中陽陽中隂黑中白雄中雌異名多象皆譬喻也然則果何謂之藥物曰修丹之要在乎玄牝欲立玄牝先固本根本根之本元精是也精即元氣所化也故精氣一也以元神居之則三者聚為一也杏林石道人曰萬物生皆死元神死復生以神居氣內丹道自然成施肩吾先生曰氣是添年藥心為使氣神若知行氣主便是得仙人若精虛則氣竭氣竭則神逝易曰精氣為物遊魂為變欲復命歸根不亦難乎玉溪子曰以元精未化之元氣而點化至神則神有光明而變化莫測矣名曰神仙是皆明身中之藥物非假外物而為之也然而産藥有川源採藥有時節制藥有法度入藥有造化煉藥有火功昔聞之師曰西南之鄉土名黃庭恍惚有物杳冥有精分明一味水中金但向華池仔細尋此産藥之川源也垂簾塞兌窒欲調息離形去智幾於坐忘勸君終日默如愚煉成一顆如意珠此採藥之時節也天地之先無根靈草一意制度産成至寶大道不離方寸地功夫細密要行持此製藥之法度也心中無心念中無念注意規中一氣還祖息息綿綿無間斷行行坐坐轉分明此入藥之造化也清淨藥材密意為元十二時中氣煉火煎金鼎常令湯用暖玉爐不要火教寒此煉藥之火功也大抵玄牝為隂陽之源神氣之宅神氣為性命之藥胎息之根胎息為呼吸之祖深根固蒂之道胎者乃藏神之府息者化胎之源胎因息生息因胎住胎不得息胎不成息不得胎神無主原夫人之未生漠然太虛父母媾精其端始見一點初凝一念是也純是性命混沌三月玄牝立焉玄牝既立繫如瓜蒂嬰兒在胎暗注母氣母呼亦呼母吸亦吸凡百動蕩內外相感何識何知何明何曉天之氣混之地之氣混之人之氣混之但有一息焉及期而育天翻地覆人驚胞破如行大巔失足之狀頭懸足撑而出之大呌一聲其息即忘故隨性隨情不可拘也况乳以沃其心巧以玩其目愛以牽其情欲以化其性渾然天真散之物者皆是矣胎之一息無復再守也神仙教人修煉必欲返其本而復其初重生五藏再立形骸無質生質結成聖胎其訣曰專氣致柔能知嬰兒除垢止念靜心守一外想不入內想不出終日混沌如在母腹神定以會乎氣氣和以合神神即氣而凝氣煉神而住於寂然大休歇之場恍惚無何有之鄉灰心冥冥注意一竅如雞抱卵似魚在淵呼至於根吸至於蒂綿綿若存再守胎中之一息也守無所守其息自住得此息住泯然若無離心於心無所存注杳冥之內但覺虛空之中靈為造化之主宰時節若至妙理自彰藥既生矣火斯出焉故採藥之時謂之坎離合火出之際謂之乾坤交其坎離之合也則萬象內攢於丹鼎在乎立基百日之間見之其乾坤之交也則一點下降於黃庭在乎立基百日之後見之當此之時身心混融與虛空等亦不知神之為氣亦不知氣之為神亦不知天地何如亦不知我為甚物如太虛之未分如三才之未露渾淪凝結之未鑿動靜隂陽之未形忽然一點靈光朗如虛室生白之狀似此竒妙非存想非作為自然而然吾亦不知其所以然而然經云一物含五采永作仙人祿一作藥此金液大還丹也豈凡硃凡汞五金八石所可同日而語哉還返之理至矣盡矣若不悟信舍玄牝而立根基外神氣而求藥物不結自然之胎息而妄行火候棄本趨末逐妄迷真天弗之鑒吾末如之何也已火候古歌曰聖人傳藥不傳火從來火候少人知夫所謂不傳者非祕而不傳也蓋採時為之藥藥之中有火焉煉時為之火火之中有藥焉能知藥而收火則定裏見丹成自有不待傳而知者矣詩曰藥物陽內隂火候隂內陽會得隂陽理火藥一處詳此其義也後人惑於丹經不能頓悟聞有二十四氣七十二候二十八宿六十四卦分野日月合璧海潮升降長生三昧陽文隂武等説畢欲窮究何者為火何者為候疑心一生種種作相雖得藥物之真懵然不敢烹煉殊不知真火本無候大藥不計斤玉蟾云火本南方離卦離屬心心者神也神即火也氣即藥也神不亂氣歸神以火煉藥而成丹者即是以神馭氣而成道也其説如此分明直截夙無仙骨誦為空言當面錯過深可歎息然火候口訣之要尤當於真息中求之蓋息從心起心靜息調息息歸根金丹之母玉帝心印經所謂回風混合百日功靈者此也入藥鏡所謂起巽風運坤火入黃房成至寶者此也海蟾翁所謂開闔乾坤造化樞煅煉一爐真日月者此也丹陽子所謂神火夜煮鉛汞髓老龍吞盡祝融魂者此也何則真人潛深淵浮遊守規中必以神馭氣以氣定息槖籥之開闔隂陽之升降呼吸出入任其自然専氣致柔含光默默行住坐卧綿綿若存如婦人之懷孕如小龍之養珠漸採漸煉漸凝漸結工夫純料打成一片動靜之間更宜消息念不可起念起則火炎意不可散意散則火冷但使其無過不及操舍得中神氣相抱一意沖和包裹混沌斯謂之火種種相續丹鼎常溫無一息之間斷無毫髮之差殊如是煉之一刻有一刻之周天也如是煉之百日謂之立基如是煉之十月謂之胎仙以至元海陽生水中火起天地循環造化反覆皆不離乎一息也况所謂沐浴溫養進退抽添其中皆密合天機潛符造化初不容吾力焉無子午卯酉之法無晦朔弦望之節無冬至夏至之分無隂火陽符之别若言其時則一日內十二時意所到皆可為若言其妙則一刻之工夫自有一年之節候一年之工夫可奪天地三萬六千年之氣數要知慢守藥爐看火候但安神息任天然此平叔之的言也晝夜屯蒙法自然何用孜孜看火候此髙象仙之確論也噫聖人傳藥不傳火之旨盡於斯矣若謂之藥自藥火自火則吾不知也神無方易無體夫所謂玄關一竅者不過使神識氣使氣歸根回光返照收拾念頭之法耳玉溪子曰以正心誠意為中心柱子者是也夫所謂藥物火候者亦皆譬喻耳蓋大道之要自然而然不假造作凡屬心思意為者皆非也但要知人身中自有箇主張造化底且道只今何者為王若能知此以靜為本以定為機一斡旋頃天機自動不規中而自規中不胎息而自胎息藥不求生而自生火不求出而自出莫非自然之妙用豈待吾存想持守苦已勞形心知之意為之然後為道哉究竟到此可以忘言矣明眼者以為何如謹再識於篇末導引却病歌訣水潮除後患平明睡醒時即起端坐凝神息慮舌舐上腭舌口調息津液自生漸至滿口分作三次以意送下久行之則五藏之邪火不炎四肢之氣血流暢諸疾不生永除後患老而不衰訣曰津液頻生在舌端尋常嗽咽下丹田於中暢美無凝滯百日功靈可駐顔起火得長安子午二時存想真火自湧泉穴起先從左足行上玉枕過泥丸降入丹田三遍次從右足亦行三遍復從尾閭起又行三遍久久純熟則百脈流通五臟無滯四肢健而百骸理也訣曰陽火須知自下生隂符上降落黃庭周流不息精神固此是真人大鍊形夢失封金匱欲動則火熾火熾則神疲神疲則精滑而夢失也寤寐時調息神思以左手搓臍二七右手亦然復以兩手搓脅擺搖七次咽氣納於丹田握固良久乃正屈足側臥永無走失訣曰精滑神疲欲火攻夢中遺失致傷生搓摩有訣君須記絶欲除貪是上乘形衰守玉關百慮感中萬事勞形所以衰也返老還童非金丹不可然金丹豈易得哉善攝生者行住坐臥一意不散固守丹田默運神氣沖透三關自然生精生氣則形可以壯老可以耐矣訣曰却老扶衰别有方不須身外覔隂陽玉關謹守常淵默氣足神全壽更康鼓呵消積聚有因食而積者有因氣而積者久則脾胃受傷醫藥難治孰若節飲食戒嗔怒不使有積聚為妙患者當以身閉息鼓動胸腹俟其氣滿緩緩呵出如此行五七次便得通快即止訣曰氣滯脾虛食不消胸中膨悶最難調徐徐呵鼓潛通泰疾退身安莫久勞兜禮治傷寒元氣虧弱腠理不密則風寒傷感患者端坐盤足以兩手緊兜外腎閉口緘息存想真氣自尾閭升過夾脊透泥丸逐其邪氣低頭屈抑如禮拜狀不拘數以汗出為度其疾即愈訣曰跏趺端坐向蒲團手握隂囊意要専運氣叩頭三五遍頓令寒疾立時安叩齒牙無疾齒之有疾乃脾胃之火薰蒸每侵晨睡醒時叩齒三十六遍以舌攪牙齦之上不論遍數津液滿口方可咽下每作三次乃止及凡小解之時閉口咬牙解畢方開永無齒疾訣曰熱極風生齒不寧侵晨叩嗽自惺惺若教運用常無隔還許他年老復釘升觀鬢不斑思慮太過則神耗氣虛血敗而斑矣要以子午時握固端坐凝神絶念兩眼令光上視泥丸存想追攝二氣自尾閭間上升下降返還元海每行九遍久則神全氣血充足髮可返黑也訣曰神氣沖和精自全存無守有養胎仙心中念慮皆消滅要學神仙也不難運睛除眼翳傷熱傷氣肝虛腎虛則眼昏生翳日久不治盲瞎必矣每日睡起時跌坐凝息塞兌垂簾將雙目輪轉十四次緊閉少時忽然大睁行久不替內障外翳自散切忌色欲并書細字訣曰喜怒傷神目不明垂簾塞兌養元精精生氣化神來復五內隂魔自失驚掩耳去頭旋邪風入腦虛火上攻則頭目昏旋偏作正痛久則中風不語半身不遂亦繇此致治之須靜坐升身閉息以兩手掩耳折頭五七次存想元神逆上泥丸以逐其邪自然風邪散去訣曰視聽無聞意在心神從髓海逐邪氛更兼精氣無虛耗可學蓬萊境上人托踏應輕骨四肢亦欲得小勞譬如户樞終不朽熊鳥演法吐納導引皆養生之術也平時雙手上托如舉大石兩腳前踏如履平地存想神氣依按四時噓呵二七次則身輕體健足耐寒暑訣曰精氣沖和五臟安四肢完固骨強堅雖然未得刀圭餌且住人間作地仙搓塗自美顔顔色憔悴所由心思過度勞碌不謹每晨靜坐閉目凝神存養神氣沖淡自內達外以兩手搓熱拂面七次仍以嗽津塗面搓拂數次行之半月則皮膚光潤容悅澤大過尋常矣訣曰寡欲心虛氣血盈自然五臟得和平衰顔仗此增光澤不羡人間五等榮閉摩通滯氣氣滯則痛血滯則腫滯之為患不可不慎治之須澄心閉息以左手摩滯七七遍右手亦然復以津塗之勤行七日則氣血通暢永無凝滯之患修養家所謂乾沐浴者即此義也訣曰榮衛流行不暫休一才凝滯便堪憂誰知閉息能通暢此外何須别討求凝抱固丹田元神一出便收來神返身中氣自回如此朝朝并暮暮自然赤子産真胎此凝抱之功也平時靜坐存想元神入於丹田隨意呼吸旬日丹田完固百日靈明漸通不可或作或輟也訣曰丹田完固氣根歸氣聚神凝道合真久視定須從此始莫教虛度過光隂淡食能多篇五味之於五臟各有所宜若食之不節必致虧損孰若食淡謹節之為愈也然此淡亦非棄絶五味特言欲五味之沖淡耳仙翁有云斷鹽不是道飲食無滋味可見其不絶五味淡對濃而言若膏梁過度之類如吃素是也遵生八箋卷十
