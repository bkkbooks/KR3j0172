body:
  text: 遵生八箋卷十一明高濓撰飲饌服食箋上高子曰飲食活人之本也是以一身之中陰陽運行五行相生莫不由於飲食故飲食進則榖氣充榖氣充則血氣盛血氣盛則筋力強脾胃者五臟之宗四臟之氣皆稟於脾四時以胃氣為本由飲食以資氣生氣以益精生精以養氣氣足以生神神足以全身相須以為用者也人於日用養生務尚淡薄勿令生我者害我俾五味得為五內賊是得養生之道矣余集首茶水次粥糜蔬菜薄敘脯饌醇醴麵粉糕餅果實之類惟取適用無事異常若彼烹炙生靈椒馨珍味自有大官之饌為天人之供非我山人所宜悉迸不録其他仙經服餌利益世人歷有成驗諸方制而用之有法神而明之在人擇其可餌録之以為却病延年之助惟人量已陰藏陽藏之殊乃進或寒或熱之藥務令氣性和平嗜欲簡默則服食之力種種奏功設若六欲方熾五官失調雖餌仙方終落鬼籍服之果何益哉識者當自商確編成箋曰飲饌服食序古諸論真人曰脾能母飬四臟養生家謂之黃婆司馬子微教人存黃氣納泥丸能致長生太倉公言安榖過期不安榖不及期以此知脾胃全固百疾不生江南一老人年七十三歲壯如少者人問所養無他術平生不習飲湯水耳常人日飲數升吾日減數合但只沾唇而已脾胃惡濕飲少胃強氣盛液行自然不濕或冒逺行亦不念水此可謂至言不煩食飲以時飢飽得中水榖變化沖氣融和精血以生榮衛以行臟腑調平神志安寧正氣沖實於內元真通會於外內外邪沴莫之能干一切疾患無從而作也飲食之宜當候已飢而進食食不厭熟嚼仍候焦渴而引飲不厭細理必待飢甚而食食勿過飽時覺渴甚而飲飲勿太頻食不厭精細飲不厭溫熱太乙真人七禁文其六曰美飲食養胃氣彭鶴林曰夫脾為臟胃為腑脾胃二氣互相表裏胃為水榖之海主受水榖脾為中央磨而消之化為血氣以滋養一身灌溉五臟故修生之士不可以不美其飲食所謂美者非水陸畢具異品珍羞之謂也要在乎生冷勿食粗硬勿食勿強食勿強飲先飢而食食不過飽先渴而飲飲不過多以至孔氏所謂食饐而餲魚餒而肉敗不食等語凡此數端皆損胃氣非惟致疾亦乃傷生欲希長年此宜深戒而亦養老奉親與觀頥自養者之所當知也黃山谷云爛蒸同州羔灌以杏酪食之以匕不以筯南都撥心麵作槐芽溫淘糝以襄邑抹豬炊共城香稻薦以蒸子鵝吳興庖人斫松江鱸鱠繼以廬山康王谷水烹曾坑鬪品少焉解衣仰卧使人誦東坡赤壁前後賦亦足以一笑也此雖山谷之寓言然想像其食味之美安得聚之以奉老人之旨耳東坡老叨賦云庖丁鼓刀易牙烹熬水欲新而釜欲潔火惡陳而薪惡勞九蒸暴而日燥百上下而湯鏖嘗頂上之一臠嚼霜前之兩螯爛櫻珠之煎蜜滃杏酪之蒸羔蛤半熟以含酒蟹微生而帶糟蓋聚物之夭美以養吾之老叨婉彼姬薑顔如李桃彈湘妃之玉瑟鼓帝子之雲璈命仙人之蕚緑華舞古曲之鬱輪袍引南海之玻璃酌涼州之蒲萄願先生之耆壽分餘瀝於兩髦候紅潮於玉頰驚暖響於檀槽忽纍珠之妙曲抽獨繭之長繅閔手倦而少休疑吻燥而當膏倒一缸之雪乳列百柁之瓊艘各眼灔於秋水咸骨碎於春醪美人告去已而雲散先生方兀然而禪逃響松風於蟹眼浮雪花於兔毫先生一笑而起渺海濶而天高吳郡鱸魚鱠八九月霜下時收鱸三尺以下劈作鱠浸洗布包瀝水令盡散置盤內取香柔花葉相間細切和鱠拌令勻霜鱸肉白如雪且不作腥謂之金虀玉鱠東南佳味雜俎曰名食有蕭家餫飩漉去其湯不肥可以瀹茗庾家粽子白瑩如玉韓約作櫻桃饆饠其色不變能造冷胡突鱠鱧魚臆連蒸鹿麞皮索餅將軍曲良翰能為驢騣凶鬯匕駝峰炙何元侈於味食必方丈後稍去猶食白魚鱔臘糖蟹鍾𡵻議曰鱔之就臘驟於屈伸蟹之將糖躁擾彌甚仁人用意深懷惻怛至於車螯蚶蠣眉目內缺慙渾淪之竒唇吻外緘非金人之愼不榮不悴曾草木不若無聲無臭與瓦礫何異故宜長充庖厨永為口實後漢茅容字季偉郭林宗曾寓宿焉及明旦容殺雞為饌林宗意為已設既而容獨以供母自與宗共蔬藿同飯林宗因起拜之曰卿賢乎哉後竟以孝成德苕溪漁隱曰東坡於飲食作詩賦以寫之往往皆臻其妙如老叨賦豆粥詩是也豆粥詩云江頭千頃雪色蘆茅簷出沒晨煙孤地碓舂粳光似玉沙瓶煮豆滑如酥我老此身無著處賣書來問東家住晨聽雞鳴粥熟時蓬頭曵履君家去又寒具詩云纎手搓來玉數尋碧油煎出嫩黃深夜來春睡無輕重壓匾佳人纒臂金寒具乃捻頭也出劉禹錫佳話過子忽出新意以山芋作玉糝羮色香味皆竒絶天酥陀則不可知人間決無此味也詩云香似龍涎仍釅白味如牛乳更全清莫將北海金虀鱠輕比東坡玉糝羮誠齋菜羮詩亦云雲子香抄玉色鮮菜羮新煮翠茸纎人間膾炙無此味天上酥陀恐爾甜宋太宗命蘇易簡講文中子有楊素遺子食經羮藜含糗之説上因問食品何物最珍對曰物無定味適口者珍臣止知虀汁為羮臣憶一夕寒甚擁爐痛飲夜半吻燥中庭月明殘雪中覆一虀盂連咀數根臣此時自謂上界仙厨鸞脯鳯胎殆恐不及屢欲作氷壺先生傳紀其事因循未果也上笑而然之唐劉晏五鼓入朝時寒中路見賣蒸胡處熱氣騰輝使人買以袍袖包裙褐底啖謂同列曰美不可言此亦物無定味適口者珍之意也倪正父思云魯直作食時五觀其言深切可謂知慙愧者矣余嘗入一佛寺見僧持戒者每食先淡喫三口第一以知飯之正味人食多以五味雜之未有知正味者若淡食則本自甘美初不假外味也第二思衣食之從來第三思農夫之艱苦此則五觀中已備其義每食用此為法極為簡易且先喫三口白飯已過半矣後所食者雖無羮蔬亦自可了處貧之道也王逢原思歸賦云吾父八十母髮亦素尚爾為吏敻焉遐路嗷嗷晨烏其子反哺我豈不如鬱其誰訴惟秋之氣慘栗感人日興愁思側睇江濱憶為童子當此凛辰百果始就迭進其珍時則有紫菱長腰紅芡圓實牛心緑蒂之柿獨包黃膚之栗青芋連區烏椑五出鴨腳受彩乎欲核木瓜鏤丹而成質青乳之梨頳壺之橘蜂蛹醃鹺榠楂漬蜜膳羞則有鵁鶄野鴈澤鳬鳴鶉清江之膏蟹寒水之鮮鱗冒以紫薑雜以茭首觴浮茰菊俎薦菁韭坐溪山之松篁掃門前之桐柳僮僕不譁圖書左右或靜默以終日或歡言以對友信吾親之所樂安閭里其滋久切切余懷欲辭印綬固非效淵明之褊心恥折腰於五斗茶泉類論茶品茶之産於天下多矣若劔南有蒙頂石花湖州有顧渚紫筍峽州有碧澗明月卭州有火井思安渠江有薄片巴東有真香福州有柏巖洪州有白露常之陽羡婺之舉巖丫山之陽坡龍安之騎火黔陽之都濡高株瀘川之納溪梅嶺之數者其名皆著品第之則石花最上紫筍次之又次則碧澗明月之類是也惜皆不可致耳若近時虎邱山茶亦可稱竒惜不多得若天池茶在榖雨前收細芽炒得法者青翠芳馨嗅亦消渴若真岕茶其價甚重兩倍天池惜乎難得須用自己令人採收方妙又如浙之六安茶品亦精但不善炒不能發香而色苦茶之本性實佳如杭之龍泓即龍井也茶真者天池不能及也山中僅有一二家炒法甚精近有山僧焙者亦妙但出龍井者方妙而龍井之山不過十數畝外此有茶似皆不及附近假充猶之可也至於北山西溪俱充龍井即杭人識龍井茶味者亦少以亂真多耳意者天開龍井美泉山靈特生佳茗以副之耳不得其逺者當以天池龍井為最外此天竺靈隱為龍井之次臨安於潛生於天目山者與舒州同亦次品也茶自浙以北皆較勝惟閩廣以南不惟水不可輕飲而茶亦宜愼昔鴻漸未詳嶺南諸茶乃云嶺南茶味極佳孰如嶺南之地多瘴癘之氣染著草木北人食之多致成疾故當愼之要當採時待其日出山霽霧障山嵐收淨採之可也茶團茶片皆出碾磑大失真味茶以日晒者佳甚青翠香潔更勝火炒多矣採茶團黃有一旗一鎗之號言一葉一芽也凡早取為茶晚取為荈榖雨前後收者為佳粗細皆可用惟在採摘之時天色晴明炒焙適中盛貯如法藏茶茶宜蒻葉而畏香藥喜溫燥而忌冷濕故收藏之家以蒻葉封裹入焙中兩三日一次用火當如人體微溫則去濕潤若火多則茶焦不可食矣又云以瓷壇盛茶十斤一瓶每年燒稻草灰入大桶茶瓶座桶中以灰四面填桶瓶上覆灰築實每用撥灰開瓶取茶些少仍復覆灰再無蒸壞次年換灰為之又云空閣中懸架將茶瓶口朝下放不蒸原蒸自天而下故宜倒放若上二種芽茶除以清泉烹外花香雜果俱不容入人有好以花拌茶者此用平等細茶拌之庶茶味不減花香盈頰終不脫俗如橙茶蓮花茶於日未出時將半含蓮花撥開放細茶一撮納滿蘂中以麻皮略縶令其經宿次早摘花傾出茶葉用建紙包茶焙乾再如前法又將茶葉入别蘂中如此者數次取其焙乾收用不勝香美木樨茉莉玫瑰薔薇蘭蕙橘花梔子木香梅花皆可作茶諸花開時摘其半含半放蘂之香氣全者量其茶葉多少摘花為拌花多則太香而脫茶韻花少則不香而不盡美三停茶葉一停花始稱假如木樨花須去其枝蒂及塵垢蟲蟻用磁罐一層花一層茶相間填滿紙箬封固入鍋重湯煮之取出待冷用紙封裹置火上焙乾收用諸花倣此煎茶四要一擇水凡水泉不甘能損茶味故古人擇水最為切要山水上江水次井水下山水乳泉漫流者為上瀑湧湍激勿食食久令人有頸疾江水取去人逺者井水取汲多者如蟹黃混濁鹹苦者皆勿用若杭湖心水吳山第一泉郭璞井虎跑泉龍井葛仙翁井俱佳二洗茶凡烹茶先以熱湯洗茶葉去其塵垢冷氣烹之則美三候湯凡茶須緩火炙活火煎活火謂炭火之有焰者當使湯無妄沸庶可養茶始則魚目散布微微有聲中則四邊泉湧纍纍連珠終則騰波鼓浪水氣全消謂之老湯三沸之法非活火不能成也最忌柴葉煙薰煎茶為此清異録云五賊六魔湯也凡茶少湯多則雲腳散湯少茶多則乳面聚四擇品凡瓶要小者易候湯又點茶注湯相應若瓶大啜存停久味過則不佳矣茶銚茶瓶磁砂為上銅錫次之磁壺注茶砂銚煮水為上清異録云富貴湯當以銀銚煮湯佳甚銅銚煮水錫壺注茶次之茶盞惟宣窑壇盞為最質厚白瑩樣式古雅有等宣窑印花白甌式樣得中而瑩然如玉次則喜窑心內茶字小盞為美欲試茶色黃白豈容青花亂之注酒亦然惟純白色器皿為最上乘品餘皆不取試茶三要一滌器茶瓶茶盞茶匙生鉎音星致損茶味必須先時洗潔則美二熁盞凡點茶先須熁盞令熱則茶靣聚乳冷則茶色不浮三擇果茶有真香有佳味有正色烹點之際不宜以珍果香草雜之奪其香者松子柑橙蓮心木瓜梅花茉莉薔薇木樨之類是也奪其味者牛乳畨桃荔枝圓眼枇杷之類是也奪其色者柿餅膠棗火桃楊梅橙橘之類是也凡飲佳茶去果方覺清絶雜之則無辨矣若欲用之所宜核桃榛子瓜仁杏仁欖仁栗子雞頭銀杏之類或可用也茶效人飲真茶能止渴消食除痰少睡利水道明目益思出本草拾遺除煩去膩人固不可一日無茶然或有忌而不飲每食已輒以濃茶漱口煩膩既去而脾胃不損凡肉之在齒間者得茶漱滌之乃盡消縮不覺脫去不煩刺挑也而齒性便苦緣此漸堅密蠧毒自巳矣然率用中茶出蘇文茶具十六器收貯於器局供役苦節君者故立名管之蓋欲歸統於一以其素有貞心雅操而自能守之也商象古石鼎也用以煎茶歸潔竹筅帚也用以滌壺分盈杓也用以量水斤兩遞火銅火斗也用以搬火降紅銅火筯也用以簇火執權凖茶稱也每杓水二斤用茶一兩團風素竹扇也用以發火漉塵茶洗也用以洗茶靜沸竹架即茶經支腹也注春磁瓦壺也用以注茶運鋒劖果刀也用以切果甘鈍木砧墩也啜香磁瓦甌也用以啜茶撩雲竹茶匙也用以取果納敬竹茶槖也用以放盞受汚拭抹布也用以潔甌總貯茶器七具苦節君煮茶作爐也用以煎茶更有行者收藏建城以篛為籠封茶以貯高閣雲屯磁瓶用以杓泉以供煮也烏府以竹為籃用以資盛炭為煎茶之水曹即磁矼瓦缶用以貯泉以供火鼎器局竹編為方箱用以收茶具者外有品司竹編圓橦提合用以收貯各品茶葉以待烹品者也論泉水田子藝曰山下出泉為蒙稚也物稚則天全水稚則味全故鴻漸曰山水上其曰乳泉石池慢慢者蒙之謂也其曰瀑湧湍激者則非蒙矣宜戒人勿食混混不舍皆有神以主之故天神司出萬物而漢書三神山嶽其一也源泉必重而泉之佳者尤重餘杭徐隱翁嘗為余言以鳯凰山泉較阿姥墩百花泉便不及五泉可見仙源之勝矣山厚者泉厚山竒者泉竒山清者泉清山幽者泉幽皆佳品也不厚則薄不竒則蠢不清則濁不幽則喧必無佳泉山不停處水必不停若停即無源者矣旱必易涸石流石山骨也流水行也山宣氣以産萬物氣宣則脈長故曰山水上博物志曰石者金之根甲石流精以生水又曰山泉者引地氣也泉非石出者必不佳故楚詞云飲石泉兮蔭松柏皇甫曾送陸羽詩幽期山寺逺野飯石泉清梅堯臣碧霄峰茗詩烹處石泉嘉又云小石冷泉留早味誠可為賞鑑者矣泉往往有伏流沙土中者挹之不竭即可食不然則滲潴之潦耳雖清勿食流逺則味淡須深潭停畜以復其味乃可食泉不流者食之有害博物志曰山居之民多癭腫疾由於飲泉之不流者泉湧出曰濆在在所稱珍珠泉者皆氣盛而脈湧耳切不可食取以釀酒或有力泉縣出曰沃暴溜曰瀑皆不可食而廬山水簾洪州天台瀑布皆入水品與陸經背矣故張曲江廬山瀑布詩吾聞山下蒙今乃林巒表物性有詭激坤元曷紛矯默然置此去變化誰能了則識者固不食也然瀑布實山居之珠箔錦幕也以供耳目誰曰不宜清寒清朗也靜也澄水之貌寒冽也凍也覆水之貌泉不難於清而難於寒其瀨峻流駛而清岩奧陰積而寒者亦非佳品石少土多沙膩泥凝者必不清寒蒙之象曰果行井之象曰寒泉不果則氣滯而光不澄寒則性燥而味必嗇氷堅氷也窮谷陰氣所聚不泄則結而為伏陰也在地英明者惟水而氷則精而且冷是固清寒之極也謝康樂詩鑿氷煮朝飱拾遺記蓬萊山氷水飲者千歲下有石硫黃者發為溫泉在在有之又有共出一壑半溫半冷者亦在在有之皆非食品特新安黃山朱砂湯泉可食圖經云黃山舊名黟山東峰下有朱砂湯泉可點茗春色微紅此則自然之丹液也拾遺記蓬萊山沸水飲者千歲此又仙飲有黃金處水必清有明珠處水必媚有子鮒處水必腥腐有蛟龍處水必洞黑􅍇惡不可不辨也甘香甘美也香芳也尚書稼穡作甘黍甘為香黍惟甘香故能養人泉惟甘香故亦能養人然甘易而香難未有香而不甘者也味美者曰甘泉氣芳者曰香泉所在間有之泉上有惡木則葉滋根潤皆能損其甘香甚者能釀毒液尤宜去之甜水以甘稱也拾遺記員嶠山北甜水繞之味甘如蜜十洲記元洲玄澗水如蜜漿飲之與天地相畢又曰生洲之水味如飴酪水中有丹者不惟其味異常而能延年卻疾須名山大川諸仙翁修煉之所有之葛玄少時為臨沅令此縣廖氏家世壽疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛西湖葛井乃稚川煉丹所在馬家園後淘井出石甕中有丹數枚如芡實啖之無味棄之有施漁翁者拾一粒食之壽一百六歲此丹水尤不易得凡不淨之器切不可汲煮茶得宜而飲非其人猶汲乳泉以灌蒿萊罪莫大焉飲之者一吸而盡不暇辨味俗莫甚焉靈水靈神也天一生水而精明不淆故上天自降之澤實靈水也古稀上池之水者非歟要之皆仙飲也大甕收藏黃梅雨水雪水下放鵝子石十數塊經年不壞用栗炭三四寸許燒紅投淬水中不生跳蟲靈者陽氣勝而所散也色濃為甘露凝如脂美如飴一名膏露一名天酒是也雪者天地之積寒也汜勝書雪為五榖之精拾遺記穆王東至大𢹍之谷西王母來進嵰州甜雪是靈雪也陶榖取雪水烹團茶而丁謂煎茶詩痛惜藏書篋堅留待雪天李虛已建茶呈學士詩試將梁苑雪煎動建溪春是雪尤宜茶飲也處士列諸末品何邪意者以其味之燥乎若言太冷則不然矣雨者陰陽之和天地之施水從雲下輔時生養者也和風順雨明雲甘雨拾遺記香雲退潤則成香雨皆靈雨也固可食若夫龍所行者暴而霪者旱而凍者腥而墨者及簷溜者皆不可食潮汐近地必無佳泉蓋斥鹵誘之也天下潮汐惟武林最盛故無佳泉西湖山中則有之揚子固江也其南泠則夾石渟淵特入首品余嘗試之誠與山東無異若吳淞江則水之最下者也亦復入品甚不可解井水井清也泉之清潔者也通也物所通用者也法也節也法制居人令節飲食無窮竭也其清出於陰其通入於淆其法節由於得已脈暗而味滯故鴻漸曰井水下其曰井取汲多者蓋汲多則氣通而流活耳終非佳品養水取白石子入甕中雖養其味亦可澄水不淆高子曰井水美者天下知鍾泠泉矣然而焦山一泉余曽味過數次不減鍾泠惠山之水味淡而清允為上品吾杭之水山泉以虎跑為最老龍井真珠寺二泉亦甘北山葛仙翁井水食之味厚城中之水以吳山第一泉首稱豫品不若施公井郭婆井二水清冽可茶若湖南近二橋中水清晨取之烹茶妙甚無伺他求湯品類三十二種青脆梅湯用青翠梅三斤十二兩生甘草末四兩炒鹽一斤生薑一斤四兩青椒三兩紅乾椒半兩將梅去核擘開兩片大率青梅湯家家有方其分兩亦大同小異初造之時香味亦同藏至經月便爛熟如黃梅湯耳蓋有説焉一者青梅須在小滿前採捶碎核去仁不得犯手用乾木匙撥去打拌亦然捶碎之後攤在篩上令水略乾二用生甘草三用炒鹽須待冷四用生薑不經水浸擂碎五用青椒旋摘晾乾前日一齊抄拌仍用木匙抄入新瓶內止可藏十餘盞湯料者乃留些鹽摻面用雙重油紙再紙緊扎瓶口如此方得一脆字也梅與薑或略犯手切作絲亦可黃梅湯肥大黃梅蒸熟去核淨肉一斤炒鹽三錢乾薑末一錢半乾紫蘇二兩甘草檀香末隨意拌勻置磁器中晒之收貯加糖點服夏月調水更妙鳳池湯烏梅去仁留核一斤甘草四兩炒鹽一兩水煎成膏一法各等分三味杵為末拌勻實按入瓶臘月或伏中合半年後焙乾為末點服或用水煎成膏亦可橘湯橘一斤去壳與中白穰膜以皮細切同橘肉搗碎炒鹽一兩甘草一兩生薑一兩搗汁和勻橙子同法曝乾密封取以點湯服之妙甚杏湯杏仁不拘多少煮去皮尖浸水中一宿如磨菉豆粉法挂去水或加薑汁少許酥蜜點又杏仁三兩生薑二兩炒鹽一兩甘草為末一兩同搗茴香湯茴香椒皮六錢炒鹽二錢熟芝麻半升炒麵一斤同為末熱滚湯點服梅蘇湯烏梅一斤半炒鹽四兩甘草二兩紫蘇葉十兩檀香半兩炒麵十二兩均和點服天香湯白木樨盛開時清晨帶露用杖打下花以布被盛之揀去蒂蕚頓在淨器內新盆搗爛如泥榨乾甚收起每一斤加甘草一兩鹽梅十個搗為餅入磁罈封固用沸湯點服暗香湯梅花將開時清旦摘取半開花頭連蒂置磁瓶內每一兩重用炒鹽一兩灑之不可用手漉壞以厚紙數重密封置陰處次年春夏取開先置蜜少許於盞內然後用花二三朵置於中滚湯一泡花頭自開如生可愛充茶香甚一云蠟點花蕊陰乾如上加汁亦可須問湯東坡居士歌跋云三錢生薑乾用一升棗乾用去核二兩白鹽炒黃一兩草炙去皮丁香木香各半錢約量陳皮一處搗去白煎也好點也好紅白容顔直到老杏酪湯板杏仁用三兩半百沸湯二升浸蓋却候冷即便換沸湯如是五度了逐個掐去皮尖入小砂盆內細研次用好蜜一斤於銚子內煉三沸看滚掇起候半冷旋傾入杏汁又研如是旋添入研和勻以之點湯服鳳髓湯潤肺療咳嗽松子仁胡桃肉湯浸去皮各用一兩蜜半兩右件研爛次入蜜和勻每用沸湯點服醍醐湯益知生津烏梅一斤捶碎用水兩大碗慢火煎至一碗澄清􅒦砂二兩碾末白檀末一錢麝香蜜三斤右將梅水􅒦砂蜜三件一處於砂石器內熬之候赤色為度冷定入白檀麝香每用一二匙點湯服水芝湯通心氣益精髓乾蓮實一斤帶皮炒極燥搗羅為細末粉草一兩微炒右為細末每二錢入鹽少許沸湯點服蓮實搗羅至黑皮如鐵不可搗則去之世人用蓮實去黑皮多不知也此湯夜坐過飢氣乏不欲取食則飲一盞大能補虛助氣昔仙人務光子服此得道茉莉湯將蜜調塗在碗中心抹勻不令洋流每於凌晨採摘茉莉花三二十朵將蜜碗蓋花取其香氣薰之午間去花點湯甚香香橙湯寬中快氣消酒大橙子二斤去核切作片片連皮用檀香末半兩生薑一兩切半斤子焙乾甘草末一兩鹽三錢右二件用淨砂盆內碾爛如泥次入白檀末甘草末並和作餅子焙乾碾為細末每用一錢沸湯點服橄欖湯止渴生津百藥煎二兩白芷一錢檀香五錢甘草炙五錢右件搗為細末沸湯點服豆蔲湯治一切冷氣心腹脹滿胸膈痞滯噦逆嘔吐泄㵼虛滑水榖不消困倦少力不思飲食出局方肉豆蔲仁一斤麵裹煨甘草炒四兩白麵炒一斤丁香枝梗只用枝五錢鹽炒二兩右為末每服二錢沸湯煎服食前服妙解醒湯中酒後服白茯苓一錢半白豆蔲仁五錢木香三錢神麯一錢炒黃橘紅一錢半蓮花青皮一分澤㵼一錢􅒦砂三錢葛花半兩豬苓去黑皮一錢半乾薑一錢白术二錢右為細末和勻每服二錢白湯調下但得微汗酒疾去矣不可多食木瓜湯除濕止渴快氣乾木瓜去皮淨四兩白檀五錢沉香三錢茴香炒五錢白豆蔲五錢􅒦砂五錢粉草一兩半乾生薑半兩右為極細末每用半錢加鹽沸湯點服無塵湯水晶糖霜二兩梅花片腦二分右將糖霜乳細羅過入腦子再碾勻每用一錢沸湯點服不可多多則人厭也緑雲湯食魚不可飲此湯荆芥穗四兩白术二兩粉草二兩右為細末入鹽點用柏葉湯採嫩柏葉線繫垂挂一大甕中紙糊其口經月取用如未甚乾更閉之至乾取為末如嫩草色不用甕只密室中亦可但不及甕中者青翠若見風則黃矣此湯可以代茶夜話飲之尤醒睡飲茶多則傷人耗精氣害脾胃柏葉湯甚有益又不如新採洗淨點更為上三妙湯地黃枸杞實各取汁一升蜜半升銀器中同煎如稀餳每服一大匙湯調酒皆可實氣養血久服益人乾荔枝湯白糖二斤大烏梅肉五兩用湯蒸去澀水桂末少許生薑絲少許甘草少許右將糖與烏梅肉等搗爛以湯調用清韻湯􅒦砂末三兩石菖蒲末一兩甘草末五錢入鹽少許白湯點用橙湯橙子五十箇乾山藥末一兩甘草末一兩白梅肉四兩右搗爛焙乾揑成餅子白湯用桂花湯桂花焙乾為末四兩乾薑少許甘草少許右為末和勻量入鹽少許貯磁罐中莫令出氣時常用白湯點用洞庭湯陳皮去皮四兩生薑四兩右將薑與橘皮同淹一宿晒乾入甘草末六兩白梅肉三十箇炒鹽五錢和勻沸湯點用木瓜湯木瓜十兩生薑末二兩炒鹽二兩甘草末三兩紫蘇末十兩右五味和勻沸湯點用手足酸服之妙又一方加􅒦砂二兩為末山藥末三兩消食化氣壯脾參麥湯人參一錢門冬六分五味三分入小罐煎成湯服菉豆湯將菉豆淘淨下鍋加水大火一滚取湯停冷色碧食之解暑如多滚則色濁不堪食矣熟水類十二種稻葉熟水採禾苖晒乾每用滚湯入壺中燒稻葉帶焰投入蓋密少頃㵼服香甚橘葉熟水採取晒乾如上法泡用紫蘇熟水取葉火上隔紙烘焙不可翻動候香收起每用以滚湯洗泡一次傾去將泡過紫蘇入壺傾入滚水