實候冷切片煮熟肚子將紙鋪地放上用好醋噴肚用鉢蓋上少頃取食其肚肉皆厚可食夏月醃肉法用炒過熱鹽擦肉令軟勻下缸內石壓一夜挂起見水䀶即以大石壓乾挂當風處不敗醃豬舌牛舌法每舌一斤用鹽八錢一方用五錢好酒一碗川椒蒔蘿茴香麻油少許細切蔥白醃五日翻三四次索穿挂當風處陰乾紙􅋔盛藏煮用風魚法用青魚鯉魚破去腸胃每斤用鹽四五錢醃七日取起洗淨拭乾腮下切一刀將川椒茴香加炒鹽擦入腮內併腹裏外以紙包裹外用麻皮扎成一個挂於當風之處腹內入料多些方妙肉生法用精肉切細薄片子醬油洗淨入火燒紅鍋爆炒去血水微白即好取出切成絲再加醬瓜糟蘿蔔大蒜砂仁草果花椒橘絲香油拌炒肉絲臨食加醋和勻食之甚美魚醬法用魚一斤切碎洗淨後炒鹽三兩花椒一錢茴香一錢乾薑一錢神麯二錢紅麯五錢加酒和勻拌魚肉入磁瓶封好十日可用吃時加蔥花少許糟豬頭蹄爪法用豬頭蹄爪煮爛去骨布包攤開大石壓匾實落一宿糟用甚佳酒發魚法用大鯽魚破開去鱗眼腸胃不要見生水用布抹乾每斤用神麯一兩紅麯一兩為末拌炒鹽二兩胡椒茴香川椒乾薑各一兩拌勻􅋔入魚空肚內加料一層共􅏻入罈內包好泥封十二月內造了至正月十五後開又畨一轉入好酒浸滿泥封至四月方熟取吃可留一二年酒醃蝦法用大蝦不見水洗剪去鬚尾每斤用鹽五錢淹半日瀝乾入瓶中蝦一層放椒三十粒以椒多為妙或用椒拌蝦裝入瓶中亦妙裝完每斤用鹽三兩好酒化開澆入瓶內封好泥頭春秋五七日即好吃冬月十日方好湖廣鮓法用大鯉魚十斤細切丁香塊子去骨并雜物先用老黃米炒燥碾末約有升半配以炒紅麯升半共為末聽用將魚塊稱有十斤用好酒二碗鹽一斤夏月用鹽一斤四兩拌魚醃磁器內冬醃半月春夏十日取起洗淨布包榨十分乾以川椒二兩砂仁一兩茴香五錢紅豆五錢甘草少許為末麻油一斤八兩蔥白頭一斤先合米麯末一升拌和納罈中用石壓實冬月十五日可吃夏月七八日可吃吃時再加椒料米醋為佳水煠肉又名擘燒將豬肉生切作二指大長條子兩面用刀華界如磚階樣次將香油甜醬花椒茴香拌勻將切碎肉揉拌勻了少頃鍋內下豬脂熬油一碗香油一碗水一大碗酒一小碗下料拌肉以浸過為止再加蒜榔一兩蒲蓋悶以肉酥起鍋食之如無脂油要油氣故耳清蒸肉用好豬肉煮一滚取淨方塊水漂過刮淨將皮用刀界碎將大小茴香花椒草果官桂用稀布包作一包放蕩鑼內上壓肉塊先將雞鵝清過好汁調和滋味澆在肉上仍蓋大蔥醃菜蒜榔入湯鍋內蓋住蒸之食時去蔥醃菜并包料食之炒羊肚兒將羊肚洗淨細切條子一邊大滚湯鍋一邊熱熬油鍋先將肚子入湯鍋笊籬一焯就將粗布紐乾湯氣就火急落油鍋內炒將熟加蔥花蒜片花椒茴香醬油酒醋調勻一烹即起香脆可食如遲慢即潤如皮條難吃炒腰子將豬腰子切開踼去白膜斤絲背面刀界花兒落滚水微焯漉起入油鍋一炒加小料蔥花芫荽蒜片椒薑醬汁酒醋一烹即起蟶鮓蟶一斤鹽一兩醃一伏時再洗淨控乾布包石壓加熟油五錢薑橘絲五錢鹽一錢蔥絲五分酒一大盞飯糝一合磨米拌勻入瓶泥封十日可供魚鮓同又風魚每魚一斤鹽四錢加以花椒砂仁蔥花香油薑絲橘細絲醃壓十日挂煙薰處糖炙肉并烘肉巴豬肉去皮骨切作二寸大片將砂糖少許去氣息醬大小􅚬香花椒拌肉見日一晾即收將香油熬熟下肉蓋定勿燒火以酥為度肉巴用精嫩切條片鹽少醃之後用椒料拌肉見日一晾炭火鐵床上炙之食醬蟹糟蟹醉蟹三法香油入醬油內亦可久留不砂糟醋酒醬各一碗蟹多加鹽一碟又法用酒七碗醋三碗鹽二碗醉蟹亦妙炭一塊則蟹膏不沙以白芷一錢入醉蟹則膏結實恐有藥氣不佳晒蝦不變紅色蝦用鹽炒熟盛籮內用井水淋洗去鹽晒乾色紅不變煮魚法凡煮河魚先放水下燒則骨酥江海魚先調滚汁下鍋則骨堅也煮蟹青色蛤蜊脫丁用柿蒂三五箇同蟹煮色青用枇杷核內仁同蛤蜊煮脫丁造肉醬法精肉四斤去筋骨醬一斤八兩研細鹽四兩蔥白細切一碗川椒茴香陳皮各五六錢用酒拌各料并肉如稠粥入罈封固晒烈日中十餘日開看乾再加酒淡再加鹽又封以泥晒之黃雀鮓每隻治淨用酒洗拭乾不犯水用麥黃紅麯鹽椒蔥絲嘗味和為止却將雀入匾罈內鋪一層上料一層􅋔實以箬蓋篾片竿定候滷出傾去加酒浸密封久用治食有法條例洗豬肚用麵洗豬臟用砂糖不氣煮笋入薄荷少加鹽或以灰則不蘝糟蟹罈上加皂角半錠可留久洗魚滴生油一二點則無涎煮魚下末香不腥煮鵝下櫻桃葉數片易軟煮陳臘肉將熟取燒紅炭投數塊入鍋內則不油蘝氣煮諸般肉封鍋口用楮實子一二粒同煮易爛又香夏月肉單用醋煮可留十日麵不宜生水過用滚湯停冷過之燒肉忌桑柴火醬蟹糟蟹忌燈照則沙酒酸用赤小豆一升炒焦袋盛入酒罈中則好染坊瀝過淡灰晒乾用以包藏生黃瓜茄子至冬月可食用松毛包藏橘子三四月不乾菉豆藏橘亦可五月以麥麵煮成粥糊入鹽少許候冷傾入甕中收新鮮紅色未熟桃納滿甕中封口至冬月如生密煎黃梅時換蜜用細辛放頂上不生小蟲用臘水同薄荷一握明礬少許入甕中投浸枇杷林檎楊梅于中顔色不變味涼可食遵生八箋卷十一
