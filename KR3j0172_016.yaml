body:
  text: 遵生八箋卷十六明髙濂撰燕間清賞箋下瓶花三説瓶花之宜髙子曰瓶花之宜有二用如堂中插花乃以銅之漢壺太古尊罍或官哥大瓶如弓耳壺直口敞瓶或龍泉蓍草大方瓶髙架兩傍或置几上與堂相宜折花須擇大枝或上茸下瘦或左髙右低右髙左低或兩蟠臺接偃亞偏曲或挺露一幹中出上簇下蕃鋪蓋瓶口令俯仰髙下踈密斜正各具意態得畫家寫生折枝之妙方有天趣若直枝髼頭花朵不入清供花取或一種兩種薔薇時即多種亦不為俗冬時插梅必須龍泉大瓶象窰敞瓶厚銅漢壺髙三四尺已上投以硫黃五六錢砍大枝梅花插供方快人意近有饒窰白磁花尊髙三二尺者有細花大瓶俱可供聖上插花之具製亦不惡若書齋插花瓶宜短小以官哥膽瓶紙槌瓶鵝頸瓶花觚髙低二種八卦方瓶茄袋瓶龍泉窰瓶定窰花尊花囊四耳小定壺圎口匾肚壺青東磁小蓍草瓶方漢壺圓瓶古龍泉蒲槌瓶各窰壁瓶次則古銅花觚銅觶小尊罍方壺素溫窰匾壺俱可插花又如饒窰宣德年燒製花觚花尊蜜食罐成窑嬌青蒜蒲小瓶膽瓶細花一枝瓶方漢壺式者亦可文房充玩但小瓶插花折宜瘦巧不宜繁雜宜一種多則二種須分髙下合插儼若一枝天生二色方美或先湊簇像生即以麻絲根下縳定插之若彼此各向則不佳矣大率插花須要花與瓶稱花髙於瓶四五寸則可假如瓶髙二尺肚大下實者花出瓶口二尺六七寸須折斜冗花枝鋪撒左右覆瓶兩傍之半則雅若瓶髙瘦却宜一髙一低雙枝或屈曲斜裊較瓶身少短數寸似佳最忌花瘦於瓶又忌繁雜如縛成把殊無雅趣若小瓶插花令花出瓶須較瓶身短少二寸如八寸長瓶花止六七寸方妙若瓶矮者花髙於瓶二三寸亦可插花有態可供清賞故插花挂畫二事是誠好事者本身執役豈可托之僮僕為哉客曰汝論僻矣人無古瓶必如所論則花不可插耶不然余所論者收藏鑒家積集既廣須用合宜使器得雅稱云爾若以無所有者則手執一枝或採滿把即插之水鉢壁縫謂非愛花人歟何俟論瓶美惡又何分於堂室二用乎哉吾懼客嘲熟矣具此以解瓶花之忌瓶忌有環忌放成對忌用小口甕肚瘦足藥罈忌用葫蘆瓶凡瓶忌雕花粧彩花架忌置當空几上致有顛覆之患故官哥古瓶下有二方眼者為穿皮條縳於几足不令失損忌香煙燈煤燻觸忌貓鼠傷殘忌油手拈弄忌藏密室夜則須見天日忌用井水貯瓶味醎花多不茂用河水并天落水始佳忌以插花之水入口凡插花水有毒惟梅花秋海棠二種毒甚須防嚴密瓶花之法牡丹花貯滚湯於小口瓶中插花一二枝緊緊塞口則花葉俱榮三四日可玩芍藥同法一云以蜜作水插牡丹不悴蜜亦不壞戎葵鳳仙花芙蓉花凡折枝花已上皆滚湯貯瓶插下塞口則不憔悴可觀數日梔子花將折枝根槌碎擦鹽入水插之則花不黃其結成梔子初冬折枝插瓶其子赤色儼若花蕊可觀荷花採將亂髮纒縛折處仍以泥封其竅先入瓶中至底後灌以水不令入竅竅中進水則易敗海棠花以薄荷包枝根水養多有數日不謝竹枝瓶底加泥一撮松枝靈芝同吉祥草俱可插瓶後録四時花紀俱堪入瓶但以意巧取裁花性宜水宜湯俱照前法幽人雅趣雖野草間花無不採插几案以供清玩但取自家生意原無一定成規不必拘泥靈芝仙品也山中採歸以籮盛置飰甑上蒸熟晒乾藏之不壞用錫作管套根插水瓶中伴以竹葉吉祥草則根不朽上盆亦用此法冬間插花須用錫管不惟不壞磁瓶即銅瓶亦畏氷凍執質厚者尚可否則破裂如瑞香梅花水仙粉紅山茶臘梅皆冬月妙品插瓶之法雖曰硫黃投之不凍恐亦難敵惟近日色南窗下置之夜近卧榻庶可多玩數日一法用肉汁去浮油入瓶插梅花則蕚盡開而更結實四時花紀牡丹芍藥建蘭菊花四種四種品類數多栽培不易俱録全譜當按譜栽植以供佳賞甌蘭花三種三種惟杭城有之花如建蘭香甚一枝一花有紫花黃心有白花黃心者紫若胭脂白如羊脂花甚可愛出法華山採其原墩者種背隂處可活開花紫白者名蓀葉較蘭稍潤玉蘭花花未開者澆以糞水則花大而香其瓣擇洗精潔拖麵麻油煎食牡丹新落瓣亦可煎食蜜浸古名木蘭迎春花春首開花故名每於花放時移栽土肥則茂燖牲水灌之則花蕃二月中旬分種杏花本有梅杏沙杏之分根生最淺以大石壓根則花盛果結核種桃花十種桃花平常者亦有粉紅粉白深粉紅三色其外有單瓣大紅千葉紅桃之變也單瓣白桃千葉碧桃之變也有緋桃俗名蘇州桃花如剪絨者比諸桃開遲而色可愛有瑞仙桃花色深紅花密有綘桃千瓣有二色桃色粉紅花開稍遲千瓣極雅山礬花生杭之西山三月著花細小而繁香馥甚逺故俗名七里香笑靨花花細如豆一條千花望之若堆雪然無子可種根窠叢生茂者數十條以原根劈作數墩分種易活蝴蝶花草花儼若蝶狀色黃上有赤色細點濶葉秋時分種金莖花一云即黃蝴蝶花金莖花如蛺蝶風過花如飛舞搖蕩婦人採之為飾諺曰不戴金莖花不得入仙家紫薇花花碎而繁色淺紫每花一蒂若柔絲相繫故枝動朵朵嬌顫不勝俗名怕癢是指此耳亦以根分李花有青霄李御黃李李之上品也若紫粉小青皆下品也有麥李紅甚麥熟而實可食矣俱花小而蕃映山紅本名山躑躅花類杜鵑稍大單瓣色淺若生滿山頂其年豐稔人競採之外有紫粉紅二色鹿蔥花花儼蝶蝶三大圓瓣而三小尖瓣色蔥藕色中心白地紅黃點點搖風弄影丰韻可人根枝叢發萵苣花俗名金盞花也色金黃細瓣攢簇肖盞當春初即開獨先衆花金雀花春初開黃花甚可愛儼狀飛雀且可采以滚湯著鹽焯過作茶供一品粉團花二種麻葉花開小而色邊紫者為最其白粉團即繡毬花也宜種牡丹臺處與牡丹同開用為襯色甚佳俱用八仙花種於盆內削去半邊架起就接薔薇花同類七種有大紅粉紅二色喜屛結肥不可多腦生莠蟲以煎銀店中爐灰撒之則蟲盡斃正月初剪枝長尺餘扦種以下數種類此花可蒸茶寶相花花較薔薇朵大而千瓣塞心有大紅粉色二種十姊妹花小而一蓓十花故名其色自一蓓中分紅紫白淡紫四色或云色因開久而變有七朵一蓓者名七姊妹云花甚可觀開在春盡金沙羅似薔薇而花單瓣色更紅艷奪目黃薔薇色蜜花大亦竒種也剪條扦種近廣於昔態嬌韻雅薔薇上品金鉢盂似沙羅而花小夾瓣如甌紅鮮可觀間間紅花似薔薇色紅瓣短葉差小於薇羊躑躅生諸山中花大如杯盞類萱黃色羊食生疾若癎梨花二種有香臭二種其梨之妙者花不作氣醉月欹風含煙帶雨瀟灑丰神莫可與並郁李花二種有粉紅雪白二色俱千葉花甚可觀如紙剪簇成者子可入藥玫瑰花二種出燕中色黃花稍小於紫玫瑰種紫玫瑰多不久者緣人溺澆之即斃種以分根則茂本肥多悴黃亦如之紫者乾可作囊以糖霜同搗收藏謂之玫瑰醬各用俱可麗春花罌粟類也其花單瓣瓣嘗飛舞儼如蝶翅扇動亦草花中之妙品也錦帶花花開蓓虆可愛形如小鈴色粉紅而嬌植之籬間採折供玩木香花三種花開四月木香之種有三其最紫心白花香馥清潤髙架萬條望若香雪其青心白木香黃木香二種皆不及也亦以剪條插種不甚多活以條扳入上中一段壅泥伺月餘根長自木生枝外剪斷移栽可活棣棠花花若淡黃一葉一蕊生甚延蔓春深與薔薇同開可助一色辛夷花花如蓮外紫內白蕊若筆尖故名木筆一名望春俗名豬心本可就接玉蘭紫丁香花木本花如細小丁香而瓣柔色紫蓓蕾而生接種俱可自是一種非瑞香别名野薔薇花二種色有雪白粉紅二種採花拌茶瘧病烹食即愈荼䕷花二種大朵色白千瓣而香枝梗多刺詩云開到荼䕷花事盡為當春盡時開耳外有蜜色一種金絲桃花花如桃而心有黃鬚鋪散花外若金絲然亦以根下劈開分種海棠花七種海棠有鐵梗色如硃紅有木瓜粉紅有西府有樹海棠二種一紫一白有垂絲海棠吐絲美甚冬至日用糟水澆則來春花盛若秋海棠嬌冶柔軟真同美人倦粧此品喜隂一見日色即瘁九月收枝上黑子撒於盆內地上明春發枝當年有花老根過冬者花發更茂繅絲花花葉儼似玫瑰而色淺紫無香枝生刺針時至煮繭花盡開放亦以根分結香花花色鵝黃較瑞香稍長花開無葉花謝葉生枝極柔軟多以蟠結上盆香色俱無可取枳殼花藥花頗有可觀者若茉㽔菉豆之類不能悉載花細而香聞之破鬱結籬傍種之實可入藥橙花花細而白香清可人以之蒸茶向為龍虎山上進御絶品園林種之可收作此橙用更多紅蕉花二種種盆短焦即芭蕉所出者掘起根蒲上用油簮腳橫刺二眼即不長髙可玩種自東粵來者名美人蕉其花開若蓮而色紅若丹中心一朵曉生甘露其甜如蜜即嘗芭蕉亦開黃花至曉瓣中甘露如飴食之止渴海桐花花細白如丁香而嗅味甚惡逺觀可也金錢花俗名夜落金錢出自外國梁時外國進花朵如錢亭亭可愛昔魚𢎞以此賭賽謂得花勝得錢可為好之極矣紫藤花花深紫色柔條可愛夏開一簇葩艷輕盈作架植之蔓延若錦杜鵑花三種有蜀中者佳謂之川鵑花內十數層色紅甚出四明者花可二三層色淡總名杜鵑喜隂惡肥天旱以河水澆之樹隂下放置則茂葉色青翠可觀有黃白二色竒甚茉莉花二種有千葉初開時花心如珠有單瓣者喜肥以米泔水澆之則花開不絶或皮屑浸水澆之亦可又云宜糞但欲加土壅根為妙惟難過冬若天色作寒移置南窗下每日向陽至十分乾燥以水微濕其根或以朝南屋內泥地上掘一淺坑將花矼存下以矼平地上以篾籠罩花日傍以泥築實無隙通風此最妙法也至立夏前方可去罩盆中周遭去土一層以肥土填上用水澆之芽發方灌以糞次年和根取起換土栽過無不活者如此收藏多年可延又云賣花者惟欲花瘁其中有説夏間收回即換土種之去其故土礱粳亦是一法凌霄花蔓生花黃用以蟠繡大石似亦可觀花能墮胎吉祥草花吉祥草易生不拘水土中石上俱可種惟得水為佳用以伴孤石靈芝清甚花紫蓓生然不易發如家居種之有花似云吉祥真珠蘭花真珠蘭色紫蓓虆如珠花開成帚其香甚濃以之蒸牙香棒香名曰蘭香者非此不可廣中極盛㩦至南方則不花矣又名魚子蘭月季花二種俗名月月紅凡花開後即去其蒂勿令長大則花隨發無已二種雖雪中亦花有粉白色者甚竒月季非長春另是一種按月發花色相妙甚秋牡丹花草本遍地延蔓葉肖牡丹花開淺紫黃心根生分種朱蘭蕙蘭二種花開肖蘭色如渥丹葉濶而柔粵種蕙葉細長一梗八九花朵嗅味不佳俗名九節蘭也楝樹花苦楝發花如海棠一蓓數朵滿樹可觀挂蘭二種産浙之溫台山中巖壑深處懸根而生故人取之以竹為絡挂之樹底不土而生花微黃肖蘭而細不可缺水時當取下水中浸濕又挂亦竒種也閩粵一種紅花黃邊紫粉心者美甚淡竹花花開二瓣色最青翠鄉人用綿收之貨作畫燈青色並破緑等用金燈花二種花開一簇五朵金燈色紅銀燈色白皆蒲生分種紫羅襴花草本色紫翠如鹿蔥花秋深分本栽種四月發花可愛四季花花小葉細色白午開子落自三月開至九月其枝葉搗汁可治跌打損傷又名接骨草剖根分種剪秋羅花五種花有五種春夏秋冬羅以時名也春夏二羅色黃紅不佳獨秋冬紅深色美亦在春時分種喜肥則茂又一種色金黃美甚名金剪羅含笑花産廣東其花如蘭形色俱肖花開不滿若含笑然隨即凋落余初得自廣中僅髙二尺許今作拱把之樹矣且不懼冬紫薇花五種紫色之外有大紅色有白色有粉紅色有茄色榴花八種燕中有千瓣白千瓣粉紅千瓣黃大紅者比他處不同中心花瓣如起樓臺謂之重臺石榴花頭頗大而色更紅深余曾四種俱帶回杭至今芳郁有四色單瓣蓮花六種紅白之外有四面蓮千瓣四花兩花者名並蒂總在一蕊發出有臺蓮開花謝後蓮房中復吐花英亦竒種也有黃蓮又云以蓮子磨去頂上些少浸靛缸中明年清明取起種之花開青色有此法而未試佛桑花四種有大紅有粉紅有黃有白四色自四月開至十月方止花之可愛妙莫與比但無法可令過冬是大恨也罌粟花三種罌粟千瓣五色虞美人瓣短而嬌滿園春夾瓣飛動俱以子種在八月中秋日下土宜大肥則明年夏月花茂否不及矣亦宜蓋以毛灰免令蟲食其子夾竹桃花花如桃葉如竹故名然惡濕而畏寒十月初宜置向陽處放之喜肥不可缺壅玉簮花二種春初移種肥土中則茂其花瓣拖麵入少糖霜煎食香清味淡可入清供紫者花小葉上黃緑間道喜水分種盆石栽之可玩種盆荷花老蓮子裝入雞卵殼內將紙糊好開孔與母雞混衆子中同伏候雛出取開收起蓮子先以天門冬為末和羊毛角屑拌泥安盆底種蓮子在內勿令水乾則生葉開花如錢大可愛指甲花生杭之諸山中花小如蜜色而香甚用山土移上盆中亦可供玩梔子花三種有三種有大花者結山梔甚賤有千葉者有福建矮樹梔子可愛髙不盈尺梅雨時隨手剪扦肥土俱活火石榴花三種上盆小株花多色紅有粉紅白色三種甚可人目然無他法以其嫩頭長出即摘去烈日當午以水澆之則花茂肯發是即大株分本外有細葉一種亦佳慈菰花水中種之每窠花挺一枝上開數十朵色香俱無惟根至秋冬取食甚佳鼓子花花開如拳不放頂幔如釭鼓式色微藍可觀又可入藥孩兒菊花花小而紫不甚美觀但其嫩頭揉軟置之髮中衣帶香可辟汗作氣夏月一種佳草有二種梗紫者香甚紫花兒遍地叢生花紫可愛柔枝嫩葉摘可作蔬春時子種夜合花二種紅紋香淡者名百合蜜色而香濃日開夜合者名夜合分二種根可食一年一起去其最大者供食小者用肥土排之則春發如故番山丹花有二種一名畨山丹花大如碗瓣俱捲轉髙可四五尺一種花如硃砂本止盈尺茂者一幹兩三花朵更可觀也亦須每年八九月分種方盛石竹花二種石竹二種單瓣者名石竹千瓣者名洛陽花二種俱有雅趣亦須每年起根分種則茂紅豆花花開一穗十蕊虆虆下垂色妍桃杏其葉瘦如蘆亦可觀也戎葵即蜀葵出自西蜀其種類似不可曉地肥善灌花有五六十種竒態而色有紅紫白墨紫深淺桃紅茄紫雜色相間花形有千瓣有五心有重臺有剪絨有細瓣有鋸口有圓瓣有五瓣有重瓣種種莫可名狀但收子以多為貴八九月間鋤地下之至春初刪其細小茸雜者另種餘留本地不可缺肥五月繁華莫過於此紅麥麥種花妙如剪子大於麥數倍色紅可愛錢葵即錦茄花花葉如葵稍矮而叢生花大如錢止有粉間深紅一色開亦耐久萱花三種俗名鵝腳花有三種單瓣者可食千瓣者食之殺人惟色如蜜者香清葉嫩可充髙齋清供又可作蔬食之不可不多種也且春可食苗夏可食花比他花更多二事山丹花三種花如朱紅外有黃色有白色花者二種稱竒亦在春分種雙鸞菊草本挺生花開多甚每朵頭若尼姑帽然折去此帽內露雙鸞並首形似無二外分二翼一尾天巧之妙何肖生物至此根可入藥名曰烏頭春分根種芙蓉花四種有數種惟大紅千瓣白千瓣半白半桃千瓣醉芙蓉朝白午桃紅晚改大紅者佳甚不必分根記在十一月中將嫩條剪下斫作一尺一條向陽地上掘坑埋之仍以土掩至正月後起條遍插水邊林下無不活者當年即花蓼花花開蓓虆而細長二寸枝枝下垂色粉紅可觀惟水邊更多故俗名水紅花也花葉用以煎汁洗腳瘋癢良金鳳花六種金鳳花有重瓣單瓣紅白粉紅紫色淺紫如藍有白瓣上生紅點凝血俗名灑金六色花開一落即去其蒂則花茂與月季同法其子可收入藥作種十樣錦四種十樣錦枝頭亂葉有紅紫黃緑四色故名其鴈來紅以鴈來而色嬌紅老少年至秋深腳葉深紫而頂紅少年老頂黃而葉緑收子撒於耨熟肥土中加毛灰蓋之恐防蟻食二月中即生雞冠花四種雞冠有掃帚雞冠有扇面雞冠有紫白同蒂名二色雞冠扇面者以矮為佳帚樣者以髙為趣然下子時撒髙則髙撒低則低也若三色雞冠一朵同蒂色分紫白粉紅亦竒種也俱收子種金銀蓮花二種湖中甚多園林盆泥蓄水種之但取二色重臺者可愛纒枝牡丹花柔枝倚附而生花有牡丹態度甚小纒縳小屏花開爛然亦有雅趣木樨花四種有四種金黃花白花黃花結子四季花惟金桂為最葉邊如鋸齒而紋粗者其花香甚灌以豬糞則花茂蠶沙壅之亦可槿花二種籬槿花之最惡者也其種外有千瓣白槿大如勸杯有大紅粉紅千瓣逺望可觀即南海朱槿那提槿也且插種甚易水木樨花花色如蜜香與木樨同味但草本耳亦在二月分種一名指田用葉搗加礬泥染指紅於鳳仙葉秋葵花色蜜心紫秋花朝暮傾陽此葵是也秋盡收子移種白菱花木本花如千瓣菱花葉同梔子一枝一花葉托花朵七八月開色白如玉可愛亦接種也茗花即食茶之花色月白而黃心清香隱然瓶之髙齋可為清供佳品且蕊在枝條無不開遍茶梅花開十一月中正諸花凋謝之候花如鵝眼錢而色粉紅心黃開且耐久望之雅素無此則子月虛度矣梅花七種尋常紅白之外有五種如緑蕚蒂純緑而花香亦不多得有照水梅花開朵朵向下有千瓣白梅名玉蝶梅有單瓣紅梅有練樹接成墨梅皆竒品也種種可觀臘梅花三種今之狗英臘梅亦香但臘梅惟圓瓣如白梅者佳若瓶一枝香可盈室余見洪忠宣公山庭有之後竟滅殁今之圓瓣臘梅皆如荷花瓣者瓣有微尖僅免狗英則可客云楚中荆襄産者最佳想忠宣宅中亦得自彼處故今不復見也山茶花六種别名甚多以可觀玩世所廣者録之如磬口外有粉紅者十月開二月方已有鶴頂茶如碗大紅如羊血中心塞滿如鶴頂來自雲南名曰滇茶有黃紅白粉四色為心而大紅為盤名曰瑪瑙山茶花極可愛産自浙之溫郡有曰寶珠九月發花其香清可嗅畨椒叢生白花子儼秃筆頭味辣色紅甚可觀子種水仙花二種有二種單瓣者名水仙千瓣者名玉玲瓏又以單瓣者名金盞銀臺因花性好水故名水仙單者葉短而香可愛用以盆種上几其法云五月不在土六月不在房栽向東籬下花開朵朵香五月取起以人溺浸一月六月近竈處置之七月種則有花甚不然也余曾為之無驗且杭之近江水處菜戶成林種者無枝不花未嘗用此法也惟土近滷鹹則花茂瑞香花四種有紫花名紫丁香有粉紅者名瑞香有白瑞香有緑葉黃邊者名金邊瑞香惟紫花葉厚者香甚他如桂林有象蹄花似巵葉小枸那花夏開淡紅白鶴花花如鶴立上元花上元時開似茶花清香素色俱名花惜不可得百花之外更有結子花草青紅蓓虆可移盆中蟠簇雖嚴冬不凋者有二十二種俱堪齋頭清玩並録附之外此他省所産更多未見者不録虎茨産杭之蕭山白花紅子而子性甚堅雖嚴冬厚雪不能敗也畏日色百年者止髙二三尺不甚易活枸杞子諸山中有之老本虬曲可愛結子紅甚點點若綴雪中可觀地珊瑚産鳳陽諸郡中藤本其子紅亮克肖珊瑚狀若筆尖下懸不畏霜雪初青後紅收子可種又名海瘋藤子未詳茅藤果藤本亦可移植盆中結縳成蓋其子紅甚柔挂虆虆甚可人目雪下紅一種藤本生子類珠大若芡實色紅如日粲粲下垂積雪盈顆似更有致故名野葡萄生諸山中子細如小豆色紫蓓虆而生狀若葡萄蟠之髙樹懸挂可觀山梔子大葉梔子花至秋結子儼狀薔薇花蕊經霜由黃而紅盆種插瓶可助十一月中無花之趣金燈草本結子儼若燈籠薄衣為罩內包紅子大若龍眼去衣看子俱可無花果木本不花生果狀若林檎色青可久收果隂乾燒灰治痢甚良羊婆奶木本細葉其子狀乳頭虆虆而生入口酸甜可食色帶青紫闌天竹生諸山中葉儼似竹生子枝頭成穗紅如丹砂經久不脫且耐霜雪植之庭中可避火災金豆橘橘種生子狀蠶豆秋深顆顆若金樹小子多清玩妙品可入糖蜜供食牛奶橘生子儼同牛奶秋時結實看至明年三月子尚垂金不落收入蜜食生可食皮金彈橘橘種子生若彈丸而色紅冬殘收以充供天茄兒草本狀若茄子差小色青長寸許熟時採以鹽湯焯過可供茶品甚佳平地木髙不盈尺葉色深緑子紅甚若棠梨下綴且托根多在甌蘭之傍巖􅊤幽處似更可佳霸王樹産廣中本肥狀生如掌色翠緑上多米色點子葉生頂上稱為竒樹可也錦荔枝草本藤蔓種盆結縛成蓋生果若荔枝少大色金紅肉甜可食子入藥用盆種小葫蘆以葫蘆秧種小盆得土甚淺至秋結子形僅寸許擇其周正者止留一枚垂挂可觀霜後收乾佩帶用為披風鈕子有物外風致但難於成功亦難美好為可恨也青珊瑚産廣中結實如珊瑚鈎色青翠可玩鐵樹産廣中色儼類鐵其枝了穿結甚有畫意又聞有鐵樹花葉密而花紅想又一種也未見種大葫蘆先春以肥糞壤土堆疊尺厚將大葫蘆子種入土內相去三四寸埋一二粒待苗長三五尺時內選本粗一株作主次將傍株去皮一片兩株結縛若就花法以泥塗封稍長去其一苗留本又將傍株再就以三根株並作一株延蔓則三本之力歸一苗矣其結實成形又悉刪去衆多止留壯者一枚至秋成實大比尋常數倍用作酒尊㩦帶山遊誠物外清品宜多種之擇其形似完整可用花竹五譜髙子曰花品若牡丹芍藥蘭竹菊類俱有全譜即余所編菊譜名曰三徑怡間録是也不能全舉以煩卷帙聊述諸譜切要併種花雜説録為山人園圃日考不敢云備要亦不外是也藝花者當自取栽牡丹花譜種牡丹子法六月時候看花上結子微黑將􅀈開口者取置向風處晾一日以瓦盆拌濕土盛起至八月取出以水浸試沉者開畦種之約三寸一子待來春當自得花牡丹所宜牡丹宜寒惡熱宜燥惡濕根窠喜得新土則旺懼烈風炎日栽宜寬厰向陽之地為牡丹所宜種植法栽宜八月社前或秋分後三兩日若天氣尚熱遲遲亦可將根下宿土緩緩掘開勿傷細根以漸至近每本用白蘝細末一斤一云硫黃腳末二兩豬脂六七兩拌土壅入根窠填平不可太髙亦不可築實腳踏填土完以雨水或河水澆之滿臺方止次日土低凹又澆一次填補細泥一層若初種不可太密恐花時風鼓互相抵觸損花之榮此為種花之法也其種子落地直至春芽發葉長是子活矣六月須備箔遮夜則受露二年八月移栽别地則茂此護子法也分花法揀大墩茂盛花本八九月時全墩掘起視可分處剖開兩邊俱要有根易活用小麥一握拌土栽之花茂此分花法也接花法芍藥肥大根如蘿葡者擇好牡丹枝芽取三四寸長削尖匾如鑿子形將芍藥根上開口插下以肥泥築緊培過一二寸即活又以單瓣牡丹種活根上去土二寸許用礪刀斜去一半擇千葉好花嫩枝頭有三五眼者一枝亦削去一半兩合如一用麻縛定以泥水調塗麻外仍以瓦二塊合圍壅泥待來春花發去瓦以草席護之茂即有花此接花法也灌花法灌花須早地涼不損根枝八九月五日一澆積久雨水為妙立冬後三四日一澆糞水十一月後爬鬆根土以宿糞濃澆一次二次餘澆河水春分後不可澆水待穀雨前又澆肥水一次且澆不宜驟六月暑中不可澆水旱則以河水黑旱澆之不可濕了枝葉北方土厚不宜糞澆亦不宜井水此澆花法也培養法八九月時用好土根上如前法培壅一次比根髙二寸須隔二年一培榖雨時設簿遮蓋日色雨水勿令傷花則花久花落即前花枝嫩處一二寸六月時亦須設簿勿令晒損花芽冬以草薦遮雪此培養法也治療法冬至前後以鍾乳粉和硫黃一二錢掘開泥培之則花至來春大盛種時以白斂拌土欲絶蠐螬土蠶食根有蛀眼處以硫黃末入孔杉木削針針之蟲斃若有空眼處折斷捉蟲亦一法耳此為治療法也牡丹花忌北方地厚忌澆肥糞油籸肥壅忌觸麝香桐油漆氣忌用熱手搓摩搖動忌草長藤纒以奪土氣傷花四傍忌踏實便地氣不升忌初開時即便採拆令花不茂忌人以烏賊魚骨針刺花根則花弊凋落此牡丹之所忌也古亳牡丹花品目黃類御衣黃千葉色似黃葵淡鵝黃初開微黃色如新鵝黃後漸白平頭聞有太真黃未見大紅類大紅舞青􅀈千葉樓子胎短花小中出五青瓣宜向陽石榴紅千葉樓子胎類王家紅曹縣狀元紅千葉樓子宜成樹背隂金花狀元紅大瓣平頭微紫每瓣上有黃鬚故名宜陽王家大紅千葉樓子胎紅而頭尖微曲宜陽大紅剪絨千葉平頭花瓣如剪大紅繡毬花類王家紅葉微小大紅西瓜穰千葉樓子宜隂小葉大紅千葉頭小難開金絲大紅千頭不甚大每瓣上有白絲毫謂之金線紅硃砂紅千葉樓子宜陽映日紅千葉樓子細瓣宜陽錦袍紅千葉平頭羊血紅千葉平頭易開九蕊珍珠紅千葉花中有九蕊石家紅千葉平頭不甚緊七寶冠千葉樓子難開又名七寶旋心醉胭脂千葉樓子莖長每開頭垂下宜陽桃紅類魏紅千葉大葉桃紅千葉樓子宜隂桃紅舞青猊千葉樓子中出五青瓣河南名睡緑蟬宜陽壽安紅平頭黃心有粗細葉二種粗者香壽春紅千葉平頭胎瘦小宜陽殿春芳千葉樓子開遲醉桃仙千葉花外白內紅難開宜隂美人紅千葉樓子皺葉桃紅千葉樓子葉圓而皺難開宜隂梅紅平頭千葉深桃紅蓮蕊紅千葉樓瓣似蓮海天霞千葉平頭開大如盤宜陽桃紅西瓜穰千葉樓子胎紅而長宜陽翠紅粧千葉樓子難開宜隂陳州紅千葉樓子桃紅西畨頭難開宜隂桃紅線千葉四面鏡有旋瓣桃紅鳳頭千葉花髙大嬌紅樓臺千葉淺紅桃紅宜隂輕羅紅千葉淺嬌紅千葉樓子花紅繡毬千葉細瓣開圓如毬嬌紅色如魏紅不甚千葉醉嬌紅千葉微紅出莖紅桃千葉大尺餘其莖長二尺許西子紅千葉開圓如毬宜隂紫玉千葉白瓣中有紅絲紋大尺許海雲紅千葉色紅如朝霞粉紅類玉芙蓉千葉樓子成樹則開宜隂素鸞嬌千葉樓子宜隂水紅毬千葉叢生宜隂玉兔天香二種一早開頭微小一晚開頭極大中出二瓣如兔耳醉楊妃二種一千葉種子宜陽一平頭極大不耐日色赤玉盤千葉平頭外白內紅宜隂回回粉西施細瓣樓子外紅內粉紅粉西施千葉甚大宜隂醉西施千葉開久露頂觀音面千葉開緊不甚大叢生宜陽粉嬌娥千葉白色帶淺紅即􅕹粉粧西天香開早初甚嬌三四日則白矣彩霞紅千葉平頭玉樓春千葉多雨盛開鶴翎紅千葉醉春容色似玉芙蓉開頭差小醉玉樓千葉色白起樓一百五千葉過清明即開又名滿園春合歡花千葉一莖兩朵未見倒暈檀心千葉外深紅近蕚反淺白肉西施千葉樓子三學士千葉三色紫類紫舞青霓千葉中出玉青瓣腰金紫千葉有黃鬚一圍葉底紫千葉莖短葉覆其花即黑紫千葉樓子色類黑葵丁香紫千葉樓子瑞香紫千葉大瓣平頭紫千葉大徑尺徐家紫千葉花大茄花紫千葉樓子又名藕絲合紫姑仙千葉樓子大瓣紫繡毬千葉花圓紫羅袍千葉又名茄色樓紫重樓千葉難開紫雲芳千葉又名多叢樓駝褐裘千葉淡藕絲千葉樓子淡紫色宜隂煙籠紫千葉淺淡交映白類白舞青猊千葉樓子中出五青瓣萬卷書千葉花瓣皆卷筒又名波斯頭又名玉玲瓏一種千葉桃紅亦同名玉重樓千葉樓子宜隂無瑕玉千葉水晶毬千葉粉白白剪絨千葉平頭瓣上如鋸齒入名白纓絡難開緑邊白千葉瓣有緑色羊脂玉千葉樓子大瓣慶天香千葉粉白玉天仙千葉粉白玊繡毬千葉玉盤盂千葉平頭大瓣蓮香白千葉平頭瓣如蓮花香亦如之青心白千葉心青伏家白千葉鳳尾白千葉遲來白千葉平頭白千葉花者大尺許難開宜隂金絲白千葉白色佛頭青千葉樓子大瓣群花謝後始開瓣有緑色汴名緑蝴蝶四名鴨蛋青芍藥譜本草一名黑牽夷韓詩曰芍藥離草也詩曰伊其相謔贈之以芍藥牛亨問曰將離相贈以芍藥者何也董子答曰芍藥一名可離將别故贈之亦猶相招贈之以文無故文無一名當歸芍藥榮於仲春華於孟夏傳曰驚蟄之節後二十有五日芍藥榮是也素問王冰注雷乃發聲之下有芍藥榮芍藥香草制食之毒者莫良於芍藥故獨得藥之名所謂芍藥之和具而食之岑樓慎氏曰句出于虛賦草謂之榮與此不同況今芍藥四月始榮故知其偽也其華有至千葉者俗呼小牡丹今羣芳中牡丹品第一芍藥品第二故世謂牡丹為花王芍藥為花相又或以為花之副也崔豹古今注云芍藥有二種有草芍藥有木芍藥木者花大而色深俗呼為牡非也安期生服鍊法云芍藥有二種有金芍藥有木芍藥金者色白多脂木者色紫多脈此則驗其根也即赤芍白芍之分云種法種法以八月起根去土以竹刀剖開勿傷細根先壤豬糞和礱粳黑泥入盆分根栽種勿蜜馬以人糞灌之來春花發極盛然須三年一分俱以八月為候所為芍藥洗腳是也培法種後以十一二月用雞糞和土培之仍渥以黃酒一度則花能改色開時須以竹篠扶之不令傾側有雨則以簿遮蔽免速零落勿犯鐵器修法每至花謝後用剪剪去殘枝敗葉勿令討力使元氣歸根十月九月時出根洗時去老梗腐黑之根易以新壤肥土栽之三二年一分不分則病分頻花小而不舒花之繁盛色之淺深皆出培壅剖根之力芍藥名考孔常父云唐詩人如盧同杜牧張祐之徒皆居廣陵日久未有一語及芍藥者是花品未有若今日之盛也芍藥花譜總别四十二種其色則世傳以黃者為貴餘皆下品也君子謂此花獨産於廣陵