  - {type: page-break, offset: 0, content: '', id: KR3j0172_WYG_006-1a, image: WYG0871/WYG0871-0470a.png}
body:
  text: 遵生八箋卷六明高濓撰四時調攝箋冬三月調攝總類禮記曰北方為冬冬之為言中也中者藏也管子曰陰氣畢下萬物乃成律志曰北方陰也伏也陽伏於下於時為冬蔡雍曰冬者終也萬物於是終也日窮于次月窮於紀星回于天數將幾終君子當審時節宣調攝以衛其生立冬水相冬至水旺立春水休春分水廢立夏水囚夏至水死立秋水殁秋分水胎言水孕於金矣臞仙月占主疾十月立冬日忌北風主殃六畜十一月忌行夏令主多疥癘之疾十二月朔日忌西風主六畜疫忌行春令主多痼疾腎臟冬旺論內景經曰腎屬北方水為黑帝生對臍附腰脊重一斤一兩色如縞映紫主分水氣灌注一身如樹之有根左曰腎右曰命門生氣之府死氣之廬守之則存用之則竭為肝母為肺子耳為之官天之生我流氣而變謂之精精氣往來謂之神神者腎藏其情智左屬壬右屬癸在辰為子亥在氣為吹在液為唾在形為骨久立傷骨為損腎也應在齒齒痛者腎傷也經於上焦榮於中焦衛於下焦腎邪自入則多唾膀胱為津液之府榮其髮也黃庭經曰腎部之宫𤣥闕圓中有童子名上𤣥主諸臟腑九液源外應兩耳百液津其聲羽其味醎其臭腐心邪入腎則惡腐凡丈夫六十腎氣衰髮變齒動七十形體皆困九十腎氣焦枯骨痿痺不能起牀者腎先死也腎病則耳聾骨痿腎合於骨其榮在髭腎之外應北嶽上通辰星之精冬三月存辰星之黑氣入腎中存之人之骨疼者腎虛也人之齒多齟者腎衰也人之齒墮者腎風也人之耳痛者腎氣壅也人之多缺者腎邪也人之腰不伸者腎乏也人之色黑者腎衰也人之容色紫而有光者腎無病也人之骨節鳴者腎羸也肺邪入腎則多呻腎有疾當吹以瀉之吸以補之其氣智腎氣沉滯宜重吹則漸通也腎虛則夢入暗處見婦人僧尼龜鱉駝馬旗鎗自身兵甲或山行或溪舟故冬之三月乾坤氣閉萬物伏藏君子戒謹節嗜欲止聲色以待陰陽之定無兢隂陽以全其生合乎太清相腎臟病法腎熱者頥赤腎有病色黑而齒稿腹大體重喘咳汗出惡風腎虛則腰中痛腎風之狀頸多汗惡風食欲下隔塞不通腹滿脹食寒則泄在形黑瘦腎燥急食辛以潤之腎病堅急食鹹以補之用苦以瀉之無犯熱食無著暖衣腎病臍下有動氣按之牢若痛苦食不消化體重骨疼腰膝膀胱冷痛腳疼或痺小便餘瀝疝瘕所纒宜服腎氣丸腎氣丸乾地黃一兩薯蕷一兩牡丹皮六錢澤瀉七錢山茱萸七錢茯苓六錢桂心五錢附子小便炮製四兩右搗為末蜜丸桐子大空心酒下三四十丸日再服修養腎臟法當以冬三月面北向平坐鳴金梁七飲玉泉三更北吸𤣥宫之黑氣入口五吞之以補吹之損六氣治腎法治腎臟吐納用吹法以鼻漸長引氣以口吹之腎病用大吹三十遍細吹十遍能除腎家一切冷氣腰疼膝冷沉重久立不得陽道衰弱耳內蟲鳴及口內生瘡更有煩熱悉能去之數數吹去相繼勿絶疾瘥則止過多則損腎臟導引法冬三月行之可正坐以兩手聳托右引脅三五度又將手返著膝挽肘左右同綟身三五度以足前後踏左右各數十度能去腰腎風邪積聚黃帝製護命茯苓丸黃帝曰冬三月宜服何藥岐伯曰當服茯苓丸主男子五勞七傷兩目迎風淚出頭風項强回轉不得心腹脹滿上連胸下引腰背表裏徹痛喘息不得飲食咳逆面黃痿瘦小便淋瀝隂痿不起臨爐不舉足腫腹痛五心煩熱身背浮腫盜汗不絶四肢拘攣或緩或急夢寐驚悸呼吸氣短口乾舌燥狀如消渴急于喜怒嗚咽悲愁此方治之茯苓山藥肉桂山茱萸巴㦸白术牛膝兔絲子各一兩乾薑細辛防風柏子仁澤㵼牡丹皮各三錢附子童便煮三次用一兩一個的妙右為細末蜜丸桐子大空心鹽湯服七丸日再服冬季攝生消息論冬三月天地閉藏水氷地坼無擾乎陽早臥晚起以待日光去寒就溫毋泄及膚逆之腎傷春為痿厥奉生者少斯時伏陽在內有疾宜吐心膈多熱所忌發汗恐泄陽氣故也宜服酒浸補藥或山藥酒一二杯以迎陽氣寢臥之時稍宜虛歇宜寒極方加綿衣以漸加厚不得一頓便多惟無寒即已不得頻用大火烘炙尤甚損人手足應心不可以火炙手引火入心使人煩燥不可就火烘炙食物冷藥不治熱極熱藥不治冷極水就濕火就燥耳飲食之味宜減鹹增苦以養心氣冬月腎水味鹹恐水尅火心受病耳故宜養心宜居處密室溫暖衣衾調其飲食適其寒溫不可冒觸寒風老人尤甚恐寒邪感冒多為嗽逆麻痺昏眩等疾冬月陽氣在內陰氣在外老人多有上熱下冷之患不宜沐浴陽氣內藴之時若加湯火所通必出大汗高年骨肉踈薄易於感動多生外疾不可早出以犯霜威早起服醇酒一杯以禦寒晚服消痰凉膈之藥以平和心氣不令熱氣上湧切忌房事不可多食炙煿肉麵餛飩之類雲笈七籖云冬月夜臥叩齒三十六通呼腎神名以安腎臟晨起亦然書云冬時忽大熱作不可忍受致生時患故曰冬傷於汗春必溫病神名𤣥真又云大雪中跣足做事不可便以熱湯浸洗觸寒而回寒若未解不可便喫熱湯熱食須少頃方可金匱要略曰冬夜伸足臥則一身俱暖七籖曰冬夜臥被蓋太暖睡覺即張目吐氣以出其積毒則永無疾又曰冬臥頭向北有所利益宜溫足凍腦冬夜漏長不可多食硬物并濕軟果餅食乾須行百步摩腹法搖動令消方睡不爾後成腳氣本草云惟十二月可食芋頭他月食之發病千金方曰冬三月宜服藥酒一二杯立春則止終身嘗爾百病不生纂要曰鍾乳酒方服之補骨髓益氣力逐寒濕其方用地黃八兩巨勝子一升熬搗爛牛膝四兩五加皮四兩地骨皮四兩桂心二兩防風二兩仙靈皮三兩鍾乳粉五兩甘草湯浸三日更以牛乳一碗將乳石入瓷瓶浸過於飯上蒸之乳盡傾出暖水淘淨碎研右諸藥為中末入絹囊盛浸好醇酒三斗罈內五日後可取服之十月初一日服起至立春日止冬氣寒宜食黍以熱性治其寒焚炙飲食并火焙衣服冬三月六氣十八候皆正養藏之令人當閉精塞神以厚斂藏瑣碎録曰冬月勿以梨攪熱酒飲令人頭旋不可枝梧金匱略曰冬三月勿食猪羊等腎七籖曰冬夜不宜以冷物鐵石為枕或焙暖枕之令人目暗本草曰冬月不可多食蔥令人發疾冬三月合用藥方陳橘丸治大腸風燥氣祕等疾陳橘皮去白一兩檳榔五錢木香五錢羌活五錢青皮五錢枳殼麩炒五錢不蛀皂角兩挺去皮郁李仁去皮尖炒黃一兩牽牛炒二兩右為末研細蜜丸如桐子大每服二十丸食前薑湯下未利加至三十丸以大便通利為度搜風順氣牽牛丸治熱湧滯不快大腸祕結熱毒生瘡牽牛二兩飯蒸木通一兩青橘一兩去瓤桑皮一兩赤芍一兩炒木香五錢右為末蜜丸桐子大酒下十五丸至二十丸止婦人血氣醋湯下解老人熱祕方大附子一個八九錢重者燒過存性研為末每服一錢熱酒下大上肘後玉經八方乾卦西北天地父母七精散竹實三兩九蒸九曝主水氣日精地膚子四兩太陰之精主肝明目黃精四兩戊已之精主脾臟蔓菁子三兩九蒸九曬主邪鬼明目松脂三兩鍊令熱主風狂脾濕桃膠四兩五木之精主鬼忤苣勝五兩五穀之精九曝右為末煉蜜為丸每服二三十丸妙不可述坎卦正北南獄真人赤松子枸杞煎丸枸杞子根三十斤取皮九蒸九曝搗為粉取根骨清水煎之添湯煮去楂熬成膏和粉為丸桐子大每服三五十丸夀增無算十月事宜孝經緯曰霜降後十五日斗指乾為立冬冬者終也萬物皆收藏也後十五日斗指亥為小雪天地積陰溫則為雨寒則為雪時言小者寒未深而雪未大也律應鍾鍾者動也言物應陽而動下藏也辰亥亥者劾也言時陰氣劾殺萬物也西京雜記曰十月為正陰曰陰月要纂曰上冬是月天道南行作事出行宜正南方吉不宜用亥日犯月建不吉十六日天倉開宜入山修道又曰初十日十三日宜拔白五行書曰是月亥日食餅令人無病是月宜進棗湯其方取大棗去皮核於文武火上翻覆焙香然後泡作湯服攝生圖曰初一日宜修成福齊初五日修三㑹齊勿行譴責四時纂要逐瘟方地黃八兩巨勝子一升二物熬爛牛膝五加皮地骨皮各四兩官桂防風各二兩仙靈皮三兩用牛乳五兩同甘草湯浸三日以半升同乳拌仙靈皮磁瓶盛入炊食上蒸之待其牛乳盡出方以暖水淨淘碎如麻豆同前藥細銼入布袋盛之浸於二斗酒中五日後取看味重取去藥楂十月朔飲至冬至日止忌葱蒜臭物决明子主青盲目淫觜赤白膜痛淚又療唇口青色十月十日採隂乾百日可服又云是月取枸杞子清水洗淨瀝乾研爛以細布袋盛榨出汁水去渣慢火熬膏勿令粘底候少稠即以瓦器盛之蠟紙密封勿令透氣每朝酒調一二匙服之夜臨再服百日輕身壯氣耳目聰明鬚髮烏黑冬三月戊寅己卯癸酉辛巳丁亥及壬丙戊癸宜煉丹藥是月宜服棗湯鍾乳酒枸杞膏地黃煎等物以養和中氣方俱在雲笈七籖曰十月十四日取枸杞煎湯沐浴令人光澤無病初一日十八日併宜沐浴吉冬至日陽氣歸內腹宜溫暖物入胃易化修真指要曰十五日下元吉辰可修謝過齊經驗方是月上亥日採枸杞子二升採時面東再搗生地黃汁三升以好酒五升同攪均三味共封入瓶內封密三重浸二十一日安置立春前一日每早空心飲一杯至立春後鬚髮皆黑助益精氣輕身無比忌食蘿蔔太清草本草云槐子乃虛星之精是月上巳日採而吞之每服二十一粒去百病長生通神是月宜食芋無礙十月事忌是月初一日十四日忌裁衣交易白雲忌十月忌食猪肉發宿氣且亥為猪肖宜忌之人能終身忌之其有益於人自多本草考之可見千金方十月勿食椒傷血脈勿食韭令人多涕唾勿食霜打熟菜令人面上無光勿食獐肉動氣勿食猪腎十月腎旺也不令死氣入腎又曰是月夫婦戒同寢忌純隂用事是月勿帶暖帽使腦受凍則無眩暈之疾法天生意云十月初四勿責罰人故刑官是日罷刑大忌是月二十五日不宜問疾是月初一日為民歲臘十五日為下元二日戒夫婦入房二十日忌逺行十月修養法孟冬之月天地閉藏水凍地圻早臥晚起必候天曉使至溫暢無泄大汗勿犯氷凍雪積溫養神氣無令邪氣外入卦坤坤者順也以服健為正故君子當安於正以順時也生氣在酉坐臥宜向西方孫真人修養法曰十月心肺氣弱腎氣强盛宜減辛苦以養腎氣母傷筋骨勿泄皮膚勿妄針炙以其血澀津液不行十五日宜靜養獲吉內丹祕要曰大隂之月萬物至此歸根復命喻我身中隂符窮極寂然不動反本復靜此時塞兌垂簾以神光下照於坎宫當夜未央凝神聚氣端坐片時少焉神氣歸根自然無中生有積成一㸃金精蓋一陽不生於復而生於坤隂中生陽實為産藥根本靈劔子導引法勢以兩手相叉一足踏之去腰腳拘束腎氣冷痺膝中痛諸疾又法正坐伸手指緩拘腳指五七次治腳氣諸風注氣腎臟諸毒氣逺行腳痛不安竝可治之常行最妙人之一身元氣亦有升降子時生于腎中此即天地一陽初動感而逺通乃復卦也自此後漸漸升至泥丸午時自泥丸下降于心戌亥歸于腹中此即天地六隂窮極百蟲閉關草木歸根寂然不動乃坤卦也靜極復動循環無端其至妙又在坤復之交一動一靜之間即亥末子初之時隂符經曰自然之道靜故天地萬物生養生者當順其時而行坤復二卦之功正在十月之間十一月事孝經緯曰小雪後十五日斗指壬為大雪言積隂為雪至此栗烈而大矣後十五日斗指子為冬至隂極而陽始至日南至漸長至也白虎通曰始律黃鍾何黃中色也鍾動也言陽氣動於黃泉之下欲養萬物也樂志曰辰子子者孳也言陽氣至此更滋生也吕氏曰仲冬為暢月月纂天道東南行作事出行宜向東南吉冬至日陽氣歸內腹中熱物入胃易消化纂要曰共工氏子不才以冬至日死為疫鬼畏赤小豆是日以赤小豆煮粥厭之月令曰君子齊戒慎處必檢身心身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定凡此以微陽方生隂未退聽隂陽相爭而未定故君子當齊戒以待之凡事與夏至同此又當謹之至者彼只止言節此則兼言禁蓋仲夏之隂猶微而此時之隂猶盛隂微則盛隂未至于甚傷隂盛則微陽當在于善保故坤復之月宜靜攝為最七籖曰是月初十日取枸杞葉煎湯洗浴至老光澤十五十六日俱宜沭浴千金月令曰是月可服補藥不可餌大熱之藥宜早食宜進宿熟之食又曰至日於北壁下厚藉草而卧以受元氣纂要曰是月初十日宜拔白髮五經通義曰至後陽氣始萌隂陽交精萬物氣微在下不可動泄保生心鑑曰子月火氣潜伏閉藏以養其本然之真而為來春發生升動之本此時若戕賊之至春升之際下無根本陽氣輕浮必有溫熱之病簡易方曰冬至日鑽燧取火可免瘟疫仙經曰十一日天倉開宜入山修道修啓福齊歲時雜記至日以赤小豆煮粥合門食之可免疫氣冬至煎餳綵珠戴一陽巾十一月事忌纂要曰是月勿食龜鱉肉令人水病勿食陳肺勿食鴛鴦令人惡心勿食生菜發宿疾勿食生韭多涕唾勿食黃鼠損神氣勿食蝦蚌帶甲之物勿食獐肉動氣勿食火焙肉翰墨全書曰是月二十五日為掠剩大夫忌勿犯交姤凶至後十日夫婦當戒容止纂要曰是月十二日二十二日忌裁衣交易千金翼曰冬至後庚辛日不可交合大凶又曰勿枕冷石鐵物令人目暗又曰初四日勿責譴下人大忌又曰十一日不可沐浴勿以火炙背又曰勿食螺螄螃蟹損人志氣長尸蟲雲笈七籖曰二十日不宜逺行二十三日不可問疾不用子日犯月建作事不吉禮儀志曰至日鑽燧取火可止瘟病是日毋多言當閉關靜坐以迎一陽之生不可用作雲笈七籖曰仲冬腎氣旺心肺衰宜助肺安神調理脾胃無乖其時勿暴溫暖勿犯東南賊邪之風令人多汗腰脊强痛四肢不通十一月修養法仲冬之月寒氣方盛勿傷水凍勿以炎火炙腹背毋發蟄藏順天之道卦復復者反也隂反於下以順上行之義也君子當靜養以順陽生是月生氣在戌坐臥宜向西北孫真人修養法是月腎臟正旺心肺衰微宜增苦味絶鹹補理肺胃閉關靜攝以迎初陽使其長養以全吾生靈劔子導引法勢以一手托膝反折一手抱頭前後左右為之凡三五度去骨節間風宣通血脈膀胱腎臟之疾是月也一陽來復陽氣始生喻身中陽氣初動火力方微要不縱不拘溫溫柔柔播施於鼎中當撥動頂門微微挈之須臾火力熾盛逼出真鉛氣在箕斗東南之鄉火候造端之地十二月事宜孝經緯曰冬至後十五日斗指癸為小寒陽極隂生乃為寒今月初寒尚少也後十五日斗指丑為大寒至此栗烈極矣律大吕吕者拒也言陽氣欲出隂拒之也樂志曰辰丑丑者紐也言終始之際以紐結為名也纂要曰十二月曰暮冬曰杪冬凃月暮節暮歲窮稔窮紀月纂曰天道西行作事出行俱宜向西不宜用丑日犯月建作事不吉黑子祕録曰是月癸丑日造門盜賊不能進瑣碎録曰臘月子日晒薦席能去蚤虱又曰是月取猪脂四兩懸於厮中入夏一家無蠅二十四日狀底㸃燈謂之照虛耗也二十四日取鼠一頭燒在於子地上埋之永無鼠耗本草圖經云取活鼠用油煎為膏敷湯火瘡滅瘢疪極良𤣥樞曰除日以合家頭髮燒灰同腳底泥包投井中咒曰敕今我家眷屬竟年不害傷寒辟却五瘟疫鬼七籖曰除夜枸杞湯洗浴令人不病初一初二初八十三日十五二十日沐浴去灾悔吉除日掘宅四角各埋一大石為鎮宅主灾異不起是日取圓石一塊雜以桃核七枚埋宅隅絶疫鬼除夜取椒二十一粒勿與人言投於井中以絶瘟疫其夜家奉神佛前併主人臥室燃燈達旦主家宅光明攢火圍爐合家共坐以助陽氣除夜宜燒辟瘟丹并家中所餘雜藥焚之可辟瘟疫可焚蒼术方見五月農桑撮要曰臘八日收鱖魚燒存性研細用酒調服治小兒班疹不出即發更安懸厮上不生蟲法天生意云初七初十十八二十日拔白髮又云除夜有行瘟使者降於人間以黃紙朱書天行已過四字貼於門額吉便民要纂曰大寒早出含酥油於口中則耐寒食物本草云雪水甘寒收藏能解天行時疫一切熱毒是月收雄狐膽若有人暴亡未移時者急以溫水研灌些少入喉中即活移時即無及矣當預備之是月取青魚膽隂乾如患喉閉及骨鯁者以此膽少入口中咽津即解家孰事親曰是月取猪板油脂背隂掛能治諸般瘡疥敷湯火良又法取猪脂一斤入瓷瓮中加雞子白十枚水銀二錢封瓮埋亥地上一百日取治癰疽極良又曰是月取皂角燒為末留起遇時疫早起以井花水調一錢服之效歲時雜記曰臘月宜合茵陳丸料時疫瘟㾮山巒瘴氣等症嶺表行客可嘗隨帶茵陳四兩大黃五兩豉心五合炒令香恆山三兩桃核仁三兩炒芒硝三兩杏仁三兩去皮尖鱉甲二兩酒醋塗炙巴豆一兩去皮膜去油炒另研共為末蜜丸桐子大初得時三日內旦服五丸或利或吐汗若否再加一丸久不覺即以熱湯飲促之老小以意酌服黃病痰癖時氣傷寒痎瘧發癎服之無不瘥者瘴氣如神赤白痢亦效春初一服一年不病收瓶以蠟封口置燥處忌食莧菜蘆笋屠蘇方大黃十六銖白术十五銖桔梗十五銖蜀椒十五銖去目桂心十八銖去皮烏頭六銖去皮臍茇葜十二銖一方加防風一兩右七味㕮咀紅絹囊盛之除日沉井中至泥底正月朔旦取藥囊置酒中煎數沸取起東向飲之從小至大一家無疫以藥楂投井中每歲飲之可長年無病田家五行云十二月二十五日夜煮赤豆粥合家食之出外者留與名曰口數粥能祛瘟鬼負暄雜録是月二十四日取井花水平旦初汲者浸乳香數塊至元旦五鼓暖令溫從小飲乳香一豆大咽水三口則一年不染時疫多能鄙事曰是月取烏鴉一二隻入瓶泥封固燒為末治一切勞瘦骨蒸咳嗽米飲調下二錢良內景經曰臘八日修百福齊二十八日修迎新齊是月初六日天倉開宜入山修道瑣碎録曰臘月晨起以蒸餅捲猪脂食之終歲不生瘡疥久服肌體光澤法天生意云川烏炒黃絹袋盛􅑽酒浸服少許可療頭風十二月事忌千金方是月勿食猪脾旺在四季故耳是月勿歌舞犯者凶勿食生韭勿食霜爛果菜勿食蚌蟹鱉蝦鱗蟲之物勿食獐肉勿食牛猪㹠肉勿食生椒勿食葵菜大抵與十一月忌同勿犯大雪勿傷筋骨勿妄針刺月忌二十一日不可問疾初七日不宜水陸逺行凶初九日二十五日忌裁衣交易瑣碎録曰除夜勿嗔罵奴僕并碎器皿仍不可大醉八日名王侯臘忌夫婦入房十二月修養法季冬之月天地閉寒陽潜隂施萬物伏藏去凍就溫勿泄皮膚大汗以助胃氣勿甚溫暖勿犯大雪宜小宣勿大全補衆陽俱息勿犯風邪勿傷筋骨卦臨臨者大也以剛居中為大亨而利於貞也生氣在亥坐卧宜向西北孫真人曰是月土旺火氣不行宜減甘增苦補心助肺調理腎藏勿胃霜雪勿泄津液及汗初三日宜齊戒靜居焚香養道吉靈劔子導引法勢以兩手聳上極力三五遍去脾臟諸疾不安依春法用之冬時逸事臘八日粥臘月八日東京作浴佛㑹以諸果品煮粥為之臘八粥吃以增福竈中㸃燈都人以酒糟抹於竈門之上謂之醉司命㸃燈竈心謂之照虛耗餽歲别歲蘇公詩云為歡恐無具假物不論貨富人事華靡珠繡光翻坐貧者愧不能微贄出舂磨言彼此相送産物以為餽歲又子瞻詩云人行猶可復歲行那可追已逐東流水赴海歸無時東鄰酒初熟西舍彘亦肥且為一日歡母為窮年悲以酒相歡謂之别歲守歲分歲子瞻詩略云兒童强不睡拍手夜歡譁晨雞且莫唱更鼓畏摻撾坐久燈燼落起看北斗斜明年豈無年心事恐蹉跎故大小飲酒相歡除夕坐以待旦謂之守歲范至能詩略云奉祠席撤夜未艾飲福之餘即分歲地爐火暖蒼术香飣盤果餌如蜂房小兒但喜新年至頭角長成添意氣老翁把杯心茫然增年翻是減吾年荆叉勸酒仍祝願但願尊前且强健合室大小除夕叙飲歡燕謂之分歲藏鈎之戲風土記臘日叟嫗各隨其儕分為二曹以較勝負始於鈎弋夫人事也火山香焰隋主除夕設火山數十焚沉香數車香聞數十里研爐暖合天寶間有一研爐曲盡其巧寒冬置研爐上不凍𤣥天罡女授張無頗暖金合寒時出此一室暄熱辟寒香外國進香大寒焚之必減衣拒熱却寒簾咸通年賜公主却寒之簾揑鳯炭楊國忠用炭屑揑成雙鳯冬日暖於爐中以白檀鋪底香靄一室炷暖香雲溪僧舍冬月客至焚暖香一炷滿室如春故詹克愛詩云暖香炷罷春生室始信壺中别有天煮建茗逸人王休與僧道交冬月取氷之精瑩者烹建茗以供妓圍肉陳申王冬月以妓密圍坐側以禦寒楊家選妾肥大者行列於後謂之遮風肉陳暖寒㑹王元寶大雪時令童僕掃雪開具酒宴迎賔謂之暖寒㑹三餘足學冬為歲餘故冬月可就問學漢書東方朔云三冬文史足尋梅烹雪孟浩然尋梅陶穀烹雪風致自佳書物侯風左傳云凡分至啓閉必書雲物為備故也灸經曰至日風從南來名為虛賊傷人諧律度晷冬至始致八能之士以調律厯至日度晷景候鍾律權土炭效隂陽也愛日履霜左傳曰冬日可愛又曰履霜堅氷君子知戒鑿氷㸑燧詩云一之日鑿氷冲冲淮南子曰孟冬之月招搖指亥㸑松燧火高子幽賞冬時十二條湖凍初晴逺泛西湖之水非嚴寒不冰冰亦不堅氷合初晴朝陽閃爍湖面氷澌瓊珠㸃㸃浮泛時操小舟敲氷浪遊觀氷開水路儼若舟引長蛇晶熒片片堆疊家僮善擊氷片舉手鏗然聲溜百步恍若星流或衝激破碎狀飛玉屑大快寒眼幽然此興恐人所未同扣舷長歌把酒豪舉覺我陽春滿抱白雪知音忘却氷湖雪岸之為寒也舊聞戒涉春氷胸中不抱懼心又何必以涉氷為戒雪霽策蹇尋梅畫中春郊走馬秋溪把釣䇿蹇尋梅莫不以朱為衣色豈果無為哉似欲粧㸃景象與時相宜有超然出俗之趣且衣朱而遊者亦非常客故三冬披紅氊衫裹以氈笠跨一黑驢秃髮童子挈尊相隨踏雪溪山尋梅林壑忽得梅花數株便欲傍梅席地浮觴劇飲沉醉酣然梅香撲袂不知身為花中之我亦忘花為目中景也然尋梅之蹇扣角之犢去長安車馬何凉凉卑哉且為衆嗤究竟幸免覆轍三茅山頂望江天雪霽三茅乃郡城內山高處襟帶江湖為勝覽最歡喜地時乎積雪初晴踈林開爽江空漠漠寒烟山逈重重雪色江帆片片風度銀梭村樹幾家影寒玉瓦山徑人跡板橋客路車翻縞帶樵歌凍壑漁釣氷簔目極去鳥歸雲感我逺懷無際時得僧茶烹雪村酒浮香坐傍幾樹梅花助人清賞更劇西溪道中玩雪往年因雪霽偶入西溪何意得見世外佳景日雖露影雪積未踈竹眠低地山白排雲風回雪舞撲馬嘶寒玉墮氷柯沾衣生濕遙想梅開萬樹目亂飛花自我人跡逺來踏破瑶街十里生平快賞此景無多因念雪山苦行妙果以忍得成吾人片刻冲風便想擁爐醉酒噫恣欲甚矣雖未能以幽冷攝心亦當以清寒煉骨山頭玩賞茗花兩山種茶頗蕃仲冬花發若月籠萬樹每每入山尋茶勝處對花默共色笑忽生一種幽香深可人意且花白若剪雲綃心黃儼抱檀屑歸折數枝插觚為供枝梢苞蕚顆顆俱開足可一月清玩更喜香沁枯腸色憐青眼素艷寒芳自與春風姿態迥隔幽閒佳客孰過於君登眺天目絶頂武林萬山皆自天目分發故地鈴有天目生來兩乳長偈冬日木落作天目看山之遊時得天氣清朗烟雲淨盡扶策躡巔四望無際兩山東引高下起伏屈曲奔騰隱隱到江始盡真若龍翔鳯舞目極匹練橫隔知為錢塘江也外此茫茫是為東海幾簇松筠山僧指云往宋王侯廢塜噫山川形勝千古一日曽無改移奈何故宮黍離陵墓丘壑今幾變遷哉重可慨也山居聽人說書老人畏寒不涉世故時向山居曝背茅簷看梅初放鄰友善談炙糍共食令說宋江最妙數回歡然撫掌不覺日暮吾觀道左豐碑人間銘頌是亦水滸傳耳豈果真實不虛故說更惜未必得同此傳世傳人口掃雪烹茶玩畫茶以雪烹味更清冽所為半天河水是也不受塵垢幽人啜此足以破寒時乎南窗日暖喜無觱發惱人靜展古人畫軸如風雪歸人江天雪棹溪山雪竹關山雪運等圖即假對真以觀古人模擬筆趣要知實景畫圖俱屬造化機局即我把圖是人玩景對景觀我謂非我在景中千古塵緣孰為真假當就圖畫中了悟雪夜煨芋談禪雪夜偶宿禪林從僧擁爐旋摘山芋煨剝入口味較市中美甚欣然一飽因問僧曰有為是禪無為是禪有無所有無非所無是禪乎僧曰子手執芋是禪更從何問余曰何芋是禪僧曰芋在子手有耶無耶謂有何有謂無何無有無相滅是為真空非空非非空空無所空是名曰禪執空認禪又著實相終不悟禪此非精進力到得慧根緣未能頓覺子曷觀芋乎芋不得火口不可食火功不到此芋猶生須火到芋熱方可就齒舌消滅是從有處歸無芋非火熱子能生嚼芋乎芋相終在不滅手芋嚼盡謂無非無無從有來謂有非有有從無滅子手執芋今著何處余時稽首慈尊禪從言下喚醒山窗聽雪􅒱竹飛雪有聲惟在竹間最雅山窗寒夜時聽雪灑竹林浙􅅹蕭蕭連翩瑟瑟聲韻悠然逸我清聽忽爾回風交急折竹一聲使我寒氈增冷暗想金屋人歡玉笙聲醉恐此非爾歡除夕登吳山看松盆除夕惟杭城居民家户架柴燔燎火光燭天撾鼓鳴金放炮起火謂之松盆無論他處無敵即杭之鄉村亦無此勝斯時抱幽趣者登吳山髙曠就南北望之紅光萬道炎焰火雲街巷分岐光為界隔聒耳聲喧震騰逺近觸目星丸錯落上下此景是大竒觀幽立髙空俯眺囂雜覺我身在上界雪後鎮海樓觀晚炊滿城雪積萬瓦鋪銀鱗次髙低盡若堆玉時登髙樓凝望目際無痕大地為之片白日暮晚炊千門青烟四起縷縷若從玉版紙中界以烏絲闌畫幽勝妙觀快我冷眼恐此景亦未有人知得遵生八箋卷六
